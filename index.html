คนเดียวหรือไม่ ส่วนพวกระดับสูงอย่างประธานผู้พิพากษาศักดิ์สิทธิ์ ก็อาจจะแค่พึ่งพาพลังของอีกฝ่ายเพื่อก้าวขึ้นสู่ระดับนี้ เช่นเดียวกับพวกประธานสภาที่มีข้อจำกัดมากมาย และจัดอยู่ในกลุ่มระดับตำนานจอมปลอมเช่นกัน...","ในช่วงไม่กี่วันที่ผ่านมา ภายใต้การทรมานสอบสวนเหล่านักบวชและบิชอปอย่างไม่หยุดหย่อน พวกเขาก็สามารถขุดคุ้ยข้อมูลออกมาได้มากขึ้น ตัวอย่างเช่น การคัดเลือกผู้บริหารระดับสูงของศาสนจักรนั้นมีเงื่อนไขอยู่สองข้อ ข้อแรกคือต้องเป็นนักบวชระดับหกวงแหวน และข้อที่สองคือต้องได้รับเทวโองการและได้รับการประทานพลังศักดิ์สิทธิ์!","ส่วนพลังศักดิ์สิทธิ์คืออะไรนั้น พวกบิชอปที่ถูกจับมาก็ไม่รู้เหมือนกัน เป็นไปได้สูงว่ามันอาจจะเป็นหนึ่งในความลับที่สำคัญที่สุดของศาสนจักร","ลินน์เดาว่าเรื่องนี้น่าจะเกี่ยวข้องกับสาเหตุที่เอ็ดเวลและคนอื่นๆ สามารถใช้เทพจุติที่แท้จริงได้ และหลังจากนั้นระดับพลังของพวกเขาก็จะลดฮวบลง หรืออาจจะถึงขั้นตกตายไปเลยก็ได้","พ่อมดฝึกหัด —— พ่อมดเต็มตัว —— จอมเวทผู้ยิ่งใหญ่ —— ระดับตำนาน (เทพ)","ลินน์ทบทวนข้อมูลเกี่ยวกับการก้าวกระโดดของระดับพลังจิตวิญญาณในหัวของตนเองอีกครั้ง และสั่งให้ปัญญาประดิษฐ์สนับสนุนบันทึกข้อมูลเหล่านั้นเอาไว้ โดยลังเลอยู่ครู่หนึ่ง ก่อนจะปฏิเสธคำว่า เทพ และเปลี่ยนมันเป็น ครึ่งเทพ!","หรือจะเรียกว่า เทพที่ไม่สมบูรณ์ ก็ได้!","หาก ‘เอลา’ สามารถแก้ปัญหาเรื่อง ‘พิษแห่งความศรัทธา’ และผสานพลังการประมวลผลของสาวกหลายแสนหรือหลายสิบล้านคนเข้ากับตัวเองได้ ถ้ารูปการณ์เป็นเช่นนั้น นางคงกลายเป็นเทพที่แท้จริงไปแล้ว!","เมื่อนึกถึงภาพนั้น ลินน์ก็รู้สึกถึงแรงกดดันมหาศาล สิ่งที่เร่งด่วนที่สุดในตอนนี้ก็คือ การหาวิธีก้าวขึ้นเป็นระดับตำนาน หรือไม่ก็หาบางสิ่งบางอย่างที่สามารถคานอำนาจกับศาสนจักร เพื่อทำให้อีกฝ่ายเกิดความหวาดระแวงและไม่กล้าผลีผลาม","สำหรับเรื่องแรก ลินน์ยังคงมืดแปดด้าน เพราะการจะบุกเบิกเส้นทางการเลื่อนระดับสายใหม่ขึ้นมานั้นไม่ใช่เรื่องง่าย ดังนั้น เขาจึงเตรียมที่จะลงมือจากทางเลือกที่สองก่อน!","และนี่ก็เป็นเหตุผลว่าทำไมเขาถึงต้องจงใจชักนำให้แฮร์รอฟและคนอื่นๆ ไปสำรวจโครงสร้างของอะตอม เพื่อที่จะได้ยืนยันว่าแบบจำลองอะตอมของสหพันธรัฐในชาติก่อนนั้นถูกต้องหรือไม่ และสมการความสมมูลระหว่างมวล-พลังงาน จะสามารถนำมาใช้ในโลกนี้ได้หรือไม่","หากถูกต้องไร้ที่ติ และสามารถหาแร่ยูเรเนียมพบ เขาก็จะสามารถใช้มันพัฒนา ‘เวทมนตร์ระเบิดนิวเคลียร์’ ขึ้นมาได้!","นี่คือเวทมนตร์ที่เหนือล้ำกว่าความรู้ความเข้าใจของพ่อมดทุกคนในยุคนี้อย่างแน่นอน มันสามารถทำลายล้างเมืองทั้งเมืองได้อย่างง่ายดาย และเป็นพลังอำนาจระดับเดียวกับดวงดาวฤกษ์!","ลินน์คาดการณ์ว่า ด้วยอานุภาพของระเบิดนิวเคลียร์ แม้ว่าจะไม่สามารถสังหารเทพได้ แต่อย่างน้อยมันก็สามารถใช้เป็นอาวุธข่มขวัญอันทรงพลังได้!","หากสถานการณ์ถึงขั้นวิกฤติที่สุดจริงๆ พวกเขาก็สามารถระเบิดจักรวรรดิให้ราบเป็นหน้ากลอง เพื่อบั่นทอนพลังของ ‘เอลา’ ลงอย่างมหาศาล","ท้ายที่สุดแล้ว สาวกแต่ละคนล้วนสามารถส่งมอบพลังการประมวลผลส่วนหนึ่งให้แก่อีกฝ่ายได้ ในทางกลับกัน ความแข็งแกร่งของเทพก็ถูกค้ำจุนโดยเหล่าสาวกเช่นกัน!","ดังนั้น การสังหารสาวกเหล่านี้ ก็คือการทำลายรากฐานพลังของอีกฝ่าย!","แน่นอนว่า หากไม่ถึงคราวคับขันจริงๆ ลินน์ก็ไม่คิดจะทำแบบนั้นหรอก","เพราะนั่นหมายถึงการบาดเจ็บล้มตายของคนนับล้านคนเชียวนะ!","...","เหล่าประธานสภาให้ความสำคัญกับตารางจัดอันดับธาตุมากกว่าที่ลินน์คาดคิดเอาไว้เสียอีก หลังจากหลุดออกมาจากมิติเวทมนตร์ได้เพียงสองชั่วโมง บรรดาสมาชิกสภาต่างก็ได้รับคำเชิญให้เข้าร่วมการประชุมอย่างเร่งด่วนในชั่วข้ามคืน!","แฮร์รอฟปิดบังเรื่องการหารือและข้อมูลเกี่ยวกับวิธีการเลื่อนเป็นระดับตำนานในมิติเวทมนตร์เอาไว้ จากนั้นเขาก็อธิบายเรื่องทฤษฎีการแบ่งแยกอะตอม และแนวคิดเรื่องการหาวิธีเอาชนะเทพจากระดับจุลภาคที่ลึกลงไป อย่างกระชับและเข้าใจง่าย","สมาชิกสภาทุกคนที่อยู่ที่นั่นต่างก็ตกตะลึง และมีความคิดเห็นทั้งในแง่บวกและแง่ลบต่อทฤษฎีการแบ่งแยกอะตอมนี้","ตั้งแต่วินาทีแรกที่เริ่มเรียนเวทมนตร์ พ่อมดทุกคนจะถูกสอนมาตลอดว่า ธาตุพื้นฐานคือรากฐานที่ประกอบขึ้นเป็นสรรพสิ่งทั้งหมด มันเป็นสิ่งที่เล็กที่สุดและแข็งแกร่งที่สุดในโลก!","แต่ตอนนี้ ทฤษฎีการแบ่งแยกอะตอมของ ‘สมาคมเวทมนตร์เร้นลับ’ กำลังท้าทายความรู้ความเข้าใจของพวกเขาอย่างไม่ต้องสงสัย!","อย่างไรก็ตาม เนื่องจากลินน์เป็นถึงดาวรุ่งแห่งเวทมนตร์ ชื่อเสียงของ ‘สมาคมเวทมนตร์เร้นลับ’ จึงมีความน่าเชื่อถือมากพอ ประกอบกับบรรดาประธานสภาทั้งหลายต่างก็มีแนวโน้มที่จะเชื่อว่าทฤษฎีนี้เป็นความจริง ดังนั้น แม้แต่สมาชิกสภาที่ไม่เห็นด้วย ก็ยังไม่กล้าเอ่ยปากโต้แย้งผลีผลาม","“ถ้าข้าจำไม่ผิด ท่านอัลทอค ‘ผู้ควบคุมธาตุ’ ก็เคยพยายามที่จะก้าวเข้าไปในดินแดนแห่งจุลภาคที่ลึกลงไป แต่กลับถูกวิญญาณธาตุเล่นงานเอา...”","สมาชิกสภาคนหนึ่งพูดขึ้นมาด้วยสีหน้าหวาดกลัวและเป็นกังวล","ในชั่วพริบตา ทุกคนที่อยู่ที่นั่นต่างก็เงียบกริบ เพราะพวกเขา ต่างก็เคยได้ยินเรื่องความน่ากลัวของวิญญาณธาตุมาบ้างแล้ว ในตอนนั้นมันทำให้พ่อมดระดับตำนานหนึ่งคน จอมเวทผู้ยิ่งใหญ่อีกสามคน และพ่อมดเต็มตัวอีกหลายสิบคน ต้องเสียสติไปอย่างปริศนา ถึงขั้นมีคนทนไม่ไหวจนต้องฆ่าตัวตาย","ไม่มีใครรู้เลยว่ามันคือพลังรูปแบบไหนกันแน่ ที่สามารถสร้างความเสียหายทางจิตใจอย่างรุนแรงให้กับบรรดาพ่อมดที่เชี่ยวชาญด้านธาตุเหล่านี้ได้...","“แม้ว่าวิญญาณธาตุจะเป็นอุปสรรคขัดขวางไม่ให้เราสำรวจระดับจุลภาค แต่ตอนนี้มันกลายเป็นปัญหาที่จำเป็นต้องได้รับการแก้ไขแล้ว!”","วิกตอริโอพูดขึ้นด้วยน้ำเสียงจริงจัง","“เวลาของเราเหลือน้อยเต็มที เราไม่สามารถหยุดพักได้แม้แต่วินาทีเดียว กองทัพปราบปรามของศาสนจักรอาจจะบุกกลับมาได้ทุกเมื่อ พวกเขารู้ที่ตั้งของดินแดนพ่อมดแล้ว ในครั้งนี้พวกเราไม่มีทางถอยอีกต่อไป!”","คำพูดของวิกตอริโอทำให้สมาชิกสภาทุกคนขมวดคิ้วแน่น เทพที่แข็งแกร่งจนแม้แต่ประธานสภาระดับตำนานยังไม่สามารถต่อกรได้นั้น เปรียบเสมือนดาบอันแหลมคมที่แขวนอยู่เหนือหัวของทุกคน และพร้อมที่จะตกลงมาได้ทุกเมื่อ...","“ทุกท่าน เรื่องนี้ไม่ได้เกี่ยวข้องกับการหาวิธีเอาชนะเทพองค์นั้นเพียงอย่างเดียว แต่ธาตุคือพื้นฐานของการร่ายเวทมนตร์ หากพวกเราสามารถผ่ามันออกได้ พวกเราก็จะสามารถไขความลับของเวทมนตร์ได้อย่างสมบูรณ์!”","แฮร์รอฟลุกขึ้นยืน แล้วกวาดสายตามองทุกคนที่อยู่รอบๆ","“ตอนนี้สัจธรรมแห่งเวทมนตร์ และความจริงของโลกได้มาอยู่ตรงหน้าพวกเราแล้ว มันถูกกักขังอยู่ภายในธาตุเล็กๆ เหล่านั้น เพื่อรอให้พวกเราค้นหาและขุดคุ้ยมันออกมา!”","“ใครก็ตามที่สามารถเติมเต็มตารางจัดอันดับธาตุให้สมบูรณ์ได้ จะได้รับเหรียญตราจันทร์สีเงินเป็นรางวัล และผู้ที่สามารถผ่าอะตอม รวมถึงสร้างแบบจำลองอะตอมขึ้นมาได้...ข้าจะเสนอชื่อเขาให้ได้รับเหรียญตราโคโรนา!”"]},{"n":395,"t":"วิธีทำลายอะตอมและหินปีศาจ!","c":["คำพูดของแฮร์รอฟสามารถจุดประกายความกระตือรือร้นของเหล่าพ่อมดขึ้นมาได้ในพริบตา","นี่คือเหรียญตราโคโรนา ซึ่งเป็นเกียรติยศสูงสุดแห่งโลกเวทมนตร์ ใครก็ตามที่ได้รับมันไป ย่อมมีชื่อจารึกไว้ในหน้าประวัติศาสตร์ และกลายเป็นดาวรุ่งแห่งเวทมนตร์คนที่สองที่ได้รับความสนใจจากผู้คนนับหมื่นอย่างแน่นอน และตอนนี้โอกาสนั้นก็มาอยู่ตรงหน้าพวกเขาทุกคนแล้ว!","ราฟาเอลและบรรดาจอมเวทผู้ยิ่งใหญ่คนอื่นๆ ต่างก็เริ่มขบคิดหาวิธีที่จะผ่าและทำลายอะตอม","ส่วนพ่อมดเต็มตัวเหล่านั้นที่ไม่ได้คาดหวังสูงถึงขั้นจะได้เหรียญตราโคโรนา พวกเขาจึงพุ่งเป้าไปที่ตารางจัดอันดับธาตุอย่างรวดเร็ว","ต้องรู้ก่อนนะว่า ธาตุพื้นฐานนั้นมีมากถึงสี่สิบเก้าชนิด ขอเพียงแค่วิจัยหาข้อมูลของธาตุได้สักสองถึงสามชนิด อย่างน้อยก็ต้องได้รับการเสนอชื่อเข้าชิงเหรียญตราจันทร์สีเงินเป็นแน่!","หลังจากหารือกันประมาณสิบนาที คนแรกที่เอ่ยปากก็คือ ‘อเดลา’ ผู้คิดค้นทฤษฎี ‘ธาตุไฟ’ ขึ้นมา!","แม้ว่าก่อนหน้านี้ ‘เพลิงอมตะ’ ที่ลินน์นำออกมาแสดง จะเป็นการตบหน้านางอย่างจัง และทำให้ ‘กฎแห่งเปลวเพลิงสามประการ’ ของนางกลายเป็นทฤษฎีที่มีแต่ช่องโหว่ แต่อเดลาก็ไม่ได้ท้อแท้จนหมดอาลัยตายอยาก ในทางกลับกัน นางกลับซึมซับทฤษฎีบางส่วนที่เกี่ยวกับการเผาไหม้ของลินน์ แล้วนำมาต่อยอดเป็นทฤษฎี “องค์ประกอบสามประการของเปลวเพลิง”","ที่มีความรัดกุมมากยิ่งขึ้น!","และแนวคิดของนางในครั้งนี้ก็เรียบง่ายมาก นั่นก็คือการใช้อุณหภูมิสูงเพื่อทำลายอะตอม!","ในระหว่างที่วิจัยเวทมนตร์ธาตุไฟ อเดลาพบว่าอุณหภูมิที่สูงลิ่วสามารถย่อยสลายสสารต่างๆ ให้กลับคืนสู่รูปแบบของอะตอมพื้นฐานได้ แม้แต่เหล็กกล้าที่ต้องเผชิญกับอุณหภูมิหลายพันองศา โครงสร้างของมันก็จะถูกทำลายลง ดังนั้น หากเพิ่มอุณหภูมิให้สูงขึ้นไปอีก ไม่แน่ว่ามันอาจจะสามารถย่อยสลายอะตอมได้เช่นกัน!","“พวกเราสามารถใช้พลังเวทกักขังธาตุจำนวนมากเอาไว้ในพื้นที่ปิดตายแห่งหนึ่ง จากนั้นก็ค่อยๆ เพิ่มอุณหภูมิให้สูงขึ้นเรื่อยๆ หนึ่งหมื่นองศาไม่ได้ก็ห้าหมื่นองศา ห้าหมื่นองศาไม่ได้ก็หนึ่งแสนองศา หรือแม้กระทั่งสองแสน หรือสามแสนองศาไปเลย!”","เมื่อพูดถึงจุดที่น่าตื่นเต้น อเดลาก็กำหมัดแน่น แล้วทุบลงบนโต๊ะอย่างแรง","“ต่อให้ธาตุจะแข็งแกร่งแค่ไหน แต่มันก็ต้องมีขีดจำกัด สิ่งที่พวกเราต้องทำก็คือการค้นหาขีดจำกัดนั้น แล้วทำลายมันซะ!”","“เป็นความคิดที่ไม่เลวเลย!”","ราฟาเอลและคนอื่นๆ ต่างก็ดวงตาเป็นประกาย จนถึงตอนนี้ก็ยังไม่มีใครค้นพบขีดจำกัดสูงสุดของอุณหภูมิเลย ดังนั้น ข้อเสนอของอเดลาจึงมีความเป็นไปได้สูงมาก","ข้อดีของวิธีนี้ก็คือ พวกเขาสามารถรวบรวมพลังของทุกคนได้ และการผนึกกำลังของจอมเวทผู้ยิ่งใหญ่หลายคน ย่อมสามารถเพิ่มอุณหภูมิให้สูงลิ่วจนถึงระดับที่เหลือเชื่อได้อย่างแน่นอน","“ข้าว่าพวกเราน่าจะลองใช้สายฟ้าดูนะ!”","แอนโธนี่ที่อยู่ด้านข้างเสนอแนะ","ธาตุสายฟ้ามีขนาดเล็กกว่าธาตุพื้นฐานมาก การใช้สายฟ้าเพื่อทำลายธาตุพื้นฐานน่าจะเป็นทางเลือกที่ดีทีเดียว!","ด้วยการระดมสมองของทุกคน ไอเดียแปลกประหลาดมากมายก็ถูกนำเสนอออกมาอย่างรวดเร็ว อย่างเช่น การกดทับสสารที่แข็งแกร่งมากๆ เพื่อบดขยี้อะตอมให้แตกละเอียด หรือการใช้เวทมนตร์เพื่อเร่งความเร็วให้อะตอมสองตัวพุ่งชนกัน หรือแม้กระทั่งการใช้เวทมิติเพื่อตัดผ่ามัน...","“ท่านลินน์ ท่านมีความเห็นว่าอย่างไรบ้าง?”","ในขณะที่การหารือกำลังเป็นไปอย่างดุเดือด ซานเชซก็หันไปมองลินน์ที่ยังคงเงียบอยู่ แล้วเอ่ยถามขึ้นมา","ดาวรุ่งแห่งเวทมนตร์ผู้มีชื่อเสียงโด่งดังท่านนี้ ขึ้นชื่อเรื่องการมีไอเดียบรรเจิดอยู่แล้ว ไม่ว่าจะเป็นการวัดความเร็วแสง หรือการทดลองหาค่าคงที่แรงโน้มถ่วงก่อนหน้านี้ ต่างก็ทำให้พวกเขาต้องทึ่งจนต้องตบเข่าฉาด!","การที่อีกฝ่ายเอาแต่เงียบแบบนี้ ทำให้ซานเชซรู้สึกประหลาดใจเป็นอย่างมาก","เมื่อได้ยินเช่นนั้น ทุกคนที่อยู่ที่นั่นต่างก็หันมามองลินน์เป็นตาเดียว","ท่ามกลางสายตาทุกคู่ที่จับจ้องมา ลินน์ก็ลูบคางครุ่นคิดอยู่ครู่หนึ่ง ก่อนจะเอ่ยขึ้นว่า","“ข้าคิดว่าข้อเสนอของทุกคนล้วนมีความเป็นไปได้ ส่วนวิธีที่จะผ่าอะตอมนั้น ยังต้องอาศัยการทดลองเพื่อพิสูจน์ให้แน่ชัดเสียก่อน”","“แต่มีสิ่งหนึ่งที่สำคัญไม่แพ้กับการวิเคราะห์โครงสร้างของธาตุ นั่นก็คือการค้นหาธาตุชนิดใหม่ๆ !”","ลินน์ไม่มีทางเชื่อหรอกว่าโลกใบนี้จะมีอะตอมอยู่เพียงแค่นั้น ที่ผ่านมาบรรดาพ่อมดเชื่อว่ามีธาตุพื้นฐานเพียงสี่สิบเก้าชนิด เป็นเพราะดินแดนพ่อมดนั้นเล็กเกินไป แต่ตอนนี้พวกเขามาอยู่ที่อาณาจักรแล้ว ไม่แน่ว่าอาจจะสามารถค้นพบธาตุชนิดใหม่ๆ ได้มากขึ้น!","...","ภายใต้แรงผลักดันสามประการ ทั้งภัยคุกคามจากศาสนจักร การไขความลับของเวทมนตร์ และความปรารถนาในเกียรติยศอันไร้ที่สิ้นสุด พ่อมดทั้งหลายก็แสดงความกระตือรือร้นออกมาอย่างที่ไม่เคยเป็นมาก่อน ทันทีที่กลับไปถึง พวกเขาก็ไม่หลับไม่นอน และลงมือทำให้ไอเดียของตัวเองกลายเป็นความจริงทันที!","เริ่มต้นด้วยการวัดมวลของอะตอม แฮร์รอฟเป็นคนนำทีมพ่อมดที่เชี่ยวชาญด้านเวทมนตร์สนามพลังด้วยตัวเอง เพื่อสร้างพื้นที่สูญญากาศ จากนั้นก็อาศัยการรับรู้มิติ และนำสูตรมาใช้ในการคำนวณ","ส่วนวิกตอริโอถูกอเดลาเชิญตัวไป เพื่อเตรียมวงเวทแปรธาตุอันทรงพลังสำหรับสร้างอุณหภูมิสูงลิ่ว เพื่อนำมาย่อยสลายอะตอม","แอนโธนี่เองก็เรียกตัวพ่อมดในสังกัดมา เพื่อเตรียมเริ่มต้นจากการใช้เวทมนตร์สายสายฟ้า นอกจากนี้ เขายังให้ความสนใจเป็นอย่างมากว่าทำไมอะตอมถึงเกิดแรงผลักต่อกัน และมีระยะห่างขั้นต่ำได้อย่างไร","เรื่องนี้ทำให้เขานึกไปถึงปรากฏการณ์แรงผลักที่เกิดจากสนามแม่เหล็ก","ภายใต้กระแสความตื่นตัวในการวิจัยเช่นนี้ แทบทุกวันจะมีวิทยานิพนธ์ทางวิชาการแปลกใหม่ตีพิมพ์ลงในวารสารเวทมนตร์รายวัน แม้แต่ชาวเมืองในเมืองหลวงเองก็ยังพลอยตื่นเต้นดีใจไปด้วย","ไม่ใช่ว่าพวกเขาสามารถอ่านทฤษฎีเวทมนตร์แปลกใหม่เหล่านี้รู้เรื่องหรอกนะ แต่เป็นเพราะเมืองหลวงเพิ่งประกาศนโยบายใหม่ออกมาต่างหาก โดยพ่อมดทั้งหลายต้องการค้นหาธาตุชนิดใหม่ ดังนั้น หากใครพบเจอสิ่งของแปลกประหลาด ก็สามารถนำมามอบให้ทางการได้เลย!","หากสิ่งของชิ้นนั้นผ่านการคัดกรอง และถูกพวกพ่อมดรับเอาไว้ ผู้ที่นำมามอบจะได้รับรางวัลสูงสุดถึงห้าสิบเหรียญทองจักรวรรดิ!","รางวัลที่สูงลิ่วขนาดนี้มากพอที่จะทำให้ทุกคนคลุ้มคลั่งได้ ถึงขนาดที่ชาวเมืองในเมืองหลวงพากันรื้อค้นข้าวของในบ้านจนกระจุยกระจาย บางคนถึงกับเก็บก้อนหินริมทางมาเพื่อหวังจะฟลุ๊ค เผื่อจะโชคดีรอดพ้นสายตาของพวกพ่อมดไปได้ พวกเขาก็จะได้รับความมั่งคั่งที่แม้จะทำงานหาเงินทั้งชีวิตก็ไม่มีทางได้มา","เพียงแค่สองวัน โยลันด์ผู้รับหน้าที่ค้นหาธาตุชนิดใหม่ก็ได้รับเศษขยะกองโต ซึ่งมันทำให้เขาปวดหัวเป็นอย่างมาก จนต้องสั่งให้คนไปตั้งป้ายประกาศไว้ข้างนอกว่า ห้ามนำพวกหม้อ ไห กะละมัง ไม้กระดาน หรือม้านั่ง มาส่งอีก ส่วนพวกคนจนที่พยายามจะฉวยโอกาสเอาของปลอมมาหลอก ก็ถูกลงโทษอย่างหนัก!","ในขณะที่โยลันด์กำลังคิดว่า วันนี้ก็คงไม่มีอะไรคืบหน้าเหมือนเคย จู่ๆ ก็มี ‘ก้อนหิน’ ประหลาดก้อนหนึ่งถูกวางลงตรงหน้าเขา","มันเป็นวัตถุทรงกลมที่ไม่สมมาตร และจากความมันวาวของพื้นผิว มันดูเหมือนเป็นแร่โลหะบางชนิด","โยลันด์อุทานออกมาเบาๆ เขาเอื้อมมือไปหยิบมันขึ้นมาลองกะน้ำหนักดู และพบว่ามันหนักกว่าเหล็กที่มีขนาดเท่ากันมาก!","เมื่อตระหนักได้ถึงจุดนี้ สีหน้าของโยลันด์ก็เคร่งเครียดขึ้นมาทันที โดยพยายามใช้พลังเวทเพื่อสัมผัสและย่อยสลายมัน แต่กลับล้มเหลว","ทั้งไม่สามารถทำลาย และไม่สามารถควบคุมได้ หรือว่านี่จะเป็นธาตุโลหะชนิดหนึ่งจริงๆ งั้นหรือ?","“นี่มันคืออะไรกัน? เจ้าไปเจอมันที่ไหน?”","โยลันด์รีบหันไปมองชาวเมืองที่นำ ‘ก้อนหิน’ ก้อนนี้มาส่ง และเอ่ยถามด้วยความร้อนรน","นี่อาจจะเป็นธาตุชนิดใหม่ที่อยู่นอกเหนือความรู้ความเข้าใจของพวกเขาก็เป็นได้!","ชายวัยห้าสิบกว่าคนนั้น เป็นเพียงชาวเหมืองธรรมดา เขาก้มหน้าลงด้วยความหวาดกลัว ก่อนจะตอบกลับมาด้วยน้ำเสียงสั่นเครือ","“เรียนท่านพ่อมด นี่คือ...หินปีศาจขอรับ...ข้าได้ยินพวกท่านนักบวชเรียกมันว่าแบบนั้น!”"]},{"n":396,"t":"หินปีศาจและทฤษฎีอิเล็กตรอนของธาตุ!","c":["“หินปีศาจงั้นหรือ?”","เมื่อได้ยินชื่อเรียกนี้ โยลันด์ก็เกิดความสนใจขึ้นมาทันที และเอ่ยถามด้วยความอยากรู้อยากเห็น","“เจ้าพอจะรู้ไหมว่าทำไมมันถึงถูกเรียกแบบนี้?”","ชายเหมืองชราไม่กล้าปิดบัง และรีบอธิบายออกมาในทันที","แร่ประหลาดชนิดนี้ถูกขุดพบจากเหมืองแห่งหนึ่งในดินแดนของอาณาจักร ในตอนนั้น เจ้าของเหมืองได้กว้านซื้อเทือกเขาในละแวกนั้นมาหลายลูกเพื่อเตรียมขุดเหมืองทองแดง แต่กลับมาเจอแร่รูปร่างประหลาดที่ดูคล้ายกับคริสตัลในภูเขาลูกนี้","นอกจากนี้ เขายังค้นพบสัตว์เวทมนตร์ที่สามารถเรืองแสงได้ และพวกมันดูเหมือนจะกินแร่ชนิดนี้เป็นอาหาร สิ่งที่พวกมันขับถ่ายออกมานั้นเป็นสีเงินเป็นประกายแวววาว ดูคล้ายกับแร่เงินมาก แต่กลับมีน้ำหนักมากกว่าหลายเท่า","เจ้าของเหมืองตระหนักได้ทันทีว่า เหมืองแห่งนี้คือบ่อเกิดแห่งความมั่งคั่งของเขา เขาจึงระดมคนงานจำนวนมากมาทำการขุดเจาะทันที พร้อมกับว่าจ้างช่างแกะสลักยอดฝีมือ ให้นำแร่ที่ดูเหมือนคริสตัลตามธรรมชาตินั้น มาทำเป็นเครื่องประดับ","ส่วนโลหะปริศนาสีเงินนั่น เขาก็นำไปขายในราคาสูงลิ่ว ให้กับพวกขุนนางและพ่อค้าเศรษฐีที่สนใจ!","แต่ช่วงเวลาแห่งความสุขมักจะอยู่ได้ไม่นาน หลังจากทำงานไปได้ระยะหนึ่ง คนงานบางส่วนที่ทำงานในเหมืองก็ล้มป่วยด้วยโรคประหลาด โดยพวกเขามีอาการวิงเวียนศีรษะ อ่อนเพลีย หายใจลำบาก และที่ร้ายแรงที่สุดคือผิวหนังเริ่มหลุดลอกและเน่าเปื่อย","ในตอนแรกที่ได้รับรายงานจากยามเฝ้าเหมือง เจ้าของเหมืองก็ไม่ได้ใส่ใจอะไร เพราะคิดว่าพวกทาสเหมืองคงแค่อยากจะอู้งาน จนกระทั่งขุนนางบางคนที่ซื้อเครื่องประดับแร่ประหลาดนั้นไป เริ่มมีอาการคล้ายคลึงกัน จนนำไปสู่การสืบสวนของศาสนจักร เขาถึงได้ตระหนักถึงความร้ายแรงของปัญหา","แต่น่าเสียดายที่มันสายไปเสียแล้ว ไม่นานศาสนจักรก็สั่งปิดเหมืองแห่งนั้น หลังจากนั้นก็มีข่าวลือแพร่สะพัดไปทั่วเมืองหลวงว่า แร่ประหลาดเหล่านี้ถูกพ่อมดผู้ชั่วร้ายร่ายคำสาปอันรุนแรงใส่ และเจ้าของเหมืองก็ถูกกล่าวหาว่าสมรู้ร่วมคิดกับลัทธิบูชาเทพนอกรีต โดยใช้มนต์ดำเพื่อลอบสังหารขุนนางของอาณาจักร เขาจึงถูกจับมัดกับเสาและถูกเผาทั้งเป็น...","หลังจากฟังเรื่องเล่าของชายเหมืองจบ โยลันด์ก็ยิ่งรู้สึกสนใจแร่ตรงหน้ามากขึ้นไปอีก เขาสามารถดูออกได้อย่างง่ายดายว่า สิ่งนี้ไม่ได้มีปฏิกิริยาของพลังเวทแต่อย่างใด มันน่าจะเป็นสิ่งที่เกิดขึ้นตามธรรมชาติ","แต่ชื่อเรียก ‘หินปีศาจ’ ก็ทำให้โยลันด์ต้องระมัดระวังตัว เขาเปลี่ยนจากการใช้มือหยิบ เป็นการใช้ ‘หัตถ์เวท’ ประคองมันขึ้นมาแทน","“ท่านพ่อมด ท่านเห็นว่านี่มัน...”","ชายเหมืองชราเห็นโยลันด์สีหน้าเปลี่ยนไป ก็รู้สึกหวาดหวั่นใจเป็นอย่างมาก เขากลัวว่าการนำของอัปมงคลเช่นนี้มามอบให้ จะทำให้พ่อมดผู้นี้ไม่พอใจ","ถ้าไม่ใช่เพราะรางวัลมันล่อตาล่อใจมากเกินไป เขาคงไม่กล้าเสี่ยงเอาชีวิตมาทิ้งแบบนี้หรอก!","“เจ้าทำได้ดีมาก นี่คือเหรียญทองจักรวรรดิห้าสิบเหรียญ รับไปสิ!”","โยลันด์พูดด้วยรอยยิ้ม เพียงแค่เขาขยับความคิด เหรียญทองที่ส่องประกายระยิบระยับก็ลอยออกมากองรวมกันอยู่บนโต๊ะ","เพื่อเป็นการกระตุ้นให้ชาวเมืองในเมืองหลวงนำของดีๆ ออกมามอบให้ โยลันด์จึงมอบเงินรางวัลสูงสุดให้เขาไปเลย ซึ่งก็คือเหรียญทองจักรวรรดิห้าสิบเหรียญถ้วน!","“ขอบพระคุณขอรับ ท่านพ่อมด ความมีน้ำใจของท่านทำให้แม้แต่ดวงดาวก็ยังต้องหม่นหมอง...”","เมื่อเห็นกองเหรียญทองตรงหน้า ชายเหมืองชราก็คุกเข่าลงกับพื้นด้วยความตื่นเต้น และโขกศีรษะคำนับครั้งแล้วครั้งเล่า เพื่อแสดงความเคารพและความขอบคุณจากใจจริง จากนั้น เมื่อได้รับอนุญาตจากโยลันด์ เขาก็ใช้มือที่สั่นเทากอบโกยเหรียญทองทั้งหมดใส่กระเป๋าเสื้อ","บรรดาชาวเมืองที่กำลังต่อแถวอยู่ด้านหลัง เมื่อเห็นว่าชายเหมืองชราสามารถแลกหินปีศาจก้อนเดียว เป็นเหรียญทองได้ตั้งหลายสิบเหรียญ ต่างก็ตาร้อนผ่าวด้วยความอิจฉา และในขณะเดียวกันก็รู้สึกชื่นชมในความรักษาคำพูดของพวกพ่อมด","เงินก้อนใหญ่ขนาดนี้ นึกจะให้ก็ให้เลยงั้นหรือ!","ตลอดสองวันที่ผ่านมา มีคนกว่าร้อยคนนำของแปลกประหลาดสารพัดอย่างมามอบให้ แต่กลับถูกปฏิเสธไปเสียหมด จนพวกเขาเริ่มสงสัยแล้วว่า พ่อมดเหล่านี้กำลังตั้งใจปั่นหัวพวกเขาเล่นอยู่หรือเปล่า","แต่ตอนนี้ความจริงก็ได้พิสูจน์แล้วว่า เป็นเพราะพวกเขายังหาของที่ใช่ไม่เจอต่างหาก พ่อมดเหล่านี้ถึงขนาดยอมรับแม้กระทั่งหินปีศาจ!","“ยาโซส เจ้าคอยดูแลที่นี่ไปก่อนนะ ถ้ามีใครค้นพบธาตุชนิดใหม่อีก ก็ให้ส่งคนไปแจ้งข้าด้วยล่ะ!”","โยลันด์เอ่ยกำชับด้วยน้ำเสียงจริงจัง จากนั้นเขาก็รีบคว้า ‘หินปีศาจ’ และพุ่งตัวออกไปเพื่อรายงานเรื่องนี้ทันที","อันที่จริง หากเป็นไปได้ โยลันด์ก็อยากจะเก็บมันไว้ศึกษาวิจัยเป็นการส่วนตัวมากกว่า เพราะหากเขาสามารถวิจัยธาตุชนิดใหม่จนทะลุปรุโปร่งได้ การจะคว้าเหรียญตราจันทร์สีเงินมาครองก็คงง่ายราวกับพลิกฝ่ามือ!","แต่เมื่อนึกถึงข่าวลือเกี่ยวกับหินปีศาจก้อนนี้ โยลันด์ก็ล้มเลิกความคิดนั้นไป การรายงานเรื่องนี้ให้เบื้องบนทราบน่าจะเป็นทางออกที่ดีที่สุด","...","ในเวลาเดียวกัน ที่คฤหาสน์ในเมืองหลวง ลินน์กำลังกวาดสายตาอ่านวารสารเวทมนตร์รายวันฉบับของวันนี้ บนหน้าแรกมีพาดหัวข่าวที่สะดุดตาเขียนเอาไว้ว่า","[สายฟ้าคือคำตอบสุดท้ายของเวทมนตร์ทั้งหมด ว่าด้วยเรื่องโครงสร้างภายในของธาตุ!]","“ไม่เลวเลยนี่ ค้นพบแล้วงั้นหรือว่าภายในธาตุอาจจะมีอิเล็กตรอนซ่อนอยู่?”","ลินน์เอ่ยชมในใจ ผ่านไปแค่สองสามวันเท่านั้น ดูเหมือนว่าหลังจากหลุดพ้นจากกรอบความคิดที่ว่าอะตอมไม่สามารถแบ่งแยกได้ จินตนาการและความคิดสร้างสรรค์ของพ่อมดก็ถูกกระตุ้นออกมาอย่างรวดเร็ว","ผู้ที่ตีพิมพ์วิทยานิพนธ์ฉบับนี้ก็ไม่ใช่ใครอื่น แอนโธนี่นั่นเอง แม้การทดลองย่อยสลายอะตอมด้วยกระแสไฟฟ้าของเขาจะล้มเหลว แต่มันก็ทำให้เขาได้รับข้อมูลใหม่ๆ นอกเหนือจากความคาดหมายมากมาย ยกตัวอย่างเช่น เขาสามารถพิสูจน์ได้ว่า เมื่ออะตอมสองตัวเข้าใกล้กันมากๆ พวกมันจะเกิดแรงผลักกันจริงๆ และเขายังสามารถคำนวณระยะห่างที่เล็กที่สุดนี้ออกมาได้ด้วย","แรงผลักที่ว่านี้ คล้ายคลึงกับปรากฏการณ์ที่ขั้วแม่เหล็กขั้วเดียวกันผลักกันเป็นอย่างมาก แอนโธนี่จึงตั้งข้อสันนิษฐานสุดขั้วขึ้นมาว่า ภายในอะตอมนั้นมีกระแสไฟฟ้า!","นอกจากนี้ เขายังได้นำเสนอแบบจำลอง ‘ผลไม้สีม่วงแห่งธาตุ’ ขึ้นมาอีกด้วย","ผลไม้สีม่วง เป็นผลไม้ขึ้นชื่อของอาณาจักร ‘ฮัดลาตา’ ภายในของมันจะเต็มไปด้วยเมล็ดเล็กๆ คล้ายกับผลทับทิม","ตามทฤษฎีของแอนโธนี่ ประจุบวกและประจุลบก็เปรียบเสมือนเมล็ดที่อัดแน่นอยู่ภายในผลไม้สีม่วง ซึ่งก็คืออะตอม ธาตุส่วนใหญ่จะมีประจุบวกอยู่ด้านใน และมีประจุลบอยู่ด้านนอก เมื่อพวกมันเข้าใกล้กัน ก็จะเกิดแรงผลักกันเนื่องจากมีประจุเหมือนกันนั่นเอง","ในขณะที่โครงสร้างของธาตุบางชนิดจะตรงกันข้ามกันอย่างสิ้นเชิง คือมีประจุบวกอยู่ด้านนอก และมีประจุลบอยู่ด้านใน ดังนั้น เมื่อพวกมันมาเจอกัน จึงสามารถทำปฏิกิริยารวมตัวกัน และก่อให้เกิดแสงสว่าง ความร้อน หรือแม้กระทั่งเปลวเพลิง...","วิทยานิพนธ์ฉบับนี้เขียนอธิบายเอาไว้ยืดยาวหลายพันคำ และกินพื้นที่หน้ากระดาษไปจนหมด ลินน์อ่านมันด้วยความเพลิดเพลิน แม้ว่าบทสรุปของมันจะผิดพลาด แต่กระบวนการคิดและจินตนาการของคนเขียนก็ถือว่าน่าสนใจมากทีเดียว","และมันก็สามารถใช้อธิบายปรากฏการณ์บางอย่างได้ในระดับหนึ่งจริงๆ","ยกตัวอย่างเช่น แอนโธนี่เชื่อว่า สาเหตุที่ธาตุต้องเคลื่อนที่อยู่ตลอดเวลา เป็นเพราะพวกมันถูกดึงดูดเข้าหากันด้วยแรงโน้มถ่วงสากล และถูกผลักออกด้วยแรงผลักทางไฟฟ้า พวกมันจึงต้องตกอยู่ภายใต้การสลับไปมาของแรงทั้งสองนี้อยู่ตลอดเวลา","ในขณะที่ลินน์กำลังจะพลิกหน้ากระดาษ เพื่อหาดูว่ายังมีทฤษฎีแปลกใหม่อื่นๆ อีกหรือไม่ เขาก็เห็นเอล็อควิ่งหน้าตั้งเข้ามาจากนอกสวน","“มีอะไรหรือเปล่า? เกิดเรื่องอะไรขึ้นงั้นหรือ?”","เมื่อเห็นท่าทางร้อนรนของเอล็อค ลินน์ก็วางหนังสือพิมพ์ในมือลงทันที และเอ่ยถามด้วยสีหน้าเคร่งเครียด","“ท่านศาสตราจารย์ลินน์...ธาตุ...ธาตุชนิดใหม่ครับ!”","เอล็อคหอบหายใจอย่างหนัก ใบหน้าของเขาเต็มไปด้วยความตื่นเต้นดีใจ","“วันนี้โยลันด์ที่รับหน้าที่รวบรวมของแปลกประหลาด ค้นพบหินปีศาจก้อนหนึ่งครับ หลังจากการตรวจสอบ เราเชื่อว่ามันน่าจะเป็นธาตุชนิดใหม่ที่ไม่เคยถูกบันทึกไว้ที่ไหนมาก่อน!”"]},{"n":397,"t":"แร่ยูเรเนียมและพระคุณแห่งเทพ!","c":["“นี่คือตัวอย่างบางส่วนที่ทางสภาส่งมาให้ครับ!”","เอล็อคพูดพลางหยิบ ‘เศษหิน’ ขนาดเท่านิ้วหัวแม่มือออกมาจากอกเสื้อ","เพียงแวบแรกที่เห็น ลินน์ก็อดไม่ได้ที่จะลุกพรวดขึ้นจากเก้าอี้ เขายื่นมือออกไป ‘เศษหิน’ ก้อนนั้นก็ลอยขึ้นมาและลอยมาอยู่ตรงหน้าเขาทันที","‘นี่มัน...แร่ยูเรเนียมงั้นหรือ?’","สีหน้าของลินน์เต็มไปด้วยความประหลาดใจและยินดีเป็นอย่างยิ่ง เขาสามารถจดจำมันได้อย่างรวดเร็ว แต่ด้วยความไม่แน่ใจ เขาจึงสั่งให้ปัญญาประดิษฐ์สนับสนุนทำการตรวจสอบอีกครั้ง และผลลัพธ์ที่ได้ก็เป็นไปตามที่เขาคาดไว้","มันคือแร่ยูเรเนียมจริงๆ แถมยังเป็นชนิดที่ผ่านการสกัดมาแล้วด้วย แม้จะยังไม่ได้ตรวจสอบอย่างละเอียด แต่มั่นใจได้เลยว่าความเข้มข้นของยูเรเนียมจะต้องสูงมากอย่างแน่นอน!","ในขณะที่แร่ยูเรเนียมตามธรรมชาตินั้น น่าจะมีปริมาณยูเรเนียมอยู่เพียงไม่กี่ส่วนในพัน หรือไม่กี่ส่วนในหมื่นต่อแร่หนึ่งกรัมเท่านั้น...","“เจ้านี่ไปค้นพบมาจากไหน?”","ลินน์เอ่ยถามด้วยความอยากรู้อยากเห็น แร่ยูเรเนียมที่มีความเข้มข้นสูงขนาดนี้ ร้อยทั้งร้อยไม่มีทางเกิดขึ้นเองตามธรรมชาติแน่ๆ","“ได้ยินมาว่าพบในเหมืองที่อยู่ห่างจากเมืองหลวงไปประมาณสิบกว่ากิโลเมตรครับ ตอนนี้ทางสภาได้ส่งคนไปสำรวจแล้ว”","เอล็อคตอบด้วยความตื่นเต้น การค้นพบธาตุชนิดใหม่เพียงพอที่จะทำให้พ่อมดที่เชี่ยวชาญด้านธาตุทุกคนตื่นเต้นจนนอนไม่หลับ ดังนั้น สมาชิกสภาบางคนจึงออกเดินทางไปลงพื้นที่ตรวจสอบตั้งแต่เมื่อคืนแล้ว","“อ้อ คนที่นำแร่ชนิดนี้มาส่ง เรียกมันว่า หินปีศาจ ครับ...”","เอล็อคเล่าข้อมูลทั้งหมดเกี่ยวกับแร่ยูเรเนียมที่เขาไปสืบมาให้ลินน์ฟังจนหมดเปลือก","สำหรับชื่อเรียก ‘หินปีศาจ’ นั้น ลินน์ไม่ได้รู้สึกแปลกใจอะไรนัก","โดยทั่วไปแล้ว ยูเรเนียมเป็นธาตุกัมมันตรังสีที่มีครึ่งชีวิตค่อนข้างยาวนาน ประกอบกับปริมาณยูเรเนียมในแร่ธรรมชาตินั้นต่ำมาก มันจึงส่งผลกระทบต่อร่างกายมนุษย์ไม่มากนัก แต่หินปีศาจก้อนนี้ต่างออกไป มันมีความเข้มข้นของยูเรเนียมสูงลิบ หากใครหาเรื่องตายด้วยการพกมันติดตัวเป็นเวลานาน ย่อมต้องได้รับผลกระทบจากรังสีอย่างแน่นอน...","ส่วนเรื่องสัตว์เวทมนตร์ที่กินแร่ยูเรเนียมเป็นอาหารตามที่เอล็อคเล่ามานั้น ทำเอาลินน์ถึงกับคิ้วกระตุก นี่มันก็อตซิลลาหรือยังไงกัน?","แต่พิจารณาจากการที่พวกคนงานเหมืองไม่ได้ถูกฆ่าตายจนหมด ก็มีความเป็นไปได้ว่าสัตว์พวกนี้น่าจะไม่ใช่สัตว์กินเนื้อ...","ต้องยอมรับเลยว่า สัตว์ในโลกเวทมนตร์นี้มันช่างดุร้ายและทนทานเหลือเกิน...","ขนของสิงโตเพลิงสามารถทนต่ออุณหภูมิสูงลิ่วและนำมาทำเป็นไส้หลอดไฟได้ ส่วนโครงกระดูกของกริฟฟอนก็ทั้งเบาและเหนียวทนทาน เหมาะจะเป็นวัสดุชั้นยอด!","“ไปตามพวกธีโอดอร์มา เราจะไปที่ห้องทดลองกัน!”","ลินน์โยนหนังสือพิมพ์ในมือทิ้ง เขาจำเป็นต้องทำการตรวจสอบ ‘หินปีศาจ’ ก้อนนี้อย่างละเอียด!","หากมันเป็นอย่างที่เขาคาดหวังไว้ ความหวังที่จะสร้างเวทมนตร์ระเบิดนิวเคลียร์ก็อยู่ไม่ไกลแล้ว!","...","ในขณะที่เหล่าพ่อมดในเมืองหลวงกำลังโห่ร้องยินดีกับการค้นพบธาตุชนิดใหม่","ณ เมืองท่าของนครศักดิ์สิทธิ์แห่งจักรวรรดิเซคัส ซึ่งได้รับการขนานนามว่าเป็น ‘สรวงสวรรค์บนดิน’ และ ‘ดินแดนแห่งดวงดาวจรัสแสง’ กองเรือสำรวจของจักรวรรดิที่รอนแรมอยู่กลางทะเลมานานกว่าหนึ่งเดือน ก็ได้เดินทางมาเทียบท่าในที่สุด","กองเรือที่เคยมีมากกว่าสามร้อยลำ ตอนนี้เหลือรอดกลับมาไม่ถึงครึ่ง โดยเรือรบกว่าสิบลำที่อยู่แนวหน้าก็ล้วนได้รับความเสียหายอย่างหนัก แม้แต่เรือธงก็ยังมีรอยแตกยาวเป็นทาง และสามารถประคองตัวกลับมาได้ด้วยการใช้พลังศักดิ์สิทธิ์เข้าช่วยเท่านั้น","สภาพอันน่าเวทนาของกองเรือทำให้เหล่าทหารยามที่ประจำการอยู่ที่ท่าเรือตกตะลึง แต่พวกเขาก็ยังคงเชื่อมั่นอย่างสุดหัวใจว่า สาวกของเทพนอกรีตและสมุนของปีศาจเหล่านั้น จะต้องถูกส่งลงนรกไปหมดแล้วอย่างแน่นอน เพราะภายใต้สายพระเนตรของเทพเจ้า พวกเขาคือผู้ที่ไม่มีวันพ่ายแพ้!","แต่ ‘ยาคอป’ บิชอปที่มารอรับการกลับมาของกองเรือ กลับไม่ได้มองโลกในแง่ดีเช่นนั้น เพราะเมื่อสิบกว่าวันก่อน พวกเขาได้รับรายงานลับมาว่า...","เอ็ดเวลที่นำกองกำลังชั้นยอดจำนวนมากเดินทางไปยังอาณาจักรเพื่อปราบปรามการกบฏนั้น ได้เสียชีวิตลงแล้ว ซ้ำร้ายกองทัพปราบปรามเกือบทั้งหมดก็ถูกกวาดล้างจนสิ้นซาก โดยมีผู้ที่หนีรอดกลับมาได้ไม่ถึงหนึ่งในหมื่นด้วยซ้ำ","ข่าวนี้สร้างความสั่นสะเทือนไปทั่วทั้งระดับสูงของศาสนจักร แต่เนื่องจากมันเป็นข่าวที่น่าตระหนกจนเกินไป ตอนนี้มันจึงยังคงถูกปิดเป็นความลับ","โดยหลายคนก็ต่างตั้งความหวังไว้ที่กองเรือสำรวจ ว่าจะสามารถนำชัยชนะกลับมา และถล่มรังของพวกพ่อมดให้ราบคาบ เพื่อลบล้างความอัปยศก่อนหน้านี้!","แต่เมื่อเห็นบรรดานักบวชและบิชอปเดินลงมาจากดาดฟ้าเรือด้วยสีหน้าดำคล้ำ ยาคอปก็รู้ได้ทันทีว่า ข่าวที่กองเรือสำรวจนำกลับมาในครั้งนี้ คงไม่ใช่ข่าวดีอย่างแน่นอน","ความคิดมากมายแล่นผ่านหัวของยาคอป แต่เขาก็ยังคงรีบเดินเข้าไปต้อนรับ พร้อมกับนำมือทาบอก และโค้งคำนับด้วยความเคารพ","“ท่านประธานผู้พิพากษาศักดิ์สิทธิ์!”","“ข้าต้องการพบองค์พระสันตะปาปาและท่านลูเซีย เดี๋ยวนี้ ตอนนี้เลย!”","น้ำเสียงของประธานผู้พิพากษาศักดิ์สิทธิ์นั้นจริงจัง และแฝงไปด้วยความรู้สึกที่ไม่ยอมให้ใครปฏิเสธ","“แต่ว่า...ตอนนี้ท่านทั้งสองกำลังเป็นประธานในพิธีเฉลิมฉลองอยู่นะขอรับ”","ยาคอปตอบกลับอย่างลังเล","เมื่อได้ยินคำว่า ‘พิธีเฉลิมฉลอง’ ประธานผู้พิพากษาศักดิ์สิทธิ์ก็ชะงักไปครู่หนึ่ง ก่อนจะนึกขึ้นได้ว่า วันนี้คือวันเทศกาลเก็บเกี่ยว!","ตามที่บันทึกไว้ในพระคัมภีร์บทกำเนิดโลก วันที่เจ็ดของเดือนกันยายนในทุกๆ ปี คือวันที่เทพีแห่งดวงจันทร์ผู้ยิ่งใหญ่จะเสด็จลงมาจากสรวงสวรรค์สู่โลกมนุษย์ โดยพระองค์จะประทานพรให้กับผืนปฐพี ทำให้ผลไม้สุกงอมหวานฉ่ำ และทำให้ทุกคนได้สัมผัสกับความปีติยินดีแห่งการเก็บเกี่ยว...","“ถ้างั้นก็รอให้พิธีเฉลิมฉลองจบลงก่อนค่อยว่ากัน”","น้ำเสียงของประธานผู้พิพากษาศักดิ์สิทธิ์อ่อนลงทันที เพราะพิธีเฉลิมฉลองเทศกาลเก็บเกี่ยวในทุกๆ ปีนั้นมีความสำคัญเป็นอย่างยิ่ง และไม่สามารถขัดจังหวะได้โดยเด็ดขาด","เนื่องจากการปิดข่าวลือ ทำให้เงามืดจากการก่อกบฏของอาณาจักร ไม่ส่งผลกระทบต่อการจัดงานเทศกาลเก็บเกี่ยวแม้แต่น้อย","ผู้คนนับแสนคนหลั่งไหลมารวมตัวกันที่นครศักดิ์สิทธิ์อันกว้างใหญ่ และเฝ้ารออยู่เบื้องหน้า ‘หอคอยศักดิ์สิทธิ์’ อันสูงตระหง่าน!","ว่ากันว่าหอคอยขนาดยักษ์แห่งนี้ คือที่ประทับของเทพีแห่งดวงจันทร์เมื่อยามเสด็จลงมายังโลกมนุษย์ โดยมันใช้เวลาสร้างนานถึงห้าสิบปี และมีความสูงกว่าสามร้อยเมตร ยอดหอคอยที่ส่องประกายด้วยแสงศักดิ์สิทธิ์นั้น ดูราวกับจะทะลวงทะลุฟ้าดิน เปรียบเสมือนดาบยักษ์ที่ทวยเทพปักลงมาบนโลกมนุษย์...","ใครก็ตามที่ได้เห็นหอคอยศักดิ์สิทธิ์ ล้วนต้องตื่นตะลึงในความยิ่งใหญ่ตระการตาของมัน และมีผู้ศรัทธาจำนวนมากยอมเดินทางไกลจากทั่วทุกมุมของจักรวรรดิเพื่อมายังนครศักดิ์สิทธิ์ เพียงเพื่อจะได้มาสารภาพบาปและชำระล้างจิตใจให้บริสุทธิ์ต่อหน้าหอคอยด้วยความเคารพศรัทธา...","ท่ามกลางเสียงสวดมนต์อันไพเราะที่ดังก้องกังวานไปทั่วท้องฟ้า ร่างอันศักดิ์สิทธิ์ร่างหนึ่งก็เดินออกมาจากหอคอย นางมีอายุราวๆ ยี่สิบสามถึงยี่สิบสี่ปี สวมชุดคลุมศักดิ์สิทธิ์สีขาวบริสุทธิ์ ผ้าคลุมไหล่ปลิวไสวไปตามสายลม ดวงตาสีเขียวมรกตเปล่งประกายระยิบระยับราวกับดวงดาว","“ท่านลูเซียนี่นา!”","บรรดาผู้ศรัทธาที่รวมตัวกันอยู่สองข้างทางของหอคอย ต่างก็มีสีหน้าที่เต็มไปด้วยความคลั่งไคล้","สตรีศักดิ์สิทธิ์แห่งศาสนจักร คือบุคคลที่อยู่ใกล้ชิดกับเทพเจ้ามากที่สุดในนครศักดิ์สิทธิ์แห่งนี้ โดยพวกนางจะถูกคัดเลือกมาอย่างพิถีพิถันจากแม่ชีทั่วทั้งจักรวรรดิ และจะมีการผลัดเปลี่ยนหมุนเวียนกันทุกๆ ห้าถึงสิบปี และเมื่อพวกนางทำภารกิจของตนเสร็จสิ้น พวกนางก็จะได้เดินทางไปยังสรวงสวรรค์เพื่อรับใช้ทวยเทพ...","สตรีศักดิ์สิทธิ์ลูเซียก้าวขึ้นไปบนแท่นบูชาท่ามกลางสายตานับหมื่นคู่ นางเปล่งเสียงสวดมนต์บทกวีแห่งเทศกาลเก็บเกี่ยว แสงศักดิ์สิทธิ์ดั่งดวงดาวก็โปรยปรายลงมาจากท้องฟ้าอย่างต่อเนื่อง","เมื่อได้สัมผัสกับแสงศักดิ์สิทธิ์ บรรดาผู้ศรัทธาที่ป่วยด้วยโรคเรื้อรังและเดินทางมาแสวงบุญที่นครศักดิ์สิทธิ์ ต่างก็รู้สึกได้ทันทีว่าร่างกายของตนเบาสบายขึ้น และมีความรู้สึกสดชื่นอย่างบอกไม่ถูก ผู้ศรัทธาที่เคร่งศาสนาคนหนึ่งถึงกับพบว่านิ้วที่ขาดหายไปของตนงอกกลับมาใหม่ เขาจึงรีบคุกเข่าลงกราบไหว้ด้วยความตื่นเต้นดีใจ","นี่คือพระคุณแห่งเทพ และความโปรดปรานจากองค์พระผู้เป็นเจ้า!"]},{"n":398,"t":"สตรีศักดิ์สิทธิ์ลูเซียผู้ลบหลู่ทวยเทพ!","c":["“ข้าแต่พระผู้เป็นเจ้าผู้ยิ่งใหญ่ ขอบพระคุณสำหรับพระคุณที่ทรงประทานลงมา ขอให้แสงสว่างแห่งพระองค์สาดส่องไปทั่วทุกมุมโลก...”","“ข้าพเจ้าจะปฏิบัติตามพระประสงค์ของพระองค์ จนกว่าชีวิตจะหาไม่...”","บรรดาผู้ศรัทธาที่รวมตัวกันอยู่ด้านนอกหอคอยศักดิ์สิทธิ์ต่างพากันคุกเข่าลงสวดภาวนาภายใต้แสงศักดิ์สิทธิ์ที่สาดส่องลงมา พวกเขาเชื่อว่าสายพระเนตรของเทพเจ้าได้จับจ้องมาที่นี่แล้ว หากพวกเขาสวดภาวนาด้วยความศรัทธาที่มากพอ พวกเขาย่อมได้รับความโปรดปรานจากพระองค์ และเมื่อตายไปก็จะได้ขึ้นสู่สรวงสวรรค์อันเป็นนิรันดร์","เสียงสวดมนต์อันไพเราะดังก้องกังวานยิ่งขึ้น อาณาเขตแห่งดินแดนศักดิ์สิทธิ์ได้แผ่ขยายออกไปโดยมีหอคอยศักดิ์สิทธิ์เป็นศูนย์กลาง และไม่นานมันก็ครอบคลุมไปทั่วทั้งนครศักดิ์สิทธิ์","บนพื้นดินทั้งสองข้างทาง ใบหญ้าสีเขียวมรกตเริ่มแทงยอดอ่อนโผล่พ้นดิน เถาวัลย์เลื้อยพันออกมาจากรอยแยกของแผ่นหิน ก่อนจะเลื้อยไปตามบ้านเรือนและรูปปั้นแกะสลักอันงดงาม","เวลาดูเหมือนจะถูกเร่งให้เดินเร็วขึ้น ภายใต้สายตาของคนนับแสน ต้นไม้ผลนับหมื่นต้นงอกเงยขึ้นมาทั่วทุกมุมของนครศักดิ์สิทธิ์ จากต้นอ่อนเล็กๆ ค่อยๆ เติบโตจนกลายเป็นต้นไม้ใหญ่สูงตระหง่านหลายสิบเมตร ลำต้นตั้งตรงและอวบหนา เรือนยอดที่หนาทึบแผ่กิ่งก้านสาขาบดบังท้องฟ้า ผลไม้สีเขียวมรกตที่ดูราวกับคริสตัลออกผลเต็มต้น กลิ่นหอมหวานของผลไม้อบอวลไปทั่วทั้งเมือง","ในเวลานี้ หอคอยศักดิ์สิทธิ์ที่สูงตระหง่านถูกพันธนาการด้วยเถาวัลย์จำนวนนับไม่ถ้วน ดูราวกับพระราชวังมรกตขนาดยักษ์ที่ตั้งตระหง่านอยู่ใจกลางนครศักดิ์สิทธิ์ ปาฏิหาริย์ที่เกิดขึ้นนี้ ทำให้ผู้ศรัทธาที่เพิ่งเคยเข้าร่วมงานเทศกาลเป็นครั้งแรกต่างก็รู้สึกตื่นตะลึงไปตามๆ กัน","ลูเซียที่ยืนอยู่บนแท่นบูชาหยุดสวดภาวนา นัยน์ตาสีเขียวมรกตของนางสะท้อนภาพของโลกที่ดูลึกลับและแปลกประหลาดมากยิ่งขึ้น","เส้นด้ายสีทองที่มองไม่เห็นด้วยตาเปล่าปรากฏขึ้นในหัวของผู้ศรัทธาที่กำลังคุกเข่าอยู่เบื้องล่าง ปลายทางของเส้นด้ายเหล่านั้นเชื่อมต่อไปยังหอคอยศักดิ์สิทธิ์อันยิ่งใหญ่ที่ตั้งอยู่ด้านหลังของนาง...","หลังจากแสดงปาฏิหาริย์ จำนวนผู้ศรัทธาที่เคร่งศาสนาก็เพิ่มขึ้นประมาณสองหมื่นคน...","เมื่อยืนยันได้แล้ว ลูเซียก็ประกาศให้งานเฉลิมฉลองเทศกาลเก็บเกี่ยวประจำปีเริ่มต้นขึ้นอย่างเป็นทางการ ประชากรแห่งเทพทุกคนที่เดินทางมายังนครศักดิ์สิทธิ์สามารถลิ้มรสอาหารเลิศรสได้อย่างเต็มที่","ในช่วงเทศกาลเฉลิมฉลอง สถานที่แห่งนี้คือสรวงสวรรค์บนดิน ไม่มีการแบ่งแยกชนชั้นระหว่างขุนนางและสามัญชน ทุกคนมีเพียงสถานะเดียวนั่นคือ ‘ผู้ศรัทธาแห่งเทพเจ้า’","คนรับใช้นับหมื่นคนนำอาหารมากมาย ไม่ว่าจะเป็นมันฝรั่งอบ สเต็กเนื้อ สตูว์เนื้อ และอื่นๆ อีกมากมาย มาวางเรียงรายบนโต๊ะยาวตามท้องถนนในนครศักดิ์สิทธิ์ เพื่อให้คนนับแสนคนได้ลิ้มรส ซึ่งในบรรดาอาหารเหล่านั้นก็มีทั้งไวน์องุ่นเลิศรสและเนื้ออูฐชั้นดี ที่ปกติแล้วจะมีเพียงขุนนางเท่านั้นที่มีสิทธิ์รับประทาน...","ภายใต้การอนุญาตของสตรีศักดิ์สิทธิ์ลูเซียและการนำของเหล่าผู้รับใช้ ผู้ศรัทธาที่เดินทางไกลนับหมื่นลี้มายังนครศักดิ์สิทธิ์ ก็เริ่มเข้าร่วมงานเฉลิมฉลองในวันนี้ พวกเขาสามารถเด็ดผลไม้รสหวานฉ่ำจากต้น หรือเดินเล่นไปรอบๆ นครศักดิ์สิทธิ์ พร้อมกับหยิบอาหารขึ้นมารับประทานได้อย่างอิสระ","ไม่มีการเบียดเสียดหรือแย่งชิงกัน ต่อให้จะเป็นคนที่หิวโหยหรือตะกละตะกลามแค่ไหน เมื่ออยู่ภายใต้แสงศักดิ์สิทธิ์ พวกเขาก็จะกลายเป็นคนที่สุภาพและมีมารยาท","ยิ่งไปกว่านั้น อาหารยังมีให้กินอย่างไม่จำกัด และผลไม้บนต้นก็สามารถงอกขึ้นมาใหม่ได้ภายในสิบกว่าวินาทีหลังจากที่ถูกเด็ดไป","นันเดอร์เป็นเพียงชายยากจนธรรมดาๆ คนหนึ่งจากดินแดนนอร์ดแลนด์ แต่สิ่งที่ทำให้เขาแตกต่างจากคนอื่นๆ ก็คือ เขามีความศรัทธาต่อเทพเจ้าอย่างแรงกล้า เมื่อเขาได้รู้ว่านครศักดิ์สิทธิ์จะจัดงานเฉลิมฉลองเทศกาลเก็บเกี่ยวขึ้นทุกปี และในช่วงเวลานั้น แม้แต่คนยากจนหรือทาสที่ต่ำต้อยที่สุด ก็สามารถเข้าไปในนครศักดิ์สิทธิ์เพื่อชื่นชมความยิ่งใหญ่ของพระผู้เป็นเจ้าได้","เพื่อความฝันนี้ นันเดอร์ใช้เวลากว่าสิบปี นำเงินที่เก็บหอมรอมริบมาไถ่ตัวเองให้เป็นไท และอาศัยความมุ่งมั่น บุกป่าฝ่าดง ข้ามภูเขาและอุปสรรคมากมาย เดินเท้าเป็นระยะทางกว่าหมื่นลี้จากชายแดนจักรวรรดิมาจนถึงนครศักดิ์สิทธิ์!","ตลอดการเดินทาง นันเดอร์ถูกโจรดักปล้น และเกือบจะเอาชีวิตไม่รอดจากการถูกสัตว์เวทมนตร์อันดุร้ายทำร้าย เขาใช้เวลาเดินทางนานถึงหนึ่งปีเต็ม กว่าจะมาถึงตีนเขาของนครศักดิ์สิทธิ์","แม้ว่าการเดินทางในครั้งนี้จะยากลำบากแสนเข็ญ แต่เมื่อมาถึงวินาทีนี้ ทุกอย่างก็คุ้มค่าแล้ว หอคอยศักดิ์สิทธิ์ที่ตั้งตระหง่านอยู่ตรงหน้านั้นยิ่งใหญ่กว่าในความฝันของเขาเสียอีก แสงศักดิ์สิทธิ์ที่สตรีศักดิ์สิทธิ์ลูเซียอัญเชิญมา ได้รักษาบาดแผลที่เริ่มเน่าเปื่อยบนร่างกายของเขาจนหายสนิท","อาหารเลิศรสที่วางเรียงรายอยู่ตามท้องถนนของนครศักดิ์สิทธิ์ และต้นไม้ผลที่งอกขึ้นมากลางอากาศ ยิ่งทำให้ที่นี่ดูเหมือนสรวงสวรรค์ที่นันเดอร์เคยวาดฝันไว้","แม้ว่างานเฉลิมฉลองเช่นนี้จะมีขึ้นเพียงปีละครั้ง แต่ตราบใดที่พวกเขามีความศรัทธาที่มากพอ เมื่อตายไปพวกเขาก็จะได้ขึ้นสวรรค์ ถึงตอนนั้น ทุกๆ วันก็คือวันเฉลิมฉลอง ความทุกข์ยากที่เผชิญในชาตินี้จะกลายเป็นความโปรดปราน และมันก็คือรางวัลที่พวกเขาสมควรได้รับหลังจากผ่านบททดสอบจากเทพเจ้ามาแล้ว","ในขณะที่ความมุ่งมั่นแรงกล้ามากขึ้น ความศรัทธาก็ได้รับการยกระดับ จู่ๆ นันเดอร์ก็รู้สึกว่าตัวเองอยู่ใกล้ชิดกับเทพเจ้ามากขึ้นไปอีกขั้น โดยประตูสวรรค์ราวกับได้เปิดต้อนรับเขาแล้ว...","...","ในขณะเดียวกัน สตรีศักดิ์สิทธิ์ลูเซียที่เพิ่งเดินกลับเข้ามาในหอคอยศักดิ์สิทธิ์ก็หันขวับกลับไป สายตาของนางราวกับจะทะลุผ่านกำแพงหนาทึบไปยังสถานที่แห่งหนึ่งในนครศักดิ์สิทธิ์","“มีอะไรหรือขอรับ ท่านลูเซีย?”","คาร์ดินัลชุดแดงที่ยืนอยู่ข้างๆ เอ่ยถามด้วยความสงสัย","“มีคนได้รับนิมิตแห่งเทพ น่าเสียดายที่เขายังขาดอีกเพียงก้าวเดียว จึงไม่สามารถกลายเป็นนักบุญได้”","ลูเซียส่ายหน้า และพูดด้วยน้ำเสียงเสียดาย","“ไม่ทราบว่าเป็นบิชอปท่านใดหรือขอรับ?”","พระคาร์ดินัลชุดแดงพูดด้วยความอิจฉา เขาคิดว่าความศรัทธาที่เขามีต่อเทพเจ้านั้นไม่แพ้ใครเลย แต่เขากลับไม่เคยได้รับนิมิตแห่งเทพ และไม่เคยได้รับการประเมินให้เป็นนักบุญ เพื่อที่จะได้กลายเป็นคนระดับสูงที่แท้จริงของศาสนจักร","“ไม่ใช่หรอก น่าจะเป็นแค่คนยากจนคนหนึ่งเท่านั้น”","ลูเซียพูดพลางหยิบ ‘ผลมังกร’ ที่วางอยู่บนโต๊ะสำหรับบูชาเทพีแห่งดวงจันทร์ขึ้นมา กัดกินอย่างสบายใจ","การกระทำที่ลบหลู่ทวยเทพของลูเซีย ทำให้พระคาร์ดินัลชุดแดงถึงกับเส้นเลือดปูดโปนด้วยความโกรธ ในตอนนี้เขาไม่สนแล้วว่าคนยากจนผู้โชคดีคนนั้นคือใคร เขาเอ่ยปากตำหนิด้วยความโกรธเกรี้ยว","“ท่านลูเซีย! ผลมังกรอันล้ำค่าเหล่านี้คือของบูชาที่เตรียมไว้สำหรับองค์พระผู้เป็นเจ้า ห้ามมิให้ผู้ใดหยิบฉวยไปรับประทานเด็ดขาด หลังจากนี้ ข้าจะไปรายงานเรื่องพฤติกรรมอันไร้มารยาทของท่านให้องค์พระสันตะปาปาทราบ!”","แม้ว่าสตรีศักดิ์สิทธิ์จะมีตำแหน่งสูงส่งในศาสนจักร แต่พวกนางก็จะถูกผลัดเปลี่ยนหมุนเวียนทุกๆ สองสามปี ในสายตาของพระคาร์ดินัลชุดแดง พวกนางก็เป็นเพียงคนรับใช้ที่ศาสนจักรเลือกมาเพื่อปรนนิบัติพระผู้เป็นเจ้าเท่านั้น หากพวกนางทำหน้าที่ได้ไม่ดีพอ ก็สามารถถูกเปลี่ยนตัวได้ทุกเมื่อ","เพียงแค่การกระทำที่ดูหมิ่นเทพเจ้า ก็เพียงพอแล้วที่จะทำให้เธอกระเด็นออกจากตำแหน่ง!","ลูเซียเคี้ยวผลมังกรแสนหวาน และพูดด้วยน้ำเสียงอู้อี้ว่า","“นี่แหละคือเหตุผลที่เจ้าไม่เคยได้รับนิมิตแห่งเทพ ราเวน”","เมื่อเห็นว่าลูเซียยังไม่ยอมสำนึกผิด แถมยังพยายามลบหลู่นิมิตแห่งเทพอีก คาร์ดินัลราเวนก็โกรธจัด แต่ยังไม่ทันที่เขาจะได้ด่าทออะไรเพิ่มเติม ประตูของหอคอยศักดิ์สิทธิ์ก็ถูกเปิดออก","คนที่เดินเข้ามาก็คือองค์พระสันตะปาปาและประธานผู้พิพากษาศักดิ์สิทธิ์โจชัว...","“องค์พระสันตะปาปา ท่านโจชัว เมื่อครู่นี้ท่านลูเซียแอบขโมยของบูชาบนโต๊ะไปกิน แถมยังไม่มีท่าทีสำนึกผิดเลยแม้แต่น้อย...”","ราเวนรีบก้าวไปข้างหน้าและฟ้องร้องคนทั้งสอง","สตรีศักดิ์สิทธิ์ผู้นี้มีตำแหน่งสูงกว่าเขา นอกจากการด่าทอแล้ว เขาก็ไม่มีวิธีอื่นใดที่จะจัดการกับนางได้ มีเพียงองค์พระสันตะปาปาเท่านั้นที่มีอำนาจลงโทษนาง","“ข้าจะจัดการเรื่องนี้เอง เจ้าออกไปก่อนเถอะ!”","องค์พระสันตะปาปาพยักหน้ารับ จากนั้นก็โบกมือไล่ราเวนที่กำลังจะอ้าปากพูดต่อให้ออกไป","ลูเซียมองดูพระคาร์ดินัลชุดแดงเดินจากไปด้วยความโกรธเกรี้ยว ก่อนจะพูดด้วยน้ำเสียงเสียดายว่า","“เขาเป็นคนที่ศรัทธาในเทพเจ้ามากนะ น่าเสียดายที่เขาพลิกแพลงไม่เก่ง แถมยังหัวทึบอีกต่างหาก เขาเลยไม่ผ่านเกณฑ์น่ะ”"]},{"n":399,"t":"ช่างเถอะ ข้าจะลงมือจัดการศัตรูของศาสนจักรด้วยตัวเอง!","c":["“ข้าทำให้ท่านผิดหวังเสียแล้ว ท่านลูเซีย...ข้าจะไปคัดเลือกคนใหม่มาทดแทน”","องค์พระสันตะปาปาส่ายหน้าและถอนหายใจ การหาคนมาสืบทอดตำแหน่งนี้ไม่ใช่เรื่องง่ายเลย แม้ความศรัทธาและพรสวรรค์คือกุญแจสำคัญ แต่มันก็ไม่ใช่ทั้งหมด","ในรอบสิบปีที่ผ่านมา คนเดียวที่ผ่านเกณฑ์ก็มีแค่เอ็ดเวลเท่านั้น","ช่างน่าเสียดายจริงๆ...","ในขณะที่องค์พระสันตะปาปากำลังจมอยู่ในห้วงความคิด ประธานผู้พิพากษาศักดิ์สิทธิ์โจชัวที่ยืนอยู่ข้างๆ ก็เดินเข้าไปหาสตรีศักดิ์สิทธิ์แห่งศาสนจักร พร้อมกับโค้งคำนับด้วยความเคารพ","“ท่านลูเซีย!”","สตรีศักดิ์สิทธิ์ลูเซียวางผลมังกรที่กัดไปแล้วสองสามคำกลับลงไปบนโต๊ะบูชา นางบ่นพึมพำเบาๆ ว่าคราวหน้าให้เปลี่ยนของบูชาเป็นอย่างอื่น จากนั้นก็หันไปมองโจชัวแล้วพูดด้วยน้ำเสียงราบเรียบว่า","“ดูเหมือนว่าแม้แต่เจ้าก็ล้มเหลวสินะ”","โจชัวทำราวกับว่าเขามองไม่เห็นการกระทำอันจาบจ้วงของสตรีศักดิ์สิทธิ์ผู้นี้ที่นำผลไม้ที่กินเหลือไปวางคืนบนโต๊ะบูชา เขาคุกเข่าลงข้างหนึ่งแล้วรายงานผลของสงครามออกมาด้วยน้ำเสียงไร้อารมณ์ราวกับเครื่องจักร","“กองเรือของจักรวรรดิสูญเสียเรือรบไปทั้งหมดหนึ่งร้อยสี่สิบสามลำ และไม่ได้รับชัยชนะที่เป็นรูปธรรมใดๆ กลับมาเลย...”","เมื่อได้ยินรายงานของโจชัว นัยน์ตาสีเขียวมรกตคู่สวยของลูเซียก็หรี่ลง น้ำเสียงของนางกลายเป็นเย็นยะเยือก","“เล่ามาสิ ว่ามันเกิดอะไรขึ้นกันแน่...เท่าที่ข้ารู้มา พ่อมดที่เก่งกาจส่วนใหญ่ก็น่าจะเดินทางไปยังอาณาจักรฮัดลาตากันหมดแล้ว ตอนนี้การป้องกันของดินแดนพ่อมดก็น่าจะอ่อนแอที่สุดไม่ใช่หรือไง...”","กองเรือที่หนึ่งของจักรวรรดิมีเรือรบมากกว่าสามร้อยลำ ซึ่งทั้งหมดล้วนเป็นเรือใบแบบใหม่ล่าสุด และบนเรือก็เต็มไปด้วยกองกำลังชั้นยอดของจักรวรรดิกว่าแปดหมื่นนาย รวมถึงคณะนักบวชอีกเกือบพันคน การจะบดขยี้ดินแดนพ่อมดที่ไร้การป้องกัน ไม่ควรจะเป็นเรื่องยากเย็นอะไรเลยสักนิด!","แล้วไอ้คำว่า ‘ไม่ได้รับชัยชนะใดๆ กลับมาเลย’ มันหมายความว่ายังไง?","คนตายไปตั้งเยอะ กองเรือของจักรวรรดิก็พินาศไปกว่าครึ่ง อย่าบอกนะว่าศัตรูยังลอยนวลอยู่น่ะ?","ต่อให้เอาอูฐโง่ๆ สักตัวมาเป็นผู้บัญชาการ มันก็คงไม่ทำผลงานได้ย่ำแย่ขนาดนี้หรอก!","โจชัวเริ่มเล่าถึงเหตุการณ์ที่เกิดขึ้นในทะเล","“อันที่จริง พวกเรายังไปไม่ถึงดินแดนพ่อมดด้วยซ้ำ แต่กลับถูกสกัดกั้นไว้ที่ทะเลหมอกเสียก่อน พวกพ่อมดได้สร้างเรือรบเหล็กแบบใหม่ขึ้นมา คาดว่ามันน่าจะมีน้ำหนักอย่างน้อยหนึ่งพันตัน และความเร็วในการแล่นบนทะเลของมันก็เร็วกว่าเรือใบของเราถึงสามเท่า...”","“เดี๋ยวก่อน...เรือรบเหล็กหนักหลายพันตันลอยอยู่บนผิวน้ำได้งั้นหรือ? แถมยังแล่นได้เร็วอีก เจ้าแน่ใจนะว่าไม่ได้ตาฝาด มันอาจจะเป็นภาพลวงตาอะไรทำนองนั้นก็ได้?”","องค์พระสันตะปาปาขมวดคิ้วและขัดจังหวะโจชัว เขาอดสงสัยไม่ได้ว่าสิ่งที่อีกฝ่ายกำลังเล่าอยู่ เป็นเพียงเรื่องแต่งที่เหลวไหลสิ้นดี","เรือที่สร้างจากเหล็กจะไปลอยอยู่บนผิวน้ำได้อย่างไร แถมยังแล่นได้เร็วกว่าเรือใบหลายเท่า นี่มันผิดกฎเกณฑ์ธรรมชาติชัดๆ!","“ข้าแน่ใจ!”","โจชัวตอบอย่างหนักแน่น พร้อมกับเล่ารายละเอียดของการต่อสู้ตั้งแต่ต้นจนจบให้ฟัง","โดยเฉพาะกลยุทธ์การโจมตีระยะไกลอันแปลกประหลาดของศัตรู พวกเขาอาศัยความเร็วที่เหนือกว่าถึงสามเท่า รักษาระยะห่างจากกองเรือจักรวรรดิไว้ที่ประมาณหนึ่งกิโลเมตรเสมอ จากนั้นก็ใช้ปืนใหญ่ระดมยิงกดดันอย่างต่อเนื่อง โดยไม่เปิดโอกาสให้พวกโจชัวได้เข้าใกล้หรือหนีรอดไปได้เลย","นี่แหละคือเหตุผลที่กองเรือต้องสูญเสียอย่างหนัก แต่กลับไม่ได้อะไรติดมือมาเลย","“เจ้าพวกนี้มันหมาในเจ้าเล่ห์ชัดๆ!”","องค์พระสันตะปาปาพูดด้วยน้ำเสียงเย็นชา แต่เมื่อเขาลองสมมติว่าตัวเองไปอยู่ในสถานการณ์เดียวกับโจชัว เขาก็นึกหาวิธีแก้ทางดีๆ ไม่ออกเหมือนกัน","โจชัวเคยลองใช้พลังศักดิ์สิทธิ์ระดับตำนานโจมตีดูแล้ว แต่เรือพวกนั้นก็แล่นหนีไปอย่างรวดเร็ว ทำให้เขาโจมตีพลาดไปหมด และผ่านไปไม่ถึงครึ่งชั่วโมง เรือรบเหล็กพวกนั้นก็จะโผล่ออกมาจากม่านหมอกอีกครั้ง เพื่อระดมยิงปืนใหญ่ใส่พวกเขากลับ","การจะให้พระคาร์ดินัลบินตามไปก็ไม่ใช่ความคิดที่ดี เพราะพวกเขาก็บินได้ไม่เร็วเท่าเรือรบเหล็ก แถมยังต้องเปลืองพลังศักดิ์สิทธิ์ไปกับการรับมือปืนใหญ่ระลอกแล้วระลอกเล่าอีก","แน่นอนว่ากองเรือที่หนึ่งคงไม่ตกอยู่ในสภาพอนาถขนาดนี้ หากไม่มีทะเลหมอกมาเป็นอุปสรรค หากทะเลแห่งนี้ไม่ได้ถูกปกคลุมไปด้วยม่านหมอกหนาทึบ สถานการณ์ก็น่าจะดีกว่านี้มาก","“หลังจากนั้น ข้าก็ยอมสละเรือรบสามสิบลำเพื่อเป็นเหยื่อล่อ และวางกำลังปิดล้อมกองเรือของพวกพ่อมดเอาไว้ แต่กำลังเสริมของพวกมันมาเร็วเกินไป...”","โจชัวพูดด้วยความเสียดาย นั่นคือโอกาสเดียวที่เขาจะได้สร้างความเสียหายอย่างหนักให้กับกองเรือรบเหล็ก","แต่หลังจากชั่งน้ำหนักข้อดีข้อเสียแล้ว โจชัวก็ทำได้เพียงเลือกที่จะล่าถอย เพราะเขาเคยเห็นสิ่งประดิษฐ์เล่นแร่แปรธาตุที่ลอยอยู่บนฟ้าพวกนี้จากรายงานลับที่ส่งมาจากอาณาจักรฮัดลาตา พวกมันไม่ได้มีดีแค่บินสูงและบินเร็วเท่านั้น แต่มันยังสามารถปล่อย ‘ไฟนรก’ ลงมาถล่มภาคพื้นดินได้อีกด้วย หากเขายังดึงดันที่จะโจมตีต่อไป นอกจากตัวเขาและพระคาร์ดินัลอีกสองสามคนแล้ว คนอื่นๆ คงต้องเอาชีวิตไปทิ้งที่นั่นทั้งหมดแน่","ซึ่งนี่ถือเป็นการลงทุนที่ไม่คุ้มค่าเอาเสียเลย...","“ดูเหมือนว่าพวกเราจะประเมินพวกพ่อมดต่ำเกินไปสินะ”","ลูเซียแค่นเสียงขึ้นจมูกเบาๆ","ก่อนหน้านี้ ในสายตาของนาง พวกพ่อมดที่ซ่อนตัวอยู่บนเกาะโทรมๆ แห่งนั้น เป็นแค่พวกขี้เรื้อนหรือหนูที่ซ่อนตัวอยู่ในรู ไม่มีผลกระทบต่อภาพรวมใดๆ ตราบใดที่พวกมันกล้าโผล่หัวออกมา นางก็สามารถกำจัดพวกมันได้อย่างง่ายดาย","เพราะสำหรับศาสนจักร ศัตรูที่แท้จริงคือเทพนอกรีตและปีศาจต่างมิติที่อยู่หลังประตูมิติเท่านั้น...","ดังนั้น หลังจากที่รู้ว่าพวกพ่อมดเข้ายึดครองอาณาจักรฮัดลาตา จักรวรรดิจึงได้ส่งกองกำลังไปปราบปรามถึงสองทัพ โจมตีพร้อมกันจากสองทิศทาง เพื่อกวาดล้างภัยคุกคามนี้ให้สิ้นซากในรวดเดียว!","ใครจะไปคิดล่ะว่าพวกตนจะต้องมาพบกับความพ่ายแพ้ยับเยินเช่นนี้...","อาวุธแปลกใหม่เหล่านี้ ยิ่งทำให้ลูเซียรู้สึกสนใจเป็นอย่างมาก นางจำได้ว่าตอนที่คาซิโมมารายงานเมื่อปีก่อนๆ ไม่เห็นมีใครพูดถึงเรือรบเหล็กพวกนี้เลย ส่วนสิ่งประดิษฐ์เล่นแร่แปรธาตุที่เรียกว่าเรือเหาะนั่น ว่ากันว่ามีความเร็วแค่ยี่สิบถึงสามสิบกิโลเมตรต่อชั่วโมงเท่านั้นเอง","แต่ตอนนี้ความเร็วของมันกลับเพิ่มขึ้นเป็นห้าหกเท่าตัว","อาวุธรูปแบบใหม่ทั้งหมดนี้ เหมือนจะเพิ่งโผล่ออกมาในช่วงเวลาไม่นานมานี้เอง...","“ตอนนี้กองทัพทัณฑ์ศักดิ์สิทธิ์ส่วนใหญ่กำลังต่อสู้กับพวกปีศาจอยู่ในดินแดนต่างมิติ เราควรเรียกพวกเขากลับมาไหม?”","องค์พระสันตะปาปาเสนอความคิดเห็น เพราะภัยคุกคามจากพวกพ่อมดได้ลุกลามจนถึงจุดที่พวกเขาต้องรับมืออย่างเต็มกำลังแล้ว พวกเขาต้องรวบรวมกองกำลังทั้งหมดเพื่อกวาดล้างภัยคุกคามนี้ให้สิ้นซาก!","“ไม่ต้อง!”","ลูเซียส่ายหน้า","“พวกพ่อมดนั่นมีลูกไม้เยอะในการต่อสู้แบบกองทัพ อย่าได้เอาขุมกำลังชั้นยอดที่เราอุตส่าห์สะสมมา ไปทิ้งเปล่าเลย”","“ในสงครามปราบปรามดินแดนตะวันตกเมื่อสองปีก่อน พวกเราค้นพบชนเผ่ายักษ์ไม่ใช่หรือ? ในเมื่อพวกมันไม่มีพรสวรรค์ด้านเวทมนตร์ ก็เอาพวกมันมาเป็นแนวหน้าในสงครามครั้งนี้ก็แล้วกัน”","ลูเซียพูดอย่างครุ่นคิด","พวกยักษ์มีผิวหนังหนาและแข็งแกร่ง แถมยังมีพละกำลังมหาศาล หากพวกมันได้รับการเสริมด้วยพลังศักดิ์สิทธิ์และสวมเกราะเหล็กแบบพิเศษ ก็คงจะสามารถทนทานต่อการโจมตีจากปืนใหญ่ และทุบกล่องเหล็กที่วิ่งไปมาพวกนั้นให้แหลกเป็นชิ้นๆ ได้","ข้อเสียก็มีเพียงแค่ว่า พวกมันกินจุมาก ทำให้ต้องรับภาระเรื่องเสบียงค่อนข้างหนัก...","“คราวนี้ ข้าจะลงมือด้วยตัวเอง!”","ลูเซียปรับสีหน้าให้จริงจังและพูดอย่างหนักแน่น","“ท่านลูเซีย ถึงแม้พวกพ่อมดนั่นจะรับมือยาก แต่ก็ไม่ถึงกับต้องให้ท่าน...”","โจชัวพยายามเกลี้ยกล่อม การปล่อยให้สตรีศักดิ์สิทธิ์แห่งศาสนจักรออกรบ นับเป็นความไร้ความสามารถและบกพร่องต่อหน้าที่ของพวกเขาอย่างเห็นได้ชัด","“ช่างเถอะ ร่างกายนี้ก็มาถึงขีดจำกัดแล้ว ถือโอกาสใช้ประโยชน์จากของเหลือทิ้งให้คุ้มค่าเสียเลยก็แล้วกัน”","ลูเซียพูดอย่างไม่ใส่ใจ ในขณะที่นัยน์ตาสีเขียวมรกตราวกับดวงดาวของนาง ก็เปล่งประกายความเย็นชาออกมา ราวกับสัตว์ร้ายที่กำลังจ้องมองเหยื่อ"]},{"n":400,"t":"หรือว่าเวทมนตร์ระเบิดนิวเคลียร์ที่ไร้ขีดจำกัดของข้าจะเป็นได้แค่ความฝัน?","c":["เมื่อเห็นว่าสตรีศักดิ์สิทธิ์ลูเซียได้ตัดสินใจแล้ว โจชัวก็ไม่ได้เกลี้ยกล่อมอะไรต่อ ความกังวลเกี่ยวกับพวกพ่อมดในใจของเขาก็บรรเทาลงไปมาก","หากเป็นเช่นนี้ การยึดอาณาจักรฮัดลาตากลับคืนมาก็เป็นเพียงเรื่องของเวลาเท่านั้น!","“ได้ตัวผู้สืบทอดตำแหน่งสตรีศักดิ์สิทธิ์คนต่อไปหรือยัง?”","ลูเซียเอ่ยถามขึ้น","“นี่คือรายชื่อทั้งหมดขอรับ...”","องค์พระสันตะปาปาลูบไม้คทาในมือเบาๆ ภาพโฮโลแกรมของมนุษย์ห้าคนก็ปรากฏขึ้นภายในหอคอยศักดิ์สิทธิ์","พวกนางล้วนเป็นเด็กสาวอายุระหว่าง 16 ถึง 18 ปี ไม่ว่าจะเป็นหน้าตา ฐานะ หรือพรสวรรค์ล้วนไร้ที่ติ สี่คนในนั้นมีความศรัทธาอย่างเปี่ยมล้น และได้รับการฝึกฝนอย่างดีจากศาสนจักรในท้องถิ่น จนมีพลังจิตอยู่ในระดับบิชอปแล้ว","แต่อีกคนหนึ่งกลับทำให้ลูเซียรู้สึกแปลกใจเล็กน้อย เพราะนางไม่ใช่แม่ชี แต่เป็นสมาชิกของกองทัพทัณฑ์ศักดิ์สิทธิ์ ซึ่งตามหลักการแล้ว ไม่น่าจะมีคุณสมบัติเข้ารับการคัดเลือกด้วยซ้ำ","“นางคือบุตรสาวคนรองของไวเคานต์เปโดรแห่งเมืองท่า นามว่า ไอวีน่า เปโดร เมื่อสองปีก่อน นางผ่านการคัดเลือกเข้าเป็นสมาชิกของกองทัพทัณฑ์ศักดิ์สิทธิ์ แม้ว่าพรสวรรค์ด้านพลังจิตวิญญาณของนางจะด้อยกว่าคนอื่นไปบ้าง แต่นางกลับมีสัญชาตญาณในการต่อสู้ที่ยอดเยี่ยมเหนือคนทั่วไป ท่านแม่ทัพแห่งกองทัพทัณฑ์ศักดิ์สิทธิ์จึงเป็นผู้แนะนำนางมาให้ข้าด้วยตัวเองขอรับ”","องค์พระสันตะปาปาอธิบายด้วยความเคารพ","“เมืองท่า...เมืองที่เกือบจะถูกไฟนรกแผดเผาจนวอดวายนั่นน่ะหรือ?”","ลูเซียชะงักไปครู่หนึ่ง และพูดด้วยความประหลาดใจ","เรื่องนี้กลายเป็นเรื่องใหญ่โตและโด่งดังมากจนมาเข้าหูนาง ว่ากันว่ามีพ่อมดระดับสูงคนหนึ่งแฝงตัวอยู่ในจักรวรรดิมานานหลายปี และถ้าเอ็ดเวลไปไม่ทันเวลา ก็คงไม่สามารถขับไล่อีกฝ่ายออกไปได้สำเร็จ เพราะในช่วงหลายปีที่ผ่านมาภายใต้การปกครองของศาสนจักร นั้นไม่เคยเกิดโศกนาฏกรรมเช่นนี้มาก่อน!","“ถูกต้องแล้วขอรับ!”","องค์พระสันตะปาปาพยักหน้า ก่อนจะเล่าต่อว่า","“บุตรชายคนโตของตระกูลเปโดรถูกพวกพ่อมดสังหารในโศกนาฏกรรมครั้งนั้น การที่ไอวีน่าเข้าร่วมกับกองทัพทัณฑ์ศักดิ์สิทธิ์ก็น่าจะเกี่ยวข้องกับเรื่องนี้ด้วยขอรับ”","“แก้แค้นอีกแล้วงั้นหรือ?”","ลูเซียรู้สึกเบื่อหน่าย หลังจากฟังข้อมูลของไอวีน่าจบ นางก็ไม่ได้สนใจอะไรอีก","ต่อให้มีพรสวรรค์ในการต่อสู้ที่ยอดเยี่ยมแค่ไหน มันก็เป็นแค่ส่วนเสริมเท่านั้น เพราะพลังจิตวิญญาณต่างหากที่เป็นรากฐานของทุกสิ่ง!","ลูเซียสุ่มเลือกคนที่ดูถูกตาถูกใจมาหนึ่งคน จากนั้นก็โบกมือไล่พร้อมกับหาววอด","“พวกเจ้าออกไปได้แล้ว ข้าง่วงแล้ว อยากจะพักผ่อนสักหน่อย”","ทั้งสองคนพยักหน้ารับคำและเดินออกจากหอคอยศักดิ์สิทธิ์ไปอย่างรวดเร็ว","หลังจากที่ประธานผู้พิพากษาศักดิ์สิทธิ์โจชัวเดินออกมาจากหอคอย เขาก็อดไม่ได้ที่จะถอนหายใจและพูดขึ้นว่า","“น่าเสียดายจริงๆ ที่การล่มสลายของอาณาจักรฮัดลาตาดันมาเกิดขึ้นในเวลานี้พอดี”","ขอเวลาอีกแค่สามหรือห้าปีเท่านั้น เป้าหมายในการรวบรวมผู้ศรัทธาที่เคร่งศาสนาให้ครบหนึ่งล้านคนก็จะสำเร็จแล้วแท้ๆ","แต่พวกพ่อมดดันมาก่อกบฏที่อาณาจักรในเวลานี้ ทำให้ผู้ศรัทธานับหมื่นคนต้องตายไปเพราะสงครามและถูกกลั่นแกล้ง ทำให้แผนการของพวกเขาคงต้องถูกเลื่อนออกไปอีก...","“ไม่เป็นไรหรอก ในเมื่อท่านลูเซียยอมออกโรงจัดการกับศัตรูตัวฉกาจของศาสนจักรด้วยตัวเอง มันก็อาจจะไม่ใช่เรื่องแย่เสมอไป”","องค์พระสันตะปาปาพูดด้วยน้ำเสียงราบเรียบ","เมื่อชาวเมืองในอาณาจักรฮัดลาตาได้เห็นความยิ่งใหญ่ของเทพเจ้า พวกเขาก็ย่อมกลับสู่อ้อมกอดของพระผู้เป็นเจ้าเอง...","...","ณ ห้องทดลองอันมิดชิดในเมืองหลวงของอาณาจักรฮัดลาตา ธีโอดอร์ ฟิลิป และพ่อมดแห่งสถาบันอิเยตากว่าสามสิบชีวิต กำลังง่วนอยู่กับการวาดวงเวทเล่นแร่แปรธาตุขนาดใหญ่อยู่บนพื้นห้องใต้ดิน","ในขณะที่ทุกคนกำลังยุ่งอยู่กับการวาดวงเวทแม่เหล็กไฟฟ้า ลินน์เองก็ไม่ได้อยู่เฉยๆ หลังจากการตรวจสอบเบื้องต้น เขาพบว่าเปลือกนอกของหินปีศาจก้อนนี้ มียูเรเนียมผสมอยู่สูงถึงเก้าสิบห้าเปอร์เซ็นต์ขึ้นไป!","และแน่นอนว่า ไม่ใช่ยูเรเนียมทุกชนิดที่จะเหมาะนำมาทำเป็นอาวุธนิวเคลียร์","โดยแร่ยูเรเนียมตามธรรมชาตินั้น มีไอโซโทปอยู่สามชนิด ได้แก่ ยูเรเนียม-234, ยูเรเนียม-235 และยูเรเนียม-238","ในบรรดาไอโซโทปทั้งสามชนิด ยูเรเนียม-238 มีปริมาณมากที่สุด คิดเป็นเก้าสิบเก้าเปอร์เซ็นต์ขึ้นไป แต่น่าเสียดายที่มันไม่สามารถนำมาใช้เป็นเชื้อเพลิงนิวเคลียร์ได้ เพราะมันมีครึ่งชีวิตที่ยาวนานมากถึงหลายพันล้านปี การจะบังคับให้มันเกิดปฏิกิริยานิวเคลียร์ฟิชชันนั้นไม่ใช่เรื่องง่ายเลย","แต่ยูเรเนียม-235 นั้นต่างออกไป มันเป็นไอโซโทปชนิดเดียวในธรรมชาติที่สามารถเกิดฟิชชันได้ และมีกัมมันตภาพรังสีสูงกว่ายูเรเนียม-238 ถึง 6.5 เท่า มันจึงเป็นเชื้อเพลิงที่สำคัญที่สุดสำหรับอาวุธนิวเคลียร์!","แต่ปริมาณสำรองตามธรรมชาติของมันนั้นมีน้อยมาก เพราะในยูเรเนียมหนึ่งพันอะตอม จะมียูเรเนียม-235 เพียงเจ็ดอะตอมเท่านั้น!","ส่วนยูเรเนียม-234 ยิ่งมีน้อยกว่านั้นอีก คือมีเพียง 0.0054% เท่านั้น!","อันที่จริง หลักการทำงานของอาวุธนิวเคลียร์นั้นเรียบง่ายมาก นั่นคือการใช้รังสีนิวตรอนยิงเข้าไปชนกับอะตอมที่สามารถแยกตัวได้อย่างยูเรเนียม-235 เพื่อบังคับให้มันแตกตัวออกเป็นอะตอมขนาดเล็กสองอะตอม ในระหว่างกระบวนการฟิชชัน มันจะปล่อยรังสีนิวตรอนส่วนเกินออกมาหลายตัว ซึ่งรังสีนิวตรอนเหล่านั้นก็จะพุ่งไปชนกับยูเรเนียม-235 ตัวอื่นๆ ต่อไปเรื่อยๆ ก่อให้เกิดปฏิกิริยาลูกโซ่ และทำให้เชื้อเพลิงนิวเคลียร์ทั้งหมดเกิดฟิชชันในเวลาอันสั้น","กระบวนการแตกตัวของอะตอมจะทำให้เกิดการสูญเสียมวล และตามสมการมวล-พลังงาน มวลที่สูญเสียไปเหล่านั้นจะถูกเปลี่ยนเป็นพลังงานจำนวนมหาศาลและปลดปล่อยออกมา ซึ่งนี่ก็คือหลักการของระเบิดนิวเคลียร์นั่นเอง!","แม้ว่าหลักการจะฟังดูเรียบง่าย แต่การจะลงมือทำจริงๆ กลับไม่ง่ายอย่างนั้น","ในระหว่างที่ลินน์กำลังตรวจสอบปริมาณยูเรเนียม เขาก็พบกับปัญหาที่น่าหนักใจประการหนึ่ง นั่นคือเขาไม่สามารถใช้ ‘เวทแยกแยะวัสดุขั้นสูง’ ในการย่อยสลายธาตุอย่างยูเรเนียมได้!","การค้นพบนี้ทำให้ลินน์ประหลาดใจมาก หลังจากที่เขากลายเป็นจอมเวทผู้ยิ่งใหญ่ เขาก็สามารถใช้เวทมนตร์บทนี้เพื่อวิเคราะห์ธาตุทั้งสี่สิบเก้าชนิดที่ถูกค้นพบในดินแดนพ่อมดได้ทั้งหมด","ก่อนหน้านี้ลินน์เคยคิดว่า ด้วยพลังที่เขามีในตอนนี้ คงไม่มีอะตอมไหนที่สามารถรอดพ้นจากการแทรกซึมของพลังเวทเขาไปได้ แต่คิดไม่ถึงเลยว่าคราวนี้เขาจะได้มาเจอตอเข้าให้...","แต่ถ้าเทียบกับธาตุอื่นๆ ที่พวกพ่อมดเคยค้นพบก่อนหน้านี้ ยูเรเนียมมีความแตกต่างออกไปจริงๆ","ประการแรกคือ มันเป็นธาตุกัมมันตรังสี มีสัญลักษณ์ทางเคมีคือ U และมีเลขอะตอมเท่ากับ 92 ในตารางธาตุ มันจัดอยู่ในกลุ่มแอกทิไนด์ซึ่งเป็นกลุ่มพิเศษ และยังเป็นธาตุที่หนักที่สุดที่สามารถพบได้ในธรรมชาติในโลกก่อนของเขาอีกด้วย...","ลินน์ครุ่นคิดอยู่ครู่หนึ่ง ก่อนจะคาดเดาว่า อาจจะเป็นไปได้ที่ธาตุในกลุ่มแอกทิไนด์ทั้งหมด หรือก็คือธาตุกัมมันตรังสี 15 ชนิดที่มีเลขอะตอมตั้งแต่ 89 ถึง 103 ในหมู่ IIIB ของตารางธาตุ ล้วนไม่สามารถถูกวิเคราะห์ได้ด้วยพลังของจอมเวทผู้ยิ่งใหญ่","บางทีนี่อาจจะเป็นเหตุผลว่าทำไมพวกมันถึงยังไม่ถูกค้นพบสักที...","เมื่อคิดได้เช่นนี้ ลินน์ก็รู้สึกหมดหนทางไปบ้างเล็กน้อย นั่นหมายความว่าความฝันก่อนหน้านี้ของเขา ที่จะใช้พลังเวทจำลองยูเรเนียม-235 เพื่อปลดปล่อยเวทมนตร์ระเบิดนิวเคลียร์ได้อย่างไร้ขีดจำกัดนั้น ได้พังทลายลงแล้ว","ตอนนี้เขาทำได้เพียงพึ่งพาวิธีการทางวิทยาศาสตร์ เพื่อนำพลังของมันมาใช้เท่านั้น...","พวกเอล็อคที่วุ่นอยู่กับการทำงานมาตลอดทั้งคืน ในที่สุดก็วาดสัญลักษณ์แม่เหล็กไฟฟ้าตัวสุดท้ายลงบนพื้นเสร็จสิ้น หลังจากตรวจสอบจนแน่ใจว่าไม่มีข้อผิดพลาด ทุกคนในที่นั้นก็ถอนหายใจออกมาด้วยความโล่งอก","“ท่านศาสตราจารย์ครับ วงเวทแม่เหล็กไฟฟ้าที่ท่านต้องการ วาดเสร็จเรียบร้อยแล้วครับ”","เอล็อคเช็ดเหงื่อบนหน้าผาก และพูดด้วยความตื่นเต้น","“ดีมาก ถ้าอย่างนั้นก็เตรียมตัวเริ่มได้เลย!”","ลินน์เดินเข้าไปข้างหน้า เมื่อตรวจสอบจนแน่ใจว่าวงเวทไม่มีปัญหา เขาก็ใช้ ‘หัตถ์เวท’ ส่ง ‘หินปีศาจ’ ไปยังใจกลางวงเวท จากนั้นก็เปิดใช้งานวงเวทเล่นแร่แปรธาตุในทันที","วินาทีต่อมา อักขระเวทอันซับซ้อนที่ถูกสลักไว้บนพื้นก็สว่างวาบขึ้นมาทีละตัว พร้อมกับสายฟ้าสีขาวสว่างเจิดจ้าปรากฏขึ้นภายในวงเวท เสียงประกายไฟฟ้าช็อตฝุ่นละอองดังก้องไปทั่วห้องใต้ดิน โดยที่พลังแห่งสายฟ้าอันทรงพลังและบ้าคลั่งนั้นถูกกักขังเอาไว้ภายในวงเวทที่มีรัศมีประมาณสามเมตร ก่อนที่พวกมันจะพุ่งตรงไปรวมกันที่หินปีศาจซึ่งอยู่ตรงกลางอย่างรวดเร็ว..."]}];
let idx = 0;
function initIdx(){const h=parseInt(location.hash.replace('#',''));if(h>=1&&h<=CHAPTERS.length)idx=h-1;}
function render(){
  const ch=CHAPTERS[idx];
  const paras=ch.c.map(function(p){return '<p>'+escapeHtml(p)+'</p>';}).join('');
  const isLast=idx===CHAPTERS.length-1;
  const endNote='';
  document.getElementById('reader').innerHTML=
    '<h2 class="chap-title">บทที่ '+ch.n+' : '+escapeHtml(ch.t)+'</h2>'+
    '<div class="body">'+paras+'</div>'+
    '<div class="nav">'+
      '<button class="btn" onclick="go(-1)" '+(idx===0?'disabled':'')+'>← ตอนก่อนหน้า</button>'+
      '<button class="btn" onclick="go(1)" '+(isLast?'disabled':'')+'>ตอนถัดไป →</button>'+
    '</div>'+endNote;
  location.hash=idx+1;buildTOC();window.scrollTo(0,0);
}
function go(d){const n=idx+d;if(n>=0&&n<CHAPTERS.length){idx=n;render();}}
function buildTOC(){document.getElementById('toc').innerHTML=CHAPTERS.map(function(ch,i){return '<li class="'+(i===idx?'active':'')+'" onclick="jump('+i+')"><span class="n">'+ch.n+'</span>'+escapeHtml(ch.t)+'</li>';}).join('');}
function jump(i){idx=i;render();toggleTOC();}
function toggleTOC(){document.getElementById('overlay').classList.toggle('open');}
function toggleTheme(){const h=document.documentElement,d=h.getAttribute('data-theme')==='dark';h.setAttribute('data-theme',d?'light':'dark');document.getElementById('themeBtn').textContent=d?'🌙':'☀️';}
let fs=19;
function changeFont(d){fs=Math.min(30,Math.max(15,fs+d*2));document.documentElement.style.setProperty('--reader-size',fs+'px');}
function escapeHtml(s){return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>');}
initIdx();render();
['contextmenu','copy','cut','selectstart','dragstart'].forEach(function(ev){document.addEventListener(ev,function(e){e.preventDefault();return false;});});
document.addEventListener('keydown',function(e){var k=(e.key||'').toLowerCase();if((e.ctrlKey||e.metaKey)&&['c','x','a','s','u','p'].includes(k))e.preventDefault();if(k==='f12')e.preventDefault();});
</script></body></html>
