นอื่นๆ แต่เขากลับให้ความสนใจไปยังคนยากจนที่เดินผ่านไปมา ทุกคนล้วนแต่งกายด้วยเสื้อผ้าที่ดูดี เสื้อผ้าที่สวยงามเช่นนี้มักจะมีเพียงขุนนางเท่านั้นที่สามารถซื้อหามาสวมใส่ได้ แต่ตอนนี้มันกลับถูกสวมใส่โดยคนงานท่าเรือที่กำลังขนย้ายสินค้า...","“พวกเขาเต็มใจที่จะสวมเสื้อผ้าสวยงามเช่นนี้ในขณะที่กำลังขนย้ายสินค้าได้อย่างไร? แล้วถ้าหากมันขาดขึ้นมาล่ะ?”","แฮมม์เอ่ยด้วยความรู้สึกปวดใจเล็กน้อย","ธีโอดอร์ที่อยู่ด้านข้างตอบกลับด้วยน้ำเสียงขบขัน","“นี่ไม่ใช่เรื่องแปลกอะไรในอิเยตา ในทุกๆ วัน คนงานในโรงงานเวทมนตร์สามารถผลิตผ้าได้ยาวถึงหลายหมื่นเมตร และที่นี่ คุณสามารถซื้อเสื้อผ้าดีๆ ได้ในราคาเพียงห้าเหรียญทองแดงเท่านั้น”"]},{"n":313,"t":"คุณแน่ใจหรือว่าท่านศาสตราจารย์ไม่ใช่พ่อมดระดับตำนาน?","c":["“ผ้าหนึ่งหมื่นเมตรงั้นหรือ? เป็นไปได้ไหมว่ามันถูกสร้างขึ้นด้วยเวทมนตร์?”","แฮมม์ถามด้วยความไม่อยากจะเชื่อ","“มันเป็นสิ่งที่ท่านลินน์วิจัยขึ้นมา มีสิ่งหนึ่งที่เรียกว่าเครื่องทอผ้าและจักรเย็บผ้า มันไม่จำเป็นต้องพึ่งพาเวทมนตร์เลย แม้แต่คนธรรมดาก็สามารถควบคุมมันได้อย่างอิสระ หากมีวัตถุดิบเพียงพอ ผลผลิตก็สามารถเพิ่มขึ้นเป็นสองเท่าได้สบาย!”","น้ำเสียงของธีโอดอร์แฝงไปด้วยความรู้สึกเหนือกว่าอย่างชัดเจน และความเร็วในการพัฒนาของอิเยตานั้นก็รวดเร็วราวกับเปลี่ยนไปในทุกสัปดาห์!","ในขณะที่กำลังพูดคุยกัน รถแปรธาตุที่ถูกประดิษฐ์ขึ้นมาอย่างประณีตคันหนึ่งก็มาจอดเทียบข้างทุกคน","ธีโอดอร์เชิญแอนโธนีและคนอื่นๆ ให้ขึ้นไปนั่งบนนั้น","ในช่วงไม่กี่เดือนที่ผ่านมา เทคโนโลยีเครื่องยนต์สันดาปภายในค่อยๆ พัฒนาจนสมบูรณ์แบบ รถแปรธาตุประเภทนี้ยังถูกแบ่งออกเป็นหลากหลายประเภท บางคันใช้สำหรับการขนส่งแร่โดยเฉพาะ และบางคันก็ถูกใช้เป็นพาหนะสำหรับผู้คนในการเดินทางภายในเมือง","รถที่อยู่ตรงหน้าพวกเขาในตอนนี้เป็นประเภทหลังอย่างไม่ต้องสงสัย มันเป็นรถที่ถูกออกแบบมาเพื่อการท่องเที่ยวโดยเฉพาะ มีขนาดใหญ่กว่ารถแปรธาตุคันอื่นเกือบสองเท่า สามารถรองรับผู้โดยสารได้ถึงยี่สิบคน มีหลังคาสำหรับบังแดดบังฝน ใช้ยางแบบเติมลม ทำให้ไม่รู้สึกสั่นสะเทือนเหมือนแต่ก่อนอีกต่อไป","ข้อเสียเพียงอย่างเดียวคือความเร็วของมันไม่ได้เร็วนัก และเป็นไปไม่ได้เลยที่จะวิ่งทะยานไปทั่วทั้งเมือง แต่สำหรับเรย์เดลและคนอื่นๆ ที่เพิ่งเคยนั่งเป็นครั้งแรก มันก็ถือว่าเร็วมากแล้ว เพราะถึงอย่างไรรถคันนี้ก็ยังเร็วกว่ารถม้าอยู่มาก...","แฮมม์นั่งลงบนเบาะหนังนุ่มๆ อย่างระมัดระวัง เขารู้สึกราวกับว่าทุกสิ่งรอบตัวเปรียบเสมือนงานศิลปะอันวิจิตรบรรจง แม้แต่ขุนนางผู้สูงศักดิ์ก็ยังไม่เคยได้รับการปรนนิบัติเช่นนี้มาก่อน","ธีโอดอร์พาทุกคนตระเวนไปทั่วเมืองท่าและแนะนำให้พวกเขารู้จักกับโรงงานต่างๆ ที่กำลังปล่อยควันสีขาวพวยพุ่ง ก่อนหน้านี้เขาได้ยินมาว่าลินน์กำลังจะให้คนสร้างสิ่งที่เรียกว่า ‘รางรถไฟ‘ ซึ่งจะสามารถเชื่อมโยงทุกหนทุกแห่งในดินแดนพ่อมดเข้าด้วยกัน เมืองทั้งหมดจะเชื่อมต่อถึงกัน ทำให้ใช้เวลาเพียงไม่กี่ชั่วโมงในการเดินทางระหว่างสองเมือง ซึ่งจะสะดวกสบายอย่างมากในการขนส่งสินค้าหรือผู้คน","และสิ่งสุดท้ายคือการแนะนำให้รู้จักกับระบบการเมืองในดินแดนพ่อมดที่แตกต่างจากโลกภายนอกอย่างสิ้นเชิง นั่นคือ—ระบบรัฐสภาพ่อมด!","ที่นี่ไม่มีขุนนางหรือกษัตริย์ ทุกสิ่งทุกอย่างล้วนถูกควบคุมโดยพ่อมด!","เรย์เดลและคนอื่นๆ พยายามเก็บซ่อนความตื่นตะลึงไว้ในใจ หลังจากเดินทางมาถึงเมืองแห่งพ่อมดอันน่ามหัศจรรย์แห่งนี้ พวกเขาก็รู้สึกราวกับว่าทุกสิ่งที่ได้เห็นและได้ยินกำลังท้าทายขอบเขตความรู้ความเข้าใจของตนเอง","เรือเหล็กขนาดยักษ์ที่หนักนับร้อยตันแต่สามารถลอยอยู่บนทะเลได้ รถแปรธาตุที่สามารถเคลื่อนที่ได้เองโดยไม่ต้องพึ่งพาอูฐหรือม้าลากจูง และเครือข่ายทางรถไฟอันยิ่งใหญ่ที่เชื่อมต่อเมืองหลายสิบเมืองเข้าด้วยกัน ล้วนเป็นเรื่องที่เหลือเชื่อทั้งสิ้น","ชั่วขณะหนึ่ง เรย์เดลถึงกับสงสัยว่าเขายังคงอยู่ในความฝันหรือเปล่า","“ตามที่ท่านศาสตราจารย์กล่าวไว้ พลังของเวทมนตร์และเทคโนโลยีไม่เพียงแต่สามารถนำมาใช้ในการต่อสู้ได้เท่านั้น แต่ยังรวมถึงในชีวิตประจำวัน เพื่อมอบความสะดวกสบายให้กับทุกคนด้วย”","ธีโอดอร์กล่าวพร้อมกับรอยยิ้ม","“ท่านลินน์ช่างเป็นบุคคลที่น่าเหลือเชื่อจริงๆ...”","ฟูล่าอดไม่ได้ที่จะกล่าวชื่นชม จากคำพูดของธีโอดอร์ ไม่ยากเลยที่จะรับรู้ว่าเมืองท่าแห่งนี้ไม่ได้เป็นเช่นนี้มาตั้งแต่ต้น แต่การเปลี่ยนแปลงทั้งหมดในอิเยตานั้น เกิดขึ้นหลังจากที่ลินน์ก้าวขึ้นมาเป็นผู้นำของสถาบัน","“ในเมื่อดินแดนพ่อมดทั้งหมดถูกควบคุมโดยรัฐสภา เช่นนั้นท่านลินน์ก็น่าจะเป็นประธานที่ดูแลรัฐสภาใช่หรือไม่?”","ฟูล่าเอ่ยถามต่อ","“ไม่หรอก ท่านศาสตราจารย์เพิ่งเดินทางจากจักรวรรดิเซคัสมายังดินแดนพ่อมดเมื่อสองปีก่อน แม้ว่าทฤษฎีเวทมนตร์หลายข้อที่เขาเสนอจะเพียงพอที่จะเปลี่ยนแปลงระบบเวทมนตร์ที่มีอยู่เดิม แต่ตำแหน่งประธานรัฐสภาก็มักจะถูกครอบครองโดยพ่อมดระดับตำนานเสมอ”","ธีโอดอร์ส่ายหน้า ปฏิเสธข้อสันนิษฐานของฟูล่า ก่อนจะกล่าวเสริมว่า","“แน่นอนว่า พ่อมดทุกคนล้วนรู้ดีว่ามันเป็นเพียงเรื่องของเวลาเท่านั้น ก่อนที่ท่านศาสตราจารย์จะก้าวขึ้นเป็นประธานรัฐสภา”","‘นั่นหมายความว่า ท่านลินน์ไม่ใช่พ่อมดระดับตำนานอย่างนั้นหรือ?’","ฟูล่าและคนอื่นๆ รู้สึกประหลาดใจเล็กน้อย พวกเขาทุกคนต่างก็เคยเห็นอสนีบาตศักดิ์สิทธิ์ที่ฟาดฟันลงมาจากฟากฟ้าในคืนนั้น และคฤหาสน์ทั้งหลังก็ถูกทำลายลงในพริบตา พลังอำนาจเช่นนั้นย่อมต้องเกิดจากเวทมนตร์ระดับตำนานเท่านั้น","ด้วยความสับสนอย่างหนัก ฟูล่าจึงเอ่ยถามเรื่องราวเกี่ยวกับลินน์ต่อไปด้วยความอยากรู้อยากเห็น","ธีโอดอร์เองก็เริ่มมีท่าทีสนใจขึ้นมาทันที ลินน์เดินทางมาถึงอิเยตาได้ไม่นาน แต่ประสบการณ์ของเขากลับเต็มไปด้วยตำนานอันยิ่งใหญ่ เริ่มตั้งแต่การสร้างเรือเหาะ ไปจนถึงการสาธิตกฎการตกอย่างอิสระ การวัดพื้นที่ของดาวเคราะห์ และการเสนอกฎแรงโน้มถ่วงสากล เขาได้รับเกียรติยศสูงสุดทางวิชาการในโลกเวทมนตร์—นั่นคือเหรียญตราโคโรน่า","หากจะให้เล่ารายละเอียดจริงๆ เกรงว่าคงใช้เวลาหลายชั่วโมงก็ยังไม่จบ","ฟูล่าและคนอื่นๆ ต่างตกตะลึง ก่อนที่พวกเขาจะตั้งสติได้จากข่าวอันน่าตกใจที่ว่าทวีปใต้ฝ่าเท้าของพวกเขานั้นมีรูปทรงเป็นทรงกลม พวกเขาก็ต้องรับฟังข่าวที่ฟังดูไร้สาระยิ่งกว่านั้น ลินน์ที่ธีโอดอร์กำลังพูดถึง กลับเป็นเพียงพ่อมดระดับสามเท่านั้น","‘เรื่องนี้จะเป็นไปได้อย่างไร?’","ทุกคนที่อยู่ในเหตุการณ์ต่างตกตะลึง และถึงกับสงสัยว่าธีโอดอร์จงใจปั่นหัวพวกเขาเล่นหรือเปล่า","แม้แต่แอนโธนีเองก็ค่อนข้างประหลาดใจเช่นกัน แต่เมื่อนึกถึงรูปลักษณ์ที่ดูอ่อนเยาว์เป็นพิเศษของลินน์ สีหน้าครุ่นคิดก็ปรากฏขึ้นบนใบหน้าของเขาในไม่ช้า","ประมาณสิบห้านาทีต่อมา รถแปรธาตุก็มาจอดสนิทอยู่ที่หน้าประตูสถาบัน","ฟูล่า, แอนโธนี, เรย์เดล และคนอื่นๆ ก้าวลงจากรถ และเมื่อพวกเขาเงยหน้าขึ้นมอง ก็มองเห็นสิ่งก่อสร้างอันเป็นสัญลักษณ์สำคัญที่สุดของสถาบันอิเยตา—นั่นคือประติมากรรมรูปมือยักษ์คู่หนึ่งที่สลักจากหินอ่อนสีขาวบริสุทธิ์ บนฝ่ามือแต่ละข้างมีลูกบอลไม้และลูกเหล็กถูกชูขึ้นสู่ท้องฟ้า","กลุ่มนักเรียนฝึกหัดอย่างเอล็อคที่เดินทางกลับมายังสถาบันพร้อมกันอดไม่ได้ที่จะตัวสั่นสะท้าน เพราะมันทำให้พวกเขานึกถึงสูตรการตกอย่างอิสระ","ได้ยินมาจากท่านศาสตราจารย์ว่าพวกเขาจะต้องทำการสอบจบการศึกษาเมื่อเดินทางกลับมาในครั้งนี้ เนื้อหาของการสอบครั้งนี้แตกต่างจากครั้งที่ผ่านๆ มา สูตรและทฤษฎีที่เคยเรียนไปทั้งหมดล้วนอยู่ในขอบเขตของการสอบ ซึ่งมันเรียกได้ว่าเป็นฝันร้ายเลยทีเดียว","“ทุกท่าน ยินดีต้อนรับสู่อิเยตา!”","น้ำเสียงดังกังวานดังขึ้นในหูของทุกคนในเวลาต่อมา และเป็นลินน์นั่นเองที่เดินเข้ามาพร้อมกับกลุ่มพ่อมดแห่งสถาบัน","“ท่านศาสตราจารย์!”","เอล็อคและคนอื่นๆ รีบโค้งคำนับทำความเคารพ","ธีโอดอร์ก้าวเข้าไปข้างหน้าและสวมกอดเควินที่ไม่ได้พบกันมานานอย่างอบอุ่น","“ธีโอดอร์ นายไม่สังเกตเห็นหรือว่าท่านศาสตราจารย์เปลี่ยนไป?”","เควินเอ่ยถามด้วยรอยยิ้ม","“เปลี่ยนไป?!”","ธีโอดอร์ชะงักไปครู่หนึ่ง เขามองลินน์ด้วยความประหลาดใจ และไม่เห็นความแตกต่างใดๆ เป็นเวลานาน ก่อนจะนึกอะไรบางอย่างขึ้นมาได้ และเอ่ยขึ้นด้วยความตกตะลึง","“เป็นไปได้ไหมว่าท่านทะลวงขีดจำกัดและกลายเป็นจอมเวทผู้ยิ่งใหญ่แล้ว?”","ลินน์พยักหน้ารับอย่างไม่ใส่ใจนัก","เควินกล่าวด้วยสีหน้าเสียดาย","“เมื่อคืนนี้เอง น่าเสียดายที่นายพลาดช่วงเวลาสำคัญเช่นนี้ไป”","ธีโอดอร์เองก็รู้สึกหงุดหงิดเล็กน้อย เขาคงจะกลับมาเร็วกว่านี้สักวันหากรู้ล่วงหน้า","แอนโธนี ซึ่งเป็นจอมเวทผู้ยิ่งใหญ่เช่นกันไม่ได้รู้สึกประหลาดใจเลยแม้แต่น้อย เขาสังเกตเห็นการคงอยู่ของอาณาเขตตั้งแต่แรกเห็นลินน์แล้ว","สำหรับภาพฉายพลังเวทมนตร์ที่เขาเคยสัมผัสมาก่อนหน้านี้ เขาย่อมไม่สามารถประเมินมันได้อย่างชัดเจน แต่ตอนนี้เขาสามารถมั่นใจได้แล้วว่าลินน์คือจอมเวทผู้ยิ่งใหญ่เช่นเดียวกับเขา"]},{"n":314,"t":"แอนโธนี: เจ้าคิดว่าพ่อมดระดับสามวงแหวนจะสามารถเข้าใจทฤษฎีเวทมนตร์อันลึกซึ้งมากมายขนาดนั้นได้จริงๆ หรือ?","c":["“ท่านแอนโธนี ระหว่างทางมาที่นี่ ท่านน่าจะได้เห็นเมืองท่าแห่งนี้แล้ว ท่านรู้สึกอย่างไรบ้าง?”","ลินน์เชิญทุกคนเข้ามาในห้องประชุมอันกว้างขวางแล้วเอ่ยถาม","“ข้าคิดว่าไม่ว่าใครก็ตามที่เดินทางมาถึงเมืองพ่อมดแห่งนี้เป็นครั้งแรก ล้วนต้องรู้สึกตกตะลึงอย่างหาที่สุดไม่ได้...”","แอนโธนีตอบกลับด้วยความรู้สึกท่วมท้น คำพูดเหล่านี้ไม่ใช่การจงใจประจบสอพลอ แต่เป็นเสียงถอนหายใจที่ออกมาจากก้นบึ้งของหัวใจ มันช่างเข้ากับจินตนาการของอาณาจักรเวทมนตร์ได้อย่างสมบูรณ์แบบ","ไม่สิ ควรจะบอกว่ามันแปลกประหลาดยิ่งกว่าที่เขาจินตนาการไว้เสียอีก","“ข้าเชื่อว่าอีกไม่นาน อาณาจักรฮัดลาตาทั้งหมดก็จะได้รับการเปลี่ยนแปลงเฉกเช่นเมืองท่าแห่งนี้ และนี่จะเป็นกุญแจสำคัญสู่ชัยชนะเหนือจักรวรรดิของเราด้วย!”","ลินน์กล่าวพร้อมกับรอยยิ้ม","“ข้าไม่มีข้อสงสัยในเรื่องนี้เลย แต่เหล่าขุนนางของอาณาจักรและฝ่าบาท กษัตริย์องค์ใหม่ของเรา อาจจะไม่ทรงพอพระทัยนัก...”","สีหน้าของแอนโธนีดูเคร่งขรึมขึ้นเล็กน้อย","ระหว่างทางมายังสถาบัน เขาได้ยินเรื่องราวมากมายจากธีโอดอร์เกี่ยวกับการเปลี่ยนแปลงของเมืองท่าแห่งนี้ ชาวเมืองเกือบร้อยละหกสิบได้เข้าไปทำงานในโรงงาน และพวกเขาสามารถรับค่าจ้างที่สูงมากในทุกๆ เดือน ด้วยเหตุนี้เอง จึงไม่มีใครในอิเยตาทั้งเมืองต้องทนหิวโหย และทุกคนยังสามารถกินขนมปังขาวที่อดีตมีเพียงขุนนางเท่านั้นที่จะได้ลิ้มรส","การดำเนินนโยบายเช่นนี้ย่อมไม่มีปัญหาในดินแดนพ่อมด เพราะที่นี่ไม่มีขุนนางหรือราชวงศ์ และบรรดาพ่อมดก็ไม่ได้ใส่ใจกับชะตากรรมของประชาชนมากนัก ประกอบกับการยอมรับอย่างเงียบๆ ของรัฐสภา ภายในเวลาเพียงสองปี ประชากรของอิเยตาก็พุ่งทะลุหนึ่งแสนคนไปแล้ว","แต่มันไม่ง่ายเลยที่จะนำนโยบายนี้ไปปรับใช้ในอาณาจักร เพราะท้ายที่สุดแล้ว ประชาชนคือทรัพย์สินที่มีค่าที่สุดของเหล่าขุนนาง และยังเป็นสัญลักษณ์ของสิทธิอำนาจทั้งมวล!","ลินน์เข้าใจความกังวลของแอนโธนีเป็นอย่างดี แต่เขาไม่ได้รู้สึกหนักใจอะไรนัก จึงเอ่ยด้วยรอยยิ้ม","“ไม่มีใครสามารถหยุดยั้งความก้าวหน้าของยุคสมัยได้ หากพวกเขากล้าที่จะยกแขนขึ้นมาขวางทางรถ พวกเขาก็มีแต่จะถูกกงล้อแห่งยุคสมัยบดขยี้!”","เหตุผลที่เขาเลือกจะร่วมมือกับองค์ชายรองและรักษาฐานะของราชวงศ์เอาไว้ชั่วคราว ก็เพื่อใช้การควบคุมระดับรากหญ้าของราชวงศ์และเหล่าขุนนางมากดทับอิทธิพลของศาสนจักร","ตราบใดที่ช่วงเวลาอันยากลำบากที่สุดนี้ผ่านพ้นไป และผู้ยากไร้เหล่านั้นได้เห็นผลประโยชน์ที่เป็นรูปธรรม เมื่อนั้นเหล่าขุนนางก็จะหมดประโยชน์ไปโดยปริยาย!","“ท่านลินน์ ในเมื่อชาวเมืองส่วนใหญ่เข้าไปทำงานในโรงงาน แล้วพื้นที่เกษตรกรรมที่ถูกทิ้งร้างล่ะครับ?”","เรย์เดลเอ่ยถามด้วยความสับสน","“ข้าได้ยินจากท่านธีโอดอร์ว่า อิเยตามีอุปกรณ์แปรธาตุที่ทำให้ผู้คนสามารถเพาะปลูกบนที่ดินขนาดสิบกิโลเมตรได้ภายในหนึ่งชั่วโมง เรื่องนั้นเป็นความจริงหรือครับ?”","นี่เป็นสิ่งที่เรย์เดลให้ความสนใจมากที่สุด เพราะอีกไม่นานก็จะถึงช่วงฤดูเก็บเกี่ยวข้าวสาลีในฤดูร้อนประจำปี ซึ่งตามมาด้วยการเพาะปลูกในฤดูใบไม้ร่วง","“แน่นอนว่าเป็นความจริง แต่ไม่ต้องกังวลไปหรอก อีกไม่กี่วันพวกเจ้าก็จะได้รู้เอง!”","ลินน์กล่าวด้วยน้ำเสียงหนักแน่น รถเกี่ยวข้าวรุ่นแรกของโรงงานแปรธาตุได้ถูกผลิตขึ้นมาแล้ว และเขาเชื่อว่าจะได้เห็นผลลัพธ์ในเร็วๆ นี้","เมื่อเห็นว่าแอนโธนีและคนอื่นๆ ต้องเดินทางข้ามดินแดนทั้งสองแห่งด้วยเรือเหาะมาตลอดทั้งวัน ลินน์จึงไม่ได้พูดคุยกับพวกเขาให้ยืดเยื้อ และรีบเรียกให้ผู้ติดตามพาทุกคนไปพักผ่อน","หลังจากเดินออกจากห้องรับรอง ฟูล่าก็ไม่อาจเก็บงำคำพูดที่อัดอั้นอยู่ในใจได้อีกต่อไป","“ท่านอาจารย์ ดูเหมือนว่าการคาดเดาก่อนหน้านี้ของท่านจะผิดพลาดนะคะ ท่านลินน์ไม่ได้เป็นพ่อมดระดับตำนาน และตอนที่เขาพบกับพวกเรา เขาก็เป็นเพียงพ่อมดระดับสามวงแหวนเท่านั้น”","“เจ้าคิดว่าพ่อมดระดับสามวงแหวนจะสามารถเข้าใจทฤษฎีเวทมนตร์อันลึกซึ้งมากมายขนาดนั้นได้จริงๆ หรืองั้นหรือ? ทั้งแรงโน้มถ่วง อวกาศ และแรงแม่เหล็กไฟฟ้า... ทฤษฎีเหล่านี้ ต่อให้จอมเวทผู้ยิ่งใหญ่ใช้เวลาทั้งชีวิตเพื่อศึกษามัน ก็อาจจะยังไม่ลึกซึ้งเท่าเขาเลยด้วยซ้ำ”","แอนโธนีส่ายหน้าและปฏิเสธข้อสันนิษฐานของฟูล่า","“แต่ว่า บรรดาพ่อมดแห่งสถาบันอิเยตาก็ไม่มีความจำเป็นที่จะต้องโกหกพวกเรานี่คะ ท่านลินน์เพิ่งจะผ่านพิธีเลื่อนระดับเมื่อคืนนี้เอง...”","ฟูล่ากล่าวด้วยความสับสน ก่อนจะคาดเดาต่อว่า","“บางทีที่เขารู้มากขนาดนี้ อาจเป็นเพราะเขาได้เรียนรู้ทฤษฎีเวทมนตร์ขั้นสูงมากมายจาก [สมาคมเวทมนตร์เร้นลับ] แห่งนั้นก็ได้”","ดังนั้นพวกเขาก็น่าจะถูกอีกฝ่ายหลอกลวงมาก่อนหน้านี้ และนางกลับต้องมาทำความเคารพเด็กหนุ่มที่มีอายุไม่ถึงครึ่งหนึ่งของนาง แถมยังเป็นเพียงพ่อมดระดับทางการเท่านั้น","แอนโธนียิ้มและไม่ได้พูดอะไร เขาเคยติดต่อกับลินน์มาแล้วหลายครั้งในด้านพลังเวทมนตร์ และเขาได้เรียนรู้ความรู้ที่หลากหลายจากอีกฝ่าย แต่ไม่ว่าจะเป็นด้านไหน ลินน์ก็สามารถตอบคำถามได้โดยไม่ต้องหยุดคิดเลยด้วยซ้ำ","บางครั้งเขาก็อดสงสัยไม่ได้ว่า จะมีปัญหาใดบนโลกใบนี้ที่สามารถทำให้อีกฝ่ายจนมุมได้บ้างหรือไม่","คลังความรู้เป็นสิ่งที่ไม่สามารถเสแสร้งแกล้งทำได้ และไม่มีพ่อมดคนไหนที่จะถ่ายทอดความรู้ที่พวกเขาอุตส่าห์ศึกษาและสรุปมาให้กับคนอื่นอย่างหมดเปลือกโดยไม่มีเหตุผล อย่างน้อยมันก็ต้องเป็นการแลกเปลี่ยนที่อยู่ในระดับเดียวกัน","เช่นนั้นมันก็เหลือความเป็นไปได้เพียงอย่างเดียว...","จู่ๆ แอนโธนีก็คลับคล้ายคลับคลาถึงข่าวลือหนึ่ง ว่ากันว่าเมื่อหลายร้อยปีก่อน ในยุคที่อำนาจของศาสนจักรยังไม่ได้แผ่ขยายไปทั่วทั้งทวีป เคยมีจอมเวทผู้ยิ่งใหญ่และแม้แต่พ่อมดระดับตำนานนับไม่ถ้วนเฉกเช่นเดียวกับพวกเขา ทว่าคนเหล่านี้กลับล้มตายและบาดเจ็บเป็นจำนวนมากในสงครามอันยาวนานที่นำมาซึ่งหายนะ ซึ่งอาจเรียกได้ว่าเป็นมหาสงครามแห่งเวทมนตร์","แอนโธนีอดสงสัยไม่ได้ว่า แท้จริงแล้วลินน์เคยเป็นพ่อมดระดับตำนานมาก่อน ทว่ากลับร่วงหล่นลงมาด้วยเหตุผลที่ไม่ทราบแน่ชัด และตอนนี้เขาก็ได้ถือกำเนิดใหม่ ไม่ว่าจะเป็นการยึดร่าง หรือการใช้วิชาเวทมนตร์บางอย่างก็ตาม","แม้ว่าความรู้จะยังคงอยู่ แต่มันก็ยังต้องการการสั่งสมพลังอีกเล็กน้อยเพื่อหวนคืนสู่ขอบเขตระดับตำนาน เขายังจำเป็นต้องใช้ค่ายกลเล่นแร่แปรธาตุหรือความช่วยเหลือจากคนอื่นๆ เพื่อให้สามารถร่ายเวทมนตร์ระดับตำนานที่เคยสร้างขึ้นมาในอดีตได้!","ยิ่งแอนโธนีคิดเกี่ยวกับเรื่องนี้มากเท่าไหร่ มันก็ยิ่งมีความเป็นไปได้มากเท่านั้น จากการติดต่อเมื่อครู่นี้ จะเห็นได้ว่าอาณาเขตที่ลินน์สร้างขึ้นนั้นมีความเสถียรเป็นอย่างมาก และเขายังทำให้ทะเลแห่งธาตุสมบูรณ์แบบได้อีกด้วย มันดูไม่เหมือนกับจอมเวทผู้ยิ่งใหญ่ที่เพิ่งได้รับการเลื่อนระดับเลยสักนิด","แต่ไม่ว่าเขาจะแน่ใจแค่ไหน ท้ายที่สุดแล้วนี่ก็เป็นเพียงการคาดเดา แอนโธนีไม่ได้ตั้งใจจะพูดมันออกมา เขาเพียงแค่เตือนฟูล่าและคนอื่นๆ ว่าท่านลินน์ไม่ใช่คนธรรมดาทั่วไป พวกเขาแค่ต้องปฏิบัติต่ออีกฝ่ายในฐานะพ่อมดระดับตำนาน... นั่นคือสิ่งที่ถูกต้องที่สุดแล้ว","เมื่อเทียบกับเรย์เดลและคนอื่นๆ ที่กำลังท่องเที่ยวอยู่ในอิเยตา เอล็อคที่เพิ่งมาถึงสถาบันได้อุทิศตนให้กับการทบทวนบทเรียนไปเป็นที่เรียบร้อยแล้ว","เนื่องจากสงครามกับจักรวรรดิอาจจะเริ่มต้นขึ้นเมื่อใดก็ได้ ลินน์จึงจัดตารางเวลาอย่างรัดกุม โดยปล่อยให้พวกเขามีเวลาทบทวนบทเรียนเพียงแค่ครึ่งวันเท่านั้น","การสอบจบการศึกษามีเพียงปีละครั้งเท่านั้น หากพวกเขาสอบตกในครั้งนี้ ก็จะต้องรอไปอีกหนึ่งปีเต็ม!","หลังจากอยู่ในอาณาจักรฮัดลาตามานานกว่าหนึ่งเดือน เพียร์ซก็แทบจะลืมสูตรที่เขาเคยเรียนไปก่อนหน้านี้จนหมดสิ้น เมื่อมองไปที่สมุดจดบันทึกที่เขาเขียนไว้ในวันธรรมดา เขาก็รู้สึกหน้ามืดตาลาย และไม่รู้ว่าจะต้องทำอย่างไรดี เขาจำไม่ได้ด้วยซ้ำว่าสัญลักษณ์แต่ละตัวหมายถึงอะไร","“เร็วเข้า เร็วเข้า ใครบอกฉันทีว่าความเร่งโน้มถ่วงคืออะไร?”","“แล้วสูตรปริมาตรของทรงกระบอกล่ะ? ค่าพายคืออะไร?”","“ใครจำความหนาแน่นของน้ำได้บ้าง?”","เสียงตะโกนในทำนองเดียวกันดังขึ้นจากทุกมุมของสถาบัน เห็นได้ชัดว่าในช่วงเวลากว่าหนึ่งเดือนที่ผ่านมา มีน้อยคนนักที่จะยอมอ่านหนังสือในเวลาว่าง คืนนี้คงถูกกำหนดให้เป็นค่ำคืนที่ไม่ได้หลับไม่ได้นอนเสียแล้ว..."]},{"n":315,"t":"จุดประสงค์ของเราคือการสำรวจว่าเวทมนตร์มาจากไหน!","c":["เช้าตรู่ของวันรุ่งขึ้น กลุ่มพ่อมดฝึกหัดได้ก้าวเข้าสู่ห้องสอบด้วยความรู้สึกวิตกกังวล หลังจากได้รับกระดาษข้อสอบของตัวเองแล้ว พวกเขาก็รีบนับจำนวนข้อสอบด้วยใบหน้าที่ขมวดคิ้วมุ่น","เพียร์ซไม่กล้าชักช้าและรีบเปิดไปที่คำถามข้อแรก","[A และ B เดินเข้าหากันจากสองสถานที่ในเวลาเดียวกัน หลังจากผ่านไปสี่ชั่วโมง พวกเขาจะพบกันที่ระยะห่าง 5 กิโลเมตรจากจุดกึ่งกลาง เป็นที่ทราบกันดีว่า A เร็วกว่า B จงหาว่าในหนึ่งชั่วโมง A เดินเร็วกว่า B กี่กิโลเมตร?]","จู่ๆ เพียร์ซก็ขมวดคิ้ว นี่น่าจะเป็นโจทย์คณิตศาสตร์ที่ต้องการหาค่าตัวแปรที่ไม่ทราบค่า แต่เงื่อนไขที่ให้มานั้นมีไม่มากนัก หลังจากครุ่นคิดอยู่ครู่หนึ่ง ในที่สุดเขาก็ได้แนวคิดในการแก้ปัญหาและเริ่มวาดแผนภาพเส้น","อีกด้านหนึ่งของห้องสอบ บรรดาพ่อมดหลายคนที่รับผิดชอบในการคุมสอบต่างก็กำลังมองดูกระดาษข้อสอบในมือของพวกเขาเช่นกัน","ฟูล่าและคนอื่นๆ ให้ความสนใจกับการสอบจบการศึกษาของสถาบันอิเยตาเป็นอย่างมาก ดังนั้นพวกเขาจึงเสนอตัวที่จะมาช่วยคุมสอบนักเรียน และในขณะเดียวกันก็เริ่มรู้สึกสนใจที่จะลองทำข้อสอบเหล่านี้ดูบ้าง","ในตอนแรกฟูล่าคิดว่าคำถามเหล่านี้ถูกเตรียมไว้สำหรับเด็กฝึกหัด มันจึงไม่น่าจะยากอะไรสำหรับพ่อมดเต็มตัวอย่างนาง แต่หลังจากอ่านคำถามติดต่อกันสองสามข้อ นางก็ถึงกับต้องเบิกตาโพลงด้วยความตกตะลึง","“สถาบันอิเยตาสอนเรื่องพวกนี้ด้วยเหรอ?”","พ่อมดคนหนึ่งเอ่ยถามด้วยความสับสน เพราะเขาคิดว่า เนื้อหาของการสอบจะเป็นความรู้เกี่ยวกับธาตุ สมุนไพร การเล่นแร่แปรธาตุ และเวทมนตร์สายแปรสภาพเสียอีก","“ไม่ผิด!”","ลินน์พยักหน้า เขามองไปที่ฟูล่าและคนอื่นๆ ก่อนจะกล่าวว่า","“โดยทั่วไปแล้วจะประกอบไปด้วยสามวิชา ได้แก่ คณิตศาสตร์ เคมี และฟิสิกส์...ส่วนชีววิทยาก็อาจจะถูกเพิ่มเข้ามาในอนาคต”","“แต่เรียนเรื่องพวกนี้ไปแล้วมันจะได้ประโยชน์อะไรล่ะ? เอาเวลาไปเรียนรู้เวทมนตร์ให้มากขึ้นยังจะดีกว่าเสียอีก...”","ฟูล่าเบ้ปาก","ลินน์เปลี่ยนสีหน้าให้จริงจังขึ้น","“คณิตศาสตร์คือรากฐานของวิทยาศาสตร์ธรรมชาติทั้งหมด เคมีคือศาสตร์ที่ศึกษาองค์ประกอบ โครงสร้าง และการเปลี่ยนแปลงของธาตุเวทมนตร์ ส่วนฟิสิกส์ก็คือการสำรวจกฎเกณฑ์การทำงานของโลกใบนี้...”","“จุดประสงค์ของการศึกษาหลักสูตรเหล่านี้ก็เพื่อสำรวจว่า เวทมนตร์มาจากไหน!”","ลินน์กล่าวด้วยน้ำเสียงหนักแน่น","เวทมนตร์มาจากไหน?","เมื่อได้ยินเช่นนี้ หัวใจของผู้ที่อยู่ในเหตุการณ์ทั้งหมดก็ถึงกับสั่นสะท้าน แม้ว่าพวกเขาจะศึกษาเวทมนตร์มาโดยตลอด แต่ก็แทบจะไม่เคยคิดทบทวนอย่างลึกซึ้งเกี่ยวกับปัญหานี้เลย","ลินน์ยังคงพูดต่อไปว่า","“ส่วนเรื่องประโยชน์ของมัน ข้าคิดว่าพวกท่านก็น่าจะได้เห็นกันแล้วไม่ใช่หรือ? มันอยู่ทุกแห่งทั่วทั้งเมือง! พวกท่านได้เห็นทั้งกระจก กระดาษ เรือเหาะ เรือเดินสมุทร หรือแม้กระทั่งปืนใหญ่แม่เหล็กไฟฟ้า...ทุกสิ่งทุกอย่างล้วนสามารถจัดอยู่ในศาสตร์ทั้งสามแขนงนี้ได้ทั้งสิ้น!”","เมื่อนึกถึงสิ่งที่ตนได้เห็นและได้ยินนับตั้งแต่เข้ามาในอิเยตา ฟูล่าก็เก็บงำความคิดดูถูกเหยียดหยามของตนไปจนหมดสิ้น และเริ่มพิจารณาแต่ละโจทย์ปัญหาอย่างจริงจัง","เพียงแต่นางไม่เคยศึกษาคณิตศาสตร์อย่างเป็นระบบมาก่อน ดังนั้นนางจึงไม่รู้จริงๆ ว่าจะเริ่มแก้สมการเหล่านี้จากตรงไหน ทำให้นางทำได้เพียงหันไปมองลินน์เพื่อขอความช่วยเหลือ","ลินน์ยกมือขึ้นแล้วเคาะเบาๆ เพื่อสร้างบาเรียตัดเสียงรบกวนในบริเวณใกล้เคียง ก่อนจะอธิบายให้ฟังว่า","“คำถามข้อนี้จริงๆ แล้วคำนวณได้ง่ายมาก เพียงแต่มันมีลูกเล่นซ่อนอยู่นิดหน่อย หาก A และ B มีความเร็วเท่ากัน พวกเขาก็ย่อมต้องเดินทางไปถึงจุดกึ่งกลางในเวลาเดียวกันอย่างแน่นอน แต่พวกเขากลับพบกันที่ระยะห่างจากจุดกึ่งกลางห้ากิโลเมตร ดังนั้นคนที่มีความเร็วกว่าอย่าง A ย่อมต้องเดินไปไกลกว่า B ถึงสองเท่า ซึ่งก็คือ 10 กิโลเมตร”","“ทั้งสองคนพบกันหลังจากผ่านไปสี่ชั่วโมง นั่นหมายความว่าทั้ง A และ B ต่างก็ใช้เวลาเดิน 4 ชั่วโมง ดังนั้นจึงใช้แค่การหารแบบง่ายๆ ก็สรุปได้แล้วว่าความเร็วของ A นั้นเร็วกว่า B 2.5 กิโลเมตรต่อชั่วโมง!”","ลินน์อธิบายแนวคิดในการแก้ปัญหาให้กระชับที่สุดเท่าที่จะทำได้ โจทย์ข้อนี้ไม่ได้ยากจริงๆ และมันสามารถแก้ได้ด้วยการใช้ความคิดเพียงเล็กน้อย","กระดาษข้อสอบที่เขาให้ไปนั้นมีทั้งหมด 50 ข้อ ข้อละ 2 คะแนน รวมคะแนนเต็ม 100 คะแนน การได้ 60 คะแนนจะถือว่าสอบผ่าน นั่นก็หมายความว่าพวกเขาจำเป็นต้องตอบคำถามให้ถูกต้องเพียง 30 ข้อเท่านั้น!","และระดับความยากของคำถามเหล่านี้ ยังได้รับการออกแบบมาอย่างรอบคอบโดยลินน์ ซึ่งมีคำถามแจกคะแนนแบบนี้อยู่ยี่สิบห้าข้อ คำถามระดับง่ายยี่สิบข้อ และคำถามค่อนข้างยากอีกห้าข้อ","ตามการคาดเดาของเขา หากเอล็อคและคนอื่นๆ จดบันทึกอย่างระมัดระวัง มันก็ควรจะเป็นเรื่องง่ายสำหรับพวกเขาที่จะทำคะแนนจากคำถามแจกคะแนนทั้งหมด และหลังจากนั้นพวกเขาก็แค่ต้องทำคำถามระดับง่ายให้ถูกต้องอีกเพียงห้าข้อเพื่อให้สอบผ่าน","แต่นี่เป็นเพียงแค่เกณฑ์สอบผ่านเท่านั้น เพราะลินน์นั้นหวังไว้ว่า จะมีนักเรียนที่ได้เกรดดีเยี่ยมสองสามคนเพื่อให้ความสำคัญกับการฝึกฝน ซึ่งล้วนเป็นบุคลากรที่มีความสามารถด้านการวิจัยทางวิทยาศาสตร์","แน่นอนว่านอกเหนือจากการสอบภาคทฤษฎีแล้ว นักเรียนเหล่านี้จะต้องเข้าสอบในหลักสูตรภาคปฏิบัติเพื่อทดสอบการต่อสู้จริงและความสามารถในการร่ายเวทมนตร์ขั้นพื้นฐานด้วย โดยจะนำคะแนนเฉลี่ยจากทั้งสองส่วนมาใช้เพื่อตัดสินว่าพ่อมดฝึกหัดคนนั้นมีคุณสมบัติพอที่จะกลายเป็นพ่อมดเต็มตัวได้หรือไม่ นี่ถือเป็นโอกาสพิเศษสำหรับนักเรียนบางคนที่มีความถนัดเพียงด้านใดด้านหนึ่ง","หลังจากที่ลินน์วิเคราะห์โจทย์คณิตศาสตร์ไปสองสามข้อ ฟูล่าและคนอื่นๆ ก็ได้สัมผัสกับความสนุกสนานในการทำข้อสอบอย่างรวดเร็ว และพวกเขาก็เริ่มหยิบปากกาขึ้นมาครุ่นคิดทีละข้อๆ จนลืมไปเสียสนิแต่พวกเขามาที่นี่เพื่อคุมสอบบรรดานักเรียนเหล่านั้น","สำหรับธีโอดอร์แล้ว คำถามแจกคะแนนเหล่านี้ไม่ได้มีความหมายอะไรเลย หลังจากมองปราดเดียว เขาก็หันไปสนใจคำถามที่ลินน์ทำเครื่องหมายไว้ว่าเป็นระดับง่ายบนกระดาษข้อสอบแทน","[พ่อมดคนหนึ่งซึ่งกำลังขับเรือเหาะได้ประสบอุบัติเหตุทางอากาศ ซึ่งทำให้เขาต้องกระโดดลงมาจากความสูง 480 เมตร หลังจากตกอย่างอิสระเป็นระยะทางหนึ่ง เขาก็ได้ร่ายเวทชะลอการตกด้วยความหน่วงคงที่ซึ่งมีความเร่ง 2 เมตรต่อวินาทีจนกระทั่งถึงพื้น เมื่อความเร็วเท่ากับศูนย์พอดี โดยไม่ต้องคำนึงถึงแรงต้านของอากาศ จงหาเวลาทั้งหมดของการตกลงมาและระยะทางของการตกอย่างอิสระ...]","เอาล่ะ นี่ก็น่าจะเป็นโจทย์สมการด้วยเช่นกัน","ธีโอดอร์ครุ่นคิดเกี่ยวกับมัน เขาจำได้ว่าลินน์เคยบอกไว้ว่าการตกอย่างอิสระคือการเคลื่อนที่ในแนวตรงด้วยความเร่งคงที่โดยมีความเร็วต้นเท่ากับ 0 สูตรของมันคือ v=gt และ g คือความเร่งเนื่องจากแรงโน้มถ่วง ซึ่งดูเหมือนว่าจะเป็น 10 เมตรต่อวินาที? แล้วเจ้า t ตัวนี้ล่ะ มันควรจะเป็นเวลาใช่ไหม?","แต่การตกลงมาของร่างกายถูกแบ่งออกเป็นสองส่วน ทั้งเวลาและระยะทางของการตกต่างก็เป็นสิ่งที่ไม่รู้ค่า และมันก็คือคำตอบที่จำเป็นต้องหา การนำสูตรนี้ไปใช้ตรงๆ ย่อมไม่เกิดผลอย่างแน่นอน...","ธีโอดอร์ครุ่นคิดอย่างหนักเป็นเวลานานจนเหงื่อเย็นผุดพรายขึ้นบนหน้าผาก","และเขาก็พบว่า เขา...ทำไม่ได้!","“ท่านศาสตราจารย์ลินน์ คำถามพวกนี้มันไม่ยากเกินไปหน่อยหรือครับ?”","ธีโอดอร์อดไม่ได้ที่จะเอ่ยเตือน ท่านเรียกคำถามพวกนี้ว่าระดับง่ายงั้นเหรอ?!","นี่เป็นคำถามที่เด็กฝึกหัดควรจะทำจริงๆ อย่างนั้นหรือ? เขาไม่คิดว่าเรื่องนี้มันออกจะเกินเหตุไปหน่อยหรือไง?","“นี่มันยากเหรอ?”","ลินน์มองไปที่ธีโอดอร์ด้วยสายตาแปลกๆ เพราะเขาจำได้ว่าเขาเคยอธิบายสูตรที่เกี่ยวข้องและตีพิมพ์ลงใน [เมจิกเดลี่] ไปแล้ว เพื่อให้บรรดาพ่อมดหรือแม้กระทั่งชาวเมืองที่สนใจศึกษาการคำนวณได้เรียนรู้เพิ่มเติมเกี่ยวกับเรื่องนี้","ยิ่งไปกว่านั้น พ่อมดทุกคนก็เปรียบเสมือนคอมพิวเตอร์รูปร่างมนุษย์ แม้แต่เด็กฝึกหัดก็ยังมีพลังในการคำนวณที่แข็งแกร่งกว่าคนธรรมดามาก และโจทย์ปัญหาเหล่านี้ก็ควรจะอยู่ในขอบเขตที่รับได้","ในขณะที่ลินน์กำลังจะอธิบาย จู่ๆ สีหน้าของเขาก็เปลี่ยนไป เขายื่นมือออกไปและดีดนิ้ว พลังเวทมนตร์พลุ่งพล่านขึ้นในบริเวณรอบตัวเขา ในชั่วพริบตา ตะปูทองแดงก็ลอยพุ่งออกไปตอกตรึงปากกาขนนกและกระดาษข้อสอบในมือของพ่อมดฝึกหัดคนหนึ่งด้วยความรวดเร็วดุจสายฟ้าแลบ..."]},{"n":316,"t":"ข้าอยากจะยัดกระดาษข้อสอบใส่ปากท่านศาสตราจารย์จริงๆ!","c":["อาร์พาดเป็นเพียงพ่อมดฝึกหัดธรรมดาคนหนึ่งในสถาบันอิเยตา ซึ่งรู้ดีว่าความฉลาดและพลังในการคำนวณของเขานั้นด้อยกว่าพวกนักเรียนที่ได้เข้าร่วมชั้นเรียนหัวกะทิเป็นอย่างมาก และหากเขาต้องการสอบผ่านการจบการศึกษาในครั้งนี้ หรือแม้กระทั่งอยากจะโดดเด่นจนได้รับการยอมรับจากท่านศาสตราจารย์ เขาก็จำเป็นต้องใช้วิธีการที่ไม่ธรรมดา!","ตัวอย่างเช่น เมื่อคืนที่ผ่านมา เขานั้นยอมจ่ายในราคาสูงลิ่วเพื่อซื้อผงแปรธาตุสูตรพิเศษมาจากนักสมุนไพรผู้เก่งกาจ และนำมันมาผสมลงในหมึกเพื่อเขียนโพยโกงข้อสอบ โดยข้อความที่เขียนด้วยหมึกชนิดนี้จะสามารถมองเห็นได้ก็ต่อเมื่อใช้เวทมนตร์เฉพาะทางเท่านั้น","ดังนั้น อาร์พาดจึงกล้าวางกระดาษหนังที่เต็มไปด้วยสูตรและตัวอย่างคำถามลงบนโต๊ะอย่างสง่าผ่าเผย ในขณะที่แสร้งทำเป็นกำลังแก้โจทย์ปัญหาบนกระดาษ เขาก็แอบมองดูตัวอย่างเหล่านั้นผ่านเวทสำแดงรูปลักษณ์","‘ดีมาก...ท่านศาสตราจารย์เคยอธิบายคำถามพวกนี้ไปแล้ว และมันสามารถคำนวณได้ตราบใดที่ตัวเลขถูกแทนค่ากลับเข้าไป’","อาร์พาดทำการคำนวณบนกระดาษอย่างผู้มีชัย และภายในเวลาเพียงไม่กี่นาที เขาก็สามารถทำคำถามห้าข้อแรกเสร็จสิ้น แต่ไม่นานเขาก็พบว่าวิธีเทียบเคียงกับคำถามตัวอย่างนี้ไม่ได้ผลเสมอไป นั่นเป็นเพราะคำถามหลายข้อในกระดาษข้อสอบเป็นรูปแบบคำถามที่ไม่เคยเห็นมาก่อน และการเพียงแค่แทนค่าลงในสูตรสลับกับการดำเนินการตัวเลขก็ไม่สามารถช่วยอะไรได้เลย","อาร์พาดครุ่นคิดอย่างหนัก จากนั้นจึงตัดสินใจร่ายเวทอีกครั้งเพื่อเปิดเผยโพยข้อสอบบนกระดาษ และไล่อ่านมันไปทีละบรรทัด โดยพยายามค้นหาว่าเขาได้พลาดสูตรไหนไปบ้างหรือไม่","ในขณะนั้นเอง เสียงแหวกอากาศก็ดังขึ้นที่ข้างหูของเขาอย่างกะทันหัน และก่อนที่อาร์พาดจะทันได้ตอบสนอง ตะปูทองแดงก็ลอยพุ่งผ่านไปและตอกตรึงปากกาขนนกกับกระดาษข้อสอบในมือของเขาเอาไว้...ส่วนกระดาษตรงหน้าเขาก็ค่อยๆ ลอยขึ้นมาและพุ่งตรงไปยังโต๊ะของผู้คุมสอบอย่างเป็นธรรมชาติ","“ท่านศาสตราจารย์...”","อาร์พาดสะดุ้งโหยง และผุดลุกขึ้นจากที่นั่งอย่างกะทันหัน","ลินน์ยื่นมือออกไป และกระดาษแผ่นนั้นก็ร่วงหล่นลงมาบนฝ่ามือของเขา","อาร์พาดพยายามอย่างเต็มที่ที่จะรักษาความสงบเยือกเย็นไว้บนใบหน้า เขาพยายามกดข่มความหวาดกลัวและความวิตกกังวลในใจเอาไว้ และคอยปลอบประโลมตัวเองอยู่เสมอว่าหมึกล่องหนชนิดพิเศษนั้นถูกซ่อนเอาไว้อย่างมิดชิดและไม่มีทางที่จะถูกค้นพบได้","ธีโอดอร์และฟูล่าที่กำลังครุ่นคิดเกี่ยวกับคำถามในข้อสอบ เพิ่งจะนึกถึงความรับผิดชอบของตนในฐานะผู้คุมสอบขึ้นมาได้ และรีบเดินเข้ามาหาทันที แต่บนกระดาษแผ่นนั้นมีรอยขีดเขียนร่างข้อความที่ดูยุ่งเหยิงอยู่บ้าง ซึ่งก็ไม่ได้ดูพิเศษอะไร","แต่หลายคนต่างก็เข้าใจดีว่า นี่จะต้องเป็นวิธีการโกงข้อสอบรูปแบบหนึ่งอย่างแน่นอน มิฉะนั้นท่านศาสตราจารย์ก็คงไม่รู้สึกประหลาดใจและลงมืออย่างกะทันหันเช่นนี้","ลินน์ปรายตามองอาร์พาดด้วยสายตาขี้เล่น และคาดเดาได้ในทันทีว่านี่น่าจะเป็นหมึกล่องหน","เห็นได้ชัดว่าอีกฝ่ายคิดตื้นเกินไปที่จะเอาลูกไม้เล็กๆ น้อยๆ แบบนี้มาซ่อนจากสายตาของเขา","สิ่งที่เรียกว่าหมึกล่องหนก็ไม่มีอะไรมากไปกว่าสเปกตรัมที่มองไม่เห็น ดังนั้น...พลังเวทมนตร์ของลินน์จึงสร้างปริซึมขึ้นมาในทันทีเพื่อแยกองค์ประกอบของแสงอาทิตย์ที่สาดส่องเข้ามาทางหน้าต่าง และรังสีอัลตราไวโอเลตซึ่งเป็นสิ่งที่มองไม่เห็นด้วยตาเปล่าเช่นกัน มารวมตัวกันและหักเหแสงลงบนกระดาษหนังแผ่นนั้น ในชั่วพริบตา ข้อความที่ล่องหนอยู่ก็ปรากฏขึ้นมาให้เห็นทันที","ใบหน้าของอาร์พาดซีดเผือดลง เขาแอบก่นด่านักสมุนไพรเฮงซวยคนนั้นในใจอย่างเงียบๆ ไหนบอกว่าของสิ่งนี้มันซ่อนเร้นได้มิดชิดจนแม้แต่พ่อมดเต็มตัวก็มองไม่เห็นยังไงล่ะ?","“อาร์พาด ข้าน่าจะเคยบอกไปแล้วนะว่าจุดจบของการโกงข้อสอบคืออะไร เจ้ากลับไปได้แล้ว!”","ลินน์โยนกระดาษกลับไปและเอ่ยด้วยน้ำเสียงเฉยชา","“ท่านศาสตราจารย์ ได้โปรดให้โอกาสข้าอีกสักครั้งเถิด...”","อาร์พาดอ้อนวอนด้วยความหวาดกลัว ปีนี้เขาอายุยี่สิบเก้าปีแล้ว หากเขาไม่สามารถเลื่อนขั้นเป็นพ่อมดระดับทางการได้ เขาก็จะถูกตัดสินว่าเป็นผู้ไร้ศักยภาพและถูกไล่ออกจากสถาบัน","ลินน์ยังคงไม่หวั่นไหว ในเมื่อเขาเลือกที่จะใช้ทางลัด เขาก็ต้องยอมรับความเสี่ยงที่จะตามมา หากเขาไม่ถูกลงโทษ มันก็จะไม่ยุติธรรมต่อคนที่ตั้งใจเรียนอย่างหนัก...","ดังนั้น ไม่ว่าอาร์พาดจะร้องไห้และอ้อนวอนมากเพียงใด ลินน์ก็ทำเพียงแค่โบกมือและขอให้ธีโอดอร์พานำตัวเขาออกไป เพื่อที่จะได้ไม่เป็นการรบกวนนักเรียนคนอื่นๆ ที่กำลังทำข้อสอบอยู่","แม้ว่าจะมีบทเรียนให้เห็นเป็นตัวอย่างแล้ว แต่ก็ยังมีนักเรียนอีกไม่น้อยที่พยายามจะโกงการสอบในครั้งนี้ โดยที่ทุกคนต่างก็เชื่อมั่น ว่าพวกเขาจะไม่มีทางถูกจับได้","สำหรับวิธีการโกงข้อสอบนั้น มีหลากหลายวิธีที่ยากจะบรรยายให้ครบถ้วน พวกที่โง่หน่อยก็เขียนลงบนมือหรือแขนเสื้อของตัวเองโดยตรง และแอบชำเลืองมองมันเมื่อไม่มีใครสังเกตเห็น","ส่วนพวกที่ฉลาดหน่อย ตัวอย่างเช่น มีพ่อมดฝึกหัดคนหนึ่งครอบครองเวทมนตร์ประเภทหนึ่งที่สามารถแอบดูคำตอบของคนอื่นผ่านการสะท้อนของแสงได้โดยที่ไม่มีใครสังเกตเห็น และเกือบจะตบตาอีกฝ่ายได้สำเร็จ","นอกจากนี้ยังมีวิธีการอย่างเช่นการใช้เวทเนตรส่องไกลเพื่อแอบดู โชคดีที่ลินน์นั้นมีประสบการณ์จากการผ่านสมรภูมิมาอย่างโชกโชน แน่นอนว่าในชาติก่อนของเขาไม่มีเวทมนตร์ แต่วิธีการโกงข้อสอบด้วยเทคโนโลยีขั้นสูงอันหลากหลายก็ไม่ได้ด้อยไปกว่าเวทมนตร์เลย ดังนั้นภายในเวลาไม่กี่นาที คนพวกนี้จึงถูกคัดแยกตัวออกมาทีละคนๆ","ห้องสอบเต็มไปด้วยเสียงคร่ำครวญ ในบรรดาพ่อมดฝึกหัดสองร้อยสามสิบคนที่เข้าสอบในครั้งนี้ มีจำนวนถึงสามสิบเจ็ดคนที่พยายามจะโกงข้อสอบด้วยวิธีการต่างๆ และทั้งหมดก็ถูกไล่ออกจากห้องสอบ พร้อมกับถูกตัดสินให้คะแนนเป็นโมฆะในทันที","เอล็อคมองดูบรรดาพ่อมดฝึกหัดที่ถูกตัดสิทธิ์จากการสอบเดินผ่านเขาไปด้วยสีหน้าอมทุกข์ แถมพวกเขายังต้องเผชิญกับบทลงโทษที่รุนแรง เขาจึงอดไม่ได้ที่จะกลืนน้ำลายลงคอ อันที่จริงเขาก็เตรียมโพยข้อสอบมาเหมือนกัน เพียงแต่เขาเอาแต่นั่งดิ้นรนต่อสู้กับจิตใจของตัวเองและไม่มีความกล้าพอที่จะหยิบมันออกมา","ท้ายที่สุดแล้ว ท่านศาสตราจารย์ก็เคยสร้างฝันร้ายทางจิตใจให้กับเขามาก่อนหน้านี้ แต่เขาก็ไม่ได้อยากจะหลบหนีจากหายนะ ในขณะที่แอบลอบยินดีอยู่ในใจ เขาก็ทำได้เพียงเค้นสมองและทำข้อสอบต่อไป","ถึงแม้ว่าคะแนนสอบภาคทฤษฎีจะแย่ลงมาสักหน่อย แต่หลังจากนี้ก็จะยังมีการสอบภาคปฏิบัติอยู่อีก ตราบใดที่เขาทำผลงานได้อย่างโดดเด่น มันก็ไม่ใช่ปัญหาเลยที่จะได้รับคะแนนดีๆ","ลิเดียที่อยู่ในห้องสอบเช่นเดียวกันกลับมีความคิดที่ตรงกันข้ามกับเอล็อคอย่างสิ้นเชิง","ในฐานะฮาล์ฟลิงที่ไม่มีพรสวรรค์ทางด้านเวทมนตร์ การที่นางได้รับอนุญาตให้เข้าสอบในครั้งนี้ได้ถือเป็นการอนุมัติกรณีพิเศษจากลินน์ แต่ท่านศาสตราจารย์จะไม่มีทางยอมยกเว้นให้นางอย่างแน่นอน","นั่นหมายความว่า นางถูกกำหนดมาแล้วว่าจะไม่ได้รับคะแนนใดๆ เลยในภาคปฏิบัติ ดังนั้นนางจึงทำได้เพียงทำงานให้หนักขึ้นอีกหน่อยในวิชาเล่นแร่แปรธาตุและสมุนไพรศาสตร์ ซึ่งประเมินดูแล้วว่ามันคงจะผ่านได้ยาก","และหากนางต้องการสอบผ่านอย่างราบรื่น นางก็จะต้องทำคะแนนภาคทฤษฎีให้ดีเยี่ยมแบบสุดๆ...","ลิเดียจึงต้องพยายามอย่างหนักเป็นพิเศษ ในฐานะผู้สร้างและนักบินเรือเหาะ นางคุ้นเคยกับการคำนวณพื้นที่และปริมาตรของรูปทรงเรขาคณิต รวมถึงสูตรสำหรับการตกอย่างอิสระหลายสูตร ดังนั้นคำถามพื้นฐานก่อนหน้านี้จึงถูกนางทำเสร็จสิ้นลงภายในเวลาเพียงหนึ่งชั่วโมงครึ่งเท่านั้น","แต่พอนางต้องมาทำคำถามอีกสิบกว่าข้อถัดไป นางก็ถึงกับต้องจนปัญญา เพราะคำถามเหล่านี้ถ้าไม่เกี่ยวข้องกับการเคลื่อนที่ของวัตถุบนท้องฟ้า ก็เกี่ยวข้องกับฟังก์ชัน แม้แต่คำถามที่ง่ายที่สุดก็ยังเกี่ยวข้องกับการคำนวณทางเรขาคณิตที่ซับซ้อนสุดๆ จนทำให้นางรู้สึกปวดหัวขึ้นมาเลยทีเดียว","ตัวอย่างเช่น หนึ่งในคำถามก็คือ...","[A B และ C คือตำแหน่งฐานยิงปืนใหญ่ทั้งสามแห่งของเรา A อยู่ทางทิศตะวันออกของ B ห่างออกไป 6,000 เมตร และ C อยู่ทางทิศตะวันตกเฉียงเหนือทำมุม 30 องศาจาก B ด้วยระยะทาง 5,000 เมตร P คือตำแหน่งของกองทหารนักบวชฝ่ายศัตรู ฝ่ายเราตรวจพบบิชอปคนหนึ่งที่กำลังใช้เวทมนตร์สื่อสาร เนื่องจากสถานที่ B และ C อยู่ห่างจากจุด P มากกว่าสถานที่ A จึงไม่พบร่องรอยของเวทมนตร์สื่อสารจนกระทั่งผ่านไปแล้วสามวินาที เป็นที่ทราบกันดีว่าความเร็วของเวทมนตร์สื่อสารคือ 1,000 เมตรต่อวินาที จงหามุมทิศที่ฐานยิง A จะต้องใช้เพื่อระดมยิงใส่ตำแหน่งของกองทหารนักบวช...]","มันยากมาก...","ลิเดียทำหน้าขมขื่น ขีดเขียนและวาดรูปบนกระดาษทด นางรู้สึกอยากจะยัดกระดาษข้อสอบทั้งหมดนี้เข้าไปในปากของท่านศาสตราจารย์เสียเหลือเกิน ท่านจะออกคำถามง่ายๆ กว่านี้สักหน่อยไม่ได้หรือไง?"]},{"n":317,"t":"เรื่องนี้มันน่าเหลือเชื่อยิ่งกว่าดวงอาทิตย์ร่วงหล่นลงมาจากฟากฟ้าเสียอีก!","c":["การสอบลากยาวมาตลอดทั้งช่วงเช้า และการสอบที่กินเวลาถึงสามชั่วโมงก็สิ้นสุดลงในที่สุด ทันทีที่เอล็อคและคนอื่นๆ เดินออกจากประตูห้องสอบ พวกเขาก็อดไม่ได้ที่จะถอนหายใจด้วยความโล่งอก จากนั้นพวกเขาก็เริ่มประหม่าและวิตกกังวลเมื่อต้องมาจับกลุ่มเทียบคำตอบของกันและกัน และในไม่ช้าแต่ละคนก็เริ่มหน้าดำหน้าแดงทุ่มเถียงกัน","“เป็นไปไม่ได้ ข้าตรวจทานตั้งหลายรอบแล้ว พ่อมดที่ประสบอุบัติเหตุทางอากาศและตกลงมา ควรจะตกถึงพื้นในวินาทีที่สามสิบเอ็ดสิ”","เอล็อคเอ่ยด้วยความมั่นใจ","“ถ้าอย่างนั้นเจ้าก็ต้องคำนวณผิดแล้วล่ะ สูตรสำหรับข้อนี้ควรจะเป็นระยะทาง S = ความเร็วต้น V * เวลา t + 1/2at^2 เจ้าต้องกำหนดให้เวลาของการตกอย่างอิสระเป็น t1...และในท้ายที่สุดก็จะได้เวลาของการตกรวมทั้งหมดคือยี่สิบสี่วินาที และระยะทางของการตกอย่างอิสระคือแปดสิบเมตร!”","พ่อมดฝึกหัดคนหนึ่งแย้งขึ้นมา","เอล็อคตรวจสอบการคำนวณในหัวของเขาอย่างรวดเร็ว และใบหน้าของเขาก็พลันดูไม่ได้ขึ้นมาทันที","จบเห่แล้ว นี่เขาทำผิดไปอีกข้อแล้วหรือเนี่ย","เพียร์ซที่อยู่ด้านข้างลอบถอนหายใจด้วยความโล่งอก โชคดีที่เมื่อคืนนี้เขาได้ทบทวนสูตรเกี่ยวกับการตกอย่างอิสระหลายสูตรอย่างเร่งด่วน มิฉะนั้นวันนี้เขาคงจะจบสิ้นของจริงอย่างแน่นอน","ภายในห้องสอบ ลินน์กำลังมองดูกระดาษคำตอบที่ถูกรวบรวมมา ซึ่งกำลังถูกตรวจให้คะแนนโดยธีโอดอร์และคนอื่นๆ","แม้ว่าพวกเขาอาจจะไม่สามารถทำข้อสอบพวกนี้ได้ด้วยตัวเอง แต่การมีเฉลยให้เทียบคำตอบนั้นก็ไม่ใช่ปัญหาเลยสำหรับพวกเขา","“ท่านศาสตราจารย์ลินน์ ดูเหมือนว่าในครั้งนี้จะมีคนสอบผ่านไม่มากนักนะขอรับ...”","ธีโอดอร์ส่ายหน้าหลังจากพลิกดูกระดาษข้อสอบกว่าสิบชุด ดูเหมือนว่าจะมีเพียงสามสิบเปอร์เซ็นต์เท่านั้นที่น่าจะสอบผ่านภาคทฤษฎี","มันยากขนาดนั้นเลยหรือ?","ลินน์เองก็รู้สึกแปลกใจเล็กน้อย สมองของบรรดาพ่อมดฝึกหัดควรจะยังคงใช้งานได้ดีสิ ไม่ต้องพูดถึงพวกที่เป็นอัจฉริยะ อย่างน้อยพวกเขาก็ต้องฉลาดกว่าคนทั่วไปอยู่แล้ว","แต่หลังจากที่ลองคิดดูให้ดีแล้ว ลินน์ก็ตระหนักถึงปัญหาได้อย่างรวดเร็ว","แม้ว่าคำถามที่เขาตั้งขึ้นในครั้งนี้จะไม่ยากนัก แต่ถ้าเทียบกันแล้ว พ่อมดฝึกหัดเหล่านี้ไม่ได้เรียนมาเป็นเวลานานนัก และเวลารวมทั้งหมดก็มีเพียงแค่ปีกว่าๆ เท่านั้น แถมยังมีเนื้อหาอีกมากมายที่พวกเขาต้องทำความเข้าใจ การที่เขายัดเยียดความรู้ด้านฟิสิกส์และเคมีในระดับประถมและมัธยมต้น หรือแม้แต่จุดที่ต้องทำความเข้าใจในระดับมัธยมปลายบางส่วนให้กับพวกเขาจนหมด","เมื่อรวมเข้ากับความจริงที่ว่าพวกเขาโดดเรียนอยู่เป็นครั้งคราวเพื่อไปจัดการกับธุระส่วนตัว หรือไม่ก็ไปเข้าร่วมงานสัมมนาทางวิชาการและสงครามระหว่างอาณาจักร พวกเขาจึงต้องใช้เวลาส่วนใหญ่ไปกับการศึกษาด้วยตนเองเสียมากกว่า","พอมองดูกระดาษข้อสอบในครั้งนี้แล้ว ดูเหมือนว่า...มันดูเหมือนว่า...อาจจะยากเกินไปหน่อยจริงๆ?","ลินน์ลูบคางของตนเอง และหลังจากที่ได้เห็นกระดาษข้อสอบที่ได้คะแนนสูงหลายฉบับ เขาก็ปัดความคิดนี้ทิ้งไปในทันที","ในเมื่อยังมีคนที่สามารถทำคะแนนสูงๆ ได้ นั่นก็หมายความว่าคำถามในข้อสอบที่เขาให้ไปนั้นไม่ได้ยากเกินความสามารถเลย...","ในหมู่พวกเขา จอห์นนี่คือคนที่ทำผลงานได้ดีที่สุดอย่างไม่ต้องสงสัย นอกเหนือจากคำถามที่ยากที่สุด ห้าข้อสุดท้ายที่เขาจงใจเตรียมเอาไว้ ซึ่งจอห์นนี่ทำผิดไปสามข้อ ส่วนข้ออื่นๆ นั้นก็ทำได้ถูกต้องทั้งหมด!","นอกเหนือจากการที่เป็นพ่อมดเต็มตัว ซึ่งมีพลังในการคำนวณแข็งแกร่งกว่าพวกพ่อมดฝึกหัดแล้ว เห็นได้ชัดเลยว่านางจะต้องตั้งใจเรียนอย่างหนักในช่วงวันธรรมดาด้วย","สิ่งที่ทำให้ลินน์ประหลาดใจมากที่สุดก็คือลิเดีย เพราะนางสามารถทำคะแนนสอบได้ถึงแปดสิบแปดคะแนน และข้อผิดพลาดทั้งหมดของนางก็ล้วนแล้วแต่เกี่ยวข้องกับคุณสมบัติของธาตุเวทมนตร์ทั้งสิ้น และนางถึงกับสามารถแก้โจทย์ปัญหาสำคัญทั้งหมดที่เขาเตรียมมาเป็นพิเศษได้เลยด้วยซ้ำ","“นางเป็นอัจฉริยะด้านวิศวกรรมจริงๆ!”","ลินน์เอ่ยด้วยความชื่นชม","“ท่านศาสตราจารย์ ท่านไม่ควรให้ลิเดียเข้าร่วมการประเมินในครั้งนี้เลยนะขอรับ จะเป็นอย่างไรหากนางสอบผ่านจริงๆ? ท่านจะมอบเหรียญตราพ่อมดให้กับฮาล์ฟลิงที่ใช้เวทมนตร์ไม่เป็นอย่างนั้นหรือขอรับ?”","ธีโอดอร์กล่าวด้วยความลังเล","“แน่นอน ตราบใดที่นางสามารถสอบผ่านได้สำเร็จ การได้กลายเป็นพ่อมดมันก็ไม่ใช่เรื่องใหญ่หรอก”","ลินน์กล่าวอย่างใจเย็น","“แต่ถ้าทำแบบนี้ ลิเดียอาจจะกลายเป็นตัวตลกของบรรดาพ่อมด และอาจจะมีบางคนพุ่งเป้าไปที่นาง โดยคิดว่านางดูหมิ่นสถานะอันสูงส่งของพ่อมด...”","ธีโอดอร์ดูเป็นกังวล เขารู้สึกว่าท่านศาสตราจารย์นั้นคิดตื้นเกินไปจริงๆ พ่อมดที่ใช้เวทมนตร์ไม่เป็น การมีเพียงแค่ชื่อมันจะมีประโยชน์อะไรเล่า?","“ถึงแม้นางจะร่ายเวทมนตร์ไม่ได้ แต่ลิเดียก็สามารถกลายเป็นนักเล่นแร่แปรธาตุได้ไม่ใช่หรือ? นางสร้างเรือเหาะขึ้นมาด้วยตัวเอง และนางยังมีส่วนสนับสนุนอย่างมากในการวิจัยเครื่องยนต์สันดาปภายในและปืนใหญ่แม่เหล็กไฟฟ้าด้วย”","ลินน์เอ่ยเตือนความจำ","ธีโอดอร์สำลักคำพูดไปชั่วขณะ หากมองจากมุมนี้ มันก็ไม่ใช่ปัญหาเลยที่จะเรียกเด็กสาวเผ่าฮาล์ฟลิงคนนี้ว่าเป็นนักเล่นแร่แปรธาตุ","แต่พ่อมดที่ใช้เวทมนตร์ไม่เป็น ไม่ว่าเขาจะคิดอย่างไรมันก็ยังคงเป็นเรื่องแปลกประหลาดอยู่ดี","ในขณะที่เขากำลังดิ้นรนหาคำพูดอยู่นั้น ลินน์ก็ยิ้มและพูดต่อ","“แล้วใครบอกเจ้ากันล่ะว่าลิเดียใช้เวทมนตร์ไม่ได้?”","ธีโอดอร์มีสีหน้างุนงง มันเป็นสามัญสำนึกในดินแดนพ่อมดอยู่แล้วที่ว่าฮาล์ฟลิงนั้นไม่มีพรสวรรค์ทางด้านเวทมนตร์ และยังไม่เคยมีใครทำลายกฎนี้ลงได้มาก่อนเลย","ลิเดียเองก็เป็นพ่อมดฝึกหัดมานานกว่าหนึ่งปีแล้ว แต่ผลก็คือนางไม่สามารถเรียนรู้ได้แม้กระทั่ง เวทรวบรวมน้ำ และ เวทแยกแยะวัสดุพื้นฐาน ซึ่งเป็นเวทมนตร์พื้นฐานที่สุด","หรือว่าท่านศาสตราจารย์จะสามารถทำให้คนที่ไร้พรสวรรค์สามารถเรียนรู้เวทมนตร์และกลายเป็นพ่อมดได้สำเร็จอย่างนั้นหรือ?!","เรื่องนี้มันน่าเหลือเชื่อยิ่งกว่าดวงอาทิตย์ร่วงหล่นลงมาจากฟากฟ้าเสียอีก!","ลินน์เก็บเป็นความลับและไม่ได้อธิบายอะไร เขาเพียงแค่บอกกับธีโอดอร์ว่า อีกเดี๋ยวในอีกไม่กี่วันข้างหน้าเจ้าก็จะได้รู้เอง","ในช่วงบ่าย กลุ่มพ่อมดฝึกหัดที่ถูกทรมานในการสอบภาคทฤษฎีในที่สุดก็ต้องมาเผชิญหน้ากับการสอบภาคปฏิบัติที่แสนจะคุ้นเคย","ธาตุเวทมนตร์ เวทแปรสภาพ การเล่นแร่แปรธาตุ ปรุงยา และบวกกับการฝึกซ้อมรบจริง รวมทั้งหมดห้าวิชา ซึ่งจะถูกแบ่งออกเป็นสองวัน...","เป็นเวลากว่าหนึ่งปีที่นักเรียนพ่อมดของอิเยตาได้เพิ่มหลักสูตรหนักๆ เข้ามามากมาย แต่หลายๆ อย่างก็มีความเกี่ยวโยงซึ่งกันและกัน","ตัวอย่างเช่น วิชาเคมีที่เกี่ยวข้องกับคุณสมบัติและการเปลี่ยนแปลงของธาตุเวทมนตร์ ดังนั้น วิชาพื้นฐานเหล่านี้จึงไม่ได้ถูกทิ้งไว้ข้างหลังเลย และการทำแบบฝึกหัดโจทย์ปัญหาคณิตศาสตร์เพื่อเพิ่มพลังในการคำนวณก็ยังทำให้ปริมาณพลังเวทที่พวกเขากักเก็บเอาไว้เข้าใกล้ขีดจำกัดสูงสุดด้วย ดังนั้น ในครั้งนี้จึงมีนักเรียนที่ยื่นขอเข้าสอบจบการศึกษามากกว่าปีก่อนๆ อยู่ไม่น้อยเลยทีเดียว","เมื่อรู้ตัวดีว่าตนเองนั้นทำคะแนนในการสอบภาคทฤษฎีช่วงเช้าได้ไม่ดีนัก เพียร์ซจึงพยายามอย่างหนักเป็นพิเศษ ซึ่งทำผลงานได้อย่างยอดเยี่ยมและสอบผ่านทั้งสี่วิชาแรกด้วยคะแนนระดับเกียรตินิยม","สำหรับการฝึกซ้อมรบจริงในช่วงสุดท้าย ถือว่าเป็นการสอบที่ง่ายที่สุดแล้ว โดยคู่ต่อสู้ของพวกเขาคือหุ่นเชิดเวทมนตร์สามตัว ซึ่งมีพลังการต่อสู้เทียบเท่ากับทหารยามที่ติดอาวุธครบมือเท่านั้น","แม้แต่ลิเดียเองก็ยังสามารถจัดการสังหารหุ่นเชิดเหล่านี้ทีละตัวๆ ด้วยปืนคาบศิลาลำกล้องสั้นที่ถูกสร้างขึ้นมาอย่างประณีต","ในเช้าของวันที่สาม ซึ่งเป็นเวลาของการประกาศผลคะแนนสอบ นักเรียนของสถาบันเวทมนตร์ทั้งหมดต่างก็มารวมตัวกัน พวกเขารอคอยด้วยความรู้สึกทุกข์ทรมานและวิตกกังวล","เมื่อได้รับใบแจ้งผลคะแนนและเห็นว่าสอบผ่านการประเมินสำเร็จ พวกเขาก็จะรู้สึกปีติยินดีขึ้นมาในทันที แต่เห็นได้ชัดว่ามีคนที่สอบตกมากกว่า","ในกรณีที่ต้องเอาคะแนนเฉลี่ยมาคำนวณรวมกันแล้ว มีไม่ถึงสี่สิบเปอร์เซ็นต์ด้วยซ้ำที่สอบผ่านการสอบจบการศึกษา","“บ้าเอ๊ย อีกแค่นิดเดียวแท้ๆ!”","เดบร้ามองดูตัวเลขห้าสิบแปดคะแนนอันโดดเด่นบนกระดาษด้วยความรู้สึกหงุดหงิดใจเป็นอย่างมาก หากนางทบทวนตำราอีกสักสองสามรอบ หรือถ้าท่านศาสตราจารย์ยอมผ่อนปรนให้อีกสักนิด นางก็คงจะสามารถสอบผ่านไปได้แล้ว","แต่ผลก็คือ ตอนนี้นางต้องรอไปอีกหนึ่งปีเต็ม...","เดบร้าแอบทบทวนความผิดพลาดของตนเองอยู่ในใจ และในขณะเดียวกัน เสียงโห่ร้องด้วยความดีใจก็ดังขึ้นที่ข้างตัวนาง","“เยี่ยมไปเลย...ข้าสอบผ่านแล้ว!”"]},{"n":318,"t":"หากแม้แต่เจ้ายังสามารถเรียนรู้เวทมนตร์ได้ แล้วแบบนี้มิใช่ว่าทุกคนสามารถกลายเป็นพ่อมดได้หรอกหรือ?","c":["ลิเดียถือกระดาษข้อสอบของนางเอาไว้ด้วยความปิติยินดีอย่างยิ่ง และตะโกนออกมาด้วยความตื่นเต้น นางไม่คาดคิดเลยว่านางจะสามารถสอบผ่านการสอบจบการศึกษาได้สำเร็จจริงๆ แถมคะแนนของนางก็ยังไม่ต่ำเลยด้วย!","แม้ว่านางจะได้ศูนย์คะแนนในวิชาแปรสภาพ ส่วนคะแนนของวิชาธาตุและวิชาสมุนไพรนั้นก็ถือว่าย่ำแย่มาก แต่เป็นเพราะนางได้คะแนนสูงมากในวิชาการต่อสู้และวิชาการเล่นแร่แปรธาตุ นางจึงสามารถสอบผ่านภาคปฏิบัติมาได้อย่างเฉียดฉิว","เมื่อนำมารวมกับผลคะแนนอันยอดเยี่ยมที่ได้รับจากการสอบภาคทฤษฎีแล้ว คะแนนเฉลี่ยของนางจึงอยู่ที่ 74 คะแนน ซึ่งถือได้ว่าเป็นคะแนนที่อยู่ในกลุ่มที่ดีที่สุดในบรรดาพ่อมดฝึกหัดแล้ว!","ผู้ที่รู้สึกตื่นเต้นยิ่งกว่าลิเดียก็คือดาร์เรนและคนอื่นๆ โดยพวกเขาแอบตามลิเดียเข้ามาในสถาบันตั้งแต่เช้าตรู่ เพียงเพื่อรอคอยช่วงเวลาที่จะมีการประกาศผลการสอบเท่านั้น","“ยอดเยี่ยมไปเลย ลิเดีย ดูเหมือนว่าเจ้ากำลังจะกลายเป็นฮาล์ฟลิงตนแรกที่เป็นพ่อมดแล้วนะ!”","“ข้าว่าแล้วว่าเจ้าต้องทำได้!”","เหล่าฮาล์ฟลิงที่อยู่ที่นั่นต่างก็เอ่ยออกมาด้วยความตื่นเต้น และพวกเขาทุกคนต่างก็เป็นประจักษ์พยานด้วยตาของตนเองว่าลิเดียสามารถก้าวมาถึงจุดนี้ในทุกวันนี้ได้อย่างไร","มันเป็นฉันทามติของดินแดนพ่อมดทั้งหมดว่าฮาล์ฟลิงนั้นไม่มีพรสวรรค์ทางด้านเวทมนตร์ แต่ลิเดียกลับไม่ยอมจำนนต่อโชคชะตา และนางก็ต้องการที่จะเข้าร่วมสถาบันอิเยตาเพื่อเรียนรู้เวทมนตร์และกลายเป็นนักเล่นแร่แปรธาตุที่แท้จริง!","ในสายตาของคนอื่นๆ นี่เป็นเรื่องที่เพ้อฝันอย่างไม่ต้องสงสัย และอาจถึงขั้นถูกตราหน้าว่าดื้อรั้นและโง่เขลา","ไม่ว่าอูฐที่ลากเกวียนอยู่บนพื้นดินจะพยายามอย่างหนักสักแค่ไหน มันก็ไม่สามารถบินขึ้นไปบนท้องฟ้าได้เหมือนกับกริฟฟอน ด้วยพรสวรรค์ทางด้านเวทมนตร์นั้นเป็นสิ่งที่มีมาตั้งแต่กำเนิด และช่องว่างระหว่างผู้มีพลังพิเศษกับคนธรรมดาสามัญนั้นถูกแบ่งแยกเอาไว้อย่างชัดเจนมาตั้งนานแล้ว!","แม้ว่านางจะไม่ได้รับการยอมรับ และยังคงถูกตั้งคำถามรวมไปถึงถูกเยาะเย้ยถากถาง แต่ลิเดียก็ไม่เคยคิดที่จะยอมแพ้ นางทำงานเป็นผู้ช่วยนักเล่นแร่แปรธาตุ และยังสร้างเครื่องจักรที่บินได้มากมายหลายชนิดเพื่อที่จะได้รับโอกาสสัมผัสกับเวทมนตร์!","ซึ่งความพยายามเหล่านี้ก็ล้มเหลวลงอย่างไม่ต้องสงสัย แต่ยังโชคดี ที่นางยังมีโชคอยู่บ้าง ซึ่งบังเอิญว่านางได้รับความชื่นชมจากท่านศาสตราจารย์ลินน์ และได้เข้าร่วมในการสร้างเรือเหาะ ด้วยเหตุนี้ นางจึงสามารถบรรลุข้อตกลงกับจอมเวทผู้ยิ่งใหญ่เฮลรามและเข้าร่วมกับสถาบันอิเยตาได้สำเร็จ","นับจนถึงตอนที่นางสอบผ่านการประเมิน เวลาก็ล่วงเลยมาถึงสองปีเต็มแล้ว ซึ่งนั่นก็หมายความว่า ในที่สุดเผ่าฮาล์ฟลิงก็จะมีพ่อมดที่แท้จริงถือกำเนิดขึ้นเสียที!","“มันยังเร็วเกินไปที่พวกเจ้าจะมาดีใจ การสอบผ่านในครั้งนี้มันเป็นเพียงแค่การได้รับคุณสมบัติในการดื่มต้นกำเนิดเวทมนตร์เท่านั้น มันไม่ได้หมายความว่าเจ้าจะสามารถกลายเป็นพ่อมดเต็มตัวได้หรอกนะ...”","เดบร้าพูดขัดจังหวะลิเดียและคนอื่นๆ ที่กำลังตื่นเต้นด้วยน้ำเสียงที่ค่อนข้างเบื่อหน่าย จากนั้นนางก็พูดต่อด้วยรอยยิ้มเยาะ","“ด้วยพรสวรรค์ทางด้านเวทมนตร์ของเจ้า แม้แต่การดื่มต้นกำเนิดเวทมนตร์ก็เป็นเพียงแค่ความสูญเปล่าเท่านั้น และมันก็ไม่มีความเป็นไปได้เลยสักนิดที่เจ้าจะกลายเป็นพ่อมดได้”","คำพูดอันแหลมคมของเดบร้าเปรียบเสมือนน้ำเย็นจัด ที่สาดลงมาดับความกระตือรือร้นของบรรดาฮาล์ฟลิง และบรรยากาศที่เคยคึกคักก็พลันเงียบสงัดลงในทันที...","เอล็อคและคนอื่นๆ ขมวดคิ้ว แต่พวกเขาก็ไม่สามารถหาคำพูดใดมาโต้แย้งได้เลย ท้ายที่สุดแล้ว ไม่ว่าคำพูดของเดบร้าจะฟังดูไม่น่ารื่นหูสักแค่ไหน แต่มันก็คือความจริง!","และพ่อมดฝึกหัดเหล่านี้ที่สอบผ่านการประเมิน ก็ยังมีอีกหนึ่งอุปสรรคที่ต้องก้าวผ่านไปให้ได้ นั่นก็คือพิธีเลื่อนระดับในขั้นตอนสุดท้าย!","ตามธรรมเนียมปฏิบัติในปีก่อนๆ จะมีเพียงครึ่งเดียวเท่านั้นที่สามารถเลื่อนระดับได้สำเร็จ และลิเดียก็ยังไม่สามารถเรียนรู้ได้แม้กระทั่งเวทมนตร์ระดับศูนย์วงแหวนจนถึงตอนนี้ ดังนั้น ความเป็นไปได้ที่นางจะกลายเป็นพ่อมดเต็มตัวจึงมีความหวังที่ริบหรี่มาก","เมื่อคิดได้เช่นนี้ เหล่านักเรียนที่สอบไม่ผ่านก็มองไปที่ลิเดียด้วยสายตาที่แฝงไปด้วยความเย้ยหยัน","แล้วจะทำไมล่ะถ้านางสอบผ่านการประเมินมาได้ด้วยความโชคดี?","การที่คนๆ หนึ่งจะกลายเป็นพ่อมดได้หรือไม่นั้น มันถูกกำหนดเอาไว้ตั้งแต่ตอนที่เขาเกิดมาแล้ว!","แม้ว่าปีนี้พวกเขาจะสอบตก แต่ปีหน้าหรือปีถัดๆ ไปก็จะยังมีการสอบอยู่อีก อย่างน้อยพวกเขาก็ยังมีความหวังที่จะได้รับการเลื่อนระดับให้เป็นพ่อมดเต็มตัว!","จอห์นนี่เห็นว่าลิเดียรู้สึกหดหู่เล็กน้อยจากคำพูดไม่กี่คำของเดบร้า นางจึงเอ่ยด้วยน้ำเสียงทุ้มต่ำ","“ในเมื่อท่านศาสตราจารย์ลินน์ไม่ได้ห้ามไม่ให้เจ้าเข้าร่วมการสอบจบการศึกษา บางทีเขาอาจจะมีวิธีที่จะทำให้เจ้ากลายเป็นพ่อมดก็ได้นะ!”","นางรู้สึกว่าท่านศาสตราจารย์ไม่น่าจะโหดร้ายถึงขนาดที่มอบความหวังให้กับผู้คนแล้วก็ทำลายมันทิ้งไปในเวลาเดียวกัน","ทันใดนั้นลิเดียก็รู้สึกว่าดวงตาของนางเปล่งประกายขึ้นมา หากเป็นคนอื่นที่มีวิธีทำให้นางกลายเป็นพ่อมด นางคงอดไม่ได้ที่จะรู้สึกสงสัย แต่ถ้าเป็นท่านศาสตราจารย์ลินน์ล่ะก็ มันจะต้องแตกต่างออกไปอย่างแน่นอน!","เดบร้าเบ้ปากและไม่เห็นด้วยกับคำพูดของจอห์นนี่ หากฮาล์ฟลิงยังสามารถเรียนรู้เวทมนตร์ได้ แล้วแบบนี้มิใช่ว่าทุกคนสามารถกลายเป็นพ่อมดได้หรอกหรือ?","แต่ก่อนที่นางจะได้พูดอะไรออกมาอีก ธีโอดอร์ก็เดินเข้ามาหา และเรียกให้นักเรียนที่สอบผ่านการประเมินเดินเข้าไปในหอคอยวิสลิ่งเพื่อเข้าร่วมพิธีเลื่อนระดับทีละคน","หลังจากที่เส้นทางการขนส่งทางอากาศถูกสร้างขึ้น กระบวนการเลื่อนระดับทั้งหมดก็รวดเร็วเป็นมาก หลังจากที่ยืนยันผลสอบของนักเรียนแต่ละคนเมื่อวานนี้ ลินน์ก็ได้ส่งคนไปรายงานต่อสภาเวทมนตร์ผ่านทางเรือเหาะ จากนั้นก็นำเอาต้นกำเนิดเวทมนตร์กลับมา ซึ่งกระบวนการไปกลับทั้งหมดนี้ ใช้เวลาเพียงแค่ครึ่งวันเท่านั้น และไม่จำเป็นต้องรอเป็นเวลาหนึ่งหรือสองสัปดาห์เหมือนอย่างแต่ก่อน","เดบร้าและคนอื่นๆ มองดูพ่อมดฝึกหัดที่ถูกขานชื่อและเดินเข้าไปในหอคอยสูงตระหง่านด้วยความอิจฉา ซึ่งพวกเขาก็ทำได้เพียงแค่รออยู่ข้างนอกเท่านั้น","เพียร์ซคือคนแรกที่ถูกเรียกชื่อ เขาเดินเข้าไปในหอคอยวิสลิ่งด้วยความวิตกกังวล และเมื่อเขาเห็นลินน์ เขาก็โค้งคำนับทำความเคารพอย่างนอบน้อม","“ท่านศาสตราจารย์ลินน์!”","“เพียร์ซ เกรดของเจ้าในครั้งนี้ถือว่าไม่เลวเลย แม้ว่าการสอบภาคทฤษฎีจะย่ำแย่ไปสักหน่อย แต่เจ้าก็สามารถทำความเข้าใจวิชาธาตุ วิชาแปรสภาพ และวิชาสมุนไพรได้เป็นอย่างดี...”","ลินน์ยิ้มและส่งขวดยาสีฟ้าขวดหนึ่งไปให้","เพียร์ซรับยาขวดนั้นมาด้วยความตื่นเต้น และเขาก็เกือบจะทำยาอันล้ำค่าหกเลอะเทอะด้วยมือที่สั่นเทา","ลินน์รู้สึกขบขันเมื่อเห็นเช่นนั้น และเขาก็เอ่ยเตือนเพียร์ซว่า เขาจะไม่สามารถเลื่อนระดับได้อย่างสมบูรณ์หากยังอยู่ในสภาพที่ย่ำแย่เช่นนี้","เพียร์ซสูดหายใจเข้าลึกๆ อยู่ครู่หนึ่งก่อนที่จะสงบสติอารมณ์ลงได้ จากนั้นเขาก็ดื่มต้นกำเนิดเวทมนตร์เข้าไปด้วยความขึงขัง","ความหนาวเหน็บอันเสียดแทงทะยานขึ้นมาจากช่องท้อง และพลังของยาก็พุ่งพล่านไปทั่วทั้งร่างกายอย่างรวดเร็ว ในท้ายที่สุดมันก็ไหลไปรวมกันอยู่ที่สมอง จากนั้นก็เกิดความรู้สึกคันยุกยิกแปลกๆ ที่ราวกับว่ามันเล็ดลอดออกมาจากกระดูก เซลล์ทุกเซลล์ในร่างกายราวกับว่าพวกมันกำลังถูกฉีกกระชากและจัดเรียงตัวใหม่ นั่นคือความเจ็บปวดที่หยั่งรากลึกลงไปในจิตวิญญาณ...","หยาดเหงื่อเม็ดโป้งไหลหยดลงมาจากหน้าผากของเพียร์ซ","ใบหน้าของเขาค่อยๆ เปลี่ยนเป็นสีม่วงคล้ำ ราวกับว่าเลือดในกายของเขาได้ถูกสูบออกไปจนหมด ซึ่งมันทำให้เขาดูน่าสะพรึงกลัวเป็นอย่างมาก","กระบวนการทั้งหมดกินเวลาประมาณสิบนาที และในไม่ช้าคลื่นพลังเวทอันแข็งแกร่งก็แผ่กระจายออกมาจากร่างของเพียร์ซ","ทันใดนั้น ลูกไฟที่ร้อนระอุพลันปรากฏขึ้นกลางอากาศ และเพียร์ซก็ลืมตาขึ้นในทันทีพร้อมกับสีหน้าที่เต็มไปด้วยความปีติยินดี การร่ายเวทมนตร์โดยไม่ต้องใช้วัสดุในการร่ายและสามารถจำลองธาตุต่างๆ ด้วยพลังเวทได้ นั่นล้วนแต่เป็นสัญลักษณ์ของพ่อมดเต็มตัว!","“ดูเหมือนว่าจะสำเร็จแล้วนะ!”","ลินน์พยักหน้าพร้อมกับรอยยิ้ม","“ขอบพระคุณมากขอรับท่านศาสตราจารย์ หากไม่ใช่เพราะท่าน ข้าเกรงว่าชีวิตนี้ข้าคงเป็นได้แค่พ่อมดฝึกหัดเท่านั้น”","เพียร์ซโค้งคำนับอย่างสุดซึ้งและกล่าวขอบคุณ","นับตั้งแต่ที่เขาเข้าเรียนที่สถาบันอิเยตาตอนอายุสิบสองปี เขาก็เป็นพ่อมดฝึกหัดมานานถึงสิบหกปีแล้ว และปีนี้เขาก็มีอายุเกือบจะสามสิบปีแล้วด้วย","เนื่องจากขาดพรสวรรค์ เขาจึงไม่สามารถกักเก็บพลังเวทได้เป็นเวลานาน จนกระทั่งลินน์ได้กลายมาเป็นศาสตราจารย์ของอิเยตา ซึ่งนำเอาหลักสูตรคณิตศาสตร์ที่แปลกใหม่และสามารถฝึกฝนพลังในการคำนวณมาสอน","ดังนั้น เพียร์ซจึงรู้สึกซาบซึ้งใจต่อท่านศาสตราจารย์เป็นอย่างมากอย่างไม่ต้องสงสัย..."]},{"n":319,"t":"โลกที่ทุกคนสามารถกลายเป็นผู้ใช้เวทมนตร์ได้!","c":["“ข้าก็แค่ให้โอกาสพวกเจ้าได้เลือก ส่วนการเลื่อนระดับนั้นขึ้นอยู่กับความพยายามของตัวเจ้าเอง”","ลินน์หยิบเหรียญตราพ่อมดที่เตรียมเอาไว้ออกมา และประดับมันลงบนหน้าอกของเพียร์ซด้วยมือของเขาเอง","“ตั้งแต่วันนี้เป็นต้นไป เจ้าคือพ่อมดเต็มตัวแล้ว!”","“ขอบพระคุณมากขอรับท่านศาสตราจารย์...”","น้ำเสียงของเพียร์ซสั่นเครือเล็กน้อย","ลินน์โบกมือเป็นเชิงบอกให้เพียร์ซกลับไปได้ จากนั้นเขาก็เรียกพ่อมดฝึกหัดคนต่อไปเข้ามา","เพียร์ซทำความเคารพอีกครั้งก่อนที่จะเดินออกจากหอคอยวิสลิ่ง","ประมาณสามนาทีต่อมา จอห์นนี่ก็เปิดประตูแล้วเดินเข้ามา ทั้งสองคนส่งยิ้มให้กัน และลินน์ก็ชี้ไปที่เก้าอี้ตรงหน้าเขา","“อยู่ตรงนี้สักสองสามนาทีก่อนค่อยออกไปก็แล้วกัน เผื่อว่าพวกเขาจะสังเกตเห็นถึงความผิดปกติ...”","เด็กสาวพยักหน้า อันที่จริงแล้วในช่วงเวลาที่ผ่านมานี้ เอล็อคและคนอื่นๆ ก็เริ่มสงสัยในตัวนางอยู่หลายครั้ง เพราะท้ายที่สุด นางก็มักจะร่ายเวทมนตร์ให้เห็นอยู่เสมอ แต่ทุกครั้งนางก็จะใช้ข้ออ้างว่านางใช้ไอเทมเวทมนตร์อย่าง ถุงมือเวท เพื่อบ่ายเบี่ยง","แต่ตอนนี้ นางก็ไม่ต้องคอยหลบๆ ซ่อนๆ อีกต่อไปแล้ว","และช่วงเวลาสิบนาทีนี้ก็ไม่ได้สูญเปล่าแต่อย่างใด จอห์นนี่หยิบกระดาษข้อสอบขึ้นมาและขอคำแนะนำจากลินน์เกี่ยวกับคำถามสองสามข้อสุดท้ายที่นางทำผิด...","ในช่วงไม่กี่ชั่วโมงต่อมา ลินน์ก็แจกเหรียญตราพ่อมดให้กับนักเรียนทุกคนที่เลื่อนระดับได้สำเร็จภายในหอคอยวิสลิ่ง หรือไม่ก็กล่าวปลอบใจผู้ที่ล้มเหลวให้พยายามต่อไป และพวกเขาอาจจะมีโอกาสอีกครั้งในปีหน้า","บางทีอาจเป็นเพราะการถูกทรมานด้วยข้อสอบจำนวนมหาศาลและการเพิ่มขึ้นของพลังในการคำนวณ อัตราการเลื่อนระดับในปีนี้จึงสูงกว่าเมื่อก่อนมาก โดยสูงถึง 60% เลยทีเดียว","นั่นก็หมายความว่า จะมีพ่อมดเต็มตัวหน้าใหม่เพิ่มขึ้นมาถึงสี่หรือห้าสิบคนในปีนี้","ลินน์มองดูกระดาษในมืออย่างครุ่นคิด ซึ่งมันได้บันทึกข้อมูลของนักเรียนแต่ละคนเอาไว้ และเขาก็วางแผนที่จะกำหนดตำแหน่งให้กับพวกเขาแต่ละคนตามผลคะแนนของพวกเขา","ผู้ที่มีผลคะแนนภาคทฤษฎีย่ำแย่แต่เชี่ยวชาญในการต่อสู้จริงจะกลายเป็นพ่อมดสายต่อสู้และเข้าร่วมสงครามกับจักรวรรดิ แต่ถ้าหากเป็นในทางกลับกัน พวกเขาก็จะกลายเป็นนักวิจัยทางวิทยาศาสตร์และมีส่วนร่วมในการพัฒนาอาวุธชนิดใหม่และเวทมนตร์บทใหม่","ในขณะที่กำลังครุ่นคิด ประตูก็ถูกผลักให้เปิดออกอีกครั้ง และคราวนี้ผู้ที่เดินเข้ามาก็คือ ลิเดีย","ทันทีที่เด็กสาวเผ่าฮาล์ฟลิงเดินเข้ามาในประตู นางก็เกาะขอบโต๊ะยาวเอาไว้และเอ่ยถามอย่างร้อนรน","“ท่านศาสตราจารย์ลินน์ ข้าสามารถกลายเป็นพ่อมดได้ด้วยหรือไม่คะ?”","ลินน์ได้สติกลับมาและหันไปถามนาง","“นั่นก็ขึ้นอยู่กับว่าเจ้าต้องการที่จะเป็นพ่อมดแบบไหน”","“แน่นอนว่าต้องเป็นพ่อมดที่สามารถร่ายเวทมนตร์ได้สิคะ!”","ลิเดียเอ่ยตอบโดยไม่ลังเล จากนั้นนางก็มองดูท่านศาสตราจารย์ด้วยความคาดหวัง ดวงตาของนางแทบจะเปล่งประกายออกมา","“ถ้าแค่ร่ายเวทมนตร์ได้ มันก็ไม่ใช่เรื่องยากอะไรหรอกนะ”","ลินน์เอ่ยพร้อมกับรอยยิ้ม","“จริงหรือคะ? ข้าก็สามารถใช้เวทมนตร์ได้ด้วยเช่นนั้นหรือ?”","ลิเดียตะโกนออกมาด้วยความประหลาดใจ แม้ว่าจอห์นนี่จะเคยพูดเรื่องนี้กับนางมาก่อน แต่มันก็เป็นเพียงแค่การคาดเดาเท่านั้น แต่ในตอนนี้มันได้รับการยืนยันจากท่านศาสตราจารย์ด้วยตัวเองแล้ว","“สวมสิ่งนี้เอาไว้ก่อนสิ!”","ลินน์ยื่นสร้อยข้อมือแบบพิเศษให้ ซึ่งมันก็เหมือนกับ แหวนแห่งศาสตร์เร้นลับ ที่ถูกใช้เพื่อสื่อสารกับเครือข่ายเวทมนตร์ และรูปลักษณ์ของมันก็ถูกปรับเปลี่ยนเพื่อสร้างความแตกต่าง","ลิเดียแทบจะรอไม่ไหวที่จะสวมมันไว้ที่ข้อมือของนาง และเอ่ยถามอย่างกระตือรือร้น","“แล้วตอนนี้ข้าก็สามารถใช้เวทมนตร์ได้แล้วใช่ไหมคะ?”","“แน่นอนว่าไม่!”","ลินน์ส่ายหัวอย่างขบขัน","“หลับตาลงก่อนแล้วก็ทำตัวตามสบาย!”","ลิเดียทำตามในทันทีและหลับตาปี๋ แต่นางก็ไม่สามารถผ่อนคลายได้เลยแม้แต่น้อย","ลินน์แอบสั่งให้ปัญญาประดิษฐ์สนับสนุนเชื่อมต่อเข้ากับสมองของเด็กสาวฮาล์ฟลิง ด้วยตัวอย่างของเรย์เดล และความไว้วางใจอย่างสูงที่ลิเดียมีต่อเขา ในครั้งนี้มันจึงดำเนินไปอย่างราบรื่นมาก และเด็กสาวฮาล์ฟลิงก็ไม่ต้องทนทุกข์ทรมานมากนัก หลังจากที่รู้สึกเจ็บปวดอยู่พักหนึ่ง การเชื่อมต่อกับเครือข่ายเวทมนตร์ก็เสร็จสมบูรณ์","ในไม่ช้าลิเดียก็พบว่านางได้เข้ามาอยู่ในสถานที่ที่แสนจะมหัศจรรย์ ท่ามกลางความว่างเปล่าของห้วงมิติ มีอักษรรูนสีเทานับไม่ถ้วนล่องลอยอยู่ และห้าตัวในนั้นก็ลอยเข้ามาหานาง พวกมันบินวนรอบตัวนางราวกับเด็กซุกซน ก่อนที่จู่ๆ พวกมันจะบินเข้าไปในหัวของนาง","[เวทแยกแยะวัสดุพื้นฐาน], [เวทควบแน่นน้ำ], [หัตถ์เวท], [เวทลูกไฟ], [เวทใบมีดน้ำแข็ง]...","ช่องสำหรับใส่เวทมนตร์ทั้งหมดห้าช่องปรากฏขึ้นในสมองของลิเดีย และเสียงของลินน์ก็ดังก้องขึ้นในหูของนางในเวลาเดียวกัน","“ตอนนี้เจ้าลองร่ายเวทมนตร์ดูสิ!”","ลิเดียลืมตาขึ้น และยื่นฝ่ามือออกไปด้วยความประหม่า นางกระตุ้นช่องเวทมนตร์ที่อยู่ภายในหัว ภายใต้การพุ่งพล่านของธาตุ ใบมีดน้ำแข็งที่ใสกระจ่างราวกับคริสตัลก็ปรากฏขึ้น มันแผ่ไอเย็นอันเย็นยะเยือกออกมา ทำให้ทุกคนที่อยู่รอบตัวนางรู้สึกหนาวสั่น พร้อมกับอุณหภูมิโดยรอบลดต่ำลงในทันที","“มันคือเวทมนตร์จริงๆ ด้วย!”","ลิเดียตะโกนออกมาอย่างมีความสุข จากนั้นนางก็ลองใช้เวทลูกไฟ ทำให้พลังแห่งน้ำแข็งและเปลวเพลิงไหลเวียนอยู่ในฝ่ามือของนางอย่างต่อเนื่อง และนางก็เล่นสนุกอยู่กับมันอย่างเพลิดเพลิน","แม้ว่าเวทเหล่านี้จะเป็นเพียงแค่เวทมนตร์ขั้นพื้นฐาน แต่มันก็ทำให้นางรู้สึกพึงพอใจเป็นอย่างมากแล้วสำหรับเด็กสาวฮาล์ฟลิงที่ไม่เคยแม้แต่จะสามารถใช้เวทมนตร์ได้เลย","“ท่านศาสตราจารย์ ท่านยอดเยี่ยมที่สุดเลยค่ะ!”","ลิเดียกระโดดโลดเต้นด้วยความตื่นเต้นไปตรงหน้าลินน์ และจูบลงบนแก้มของเขาแรงๆ สองสามครั้งเพื่อแสดงถึงความตื่นเต้นของนาง","ลินน์เช็ดน้ำลายบนใบหน้าของเขาด้วยความรังเกียจ และเอ่ยเตือนนาง","“จำเอาไว้ พลังจิตของเจ้ามีอยู่อย่างจำกัด ดังนั้นในหนึ่งวัน เจ้าจึงสามารถร่ายเวทมนตร์ระดับศูนย์วงแหวนได้เพียงห้าครั้ง และเวทมนตร์ระดับหนึ่งวงแหวนได้เพียงสามครั้งเท่านั้น”","ลิเดียพยักหน้ารับอย่างรวดเร็ว และนางก็ไม่ได้สนใจข้อจำกัดเหล่านั้นเลยแม้แต่น้อย อย่างน้อยตอนนี้นางก็เป็นพ่อมดจริงๆ แล้ว!","นางอยากจะเห็นนักว่าจะมีใครกล้าพูดว่านางไม่ใช่พ่อมดอีก...","ลิเดียแทบจะรอไม่ไหวที่จะออกไปอวดเบ่ง แต่ก่อนที่นางจะได้เดินออกไป ลินน์ก็หยุดนางเอาไว้เสียก่อน","“เจ้าไม่อยากได้เหรียญตราพ่อมดของเจ้าแล้วหรือ?”","ลินน์เอ่ยถามอย่างจนปัญญา","“อยากได้สิคะ อยากได้ค่ะ!”","ลิเดียรีบวิ่งกลับมาอย่างลนลาน นางรอคอยอย่างอดทนให้ท่านศาสตราจารย์ติดเหรียญตราให้กับนาง จากนั้นนางก็วิ่งออกไปอย่างมีความสุข","เมื่อมองดูท่าทางกระโดดโลดเต้นของลิเดีย ลินน์ก็อดไม่ได้ที่จะยิ้มออกมา จากนั้นเขาก็เริ่มสำรวจปัญหาเกี่ยวกับการสูญเสียพลังเวทของปัญญาประดิษฐ์สนับสนุน","เพาะมันไม่ได้มาเปล่าๆ ในการที่คนที่ไม่มีความรู้เรื่องเวทมนตร์จะสามารถร่ายเวทมนตร์ได้สำเร็จ และพลังเวทนั้นก็ไม่ได้ถูกสร้างขึ้นมาจากความว่างเปล่า แต่มันดึงมาจากเครือข่ายเวทมนตร์ของเขาเท่านั้น","นี่คือความพยายามครั้งที่สองของลินน์ในการทำลายทฤษฎีพรสวรรค์ทางด้านเวทมนตร์ที่มีมาตั้งแต่กำเนิด ซึ่งในตอนนี้มันก็ดูเหมือนว่าจะประสบความสำเร็จแล้ว แต่ก็ยังมีปัญหาอีกมากมายที่ต้องรอการแก้ไข","ยกตัวอย่างเช่น เรื่องการจัดหาพลังเวท เพราะพลังเวทที่สูญเสียไปนั้นจะต้องไม่ให้ปัญญาประดิษฐ์สนับสนุนเป็นผู้รับภาระทั้งหมด และวิธีที่ดีที่สุด ก็คือการสร้างเตาปฏิกรณ์พลังเวทขึ้นมา โดยคล้ายกับการสร้างโรงไฟฟ้า จากนั้นก็เชื่อมต่อมันเข้ากับ เครือข่ายเวทมนตร์ขนาดใหญ่ เพื่อคอยจ่ายพลังเวทที่จำเป็นสำหรับการร่ายเวทมนตร์ให้แก่พ่อมดหน้าใหม่เหล่านี้","ตามวิสัยทัศน์ของเขาแล้ว ในอาณาจักรเวทมนตร์แห่งอนาคต ไม่ว่าทุกคนจะมีพรสวรรค์ในการเป็นพ่อมดหรือไม่ก็ตาม ตราบใดที่พวกเขาได้เรียนรู้หลักการของเวทมนตร์และมีพลังในการคำนวณมากพอ พวกเขาก็จะสามารถใช้เครือข่ายเวทมนตร์เพื่อร่ายเวทมนตร์ที่สอดคล้องกันได้!","แทนที่จะเป็นเหมือนอย่างในปัจจุบัน ที่ชาติกำเนิดเป็นตัวกำหนดว่าสามัญชนจะสามารถกลายเป็นพ่อมดได้หรือไม่","โลกที่ทุกคนสามารถกลายเป็นผู้ใช้เวทมนตร์ได้ บางทีมันอาจจะสามารถก้าวข้ามสหพันธรัฐในชาติก่อน และผลักดันเวทมนตร์ให้ก้าวไปสู่ระดับใหม่ได้อย่างแท้จริง"]},{"n":320,"t":"หรือว่าเจ้าหมกมุ่นอยู่กับการใช้เวทมนตร์มากเกินไปจนเกิดภาพหลอนกันล่ะ?","c":["ภายนอกหอคอยวิสลิ่ง กลุ่มนักเรียนกำลังรวมตัวกันอยู่ที่หน้าประตู เพื่อรอคอยผลลัพธ์ของพิธีเลื่อนระดับ","เป็นระยะๆ ที่จะมีคนเดินออกมาจากหอคอยด้วยความปีติยินดี และได้รับสายตาที่อิจฉาริษยา แต่ก็มีคนจำนวนไม่น้อยที่ล้มเหลวและต้องเดินคอตกกลับไป","ดาร์เรนและคนอื่นๆ มองดูลิเดียเดินเข้าไปในหอคอย โดยพวกเขาก็รอคอยอย่างกระวนกระวายใจ และภายในเวลาไม่ถึงสองนาที พวกเขาก็เห็นประตูของหอคอยเปิดออกอีกครั้ง","เร็วขนาดนี้เลยหรือ?","ดาร์เรนลอบกังวลอยู่ในใจ เพราะนักเรียนที่เลื่อนระดับได้สำเร็จก่อนหน้านี้ ก็บอกไว้อย่างชัดเจนว่า มันต้องใช้เวลาในการที่ยาจะปรับเปลี่ยนสภาพร่างกาย ซึ่งมันก็อาจจะเร็วหรือช้าแตกต่างกันไป แต่โดยทั่วไปแล้ว มันจะใช้เวลาประมาณสิบนาที...","หรือว่าการเลื่อนระดับจะล้มเหลวกัน?","เขาเพิ่งจะคิดเรื่องนี้อยู่ได้ไม่นาน แต่ในวินาทีต่อมา ดาร์เรนก็ปฏิเสธข้อสันนิษฐานนี้ไปในทันที เพราะลิเดียที่เพิ่งเดินออกมาจากหอคอยนั้นมีเหรียญตราพ่อมดที่ส่องแสงระยิบระยับประดับอยู่บนหน้าอก ซึ่งมันดูเจิดจ้ามากเมื่ออยู่ภายใต้แสงแดด","สายตาของทุกคนถูกดึงดูดไปที่นั่น ซึ่งนั่นหมายความว่าสถาบันอิเยตา...ไม่สิ ต้องบอกว่าดินแดนพ่อมดทั้งหมดกำลังจะมีฮาล์ฟลิงตนแรกที่เป็นพ่อมด!","“ขอแสดงความยินดีด้วยนะลิเดีย เจ้าได้สร้างประวัติศาสตร์หน้าใหม่ให้กับเผ่าฮาล์ฟลิงแล้ว!”","จอห์นนี่กล่าวแสดงความยินดีอย่างมีความสุข","เอล็อคและคนอื่นๆ ที่คุ้นเคยกับเด็กสาวต่างก็ก้าวไปข้างหน้าเพื่อแสดงความยินดี โดยพวกเขาก็รู้สึกดีใจกับนางอย่างแท้จริง","ลิเดียยืดอกขึ้นอย่างภาคภูมิใจภายใต้สายตาของทุกคน ตั้งแต่วันนี้เป็นต้นไป นางคือพ่อมดเต็มตัวแล้ว","“ข้าไม่คิดเลยว่าท่านศาสตราจารย์จะอนุญาตให้คนที่ไม่รู้จักเวทมนตร์กลายเป็นพ่อมดได้จริงๆ!”","เดบร้าเอ่ยด้วยความอิจฉาริษยา","พ่อมดฝึกหัดที่ดื่มยาเข้าไปแต่ไม่สามารถเลื่อนระดับได้สำเร็จ ต่างก็มองไปที่เด็กสาวฮาล์ฟลิงด้วยความรู้สึกไม่พอใจมากยิ่งขึ้น","เช่นเดียวกับลิเดีย พวกเขาต่างก็สอบผ่านการสอบข้อเขียนและการสอบภาคปฏิบัติมาแล้วทั้งคู่ แต่ท่านศาสตราจารย์กลับไม่มอบสถานะพ่อมดให้กับพวกเขา แต่กลับมอบเกียรตินี้ให้กับฮาล์ฟลิงที่แม้แต่เวทมนตร์ก็ยังใช้ไม่เป็น ซึ่งมันทำให้พวกเขาอดไม่ได้ที่จะแอบบ่นถึงความลำเอียงของท่านศาสตราจารย์ลินน์อยู่ในใจ","“ใครบอกว่าข้าใช้เวทมนตร์ไม่เป็นกัน?”","ลิเดียยื่นมือออกไปอย่างภาคภูมิใจ และเตรียมพร้อมที่จะร่ายเวทลูกไฟอย่างใจเย็น เพื่อเบิกเนตรให้ทุกคนได้เห็น","บรรดาพ่อมดฝึกหัดและพ่อมดเต็มตัวที่อยู่ที่นั่นต่างก็มองดูด้วยความสงสัย โดยรู้ดีว่า ลิเดียนั้นใช้เวลาถึงสองปีเต็มในสถาบันอิเยตาแต่ก็ไม่สามารถเรียนรู้เวทมนตร์ได้","ลิเดียจดจ่ออยู่กับการสื่อสารกับเครือข่ายเวทมนตร์ และพยายามกระตุ้นช่องเวทมนตร์ที่อยู่ในหัวของนาง แต่หลังจากที่พยายามอยู่นาน มันก็ไม่มีการตอบสนองใดๆ เลย","“เอ๊ะ ทำไมมันถึงใช้ไม่ได้ล่ะ?”","ลิเดียลืมตาขึ้นและเอ่ยออกมาอย่างว่างเปล่า","“หรือว่าเจ้าหมกมุ่นอยู่กับการใช้เวทมนตร์มากเกินไปจนเกิดภาพหลอนกันล่ะ?”","เดบร้าเอ่ยด้วยรอยยิ้มเยาะ","ลิเดียเบ้ปาก จากนั้นนางก็พลันนึกขึ้นได้ว่าท่านศาสตราจารย์บอกว่าด้วยพลังในการคำนวณของนาง นางสามารถใช้เวทมนตร์ระดับหนึ่งวงแหวนได้เพียงวันละสามครั้งเท่านั้น เมื่อกี้ตอนที่อยู่ในหอคอยวิสลิ่ง นางตื่นเต้นมากเกินไป และดูเหมือนว่านางจะใช้มันจนหมดโควตาไปแล้ว!","ถ้างั้นก็คงต้องเปลี่ยนไปใช้เวทมนตร์ระดับศูนย์วงแหวนแทน...ซึ่งนางจำได้ว่านางยังใช้มันไม่หมด","เมื่อคิดได้เช่นนั้น ลิเดียก็ร่ายหัตถ์เวทในทันที จากนั้นกระดาษข้อสอบที่อยู่ในมือของทุกคนก็สั่นไหวอย่างกะทันหัน ก่อนที่พวกมันจะลอยขึ้นไปในอากาศ บินวนรอบตัวนาง แล้วก็ไปกองรวมกันอยู่ในมือของนาง","“นี่...นี่มัน หัตถ์เวท”","ดวงตาของเดบร้าเบิกกว้าง ใบหน้าของนางเต็มไปด้วยความประหลาดใจ และนางก็ต้องใช้เวลาอยู่ครู่หนึ่งเพื่อยืนยันว่าไม่ได้มีใครกลั่นแกล้งนาง","คนที่ร่ายเวทเมื่อครู่นี้ก็คือลิเดีย!","“เจ้าเรียนรู้เวทมนตร์ได้จริงๆ ด้วย ลิเดีย!”","ดาร์เรนวางมือลงบนไหล่ของลิเดียด้วยความตื่นเต้นและเขย่าไปมา","แม้ว่านี่จะเป็นเพียงแค่เวทมนตร์ระดับศูนย์วงแหวนขั้นพื้นฐานที่สุด แต่มันก็หมายความว่าอีกฝ่ายได้ครอบครองปาฏิหาริย์ที่เรียกว่าเวทมนตร์แล้ว!","“แน่นอนสิ! ข้ายังสามารถร่าย เวทลูกไฟกับเวทใบมีดน้ำแข็งได้ด้วยนะ แต่เมื่อกี้ข้าเผลอใช้มันไปหลายครั้ง ตอนนี้ข้าเลยต้องรอจนถึงพรุ่งนี้ถึงจะใช้มันได้อีก...”","ลิเดียเอ่ยอย่างภาคภูมิใจ และในขณะเดียวกันนางก็รู้สึกรำคาญตัวเองเล็กน้อย ถ้ารู้อย่างนี้ นางน่าจะเก็บช่องเวทมนตร์ระดับหนึ่งวงแหวนเอาไว้สักช่อง เพื่อเอามาโชว์ให้ทุกคนได้เห็นชัดๆ","อย่างไรก็ตาม เมื่อเห็นว่าลิเดียสามารถร่ายเวทมนตร์ได้สำเร็จ ก็ไม่มีใครตั้งคำถามกับคำพูดของนางอีก ท้ายที่สุดแล้ว พลังเวทและพลังจิตของทุกคนล้วนมีขีดจำกัด การตกอยู่ในสภาวะที่พลังเวทเหือดแห้งนั้นเป็นเรื่องปกติ","กล่าวอีกนัยหนึ่งก็คือ เด็กสาวฮาล์ฟลิงที่อยู่ตรงหน้านี้ได้กลายเป็นพ่อมดจริงๆ แล้ว!","แต่ว่า...ท่านศาสตราจารย์ทำมันได้อย่างไรกัน?","ฮาล์ฟลิงไม่มีพรสวรรค์ทางเวทมนตร์ ซึ่งเป็นฉันทามติของดินแดนพ่อมดแห่งนี้ที่ไม่เคยมีใครทำลายได้มาก่อน หรือว่าลิเดียจะเป็นกรณีพิเศษ ที่หลังจากดื่มต้นกำเนิดเวทมนตร์เข้าไปแล้ว นางก็สามารถทำลายพันธนาการของเผ่าพันธุ์และได้รับความสามารถในการร่ายเวทมนตร์มา?","ท่านศาสตราจารย์อาจจะมองเห็นพรสวรรค์ในการเป็นพ่อมดของนาง เขาถึงยอมให้ลิเดียเข้ามาเรียนที่สถาบันอิเยตา...","เอล็อคและคนอื่นๆ ต่างก็ครุ่นคิดด้วยความสับสน แต่พวกเขาไม่ได้คิดไปในทิศทางที่สุดโต่งมากนัก ท้ายที่สุดแล้ว หากท่านศาสตราจารย์มีวิธีที่จะทำให้ใครๆ ก็สามารถกลายเป็นพ่อมดเต็มตัวได้จริงๆ มันคงจะเป็นเรื่องที่น่าเหลือเชื่อมากเกินไป และการคาดเดาว่าฮาล์ฟลิงตนนี้มีพรสวรรค์ทางด้านเวทมนตร์นั้นดูเป็นไปได้มากกว่าการคาดเดาที่เหลือเชื่อแบบนั้นเป็นร้อยเท่า!","การสอบจบการศึกษาของสถาบันอิเยตากินเวลานานถึงสี่วันเต็มก่อนที่มันจะสิ้นสุดลง และเอล็อคกับคนอื่นๆ ที่บอกลาสถานะพ่อมดฝึกหัดของตนเอง ก็ถูกส่งตัวไปประจำการตามหน่วยงานต่างๆ อย่างรวดเร็ว","อย่างไรก็ตาม ในทุกๆ ด้านต่างก็ต้องการกำลังคน โดยเฉพาะพ่อมดที่เชี่ยวชาญในด้านการแปรสภาพ ตั้งแต่การปรับปรุงเครื่องยนต์สันดาปภายใน การสร้างเรือรบหุ้มเกราะ ไปจนถึงการปรับปรุงปืนคาบศิลาและปืนใหญ่ ผู้สำเร็จการศึกษาทั้ง 47 คนล้วนแต่เป็นพ่อมดที่จบมาเพื่อการนี้","ในช่วงไม่กี่วันที่ผ่านมา เรย์เดลและแฮมม์ก็ไม่ได้อยู่นิ่งๆ เลย พวกเขาได้เรียนรู้เกี่ยวกับทุกแง่มุมของเมืองพ่อมดแห่งนี้ และยังได้ไปยังโรงงานต่างๆ เพื่อสัมผัสกับมันด้วยตัวเอง","งานเหล่านี้เป็นงานที่เหนื่อยมากจริงๆ โดยต้องทำงานวันละสิบสี่ชั่วโมง แต่เงินเดือนในแต่ละเดือนก็มากพอที่จะทำให้ทุกคนลืมความเจ็บปวดทางร่างกายไปได้จนหมดสิ้น และทุกคนต่างก็หวงแหนชีวิตในปัจจุบันของตนเองเป็นอย่างมาก พวกเขาไม่จำเป็นต้องมีผู้คุมคอยจับตามองด้วยซ้ำ","นั่นก็เป็นเพราะพ่อมดที่ดูแลสถานที่แห่งนั้นบอกกับพวกเขาว่า สิ่งของส่วนใหญ่ที่ผลิตในโรงงานแห่งนี้ถูกเตรียมเอาไว้เพื่อทำสงคราม ซึ่งมันจะเป็นตัวตัดสินความสำเร็จหรือความพ่ายแพ้ของสงครามในครั้งนี้เป็นอย่างมาก","และเมื่อใดก็ตามที่สภาเวทมนตร์พ่ายแพ้ จักรวรรดิก็จะเข้ายึดครองสถานที่แห่งนี้ และพวกเขาก็จะต้องกลับไปใช้ชีวิตแบบเดิมๆ ที่กินข้าวมื้อนี้โดยไม่รู้ว่าจะมีมื้อหน้าให้กินหรือไม่ ซึ่งมันอาจจะเลวร้ายยิ่งกว่านั้นด้วยซ้ำ","ข้าได้ยินมาว่าพวกขุนนางและศาสนจักรที่อยู่ภายนอกดินแดนพ่อมดนั้นโหดเหี้ยมมาก พวกเขาจะไม่ลังเลเลยที่จะสังหารหมู่ผู้คนทั้งเมือง ปล้นชิงทรัพย์สิน สังหารทุกคนที่ไม่ศรัทธาในพระเจ้า หรือไม่ก็จับพวกเขาไปขายเป็นทาสในดินแดนอันแห้งแล้ง","ด้วยเหตุนี้ คนงานจึงยอมทำงานล่วงเวลาด้วยความสมัครใจ และทำงานด้วยความกระตือรือร้นอย่างเต็มเปี่ยม เพื่อรักษาชีวิตในปัจจุบันของพวกเขาเอาไว้...","หลังจากที่อยู่ในโรงงานมาเป็นเวลาห้าวัน ในที่สุดเรย์เดลก็ต้องจำใจเดินทางไปยังพื้นที่เพาะปลูกธัญพืชที่พวกพ่อมดบุกเบิกเอาไว้ตามคำเชิญของลินน์ เพราะวันนี้คือวันสำหรับการเก็บเกี่ยวในฤดูร้อน!","และสิ่งที่ปรากฏอยู่ตรงหน้าของเรย์เดลก็คือ ภาพที่งดงามตระการตาเป็นอย่างยิ่ง มีทุ่งข้าวสาลีสีทองทอดยาวไปไกลสุดลูกหูลูกตา กินอาณาบริเวณไปจนสุดขอบฟ้า ซึ่งดูงดงามตระการตาราวกับมหาสมุทรสีทองก็ไม่ปาน"]},{"n":321,"t":"แนวคิดของการระเบิดนิวเคลียร์!","c":["เดิมทีที่นี่เคยเป็นผืนดินที่แห้งแล้ง ซึ่งเป็นดินเค็มที่หลงเหลืออยู่หลังจากที่น้ำทะเลลดลง แต่ในตอนนี้ มันกลับกลายเป็นผืนดินที่อุดมสมบูรณ์ภายใต้อำนาจอันยิ่งใหญ่ของเวทมนตร์","สิ่งที่ดึงดูดความสนใจของเรย์เดลและคนอื่นๆ ก็คือ พ่อมดจากสถาบันวิจัยการแปรธาตุกำลังปรับแต่งขั้นตอนสุดท้ายให้กับเครื่องเก็บเกี่ยวที่มีรูปร่างหน้าตาประหลาดเหล่านั้น","“ท่านพ่อมด เครื่องนี้มันสามารถเปลี่ยนรวงข้าวสาลีให้กลายเป็นเมล็ดข้าวได้โดยอัตโนมัติเลยจริงๆ หรือขอรับ?”","ชายวัยสามสิบเศษคนหนึ่งชะโงกหน้าไปที่ด้านหน้าของเครื่องจักร เขามองดูพวกพ่อมดสตาร์ทเครื่องจักร และอดไม่ได้ที่จะเอ่ยถามออกมา","เบียต เป็นชาวนาของที่นี่ เนื่องจากการรับสมัครคนงานจำนวนมหาศาลในโรงงาน ทำให้คนยากคนจนที่เคยหาเลี้ยงชีพด้วยการทำนาต่างก็พากันเปลี่ยนงาน แต่เพื่อป้องกันไม่ให้ที่ดินเหล่านี้ถูกทิ้งร้าง ลินน์จึงถือโอกาสนี้นำนโยบายการทำสัญญาเช่าที่ดินมาใช้ เพื่อเตรียมพร้อมสำหรับการทำฟาร์มขนาดใหญ่ที่ใช้เครื่องจักรกลอย่างเต็มรูปแบบ","เบียต เลยใช้ประโยชน์จากโอกาสทองนี้ ยอมทุบกระปุกเอาเงินเก็บทั้งหมดของเขาออกมาเช่าที่ดินโดยรอบ!","นี่คือผลลัพธ์จากการทำงานหนักมานานกว่าครึ่งปีของเขา ทุ่งข้าวสาลีแห่งนี้มีค่ามากกว่าลูกชายแท้ๆ ของเขาเสียอีก!","“แน่นอน ไม่มีปัญหาอยู่แล้ว!”","ฟิลิปเอ่ยอย่างมั่นใจ","เพื่อที่จะสร้างแบบแปลนที่ท่านศาสตราจารย์มอบให้ พวกเขาต้องใช้ความพยายามอย่างมาก และสูญเสียเซลล์สมองไปนับไม่ถ้วนก่อนที่จะสร้างสิ่งนี้ขึ้นมาได้สำเร็จ แม้ว่าพวกเขาจะยังไม่ได้ลองใช้มัน แต่ฟิลิปก็มีความมั่นใจอย่างเต็มเปี่ยม","เขาแค่ไม่รู้ว่าปรมาจารย์ท่านไหนเป็นคนประดิษฐ์เครื่องเก็บเกี่ยวเครื่องนี้ขึ้นมา?","ถึงสามารถคิดค้นสิ่งประดิษฐ์ที่ประณีตเช่นนี้ขึ้นมาได้...","“ท่านศาสตราจารย์ลินน์ พวกเราเริ่มกันได้เลยหรือยังครับ?”","ฟิลิปหันไปมองลินน์และเอ่ยถามด้วยความคาดหวัง","ลินน์พยักหน้าพร้อมกับรอยยิ้ม เขาก็อยากรู้เหมือนกันว่าเครื่องเก็บเกี่ยวที่สถาบันวิจัยการแปรธาตุสร้างขึ้นมาจะมีประสิทธิภาพมากแค่ไหน","เมื่อได้รับอนุญาต ฟิลิปก็ปล่อยให้เพื่อนร่วมงานที่กระตือรือร้นหลายคนขึ้นไปบนเครื่องเก็บเกี่ยว","ฉึกฉัก","เมื่อคันโยกถูกดึง เครื่องจักรประหลาดเหล่านี้ก็ส่งเสียงออกมาในทันที","ภายใต้สายตาอันตึงเครียดของทุกคน เครื่องเก็บเกี่ยวก็แล่นตรงไปที่ทุ่งข้าวสาลี ส่วนที่รองรับเมล็ดพืชที่ด้านล่างก็ถูกสอดเข้าไปในต้นพืช กวาดรวบรวงข้าวสาลีเข้าสู่ตัวเครื่อง จากนั้นอุปกรณ์ตัดที่อยู่ภายในก็ตัดและลำเลียงพวกมันเข้าไปในถังนวดข้าวของเครื่องเก็บเกี่ยว โดยเมล็ดข้าวสาลีจะถูกคัดแยกผ่านรูตะแกรงในขั้นตอนสุดท้าย และเมล็ดข้าวสาลีที่แยกออกมาก็จะถูกเก็บไว้ในกล่องเก็บของที่อยู่ด้านหลัง","กระบวนการนี้ฟังดูซับซ้อน แต่มันก็ทำงานโดยอัตโนมัติด้วยเครื่องจักรทั้งหมด สิ่งที่พวกเขาต้องทำก็มีเพียงแค่การขับเครื่องเก็บเกี่ยวและแล่นตรงไปในทุ่งข้าวสาลีอันกว้างใหญ่!","เพียงเวลาสั้นๆ พื้นที่หลายพันตารางเมตรก็ถูกเก็บเกี่ยวจนหมด...","ฟิลิปภูมิใจเป็นอย่างมากที่ได้แนะนำวิธีการทำงานและหลักการของเครื่องเก็บเกี่ยวให้เบียต เรย์เดล และคนอื่นๆ ได้ฟัง นอกจากเครื่องเก็บเกี่ยวแล้ว สถาบันวิจัยการแปรธาตุก็ยังได้ผลิตเครื่องจักรที่ใช้สำหรับการไถและหว่านเมล็ดโดยเฉพาะอีกด้วย","การใช้เครื่องจักรทั้งหมดนี้คือกระบวนการสามประการของการไถ หว่าน และเก็บเกี่ยว ซึ่งมีแค่พ่อมดที่เชี่ยวชาญในด้านธาตุจะร่ายเวทมนตร์เพื่อใส่ปุ๋ยให้กับดิน ใช้เพียงแค่ไม่กี่คนก็สามารถดูแลที่ดินผืนใหญ่ได้แล้ว!","“นี่มันเหมือนกับอาณาจักรของพระเจ้าที่บรรยายเอาไว้ในพระคัมภีร์เลย...”","แฮมม์พึมพำ","มีข่าวลือว่าในอาณาจักรของพระเจ้า มีแม่น้ำสายใหญ่ที่เต็มไปด้วยไวน์รสเลิศ ทุ่งข้าวสาลีจะออกรวงเต็มต้นโดยไม่ต้องเพาะปลูก และกิ่งก้านของต้นไม้ทุกต้นก็เต็มไปด้วยสเต็กเนื้อนุ่มฉ่ำ...","แม้ว่าเขาจะไม่เคยเห็นแม่น้ำที่เต็มไปด้วยไวน์ชั้นดี และสเต็กที่งอกออกมาจากต้นไม้ แต่ทุ่งข้าวสาลีที่นี่สามารถเพาะปลูกและเก็บเกี่ยวได้โดยอัตโนมัติ แถมยังมีเครื่องมือเล่นแร่แปรธาตุที่สามารถผลิตผ้าได้หลายหมื่นเมตรต่อวัน...","ความงดงามในพระคัมภีร์นั้นมีอยู่เพียงแค่ในจินตนาการ แต่เขาได้เห็นปาฏิหาริย์ของสถาบันอิเยตาด้วยตาของเขาเอง!","“ท่านลินน์ เครื่องจักรเล่นแร่แปรธาตุพวกนี้สามารถนำไปใช้ในอาณาจักรได้หรือไม่ขอรับ?”","เรย์เดลรีบเอ่ยถาม เพราะในตอนนี้อาณาจักรฮัดลาตา ก็อยู่ในช่วงฤดูเก็บเกี่ยวเช่นเดียวกัน ถ้ามีเครื่องเก็บเกี่ยวแบบนี้ พวกเขาก็ไม่จำเป็นต้องทำงานหลังขดหลังแข็งฝังตัวอยู่ในดินทั้งวันอีกต่อไป","“ตอนนี้เกรงว่าจะสายเกินไปแล้วล่ะ เครื่องเก็บเกี่ยวมีจำนวนจำกัด เมื่อสถาบันอิเยตาใช้จนหมด ข้าก็ต้องเป็นคนจัดการให้กับเมืองอื่นๆ ในดินแดนพ่อมดต่อ แต่เมื่อถึงฤดูเพาะปลูกในฤดูใบไม้ร่วง ข้าสามารถส่งเครื่องจักรพรวนดินไปที่อาณาจักรได้บ้าง...”","ลินน์เอ่ยอย่างครุ่นคิด","“ถ้าคนอื่นๆ ได้เห็นภาพแบบนี้ พวกเขาคงจะต้องตกใจมากแน่ๆ...”","แฮมม์พึมพำ หากพวกเขาไม่ได้เห็นมันด้วยตาตัวเอง คงไม่มีใครเชื่อว่าการเพาะปลูกและการเก็บเกี่ยวมันจะง่ายดายถึงเพียงนี้","หลังจากที่ขับเครื่องเก็บเกี่ยวไปรอบๆ พ่อมดแห่งสถาบันวิจัยการแปรธาตุก็กระโดดลงมาจากเครื่องจักรด้วยความตื่นเต้นที่ยังไม่จางหาย และหันไปหาเรย์เดลกับคนอื่นๆ เพื่อให้พวกเขาได้ลองสัมผัสประสบการณ์นี้ดูบ้าง","โดยเฉพาะเบียต เขาเป็นชาวนาของที่นี่!","ในครั้งนี้ มันเป็นการทดสอบประสิทธิภาพของเครื่องเก็บเกี่ยว และพวกพ่อมดก็ต้องลงสนามเพื่อสาธิตให้พวกเขาดูด้วยตัวเอง ในอนาคต มันก็ต้องพึ่งพาเบียตในการควบคุมมันด้วยตัวเขาเอง","พวกเขายุ่งอยู่จนกระทั่งถึงตอนเย็น ทุ่งข้าวสาลีที่แต่เดิมกว้างใหญ่สุดลูกหูลูกตา บัดนี้เหลือเพียงแค่ต้นข้าวสาลีครึ่งหนึ่งที่ติดอยู่กับรากเท่านั้น และงานเก็บเกี่ยวก็เสร็จสมบูรณ์ไปอย่างราบรื่น!","หากต้องทำด้วยมือล้วนๆ มันต้องใช้คนมากกว่า 30 คน ทำงานห้าถึงหกวัน แต่ตอนนี้เครื่องเก็บเกี่ยวห้าเครื่องสามารถทำงานของคนหลายสิบคนในอดีตให้เสร็จได้ภายในครึ่งวัน ที่สำคัญที่สุดก็คือ พวกเขาไม่เหนื่อยเลยสักนิด และมันยังแยกเมล็ดข้าวสาลีออกมาโดยตรง ซึ่งช่วยประหยัดเวลาไปได้มาก","เบียตที่รู้สึกซาบซึ้งใจเป็นอย่างมาก ได้กระตือรือร้นที่จะอยู่กับฝูงชน และถึงกับเชือดอูฐเพียงตัวเดียวในครอบครัวเพื่อเฉลิมฉลองอย่างยิ่งใหญ่","มันเป็นเวลากลางคืนแล้วตอนที่ลินน์และคนอื่นๆ กลับมาที่สถาบัน และบัตรเชิญเข้าร่วมงานสัมมนาวิชาการก็ถูกส่งมาให้ในเวลาเดียวกัน","เมื่อพิจารณาว่าสงครามกับศาสนจักรอาจจะยืดเยื้อออกไปเป็นเวลานาน งานสัมมนาวิชาการในปีนี้จึงถูกเลื่อนให้เร็วขึ้นมาหนึ่งเดือนก็ไม่ใช่เรื่องแปลกอะไร","ลินน์ยังคงให้ความสนใจกับงานสัมมนานี้มาก นับตั้งแต่ที่เขาสร้างผลิตภัณฑ์แก้วขึ้นมา เหล่าพ่อมดก็เร่งทำความเข้าใจและมีความคืบหน้าในการวิจัยในระดับจุลภาค และดาราศาสตร์ก็ก้าวหน้าไปอย่างก้าวกระโดด","พ่อมดบางคนจากสถาบันพยากรณ์ได้สร้างกล้องโทรทรรศน์ดาราศาสตร์ขนาดใหญ่ขึ้นมาแล้ว และกำลังเตรียมพร้อมที่จะปรับปรุงแผนที่ดวงดาวต่อไป ซึ่งเขาก็ได้เห็นรายงานที่เกี่ยวข้องหลายครั้งใน วารสารเวทมนตร์รายวัน","ในช่วงเวลาที่เขาใช้เวทจำลองร่างเพื่อจัดการเรื่องราวในอาณาจักร ลินน์เองก็ไม่ได้อยู่เฉยๆ เช่นกัน เขาได้ตีพิมพ์ทฤษฎีเกี่ยวกับแม่เหล็กไฟฟ้าออกมามากมาย ซึ่งได้รับทั้งคำชมเชยและความสงสัยจากผู้คนจำนวนมาก","อย่างไรก็ตาม ลินน์ยังคิดไม่ออกว่าในครั้งนี้เขาจะนำเสนอทฤษฎีอะไร แต่มีสิ่งที่เขาต้องการ ทำให้มันสมบูรณ์แบบมากที่สุดก็คือ แบบจำลองธาตุ","ตราบใดที่คุณสามารถหาวิธีที่จะสร้างธาตุที่หายากเหล่านั้นขึ้นมาได้ เทคโนโลยีอันทรงพลังมากมายก็จะสามารถเปลี่ยนให้กลายเป็นเวทมนตร์ได้ อย่างเช่น ระเบิดนิวเคลียร์หรืออะไรทำนองนั้น และกองทัพของศาสนจักรก็จะลอยขึ้นสู่สรวงสวรรค์ในทันทีที่มันถูกปล่อยออกมา","ไม่สิ บางทีพวกเขาอาจจะไม่มีโอกาสได้ขึ้นสวรรค์ด้วยซ้ำ","ถ้างั้นก็ไม่มีความจำเป็นที่จะต้องทำสงคราม...","ลินน์จินตนาการถึงฉากของการระเบิดของนิวเคลียร์ในหัวของเขา แต่ลึกๆ ในใจเขาก็รู้ดีว่า แม้ว่าเขาจะสามารถสร้างเวทมนตร์ที่ทรงพลังเช่นนี้ขึ้นมาได้สำเร็จ เขาก็อาจจะไม่ได้เป็นฝ่ายชนะสงครามในทันที","ด้วยพลังของพระเจ้าที่อยู่เหนือระดับตำนาน แค่เพียงร่างอวตารก็แสดงให้เห็นถึงความสามารถในการบิดเบือนมิติเวลาแล้ว ซึ่งนั่นไม่ใช่เรื่องง่ายเลยที่จะรับมือ..."]},{"n":322,"t":"นี่มันกำลังเอาข้าไปนั่งอยู่บนปากปล่องภูเขาไฟชัดๆ!","c":["ในเดือนกรกฎาคม ดวงอาทิตย์ที่แผดเผาได้แขวนตัวลอยเด่นอยู่เหนือหัว แต่นครพ่อมด กรีนรีลกลับคึกคักเป็นอย่างยิ่ง ราวกับจะกวาดล้างเงามืดที่ลัทธิวันสิ้นโลกทิ้งเอาไว้ไปหมดสิ้น","และสงครามในเมืองหลวงที่เกิดขึ้นในอาณาจักรฮัดลาตา ก็กลายเป็นที่รู้จักกันอย่างแพร่หลายไปพร้อมๆ กับการเผยแพร่ของวารสารเวทมนตร์รายวัน สภาเวทมนตร์ถึงกับนำไปประกาศอย่างเปิดเผย โดยคิดว่านี่คือการต่อสู้ครั้งแรกของพ่อมดกับศาสนจักร และมันก็ยังเป็นชัยชนะที่น่าตื่นเต้นเป็นอย่างยิ่งด้วย!","นั่นก็หมายความว่านับตั้งแต่นี้เป็นต้นไป พ่อมดทุกคนไม่จำเป็นต้องอาศัยอยู่บนเกาะแห่งนี้อีกต่อไป และยังมีโลกที่กว้างใหญ่ไพศาลรออยู่ภายนอกนั่น!","ท่ามกลางบรรยากาศอันน่าตื่นเต้นเช่นนี้ งานสัมมนาวิชาการในปีนี้ก็ถูกจัดขึ้นตามปกติ และเรือเหาะลำยักษ์ก็ค่อยๆ ร่อนลงมาจากฟากฟ้า แล้วลงจอดที่จัตุรัสหน้าสภาเวทมนตร์","การใช้เรือเหาะในการเดินทางกลายมาเป็นกระแสนิยมในดินแดนพ่อมดไปแล้ว สถาบันเวทมนตร์ทุกแห่งยอมทุ่มเงินก้อนโตเพื่อซื้อเรือเหาะ ไม่ว่ามันจะเป็นเพื่อความสะดวกสบายในการเดินทางหรือเพื่อรักษาหน้าตาของสถาบันก็ตาม","บรรดาพ่อมดและชาวเมืองในนครพ่อมดกรีนรีลต่างก็คุ้นเคยกับภาพตรงหน้านี้เป็นอย่างดี ซึ่งเป็นเวลากว่าหนึ่งปีแล้วที่พวกเขาได้เห็นเรือเหาะหลายสิบลำบินเข้าบินออกเกือบทุกวัน จากความตกใจในตอนแรกจนกลายมาเป็นความเคยชินในปัจจุบัน...","ในฐานะเจ้าภาพของงานสัมมนาในครั้งนี้ ราฟาเอลจึงเป็นผู้นำพาผู้คนมายืนรออยู่ที่ประตูแต่เนิ่นๆ เพื่อต้อนรับพ่อมดจากสถาบันต่างๆ ที่เดินทางมาถึงกรีนรีล","เนื่องจากลินน์เพิ่งจะทำการทดลองเพื่อวัดเส้นรอบวงของดาวเคราะห์และตรวจสอบแรงดึงดูดของโลกเสร็จสิ้นในงานสัมมนาครั้งที่แล้ว เหล่าพ่อมดที่ได้รับข่าวแต่ไม่สามารถเดินทางมาเป็นสักขีพยานในผลการทดลองได้ทันเวลาต่างก็รู้สึกเสียดายเป็นอย่างมาก","ดังนั้น ในครั้งนี้จึงมีผู้คนมาร่วมงานเป็นจำนวนมาก หรือจะพูดให้ถูกก็คือ พ่อมดเต็มตัวที่ยังมีชีวิตอยู่แทบทุกคนในดินแดนพ่อมดต่างก็มารวมตัวกันที่นี่ จนทำให้พื้นที่ที่สภาเวทมนตร์ขยายเอาไว้เพื่อใช้สำหรับจอดเรือเหาะเป็นการเฉพาะนั้นไม่เพียงพอ","ราฟาเอลเพิ่งจะทักทายสหายเก่าของเขาเสร็จ เมื่อเขาได้ยินพ่อมดฝึกหัดที่อยู่ข้างๆ กระซิบที่ข้างหูของเขา","“ท่านอาจารย์ ดูเหมือนว่านั่นจะเป็นธงของสมาคมเวทมนตร์เร้นลับ นะขอรับ!”","ราฟาเอลหันขวับไปมองในทันที ซึ่งมีเรือเหาะลำยักษ์กำลังลอยลำอยู่เหนือสภาเวทมนตร์ โดยถุงลมนิรภัยขนาดใหญ่ทั้งสองด้าน มีลวดลายที่โดดเด่นและเป็นเอกลักษณ์วาดเอาไว้ นั่นคือสัญลักษณ์ของสมาคมเวทมนตร์เร้นลับ ซึ่งตอนนี้ทุกคนในดินแดนพ่อมดต่างก็รู้จักมันเป็นอย่างดี...","“ยินดีต้อนรับ ท่านลินน์ ข้าไม่ได้พบท่านมาสักพักแล้วนะ!”","ราฟาเอลก้าวไปข้างหน้าอย่างรวดเร็ว และสวมกอดลินน์ที่เพิ่งจะลงมาจากเรือเหาะอย่างกระตือรือร้น จากนั้นเขาก็เอ่ยด้วยความประหลาดใจราวกับเพิ่งจะค้นพบอะไรบางอย่าง","“นี่ท่านทะลวงผ่านแล้วงั้นหรือ?”","ราฟาเอล ซึ่งเป็นจอมเวทผู้ยิ่งใหญ่เช่นเดียวกัน ย่อมสัมผัสได้ถึงการมีอยู่ของอาณาเขตเวทมนตร์ เขาจึงยืนยันได้ในทันทีว่าพ่อมดหนุ่มที่อยู่ตรงหน้าเขาผู้นี้ได้ก้าวข้ามผ่านระดับแล้ว!","“มันก็แค่ความโชคดีน่ะครับ เพิ่งจะทะลวงผ่านไปได้เมื่อสัปดาห์ก่อนนี่เอง”","ลินน์ตอบกลับพร้อมกับรอยยิ้ม","“ดูเหมือนว่าต่อไปนี้ข้าคงจะต้องเรียกท่านว่าปรมาจารย์ลินน์แล้วล่ะ!”","ราฟาเอลเอ่ยด้วยความรู้สึกหลากหลาย แม้ว่าเขาจะรู้ดีว่าด้วยพรสวรรค์ของลินน์ มันก็เป็นเพียงแค่เรื่องของเวลาก่อนที่เขาจะสามารถทะลวงผ่านไปสู่ระดับของจอมเวทผู้ยิ่งใหญ่ได้ แต่ก็ไม่คิดเลยว่ามันจะเร็วถึงเพียงนี้","นี่มันเพิ่งจะผ่านไปแค่ปีเดียวเองนะตั้งแต่ที่พวกเราเจอกัน...","ดูเหมือนว่าสถิติของจอมเวทผู้ยิ่งใหญ่ที่อายุน้อยที่สุดในดินแดนพ่อมดกำลังจะถูกทำลายลงอีกครั้งแล้ว!","ราฟาเอลรู้สึกประหลาดใจ แต่เขาก็ไม่ลืมหน้าที่ของตนเอง โดยร่างอีกร่างหนึ่งที่อยู่ข้างๆ ลินน์ก็ดึงดูดความสนใจของเขาอย่างรวดเร็ว","“ไม่ทราบว่าท่านผู้นี้คือ?”","“แอนโธนี จากอาณาจักรฮัดลาตา เขาเป็นสมาชิกของสมาคมเวทมนตร์เร้นลับ เช่นเดียวกัน!”","ลินน์เป็นฝ่ายแนะนำให้รู้จักก่อน","สีหน้าของราฟาเอลเปลี่ยนเป็นจริงจังในทันที เขาเคยอ่านวารสารเวทมนตร์รายวันมาก่อน และชื่อนี้ก็ถูกกล่าวถึงในรายงานเกี่ยวกับสงครามในเมืองหลวง ดังนั้น เขาจึงรู้ดีว่าอีกฝ่ายคือปรมาจารย์ระดับหกวงแหวนที่เชี่ยวชาญในด้านแม่เหล็กไฟฟ้า","เมื่อคิดได้เช่นนั้น ราฟาเอลก็รีบเชิญทุกคนเข้าไปข้างในอย่างกระตือรือร้น และแอบสอบถามข้อมูลเกี่ยวกับจอมเวทผู้ยิ่งใหญ่ที่แปลกหน้าผู้นี้ไปตลอดทาง","แอนโธนีผู้มากประสบการณ์สามารถรับมือกับคำถามเหล่านั้นได้อย่างเป็นธรรมชาติ แม้ว่าเขาจะมีความปรารถนาอันแรงกล้าต่อดินแดนพ่อมดแห่งนี้ แต่เขาก็ยังไม่ได้สร้างความไว้วางใจให้กับใครเลย","ราฟาเอลพยายามตะล่อมถามอยู่นานแต่ก็ไม่สามารถเค้นข้อมูลที่เป็นประโยชน์ออกมาได้เลย แต่มีสิ่งหนึ่งที่ทำให้เขารู้สึกประหลาดใจ เพราะจอมเวทผู้ยิ่งใหญ่ระดับหกวงแหวนที่อยู่ห่างจากระดับตำนานเพียงก้าวเดียวผู้นี้ กลับทำตัวเป็นเหมือนผู้ติดตามของลินน์เสียอย่างนั้น","เมื่อถึงเวลาที่ต้องประเมินว่าควรจะตอบคำถามบางข้อหรือไม่ แอนโธนีมักจะหันไปมองหน้าลินน์ก่อนเสมอ และเมื่อเห็นว่าอีกฝ่ายไม่ได้คัดค้านอะไร เขาถึงจะยอมตอบ","ราฟาเอลตระหนักได้ในทันทีว่า ตัวตนของลินน์ในสมาคมเวทมนตร์เร้นลับ นั้นไม่ได้เรียบง่ายเหมือนกับนักวิชาการธรรมดาๆ อย่างที่เขาพูด","หรือว่าเขาจะเป็นพ่อมดระดับตำนาน หรือไม่ก็เป็นศิษย์ของผู้ก่อตั้งกันแน่?","ราฟาเอลคิดในใจ แต่ใบหน้าของเขาก็ยังคงประดับไปด้วยรอยยิ้มเช่นเดิม ขณะที่เขานำทางทุกคนเข้าไปในหอประชุมอย่างรวดเร็ว","ทันทีที่ลินน์และคนอื่นๆ เดินผ่านประตูเข้าไป บรรดาพ่อมดที่กำลังพูดคุยและปรึกษาหารือกันอยู่ในหอประชุมก็พากันเข้ามาห้อมล้อมเขาในทันที หลังจากที่เขาได้สร้างความตื่นตะลึงในงานสัมมนาครั้งที่แล้ว เขาก็กลายเป็นดาวรุ่งแห่งวงการเวทมนตร์ที่ฮอตที่สุดในดินแดนพ่อมดไปเสียแล้ว!","โดยเฉพาะอย่างยิ่งหลังจากที่ได้รู้ว่าลินน์ได้ทะลวงผ่านจนกลายมาเป็นจอมเวทผู้ยิ่งใหญ่แล้ว เสียงยกย่องสรรเสริญต่างๆ นานาก็ดังก้องไปทั่วทั้งหอประชุม","ลินน์ตอบรับพ่อมดที่กระตือรือร้นเหล่านั้นทีละคนด้วยรอยยิ้มบนใบหน้า หลังจากผ่านไปครึ่งชั่วโมง รอยยิ้มของเขาก็เริ่มแข็งค้าง และหูของเขาก็เริ่มชาจากการได้ยินคำเยินยอต่างๆ นานา แต่เขาก็ยังคงต้องรับมือกับมันต่อไป มิฉะนั้นในวันพรุ่งนี้ ข่าวลือเรื่องที่เขาซึ่งเป็นดาวรุ่งแห่งวงการเวทมนตร์ทำตัวหยิ่งยโสและไม่เห็นหัวใครก็คงจะแพร่สะพัดไปทั่วดินแดนพ่อมดอย่างแน่นอน","พูดได้คำเดียวเลยว่า การมีชื่อเสียงโด่งดังมันก็ไม่ได้มีแต่เรื่องดีเสมอไป...","ลินน์คิดด้วยความรู้สึกสะท้อนใจ จนกระทั่งงานสัมมนาใกล้จะเริ่มขึ้น ในที่สุดเขาก็สามารถหลุดพ้นจากการถูกห้อมล้อมของฝูงชนมาได้ และเดินทางไปที่นั่งของสถาบันอิเยตาภายใต้การนำทางของราฟาเอล","ลินน์ตระหนักได้อย่างชัดเจนว่าตำแหน่งที่นั่งของพวกเขาในครั้งนี้สูงกว่าครั้งที่แล้วอย่างเห็นได้ชัด ซึ่งเป็นรองเพียงแค่องค์กรที่ก่อตั้งโดยประธานสภาอย่างสถาบันพยากรณ์และสมาคมการเล่นแร่แปรธาตุเท่านั้น...","แน่นอนว่านี่ถือเป็นเกียรติอย่างหนึ่ง แต่มันก็เทียบเท่ากับการเอาตัวเองไปนั่งอยู่บนปากปล่องภูเขาไฟเช่นเดียวกัน หากผลงานของสถาบันอิเยตาในครั้งนี้ไม่เป็นที่น่าพอใจ เขาก็เกรงว่าจะมีคนเอาไปนินทาลับหลังอย่างแน่นอน","“ทุกคน โปรดอยู่ในความสงบ!”","บนแท่นสูงของหอประชุม จอมเวทผู้ยิ่งใหญ่ซานเชซกระแอมในลำคอ และใช้เวทขยายเสียงเพื่อส่งเสียงของเขาให้ดังก้องไปทั่วทุกมุมของหอประชุม เพื่อระงับเสียงพูดคุยที่ดังอื้ออึง","“ยินดีต้อนรับสู่กรีนรีลเพื่อเข้าร่วมงานสัมมนาวิชาการในครั้งนี้!”","“ในช่วงสัปดาห์ที่ผ่านมา สภาเวทมนตร์ได้รับข้อเสนอเกี่ยวกับทฤษฎีเวทมนตร์มากกว่าเจ็ดสิบเรื่อง ซึ่งมากกว่าปกติหลายเท่า ดังนั้น งานสัมมนาทั้งหมดจะใช้เวลาสามวัน โดยแบ่งออกเป็นสามช่วง ซึ่งทั้งหมดจะจัดขึ้นในตอนเที่ยงของทุกวัน...”","ซานเชซอธิบายสั้นๆ เกี่ยวกับขั้นตอนและการเปลี่ยนแปลงของการประชุม หลังจากที่หยุดชะงักไปครู่หนึ่ง จู่ๆ เขาก็มองมาที่ลินน์ เน้นเสียงของเขา และเอ่ยขึ้นอีกครั้ง","“นอกจากนี้ งานสัมมนาวิชาการในปีนี้จำเป็นจะต้องเพิ่มคณะกรรมการตัดสินเข้าไปอีกหนึ่งคน...และคนผู้นั้นก็คือ ปรมาจารย์ลินน์แห่งสถาบันอิเยตา!”"]},{"n":323,"t":"ทฤษฎีสุดโต่งของลินน์ สีไม่มีอยู่จริงงั้นหรือ?","c":["เมื่อสิ้นเสียงของซานเชซ สายตานับพันคู่ในหอประชุมก็หันขวับไปมองที่สถาบันอิเยตาในทันที","ลินน์ขมวดคิ้วอย่างอดไม่ได้ ก่อนหน้านี้ราฟาเอลก็ไม่เคยพูดถึงเรื่องนี้กับเขามาก่อนเลย แต่ก่อนที่เขาจะทันได้ทำความเข้าใจ เสียงปรบมือก็ดังก้องไปทั่วทั้งหอประชุมอย่างกระตือรือร้น","ภายใต้สายตาที่จับจ้องของทุกคน ลินน์ไม่มีทางเลือกอื่นนอกจากลุกขึ้นยืนแล้วเดินขึ้นไปบนแท่นสูง จากนั้นก็นั่งลงบนที่นั่งของคณะกรรมการตัดสิน ก่อนจะหันไปมองราฟาเอลที่อยู่ข้างๆ แล้วเอ่ยถามด้วยความไม่พอใจเล็กน้อย","“ข้าไม่เคยไปล่วงเกินท่านเลยนะ ท่านปรมาจารย์?”","แม้ว่าการได้เป็นกรรมการตัดสินในงานสัมมนาจะไม่ใช่เรื่องแย่ แต่สถานการณ์ที่เกิดขึ้นอย่างกะทันหันเช่นนี้ก็ทำให้ลินน์เกิดการคาดเดาในแง่ร้ายบางอย่างขึ้นมา","ในช่วงเวลาสั้นๆ เพียงหนึ่งชั่วโมงที่เดินทางมาถึงกรีนรีล สถาบันอิเยตากลับได้รับการต้อนรับพร้อมเกียรติยศมากจนเกินไป และลินน์ก็รู้ซึ้งถึงสัจธรรมข้อหนึ่งเป็นอย่างดี นั่นก็คือ ยิ่งยืนอยู่สูงเท่าไหร่ เวลาตกลงมาก็จะยิ่งเจ็บหนักมากเท่านั้น...","“แน่นอนว่าไม่ ทำไมท่านถึงคิดเช่นนั้นล่ะ?”","ราฟาเอลถามด้วยความขบขัน","“อย่างน้อยท่านก็ควรจะถามความเห็นของข้าในเรื่องนี้ก่อนที่จะตัดสินใจนะ”","ลินน์เอ่ยด้วยความไม่พอใจเล็กน้อย","“นั่นเป็นความผิดพลาดของข้าเอง...”","ราฟาเอลตบหน้าผากของตัวเองและอธิบายด้วยความรู้สึกผิด","“ข้อเสนอจำนวนมากที่สภาเวทมนตร์ได้รับในครั้งนี้ ล้วนแต่เป็นเรื่องเกี่ยวกับอุปกรณ์ที่ทำจากแก้วแบบใหม่ ซึ่งข้าคิดว่าท่านน่าจะรู้ดีกว่าพวกเรา ดังนั้น พวกเราจึงได้หารือกันและตัดสินใจเพิ่มที่นั่งของคณะกรรมการตัดสินเข้าไปชั่วคราว...”","ก่อนหน้านี้ พวกเขาก็ไม่ได้จัดการเช่นนี้ เพราะพวกเขายังไม่รู้ข้อมูลเกี่ยวกับการเลื่อนระดับของลินน์จนกลายมาเป็นจอมเวทผู้ยิ่งใหญ่","โดยธรรมชาติแล้ว พ่อมดระดับสามวงแหวนย่อมไม่มีคุณสมบัติมากพอที่จะตัดสินผลงานวิจัยของสถาบันใดๆ ได้ตามอำเภอใจ แต่ในตอนนี้ลินน์ได้ก้าวข้ามผ่านระดับไปแล้ว แน่นอนว่าเขาย่อมไม่ต้องกังวลในเรื่องนี้อีกต่อไป...","และการที่พวกเขาปรับที่นั่งให้กับเขาเสียใหม่ ก็เพื่อแสดงให้เห็นว่าพวกเขาให้ความสำคัญกับลินน์และสมาคมเวทมนตร์เร้นลับมากเพียงใด","เมื่อพูดถึงเรื่องนี้ ราฟาเอลก็รู้สึกพูดไม่ออกเล็กน้อย โดยทั่วไปแล้ว พ่อมดที่อยู่ในวัยเดียวกับลินน์มักจะกระตือรือร้นที่จะได้แสดงตัวตนและได้รับความสนใจ แต่ทำไมเขาถึงได้เป็นคนขี้ระแวงเช่นนี้กันล่ะ","จากคำอธิบายของราฟาเอล ลินน์ก็ตระหนักได้ว่าเขาเข้าใจผิดไปเอง และไม่ได้มีใครตั้งใจจะพุ่งเป้ามาที่เขา...","บนแท่นสูงในเวลานี้ ซานเชซเพิ่งจะกล่าวเปิดงานอันยืดยาวจบลง โดยประกาศถึงการเริ่มต้นของงานสัมมนาวิชาการในปีนี้อย่างเป็นทางการ ก่อนจะเดินลงจากแท่นสูงไปเพื่อเปิดพื้นที่ให้กับคนอื่นๆ","ซึ่งก็มีพ่อมดแม่มดหนุ่มสาวหลายคนอดใจรอไม่ไหวที่จะก้าวขึ้นมา และหลังจากทำความเคารพลินน์และคนอื่นๆ แล้ว พวกเขาก็หยิบเอาลูกบาศก์แก้วที่มีรูปร่างแปลกประหลาดออกมาแสดงให้ทุกคนดู และเอ่ยเสียงดัง","“นี่คืออุปกรณ์แยกแสงที่พวกเราเป็นคนพัฒนาขึ้นมา!”","“นั่นมันก็แค่ปริซึมไม่ใช่หรือไง?”","เอล็อคที่นั่งอยู่ท่ามกลางผู้ชมพึมพำเบาๆ ขณะที่พ่อมดจากสถาบันอิเยตาที่อยู่ข้างๆ เขาก็พยักหน้าอย่างพร้อมเพรียงกัน พวกเขาเคยสาธิตมันมาแล้ว เพียงแต่ยังไม่ได้ประกาศให้ใครรู้เท่านั้น","ในความเป็นจริง พวกเขาก็กำลังทำการวิจัยเกี่ยวกับแสงอยู่เช่นกัน แต่พวกเขายังไม่สามารถสร้างผลงานชิ้นสำคัญใดๆ ออกมาได้ เนื่องจากมีเวลาที่สั้นจนเกินไป","และก็เป็นไปตามคาด พ่อมดแม่มดบนเวทีก็ได้สาธิตการทดลองแยกแสงด้วยปริซึม แต่เห็นได้ชัดว่าการวิจัยของคนกลุ่มนี้มีมากกว่านั้น และยังมีบางสิ่งที่พวกเขาเองก็ยังไม่เข้าใจ...","“พวกเรายังพบอีกว่า ในบรรดาสีทั้งเจ็ดสีนั้น สีแดง สีเขียว และสีน้ำเงิน มีความสำคัญเป็นอย่างยิ่ง หรืออาจกล่าวได้ว่า สีอื่นๆ ทั้งหมดล้วนแล้วแต่ถือกำเนิดมาจากสีทั้งสามนี้”","พ่อมดผู้เป็นผู้นำที่ชื่อว่าเกล็นเอ่ยด้วยความภาคภูมิใจ","“ข้าเรียกพวกมันว่าแม่สี ซึ่งอาจกล่าวได้ว่ามันคือสีที่แท้จริงของแสง โดยทุกสิ่งทุกอย่างล้วนประกอบขึ้นจากสีทั้งสาม นั่นคือ สีแดง สีเขียว และสีน้ำเงิน มันเป็นเพียงแค่ความเข้มข้นของแม่สีแต่ละสีที่พัฒนาไปเป็นสีที่เรามองเห็น ทั้งสีอื่นๆ เช่น สีเหลือง สีม่วง สีฟ้า ฯลฯ และเมื่อนำทั้งสามสีมารวมกันในความเข้มข้นที่เท่ากัน มันก็จะกลายเป็นแสงสีขาว!”","เมื่อปรับมุมของอุปกรณ์แยกแสง สีสันที่ปรากฏออกมาก็เปลี่ยนไปตามนั้นเช่นกัน","ราฟาเอลและคนอื่นๆ ต่างก็จดจ่ออยู่กับการแสดงตรงหน้า และพวกเขาก็รู้สึกสนใจสิ่งที่ชายหนุ่มพูดเกี่ยวกับแม่สีเป็นอย่างมาก นี่ถือเป็นการค้นพบครั้งยิ่งใหญ่เลยทีเดียว!","แสงเป็นสิ่งที่พบเห็นได้ทั่วไป แต่ก่อนหน้านี้ แม้แต่พ่อมดระดับตำนานก็ยังไม่สามารถรับรู้ถึงสิ่งที่เรียกว่าธาตุแสงได้ พวกเขาทำได้เพียงแค่พัฒนาเวทมนตร์โดยอิงจากคุณสมบัติของแสง และตระหนักถึงการใช้ประโยชน์จากแสงในอีกระดับหนึ่งเท่านั้น","การค้นพบของคนกลุ่มนี้ ทำให้พวกเขามีความเข้าใจเกี่ยวกับแสงในเบื้องต้นอย่างไม่ต้องสงสัย ว่าแสงสีขาวนั้นแท้จริงแล้วประกอบไปด้วยแสงสีที่แตกต่างกันสามสี ได้แก่ สีแดง สีเขียว และสีน้ำเงิน...","เสียงพูดคุยปรึกษาหารือกันในหอประชุมเริ่มดังขึ้นเรื่อยๆ และทุกคนต่างก็กำลังพูดคุยเกี่ยวกับการค้นพบอันน่าประหลาดใจนี้","พ่อมดแม่มดบนแท่นสูงต่างก็ชูอุปกรณ์แยกแสงในมือขึ้นสูง เพื่อรับการตรวจสอบจากฝูงชน และพวกเขาก็รู้สึกตื่นเต้นเป็นอย่างยิ่ง เพราะอย่างน้อย การวิจัยของพวกเขาก็สามารถคว้ารางวัลเหรียญตราจันทร์สีเงินมาครองได้!","เกล็น ถึงกับเริ่มคิดแล้วว่าเขาควรจะเปลี่ยนชื่อสถาบันของเขาดีหรือไม่ ซึ่งคิดเอาไว้แล้วว่ามันจะใช้ชื่อว่า สถาบันรุ่งอรุณและแม่สี...","“ข้าคิดว่างานวิจัยนี้มีคุณค่าเป็นอย่างมาก!”","ซานเชซเป็นคนแรกที่เอ่ยปากชื่นชม","ราฟาเอลและคนอื่นๆ ต่างก็เห็นด้วยกับเรื่องนี้เป็นอย่างมาก และพวกเขาก็กล่าวชื่นชมผลงานการวิจัยของเกล็นเช่นเดียวกัน","ใบหน้าของเกล็นเต็มไปด้วยความพึงพอใจ จากนั้นเขาก็หันหน้าไปมองลินน์ที่ยังไม่ได้พูดอะไรออกมาเลย","สำหรับดาวรุ่งแห่งวงการเวทมนตร์ผู้โด่งดังผู้นี้ เกล็นมีความรู้สึกที่ผสมปนเปกันไป ทั้งอิจฉา ชื่นชม และริษยา ซึ่งการวิจัยในครั้งนี้ของพวกเขาก็เป็นการใช้แก้วที่อีกฝ่ายเป็นคนคิดค้นขึ้นมา","อย่างไรก็ตาม เกล็นผู้ยังหนุ่มแน่นและมีความทะเยอทะยาน เชื่อว่าสักวันหนึ่ง เขาจะสามารถเป็นเหมือนกับอีกฝ่าย ที่ได้วิจัยเกี่ยวกับทฤษฎีเวทมนตร์ที่สามารถเปลี่ยนแปลงระบบเวทมนตร์ทั้งหมดได้ และกลายมาเป็นดาวรุ่งแห่งวงการเวทมนตร์ที่ทุกคนต่างก็ตั้งหน้าตั้งตารอคอย","ในขณะที่เกล็นกำลังเพ้อฝันอยู่นั้น จู่ๆ ลินน์ก็เอ่ยปากพูดขึ้นมา","“งานวิจัยของพวกเจ้าถือว่าทำออกมาได้ดีมาก แต่ข้าจำเป็นที่จะต้องแก้ไขอะไรบางอย่างสักเล็กน้อย! แม่สีทั้งสามที่เจ้าเพิ่งจะพูดถึงนั้น ไม่ได้เป็นตัวแทนของต้นกำเนิดหรือธรรมชาติของแสง...”","“หรือถ้าจะพูดให้ถูกก็คือ สีมันไม่ได้มีอยู่ในวัตถุหรอกนะ!”","คำพูดอันน่าประหลาดใจของลินน์จุดประกายความสงสัยให้เกิดขึ้นในหอประชุมทันที","“ปรมาจารย์ลินน์ ท่านหมายความว่าอย่างไร? สีไม่มีอยู่จริงงั้นหรือ? แล้วสิ่งที่เรากำลังมองเห็นอยู่ในตอนนี้คืออะไรกันล่ะ?”","ซานเชซถามด้วยความสับสน","เกล็นและคนอื่นๆ ต่างก็รู้สึกไม่พอใจเป็นอย่างยิ่ง การแยกแสงและแม่สีเป็นผลมาจากความพยายามอย่างหนักของพวกเขา ซึ่งการทดลองที่เข้มงวดของพวกเขาก็ถูกนำมาใช้เป็นข้อพิสูจน์ แต่ลินน์กลับปฏิเสธมันด้วยคำพูดเพียงประโยคเดียว","หากสีไม่มีอยู่จริง นั่นก็เท่ากับเป็นการพิสูจน์แล้วว่างานวิจัยของข้ามันไม่มีความหมายเลยไม่ใช่หรือ...","“ท่านลินน์ ในฐานะของกรรมการตัดสินทางวิชาการ มันเป็นหน้าที่ของข้าที่จะให้คำแนะนำและชี้ให้เห็นถึงข้อผิดพลาดหรือข้อบกพร่อง แต่ทางที่ดีท่านไม่ควรพูดจาส่งเดชในสิ่งที่ท่านไม่เข้าใจ...”","บนที่นั่งของคณะกรรมการตัดสิน จอมเวทผู้ยิ่งใหญ่ในชุดคลุมสีม่วงเอ่ยตำหนิด้วยความไม่พอใจ","ก่อนที่ราฟาเอลจะเสนอให้ลินน์เข้ามาเป็นกรรมการตัดสิน เขาเป็นเพียงคนเดียวที่คัดค้านเรื่องนี้ เพราะท้ายที่สุด พ่อมดในวัยยี่สิบกว่าปีอาจจะประสบความสำเร็จในด้านหนึ่งหรือสองด้าน แต่ถึงอย่างนั้นความรู้ที่เขามีก็ยังไม่กว้างขวางพอ และนี่ก็คือสิ่งที่สำคัญที่สุดในการเป็นกรรมการตัดสินทางวิชาการ!"]},{"n":324,"t":"โลกใบนี้แท้จริงแล้วไร้สี!","c":["ท่ามกลางความสงสัยของฝูงชน ลินน์ไม่ได้รีบร้อนอธิบาย แต่กลับตั้งคำถามขึ้นมาแทน","“พวกท่านทุกคนน่าจะรู้ใช่ไหมว่าแสงสามารถสะท้อนได้?”","พ่อมดแม่มดในหอประชุมต่างพยักหน้า การสะท้อนคือธรรมชาติพื้นฐานของแสง และเวทโพลาไรเซชันส่วนใหญ่ก็ใช้หลักการนี้","“สีที่เรามองเห็นนั้น แท้จริงแล้วเกิดจากแสงที่ส่องกระทบวัตถุ สะท้อนเข้าสู่ดวงตาของเรา และถูกจดจำโดยเซลล์รับแสง”","ลินน์อธิบาย","“เซลล์รับความรู้สึกของมนุษย์สามารถแยกแยะได้เพียงสามสีเท่านั้น คือ แดง เขียว และน้ำเงิน เนื่องจากสเปกตรัมของแสงอาทิตย์ที่มองเห็นได้นั้นผสมผสานกันอย่างสม่ำเสมอ มันจึงไร้สีในสายตาของเรา...”","“เดี๋ยวก่อน ปรมาจารย์ลินน์ หากท่านกล่าวเช่นนั้น ทุกสิ่งทุกอย่างก็จะกลายเป็นสีเดียวกันภายใต้แสงเดียวกันไม่ใช่หรือ?”","ซานเชซขัดจังหวะขึ้นมาอย่างอดไม่ได้","“แน่นอนว่าไม่ เพราะแสงส่วนหนึ่งจะถูกวัตถุดูดซับเอาไว้ และสิ่งที่เรามองเห็นก็คือส่วนของแสงที่มองเห็นได้ที่สะท้อนกลับมาเท่านั้น...”","ลินน์กล่าว","หากจะพูดให้ถูกต้องกว่านั้น หลังจากที่แสงซึ่งสะท้อนจากวัตถุเข้าสู่ดวงตาของมนุษย์ มันจะถูกแปลงเป็นสัญญาณไฟฟ้าบนจอประสาทตาและส่งไปยังสมองผ่านทางเส้นประสาทตา โดยสิ่งที่เรียกว่าสีนั้น เป็นเพียงแค่คำนิยามของมนุษย์ที่มีต่อผลลัพธ์การมองเห็นของคลื่นแม่เหล็กไฟฟ้าในช่วงความถี่หนึ่งของแสงที่มองเห็นได้เท่านั้น...","เกี่ยวกับจุดนี้ หลังจากที่เขาเชี่ยวชาญในแรงแม่เหล็กไฟฟ้า เขาก็ได้ทำการตรวจสอบเรื่องนี้ในอิเยตา ดังนั้น เขาจึงมีความมั่นใจอย่างเต็มเปี่ยม","คำพูดของลินน์ดังก้องไปทั่วทั้งหอประชุม และการโต้เถียงพร้อมกับเสียงพูดคุยปรึกษาหารือกันท่ามกลางผู้ชมก็เริ่มดังขึ้นเรื่อยๆ","“ท
