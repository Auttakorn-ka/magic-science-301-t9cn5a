นที","เหล่านักเล่นแร่แปรธาตุที่อยู่ที่นั่นต่างก็สะดุ้ง และไม่กล้าชักช้า พวกเขารีบหากระดาษและปากกามาให้ทันที","เพราะเมื่อไม่กี่วันก่อน ดาวรุ่งแห่งเวทมนตร์ท่านนี้ ก็อยู่ที่นี่และวาดแบบแปลนของปืนนกสับกับกระสุนแบบตลับออกมาอย่างง่ายดาย","ลินน์ครุ่นคิดอยู่ครู่หนึ่ง แล้วหยิบปากกาขนนกขึ้นมาวาดลงบนกระดาษ โดยอ้างอิงจากข้อมูลของปัญญาประดิษฐ์สนับสนุน","ลิเดียและคนอื่นๆ จับจ้องตาไม่กะพริบ เพราะกลัวว่าจะพลาดรายละเอียดอะไรไป","ไม่นานพวกเขาก็พบว่า ปืนที่ลินน์วาดในครั้งนี้ดูแปลกประหลาดเล็กน้อย โดยตัวหลักเป็นกระบอกปืนทรงกลมหนาๆ ตรงกลางมีสายยาวๆ ที่ดูเหมือนโซ่ ด้านล่างไม่ใช่พานท้ายปืน แต่เป็นขาตั้งสามขา ดูคล้ายกับปืนใหญ่เสียมากกว่า","“ท่านศาสตราจารย์ลินน์ นี่คืออะไรหรือคะ? ปืนคาบศิลารุ่นใหม่ หรือปืนใหญ่ที่ถูกปรับปรุงงั้นหรือคะ?”","ลิเดียเอ่ยถามด้วยความสงสัย","“ข้าเรียกมันว่าปืนกล ถือเป็นปืนรูปแบบอัตโนมัติที่ค่อนข้างพิเศษ มีจุดเด่นคือสามารถยิงต่อเนื่องได้โดยอัตโนมัติ และมีอัตราการยิงที่เร็วมาก”","ลินน์อธิบาย","ปืนรูปแบบอัตโนมัติ?","วิลสันและคนอื่นๆ มองดูแบบแปลนตรงหน้า พลางคิดถึงหน้าที่ของส่วนประกอบแต่ละชิ้น และความหมายของคำว่าอัตโนมัติ","ลินน์ไม่ได้มีเจตนาจะปิดบัง เขาจึงอธิบายหลักการทำงานของปืนกลให้ทุกคนฟังทันที","พูดง่ายๆ ก็คือมันเป็นอุปกรณ์อัตโนมัติที่อาศัยแรงสะท้อนถอยหลัง ลำกล้องปืนของปืนกลนั้นสามารถลอยตัวได้ เมื่อกระสุนถูกยิงออกไป ปืนกลและลำกล้องปืนจะประสานเข้าด้วยกัน โดยใช้พลังงานของแก๊สดินปืนเป็นแรงขับเคลื่อน และเปิดรังเพลิงผ่านชิ้นส่วนที่เกี่ยวข้อง ลูกเลื่อนจะถอยหลังต่อไปเพื่อดีดปลอกกระสุนเปล่าออกไปนอกปืน จากนั้นก็ขับเคลื่อนกลไกการป้อนกระสุนเพื่อบีบอัดสปริง","ภายใต้แรงสปริง ลูกเลื่อนจะดันกระสุนเข้าที่และจุดระเบิดอีกครั้ง ซึ่งจะช่วยประหยัดเวลาในการบรรจุกระสุน และทำให้การยิงกระสุนอัตโนมัติมีความเป็นไปได้","เหล่านักเล่นแร่แปรธาตุอย่างลิเดียและวิลสัน ที่มีส่วนร่วมในการวิจัยและผลิตปืนนกสับ ก็สามารถทำความเข้าใจขั้นตอนการทำงานทั้งหมดได้อย่างรวดเร็ว และอดไม่ได้ที่จะถอนหายใจกับความซับซ้อนในการออกแบบปืนรุ่นใหม่นี้","ก่อนหน้านี้พวกเขาก็เคยหารือกันถึงวิธีที่จะเพิ่มอัตราการยิงของปืนนกสับให้มากขึ้นเช่นกัน แต่ส่วนใหญ่ก็มุ่งเน้นไปที่การทำให้ขั้นตอนการบรรจุและยิงปืนง่ายขึ้น แต่วิธีของลินน์คือการใช้แรงกระตุ้นที่เกิดจากการยิงหนึ่งครั้งของปืน ขับเคลื่อนการยิงครั้งที่สอง เพื่อสร้างวงจรการทำงาน โดยไม่จำเป็นต้องใช้คนควบคุม...","“อัตราการยิงของมันจะไปถึงระดับไหนหรือขอรับ?”","วิลสันรีบเอ่ยถาม","“ก็น่าจะประมาณหนึ่งพันนัดต่อนาทีล่ะมั้ง”","ลินน์คิดอยู่ครู่หนึ่ง แล้วเอ่ยตอบ","สิ่งที่เขานำออกมาคือรุ่นปรับปรุงของปืนกลเร็วแก็ตลิงอันโด่งดัง ซึ่งผสมผสานกับแนวคิดการทำงานอัตโนมัติของปืนกลแม็กซิมในเวลาต่อมา","เพียงแต่เมื่อพิจารณาถึงพื้นฐานอุตสาหกรรมที่อ่อนแอของสถาบันวิจัยการเล่นแร่แปรธาตุแล้ว อัตราการยิงจึงไม่เร็วนัก โดยมีอัตราการยิงเพียงหนึ่งพันนัดต่อนาทีเท่านั้น","ในความเป็นจริง จะเร็วหรือช้าก็ไม่มีอะไรแตกต่างกันมากนัก เพราะกระสุนแบบตลับไม่เหมือนกับกระสุนตะกั่ว มันจำเป็นต้องทำด้วยมือ ซึ่งมีขั้นตอนที่ซับซ้อนกว่า ทำให้การจัดหากระสุนของพวกเขาไม่มีทางเพียงพออย่างแน่นอน ไม่แน่ว่าอาจจะยิงหมดภายในเวลาไม่กี่วินาที หรือไม่กี่สิบวินาทีด้วยซ้ำ","“หนึ่งพันนัด...ต่อนาที?!”","วิลสันแทบจะคิดว่าตัวเองฟังผิดไป หรือว่าจะเป็นหนึ่งพันนัดต่อชั่วโมงกันแน่?","ต้องรู้ก่อนว่าอัตราการยิงของปืนนกสับในสายตาของพวกเขาก็ถือว่าเร็วมากแล้ว ด้วยพลปืนที่ชำนาญสามารถบรรจุกระสุน และยิงได้ทุกๆ ห้าถึงหกวินาที ซึ่งเร็วกว่าปืนคาบศิลาถึงสิบกว่าเท่า!","แต่ปืนกลกระบอกนี้ กลับสามารถอธิบายได้ด้วยคำว่าเหลือเชื่อเท่านั้น หนึ่งพันนัดต่อนาที ก็หมายความว่าสามารถยิงกระสุนได้สิบห้านัดต่อวินาที ซึ่งเร็วกว่าปืนคาบศิลาถึงหนึ่งร้อยห้าสิบเท่า!","นี่มันสัตว์ประหลาดแบบไหนกันแน่?","วิลสันลองจินตนาการภาพของปืนกลห้าสิบกระบอกที่ปรากฏตัวขึ้นในสนามรบ แล้วกราดยิงอย่างบ้าคลั่ง ภายในเวลาสิบกว่าวินาที ศัตรูหลายพันคนก็ล้มตายลงเป็นแถบๆ...เขาก็อดไม่ได้ที่จะขนลุกซู่ไปทั้งตัว","“ท่านศาสตราจารย์ อาวุธที่เรียกว่า...ปืนกลชนิดนี้ เป็นผลงานของปรมาจารย์ท่านใดหรือขอรับ?”","พ่อมดชายคนหนึ่งอดไม่ได้ที่จะถามขึ้น พวกเขาอยากรู้จริงๆ ว่าใครเป็นคนสร้างอาวุธสังหารที่บ้าคลั่งเช่นนี้ขึ้นมาในสมรภูมิ?","“คนที่ประดิษฐ์สิ่งนี้มีชื่อว่าแก็ตลิง!”","ลินน์กล่าว","“ก่อนที่จะเข้าร่วมสมาคมเวทมนตร์เร้นลับ เขาเคยเป็นแพทย์ที่คอยช่วยชีวิต และรักษาผู้บาดเจ็บในสนามรบมาก่อน หลังจากที่ได้เป็นพยานถึงความโหดร้ายของสงคราม และความโศกเศร้ากับความตายอันไม่มีที่สิ้นสุดหลังสงคราม เจตนารมณ์เดิมที่เขาประดิษฐ์สิ่งนี้ขึ้นมา ก็เพื่อลดจำนวนผู้เสียชีวิต และยุติสงครามให้เร็วที่สุด เพื่อนำไปสู่สันติภาพที่แท้จริง!”","เมื่อได้ยินเช่นนี้ สีหน้าของเหล่านักเล่นแร่แปรธาตุต่างก็ดูแปลกประหลาด พวกเขาอยากจะพูดอะไรบางอย่าง แต่สุดท้ายก็ต้องกลืนคำพูดเหล่านั้นกลับลงไป","อืม...ก็สมเหตุสมผลดี ตราบใดที่ศัตรูตายจนหมด มันก็จะเกิดความสงบสุขตามธรรมชาติเอง!","ถือเป็นการแก้ปัญหาสงครามจากต้นเหตุอย่างแท้จริง!"]},{"n":360,"t":"กองทัพของเราไม่ได้เสียสละ พวกเขาแค่กลับสู่อ้อมกอดของพระผู้เป็นเจ้าล่วงหน้า!","c":["“ข้ามีความสัมพันธ์อันดีกับปรมาจารย์แก็ตลิง และเคยพูดคุยกันหลายครั้ง ดังนั้นจึงค่อนข้างเข้าใจโครงสร้างและหลักการทำงานของปืนกล”","ลินน์อธิบายต่อไป","“น่าเสียดายที่อาวุธชนิดนี้อันตรายเกินไป หากแพร่กระจายออกไป อาจจะทำให้สงครามโหดร้ายมากยิ่งขึ้น ดังนั้น หลังจากที่คิดค้นขึ้นมาได้ มันจึงถูกสมาคมเวทมนตร์เร้นลับปิดผนึกเอาไว้ ซึ่งทำให้จอมเวทผู้ยิ่งใหญ่ที่อายุมากท่านนี้จึงตรอมใจตาย และมันเพิ่งจะถูกนำกลับมาใช้อีกครั้งเมื่อไม่นานมานี้ เพื่อรับมือกับสงครามของศาสนจักร!”","เมื่อได้ยินเช่นนี้ วิลสันก็รู้สึกเสียดายไม่น้อย อัจฉริยะที่พัฒนาอาวุธสังหารเช่นนี้ กลับต้องมาจบชีวิตลงแบบนี้","ในเวลาเดียวกัน เขาก็รู้สึกว่านี่คงจะเป็นการตัดสินใจที่ถูกต้องที่สุด ที่สมาคมเวทมนตร์เร้นลับเคยทำมา เพราะเขาไม่อยากจะจินตนาการเลยว่า หากของสิ่งนี้แพร่กระจายออกไป สงครามจะกลายเป็นสภาพไหน","ต่อให้เป็นพ่อมดเต็มตัวอย่างพวกเขา หากถูกปืนกลจ่อในสนามรบ ก็อาจจะถูกยิงพรุนจนเป็นรังผึ้งได้","วิลสันถึงขั้นสงสัยว่า ท่านศาสตราจารย์ลินน์อาจจะมีส่วนร่วมในการพัฒนาอาวุธสังหารนี้ด้วยซ้ำ มิฉะนั้นแล้ว ทำไมเขาถึงได้รู้รายละเอียดมากมายขนาดนี้ แถมยังสามารถวาดแบบแปลนออกมาได้โดยตรงอีก...","“หากพวกเจ้าสามารถสร้างปืนกลที่ได้มาตรฐานห้ากระบอกได้ภายในหนึ่งสัปดาห์ หลังจบสงครามครั้งนี้ ข้าจะเสนอผลงานของพวกเจ้าต่อสภา และทุกคนที่มีส่วนร่วมในการวิจัยปืนคาบศิลารุ่นใหม่ จะได้รับเหรียญตราดาวประกายพฤกษ์คนละหนึ่งเหรียญ!”","ลินน์กล่าวให้กำลังใจ","นักเล่นแร่แปรธาตุที่อยู่ที่นี่ส่วนใหญ่ ล้วนมีส่วนร่วมในการผลิตและปรับปรุงปืนคาบศิลา ปืนนกสับ และปืนแม่เหล็กไฟฟ้า การไม่ให้รางวัลเลยก็ดูจะเกินไปหน่อย","เมื่อได้ยินเช่นนั้น วิลสันและคนอื่นๆ ก็รู้สึกตื่นเต้นเป็นอย่างมาก เพราะเหรียญตราดาวประกายพฤกษ์คือสิ่งที่พ่อมดเต็มตัวส่วนใหญ่ใฝ่ฝันถึงมาตลอดชีวิต ถือเป็นเกียรติยศอันยิ่งใหญ่!","ส่วนเหรียญตราที่สูงส่งยิ่งกว่าอย่างเหรียญตราจันทร์สีเงินและเหรียญตราโคโรนานั้น มักจะถูกเตรียมไว้สำหรับจอมเวทผู้ยิ่งใหญ่และพ่อมดระดับตำนาน แต่ข้อยกเว้นเพียงหนึ่งเดียวในช่วงหลายร้อยปีที่ผ่านมาก็คือลินน์ ซึ่งพวกเขาไม่กล้าคาดหวังว่าจะสามารถเทียบชั้นกับดาวรุ่งแห่งเวทมนตร์ท่านนี้ได้...","ลิเดียยิ่งตื่นเต้นจนเก็บอาการไม่อยู่ หากเป็นเช่นนี้ อีกไม่นานเธอก็จะกลายเป็นแม่มดฮาล์ฟลิ่งคนแรกในประวัติศาสตร์ ที่ได้รับเหรียญตราดาวประกายพฤกษ์แล้ว!","เมื่อมีเกียรติยศที่กำลังจะได้รับมาเป็นแรงกระตุ้น ความเหนื่อยล้าจากการอดหลับอดนอนก็มลายหายไปจนหมดสิ้น หลังจากที่เหล่านักเล่นแร่แปรธาตุดื่มยาเวทมนตร์ฟื้นฟูพลังงานไปหนึ่งขวด พวกเขาก็เริ่มครุ่นคิดถึงวิธีที่จะสร้างของสิ่งนี้ขึ้นมา","แม้ว่าจะมีแบบแปลนที่สมบูรณ์ แต่ระดับความเป็นอัตโนมัติของปืนกลนั้น ไม่ใช่สิ่งที่ปืนคาบศิลาและปืนนกสับจะสามารถเทียบได้ มันมีอุปสรรคทางเทคนิคมากมายที่ต้องเอาชนะ และเวลาหนึ่งสัปดาห์ก็กระชั้นชิดมาก","เมื่อเห็นวิลสันและคนอื่นๆ มีไฟในการทำงานอย่างเต็มเปี่ยม ลินน์ก็พยักหน้าด้วยความพึงพอใจ เมื่อมีอาวุธเลเซอร์สำหรับต่อต้านอากาศยาน และปืนกลหลายกระบอกเป็นไพ่ตาย พวกเขาก็ไม่จำเป็นต้องตั้งรับเพียงอย่างเดียว แต่สามารถเปลี่ยนเป็นฝ่ายรุกได้!","ลินน์รู้สึกสนใจน้ำมันดิบที่อัศวินกริฟฟอนพวกนั้นใช้ในการลอบวางเพลิงมาก สรุปก็คือ เขาต้องได้แหล่งผลิตน้ำมันแห่งนี้!","...","ยามค่ำคืน นอกเมืองหลวงของอาณาจักรฮัดลาตา","ท่ามกลางเสียงสวดมนต์และบทเพลงสรรเสริญ พื้นดินก็สั่นสะเทือนอย่างรุนแรง และกำแพงดินสูงกว่าสองเมตรก็พุ่งทะยานขึ้นจากพื้น ก่อตัวเป็นค่ายพักแรมชั่วคราว","จากนั้น พระคาร์ดินัลหลายคนก็ร่วมมือกันร่ายม่านพลังศักดิ์สิทธิ์ สร้างกำแพงคุ้มกันที่แผ่ขยายออกไปหลายกิโลเมตร","เนื่องจากขอบเขตของพลังศักดิ์สิทธิ์นั้นกว้างใหญ่มาก พลังป้องกันจึงกระจายตัวออกไป แม้แต่เวทมนตร์ระดับหนึ่งวงแหวนก็สามารถทำลายมันได้อย่างง่ายดาย แต่ของสิ่งนี้ไม่ได้มีไว้เพื่อป้องกันการโจมตีอยู่แล้ว เพราะมันถูกเสริมด้วยพลังศักดิ์สิทธิ์ ตรวจสอบความชั่วร้ายและรับรู้สิ่งมีชีวิต...","อย่างแรกสามารถตรวจจับความผันผวนของพลังเวทได้ ส่วนอย่างหลังสามารถทำให้สิ่งมีชีวิตบางชนิดไม่สามารถหลบซ่อนตัวได้ จุดประสงค์ก็เพื่อป้องกันไม่ให้พวกพ่อมดที่เจ้าเล่ห์ ลอบเข้ามาด้วยการแปลงกายหรือล่องหน","ทันทีที่ม่านพลังศักดิ์สิทธิ์ถูกโจมตี บิชอปและนักบวชที่รักษาการณ์อยู่ในบริเวณใกล้เคียงก็จะรีบรุดไปที่นั่นทันที","แสงแห่งพลังศักดิ์สิทธิ์ที่สาดส่องลงมาจากม่านพลัง ช่วยปลอบประโลมเหล่าทหารกองกำลังพันธมิตรที่เพิ่งจะผ่านพ้นสงครามอันโหดร้ายมาได้เล็กน้อย แต่เพียงแค่พวกเขาหลับตาลง ก็จะนึกถึงเสียงคำรามของปืนคาบศิลาและปืนใหญ่ พร้อมกำแพงเมืองที่ชุ่มไปด้วยเลือดได้กลายเป็นฝันร้ายที่ยากจะลบเลือนในใจของพวกเขาไปแล้ว","“เหล่าประชากรของพระผู้เป็นเจ้าเอ๋ย เหล่าปีศาจกำลังเดินดินอยู่บนโลกใบนี้ สมุนผู้ชั่วร้ายของพวกมันได้ยึดครองอาณาจักร และพยายามจะเปลี่ยนโลกมนุษย์ให้กลายเป็นนรก...จงอย่าได้หวาดกลัว และอย่าได้ตื่นตระหนก ทั้งหมดนี้ล้วนเป็นบททดสอบของพระผู้เป็นเจ้า ผู้เสียสละที่ต่อสู้เพื่อพระผู้เป็นเจ้า ล้วนแต่กลับสู่อ้อมกอดของพระองค์ล่วงหน้า และจะได้เพลิดเพลินกับความสงบสุขและความปีติยินดีอันไม่มีที่สิ้นสุดในอาณาจักรแห่งเทพ...”","นักบวชผู้มีสีหน้าเวทนา ตะโกนประกาศศรัทธาต่อพระผู้เป็นเจ้า ท่ามกลางสายตาของเหล่าทหารที่กำลังหวาดหวั่น ส่วนนักบวชอีกกว่าสิบคนที่อยู่รอบๆ ก็กำลังสวดมนต์เสียงดัง เพื่อปลอบประโลมทหารกองกำลังพันธมิตรที่กำลังตื่นตระหนก","เมื่อเทียบกับพวกทหารเลวเหล่านี้ กริฟฟอนที่แสนล้ำค่ากลับได้รับการดูแลที่ดีกว่า โดยมีบิชอปเป็นผู้ลงมือใช้พลังศักดิ์สิทธิ์ เพื่อขจัดความหวาดกลัวต่อเวทมนตร์สายฟ้าของพวกมันด้วยตัวเอง","และสิ่งเดียวที่ไม่ได้รับผลกระทบเลย ก็คือพวกกองทัพทัณฑ์ศักดิ์สิทธิ์ที่สวมชุดเกราะเงิน","สมาชิกของกองทัพทัณฑ์ศักดิ์สิทธิ์ทุกคน ล้วนเป็นยอดฝีมือที่ผ่านการต่อสู้ในกองซากศพและทะเลเลือดมาแล้ว พวกเขาเคยเป็นพยานถึงการตายอย่างน่าสยดสยองของเพื่อนร่วมรบ ภายใต้เขี้ยวเล็บของสัตว์ประหลาดและสัตว์ร้ายขนาดยักษ์ การปราบปรามและจับกุมพ่อมดที่อันตรายเหล่านั้น ล้วนเป็นเรื่องปกติสำหรับพวกเขา ดังนั้น แม้ว่าการต่อสู้ในตอนเที่ยงวันจะโหดร้ายเพียงใด แต่มันก็ไม่เพียงพอที่จะสั่นคลอนจิตใจและศรัทธาของพวกเขาได้","ในตอนนี้ ที่ใจกลางค่ายพักแรม ภายใต้การคุ้มกันของกองกำลังชุดเกราะเงิน ภายในเต็นท์สีขาวบริสุทธิ์ที่ถูกตั้งขึ้นชั่วคราว","เอ็ดเวลกำลังรับฟังรายงานยอดผู้บาดเจ็บและเสียชีวิตจากสงครามครั้งนี้ ซึ่งมากกว่าที่คาดการณ์ไว้ในสถานการณ์ที่เลวร้ายที่สุดเสียอีก","ยอดผู้เสียชีวิตรวมอยู่ที่สองหมื่นสามพันห้าร้อยกว่าคน นอกจากนี้ยังมีอัศวินกริฟฟอนหนึ่งร้อยสิบเจ็ดคน และกองทัพทัณฑ์ศักดิ์สิทธิ์อีกสองร้อยคน ที่ตายภายใต้ตาข่ายสายฟ้า และเครื่องมือเล่นแร่แปรธาตุที่สามารถยิงแสงสายฟ้าด้วยความเร็วสูงมากเหล่านั้น","เมื่อได้ยินข่าวร้ายเหล่านี้ สีหน้าของเหล่าพระคาร์ดินัลก็มืดมนลง","ผลลัพธ์ของศึกแรกนี้ สามารถอธิบายได้ด้วยคำว่าความอัปยศเท่านั้น เพราะก่อนหน้านี้ แม้แต่ในสงครามปราบปรามเทพเจ้าผู้ชั่วร้าย พวกเขาก็ไม่เคยประสบกับความพ่ายแพ้ที่ยับเยินขนาดนี้มาก่อน!","พูลสันไม่อยากจะคิดเลยว่า หากข่าวนี้แพร่กระจายกลับไปยังเมืองศักดิ์สิทธิ์ จะทำให้เกิดความโกลาหลมากเพียงใด นี่ถือเป็นการดูหมิ่นความสง่างามของพระผู้เป็นเจ้าอย่างแท้จริง!","ในความเห็นของเขา การที่มีผู้บาดเจ็บและเสียชีวิตอย่างหนักหน่วงเช่นนี้ แต่กลับไม่ได้รับชัยชนะอะไรกลับมาเลย ล้วนเป็นเพราะการบัญชาการที่ไร้ประสิทธิภาพของเอ็ดเวล!","“เมื่อครู่นี้พวกเราไม่ควรรีบถอยทัพ แม้ว่าอาวุธของพวกพ่อมดเหล่านั้นจะทรงพลัง แต่ก็ไม่สามารถคงอยู่ได้ตลอดไปแน่ และการตายของคนสองหมื่นคนก็อาจจะผลักดันให้พวกสาวกของเทพเจ้าผู้ชั่วร้ายมาถึงขีดจำกัดแล้วก็ได้! ก็เหมือนกับเขื่อนที่ถูกมดและแมลงกัดกิน แค่ผลักเบาๆ มันก็จะพังทลายลงมา!”","พูลสันกล่าวด้วยน้ำเสียงหนักแน่น","เขาไม่รู้ว่าปืนคาบศิลาและปืนใหญ่ทำงานอย่างไร แต่ยกเว้นพระผู้เป็นเจ้าผู้ยิ่งใหญ่แล้ว ไม่มีพลังใดที่ไร้ขีดจำกัดและเป็นนิรันดร์!","พลังที่แข็งแกร่งมักจะหมายถึงการผลาญพลังที่น่าสะพรึงกลัว!","หากในช่วงเวลาที่สงครามดุเดือดที่สุด เอ็ดเวลออกคำสั่งบังคับให้อัศวินกริฟฟอน ร่วมมือกับพวกเขาทำการจู่โจมอย่างไม่คิดชีวิต บางทีในตอนนี้ พวกเขาอาจจะกำลังเฉลิมฉลองชัยชนะอยู่ในเมืองหลวงแล้วก็ได้!"]},{"n":361,"t":"อันที่จริงเป้าหมายทางยุทธศาสตร์ของเราสำเร็จแล้ว!","c":["“ข้าคิดว่าอาวุธสายฟ้าที่ทรงพลังขนาดนั้น น่าจะเป็นไพ่ตายใบสุดท้ายของพวกมันแล้ว!”","พูลสันกล่าวด้วยความมั่นใจอย่างยิ่ง","บิชอปหลายคนที่อยู่ที่นั่นก็พยักหน้าเห็นด้วย พวกเขาเชื่ออย่างสนิทใจในข้อสันนิษฐานที่ว่า สาวกของเทพเจ้าผู้ชั่วร้ายเหล่านั้นกำลังอ่อนแอลงอย่างมาก...","ท้ายที่สุดแล้ว มันไม่มีเหตุผลเลยที่พวกเขาจะต้องสูญเสียอย่างหนักขนาดนี้ ในขณะที่อีกฝ่ายยังคงอยู่ในสภาพที่สมบูรณ์ เป็นไปได้มากว่าพวกเขาขาดเพียงแค่อีกนิดเดียวเท่านั้น หากพวกเขาไม่รีบถอยทัพออกมาก่อนที่พวกพ่อมดจะทนไม่ไหว","“แต่การฝืนโจมตีเช่นนั้น จะต้องแลกมาด้วยราคาเท่าใดกัน?”","พระคาร์ดินัลท่านหนึ่งขมวดคิ้วด้วยความไม่พอใจ และเอ่ยแย้งขึ้น","หากฝืนโจมตีเมืองโดยไม่สนใจความสูญเสีย แม้ว่าท้ายที่สุดจะสามารถยึดเมืองหลวงได้สำเร็จ แต่ความสูญเสียที่เกิดขึ้นก็ไม่ใช่สิ่งที่พวกเขาสามารถยอมรับได้อย่างแน่นอน","หากกองกำลังพันธมิตรของขุนนางในอาณาจักรต้องตายไป ก็ช่างมันเถอะ แต่หากกองทัพทัณฑ์ศักดิ์สิทธิ์และกองอัศวินกริฟฟอนต้องสูญเสียมากเกินไป พวกเขาทุกคนก็จะต้องขึ้นศาลแห่งการไต่สวน!","ชั่วขณะหนึ่ง ภายในเต็นท์สีขาวบริสุทธิ์ บิชอปหลายสิบคนต่างก็แสดงความคิดเห็นของตนเอง และโต้เถียงกันจนหน้าดำหน้าแดง","เสียงโต้เถียงของทุกคน ทำให้สีหน้าของเอ็ดเวลที่นั่งอยู่ในตำแหน่งประธานดูไม่สบอารมณ์มากยิ่งขึ้น และมีแรงกดดันที่ยากจะอธิบายเริ่มปรากฏขึ้นภายในเต็นท์","เหล่าบิชอปที่อยู่ที่นั่น ราวกับถูกพลังบางอย่างบีบคอและจมูกเอาไว้ เสียงโต้เถียงภายในเต็นท์สงบลงแทบจะในทันที","แม้แต่พูลสันที่เป็นพระคาร์ดินัลเหมือนกันก็ยังรู้สึกไม่สบายใจนัก ราวกับมีบางสิ่งมากดทับร่างกายของเขาเอาไว้ การเอ่ยปากพูดดูเหมือนจะกลายเป็นเรื่องที่ยากลำบากอย่างยิ่ง","พูลสันหันไปมองเอ็ดเวลที่นั่งอยู่ด้านบนด้วยความยากลำบาก ใบหน้าของเขาเต็มไปด้วยความหวาดกลัว และในหัวก็คิดถึงข่าวลือที่เคยได้ยินภายในศาสนจักรก่อนหน้านี้ทันที","มีข่าวลือว่า เอ็ดเวลได้รับพรจากพระผู้เป็นเจ้า และได้ก้าวข้ามขั้นนั้นไปแล้ว เขาคือผู้ที่ถูกกำหนดให้เป็นประธานผู้พิพากษาคนต่อไป!","การรณรงค์ปราบปรามอาณาจักรในครั้งนี้ ก็เพื่อสร้างผลงานให้กับเอ็ดเวล เพื่อให้เขาได้รับความดีความชอบที่มากพอจะทำให้ทุกคนยอมรับ","ก่อนหน้านี้พูลสันรู้สึกเย้ยหยันกับข่าวลือนี้มาก ท้ายที่สุดแล้ว ไม่ว่าจะมองจากคุณวุฒิหรือความศรัทธาต่อพระผู้เป็นเจ้า เอ็ดเวลก็ไม่ได้อยู่ในอันดับต้นๆ ของพระคาร์ดินัลเลย แล้วเขาจะมีคุณสมบัติอะไรที่จะได้รับความโปรดปรานจากพระผู้เป็นเจ้า?","แต่ตอนนี้ดูเหมือนว่าข่าวลือนี้จะไม่ได้ไร้ต้นตอเสียทีเดียว...","หลังจากที่ภายในเต็นท์สงบลงอย่างสมบูรณ์แล้ว เอ็ดเวลจึงค่อยเอ่ยปากขึ้น","“ทุกท่าน ศัตรูที่พวกเราเผชิญหน้าในครั้งนี้ ไม่ใช่สาวกของเทพเจ้าผู้ชั่วร้ายที่หละหลวมเหมือนในอดีต แต่มาจากดินแดนแห่งปีศาจ ซ่อนตัวอยู่เบื้องหลังเพื่อบงการทุกสิ่ง โดยสั่งสมพลังมานานนับร้อยปี และพยายามตั้งตนเป็นปฏิปักษ์กับศาสนจักรและจักรวรรดิ”","“แน่นอนว่านั่นเป็นเพียงความเพ้อฝันของพวกคนโง่เขลา แต่ก็ไม่มีใครรู้ว่าในช่วงหลายปีที่ผ่านมานี้ พวกมันได้ค้นคว้าและพัฒนาคาถาที่แปลกประหลาดและทรงพลังออกมามากเพียงใด และได้กลืนกินวิญญาณของผู้บริสุทธิ์ไปมากเท่าใด...”","“พวกเจ้าก็คงจะได้เห็นอาวุธรุ่นใหม่ที่พวกพ่อมดเหล่านั้นคิดค้นขึ้นมาแล้วสินะ”","เอ็ดเวลมองไปรอบๆ ทุกคนที่อยู่ที่นั่น แล้วเอ่ยถามต่อ","“หากพูดถึงอาวุธที่สามารถยิงแสงสายฟ้าได้นั้น ในหมู่พวกเจ้ามีกี่คนที่สามารถต้านทานมันได้?”","เหล่าบิชอปต่างก็พูดไม่ออก พวกเขาล้วนจดจำความเร็วอันน่าสะพรึงกลัวของปืนแม่เหล็กไฟฟ้าได้อย่างแม่นยำ","พูลสันรู้สึกไม่ยอมรับอยู่บ้าง หากก่อนหน้านี้เขาเป็นคนที่ถูกเล็ง เขาก็มั่นใจว่าสามารถหลบการโจมตีได้ก่อนที่มันจะมาถึง","แต่เมื่อลองคิดดูให้ดี พูลสันก็ไม่ได้เอ่ยปากโต้แย้งออกไป ที่เขามั่นใจว่าจะหลบได้ ก็เพราะว่าระยะห่างมันมากพอ หากอยู่ใกล้กว่านี้ ภายในระยะห้าร้อยเมตร และโดนระดมยิงเข้าใส่หลายๆ ครั้ง เขาก็คงจะหลีกเลี่ยงหายนะไม่ได้เช่นกัน","“ดังนั้น การโจมตีเพื่อหยั่งเชิงในครั้งนี้จึงไม่ใช่ว่าไม่มีผลลัพธ์เลย อย่างน้อยพวกเราก็มีความเข้าใจในอาวุธรูปแบบใหม่ที่สาวกของเทพเจ้าผู้ชั่วร้ายพวกนั้นครอบครองอยู่บ้างแล้ว”","เอ็ดเวลกล่าวด้วยน้ำเสียงทุ้มต่ำ","ในแง่หนึ่ง เป้าหมายทางยุทธศาสตร์ของศึกแรกก็สำเร็จลุล่วงไปได้ด้วยดี พวกเขาได้ทำการตรวจสอบอาวุธรูปแบบใหม่ของพวกพ่อมด ที่ถูกกล่าวถึงในรายงานลับของอาณาจักรทั้งหมดแล้ว","ส่วนสิ่งประดิษฐ์เล่นแร่แปรธาตุขนาดมหึมาที่สามารถบินขึ้นไปบนท้องฟ้าได้นั้น ก็ไม่กล้าที่จะบินขึ้นไปสุ่มสี่สุ่มห้า ภายใต้แรงกดดันจากอัศวินกริฟฟอน","สิ่งเดียวที่เหนือความคาดหมายของเขาก็คือ ตาข่ายสายฟ้านิรนามที่สามารถครอบคลุมน่านฟ้าได้เป็นบริเวณกว้าง ซึ่งสร้างความเสียหายอย่างหนักให้กับกองอัศวินกริฟฟอน และทำให้พวกเขาสูญเสียโอกาสที่จะยึดเมืองหลวงได้อย่างรวดเร็ว","หลังจากที่เอ็ดเวลครุ่นคิดอยู่ครู่หนึ่ง สายตาของเขาก็มองไปที่ด้านข้างทันที","“เวด! ภารกิจที่ข้ามอบหมายให้เจ้าก่อนหน้านี้ เจ้าทำสำเร็จไปมากน้อยเพียงใดแล้ว?”","เวดรีบคุกเข่าลงข้างหนึ่งทันที และหยิบแผนที่ออกมา พร้อมกับกล่าวด้วยความเคารพว่า","“เรียนท่านเอ็ดเวล พวกเราได้ตรวจสอบสถานการณ์การป้องกันภายในเมืองหลวงเรียบร้อยแล้วขอรับ!”","ทันทีที่เอ็ดเวลคิด แผนที่ในมือของเวดก็ลอยขึ้นมาและคลี่ออกตรงหน้าของทุกคน","สิ่งที่วาดอยู่บนนั้นคือแผนที่ของเมืองหลวงทั้งเมือง","พวกเขาเคยดูแผนที่ฉบับนี้มาหลายครั้งแล้วก่อนที่จะมาถึงที่นี่ แต่เนื่องจากพวกพ่อมดได้ยึดครองที่นี่มานานกว่าสองเดือนแล้ว ดังนั้น พวกเขาจึงยังไม่ทราบถึงการเปลี่ยนแปลงภายใน","และไม่ต้องสงสัยเลยว่าเวดได้บันทึกการเปลี่ยนแปลงทั้งหมดนี้เอาไว้แล้ว ตัวอย่างเช่น เมื่อถูกโจมตี สถานที่ที่มีม่านพลังเวทมนตร์คอยปกป้องอยู่ภายในเมืองหลวงนั้นมีทั้งหมดสามสิบเจ็ดแห่ง","สถานที่ที่อาจจะเป็นยุ้งฉางและคลังอาวุธ ล้วนถูกวงไว้ด้วยเส้นสีแดง","หนึ่งในสถานที่เหล่านั้น มีการป้องกันที่แน่นหนายิ่งกว่าพระราชวังเสียอีก โดยมีพลปืนคาบศิลากว่าพันคน และพ่อมดอีกกว่าสิบคนคอยคุ้มกัน จนทำให้อัศวินกริฟฟอนทีมหนึ่งที่เข้าไปหยั่งเชิงเกือบจะถูกยิงตกลงมา","“ที่นี่อาจจะเป็นสถานที่รวมตัวของพวกพ่อมดก็ได้!”","บิชอปคนหนึ่งคาดเดา","สถานที่ที่มีการป้องกันแน่นหนากว่าพระราชวัง ก็คงมีเพียงสถานที่ที่พวกจอมเวทผู้ยิ่งใหญ่พักอาศัยอยู่เท่านั้น","“ไม่ เป็นไปไม่ได้...”","พูลสันส่ายหัว สถานที่แห่งนี้มีพื้นที่กว้างขวาง เป็นลานฝึกซ้อมของเหล่าอัศวินแห่งอาณาจักรมาก่อน พวกจอมเวทผู้ยิ่งใหญ่ไม่มีทางลดตัวลงมาอาศัยอยู่ในสถานที่แบบนี้หรอก","เป็นไปได้มากว่ามันจะเป็นสถานที่ผลิตอาวุธเวทมนตร์เหล่านั้น...","และสิ่งที่ทำให้พูลสันรู้สึกประหลาดใจเล็กน้อยก็คือ สถานที่ที่ได้รับการคุ้มครองด้วยม่านพลังเวทมนตร์นั้น ถึงกับรวมไปถึงโบสถ์หลายแห่งภายในเมืองหลวงด้วย","ดูเหมือนว่าแม้สาวกของเทพเจ้าผู้ชั่วร้ายเหล่านี้จะยึดครองเมืองหลวงได้ แต่พวกมันก็ยังคงหวาดกลัวต่อความสง่างามของพระผู้เป็นเจ้า และไม่กล้าที่จะทำลายที่พำนักที่ใช้สำหรับบูชาพระผู้เป็นเจ้าตามอำเภอใจ!","พูลสันคิดเช่นนั้น โดยที่ไม่รู้เลยว่าสาเหตุที่โบสถ์เหล่านี้ไม่ได้ถูกรื้อถอน ก็เป็นเพราะหลังคาของมันสูงพอ จึงเหมาะที่จะใช้เป็นโรงงานผลิตลูกตะกั่ว","อันที่จริง ภายในนั้นได้เปลี่ยนแปลงไปอย่างสิ้นเชิงแล้ว แม้แต่รูปปั้นของเอลา ก็ยังถูกหลอมละลายทิ้งไปแล้ว มิฉะนั้นเขาคงจะโกรธเกรี้ยว และบุกเข้าไปในเมืองหลวงเพื่อฆ่าพวกคนนอกรีตที่บัดซบเหล่านี้อย่างแน่นอน","“ดีมาก!”","เอ็ดเวลเผยรอยยิ้มออกมา หลังจากที่ได้ดูแผนที่ จากนั้นเขาก็สั่งให้คนนำตัวขุนนางของอาณาจักรคนหนึ่งเข้ามา","เขาเป็นขุนนางชราที่มีอายุราวๆ ห้าสิบปี รูปร่างผอมบาง และมีใบหน้าที่เต็มไปด้วยรอยเหี่ยวย่น ทันทีที่เขาเห็นเอ็ดเวล เขาก็รีบคุกเข่าก้มกราบอย่างร้อนรน","“ท่านเซอร์ซูซ ข้าคิดว่าเส้นทางลับที่นำไปสู่เมืองหลวง คงจะยังไม่ถูกพวกสาวกของเทพเจ้าผู้ชั่วร้ายทำลายทิ้งไปหรอกใช่ไหม?”","เอ็ดเวลเอ่ยถามด้วยความมั่นใจ"]},{"n":362,"t":"หลีกเลี่ยงจุดแข็งของศัตรู และโจมตีที่จุดอ่อน!","c":["“ข้าได้ตรวจสอบดูแล้ว ขอรับท่านเอ็ดเวล เส้นทางลับสายนั้นยังคงสามารถใช้ผ่านเข้าไปได้”","ซูซที่แก่ชรากล่าวด้วยความตื่นเต้น","“หลังจากที่ยึดเมืองหลวงได้สำเร็จ ข้าจะรายงานความดีความชอบของเจ้าต่อองค์พระสันตะปาปา”","เอ็ดเวลพยักหน้า จากนั้นก็อธิบายให้เหล่าบิชอปที่กำลังสับสนงุนงงฟัง","มีคนเพียงไม่กี่คนที่รู้ว่า เพื่อหลีกเลี่ยงการพ่ายแพ้ในการแย่งชิงบัลลังก์และต้องจบลงด้วยความตาย องค์ชายใหญ่แฮโรลด์ จึงจงใจขุดเส้นทางลับซ่อนเอาไว้ใต้ดินของเมืองหลวง","โดยทางเข้าจะอยู่ภายในบ่อน้ำลึกในสลัมของเมืองหลวง ส่วนทางออกอยู่ในป่าทึบทางประตูทิศตะวันตก","คนที่รู้เรื่องนี้มีเพียงองค์ชายใหญ่ และคนสนิทที่ไว้ใจได้อีกไม่กี่คนเท่านั้น","น่าเสียดายที่สาวกของเทพเจ้าผู้ชั่วร้ายพวกนั้นบุกยึดเมืองหลวงกะทันหันเกินไป ระหว่างทางที่องค์ชายใหญ่กำลังหลบหนีไปยังเส้นทางลับ เขาก็ถูกทหารปืนคาบศิลาสองกองปิดล้อมทั้งหน้าหลัง ทั้งตัวเขาและองครักษ์ส่วนตัว จึงตายอยู่ท่ามกลางห่ากระสุน","มีเพียงซูซที่ได้รับคำสั่งให้เฝ้าอยู่ที่ทางออกเท่านั้น ที่รอดชีวิตมาได้","เมื่อได้ยินเช่นนี้ เหล่าบิชอปที่อยู่ที่นั่นจึงเพิ่งเข้าใจ ว่าแท้จริงแล้วเอ็ดเวลมีแผนรับมืออยู่แล้ว การโจมตีที่ดูรุนแรงในตอนเที่ยงวัน แท้จริงแล้วเป็นเพียงการหยั่งเชิง เพื่อดูว่าพวกสาวกของเทพเจ้าผู้ชั่วร้ายมีลูกไม้ที่รับมือยากอะไรบ้าง","“พูลสัน เจ้าจงนำองครักษ์เงาส่วนหนึ่ง ลอบเข้าไปในเมืองหลวง แล้วรอคำสั่งจากข้า!”","เอ็ดเวลออกคำสั่งอีกครั้ง","“ขอรับ ข้าจะทำตามพระประสงค์ของพระผู้เป็นเจ้า!”","พูลสันตอบรับด้วยความเคารพ ความกังขาเกี่ยวกับการบัญชาการที่ไร้ประสิทธิภาพของเอ็ดเวลก่อนหน้านี้ได้มลายหายไปจนหมดสิ้น","องครักษ์เงา คือกองกำลังพิเศษที่ศาสนจักรปลุกปั้นขึ้นมาอย่างพิถีพิถัน แม้พวกเขาจะไม่มีชื่อเสียงโด่งดังเหมือนกองทัพทัณฑ์ศักดิ์สิทธิ์และกองอัศวินกริฟฟอน แต่ความสามารถของพวกเขาก็โดดเด่นไม่แพ้กัน พวกเขาคือนักฆ่าและสายลับที่ยอดเยี่ยมที่สุด","ภายในศาสนจักรมักจะมีเสียงวิพากษ์วิจารณ์อยู่เสมอ ว่าการมีอยู่ขององครักษ์เงา ถือเป็นการทำให้ความศักดิ์สิทธิ์ของพระผู้เป็นเจ้ามัวหมอง แต่พูลสันไม่ใช่พวกหัวโบราณคร่ำครึ หากต้องการจะรับมือกับสาวกของเทพเจ้าผู้ชั่วร้ายที่เจ้าเล่ห์และมีเวทมนตร์อันแปลกประหลาด บางครั้งก็ต้องใช้วิธีการที่เปิดเผยไม่ได้บ้าง","และป้อมปราการที่แข็งแกร่งที่สุด ก็มักจะถูกทำลายจากภายในเสมอ!","หลังจากที่ตกลงแผนการโจมตีเมืองหลวง โดยให้ประสานงานจากทั้งภายในและภายนอกแล้ว เหล่าบิชอปก็หารือกันต่อ ถึงวิธีรับมือกับอาวุธรุ่นใหม่ของพวกพ่อมดที่มีอยู่อย่างไม่สิ้นสุด เพื่อลดความสูญเสียให้ได้มากที่สุด","“อาวุธพวกนี้แม้จะมีอานุภาพร้ายแรง แต่ก็ต้องใช้เวลาในการใช้งานและเตรียมการ ข้าสังเกตเห็นว่า ปืนคาบศิลาที่พวกมันถืออยู่ในมือนั้น มีระยะห่างในการยิงแต่ละนัดประมาณหนึ่งนาที เพียงแต่พวกมันแบ่งออกเป็นหลายกลุ่มเพื่อสลับกันยิง และสร้างการโจมตีอย่างต่อเนื่อง ส่วนปืนใหญ่ที่มีอานุภาพร้ายแรงกว่านั้น มีระยะห่างประมาณครึ่งนาที...”","พระคาร์ดินัลท่านหนึ่งวิเคราะห์ด้วยสีหน้าเคร่งเครียด","ระยะเวลาพักที่ยาวนานเช่นนี้ ถือเป็นจุดอ่อนที่ใหญ่หลวงมาก หากไม่มีกำแพงเมืองขวางกั้น พวกเขาเพียงแค่ใช้พลังศักดิ์สิทธิ์เสริมพลังป้องกันให้กับทหารม้าหลายพันนาย แล้วทะลวงฝ่าไป ก็สามารถคว้าชัยชนะมาได้อย่างง่ายดาย","นอกจากนี้ จากรูปแบบของอาวุธแล้ว ความสามารถในการต่อสู้ระยะประชิดของทหารปืนคาบศิลาเหล่านี้น่าจะไม่เก่งกาจนัก บิชอปบางคนถึงขั้นมองโลกในแง่ดีอย่างหยิ่งผยองว่า เพียงแค่ใช้ทหารของกองทัพทัณฑ์ศักดิ์สิทธิ์แปดร้อยนาย ก็สามารถฆ่าทหารปืนคาบศิลาบนกำแพงเมืองนับหมื่นนายได้แล้ว","“ในตอนกลางวันพวกมันมีทัศนวิสัยกว้างไกล สามารถแสดงอานุภาพของอาวุธเหล่านี้ออกมาได้อย่างเต็มที่ บางทีเราอาจจะใช้แผนโจมตีในตอนกลางคืน เพราะต่อให้อาวุธรุ่นใหม่เหล่านี้จะร้ายกาจแค่ไหน หากเล็งไม่แม่นก็ไร้ประโยชน์...”","พระคาร์ดินัลท่านหนึ่งเสนอแนะ","ไม่ต้องสงสัยเลยว่านี่เป็นอีกหนึ่งข้อได้เปรียบของพวกเขา","ไม่ว่าจะเป็นกองทัพทัณฑ์ศักดิ์สิทธิ์หรือกองอัศวินกริฟฟอน ด้วยความช่วยเหลือจากพลังศักดิ์สิทธิ์ที่พวกเขามี พวกเขาก็สามารถมองเห็นในความมืดได้ และแสดงความสามารถในการต่อสู้ออกมาได้ไม่ด้อยไปกว่าปกติ","แต่ศัตรูของพวกเขากลับไม่ได้เป็นเช่นนั้น!","“เป็นแผนการที่ดีมาก!”","เอ็ดเวลกล่าวชื่นชม","การจะหาวิธีรับมือในระยะเวลาอันสั้นเช่นนี้ ไม่ใช่เรื่องที่ทำได้จริง แต่พวกเขาอสามารถหลีกเลี่ยงจุดแข็งของศัตรู และโจมตีที่จุดอ่อนของอีกฝ่ายได้อย่างสมบูรณ์","“ถ้าเช่นนั้น ก็กำหนดเวลาไว้เป็นอีกห้าวันให้หลังก็แล้วกัน!”","เอ็ดเวลตัดสินใจ","ห้าวันงั้นหรือ?","พูลสันคิดอยู่ครู่หนึ่ง นั่นน่าจะเป็นช่วงเวลาที่กำลังเสริมมาถึงพอดี","...","หลายวันต่อมา กองทัพนับหมื่นของศาสนจักรก็ปิดล้อมอยู่ข้างนอกเมืองหลวงแบบนั้น นอกจากพวกอัศวินกริฟฟอนที่จะบินไปเหนือน่านฟ้าของเมืองหลวงเป็นครั้งคราว เพื่อก่อกวนตามปกติแล้ว พวกเขาก็ไม่มีการเคลื่อนไหวใดๆ อีกเลย","ในขณะที่ลินน์กำลังวุ่นอยู่กับการพัฒนาอาวุธปืนรุ่นใหม่ เขาก็ไม่ได้ละเลยการสำรวจข้อมูล เขาได้จัดเตรียมทหารปืนคาบศิลาไว้หนึ่งกองพัน เพื่อใช้กล้องโทรทรรศน์จับตาดูความเคลื่อนไหวของคนเหล่านี้อย่างใกล้ชิด และให้พ่อมดสายจิตวิญญาณบางคน ควบคุมสัตว์ตัวเล็กๆ ที่ไม่สะดุดตา เพื่อดูว่าจะสามารถลอบเข้าไปในค่ายของอีกฝ่าย เพื่อสืบข่าวได้หรือไม่","แต่ศัตรูของพวกเขาเห็นได้ชัดว่ามีประสบการณ์อย่างโชกโชน โดยค่ายทั้งค่ายนั้นถูกห่อหุ้มด้วยม่านพลังศักดิ์สิทธิ์ ไม่ว่าจะเป็นนกหรือสัตว์ร้ายที่เดินอยู่บนดิน ขอเพียงแค่มีพลังเวทมนตร์เจือปนอยู่ ก็จะถูกตรวจพบเมื่อเดินผ่านทันที","แม้แต่หนูขุดดินหลายตัวที่ลินน์ควบคุมด้วยตัวเอง ก็ยังถูกขุดขึ้นมาจากใต้ดิน ความสามารถในการรับรู้เช่นนี้นับว่าน่าสะพรึงกลัวมาก ท้ายที่สุดแล้ว เขาก็ทำได้เพียงลดระดับความคาดหวังลง โดยการสำรวจจากระยะไกล เพื่อช่วยทหารปืนคาบศิลาในการสอดแนมเท่านั้น","“พลังศักดิ์สิทธิ์กับเวทมนตร์ไม่ใช่สิ่งเดียวกันหรอกหรือ? ทำไมพวกมันถึงสามารถแยกแยะความแตกต่างระหว่างสองสิ่งนี้ได้อย่างง่ายดาย?”","ลินน์รู้สึกสับสน หลังจากที่ได้รู้ถึงจุดเริ่มต้นของศาสนจักร ความสงสัยนี้ก็วนเวียนอยู่ในหัวของเขาและไม่ยอมหายไปไหน","“เรื่องนี้ข้าก็ไม่ค่อยรู้เรื่องเหมือนกัน เกรงว่าคงจะมีเพียงท่านประธานสภาเท่านั้นที่รู้เบื้องลึกเบื้องหลัง”","ราฟาเอลส่ายหัวด้วยความลังเล จากนั้นก็ก้มหน้าลงดูรายงานสองฉบับในมือ","ไม่ว่าจะเป็นทหารปืนคาบศิลาที่สังเกตการณ์ผ่านกล้องโทรทรรศน์ หรือพ่อมดสายจิตวิญญาณที่ควบคุมสิ่งมีชีวิต รายงานที่ส่งมาล้วนสอดคล้องกันอย่างยิ่ง","ในช่วงไม่กี่วันที่ผ่านมา กองกำลังปราบปรามของศาสนจักรกำลังเร่งตัดไม้ในป่าทึบนอกเมือง เพื่อสร้างเครื่องมือสำหรับโจมตีเมืองใหม่ พวกเขายุ่งจนหัวหมุน และดูเหมือนว่าจะยังไม่มีความตั้งใจที่จะโจมตีในระยะเวลาอันใกล้นี้","“ถ้าอย่างนั้นพวกเราก็คงพักผ่อนได้สักระยะหนึ่งแล้วล่ะ”","ราฟาเอลถอนหายใจออกมาอย่างโล่งอก ดูเหมือนว่าการปะทะกันในครั้งที่แล้ว พวกเขาจะสร้างความเสียหายอย่างหนักให้กับกองกำลังปราบปรามกลุ่มนี้จริงๆ ซึ่งสร้างความเกรงขามจนพวกมันไม่กล้าที่จะลงมือสุ่มสี่สุ่มห้าอีก","แน่นอนว่ามีความเป็นไปได้อีกอย่างหนึ่ง ก็คือเอ็ดเวลรู้สึกว่าพวกเขารับมือยาก ดังนั้นจึงตั้งใจจะรอให้กำลังเสริมมาถึงก่อน","“อย่าเพิ่งลดความระมัดระวังลงจะดีกว่า!”","ลินน์ไม่เห็นด้วยกับการประเมินของราฟาเอล บางครั้งยิ่งดูสงบมากเท่าไหร่ คลื่นใต้น้ำก็ยิ่งรุนแรงมากขึ้นเท่านั้น","“จริงสิ พวกเราสามารถสร้างม่านพลังเวทมนตร์ที่ครอบคลุมทั่วทั้งเมือง แบบที่พวกมันทำได้หรือไม่?”","จู่ๆ ลินน์ก็เอ่ยถามขึ้นมา นี่เป็นวิธีป้องกันการถูกลอบโจมตีที่ดีมาก ซึ่งจะช่วยประหยัดเรื่องยุ่งยากให้พวกเขาไปได้เยอะ","“เรื่องนี้...เกรงว่าคงจะไม่ง่ายขนาดนั้น”","ราฟาเอลยักไหล่ด้วยความจนใจ พื้นที่ของเมืองหลวงนั้นกว้างใหญ่เกินไป ใหญ่กว่าค่ายพักแรมที่กองกำลังปราบปรามของศาสนจักรตั้งขึ้นถึงหลายสิบเท่า และปริมาณการใช้พลังเวทจะต้องเป็นตัวเลขทางดาราศาสตร์อย่างแน่นอน แม้ว่าจอมเวทผู้ยิ่งใหญ่อย่างพวกเขาจะร่วมมือกัน ก็คงจะยืนหยัดอยู่ได้ไม่นานนัก","และการใช้คริสตัลเวทมนตร์ที่มีอยู่เพื่อประคองเอาไว้ก็ไม่ใช่ทางออก","พ่อมดไม่เหมือนกับนักบวชและบิชอปพวกนั้น ที่แค่ตะโกนสรรเสริญพระผู้เป็นเจ้าเสียงดัง ก็สามารถได้รับความช่วยเหลือจากพระเจ้าจอมปลอมนั่นได้แล้ว"]},{"n":363,"t":"ความยากลำบากทั้งหมดนี้ ล้วนเป็นบททดสอบของพระผู้เป็นเจ้า!","c":["เนื่องจากคริสตัลเวทมนตร์มีอยู่อย่างจำกัด พวกเขาจึงทำได้เพียงป้องกันสถานที่สำคัญๆ เป็นอันดับแรกเท่านั้น","ตัวอย่างเช่น ยุ้งฉาง คลังอาวุธ หรือไม่ก็สถาบันวิจัยการเล่นแร่แปรธาตุ","หลังจากที่เดนนิสอธิบาย ลินน์ก็ทำได้เพียงล้มเลิกความคิดอันสวยหรูนี้ไป และเอ่ยถามต่อด้วยความเสียดาย","“แล้วช่วงนี้ผู้ศรัทธาและพวกขุนนางที่ถูกกักบริเวณในเมืองหลวง ไม่ได้มีความเคลื่อนไหวอะไรที่ผิดปกติใช่ไหม?”","เมื่อเทียบกับภัยคุกคามจากภายนอกแล้ว เขากังวลเรื่องความวุ่นวายภายในเมืองหลวงมากกว่า หากถึงตอนนั้นต้องเผชิญกับปัญหาทั้งศึกในและศึกนอก ก็คงจะเป็นเรื่องยุ่งยากอย่างแท้จริง","“พวกเราส่งคนไปจับตาดูพวกขุนนางอย่างใกล้ชิดมาโดยตลอด ส่วนชาวเมืองในเมืองหลวงก็ค่อนข้างสงบเสงี่ยม นอกจากหน่วยฝึกฝนที่จับกุมชาวบ้านยากจน ที่รวมตัวกันสวดมนต์ได้สองสามคนแล้ว คนอื่นๆ ก็ไม่มีความเคลื่อนไหวใดๆ ที่ผิดปกติ”","คนที่ตอบกลับมาคือเรย์เดล ช่วงนี้เขารับผิดชอบงานลาดตระเวนและป้องกันภายในเมืองหลวง","แต่งานนี้ก็ไม่ได้ง่ายเลย เนื่องจากพวกเขาเพิ่งจะยึดเมืองหลวงมาได้ไม่นาน ความรู้สึกต่อต้านของผู้ศรัทธาบางส่วนจึงยังคงรุนแรงอยู่","และเนื่องจากตอนนี้ราชวงศ์ยังคงอยู่ พวกเขาจึงไม่สามารถใช้วิธีแบ่งแยกดินแดน หรือจับพวกขุนนางที่ทำชั่วมาแขวนคอ เพื่อเรียกร้องความเห็นใจจากชาวบ้านยากจนได้","แต่สิ่งเดียวที่น่าดีใจก็คือ ในตอนที่บุกยึดเมืองหลวง พระคาร์ดินัลคนนั้นก็ได้ช่วยพวกเขาจับกุมพวกคลั่งศาสนาออกมาจนหมดแล้ว ซึ่งตอนนี้ พวกมันก็ถูกส่งไปใช้แรงงานที่เหมืองกันหมดแล้ว","ส่วนคนที่เหลืออยู่ก็ล้วนแต่เป็นผู้ศรัทธาธรรมดา แม้ว่าพวกเขาจะศรัทธาในเทพเจ้าจอมปลอมอย่างเอลา แต่ก็ไม่ถึงขั้นคลั่งไคล้จนยอมสละชีวิตเพื่อเรื่องนี้","“ทัศนคติไม่ใช่สิ่งที่จะเปลี่ยนแปลงได้ในชั่วข้ามคืน”","ลินน์พยักหน้า เขามีการประเมินสถานการณ์ภายในเมืองหลวงคร่าวๆ อยู่แล้ว หลังจากครุ่นคิดอยู่ครู่หนึ่ง เขาก็เสนอแนะขึ้นมา","“พวกเจ้าลองเริ่มจากจุดที่ผิดพลาดในพระคัมภีร์ก่อน เลือกเอาข้อที่สามารถพิสูจน์และโต้แย้งได้ง่าย แล้วก็ทำการทดลองแปลกๆ สักสองสามอย่าง โดยยิ่งดึงดูดความสนใจได้มากเท่าไหร่ก็ยิ่งดี หรือไม่ก็อาจจะสอนความรู้เหล่านี้ให้กับพวกเด็กๆ ก่อน เพราะพวกเขามักจะเปิดรับสิ่งใหม่ๆ ได้ดีกว่า แล้วค่อยๆ ปลูกฝังให้ผู้ใหญ่พวกนั้นเปลี่ยนความคิดไปทีละนิด”","เมื่อได้ยินเช่นนั้น ดวงตาของเรย์เดลก็เป็นประกายขึ้นมา และรีบวิ่งไปจัดการทันที","ซึ่งลินน์ก็ไม่ได้ใส่ใจกับนิสัยที่ทำอะไรปุบปับของเรย์เดลนัก เขาหยิบแผนที่ที่อยู่ด้านข้างขึ้นมา และคิดทบทวนว่าการป้องกันของเมืองหลวงยังมีจุดบกพร่องตรงไหนอีกบ้างหรือไม่","“ข้าว่าการจัดเตรียมของเจ้านั้นสมบูรณ์แบบมากแล้วนะ!”","ราฟาเอลส่ายหัวด้วยความจนใจ ในสายตาของเขา ลินน์ออกจะระมัดระวังตัวมากเกินไปหน่อย","เขาเคยดูแผนที่การป้องกันของเมืองหลวงแล้ว เรียกได้ว่ามีการวางกำลังพลไว้อย่างแน่นหนาแทบจะทุกๆ ห้าก้าวสิบก้าว แถมยังเตรียมมาตรการฉุกเฉินเอาไว้อีกมากมาย เพื่อให้แน่ใจว่าหากเกิดความวุ่นวายขึ้นในพื้นที่ใด จะมีทหารปืนคาบศิลากว่าพันคน และพ่อมดอย่างน้อยห้าสิบคน ไปถึงที่เกิดเหตุและปราบปรามการกบฏได้ภายในหนึ่งนาที","“นั่นมันพอสำหรับรับมือกับการก่อจลาจลของผู้ศรัทธาพวกนั้น แต่ถ้าหากกองกำลังปราบปรามของศาสนจักรโผล่เข้ามาในเมืองกะทันหันล่ะ? แค่กองกำลังเหล่านี้คงไม่เพียงพอแน่ และความสูญเสียที่จะเกิดขึ้นก็คงจะไม่อาจประเมินได้”","ลินน์กล่าวด้วยความเป็นกังวล","“แต่ก่อนหน้านี้เจ้าไม่ได้ถามกษัตริย์ฮัตตาร์แล้วหรอกหรือ? ในตอนที่ออกแบบและซ่อมแซมเมืองหลวง ไม่ได้มีการสร้างเส้นทางลับเอาไว้สักหน่อย”","ราฟาเอลเอ่ยขึ้นด้วยความลังเล","“แล้วถ้าพวกมันขุดอุโมงค์ตรงมาที่นี่เลยล่ะ?”","ลินน์ถามกลับ","จะเป็นไปได้อย่างไร?","ราฟาเอลกลอกตา ค่ายพักแรมของกองกำลังปราบปรามของศาสนจักรอยู่ห่างจากที่นี่อย่างน้อยสิบกิโลเมตรเชียวนะ!","ต่อให้ขุดโดยไม่สนต้นทุน ก็ต้องใช้เวลาสิบวันถึงครึ่งเดือน กว่าจะถึงตอนนั้นอาวุธรุ่นใหม่ของพวกเขาก็คงจะสร้างเสร็จตั้งนานแล้ว และสามารถเปิดฉากตอบโต้กลับไปได้","แต่ลินน์กลับไม่คิดเช่นนั้น เพราะเขาเคยเห็นประตูมิติภายในเหมืองคริสตัลเวทมนตร์มาแล้ว ไม่แน่ว่าพวกนักบวชเหล่านั้นอาจจะเชี่ยวชาญพลังศักดิ์สิทธิ์ที่คล้ายคลึงกันก็ได้","ช่วงนี้พวกอัศวินกริฟฟอนยอมเสี่ยงชีวิตบินมาก่อกวนและสอดแนมบ่อยๆ คงจะมีความหมายแอบแฝงอยู่เป็นแน่","ลินน์ลูบคางของตนเอง น่าเสียดายที่กริฟฟอนเหล่านี้มีประสาทสัมผัสในการดมกลิ่นที่เฉียบแหลมมาก และเครื่องยิงเลเซอร์ก็ยังสร้างไม่เสร็จ มิฉะนั้นเขาคงจะส่งเรือเหาะไปตัดเส้นทางเสบียงของอีกฝ่ายแล้ว","คนเก่งกาจแค่ไหนก็ต้องกินข้าวกันทั้งนั้น แม้แต่จอมเวทผู้ยิ่งใหญ่อย่างพวกเขาก็ไม่มีข้อยกเว้น แม้การอดอาหารสักสามถึงห้าวันอาจจะพอทนได้ แต่หากนานกว่านั้น ย่อมส่งผลกระทบอย่างแน่นอน","อืม...บางทีเทพเจ้าจอมปลอมอย่างเอลา อาจจะเป็นข้อยกเว้นก็ได้","ขณะที่ลินน์กำลังคิดว่าเทพเจ้าจำเป็นต้องกินข้าวหรือไม่ ลูกศิษย์คนหนึ่งก็เคาะประตูและเดินเข้ามา พร้อมกับกล่าวด้วยความเคารพว่า","“ท่านศาสตราจารย์...ท่านปรมาจารย์แอนโธนี่มาขอพบท่าน พร้อมกับปรมาจารย์เล่นแร่แปรธาตุจากสถาบันวิจัยอีกสองสามท่านขอรับ”","“ช่างบังเอิญเสียจริง ดูเหมือนว่าอาวุธรุ่นใหม่ของพวกเราจะสร้างเสร็จแล้ว!”","ในที่สุดคิ้วที่ขมวดเข้าหากันของลินน์ก็คลายออก","“ข้าล่ะหงุดหงิดพวกกองกำลังปราบปรามของศาสนจักรมานานแล้ว!”","ราฟาเอลกล่าวด้วยความดีใจ หลายวันมานี้พวกเขาเอาแต่หดหัวอยู่ในเมืองและตั้งรับเพียงอย่างเดียว ความอัดอั้นตันใจในอกแทบจะระเบิดออกมาอยู่แล้ว","...","เวลาหนึ่งวันผ่านไปอย่างรวดเร็ว ชาวบ้านยากจนในเมืองหลวงเริ่มปรับตัวเข้ากับการใช้ชีวิตในยามสงครามได้แล้ว เมื่อเงยหน้าขึ้นไป ก็ยังคงมองเห็นกองอัศวินกริฟฟอนกลุ่มใหญ่บินผ่านไปบนท้องฟ้า","โดยเงาทะมึนของฝนเพลิงที่ตกลงมาจากฟากฟ้าเมื่อห้าวันก่อน ยังคงปกคลุมอยู่ในใจของทุกคน แต่ไม่ว่าอย่างไรชีวิตก็ต้องดำเนินต่อไป แม้ในยามสงคราม พวกเขาก็ไม่อาจหยุดมือจากงานที่ทำอยู่ได้","ลาฮวนเป็นเพียงชาวบ้านที่ยากจนแสนจะธรรมดาคนหนึ่งในเมืองหลวง ก่อนที่พวกพ่อมดบัดซบเหล่านั้นจะเข้ามายึดครองเมืองหลวง ทุกๆ สัปดาห์ในเวลานี้ เขาจะต้องไปที่โบสถ์เพื่อรับฟังคำสอนของเหล่านักบวช สารภาพบาปของตน และนำเงินเก็บอันน้อยนิดที่เหลือจากการหาเลี้ยงชีพทั้งหมด ไปหย่อนลงในกล่องบริจาคของโบสถ์","ตามที่ท่านนักบวชได้กล่าวเอาไว้ เสียงเหรียญทองแดงที่กระทบลงในกล่อง ก็คือเสียงแห่งการชำระล้างจิตวิญญาณ!","และลาฮวนเชื่อมั่นในเรื่องนี้อย่างลึกซึ้ง เนื่องจากความยากจนเกินกว่าจะมีภรรยาและลูกได้ ความหวังเดียวของเขา ก็คือหลังจากที่ตายไป เขาจะได้ขึ้นไปอยู่บนสรวงสวรรค์ และเพลิดเพลินกับความสุขและความปีติยินดีอันไม่มีที่สิ้นสุด","เพราะที่นั่นมีสเต็กเนื้อให้กินอย่างไม่รู้จักหมดสิ้น มีไวน์ชั้นเลิศให้ดื่มด่ำอย่างไม่มีวันเหือดแห้ง และยังมีเอลฟ์สาวแสนสวยคอยรับใช้อยู่ข้างกาย...","สรวงสวรรค์ของพระผู้เป็นเจ้า มีทุกสิ่งที่เขาปรารถนา!","ลาฮวนเชื่อมาตลอดว่าความศรัทธาของเขานั้นหนักแน่นมั่นคง จนกระทั่งเมื่อสองเดือนก่อน ในตอนที่สาวกของเทพเจ้าผู้ชั่วร้ายเหล่านั้นบุกเข้ามาในเมืองหลวง และก่อให้เกิดการเข่นฆ่าและความวุ่นวาย โดยมีเสียงเรียกของพระผู้เป็นเจ้าก็ดังก้องขึ้นในหัวของเขากะทันหัน","แต่ลาฮวนกลับหวาดกลัวและลังเล เขาไม่ได้ตอบรับเสียงเรียกนั้นในทันที เพราะข้างนอกนั่นเต็มไปด้วยสมุนของพวกพ่อมดที่ดุร้าย หากเขากล้าออกไป จะต้องถูกจับตัวไปบูชายัญให้กับเทพเจ้าผู้ชั่วร้าย และวิญญาณก็จะต้องร่วงหล่นลงสู่ขุมนรกอันไร้จุดสิ้นสุดอย่างแน่นอน","หลังจากนั้น เขาก็ได้ยินมาว่าร่างอวตารของพระผู้เป็นเจ้าเคยเสด็จลงมายังเมืองหลวง แต่กลับถูกลำแสงหลายสายยิงจนแตกซ่านไป!","ลาฮวนทั้งสับสนและหวาดกลัว พระผู้เป็นเจ้านั้นยิ่งใหญ่ เป็นนิรันดร์ และทรงรอบรู้ทุกสรรพสิ่ง แม้จะเป็นเพียงร่างอวตารที่ลงมา ก็ไม่มีทางที่จะพ่ายแพ้ให้กับสาวกของเทพเจ้าผู้ชั่วร้ายกลุ่มหนึ่งได้เลย","นี่ต้องเป็นเรื่องโกหกแน่ๆ ต้องเป็นภาพลวงตาที่พวกพ่อมดประหลาดนั่นสร้างขึ้นมา เพื่อลบหลู่พระผู้เป็นเจ้าอย่างแน่นอน!","ในขณะที่จิตใจของลาฮวนกำลังสั่นคลอน พระคาร์ดินัลท่านหนึ่งก็ปรากฏตัวขึ้นภายในบ้านของเขาอย่างกะทันหัน และตอบความสงสัยและความไม่เข้าใจในหัวของเขา","ทุกสิ่งที่เขาเผชิญ ล้วนเป็นบททดสอบของพระผู้เป็นเจ้า และเป็นเพราะความศรัทธาต่อพระผู้เป็นเจ้าของเหล่าขุนนางและชาวเมืองในอาณาจักรฮัดลาตาสั่นคลอนต่างหาก ถึงได้ดึงดูดภัยพิบัติเช่นนี้มา..."]},{"n":364,"t":"พ่อมดเหล่านี้ถูกปีศาจล่อลวงจนเสียสติไปแล้ว!","c":["ลาฮวนกลับมาถึงบ้านอย่างระมัดระวัง เขาลงกลอนประตูที่ไม่ค่อยจะแข็งแรงนักให้แน่นหนา จากนั้นก็เดินเข้าไปในห้องชั้นในที่ว่างเปล่า ทรุดตัวลงหมอบกับพื้น และเอ่ยเรียกด้วยความเคารพอย่างยิ่ง","“ท่านพูลสันขอรับ!”","เมื่อสิ้นเสียง ร่างที่สวมชุดคลุมยาวสีแดงขลิบทองก็ปรากฏขึ้นตรงหน้าเขา กลิ่นอายอันน่าเกรงขามแผ่ซ่านไปทั่วทั้งห้อง กดดันจนแทบจะหายใจไม่ออก","“วันนี้ไม่มีใครสะกดรอยตามเจ้า หรือสังเกตเห็นความผิดปกติอะไรใช่ไหม?”","พูลสันเอ่ยถามด้วยน้ำเสียงเคร่งขรึม","“ไม่มีขอรับ แม้สมุนของพวกพ่อมดจะตรวจสอบอย่างเข้มงวด แต่ก็ไม่เคยลงมือกับชาวบ้านทั่วไปโดยไร้เหตุผลขอรับ”","ลาฮวนตอบกลับด้วยความหวาดกลัวและเคารพ","สีหน้าที่ตึงเครียดของพูลสันผ่อนคลายลงเล็กน้อย เขาถามต่อว่า","“แล้วสืบข่าวอะไรที่เป็นประโยชน์มาได้บ้างไหม?”","เขาเดินทางผ่านเส้นทางลับมาถึงเมืองหลวงได้ห้าวันเต็มแล้ว แต่ก็เอาแต่ซ่อนตัวและยังไม่ได้ลงมือทำอะไรเลย","ไม่ต้องสงสัยเลยว่านี่เป็นการตัดสินใจที่ถูกต้อง เพราะหลังจากที่ได้สำรวจดู พูลสันก็พบว่าการป้องกันภายในเมืองหลวงนั้นเข้มงวดกว่าที่คาดการณ์ไว้มาก โดยแต่ละเขตของเมืองล้วนมีทหารปืนคาบศิลาคอยคุ้มกัน โดยที่กองทหารสองกองจะคอยดูแลช่วยเหลือซึ่งกันและกัน จึงยากมากที่จะบุกทะลวงและทำลายป้อมยามเหล่านี้ลงได้","ในสถานการณ์เช่นนี้ พูลสันถึงขั้นไม่กล้าใช้พลังศักดิ์สิทธิ์สุ่มสี่สุ่มห้าด้วยซ้ำ มิฉะนั้นอาจถูกตรวจพบได้","โชคดีที่พวกเขาดวงดี บริเวณไม่ไกลจากบ่อน้ำเก่าที่เชื่อมต่อกับใต้ดินแห่งนี้ พวกเขาได้พบกับผู้ศรัทธาที่ค่อนข้างเคร่งศาสนาคนหนึ่ง และหลังจากที่ได้ทำการชักจูง ก็สามารถพัฒนาให้มาเป็นหูเป็นตา คอยสืบข่าวคราวจากโลกภายนอกให้พวกเขาได้","“เรียนท่านพูลสัน ตามข่าวที่ข้าสืบมาได้ สมุนของพวกพ่อมดจับกุมอัศวินกริฟฟอนที่ถูกยิงตกได้ห้าคน และตอนนี้ถูกคุมขังอยู่ในคุกที่ตั้งขึ้นในเขตตะวันตกขอรับ”","ลาฮวนก้มหน้ากล่าว","“ดูเหมือนว่าอาร์โนจะถูกจับตัวไปแล้วจริงๆ...”","พูลสันคิดในใจ ด้วยความสามารถของอีกฝ่าย แม้จะไม่สามารถหลบหนีจากตาข่ายสายฟ้าที่แผ่ขยายอยู่เหนือน่านฟ้าเมืองหลวงได้ แต่ก็ไม่น่าจะตายคาที่ และในเมื่อไม่มีความวุ่นวายเกิดขึ้นในเมืองหลวง ก็มีความเป็นไปได้สูงที่จะถูกจับตัวไป","พูลสันนึกถึงแผนที่ของเมืองหลวง จากที่นี่ไปยังคุกที่ใช้คุมขังก็อยู่ไม่ไกลนัก","แม้เขาจะไม่ค่อยชอบอาร์โนที่หยิ่งยโสและอวดดีนัก แต่ยังไงก็ถือว่าเป็นเพื่อนร่วมงาน หากช่วยอีกฝ่ายออกมาได้ ก็จะเพิ่มโอกาสชนะในการต่อสู้ภายในเมืองหลวงได้อีกไม่น้อย","“และก็...วันนี้ตอนที่ข้าไปที่ตลาด ข้ายังได้ยินพวกสาวกของปีศาจพูดกันว่า...”","ลาฮวนลังเล ไม่รู้ว่าควรจะพูดออกไปดีหรือไม่","“พวกมันพูดว่าอะไร?”","พูลสันขมวดคิ้ว","“พวกมันบอกว่าพระคัมภีร์...ในพระคัมภีร์มีข้อผิดพลาดอยู่มากมายขอรับ”","ลาฮวนพูดตะกุกตะกัก","ตัวอย่างเช่น ทฤษฎีโลกเป็นศูนย์กลางในพระคัมภีร์นั้นแท้จริงแล้วเป็นเรื่องผิด ความจริงก็คือผืนทวีปที่พวกเราเหยียบย่ำอยู่นั้น กำลังหมุนรอบดวงอาทิตย์ ด้วยสิ่งที่เรียกว่าแรงโน้มถ่วง","และยังบอกอีกว่าแท้จริงแล้วผืนทวีปนั้นเป็นทรงกลม ไม่ใช่ทรงแบน เพราะเวลาที่ยืนดูหอสังเกตการณ์ที่อยู่ไกลออกไปบนทะเล พวกเราจะมองเห็นยอดหอก่อนเสมอ แล้วจึงค่อยเห็นตัวหอ...และปรากฏการณ์จันทรุปราคาก็คือการที่ดวงดาวหมุนมาอยู่ตรงกลางระหว่างดวงอาทิตย์กับดวงจันทร์ ซึ่งจันทรุปราคาที่พวกเขามองเห็นก็คือเงาของผืนทวีปที่อยู่ใต้ฝ่าเท้า...","“พวกพ่อมดถึงกับบอกว่าตัวเองคำนวณเส้นรอบวงของทวีปนี้ออกมาได้ ว่ายาวสี่หมื่นสามพันสองร้อยกิโลเมตรขอรับ...”","ลาฮวนกล่าวด้วยน้ำเสียงสั่นเครือ","“ช่างไร้สาระสิ้นดี!”","พูลสันหัวเราะออกมาด้วยความโกรธ สาวกของเทพเจ้าผู้ชั่วร้ายพวกนี้ช่างเพ้อเจ้อเสียจริง ผืนทวีปที่อยู่ใต้เท้าของพวกเขาจะเป็นทรงกลมได้อย่างไร?","ถ้าเป็นอย่างนั้น พวกเขาไม่ร่วงหล่นลงไปกันหมดหรอกหรือ?","แล้วเส้นรอบวงสี่หมื่นสามพันสองร้อยกิโลเมตรนั่นล่ะ คำนวณออกมาได้อย่างไร เอาไม้บรรทัดไปวัดมาหรือไง?","พวกพ่อมดถึงกับกล้าใช้คำพูดที่น่าขันเช่นนี้ มาล่อลวงผู้ศรัทธาของพระผู้เป็นเจ้า ช่างไม่รู้จักเจียมตัวเอาเสียเลย!","ลาฮวนหยุดชะงักไปครู่หนึ่ง และไม่ได้พูดอะไรต่อ เพราะอีกฝ่ายยังได้ทำการทดลองแปลกๆ เพื่อพิสูจน์ข้อสรุปที่ฟังดูขัดกับสามัญสำนึกเหล่านี้ให้ดูด้วยซ้ำ","ลูกของนายพรานที่อยู่บ้านข้างๆ แอบมากระซิบบอกเขาว่าตัวเองฟังเข้าใจ และยังสามารถเลียนแบบการทดลองเหล่านั้นได้อีกด้วย ผืนทวีปที่อยู่ใต้ฝ่าเท้าของพวกเขาอาจจะเป็นทรงกลมจริงๆ ก็ได้ แต่ตัวเขาเองนั้นกลับฟังไม่รู้เรื่องเลยแม้แต่น้อย","“ดูเหมือนว่าพ่อมดเหล่านี้จะถูกปีศาจล่อลวงจนเสียสติไปแล้วล่ะ”","พูลสันกล่าวเยาะเย้ย จากนั้นก็ถามถึงคฤหาสน์ที่มีการคุ้มกันแน่นหนาที่สุด","พูลสันมีความรู้สึกว่าสถานที่แห่งนั้นต้องไม่ธรรมดา การป้องกันแน่นหนายิ่งกว่าพระราชวังเสียอีก ภายในจะต้องมีความลับบางอย่างที่ไม่สามารถเปิดเผยให้ใครรู้ซ่อนอยู่อย่างแน่นอน","ลาฮวนส่ายหัว สถานที่แห่งนั้นมีคนคอยคุ้มกันอยู่ตลอดเวลา เขาไม่มีทางเข้าใกล้ได้เลย","“ถ้าอย่างนั้น เจ้าก็ไปพักผ่อนเถอะ”","พูลสันไม่ได้คิดจะทำให้ลาฮวนลำบากใจ เขาโบกมือไล่ให้อีกฝ่ายไปนอน","ในขณะเดียวกัน เงาสีดำหลายสายก็ค่อยๆ ปรากฏรูปร่างขึ้นจากความว่างเปล่า ภายในห้องขนาดไม่ใหญ่นักแห่งนี้ โดยองครักษ์เงาที่เป็นหัวหน้าก็ยื่นมือส่งม้วนคำสั่งลับให้","พูลสันรับมันมาอย่างจริงจัง หลังจากอ่านจบ เขาก็จุดไฟเผามันทำลายทิ้งทันที","เวลาลงมือคือคืนนี้!","...","เวลาเที่ยงคืน บนกำแพงเมืองฝั่งตะวันออกของเมืองหลวง แฮมม์กำลังกอดปืนคาบศิลาในมือ ยืนประจำการอยู่หน้าหอสังเกตการณ์ โดยความง่วงนอนระลอกแล้วระลอกเล่าโจมตีสมองของเขาอย่างต่อเนื่อง ทำให้สมองของเขาเริ่มตื้อและมึนงง","แม้ว่าจะมีการสับเปลี่ยนเวรยามกันทุกคืน และถึงขั้นแบ่งเป็นช่วงครึ่งคืนแรกกับครึ่งคืนหลัง แต่เขาก็อายุเลยห้าสิบปีไปแล้ว เรี่ยวแรงไม่เหมือนตอนหนุ่มๆ พอทนยืนมาได้ไม่กี่ชั่วโมงก็เริ่มจะไม่ไหวแล้ว","แอบงีบหลับสักหน่อยเถอะ ศัตรูคงไม่บุกมาตอนกลางดึกหรอกมั้ง อีกอย่างก็ยังมีคนอื่นช่วยเฝ้าอยู่ มีเขาเพิ่มมาสักคนก็ไม่ต่างอะไร ขาดเขาไปสักคนก็ไม่เป็นไรหรอก","ความคิดเช่นนี้ผุดขึ้นมาในหัวของแฮมม์อย่างต่อเนื่อง แต่พอคิดถึงหน้าที่ของตน เขาก็พยายามฝืนรวบรวมเรี่ยวแรงขึ้นมาอีกครั้ง","ทนอีกนิดเดียว ทนอีกแค่นิดเดียวก็ถึงเวลาเปลี่ยนเวรแล้ว...","ในขณะที่กำลังสะลึมสะลือ แฮมม์ก็ตกอยู่ในสภาวะกึ่งหลับกึ่งตื่น ลางๆ ว่าพื้นดินกำลังสั่นสะเทือนอย่างรุนแรง และทวีความรุนแรงมากขึ้นเรื่อยๆ","“ตื่นกันได้แล้ว ศัตรูบุก!”","ในตอนนั้นเอง เสียงตะโกนก็ดังมาจากหอสังเกตการณ์อีกแห่งหนึ่ง","แฮมม์สะดุ้งสุดตัว เขารีบยกปืนคาบศิลาขึ้นประทับบนกำแพงเมืองตามสัญชาตญาณ แต่เบื้องหน้ากลับมืดสนิท อาศัยเพียงแสงไฟที่ลุกโชนจากคบเพลิงบนหอสังเกตการณ์ ทำให้มองเห็นเงาคนที่สะท้อนอยู่ไกลๆ แบบลางๆ","โชคดีที่พวกพ่อมดที่ประจำการอยู่บนกำแพงเมืองนั้นตั้งตัวได้ทัน ลูกไฟสว่างเจิดจ้ากว่าร้อยลูกพุ่งทะยานขึ้นสู่ท้องฟ้า แสงสว่างจ้าจากการระเบิดส่องให้เห็นทุกสิ่งทุกอย่างที่อยู่เบื้องหน้าอย่างชัดเจน","แฮมม์และคนอื่นๆ ถึงกับสูดหายใจเข้าลึกๆ เพราะกองทัพศัตรูนับหมื่นที่ตั้งขบวนอยู่ไกลๆ นั้นได้ข้ามเส้นเตือนภัยระยะสองกิโลเมตรเข้ามา และเข้าสู่ระยะการโจมตีของพวกเขาแล้ว","โดยแถวหน้าสุดคือนักบวชและบิชอปในชุดคลุมสีขาวที่มีสีหน้าเคร่งขรึมจำนวนกว่าพันคน ซึ่งกำลังสวดมนต์พร้อมกัน","บทเพลงสรรเสริญอันดังก้อง แม้จะอยู่ห่างออกไปถึงสองกิโลเมตรก็ยังได้ยินอย่างชัดเจน","“เวรเอ๊ย พวกมันคิดจะเปิดฉากโจมตีครั้งใหญ่แล้ว!”","ซานเชซที่รับหน้าที่เปลี่ยนเวรยามกล่าวด้วยสีหน้าเคร่งเครียด","ต้องรู้ก่อนว่าในการต่อสู้เมื่อไม่กี่วันก่อน กลุ่มนักบวชเหล่านี้เอาแต่มองดูพวกทหารแนวหน้าวิ่งเข้าไปตายจากที่ไกลๆ แต่ตอนนี้กลับลงมือเป็นกลุ่มแรก","ซานเชซเลยตระหนักได้ทันทีว่า นี่ไม่ใช่การหยั่งเชิงเล็กๆ น้อยๆ อีกต่อไปแล้ว","แต่มันคือ...ศึกชี้ชะตา!"]},{"n":365,"t":"ศึกชี้ชะตามาเยือน!","c":["การโจมตีในครั้งนี้เกิดขึ้นอย่างกะทันหันมาก ตามข้อมูลที่พวกเขาประเมินไว้ก่อนหน้านี้ การจะสร้างเครื่องมือตีเมืองขึ้นมาใหม่ทั้งหมด แม้จะใช้พลังศักดิ์สิทธิ์เข้าช่วย ก็ต้องใช้เวลาอย่างน้อยครึ่งเดือน","แต่เมื่ออาศัยความมืดในยามค่ำคืนเป็นเกราะกำบัง กองกำลังปราบปรามของศาสนจักรกลับสามารถเคลื่อนพลเข้ามาใกล้ประตูเมืองในระยะไม่ถึงสองกิโลเมตร ได้อย่างเงียบเชียบ","บทเพลงสรรเสริญอันดังก้องหยุดชะงักลงกะทันหัน พระคาร์ดินัลท่านหนึ่งที่ยืนอยู่แถวหน้าสุดของกลุ่มนักบวช กางแขนทั้งสองข้างออก แสงสว่างแห่งพลังศักดิ์สิทธิ์ก็เบ่งบานขึ้นที่นอกเมืองทันที!","“อัญเชิญ ผู้พิทักษ์แห่งสรวงสวรรค์”","พริบตาเดียว แผ่นดินก็สั่นสะเทือนเลื่อนลั่น รูปปั้นหินขนาดยักษ์ความสูงกว่าห้าเมตร สวมชุดเกราะ และถือโล่ขนาดใหญ่ไว้ในมือจำนวนเจ็ดสิบตัว ก็ผุดขึ้นมาจากพื้นดิน พวกมันยกโล่หนาเตอะขึ้นบังตัว ส่งเสียงคำรามดังก้องออกมาจากปากที่กลวงโบ๋ แล้วก้าวเดินด้วยฝีเท้าอันหนักหน่วง พุ่งทะยานเข้าชนกำแพงเมืองทันที","“รีบส่งคนไปแจ้งท่านศาสตราจารย์ลินน์เร็วเข้า!”","ซานเชซไม่กล้าชักช้าแม้แต่น้อย เขาตะโกนสั่งการเสียงดังลั่น ก่อนจะหันไปตวาดใส่ทุกคนที่กำลังยืนอึ้งอยู่","“พวกเจ้ามัวรออะไรกันอยู่? เตรียมปืนใหญ่แม่เหล็กไฟฟ้าให้พร้อม!”","ภายใต้การควบคุมของพ่อมดหลายคน ปืนใหญ่แม่เหล็กไฟฟ้าทั้งเจ็ดกระบอกที่ติดตั้งอยู่บนกำแพงเมือง ก็ส่งเสียงคำรามดังกึกก้องจนแสบแก้วหูออกมาทันที","ลำแสงเจิดจ้าเจ็ดสายพุ่งทะยานออกไป โดยมีเป้าหมายเป็นรูปปั้นหินขนาดยักษ์เหล่านั้น กระสุนแม่เหล็กไฟฟ้าที่มีอานุภาพร้ายแรง ปะทะเข้ากับโล่ดินที่หนาเตอะทันที","ราวกับทะลวงผ่านกระดาษแผ่นบางๆ พร้อมกับเสียงระเบิดที่ดังกึกก้องจนน่าหวาดเสียว โล่ดินอันหนาเตอะก็แตกกระจายออกทันที กระสุนที่ถูกแผดเผาจนกลายเป็นสีแดงเพลิง พุ่งเข้ากระแทกใส่ผู้พิทักษ์แห่งสรวงสวรรค์ที่อยู่ด้านหลังอย่างจัง จากนั้นก็ระเบิดออกอย่างรุนแรง เป่าร่างของรูปปั้นหินซีกหนึ่งจนแหลกละเอียด","อย่างไรก็ตาม ในวินาทีต่อมา รูปปั้นหินที่แหลกเหลวไปแล้วหกในเจ็ดตัว ก็เริ่มซ่อมแซมตัวเองโดยอัตโนมัติ แม้จะเหลือเพียงร่างครึ่งซีก และยังคงวิ่งต่อไปโดยไม่หยุดชะงัก","“โจมตีที่ส่วนท้อง ตรงนั้นคือแกนกลางของพวกมัน!”","มีพ่อมดตาไวสังเกตเห็นความผิดปกติ จึงตะโกนเตือนเสียงดัง โดยรูปปั้นหินตัวเดียวที่ถูกทำลายไปนั้น เป็นเพราะถูกกระสุนแม่เหล็กไฟฟ้าทะลวงผ่านจุดศูนย์กลางของร่างกายพอดี จึงทำให้ร่างพังทลายลงมา","พลปืนรีบปรับวิถีกระสุนทันที แต่ตอนนี้เป็นเวลาดึกสงัด ทัศนวิสัยจึงย่ำแย่มาก การจะยิงให้โดนแกนกลางของผู้พิทักษ์แห่งสรวงสวรรค์ที่กำลังวิ่งอยู่ โดยมีโล่ขนาดยักษ์คอยบดบังอยู่นั้น ไม่ใช่เรื่องง่ายเลย","หลังจากการระดมยิงปืนใหญ่แม่เหล็กไฟฟ้าไปถึงห้าระลอก พวกเขาก็สามารถกำจัดผู้พิทักษ์แห่งสรวงสวรรค์ ไปได้เพียงสิบตัวเท่านั้น ส่วนตัวที่เหลือได้ทะลวงเข้ามาถึงระยะยิงของปืนใหญ่แล้ว","เสียงปืนใหญ่ดังสนั่นหวั่นไหวอย่างต่อเนื่อง โดยปืนใหญ่เกือบร้อยกระบอกระดมยิงใส่รูปปั้นหินขนาดยักษ์เหล่านี้ไม่หยุดหย่อน แต่อานุภาพของมันกลับด้อยกว่าปืนใหญ่แม่เหล็กไฟฟ้ามาก ต่อให้ยิงโดนเข้าอย่างจัง ก็ทำได้เพียงหยุดการเคลื่อนไหวของอีกฝ่ายลงได้เพียงเล็กน้อย...และต้องใช้กระสุนปืนใหญ่อย่างน้อยสามถึงห้าลูก ยิงโดนพร้อมๆ กัน ถึงจะล้มหรือทำลายผู้พิทักษ์แห่งสรวงสวรรค์ลงได้หนึ่งตัว","ภายใต้การคุ้มกันของรูปปั้นหินยักษ์ที่ชูโล่ขนาดใหญ่เอาไว้ กองกำลังปราบปรามของศาสนจักรนับหมื่นก็เปิดฉากบุกทะลวงเช่นกัน!","“ฆ่าพวกดูหมิ่นพระผู้เป็นเจ้าให้หมด!”","“เพื่อเกียรติยศ! เพื่อชัยชนะ!”","“พระผู้เป็นเจ้าสถิตอยู่กับเรา!”","เสียงกลองรบดังกึกก้องราวกับฟ้าร้อง เสียงตะโกนแหบพร่าดังก้องไปทั่วสนามรบ ภายใต้แสงไฟที่สาดส่อง กองกำลังปราบปรามของศาสนจักรนับหมื่น ก็พุ่งทะยานเข้าสู่แนวหน้าราวกับเกลียวคลื่นสีดำทะมึน กำแพงเมืองที่ตั้งตระหง่านอยู่เบื้องหน้า ในเวลานี้กลับดูเหมือนเกาะโดดเดี่ยวที่ลอยคออยู่กลางมหาสมุทร ราวกับว่ามันจะถูกกลืนกินไปในพริบตา","แฮมม์และคนอื่นๆ บนกำแพงเมืองถึงกับหนังหัวตื่น และปืนคาบศิลาในมือก็ไม่เคยหยุดพักเลย พวกเขาเอาแต่ยิง บรรจุกระสุน เล็งเป้า แล้วก็ยิง สลับวนไปมาไม่รู้จบ","แต่ด้วยอุปสรรคทางด้านทัศนวิสัยในเวลากลางคืน คนส่วนใหญ่จึงทำได้เพียงสาดกระสุนสะเปะสะปะไปในทิศทางที่ศัตรูพุ่งเข้ามา ซึ่งเห็นได้ชัดว่ามันไม่สามารถหยุดยั้งกองกำลังปราบปราม ที่ได้รับการเสริมพลังศักดิ์สิทธิ์ได้เลย","ไม่นานนัก รูปปั้นหินขนาดยักษ์ที่บุกทะลวงอยู่แถวหน้าสุด รวมถึงกองกำลังพันธมิตรขุนนางกว่าสองหมื่นคนที่ตามมาด้านหลัง ก็อยู่ห่างจากประตูเมืองไม่ถึงสองร้อยเมตรแล้ว!","สถานการณ์มาถึงจุดวิกฤตขั้นสูงสุด...","และในตอนนั้นเอง พ่อมดเต็มตัวสองร้อยคน ก็ก้าวออกมาข้างหน้าพร้อมกัน และร่ายเวทมนตร์อย่างพร้อมเพรียง ซึ่งทำให้ทหารของกองกำลังพันธมิตรที่กำลังจะบุกเข้ามาถึงหน้ากำแพงเมือง ก็รู้สึกได้ทันทีว่าพื้นดินที่แข็งแกร่งใต้เท้าของพวกเขายุบตัวลง โดยเบื้องล่างคือหุบเหวที่มืดมิด พร้อมมีหนามแหลมคมอยู่ก้นหลุม","ความกว้างของมันมากถึงยี่สิบเมตร และลึกกว่าสิบห้าเมตร!","นี่ก็คือเวทมนตร์ระดับสามวงแหวน หลุมยุบ!","แต่ลำพังแค่เวทมนตร์บทนี้ ย่อมไม่เพียงพอที่จะสร้างหลุมพรางล้อมรอบกำแพงเมืองได้ทั้งหมด เพราะหลุมพรางเหล่านี้ได้ถูกขุดเตรียมเอาไว้ก่อนแล้ว จากนั้นก็ให้พ่อมดสายควบคุมธาตุ สร้างชั้นดินและหินที่ไม่หนามากนักขึ้นมาปิดทับอำพรางเอาไว้","และในการปะทะกันครั้งที่แล้ว เนื่องจากความรุนแรงของสงครามยังมีจำกัด พวกเขาจึงอดทนและไม่ได้ใช้งานหลุมพรางนี้ ก็เพื่อรอคอยให้ถึงเวลาเช่นนี้นี่แหละ!","ทหารของกองกำลังพันธมิตรสองพันกว่าคนที่บุกเข้ามาเป็นกลุ่มแรก ล้วนร่วงตกลงไปทั้งหมด บางคนก็ตกลงไปตายคาที่ บางคนก็ถูกหนามแหลมแทงทะลุร่าง แม้แต่ผู้พิทักษ์แห่งสรวงสวรรค์ขนาดยักษ์เหล่านั้นก็ไม่มีข้อยกเว้น โดยเกือบครึ่งหนึ่งของพวกมันนั้นติดอยู่ในหลุมพราง และไม่สามารถปีนขึ้นมาได้เป็นเวลานาน","หลุมพรางที่จัดเตรียมไว้ล่วงหน้า สามารถหยุดยั้งการบุกโจมตีของกองกำลังปราบปรามได้อย่างมีประสิทธิภาพ และยังช่วยให้กองกำลังป้องกันบนกำแพงเมืองได้มีเวลาพักหายใจอีกด้วย แต่ยังไม่ทันที่ซานเชซและคนอื่นๆ จะได้ถอนหายใจอย่างโล่งอก หลุมพรางที่เกิดจากเวทมนตร์หลุมยุบก็ถูกทำลายลง","โดยมีกิ่งก้านสีเขียวมรกตงอกเงยขึ้นมาจากพื้นดิน ซึ่งเปล่งประกายแสงศักดิ์สิทธิ์ ราวกับเถาวัลย์ที่พันเกี่ยวเข้าด้วยกัน ก่อตัวเป็นสะพานพลังศักดิ์สิทธิ์อันแข็งแกร่งกว่าหลายสิบสาย ที่สามารถทนต่อการระดมยิงปืนใหญ่ได้ในระยะเวลาสั้นๆ","นั่นเป็นฝีมือของพวกบิชอปที่เริ่มเคลื่อนไหวแล้ว!","ไม่เพียงเท่านั้น บนสนามรบที่มืดมิด ยังมีจุดแสงกะพริบวิบวับปรากฏขึ้นนับไม่ถ้วน ซึ่งรวมตัวกันกลายเป็นคลื่นพลังงานอันน่าสะพรึงกลัว พุ่งทะยานเข้าใส่พวกเขาราวกับสายฟ้าฟาด ภายใต้การระเบิดและแรงกระแทกของพลังงานอันรุนแรง ม่านพลังเวทมนตร์ที่คอยปกป้องกองกำลังบนกำแพงเมืองก็แตกกระจายไปตามระเบียบ...","ไม่ว่าจะเป็นผู้พิทักษ์แห่งสรวงสวรรค์จำนวนมากมาย หรือการบุกโจมตีอย่างดุเดือดของกองกำลังปราบปราม จุดประสงค์ก็มีเพียงหนึ่งเดียว นั่นก็คือเพื่อคุ้มกันให้พวกบิชอปสามารถเข้าสู่ระยะการโจมตีของพลังศักดิ์สิทธิ์ได้นั่นเอง!","เมื่อตระหนักถึงเรื่องนี้ ซานเชซก็เข้าใจทันทีว่า ช่วงเวลาที่ยากลำบากที่สุดได้มาถึงแล้ว แต่ก็โชคดี เพราะเวลาที่พวกเขาซื้อมานั้นไม่ได้สูญเปล่า โดยกองกำลังป้องกันบนกำแพงเมืองก็เพิ่มขึ้นจากเดิมแปดพันคน เป็นสองหมื่นห้าพันคนแล้ว ในจำนวนนี้ครึ่งหนึ่งคือทหารปืนคาบศิลา ส่วนอีกครึ่งหนึ่งคือทหารองครักษ์","แต่ถึงกระนั้น พวกเขาก็ยังต้องการกำลังเสริมที่มากกว่านี้อยู่ดี!","เพราะบนท้องฟ้า กองอัศวินกริฟฟอนได้เข้าประจำที่แล้ว และสายฝนเพลิงที่ปกคลุมไปทั่วท้องฟ้า ก็สาดเทลงมาอีกครั้ง!","...","ในเวลาเดียวกับที่การบุกโจมตีจากด้านหน้าเริ่มต้นขึ้น พูลสันที่แฝงตัวอยู่ในเมืองหลวงมาตั้งแต่แรก ก็เริ่มเคลื่อนไหวแล้วเช่นกัน","องครักษ์เงาจำนวนมาก อาศัยความวุ่นวายและความมืดในยามค่ำคืนเป็นเกราะกำบัง เริ่มจัดการกับทหารยามตามท้องถนน จากนั้นภายใต้คำสั่งของพูลสัน พวกเขาก็แบ่งออกเป็นสองกลุ่ม","กลุ่มหนึ่งมุ่งหน้าไปยังคุกเพื่อช่วยเหลืออาร์โนที่ถูกจับตัวไป ส่วนอีกกลุ่มก็ลอบเข้าไปยังสถานที่ที่มีการคุ้มกันแน่นหนาที่สุดในเมืองหลวง ซึ่งก็คือสถาบันวิจัยการเล่นแร่แปรธาตุ!","ไม่เพียงเท่านั้น กองกำลังทัณฑ์ศักดิ์สิทธิ์ซึ่งเป็นกองกำลังชั้นยอดของศาสนจักรจำนวนมาก ก็ได้ผ่านเส้นทางลับเข้ามาในเมืองหลวงแล้ว โดยมีเอ็ดเวลเป็นผู้นำทัพมาด้วยตนเอง เพื่อหวังจะบุกทะลวงจากภายใน และตัดสินผลแพ้ชนะในศึกครั้งนี้!"]},{"n":366,"t":"ศึกขนาบข้าง วิกฤตแห่งเมืองหลวง!","c":["เสียงปืนใหญ่ที่ดังกึกก้องไปทั่วเมืองหลวง ปลุกประชาชนให้ตื่นขึ้นจากความฝัน หลังจากผ่านไปห้าวัน ความหวาดกลัวต่อสงครามก็กลับมาปกคลุมจิตใจของทุกคนอีกครั้ง","สำหรับสถานการณ์การสู้รบนอกเมือง ประชาชนในเมืองหลวงก็แบ่งออกเป็นสองฝ่ายอย่างชัดเจน","ผู้ศรัทธาที่เคร่งศาสนาต่างสวดภาวนาจากใจจริง ขอให้ทูตสวรรค์ของพระผู้เป็นเจ้าขับไล่ความชั่วร้ายออกไป และทำให้ราชอาณาจักรฮัดลาตากลับคืนสู่อ้อมกอดของพระผู้เป็นเจ้าอีกครั้ง ส่วนคนที่เหลือต่างก็ตกอยู่ในความตื่นตระหนกและสับสน","ในเวลาเดียวกัน ภายในลานแห่งหนึ่งของพระราชวัง ลินน์และคนอื่นๆ ที่กำลังปรึกษาหารือเกี่ยวกับแผนการตอบโต้ ก็ได้รับรายงานด่วนจากทหารรับใช้เช่นกัน กองกำลังปราบปรามของศาสนจักรที่อยู่นอกเมืองได้เปิดฉากบุกโจมตีครั้งใหญ่อย่างกะทันหัน ดูจากรูปการณ์แล้วคงส่งกำลังรบชั้นยอดออกมาจนหมด แม้แต่กลุ่มนักบวชก็ยังออกรบด้วย ซานเชซที่ประจำการอยู่บนกำแพงเมืองจึงขอร้องอย่างเร่งด่วนให้พวกเขาส่งกำลังเสริมไปช่วย ไม่เช่นนั้นประตูเมืองอาจจะถูกตีแตกได้","“มาเร็วกว่าที่คิดแฮะ ดูเหมือนว่ายังไม่ทันที่เราจะลงมือ พวกมันก็ทนรอไม่ไหวเสียแล้ว!”","ราฟาเอลกล่าวด้วยรอยยิ้มเย็นชา","“แต่นี่เพิ่งจะผ่านไปแค่ห้าวันเท่านั้น ในเมื่อเอ็ดเวลกล้าลงมือ ก็ย่อมต้องมีไพ่ตายซ่อนอยู่อย่างแน่นอน!”","อเดลาขมวดคิ้ว คาดเดาด้วยสีหน้ากังวล","ก่อนหน้านี้กองกำลังปราบปรามพ่ายแพ้อย่างยับเยิน และล่าถอยไปพร้อมกับทิ้งศพไว้กว่าสองหมื่นศพ นางยังคิดว่าอีกฝ่ายต้องใช้เวลาพักฟื้นอย่างน้อยสิบวันหรือครึ่งเดือนถึงจะเปิดฉากโจมตีระลอกสองได้ ไม่คิดเลยว่าจะมาเร็วขนาดนี้","“ก่อนหน้านี้ข้าได้รับข่าวมาว่า กองกำลังเสริมประมาณสี่หมื่นคนเดินทางมาถึงหน้าเมืองหลวง และเข้าสมทบกับกองกำลังปราบปรามแล้ว ข้าคิดว่าพวกมันคงตั้งใจจะอาศัยความมืดในยามค่ำคืนเป็นเกราะกำบังในการเปิดฉากบุกโจมตีเต็มรูปแบบนั่นแหละ”","ลินน์กล่าวอย่างครุ่นคิด","“ถ้าเป็นอย่างนั้น ข้อได้เปรียบของอาวุธแบบใหม่ของเราก็ลดลงน่ะสิ...”","ทุกคนในที่นั้นตระหนักถึงปัญหาได้ในทันที","เพราะระยะยิงและอานุภาพของปืนคาบศิลา รวมถึงปืนใหญ่ เป็นสิ่งที่ทำให้พวกเขาสามารถเอาชนะกองทัพจักรวรรดิได้อย่างง่ายดาย และสร้างความสูญเสียให้อีกฝ่ายได้อย่างมหาศาลมาโดยตลอด แต่ตอนนี้ เมื่อทัศนวิสัยถูกจำกัด พลปืนคาบศิลาและพลปืนใหญ่จึงไม่สามารถโจมตีศัตรูจากระยะไกลได้อย่างมีประสิทธิภาพ","และเมื่อต้องเข้าสู่การต่อสู้ระยะประชิด ทหารปืนคาบศิลาที่เพิ่งถูกเกณฑ์มาและฝึกฝนได้เพียงไม่กี่เดือน ย่อมไม่มีทางสู้กองกำลังชั้นยอดของศาสนจักรได้เลย แถมยังมีโอกาสที่จะถูกตีแตกพ่ายไปอย่างง่ายดายอีกด้วย","เมื่อคิดได้เช่นนี้ ราฟาเอลก็รีบพูดขึ้นว่า","“นั่นก็หมายความว่า จำนวนศัตรูที่อยู่นอกเมืองอาจมีมากกว่าแสนคน เราต้องรีบส่งคนไปเสริมกำลังให้ซานเชซเดี๋ยวนี้!”","ในเมื่อซานเชซเป็นฝ่ายร้องขอกำลังเสริมด้วยตัวเอง นั่นก็แสดงว่าสถานการณ์ต้องตึงเครียดมาก และแผนการที่พวกเขาเตรียมไว้ คงไม่เพียงพอที่จะรับมือกับการบุกโจมตีอันทรงพลังของกองกำลังปราบปรามได้อย่างแน่นอน","ลินน์พยักหน้า เขากวาดสายตามองไปรอบๆ ห้องประชุม จากนั้นก็สั่งให้แอนโธนี่ อเดลา และจอมเวทผู้ยิ่งใหญ่อีกสามคน นำพ่อมดเต็มตัวสองร้อยคนมุ่งหน้าไปเสริมกำลังที่ประตูเมืองทันที","นอกจากนี้ยังสั่งให้ระดมทหารปืนคาบศิลาอีกห้าพันคน และทหารองครักษ์อีกหนึ่งหมื่นคน...","“แค่นี้จะน้อยไปหรือเปล่า? ข้าจำได้ว่าในเมืองหลวงยังมีทหารปืนคาบศิลาอยู่อีกอย่างน้อยเจ็ดพันคนไม่ใช่หรือ?”","อเดลาถามด้วยความสงสัย","ทหารปืนคาบศิลาที่พวกเขาฝึกฝนมามีประมาณสามหมื่นคน ในจำนวนนี้หนึ่งหมื่นแปดพันคนมีหน้าที่ป้องกันเมือง โดยแบ่งเวรยามออกเป็นสามกะต่อวัน เพื่อให้แน่ใจว่าพวกเขาสามารถทุ่มกำลังรบทั้งหมดลงสู่สนามรบได้เมื่อจำเป็น","ส่วนอีกห้าพันคนถูกจัดให้เป็นกองกำลังสำรองที่พร้อมให้การสนับสนุนได้ทุกเมื่อ ซึ่งก็คือกำลังคนที่ลินน์สั่งให้เคลื่อนพลในตอนนี้นั่นเอง","นอกจากนี้ยังมีอีกเจ็ดพันคนที่กระจายกำลังอยู่ทั่วเมืองหลวง โดยสี่พันคนคอยคุ้มกันยุ้งฉาง คลังแสง และจุดยุทธศาสตร์สำคัญต่างๆ ดังนั้น ก็ยังเหลืออีกสามพันคนที่สามารถเรียกใช้งานได้...หรือถ้าจะให้เด็ดขาดกว่านั้น ก็สามารถดึงตัวพวกที่ทำหน้าที่คุ้มกันเหล่านั้นมาร่วมรบเลยก็ได้","จำนวนศัตรูอาจมีมากเกินจินตนาการ ตอนนี้กำลังเสริมทุกหน่วยล้วนมีความสำคัญอย่างยิ่ง และพวกเขาก็สามารถดึงกำลังคนเหล่านั้นมาใช้ให้เกิดประโยชน์ได้","“ไม่ได้ เราจะระดมกองกำลังป้องกันเมืองหลวงไปมากกว่านี้ไม่ได้อีกแล้ว พวกเขาต้องรับหน้าที่ดูแลความสงบเรียบร้อยภายในเมือง!”","ลินน์กล่าวอย่างหนักแน่น","“แล้วก็ส่งคนไปแจ้งอเล็กซ์ ให้พวกเขานำเรือเหาะขึ้นบิน จัดการกับอัศวินกริฟฟอนที่คอยลอบวางเพลิงซะ แล้วค่อยไปสนับสนุนการรบที่แนวหน้า แค่นี้ก็น่าจะพอแล้ว!”","เมื่อเทียบกับราฟาเอลและคนอื่นๆ ที่เพิ่งเคยเผชิญหน้ากับสงครามระดับใหญ่ยักษ์เป็นครั้งแรก ลินน์กลับยังคงความเยือกเย็นเอาไว้ได้อย่างน่าเหลือเชื่อเมื่อต้องเผชิญกับวิกฤตเช่นนี้","แม้กองกำลังปราบปรามของศาสนจักรจะบุกมาอย่างดุดัน แต่เขารู้ดีว่าการจะบุกยึดเมืองหลวงจากทางด้านหน้านั้นไม่ใช่เรื่องง่ายเลย!","ด้วยกำแพงเมืองที่สูงถึงสิบแปดเมตร แถมยังได้รับการเสริมความแข็งแกร่งด้วยเวทมนตร์ และยังมีพ่อมดอีกหลายร้อยคนคอยช่วยป้องกัน ต่อให้เอ็ดเวลจะทุ่มเทกำลังทั้งหมดที่มี ก็ต้องเจ็บหนักกลับไปอย่างแน่นอน","ในทางกลับกัน ภายในเมืองหลวงต่างหากที่ไม่ว่าจะเกิดอะไรขึ้น พวกเขาก็ต้องกันกองกำลังสำรองส่วนหนึ่งเอาไว้เสมอ เพราะหากเกิดความวุ่นวายภายในขึ้นมาเมื่อไหร่ มันก็จะกลายเป็นปฏิกิริยาลูกโซ่ที่นำไปสู่การพ่ายแพ้ในท้ายที่สุด!","“ตกลง ในเมื่อเจ้าตัดสินใจแบบนั้น”","อเดลาส่ายหัวและไม่ได้พูดอะไรต่อ นางรีบลุกขึ้นพร้อมกับแอนโธนี่และคนอื่นๆ ทันที ก่อนจะระดมพ่อมดทั้งหมดให้รีบไปเสริมกำลัง โดยไม่กล้าชักช้าแม้แต่วินาทีเดียว","ราฟาเอลที่รั้งอยู่ด้านหลังรู้สึกกังวลเล็กน้อย ว่าการต่อสู้กลางอากาศในตอนกลางคืน จะส่งผลกระทบต่อประสิทธิภาพการทำงานของเรือเหาะหรือไม่ แม้ว่าเรือเหาะแต่ละลำจะติดตั้งเครื่องยิงเลเซอร์ไว้แล้ว แต่การเล็งเป้าก็เป็นปัญหาใหญ่อยู่ดี","“ไม่เป็นไรหรอก สำหรับพวกเขาน่ะ กลางวันกับกลางคืนก็ไม่ต่างกันหรอก!”","ลินน์กล่าว แต่ก็ไม่ได้มีท่าทีจะอธิบายให้ฟังอย่างลึกซึ้ง จากนั้นเขาก็เรียกเอล็อคมา และสั่งให้ไปเปิดเครื่องกำเนิดไฟฟ้าที่อยู่ในสถาบันวิจัยการเล่นแร่แปรธาตุ","แน่นอนว่าเขาได้คำนึงถึงความเป็นไปได้ที่จะเกิดการสู้รบในเวลากลางคืนไว้แล้ว ดังนั้น ในช่วงสองเดือนที่พวกเขายึดเมืองหลวงมาได้ พวกเขาจึงไม่ได้อยู่เฉยๆ ซึ่งความจริงแล้วเขาได้สั่งให้คนไปสร้างระบบหมุนเวียนไฟฟ้าที่ครอบคลุมทั่วทั้งเมือง และนำหลอดไฟแบบง่ายๆ ที่ประดิษฐ์ขึ้นเมื่อไม่กี่เดือนก่อน ไปติดตั้งไว้ตามถนนหนทางทุกสายในเมืองหลวง","แต่เนื่องจากพลังงานไฟฟ้าสำรองมีไม่มากนัก และยังต้องจ่ายไฟให้กับปืนใหญ่แม่เหล็กไฟฟ้าที่กินไฟจุอีก พวกเขาจึงไม่เคยเปิดใช้งานมันมาก่อนเลย แต่ในเมื่อตอนนี้เอ็ดเวลตัดสินใจเปิดศึกชี้ชะตาแล้ว ก็ไม่จำเป็นต้องประหยัดไฟฟ้าอีกต่อไป!","ลินน์ครุ่นคิดว่ายังมีข้อบกพร่องตรงไหนอีกหรือไม่ ก่อนจะนึกอะไรขึ้นมาได้","“จริงสิ แล้วท่านประธานสภาทั้งหลายล่ะ? นี่ก็ผ่านมาตั้งหลายวันแล้ว ทำไมพวกเขายังมาไม่ถึงอีก?”","เขาจำได้ว่าก่อนจะออกจากดินแดนพ่อมด แฮร์รอฟเคยรับปากกับเขาไว้ว่า หลังจากจัดการธุระของสภาเสร็จแล้ว พวกเขาจะรีบตามมาที่ฮัดลาตา","เพราะหากศาสนจักรรู้ว่าการล่มสลายของอาณาจักรมีความเกี่ยวข้องกับดินแดนพ่อมด พวกเขาก็มีแนวโน้มที่จะส่งกองกำลังระดับตำนานออกมา และจอมเวทผู้ยิ่งใหญ่ระดับพวกเขา หากไม่ร่วมมือกันโจมตี ก็ยากที่จะต่อกรด้วยได้","“ข้าได้ยินมาว่าท่านประธานสองท่าน ออกเดินทางจากดินแดนพ่อมดมาแล้ว แต่ไม่รู้ว่าทำไมจนถึงป่านนี้ก็ยังมาไม่ถึง!”","ราฟาเอลกล่าวด้วยความลังเล","ถูกถ่วงเวลาเอาไว้หรือ? หรือว่ามีธุระด่วนอะไรมาแทรก?","ลินน์คิดในใจ เป็นไปไม่ได้หรอกมั้งที่ศาสนจักรจะส่งกองทัพอีกทัพหนึ่งไปโจมตีดินแดนพ่อมดในเวลาเดียวกัน?","ถึงจะเป็นแบบนั้น พวกเขาก็น่าจะได้รับข่าวสารอะไรบ้างสิ...","แต่ในเมื่อแฮร์รอฟและคนอื่นๆ ยังมาไม่ถึง คืนนี้พวกเขาก็คงต้องพึ่งพาตัวเองแล้วล่ะ!"]},{"n":367,"t":"เกล็น: งั้นก็ให้พวกมันได้ประจักษ์ถึงความเร็วของแสงกันเถอะ!","c":["ภายในเมืองหลวง สถานการณ์ความวุ่นวายกำลังลุกลามไปอย่างรวดเร็ว กองอัศวินกริฟฟอนที่โฉบลงมาจากท้องฟ้า ไม่ได้ตั้งใจจะมาลอบวางเพลิงในครั้งนี้ แต่พวกเขาอาศัยความมืดในยามค่ำคืนและทัศนวิสัยที่ได้เปรียบ โฉบลงมาใช้กรงเล็บอันแหลมคม หรือไม่ก็สาดพลังศักดิ์สิทธิ์เข้าใส่กองกำลังป้องกันที่อยู่เบื้องล่าง แล้วก็บินกลับขึ้นไปบนท้องฟ้าอย่างอิสระ ก่อนที่การตอบโต้ของศัตรูจะมาถึง","“ทุกคนเล็งให้ดี สอยไอ้พวกกริฟฟอนเวรตะไลนั่นร่วงลงมาให้ได้!”","นายทหารที่คุมกองทหารปืนคาบศิลากระโดดโลดเต้นด้วยความโกรธแค้น เขาทำได้เพียงออกคำสั่งให้พลปืนเล็งกระบอกปืนขึ้นไปบนฟ้า และระดมยิงอย่างต่อเนื่องเพื่อเป็นการป้องกันตัว","แต่พวกเขา ก็ทำได้เพียงอาศัยแสงจันทร์ที่สาดส่องลงมาเพียงน้อยนิด เพื่อเพ่งมองสัตว์ประหลาดยักษ์ที่โฉบลงมาจากท้องฟ้าอย่างกะทันหัน ทำให้การระดมยิงหนึ่งระลอกผ่านไป โดยที่ไม่ได้สัมผัสแม้แต่ขนของกริฟฟอนสักเส้นเดียว","ในขณะที่พลปืนคาบศิลากำลังเริ่มบรรจุกระสุนใหม่ จู่ๆ กริชอันแหลมคมก็พุ่งออกมาจากความมืด และปาดคอของนายทหารคนนั้นในชั่วพริบตา","จากนั้นบรรดาองครักษ์เงาชั้นยอด ก็อาศัยความวุ่นวายที่กองอัศวินกริฟฟอนสร้างขึ้น จัดการกับทหารยามที่ประจำการอยู่ในบริเวณนี้อย่างรวดเร็ว แต่ไม่นานนักก็ต้องปะทะเข้ากับกองกำลังเสริมที่รุดหน้ามาถึง เกิดเป็นการต่อสู้ตะลุมบอนกันกลางถนน เสียงร้องโหยหวน เสียงคำราม และเสียงคร่ำครวญดังก้องไปทั่วความมืดมิดในยามค่ำคืน","เมื่อได้รับการสนับสนุนจากกองอัศวินกริฟฟอน บวกกับการพรางตัวในความมืด พวกองครักษ์เงาก็เป็นฝ่ายได้เปรียบอย่างสมบูรณ์แบบ โดยทหารปืนคาบศิลาทำได้เพียงอาศัยการระดมยิงพร้อมกันในระลอกแรกเพื่อสังหารศัตรูไปได้เพียงไม่กี่คน หลังจากนั้นก็ต้องใช้ดาบปลายปืนเข้าต่อสู้ระยะประชิดกับองครักษ์เงาที่พุ่งเข้ามาอย่างดุเดือด","ศพแล้วศพเล่าล้มลงบนถนน เลือดสีแดงฉานค่อยๆ ไหลรินไปตามคมมีด และย้อมพื้นดินให้กลายเป็นสีแดงเลือดอย่างรวดเร็ว","ประชาชนในเมืองหลวงทำได้เพียงขดตัวหลบซ่อนอยู่ในบ้าน และสวดภาวนาขออย่าให้การต่อสู้ลุกลามมาถึงตัวเอง","ไฮเดนก็เป็นหนึ่งในนั้น","แต่ต่างจากผู้ศรัทธาส่วนใหญ่ที่คาดหวังให้ทูตสวรรค์สามารถเอาชนะ ‘ความชั่วร้าย’ ไฮเดนกลับไม่อยากกลับไปใช้ชีวิตแบบเดิมอีกแล้ว","นั่นก็เป็นเพราะนับตั้งแต่ที่พวกพ่อมดยึดครองเมืองหลวง ก็ได้มีการก่อตั้งสิ่งที่เรียกว่า ‘โรงงาน’ ขึ้นมาหลายแห่ง ซึ่งมีการรับสมัครแรงงานจำนวนมาก แถมยังให้ค่าตอบแทนที่สูงลิ่วอีกด้วย","ในตอนแรกทุกคนต่างพากันเดาว่า โรงงานที่ว่านี้จะต้องเป็นคำโกหกหลอกลวงของปีศาจ และเป็นเรื่องหลอกลวงที่ไร้สาระทั้งเพ แต่สำหรับไฮเดนที่สิ้นเนื้อประดาตัว เขาไม่สนใจอะไรทั้งนั้น เขารู้เพียงแค่ว่าพระราชาสั่งปิดตายเมืองหลวง ไม่ยอมให้พวกเขาออกไปล่าสัตว์ และถ้าเขาไม่มีอะไรตกถึงท้อง เขาก็จะต้องอดตาย!","ดังนั้น ไฮเดนจึงเข้าไปทำงานในโรงงานด้วยความคิดที่ว่า ยังไงก็ต้องตายอยู่แล้ว แต่ผลลัพธ์กลับแตกต่างจากที่ทุกคนคิดไว้โดยสิ้นเชิง เพราะที่นั่น ไม่ใช่สถานที่ให้พวกพ่อมดทดลองเวทมนตร์อันชั่วร้าย แต่กลับเป็นงานของพวกที่เป็นการเผาและแปรรูปแร่ธาตุต่างๆ และนอกจากโรงงานจะมีอาหารกลางวันให้แล้ว พวกเขายังได้รับค่าตอบแทนเป็นเหรียญเงินของอาณาจักรถึง 6 เหรียญในแต่ละเดือน...","เมื่อได้รับเงินก้อนนี้มาอยู่ในมือจริงๆ ไฮเดนก็ถึงกับสับสนไปเลย เพราะเวลาเพียงสองเดือนสั้นๆ เขาก็ได้บอกลาความยากลำบากที่ต้องอดมื้อกินมื้อไปอย่างสิ้นเชิง และเริ่มเกิดความสงสัยในคำพูดของเหล่านักบวชขึ้นมา","พวกพ่อมดคือสมุนของปีศาจ เป็นผู้แพร่กระจายโรคระบาดและเป็นร่างจำแลงของความหวาดกลัวอย่างนั้นหรือ?","ต้องรู้ก่อนว่าหลังจากที่ยึดเมืองหลวงได้แล้ว คนเหล่านี้ไม่ได้บุกเข้าไปในบ้านของเขาเพื่อปล้นชิงทรัพย์สิน และยิ่งไม่มีการเข่นฆ่าผู้ศรัทธาของพระผู้เป็นเจ้าเลยแม้แต่น้อย","แต่ในการต่อสู้เมื่อห้าวันก่อน ทูตสวรรค์ที่บินอยู่บนท้องฟ้าต่างหากที่จุดไฟเผาบ้านเรือนของพวกเขา ซ้ำยังเผาผู้ศรัทธาหลายคนที่ออกไปคุกเข่าโห่ร้องด้วยความยินดีจนตาย แต่ในทางกลับกัน เป็นสมุนของปีศาจที่ยินดีจะช่วยพวกเขาซ่อมแซมบ้านเรือนหลังจากภัยพิบัติผ่านพ้นไป","เมื่อคิดถึงตรงนี้ ไฮเดนก็เริ่มสวดอ้อนวอนต่อตัวตนที่เขาไม่รู้จัก โดยขอให้พวกพ่อมดชนะการต่อสู้ในครั้งนี้","บางทีคำอธิษฐานของเขาอาจจะสัมฤทธิ์ผล หรืออาจจะมีปัจจัยอื่นเข้ามาเกี่ยวข้อง จู่ๆ นอกบ้านที่เคยมืดมิดก็สว่างไสวขึ้นมา และยังคงสว่างขึ้นเรื่อยๆ โดยมันไม่ใช่แสงสีแดงเพลิงที่ร้อนแรงของเปลวไฟ แต่เป็นแสงสีขาวที่นวลตา ราวกับว่าค่ำคืนได้เปลี่ยนเป็นกลางวันในชั่วพริบตา...","การเปลี่ยนแปลงภายนอกนั้นเห็นได้ชัดเจนยิ่งกว่า โดยมีแสงสีขาวนวลตาปรากฏขึ้นในบริเวณหนึ่งก่อน จากนั้นเมื่อกระแสไฟฟ้าถูกส่งไป มันก็ลุกลามไปทั่วทั้งเมืองหลวง...","พวกองครักษ์เงาที่เคยซ่อนตัวอยู่ในความมืดมิด อาศัยการลอบโจมตีเพื่อจัดการกับเป้าหมายในพื้นที่ต่างๆ อย่างรวดเร็ว เมื่อถูกแสงสว่างจากกระแสไฟฟ้าสาดส่อง พวกเขาก็ถูกบีบให้ออกมาปรากฏตัวอยู่ในที่แจ้ง...","เหล่าทหารปืนคาบศิลาที่เคยถูกโจมตีอยู่ฝ่ายเดียว ต่างก็โห่ร้องด้วยความยินดี และเริ่มเปิดฉากโต้กลับอย่างแท้จริง พวกเขาไม่ได้หวาดกลัวที่จะต้องต่อสู้กับศัตรูเลยแม้แต่น้อย","“นี่มันเวทมนตร์อะไรกัน?”","เวดที่นำกองอัศวินกริฟฟอนอยู่บนท้องฟ้า ก็ได้สังเกตเห็นความผิดปกติบนพื้นดินเป็นคนแรก","ดูเหมือนว่าทั่วทั้งเมืองหลวงจะสว่างไสวราวกับเป็นวัตถุเรืองแสงขนาดยักษ์ เวทมนตร์แบบไหนกันถึงสามารถครอบคลุมพื้นที่ได้กว้างใหญ่ขนาดนี้?","หรือว่าพ่อระดับตำนานจะลงมือเอง?","สีหน้าของเวดเริ่มเคร่งเครียดขึ้น โชคดีที่เขาตระหนักได้อย่างรวดเร็วว่า แสงสว่างเหล่านี้เปล่งประกายออกมาจากหลอดแก้วทรงกลมที่แขวนอยู่ตามถนนหนทาง ซึ่งน่าจะเป็นอุปกรณ์เวทมนตร์แปลกๆ บางอย่าง แค่ทำลายพวกมันทิ้ง เวทมนตร์ที่ว่านี้ก็ต้องหยุดทำงานลงอย่างแน่นอน!","เมื่อตระหนักได้เช่นนี้ เวดก็เตรียมสั่งการให้กองอัศวินกริฟฟอนแยกย้ายกันออกไป แล้วใช้พลังศักดิ์สิทธิ์ทำลายแหล่งกำเนิดแสงเหล่านี้ทิ้ง แต่ยังไม่ทันที่พวกเขาจะได้เคลื่อนไหว ก็ต้องตกตะลึงเมื่อเห็นวัตถุขนาดมหึมาหลายลำ ปรากฏขึ้นบนน่านฟ้าของเมืองหลวง ภายใต้แสงจันทร์ที่สาดส่อง พวกมันดูน่าเกรงขามอย่างยิ่ง และกำลังพุ่งตรงมาทางพวกเขาด้วยความเร็ว","“ฮ่าฮ่าฮ่า ข้าไม่คิดเลยว่าพวกคนขี้ขลาดเหล่านี้จะกล้าโผล่หัวออกมาจริงๆ!”","เวดหัวเราะลั่น และตัดสินใจยกเลิกแผนการเดิม แล้วนำกองอัศวินกริฟฟอนพุ่งเข้าใส่เรือเหาะแทน","การจัดการกับภัยคุกคามบนท้องฟ้าย่อมสำคัญกว่า ยังไงก็ต้องไม่ปล่อยให้สิ่งประดิษฐ์เล่นแร่แปรธาตุที่ทั้งแปลกประหลาดและใหญ่โตเหล่านี้ บินไปถึงสนามรบแนวหน้าได้อย่างเด็ดขาด!","เมื่อเทียบกันแล้ว ปัญหาบนพื้นดินกลับดูเล็กน้อยไปเลย เพราะภารกิจหลักของพวกองครักษ์เงาก็แค่คอยสนับสนุนและสร้างความวุ่นวายก็เท่านั้น รอให้ท่านเอ็ดเวลนำกองกำลังทัณฑ์ศักดิ์สิทธิ์มาถึงเมื่อไหร่ พวกที่ต่อต้านก็เป็นได้แค่ปลาบนเขียงอยู่ดี...","“ทุกคน รักษาระยะห่างห้าสิบเมตร ห้ามเข้าปะทะเด็ดขาด แล้วโจมตีด้วยพลังศักดิ์สิทธิ์เท่านั้น!”","เวดชูค้อนสงครามในมือขึ้นสูง แล้วตะโกนสั่งการสุดเสียง","นี่คือระยะห่างที่ดีที่สุดที่เขาสรุปได้จากบทเรียนในครั้งก่อน ห้าสิบเมตรนั้นไม่ใกล้ไม่ไกลจนเกินไป พวกเขาสามารถใช้พลังศักดิ์สิทธิ์โจมตีเรือเหาะได้ ในขณะเดียวกันก็ยังสามารถบังคับกริฟฟอนให้หลบหลีกการเล็งเป้าของศัตรูได้ และยังเป็นการป้องกันไม่ให้ศัตรูใช้วิธีระเบิดตัวตายไปพร้อมกันได้อีกด้วย","ครั้งนี้แหละคือเวลาแห่งการแก้แค้นของเขา!","ณ ตอนนี้ภายในเรือเหาะ อเล็กซ์ผู้รับหน้าที่เป็นกัปตันกำลังจ้องมองกองอัศวินกริฟฟอนที่ค่อยๆ บินเข้ามาใกล้ด้วยความตึงเครียด เพราะเมื่อไม่กี่วันก่อนเขานั้นเพิ่งเห็นเรือเหาะลำหนึ่งของฝ่ายเดียวกัน ถูกทำลายไปต่อหน้าต่อตา จึงย่อมรู้ซึ้งถึงภัยคุกคามของกองอัศวินกริฟฟอนเหล่านี้ดี","“ท่านเกล็น ตอนนี้เรายังไม่ลงมืออีกหรือขอรับ?”","อเล็กซ์หันไปมองพ่อมดชายที่อยู่ข้างๆ และเอ่ยถามด้วยความร้อนใจ","“อย่าเพิ่งใจร้อน! ปล่อยให้พวกมันเข้ามาใกล้กว่านี้อีกหน่อย ตามที่ท่านศาสตราจารย์ลินน์สั่งไว้ ครั้งนี้เราต้องกำจัดพวกอัศวินกริฟฟอนให้หมดสิ้น!”","เกล็นส่ายหัว และบอกให้อเล็กซ์ใจเย็นๆ จากนั้นเขาก็เหมือนจะนึกอะไรขึ้นมาได้ จึงถามด้วยรอยยิ้มว่า","“จริงสิ เจ้าเคยประจักษ์ถึงความเร็วของแสงหรือยังล่ะ?”"]},{"n":368,"t":"นี่คือพลังแห่งเวทมนตร์เลเซอร์ กองอัศวินกริฟฟอนล่มสลาย!","c":["ความเร็วของแสงงั้นหรือ?","อเล็กซ์ส่ายหน้าด้วยความสับสน เขารู้เพียงแค่ว่าในตอนกลางวัน แสงสว่างนั้นมีอยู่ทุกหนทุกแห่ง และสามารถสาดส่องไปได้ทุกซอกทุกมุมของโลกใบนี้ ไอ้เจ้านี่มันไม่ได้ไปถึงในชั่วพริบตาหรอกหรือ มันมีความเร็วด้วยอย่างนั้นหรือ?","“ความเร็วของแสงคือสองแสนเก้าหมื่นเก้าพันห้าร้อยกิโลเมตรต่อวินาที ซึ่งมากพอที่จะเดินทางรอบทวีปที่เราเหยียบอยู่นี้ได้ถึงแปดรอบเลยล่ะ!”","เกล็นอธิบายไปพร้อมกับทอดสายตามองกองอัศวินกริฟฟอนที่กำลังพุ่งตรงมาแต่ไกล","ภายใต้ความมืดมิดของยามค่ำคืนและการบินด้วยความเร็วสูง ทำให้มองเห็นเพียงเงารางๆ ที่ผลุบๆ โผล่ๆ อยู่ในความมืด ซึ่งยากต่อการเล็งเป้าเป็นอย่างมาก...","แต่เกล็นก็ไม่ได้กังวลแต่อย่างใด ไม่นานนักเขาก็ร่ายเวทมนตร์ระดับสามวงแหวน สัมผัสความร้อน ออกมา!","ในพริบตาเดียว โลกทั้งใบในสายตาของเกล็นก็เปลี่ยนไป ความมืดมิดรอบตัวยังคงอยู่ แต่กองอัศวินกริฟฟอนที่บินเข้ามากลับโดดเด่นสะดุดตา โดยพวกมันได้กลายเป็นจุดแสงสีแดง","เวทมนตร์ที่สามารถรับรู้ความร้อนได้เช่นนี้ คือผลลัพธ์ล่าสุดจากการวิจัยเรื่องแสงของพวกเขา ซึ่งช่วยให้ผู้ร่ายเวทสามารถมองเห็นสิ่งที่ดาวรุ่งแห่งเวทมนตร์ท่านนั้นขนานนามว่า ‘รังสีอินฟราเรด’ ได้...","ในวินาทีนี้ สถานะของนักล่าและเหยื่อก็ได้สลับสับเปลี่ยนกัน เกล็นยกมือทั้งสองข้างขึ้น ลูกบอลแสงที่ร้อนระอุพลันปรากฏขึ้นรอบตัวเขา จากนั้นชั้นสะท้อนแสงทรงกลมก็ปรากฏขึ้นล้อมรอบลูกบอลแสงนั้น บดบังเส้นแสงทั้งหมดเอาไว้...","ในขณะนี้ ระยะห่างของทั้งสองฝ่ายเริ่มใกล้เข้ามาเรื่อยๆ เวดที่นำหน้ามา ถึงกับสามารถมองเห็นเงาของคนที่สวมเครื่องแบบบนเรือเหาะได้อย่างชัดเจน พร้อมกับสัมผัสได้ถึงความผันผวนของพลังเวทมนตร์","“พวกพ่อมดงั้นหรือ?”","เวดครุ่นคิดอยู่ในใจ แต่กลับไม่มีความหวาดกลัวเลยแม้แต่น้อย","ด้วยความคล่องตัวในอากาศของพวกเขานั้น ไม่ใช่สิ่งที่พวกสาวกของปีศาจจะสามารถเทียบเคียงได้ ต่อให้เวทมนตร์ของอีกฝ่ายจะทรงพลังแค่ไหน แต่ถ้าโจมตีไม่โดน มันก็เป็นเพียงแค่เป้าซ้อมเคลื่อนที่เท่านั้น!","มุมปากของเวดเหยียดยิ้มเย็นชา แต่ในวินาทีต่อมา ลางสังหรณ์อันตรายกลับพุ่งพล่านขึ้นในใจ ตามมาด้วยลำแสงทรงพลังขนาดเท่านิ้วชี้ที่พุ่งออกมาจากเรือเหาะที่อยู่ห่างออกไปไม่ไกล ด้วยความเร็วที่เหนือขีดจำกัดการตอบสนองของเขา มันพุ่งทะลวงม่านพลังศักดิ์สิทธิ์ที่เขากางเอาไว้ก่อนหน้านี้ในชั่วพริบตา และวาดเส้นโค้งอันงดงามกลางอากาศ...","แสงช่างรวดเร็วเหลือเกิน...","ในหัวของเวดเพิ่งจะคิดได้เพียงเท่านี้ และร่างกายของเขาก็ถูกตัดขาดออกเป็นสองท่อน รวมถึงกริฟฟอนตัวที่เขาขี่อยู่ซึ่งถูกตัดคอจนขาดสะบั้น...","ฉากเดียวกันนี้กำลังเกิดขึ้นทุกหนทุกแห่งเหนือน่านฟ้าของเมืองหลวง โดยมีเรือเหาะทั้งหนึ่งร้อยห้าสิบลำจงใจจัดกระบวนทัพเป็นรูปครึ่งวงกลม และหลังจากนั้นก็คือการสังหารหมู่!","ลำแสงอันเจิดจ้าสว่างวาบขึ้นบนเรือเหาะแต่ละลำ ก่อนที่เหล่าอัศวินกริฟฟอนจะทันได้รู้ตัวถึงอันตราย ลำแสงที่หนาแน่นก็พุ่งมาถึงตรงหน้าพวกเขาแล้ว...","การโจมตีนั้นรวดเร็วมาก เพียงชั่วพริบตา อัศวินกริฟฟอนกว่าร้อยคนก็ถูกฟันร่างขาดครึ่ง และร่วงหล่นลงมาจากท้องฟ้า โดยมีใบหน้าที่ยังคงประดับไปด้วยความสับสน หรือไม่ก็ความยินดี","จนกระทั่งเห็นเพื่อนร่วมรบถูกโจมตี เหล่าอัศวินกริฟฟอนที่เหลือถึงเพิ่งจะรู้สึกตัว แต่ในช่วงเวลานั้น กระบวนทัพก็ปั่นป่วนไปหมดแล้ว","อัศวินกริฟฟอนบางคนได้เห็นเพื่อนร่วมรบที่เมื่อครู่ยังดีๆ อยู่ ต้องมาหัวหลุดออกจากบ่าหลังจากถูกเลเซอร์ตัดผ่าน พวกเขาก็ตกใจกลัวจนอยากจะหนีกระเจิงไปคนละทิศคนละทาง แต่ลำแสงเหล่านั้นกลับกวาดเข้ามาหาพวกเขาอย่างรวดเร็ว","หลังจากชาร์จพลังแล้ว ระยะหวังผลของเวทมนตร์เลเซอร์จะอยู่ที่ประมาณหนึ่งร้อยยี่สิบเมตร ซึ่งอเล็กซ์และคนอื่นๆ ที่อยู่ตรงจุดศูนย์กลางก็เหมือนกับถือดาบยาวร้อยเมตรไว้ในมือ แถมยังเป็นดาบที่ไม่มีน้ำหนักเลยแม้แต่น้อย","ตามสูตรการคำนวณความยาวส่วนโค้ง เพียงแค่ขยับเลเซอร์ไปหนึ่งองศา มันก็สามารถกวาดผ่านพื้นที่เป็นบริเวณกว้างได้ ยิ่งไม่ต้องพูดถึงว่าเรือเหาะบนท้องฟ้าไม่ได้มีเพียงลำเดียว ด้วยลำแสงเลเซอร์หนึ่งร้อยห้าสิบเส้นสอดประสานกัน ก็สามารถก่อตัวเป็นตาข่ายลำแสงครอบคลุมพื้นที่ทั้งหมดได้แล้ว...","เจ้าแห่งท้องฟ้าที่เคยอวดเบ่งบารมีก่อนหน้านี้ บัดนี้กลายเป็นเพียงนกกระจอกในตาข่าย ไม่มีที่ให้หลบหนี พร้อมส่งเสียงร้องโหยหวนและเสียงคำรามดังก้องไปทั่ว ภายใต้การโจมตีของตาข่ายลำแสง พื้นที่ทั้งหมดก็ได้กลายเป็นลานประหารนองเลือด ซึ่งมีอัศวินกริฟฟอนนับไม่ถ้วนถูกสับเป็นชิ้นๆ เลือดสาดกระเซ็นไปทั่วท้องฟ้า","เมื่อตระหนักได้ว่าการหลบหนีเป็นเรื่องเปล่าประโยชน์ อัศวินกริฟฟอนจำนวนมาก จึงร้องตะโกนว่า ‘เพื่อเกียรติยศแห่งพระผู้เป็นเจ้า’ ‘พระผู้เป็นเจ้าสถิตอยู่กับข้า’ แล้วก็บุกเข้าโจมตีแบบพลีชีพอย่างบ้าคลั่ง","ถึงแม้พลังศักดิ์สิทธิ์ที่อัศวินกริฟฟอนส่วนใหญ่ครอบครองอยู่จะอยู่ในระดับนักบวชทั่วไป ซึ่งไม่อาจทำลายม่านพลังเวทมนตร์ที่ปกป้องเรือเหาะได้ในระยะเวลาอันสั้น แต่จำนวนของพวกเขาก็มากเกินไป!","ในการปราบปรามอาณาจักรครั้งนี้ เอ็ดเวลได้นำอัศวินกริฟฟอนมาถึงแปดร้อยคน!","ต่อให้หักลบพวกดวงซวยที่ตายเพราะไฟฟอสฟอรัสขาวและตาข่ายสายฟ้าไปก่อนหน้านี้แล้ว กองอัศวินกริฟฟอนทั้งหมดก็ยังมากันอย่างพร้อมหน้าพร้อมตา นั่นหมายความว่าเรือเหาะแต่ละลำต้องเผชิญหน้ากับศัตรูถึงห้าคน","ภายใต้การโจมตีแบบพลีชีพของอัศวินกริฟฟอน ก็ยังคงมีเรือเหาะกว่ายี่สิบลำที่ถูกพลังศักดิ์สิทธิ์โจมตีอย่างต่อเนื่อง จนร่วงหล่นลงไปยังเมืองหลวงเบื้องล่างพร้อมๆ กัน...","...","ในขณะที่การต่อสู้บนท้องฟ้าเปิดฉากขึ้น การปะทะกันภายในเมืองหลวงก็เข้าสู่จุดเดือดเช่นกัน","“ทุกคนอย่าแตกตื่น ต้านเอาไว้ให้ได้!”","เฒ่ายอร์คตะโกนสุดเสียง พร้อมสีหน้าของเขาที่เต็มไปด้วยความตึงเครียดและความตื่นตระหนก","ก่อนหน้านี้ตอนที่ถูกส่งมาช่วยป้องกันเขตสลัมในเมืองหลวง เฒ่ายอร์คยังรู้สึกเสียดายอยู่เลย เพราะการอยู่แนวหลังที่ปลอดภัยกว่า ก็หมายความว่าเขาหมดโอกาสที่จะได้เลื่อนขั้นจากผลงานในสนามรบ","ใครจะไปคิดล่ะว่า พอการต่อสู้เริ่มขึ้น ศัตรูที่ไม่รู้ว่าโผล่มาจากไหนทีละคนสองคน กลับมาปรากฏตัวอยู่ในเมืองหลวงเฉยเลย","พวกองครักษ์เงาชุดดำนั้นพวกเขายังพอรับมือได้ เพราะเมื่อสูญเสียความมืดที่คอยบัดบัง และเผชิญกับการระดมยิงปืนคาบศิลาหลายระลอก อีกฝ่ายก็ไม่กล้าผลีผลามโผล่หัวออกมา","แต่เมื่อกองกำลังทัณฑ์ศักดิ์สิทธิ์ที่แข็งแกร่งราวกับสัตว์ป่าในร่างมนุษย์มาถึงสนามรบ แนวป้องกันที่พวกเขาเพิ่งจะรักษาไว้ได้อย่างยากลำบาก กลับถูกเจาะทะลวงอย่างง่ายดายในเวลาเพียงไม่กี่นาที","พวกเขาล่าถอยแล้วล่าถอยอีก พร้อมกับจำนวนเพื่อนร่วมรบและทหารองครักษ์ที่ล้มลงนั้นมีมากกว่าสองพันคนแล้ว ภายใต้สถานการณ์ที่เสียเปรียบและการสูญเสียอย่างหนักเช่นนี้","เฒ่ายอร์คทำได้เพียงปลอบใจทุกคนอย่างต่อเนื่อง ว่ากำลังเสริมจะมาถึงในไม่ช้า พวกเขาแค่ต้องยืนหยัดต่อไป ทนอีกแค่นิดเดียวเท่านั้น!","เสียงปืนคาบศิลาดังสนั่นหวั่นไหวอย่างต่อเนื่องบนท้องถนน ทุกวินาทีจะมีทหารปืนคาบศิลาที่ยิงกระสุนจนหมด เคลื่อนดาบปลายปืนเข้าชาร์จ ยอมสละชีวิตของตัวเองเพื่อขัดขวางการรุกคืบของศัตรู","เวลาผ่านไปทีละนาที ในที่สุดพวกเขาก็รอคอยกำลังเสริมที่มุ่งหวังมาจนได้...เพียงแต่ว่าจำนวนคนนั้นน้อยกว่าที่เฒ่ายอร์คคิดไว้มาก มีเพียงร้อยกว่าคนเท่านั้น โดยมีเอล็อคและลิเดียเป็นผู้นำ","“ท่านเอล็อค ในเมืองหลวงไม่มีกำลังคนให้ส่งมามากกว่านี้แล้วหรือขอรับ?”","เฒ่ายอร์คเผยให้เห็นถึงความผิดหวังอย่างชัดเจนบนใบหน้า แต่ในใจก็รู้ดีว่า ตอนนี้ทุกหนทุกแห่งล้วนกลายเป็นสนามรบไปหมดแล้ว ท่านพ่อมดทั้งหลายก็คงจะปลีกตัวมาไม่ได้ในเวลานี้","“มีแค่พวกเรานี่แหละ!”","เอล็อคพยักหน้า ลิเดียที่อยู่ข้างๆ ก็เสริมด้วยความมั่นใจเต็มเปี่ยม","“แต่แค่นี้ก็เกินพอแล้วล่ะ!”","แม้จำนวนคนของพวกเขาจะมีไม่มาก แต่ทุกคนล้วนติดอาวุธปืนนกสับรุ่นใหม่ล่าสุด แถมยังพกสุดยอดอาวุธสังหารมาด้วยถึงสามชิ้น แม้เดิมทีพวกเขาวางแผนจะไปสนับสนุนที่แนวหน้า แต่พอรู้ว่าทางนี้กำลังตกอยู่ในสถานการณ์คับขัน ลิเดียก็รีบนำคนรุดมาทันที..."]},{"n":369,"t":"เสียงคำรามของปืนกลหนัก นี่ไม่ใช่การต่อสู้ แต่มันคือการสังหารหมู่!","c":["ก่อนที่แนวป้องกันด้านหน้าจะถูกทำลายจนหมดสิ้น ลิเดียและเอล็อคก็รีบสั่งการให้ทุกคนเคลื่อนไหวทันที โดยนำปืนกลสามกระบอกไปตั้งไว้ที่สองฝั่งของถนน ส่วนทหารที่ติดตั้งปืนนกสับก็จัดรูปขบวนเป็นสองแถวอย่างเป็นระเบียบเรียบร้อย","ศัตรูมาเร็วกว่าที่พวกเขาคาดคิดไว้มาก แทบจะในวินาทีต่อมาหลังจากที่พวกเขาจัดรูปขบวนเสร็จ กองกำลังทัณฑ์ศักดิ์สิทธิ์ที่สวมชุดเกราะชั้นดีหลายร้อยคนก็พุ่งเข้ามาถึง โดยทหารหลายสิบคนที่อยู่แถวหน้าสุดถือดาบใหญ่และโล่ยักษ์ในมือ ก่อตัวเป็นแนวโล่ที่แข็งแกร่ง","“นั่นคือกองกำลังทัณฑ์ศักดิ์สิทธิ์งั้นหรือ? ดูแล้วก็ไม่เห็นจะมีอะไรพิเศษเลยนี่...”","ลิเดียบ่นพึมพำเสียงเบา","มุมปากของเฒ่ายอร์คกระตุกเล็กน้อย และรีบเอ่ยเตือนทันที","“ท่านลิเดีย อย่าได้ประมาทพวกมันเด็ดขาด คนพวกนี้ร้ายกาจมาก ต่อให้ถูกรุมล้อมจากหลายๆ คนก็สามารถเอาชนะได้อย่างง่ายดาย ยิ่งไปกว่านั้น โล่ยักษ์ในมือของพวกมันยังถูกเสริมด้วยพลังศักดิ์สิทธิ์ ปืนคาบศิลาแทบจะยิงไม่ทะลุเลยขอรับ!”","แม้ทหารปืนคาบศิลาส่วนใหญ่จะเพิ่งเคยลงสนามรบเป็นครั้งแรก แต่ตอนที่ฝึกซ้อมอยู่ในดินแดนพ่อมด พวกเขาก็เคยเผชิญหน้ากับสัตว์เวทมนตร์ที่แข็งแกร่งมาแล้ว และทักษะการใช้ดาบปลายปืนของพวกเขาก็ถือว่าไม่เลวเลยทีเดียว หลังจากผ่านการฝึกฝนอย่างหนัก","แต่กองกำลังทัณฑ์ศักดิ์สิทธิ์เหล่านี้กลับสามารถสังหารพวกเขาราวกับหั่นผักหั่นปลา แม้ว่ากองกำลังป้องกันในเขตนี้จะมีจำนวนมากกว่าศัตรูหลายเท่า แต่พวกเขาก็ยังคงพ่ายแพ้ถอยร่นอย่างไม่อาจหลีกเลี่ยงได้...","“งั้นข้าขอเปิดหูเปิดตาหน่อยก็แล้วกัน!”","ลิเดียปรับสีหน้าให้จริงจังขึ้น ยกมือขึ้นและทำท่าทางสั่งการ","เหล่าทหารที่อยู่ด้านหลังเข้าใจทันที พวกเขาบรรจุกระสุนสีแดงเข้าไปในรังเพลิง แล้วยกปืนขึ้นเล็งไปยังศัตรูที่เข้ามาในระยะยิง","“ยิง!”","สิ้นเสียงสั่งการของเด็กสาว ทหารร้อยนายที่แบ่งเป็นสองแถวก็ระดมยิงพร้อมกัน เสียงปืนดังกึกก้องบาดหูไปทั่วถนนสายแคบ","กระสุนที่ยิงออกไปอย่างหนาแน่นปะทะเข้ากับโล่ยักษ์อันหนักอึ้ง ก่อนจะระเบิดออกอย่างรุนแรง นี่คือกระสุนเจาะเกราะที่สถาบันวิจัยการเล่นแร่แปรธาตุเพิ่งคิดค้นขึ้น และผลลัพธ์ของมันชัดเจนมาก ในพริบตาเดียวก็ทำให้มีผู้บาดเจ็บและล้มตายไปกว่ายี่สิบคน","บนใบหน้าของเฒ่ายอร์คและคนอื่นๆ เผยให้เห็นถึงความปีติยินดี เพราะสิ่งที่พวกเขาปวดหัวที่สุดก่อนหน้านี้ ก็คือการเจาะกระดองเต่าอันแข็งแกร่งนี้ให้แตก!","แต่ในฐานะกองกำลังที่แข็งแกร่งที่สุดของศาสนจักร ไม่มีทหารทัณฑ์ศักดิ์สิทธิ์คนใดที่หวาดกลัวต่ออานุภาพอันมหาศาลของอาวุธปืนแบบใหม่ พวกเขาเมินเฉยต่อเพื่อนร่วมรบที่ล้มลง และพุ่งเข้ามาในระยะเจ็ดสิบเมตรก่อนที่การระดมยิงระลอกที่สองจะเริ่มขึ้น","ในการต่อสู้ก่อนหน้านี้ พวกเขารู้แล้วว่าอาวุธเวทมนตร์แบบนี้ หลังจากยิงเสร็จต้องใช้เวลาอย่างน้อยหนึ่งนาทีในการบรรจุกระสุน นั่นหมายความว่า หากพวกเขาทนการระดมยิงระลอกนี้ไปได้ ศัตรูที่อยู่ตรงหน้าก็จะกลายเป็นลูกแกะที่อ่อนแอและยอมจำนนให้พวกเขาเชือดทิ้งแต่โดยดี","แต่ทว่า สิ่งที่มาพร้อมกับการระดมยิงระลอกที่สอง คือปืนกลสามกระบอกที่ตั้งอยู่กลางถนน!","ภายใต้ฝุ่นควันและแสงไฟจากการระเบิดของกระสุนเจาะเกราะ เสียงคำรามดังกึกก้องราวกับปืนใหญ่ที่ยิงต่อเนื่องก็ดังขึ้น!","ปังๆๆๆๆ","กระสุนจากปืนกลสามกระบอกถูกสาดออกไปอย่างบ้าคลั่ง แหวกอากาศจนเกิดเสียงแหลมบาดหู พร้อมกับเปลวไฟที่พ่นออกมาราวกับลิ้นอสรพิษ","ทันทีที่ทหารทัณฑ์ศักดิ์สิทธิ์พุ่งฝ่าฝุ่นควันที่ปกคลุมถนนออกมา พวกเขาก็ต้องเผชิญกับการกราดยิงอย่างหนักหน่วง ไม่ว่าจะเป็นชุดเกราะชั้นดีที่สวมใส่ หรือร่างกายที่แข็งแกร่งจนน่าภูมิใจ ล้วนเปราะบางอย่างยิ่งเมื่อต้องเผชิญกับม่านกระสุนที่สามารถฉีกกระชากเหล็กกล้าได้...","ทหารทัณฑ์ศักดิ์สิทธิ์หลายสิบคนที่อยู่แถวหน้าสุดถูกย้อมไปด้วยหมอกเลือดสีแดงฉาน ในชั่วพริบตา ร่างของพวกเขาก็พรุนเป็นรังผึ้ง!","ถนนสายแคบและยาวคือสถานที่ที่ปืนกลสามารถแสดงอานุภาพได้ดีที่สุด โดยที่พวกเขาไม่มีทางหลบเลี่ยงได้เลย สิ่งเดียวที่ทำได้คือพุ่งไปข้างหน้า พุ่งไปข้างหน้า และพุ่งไปข้างหน้า!","ตราบใดที่พวกเขาสามารถพุ่งไปถึงตรงหน้าของศัตรูได้ พวกเขาก็จะเป็นผู้ชนะ!","น่าเสียดายที่พวกเขาเดิมพันพลาด เมื่อปืนกลทั้งสามกระบอกหยุดยิง บนถนนก็เหลือเพียงเศษซากศพที่แหลกเหลวเกลื่อนกลาด","เฒ่ายอร์คและคนอื่นๆ ที่เห็นฉากนี้ต่างก็อ้าปากค้างด้วยความตกตะลึง การสังหารหมู่ครั้งนี้ใช้เวลาเพียงหนึ่งนาทีเศษ ทหารทัณฑ์ศักดิ์สิทธิ์หลายร้อยคนที่สร้างความปวดหัวและสร้างความวุ่นวายครั้งใหญ่ในเมืองหลวง กลับถูกกวาดล้างจนหมดสิ้น!","“ดูเหมือนว่าพวกเราจะเก่งกว่านิดหน่อยนะ!”","ลิเดียยิ้มอย่างภาคภูมิใจ แต่เมื่อเหลือบไปเห็นคลังกระสุนที่ร่อยหรอ สีหน้าของนางก็เจื่อนลงทันที","กระสุนสำเร็จรูปจำนวนสามพันนัด ซึ่งเป็นผลงานที่เหล่าพ่อมดฝึกหัดหลายสิบคนต้องใช้เวลาทำถึงสามวันเต็มๆ กลับถูกยิงจนหมดเกลี้ยงภายในเวลาอันสั้น แล้วแบบนี้พวกเขาจะเอาอะไรไปสนับสนุนสนามรบอื่นล่ะ?","อานุภาพของปืนกลนั้นร้ายกาจก็จริง แต่การสิ้นเปลืองกระสุนก็ชวนให้ใจหายเช่นกัน","ในตอนนี้ เฒ่ายอร์คก็ดึงสติกลับมาจากความตกตะลึงได้แล้ว จึงรีบกล่าวขึ้นว่า","“ท่านลิเดีย ศัตรูที่เราจัดการไปเป็นเพียงแค่กองกำลังย่อยที่บุกเข้ามาในเมืองหลวง ข้าเดาว่าน่าจะมีทหารทัณฑ์ศักดิ์สิทธิ์อย่างน้อยสองพันคนที่ลักลอบเข้ามาทางเส้นทางลับ...”","“เยอะขนาดนั้นเลยหรือ!”","เอล็อคขมวดคิ้ว","อย่าเห็นว่าเมื่อครู่พวกเขาสามารถสังหารทหารทัณฑ์ศักดิ์สิทธิ์ไปกว่าสี่ร้อยคนได้อย่างง่ายดาย แต่เอล็อคไม่ได้ประเมินกองกำลังชั้นยอดของศาสนจักรต่ำเหมือนอย่างลิเดีย","จากที่คนพวกนี้สามารถบดขยี้กองกำลังป้องกันเมืองหลวงที่มีจำนวนมากกว่าหลายเท่าตัวได้ ก็พิสูจน์ให้เห็นแล้วว่าพวกมันไม่ใช่อะไรที่จะต่อกรด้วยง่ายๆ","หากไม่มีอำนาจการยิงอันทรงพลังของปืนกลคอยสนับสนุน ต่อให้นับรวมกองทหารใหม่ที่เปลี่ยนมาใช้ปืนนกสับแล้ว การจะรับมือกับทหารทัณฑ์ศักดิ์สิทธิ์จำนวนมหาศาลขนาดนี้ ก็ไม่ใช่เรื่องง่ายเลย","“เจ้ารู้ไหมว่าพวกมันไปทางไหน?”","เอล็อคเอ่ยถาม","“มีบางส่วนแยกย้ายกันไปสร้างความวุ่นวายในเมืองหลวง ส่วนกำลังหลักดูจากทิศทางแล้ว น่าจะมุ่งหน้าไปยังสถาบันวิจัยการเล่นแร่แปรธาตุขอรับ”","เฒ่ายอร์คกล่าวด้วยสีหน้าเคร่งเครียด","“ถ้าอย่างนั้นก็ไม่ต้องกังวลไปหรอก”","ลิเดียถอนหายใจด้วยความโล่งอก เพราะการป้องกันที่สถาบันวิจัยการเล่นแร่แปรธาตุนั้นแน่นหนามาก และทหารกองทัพใหม่ที่ติดตั้งปืนนกสับส่วนใหญ่ก็ประจำการอยู่ที่นั่น","แต่เหตุการณ์ที่เกิดขึ้นกลับไม่เป็นไปตามที่ลิเดียคาดคิด เพราะพูลสันและอาร์โน สองพระคาร์ดินัล ก็ได้ติดตามกองกำลังทัณฑ์ศักดิ์สิทธิ์มุ่งหน้าไปยังสถาบันวิจัยการเล่นแร่แปรธาตุด้วยเช่นกัน","“ดูเหมือนว่าที่นี่จะเป็นศูนย์กลางของกองกำลังป้องกันเมืองหลวงสินะ!”","พูลสันก้าวเท้าเข้าสู่สถาบันวิจัยการเล่นแร่แปรธาตุที่เต็มไปด้วยเลือดและเสียงตะโกนฆ่าฟัน เขาใช้พลังศักดิ์สิทธิ์ตรวจสอบดู และก็เป็นไปตามที่คาดไว้ เวทมนตร์ทั้งหมดนั้นรวมกันอยู่ที่นี่!","ตราบใดที่พวกเขาสามารถทำลายสถานที่แห่งนี้ได้ เมืองหลวงที่สว่างไสวราวกับกลางวันก็จะกลับคืนสู่ความมืดมิดอีกครั้ง และเวทมนตร์ป้องกันที่ติดตั้งไว้ตามจุดต่างๆ ก็จะพังทลายลงในชั่วพริบตา","อาร์โนที่เพิ่งถูกช่วยออกมาจากคุกยืนอยู่ข้างๆ ด้วยสีหน้าบิดเบี้ยว เพราะในช่วงหลายวันที่ถูกขังอยู่ในเมืองหลวง เขาต้องทนรับการทรมานจากพวกพ่อมดสายจิตวิญญาณเวรตะไลเหล่านั้น โดยต้องอดทนกัดฟันมาตลอด จนกระทั่งเมืองหลวงเกิดความวุ่นวาย เขาจึงสามารถหนีออกมาจากกรงขังได้ และตอนนี้ ในใจของเขาก็เต็มไปด้วยเพลิงแค้นที่ลุกโชน!","“จงใช้เกียรติยศแห่งพระผู้เป็นเจ้า ชำระล้างความชั่วร้าย ณ ที่แห่งนี้ให้สิ้นซาก!”","อาร์โนตะโกนอย่างเกรี้ยวกราด โดยมีพลังศักดิ์สิทธิ์อันมหาศาลเริ่มพลุ่งพล่านรอบตัวเขา เสียงดังกึกก้องราวกับฟ้าร้องดังสะท้านไปถึงสวรรค์ รอยแยกที่ตัดสลับกันไปมาเริ่มลุกลามไปตามพื้นดิน อาคารหลายหลังพังทลายลงภายใต้การทำลายล้างของพลังศักดิ์สิทธิ์!","เศษซากปรักหักพังปลิวว่อนไปทั่วท้องฟ้า ราวกับพายุในวันสิ้นโลกที่กำลังพัดถาโถมเข้าใส่เหล่าพ่อมดที่ยังคงยืนหยัดต่อสู้..."]},{"n":370,"t":"ไฟนรก ก็แค่นี้เอง!","c":["“พายุวันสิ้นโลก!”","อาร์โนตะโกนอย่างบ้าคลั่ง พร้อมกับสาดเท ‘พลังแห่งพระเจ้า’ อันแข็งแกร่งในร่างกายออกมาอย่างไม่คิดชีวิต","เพียร์ซและคนอื่นๆ ที่ถอยร่นมาตั้งรับอยู่ในลานสถาบันต่างก็มีสีหน้าสิ้นหวัง ทำได้เพียงเบิกตากว้างมองดูพลังศักดิ์สิทธิ์อันแข็งแกร่งที่หอบเอาเศษหินและซากปรักหักพังปลิวว่อนเต็มท้องฟ้าพุ่งตรงมาที่พวกเขา...","พลังของพระคาร์ดินัลนั้นอยู่ในอีกระดับหนึ่งเลยทีเดียว หากไม่มีพ่อมดในระดับเดียวกันออกหน้า ด้วยกำลังคนเพียงหยิบมือของพวกเขา ย่อมไม่มีทางต่อกรกับพระคาร์ดินัลแห่งศาสนจักรทั้งสองคนตรงหน้าได้อย่างแน่นอน","แต่การโจมตีที่หมายมั่นปั้นมือว่าจะต้องได้ผลอย่างแน่นอนนี้กลับถูกปัดป้องเอาไว้ได้!","กำแพงไฟอันรุนแรงพวยพุ่งสูงขึ้น โดยเปลวเพลิงที่ม้วนตัวก็อยู่ได้พุ่งสวนกระแสลมขึ้นไปโดยตรง และหอบเอาพายุพลังศักดิ์สิทธิ์ที่พุ่งเข้ามานั้นเข้าไปข้างใน จากนั้นก็ม้วนมันกลับไปพร้อมกับอานุภาพที่รุนแรงยิ่งกว่าเดิม...","นี่คือเวทมนตร์ระดับสี่วงแหวน ลมหายใจมังกรแดง","สิ่งที่แตกต่างออกไปก็คือ ไฟนี้ไม่ใช่เปลวไฟธรรมดา แต่เป็นไฟฟอสฟอรัสขาวที่อันตรายและรับมือยาก...","พูลสันมีสีหน้าเคร่งเครียดและไม่กล้ารับการโจมตีนี้ตรงๆ แม้แต่อาร์โนที่กำลังบ้าคลั่งก็ยังล้มเลิกความตั้งใจที่จะปะทะซึ่งๆ หน้า เขาจำต้องยกมือขึ้นกางม่านพลังศักดิ์สิทธิ์หลายชั้นขึ้นมาป้องกัน","“ตูมมม!”","เสียงระเบิดดังกึกก้องไปทั่วทั้งลานสถาบัน เมื่อฝุ่นควันจางลง พื้นที่ทั้งหมดก็กลายเป็นซากปรักหักพังภายใต้คลื่นกระแทกอันมหาศาล เสาไฟริมถนนรอบๆ กะพริบวิบวับอยู่ครู่หนึ่ง ก่อนจะดับมืดลง","อาร์โนและพูลสันที่ได้รับการปกป้องจากม่านพลังศักดิ์สิทธิ์ตรงกลางนั้นไม่ได้รับบาดเจ็บใดๆ เพียงแต่ม่านพลังศักดิ์สิทธิ์สามชั้นที่กางไว้ก่อนหน้านี้กลับแตกสลายไปถึงสองชั้นแล้ว ยิ่งไปกว่านั้น เปลวไฟเหล่านั้นยังเกาะติดอยู่บนม่านพลังศักดิ์สิทธิ์ และกัดกร่อนพลังของมันไปอย่างช้าๆ","“นี่น่ะหรือที่เรียกว่าไฟนรก?”","บนใบหน้าของอาร์โนปรากฏแววตาเหยียดหยามขึ้นมาเล็กน้อย จากนั้นเขาก็ยกมือขึ้น","‘สายฝนแห่งความเมตตาจากพระเจ้า’","แสงศักดิ์สิทธิ์สีฟ้าครามสาดส่องออกมา ภายใต้การปกคลุมของละอองน้ำ เปลวไฟที่เกาะติดอยู่บนม่านพลังก็ถูกสะกดลงในทันที","มันเป็นไปตามที่เอ็ดเวลบอก น้ำสามารถสะกดมันไว้ได้ชั่วคราว และหากเสริมด้วยพลังศักดิ์สิทธิ์ โดยการแยกอากาศและอุณหภูมิออกจากกัน ก็สามารถดับไอ้เจ้านี่ได้เช่นกัน","“ดูเหมือนว่าก็แค่นี้เองสินะ!”","อาร์โนแค่นเสียงหัวเราะเยาะ","ส่วนสายตาของพูลสันนั้นจับจ้องเข้าไปภายในลานสถาบัน โดยผู้ที่ร่ายเวทมนตร์ขัดจังหวะแผนการทำลายล้างของพวกเขาก่อนหน้านี้ ย่อมเป็นลินน์ที่เพิ่งมาถึง และคนที่มาพร้อมกับเขาก็คือราฟาเอลที่อยู่เฝ้าเมืองหลวงนั่นเอง","“ท่านศาสตราจารย์ลินน์ ท่านปรมาจารย์ราฟาเอล!”","เพียร์ซปาดเหงื่อเย็นที่ผุดซึมบนหน้าผาก และตะโกนด้วยความดีใจ","ทุกคนที่ประจำการอยู่ในสถาบันวิจัยการเล่นแร่แปรธาตุต่างก็มีสีหน้าปลาบปลื้มใจ เพราะนั่นหมายความว่าในที่สุดพวกเขาก็ปลอดภัยแล้ว!","“โชคดีที่เจ้าเผื่อแผนสำรองเอาไว้ ไม่อย่างนั้นตอนนี้เมืองหลวงคงตกอยู่ในอันตรายจริงๆ แล้วล่ะ”","ราฟาเอลมองดูพูลสันและอาร์โนที่อยู่ตรงหน้า พร้อมกับกล่าวด้วยความรู้สึกหวาดเสียว","โชคดีที่พวกเขาไม่ได้รีบไปที่แนวหน้าพร้อมกันทั้งหมด ไม่อย่างนั้นในเมืองหลวงคงไม่มีใครสามารถหยุดยั้งพระคาร์ดินัลทั้งสองคนนี้ได้เลย","หากสถาบันวิจัยการเล่นแร่แปรธาตุตกไปอยู่ในมือศัตรู แนวป้องกันทั้งหมดก็อาจจะพังทลายลงในพริบตาเดียว เพราะเครื่องกำเนิดไฟฟ้าและค่ายกลเวทมนตร์ป้องกันทั้งหมด ล้วนถูกติดตั้งไว้ที่นี่ นอกจากนี้ ข้อมูลผลการวิจัยมากมายก็คงจะรั่วไหลออกไปด้วย","ลินน์ไม่ได้ตอบอะไร แม้ว่าเขาจะพยายามวางแผนรับมืออย่างเต็มที่แล้ว แต่สถานการณ์ในตอนนี้ก็ไม่ได้สู้ดีนัก พวกเขาจะต้องรีบจัดการปัญหาที่นี่และระงับความวุ่นวายในเมืองหลวงให้เร็วที่สุด","“เลือกคู่ต่อสู้มาสักคนสิ อาร์โน? เจ้าเริ่มก่อนเลยแล้วกัน!”","พูลสันเหลือบมองอาร์โนด้วยสายตาเรียบเฉย แล้วเอ่ยปาก","อาร์โนแสยะยิ้ม","“ในเมื่อเป็นเช่นนี้ ไอ้ค่าหัวสามแสนนั่นข้าขอรับไว้เอง ส่วนเจ้าก็ไปจัดการอีกคนซะ!”","พูลสันพยักหน้ารับ เขาเองก็ยินดีที่จะทำเช่นนั้น เพราะเขาไม่ได้หลงใหลในความมั่งคั่งและชื่อเสียงมากนัก และรู้ดีว่าคนที่เบื้องบนตั้งค่าหัวไว้สูงถึงสามแสน ย่อมไม่ใช่คนที่จะรับมือได้ง่ายๆ อย่างแน่นอน","สามแสนงั้นหรือ?","ลินน์ขมวดคิ้ว แม้เขาจะไม่ค่อยเข้าใจนักว่าพระคาร์ดินัลทั้งสองคนนี้กำลังพูดถึงอะไร แต่คิดว่าคงไม่ใช่เรื่องดีแน่","ไม่ว่าอย่างไร จับเป็นสักคนแล้วมาเค้นถาม เดี๋ยวก็รู้เอง!","สีหน้าของลินน์เย็นชาลงในทันที นิ้วชี้และนิ้วกลางมือขวาสั่นไหวเล็กน้อย ราวกับกำลังดีดสายพิณอยู่","คลื่นความถี่ที่มองไม่เห็นแผ่กระจายเป็นรูปครึ่งวงกลมมุ่งไปข้างหน้าด้วยความเร็วเสียง...","อาร์โนและพูลสันรู้สึกพร้อมกันว่าสมองของพวกเขาเหมือนถูกค้อนทุบอย่างแรงจนร่างกายชะงักงัน","ราฟาเอลที่เคยร่วมรบเคียงบ่าเคียงไหล่กับลินน์มาก่อน ย่อมรู้ดีว่านี่คือเวทมนตร์คลื่นเสียงอันเป็นเอกลักษณ์ และย่อมไม่ยอมปล่อยโอกาสนี้ให้หลุดมือไป","‘ลำแสงสลายโครงสร้าง’","ราฟาเอลเปิดฉากโจมตีด้วยเวทมนตร์ระดับห้าวงแหวนที่แข็งแกร่งที่สุดที่เขาครอบครองทันที!","เช่นเดียวกับชื่อของมัน เมื่อมันสัมผัสเป้าหมาย มันจะทำการแยกส่วนประกอบของเป้าหมายอย่างรวดเร็ว ซึ่งถือเป็นเวทมนตร์เหนือขึ้นไปอีกของ เวทแยกแยะวัสดุขั้นสูง","โชคดีที่ผลกระทบจากเวทมนตร์คลื่นเสียงเกิดขึ้นเพียงชั่วพริบตา พูลสันที่ถูกล็อกเป้าหมายก็สามารถตอบสนองได้อย่างรวดเร็ว ก่อนที่ ลำแสงสลายโครงสร้างจะทำลายม่านพลังป้องกันและพุ่งเข้าถึงตัว เขาพยายามเบี่ยงตัวหลบอย่างสุดกำลัง แต่สุดท้ายก็ไม่อาจหลีกพ้นการถูกยิงเข้าที่หัวไหล่ได้ และบริเวณที่ถูกสัมผัสสลายกลายเป็นความว่างเปล่าไปในพริบตา...","“บ้าเอ๊ย!”","พูลสันที่เพิ่งเฉียดผ่านความเป็นความตายก็รีบถอยร่นไปหลายก้าว ภายใต้พลังศักดิ์สิทธิ์แห่งการรักษา บาดแผลที่สูญเสียเลือดเนื้อไปก็ฟื้นฟูด้วยความเร็วสูง พร้อมกันนั้น เขาก็กางม่านพลังศักดิ์สิทธิ์ที่แข็งแกร่งยิ่งกว่าเดิมขึ้นคุ้มกายอีกครั้ง","ทางด้านอาร์โนนั้นหลุดพ้นจากการควบคุมได้เร็วกว่าพูลสันเสียอีก แต่การกระทำของเขากลับตรงกันข้าม แทนที่จะถอยหนี เขากลับก้าวเท้าพุ่งทะยานไปข้างหน้า!","แผ่นกระเบื้องปูพื้นแตกละเอียดเป็นชั้นๆ และยุบตัวลงไป ในวินาทีต่อมา อาร์โนก็ข้ามระยะทางหลายสิบเมตรมาปรากฏตัวอยู่เบื้องหน้าลินน์แล้ว โดยมีดาบยักษ์ที่เปล่งแสงศักดิ์สิทธิ์ในมือถูกฟันลงมาตรงๆ พร้อมคมดาบแหวกอากาศจนเกิดเสียงแหลมบาดหู!","พระคาร์ดินัลทุกคนไม่ได้เป็นเพียงนักบวชศักดิ์สิทธิ์ที่ทรงพลังเท่านั้น แต่ยังเป็นอัศวินชั้นยอดอีกด้วย!","เมื่อเทียบกับพูลสันที่เน้นการใช้พลังศักดิ์สิทธิ์จนละเลยการขัดเกลาทักษะทางร่างกาย อาร์โนกลับทุ่มเทเวลาส่วนใหญ่ให้กับการต่อสู้ประชิดตัว อาศัยความเร็วและพละกำลังที่เหนือมนุษย์ เขาก็สามารถบั่นคอพวกพ่อมดได้ก่อนที่พวกมันจะทันได้ร่ายเวทมนตร์เสียอีก!","เพียงแต่คู่ต่อสู้ในครั้งนี้แตกต่างออกไปอย่างเห็นได้ชัด ในวินาท
