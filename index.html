ปได้เจ็ดรอบครึ่งในเวลาเพียงหนึ่งวินาที!","c":["ภายใต้คำอธิบายของลินน์ พ่อมดแม่มดที่อยู่ในเหตุการณ์ก็ตอบสนองกลับมา พวกเขามองไปที่เฟืองที่หมุนอยู่อย่างต่อเนื่องตรงหน้า และใบหน้าของพวกเขาก็เต็มไปด้วยความตกตะลึง","เฟืองตัวนี้ได้ปิดกั้นธาตุแสงทั้งหมดที่พยายามจะผ่านช่องว่างของซี่เฟืองไป โดยไม่มีข้อยกเว้น!","“นี่มันไม่ใช่เวทมนตร์!”","คนอื่นๆ ตะโกนออกไปด้วยความไม่เชื่อ","การเกิดสถานการณ์ที่แปลกประหลาดเช่นนี้ พิสูจน์ให้เห็นโดยตรงเลยว่าความเร็วของแสงนั้นไม่ได้เป็นอนันต์! มิฉะนั้น แสงทุกลำที่ผ่านช่องว่างของซี่เฟืองไป จะต้องสะท้อนกลับมาในทันที และมันก็ไม่มีความเป็นไปได้เลยที่จะถูกบดบัง...","“มันเป็นไปได้ วิธีนี้มันเป็นไปได้จริงๆ!”","เกล็นพึมพำกับตัวเอง","อย่างที่ลินน์บอก พวกเขาประสบความสำเร็จไปแล้วครึ่งหนึ่ง จากนั้นพวกเขาก็เพียงแค่ต้องเพิ่มความเร็วต่อไป และแสงที่สะท้อนกลับมาก็จะค่อยๆ เคลื่อนถอยหลัง ข้ามระยะห่างของซี่เฟืองที่ปิดกั้นเอาไว้ และไปถึงช่องว่างของซี่เฟืองถัดไป!","“ตอนนี้ความเร็วอยู่ที่เท่าไหร่แล้ว?”","ราฟาเอลถามอย่างกระตือรือร้น","“ยี่สิบห้ารอบต่อวินาที!”","ลิเดียรายงานเสียงดัง","“เร่งความเร็วขึ้นอีก เร็วขึ้นอีก!”","ราฟาเอลตะโกนเสียงดัง","ลิเดียเหลือบมองลินน์ จากนั้นก็เพิ่มกำลังของเครื่องยนต์สันดาปภายในอีกครั้งตามคำแนะนำ และความเร็วของเฟืองก็เพิ่มขึ้นหลายระดับในทันที ซึ่งมันสามารถอธิบายได้เพียงแค่คำว่าเกินจริงเท่านั้น และเสียงที่ดังสนั่นก็ดังก้องอยู่ในหูของทุกคน","แม้แต่เอล็อคและคนอื่นๆ ที่อยู่รอบนอกก็ยังรู้สึกกังวลเล็กน้อย ว่าสิ่งนี้จะพังทลายลงมาอย่างกะทันหันหรือไม่","หลังจากที่เร่งความเร็วไปถึงสามสิบห้ารอบต่อวินาที จุดแสงก็ยังคงไม่ปรากฏขึ้น แต่ความเร็วของเฟืองก็ใกล้จะถึงขีดจำกัดแล้ว!","แม้ว่าลินน์จะขอให้พวกเขาและคนอื่นๆ ลดระยะห่างระหว่างซี่เฟืองลงเหลือ 0.5 เซนติเมตร แต่ถึงกระนั้น เส้นรอบวงของตัวเฟืองเองก็มีความยาวที่น่าทึ่งถึงเจ็ดเมตร และมันก็อาจจะพังทลายลงมาได้ทุกเมื่อในขณะที่รักษาความเร็วสูงเป็นพิเศษเอาไว้!","“หลีกไป ข้ามาแล้ว!”","แฮร์รอฟก้าวไปข้างหน้า ซึ่งขัดจังหวะพลังการหมุนที่ถูกสร้างขึ้นโดยเครื่องยนต์สันดาปภายใน และใช้เวทมนตร์เพื่อเร่งความเร็วของเฟืองให้มากกว่าสี่สิบรอบในทันที!","เพื่อรับประกันความแม่นยำ แฮร์รอฟนั้นไม่ได้เพิ่มความเร็วให้เร็วเกินไป แต่เพิ่มขึ้นด้วยความเร็วที่สมดุล...","เมื่อความเร็วในการหมุนของเฟืองเกิน 52 รอบต่อวินาที พ่อมดแม่มดทุกคนที่อยู่ในเหตุการณ์ก็สามารถมองเห็นได้อย่างชัดเจน ว่ามีจุดแสงที่สะดุดตาปรากฏขึ้นบนกระจกกึ่งสะท้อนอีกครั้ง!","นี่หมายความว่าแสงที่ผ่านช่องว่างซี่แรกไป ได้สะท้อนกลับมาจากช่องว่างซี่ที่สองแล้ว!","ในขณะที่ทุกคนกำลังโห่ร้องด้วยความดีใจ เฟืองทั้งหมดก็ระเบิดออก และเศษซากของมันก็ปลิวว่อนไปทั่วทุกทิศทางราวกับมีดที่แหลมคม!","มีเสียงกรีดร้องดังออกมาจากฝูงชน โชคดีที่แฮร์รอฟไม่ยอมให้อุบัติเหตุในการทดลองเกิดขึ้นซ้ำสอง เศษเฟืองที่ปลิวว่อนเหล่านี้ดูเหมือนจะตกลงไปในปลักโคลน ภายใต้ผลลัพธ์ของอาณาเขตชะลอความเร็ว ความเร็วในการปลิวของมันก็ช้าลงเรื่อยๆ และในที่สุดมันก็ลอยนิ่งอยู่กลางอากาศโดยตรง","“เมื่อกี้ความเร็วอยู่ที่เท่าไหร่? ท่านประธานสภา?”","ราฟาเอลถามอย่างตื่นเต้น","“ห้าสิบสองรอบต่อวินาที!”","แฮร์รอฟกล่าวอย่างมั่นใจ","ค่านี้ไม่มีทางผิดพลาดอย่างแน่นอน!","ราฟาเอลคำนวณในใจของเขาทันที","เจ็ดร้อยยี่สิบซี่ คูณด้วยแปดกิโลเมตร และคูณด้วยห้าสิบสองรอบ นั่นก็คือ...สองแสนเก้าหมื่นเก้าพันห้าร้อยยี่สิบกิโลเมตรต่อวินาที!","เมื่อคำนวณค่านี้ออกมา ใบหน้าของพ่อมดแม่มดทุกคนก็แสดงความไม่เชื่อออกมา และพวกเขาก็อดไม่ได้ที่จะสงสัยว่าตนเองคำนวณผิดหรือไม่","นี่มันเร็วเกินไปแล้ว...","มิน่าล่ะ พวกเขาถึงไม่สามารถหาเส้นทางการเดินทางของแสงพบได้ ไม่ว่าจะวัดอย่างไรก่อนหน้านี้","“นี่ไม่ได้หมายความว่า แสงสามารถโคจรรอบดาวนิรันดร์ทั้งดวงได้เจ็ดรอบครึ่งในเวลาเพียงหนึ่งวินาทีหรอกหรือ?”","แม่มดแนนซี่ก็ตระหนักถึงสิ่งนี้ขึ้นมาทันที","เส้นรอบวงของทวีปใต้ฝ่าเท้าของพวกเขามีเพียง 40,000 กิโลเมตรเท่านั้น","“นี่มันจะเกินจริงไปหน่อยหรือไม่?”","ซานเชซขมวดคิ้ว ความเร็วเกือบ 300,000 กิโลเมตรต่อวินาที ภายในขอบเขตความรู้ของพวกเขา มันไม่มีความแตกต่างระหว่างช่วงเวลากับช่วงเวลาเลย","“มีเพียงความเร็วที่รวดเร็วเช่นนี้เท่านั้น ที่เพียงพอสำหรับการเดินทางผ่านจักรวาลอันกว้างใหญ่...”","ออโรร่าเตือนสติ","ยกตัวอย่างเช่น จุดที่ใกล้ที่สุดจากดวงอาทิตย์มายังดาวนิรันดร์ดวงนี้คือประมาณ 140 ล้านกิโลเมตร และมันก็ต้องใช้เวลามากกว่าแปดนาทีแม้จะใช้ความเร็วของแสงก็ตาม!","แต่เมื่อต้องเผชิญกับระยะทางและความเร็วเช่นนี้ แม้แต่พ่อมดระดับตำนานอย่างพวกเขาก็ยังเล็กจ้อยราวกับฝุ่นผง...","“ดังนั้น สิ่งที่เราเห็นทุกวันก็คือดวงอาทิตย์เมื่อหลายนาทีก่อนงั้นหรือ!”","ลิเดียนับนิ้วของนาง และจู่ๆ ก็ได้ข้อสรุปที่น่าอัศจรรย์ออกมา","พ่อมดแห่งสถาบันพยากรณ์อย่างโยลันด์ก็คิดขึ้นมาได้ในทันที ว่าพวกเขาอาจจะสามารถวัดระยะห่างระหว่างดวงดาวได้ผ่านทางความเร็วของแสง ซึ่งจะช่วยคำนวณข้อมูลต่างๆ ที่ประเมินได้ยากในอดีตให้ออกมาได้อย่างง่ายดาย","แน่นอนว่าข้อกำหนดเบื้องต้นนี้ก็คือ พวกเขาจำเป็นต้องวัดความเร็วในการเดินทางของแสงในสุญญากาศของจักรวาล...","ในขณะที่พ่อมดแม่มดต่างตกตะลึงกับความเร็วที่น่าสะพรึงกลัวของแสง ลินน์ก็กำลังคิดถึงอีกเรื่องหนึ่งอยู่ในใจ","ความเร็วของแสงในทั้งสองโลกนั้นใกล้เคียงกันมาก...","ลินน์ครุ่นคิดอยู่ในใจอย่างเงียบๆ หากข้อมูลในสมองของเขาไม่ผิดพลาด ความเร็วของแสงที่ถูกวัดได้ในชาติก่อนของเขาก็คือ 299,792 กิโลเมตรต่อวินาที ซึ่งความแตกต่างระหว่างทั้งสองนั้นน้อยมาก บางทีมันอาจจะเป็นแค่เรื่องของความแม่นยำในการวัดที่ทำให้เกิดความแตกต่างขึ้น...","สิ่งนี้สามารถพิสูจน์ได้หรือไม่ว่า ทั้งสองโลกนั้นดำรงอยู่ในจักรวาลเดียวกัน?","นี่ไม่ใช่สิ่งที่เป็นไปไม่ได้ แม้ว่าจะไม่มีสิ่งที่เรียกว่าพลังเวทมนตร์ในสหพันธ์เมื่อชาติก่อน แต่มนุษยชาติก็ยังไม่สามารถควบคุมระบบสุริยะเล็กๆ ได้อย่างสมบูรณ์เลยด้วยซ้ำ เช่นเดียวกับคนป่าเถื่อนที่อาศัยอยู่ในทะเลทราย และคิดว่าทรายสีเหลืองทั่วพื้นดินคือโลกทั้งใบ","อย่างไรก็ตาม ความกว้างใหญ่ของจักรวาลนั้นไกลเกินกว่าจินตนาการของทุกคน บางทีในกาแล็กซีใดกาแล็กซีหนึ่งในจักรวาล อาจจะมีสสารเวทมนตร์ที่เรียกว่าพลังเวทมนตร์ หรือพลังงานอยู่ก็ได้?","แน่นอนว่าความคล้ายคลึงกันระหว่างทั้งสองโลกนั้นมีมากเกินไป และมันอาจจะเป็นโลกในอีกจักรวาลคู่ขนานหนึ่ง...","อย่างไรก็ตาม ข้อสันนิษฐานเหล่านี้ก็เห็นได้ชัดว่าไม่สามารถตรวจสอบได้ในตอนนี้ และลินน์ก็ไม่ได้ใช้ความพยายามมากเกินไปกับมัน แต่ใช้เฟืองที่มีระยะห่างของซี่ฟันที่แตกต่างกัน ซึ่งถูกเตรียมเอาไว้เมื่อนานมาแล้ว เพื่อทำการทดลองซ้ำอีกสองสามครั้ง เพื่อตรวจสอบความถูกต้องของการทดลองนี้","ซึ่งมันก็มีความผันผวนบางอย่างในข้อมูลขั้นสุดท้าย โดยมีช่องว่างประมาณหลายร้อยเมตร","แต่พ่อมดแม่มดที่อยู่ในเหตุการณ์ก็พอใจกับผลลัพธ์นี้เป็นอย่างมาก ท้ายที่สุดแล้ว มันก็ไม่คู่ควรที่จะถูกนำไปพูดถึงเลยเมื่อเทียบกับขนาดอันมหาศาลของความเร็วแสง","บางคนถึงกับคาดเดาว่า ความเร็วของแสงจะแตกต่างกันในภูมิภาคต่างๆ เหมือนกับความเร็วของเสียงหรือไม่ ดังนั้น ข้อมูลของการวัดหลายครั้งจึงมีการเปลี่ยนแปลง","มีเพียงลินน์คนเดียวเท่านั้นที่รู้สึกไม่พอใจเล็กน้อย แน่นอนว่ายิ่งแม่นยำมากเท่าไหร่ก็ยิ่งดีสำหรับการวัดความเร็วของแสง แต่ภายใต้เงื่อนไขที่หยาบกระด้างในปัจจุบัน มันจะไม่มีเครื่องมือที่แม่นยำกว่านี้อีกเลยในระยะเวลาอันสั้น และสิ่งเดียวที่ทำได้ก็คือการทดลองด้วยเฟืองและกระจกแปดด้าน ซึ่งทั้งสองวิธีนี้สะดวกและใช้งานง่าย แต่ข้อผิดพลาดเล็กๆ น้อยๆ ก็เป็นสิ่งที่หลีกเลี่ยงไม่ได้อยู่เสมอ"]},{"n":337,"t":"อัศวินกริฟฟอนแห่งจักรวรรดิ!","c":["หลังจากที่การทดลองวัดความเร็วของแสงเสร็จสิ้นลง งานสัมมนาวิชาการในปีนี้ก็สิ้นสุดลงในที่สุด แต่ผู้คนก็ยังคงพูดถึงวิธีการใช้เฟืองเพื่อวัดระยะทาง","ทันทีหลังจากนั้น พิธีมอบรางวัลก็ถูกจัดขึ้นที่อาณาจักรท้องฟ้า โดยผู้ได้รับการเสนอชื่อทั้งสามคน ได้แก่ ฟูล่า เกล็น และโยลันด์ ต่างก็ได้รับเหรียญตราดาวประกายพฤกษ์อย่างประสบความสำเร็จ","และลินน์ก็ได้รับเหรียญตราจันทร์สีเงินอีกหนึ่งเหรียญ จากการทดลองคำนวณความเร็วของแสงในครั้งนี้!","เพียงแต่สำหรับพิธีมอบรางวัลนี้ พ่อมดแม่มดก็มีความคิดเห็นที่แตกแยกกันเป็นอย่างมาก","พ่อมดแม่มดส่วนใหญ่คิดว่า วิธีการวัดลำแสงที่ลินน์เสนอมานั้นสามารถอธิบายได้เพียงแค่คำว่าอัจฉริยะเท่านั้น!","แม้ว่าการทดลองนี้เพียงอย่างเดียว จะยังห่างไกลจากข้อกำหนดในการได้รับเหรียญตราจันทร์สีเงิน แต่มันก็ไม่ใช่เรื่องใหญ่อะไรที่จะผ่อนปรนให้กับอัจฉริยะสักเล็กน้อย","ยิ่งไม่ต้องพูดถึงว่าอีกฝ่ายได้รับเหรียญตราโคโรนามาแล้ว ดังนั้นมันจึงไม่ทำให้ผู้คนรู้สึกอิจฉา","อย่างไรก็ตาม พ่อมดแม่มดบางคนก็บ่นเกี่ยวกับการที่ดาวรุ่งแห่งเวทมนตร์ผู้นี้ได้รับเหรียญตราจันทร์สีเงิน เพราะแม้ว่าการทดลองของลินน์จะน่าตื่นเต้นและน่าทึ่งมาก แต่ผลลัพธ์สุดท้ายก็มีเพียงแค่ความเร็วของแสงเท่านั้น","และเหรียญตราแบบนี้ มักจะมอบให้กับผู้ที่ทำคุณูปการอันโดดเด่นต่อดินแดนพ่อมด ซึ่งพัฒนาเวทมนตร์ระดับตำนาน หรือเพิ่มเติมองค์ความรู้ที่สำคัญให้กับระบบเวทมนตร์ที่มีอยู่","ในความคิดของพวกเขา การวัดความเร็วของแสงนั้นไม่ได้สอดคล้องกับข้อกำหนดใดๆ เลย กล่าวได้ว่าสภาพ่อมดได้เริ่มต้นได้อย่างเลวร้ายมากในครั้งนี้...","แต่ในฐานะศูนย์กลางของกระแสน้ำ ลินน์ไม่ได้มุ่งเน้นไปที่การได้รับคำชมเชยและการหักล้างคำใส่ร้าย และยังคงศึกษาธาตุพื้นฐานต่อไป ในบางครั้งเขาก็ถูกราฟาเอลและคนอื่นๆ ดึงตัวออกไป และได้ทำความรู้จักกับเหล่าจอมเวทผู้ยิ่งใหญ่ที่ยังอยู่ในนครกรีนรีล","ลินน์ไม่ได้ปฏิเสธการสื่อสารระหว่างจอมเวทผู้ยิ่งใหญ่ เพราะคนเหล่านี้คือผู้ที่เก่งกาจที่สุดในหมู่พ่อมดแม่มด และหลายคนก็ได้รับเหรียญตราดาวประกายพฤกษ์ แม้กระทั่งเหรียญตราจันทร์สีเงินมาแล้วหลายครั้ง ในแง่หนึ่ง พวกเขาต่างก็เป็นเหมือนนิวตันและไอน์สไตน์ของอีกโลกหนึ่ง ซึ่งเป็นกระดูกสันหลังของการพัฒนาเวทมนตร์","ในวันที่สามหลังจากงานสัมมนาวิชาการสิ้นสุดลง สมาชิกสภาทั้งหมดที่อยู่ในนครกรีนรีล ก็ได้รับคำเชิญจากสภาพ่อมด และลินน์ก็ไม่มีข้อยกเว้น ซึ่งเขารู้ว่าจุดประสงค์ของการประชุมครั้งนี้ ส่วนใหญ่ก็เพื่อหารือว่าควรจะทำอย่างไรต่อไป เมื่อเผชิญหน้ากับการรุกรานของศาสนจักร...","อย่างไรก็ตาม ก่อนที่ลินน์จะออกไป ฮาล์ฟลิงดาร์เรนที่ตอนนี้น่าจะอยู่ไกลถึงสถาบันอิเยตา กลับวิ่งมาหาอย่างตื่นตระหนกพร้อมกับผู้คน","“ท่านศาสตราจารย์ แย่แล้ว แย่แล้ว!”","“มีเรื่องอะไรหรือ? ดาร์เรน?”","ลินน์ขมวดคิ้ว และมีข้อสันนิษฐานอยู่ในใจแล้ว","“มันเป็นข้อมูลจากอาณาจักรฮัดลาตา...เมื่อเช้าวานนี้ กองทหารของจักรวรรดิได้ข้ามพรมแดนมาอย่างกะทันหัน!”","ดาร์เรนหอบหายใจ และยื่นจดหมายที่ถูกปิดผนึกมาให้","นี่มันเร็วกว่าที่เขาคาดคิดไว้มาก...ลินน์เปิดซองจดหมายทันทีหลังจากที่ครุ่นคิด หลังจากที่อ่านจบ สีหน้าของเขาก็เคร่งขรึมขึ้นมาในทันที","เมื่อหนึ่งวันก่อน ที่ชายแดนของอาณาจักรฮัดลาตา มีเรือเหาะขนาดยักษ์สองลำกำลังลอยอยู่เหนือระดับความสูงหนึ่งพันเมตร เพื่อลาดตระเวนตามปกติ","ในฐานะนักบินเรือเหาะผู้รุ่งโรจน์ ฮามิใฝ่ฝันที่จะสามารถโบยบินบนท้องฟ้าได้อย่างอิสระเหมือนกับนกมาตั้งแต่เด็ก","เพียงแต่เขาผู้ซึ่งไม่มีพรสวรรค์ทางเวทมนตร์ ซึ่งรู้ดีว่ามันเป็นจินตนาการที่เพ้อฝัน แต่ตั้งแต่ที่ศาสตราจารย์คนใหม่มาถึงสถาบันอิเยตาเมื่อสองปีก่อน ทุกอย่างก็เปลี่ยนไป!","ฮามิวางจอบของเขาลง และเข้าร่วมกับโรงงานกระจกที่เพิ่งเปิดใหม่ เพราะเขาสามารถหารายได้ครึ่งปีได้ภายในหนึ่งเดือนที่นั่น และจากนั้นเขาก็ได้ยินว่าศาสตราจารย์วางแผนที่จะคัดเลือกสามัญชนบางคน และฝึกฝนให้พวกเขากลายเป็นนักบินเรือเหาะ","ฮามิที่ได้รับข่าวแทบจะไม่เชื่อหูตัวเอง ในความคิดของเขา เรือเหาะที่ใหญ่กว่าบ้านแต่สามารถลอยขึ้นไปบนท้องฟ้าได้เหล่านี้ คือสิ่งประดิษฐ์ทางเวทมนตร์ที่ยิ่งใหญ่ที่สุดของพ่อมด","มันก็เป็นของขวัญที่ยิ่งใหญ่มากแล้ว ที่อนุญาตให้พวกเขาจ่ายเงินเพื่อสัมผัสกับมัน","แล้วสามัญชนอย่างพวกเขาที่ไม่รู้จักเวทมนตร์ จะสามารถควบคุมสิ่งประดิษฐ์เวทมนตร์ที่น่าทึ่งเช่นนี้ได้จริงๆ งั้นหรือ?","แต่ความสับสนก็คือความสับสน เพราะฮามินั้น ได้ลาออกจากโรงงานในทันที และเข้าร่วมการฝึกฝนเป็นนักบิน","นอกจากการคิดหาหาวิธีควบคุมสัตว์ประหลาดยักษ์ตัวนี้ และทำความเข้าใจกับเครื่องมือแปรธาตุเวทมนตร์ที่ชี้ไปทางเหนือและใต้เสมอแล้ว เขาก็ยังต้องเรียนรู้คณิตศาสตร์และองค์ความรู้อื่นๆด้วย","ยกตัวอย่างเช่น วิธีการประเมินระยะห่างระหว่างเรือเหาะกับเป้าหมายผ่านวัตถุอ้างอิงที่เหมาะสม และสูตรที่ ‘เรียบง่าย’ บางสูตร ซึ่งนี่เป็นเพียงแค่วิชาพื้นฐานที่สุดสำหรับการสำรวจเท่านั้น","ฮามิผู้ยากจนใช้เวลาส่วนใหญ่ในชีวิตไปกับการขุดดิน ดังนั้น เขาจึงรู้สึกวิงเวียนศีรษะเมื่อเรียนรู้สิ่งเหล่านี้ ตามข่าวลือ สิ่งที่เรียกว่าคณิตศาสตร์นั้นเป็นเรื่องยากแม้แต่พ่อมดบางคนด้วยซ้ำ...","อย่างไรก็ตาม ความพยายามเหล่านี้ก็ได้มอบรางวัลตอบแทนที่ใจกว้างอย่างมากให้กับเขา ค่าตอบแทนรายเดือนเปลี่ยนจากสิบเหรียญเงินเป็นยี่สิบเหรียญเงิน และก็ไม่จำเป็นต้องทำงานในโรงงานทั้งวันทั้งคืนอีกต่อไป ซึ่งสิ่งนี้ก็ทำให้ความฝันของเขากลายเป็นจริงในอีกทางหนึ่ง!","ดังนั้น เมื่อเขาได้ยินว่าศาสตราจารย์ลินน์ต้องการคัดเลือกนักบินเรือเหาะ เพื่อไปปฏิบัติภารกิจที่อันตราย ฮามิจึงเลือกที่จะเข้าร่วมโดยไม่ลังเล","ครึ่งหนึ่งเป็นเพราะต้องการตอบแทนความเมตตาของศาสตราจารย์ และอีกส่วนหนึ่งเป็นเพราะในช่วงระหว่างการทำภารกิจ เงินเดือนจะเพิ่มขึ้นเป็นสองเท่า และหากพวกเขาเสียชีวิตโดยไม่ได้ตั้งใจ สมาชิกในครอบครัวก็จะได้รับเงินบำนาญเต็มจำนวนสิบเหรียญทองเวทมนตร์ และในอนาคต พวกเขาก็จะได้รับการดูแลเป็นอย่างดี และถึงขั้นเข้าเรียนในโรงเรียนสำหรับสามัญชนได้ฟรี","อย่างไม่ต้องสงสัยเลย ว่าฮามิและนักบินที่เหลือได้ออกปฏิบัติภารกิจด้วยสภาพจิตใจที่เตรียมพร้อมรับมือกับอันตรายถึงชีวิต แต่หลังจากที่บินวนเวียนอยู่รอบชายแดนของอาณาจักรมานานกว่าหนึ่งเดือน จิตใจที่ตึงเครียดของพวกเขาก็ค่อยๆ ผ่อนคลายลง และพวกเขาก็ถึงขั้นรู้สึกว่าสิ่งที่ศาสตราจารย์พูดนั้น เกินจริงไปหน่อย","ในขณะนี้ พวกเขาอยู่ที่ระดับความสูงหลายพันเมตร พวกเขาเพียงแค่ต้องใช้กล้องส่องทางไกลสอดแนม และหลังจากที่เห็นกองทัพจักรวรรดิข้ามพรมแดนจากระยะไกล พวกเขาก็แค่กลับไปรายงานที่สถาบันอิเยตา ซึ่งมันไม่มีอันตรายใดๆ เลย...","ในช่วงหนึ่งเดือนที่ผ่านมา ฮามิรู้สึกเบื่อหน่ายมากกับการลาดตระเวนไปมาในพื้นที่เดิมๆ แม้ว่าเขาจะชอบความรู้สึกที่ได้บินอยู่บนท้องฟ้า แต่มันก็ต้องอยู่ในสถานที่เดียวเสมอ และมันก็ค่อนข้างจะน่าเบื่อหลังจากที่บินมาเป็นเวลานาน","ฮามิจินตนาการอยู่ในใจ ถ้าเขาเพียงแค่สามารถบินไปดูอีกฟากหนึ่งของโลกได้...","“เดี๋ยวก่อน ฮามิ เจ้ามองเห็นอะไรตรงนั้นไหม?”","รองผู้บัญชาการที่อยู่ข้างๆ จู่ๆ ก็ตะโกนเสียงดังราวกับว่าค้นพบอะไรบางอย่าง","ฮามิหันศีรษะไปมองทันที ในท้องฟ้าที่อยู่ห่างไกล ดูเหมือนว่าจะมีเมฆสีทองลอยพุ่งตรงมาทางพวกเขา","มันดูแปลกประหลาดมาก...","ฮามิใช้กล้องส่องทางไกลที่ถูกติดตั้งไว้บนเรือเหาะเพื่อสังเกตดู จากนั้นม่านตาของเขาก็หดตัวลง นี่ไม่ใช่เมฆ แต่เป็นฝูงสัตว์ประหลาดขนาดใหญ่ที่มีหัวเหมือนนกอินทรี และมีส่วนหลังเหมือนสิงโตเพลิง ภายใต้แสงสว่าง จะปรากฏรัศมีสีทองออกมาให้เห็น ซึ่งมองจากระยะไกลแล้ว ก็ดูเหมือนกับเมฆที่กำลังเคลื่อนตัว...","นั่นคือกริฟฟอน อัศวินกริฟฟอนแห่งจักรวรรดิ!"]},{"n":338,"t":"เรือเหาะที่ได้รับความเสียหาย และการต่อสู้ทางอากาศที่ชายแดน","c":["ไม่มีสิ่งที่เรียกว่ากริฟฟอนอยู่ในดินแดนพ่อมด แต่ก่อนที่พวกเขาจะจากมา พ่อมดเหล่านั้นก็ได้บอกพวกเขาเกี่ยวกับข้อมูลของกองทหารพิเศษหลายหน่วยในจักรวรรดิ และอัศวินกริฟฟอนก็คือหนึ่งในนั้น","“ถอย ถอยเร็วเข้า!”","ฮามิตะโกนเสียงดัง และรองผู้บัญชาการก็หันหัวเรือเหาะทันที ซึ่งหลบหนีไปทางอาณาจักร พร้อมกับกดปุ่มล่องหนในทันที","โล่ทรงกลมปรากฏขึ้นรอบๆ เรือเหาะทันที และเรือเหาะขนาดยักษ์ก็หายวับไปอย่างรวดเร็วท่ามกลางแสงที่บิดเบี้ยว","กริฟฟอนที่ตามมาข้างหลังส่งเสียงร้องแหลมคม แต่มันก็ไม่ได้วิ่งวนไปมาอย่างงุนงงเพราะสูญเสียเป้าหมายอย่างที่ฮามิคาดเอาไว้ ในทางกลับกัน พวกมันเร่งความเร็วขึ้นอีกครั้ง และรวมตัวกันเป็นวงกลมอย่างเป็นระเบียบเรียบร้อย ซึ่งล้อมรอบเข้ามาด้วยความเร็วที่มากกว่าเดิมถึงสองเท่า...","“บ้าเอ๊ย เจ้าพวกนี้รับมือยากเกินไปแล้ว การล่องหนก็ยังไม่สามารถหลอกพวกมันได้เลย!”","ฮามิสบถในใจ","เนื่องจากมีความรู้เกี่ยวกับกริฟฟอนเพียงเล็กน้อย เขาจึงไม่รู้เลยว่าสิ่งมีชีวิตเวทมนตร์นี้มีประสาทสัมผัสในการรับกลิ่นที่สูงมาก และถึงขั้นสามารถได้กลิ่นเลือดของเหยื่อได้จากระยะทางหลายกิโลเมตร","ดังนั้น การหายตัวไปจากการมองเห็นเพียงอย่างเดียว ย่อมไม่ทำให้เกิดอุปสรรคต่อพวกมันได้มากนัก และยิ่งไปกว่านั้น มันก็เป็นการล่องหนที่ไม่สมบูรณ์...","อย่างไรก็ตาม พวกเขาก็ไม่สามารถตำหนิฮามิและคนอื่นๆ ได้ที่ไม่ระมัดระวังให้มากพอ แม้ว่าเวทมนตร์โพลาไรซ์บนเรือเหาะจะใช้งานได้ง่าย แต่มันก็สิ้นเปลืองพลังเวทมนตร์เป็นอย่างมากในการซ่อนสัตว์ประหลาดยักษ์เช่นนี้ และมันก็สามารถใช้ได้เฉพาะในช่วงเวลาที่สำคัญเท่านั้น!","เมื่อพิจารณาว่าครั้งนี้พวกเขาอาจจะต้องอยู่ในโลกภายนอกเป็นเวลาสองหรือสามเดือน แน่นอนว่านักบินเหล่านี้จึงต้องประหยัดคริสตัลเวทมนตร์เอาไว้","“เร็ว เร็ว เร็วเข้า...”","ฮามิและคนอื่นๆ ต้องแข่งขันกับเวลา และรีบดึงคันบังคับไปจนสุด หลังจากที่เรือเหาะขนาดยักษ์เสร็จสิ้นการเปลี่ยนทิศทางที่ยากลำบาก พลังเวทมนตร์จำนวนมหาศาลก็ถูกเปลี่ยนให้กลายเป็นไฮโดรเจน และเครื่องยนต์สันดาปภายในก็ทำงานอย่างเต็มกำลัง!","ลูกเรือที่เหลือต่างก็กำปืนคาบศิลาในมือเอาไว้แน่นทีละคน แต่มันก็ยังอยู่ไกลเกินกว่าที่พวกเขาจะยิงออกไปอย่างสุ่มสี่สุ่มห้าได้","ความเร็วของเรือเหาะเพิ่มขึ้นเรื่อยๆ โดยที่อัศวินกริฟฟอนนั้นเข้ามาใกล้มากแล้ว และถึงขั้นกำลังจะก่อตัวเป็นวงล้อมอย่างเลือนราง ก็ต้องประหลาดใจเมื่อพบว่า สิ่งที่มีขนาดใหญ่โตราวกับเรือที่ลอยอยู่บนท้องฟ้านี้ ได้ปะทุความเร็วออกมาและพุ่งทะยานแซงหน้ากริฟฟอนไป...","ในฐานะกัปตันของอัศวินกริฟฟอน เดวี่ก็ไม่ได้คาดคิดถึงเรื่องนี้เช่นกัน ในความคิดของเขา เครื่องมือแปรธาตุขนาดยักษ์เช่นนี้ควรจะทำงานอย่างช้าๆ แต่ความเร็วของเรือเหาะกลับรวดเร็วอย่างคาดไม่ถึง...","หากเป็นเช่นนี้ต่อไป พวกเขาก็ทำได้เพียงแค่มองดูอีกฝ่ายหลบหนีไปต่อหน้าต่อตา...","นั่นทำให้สายตาของเดวี่เย็นชาเป็นอย่างมาก เมื่อตัดสินจากการสัมผัสกันในช่วงสั้นๆ นี้ เขาก็ได้ระบุให้สิ่งประดิษฐ์เล่นแร่แปรธาตุที่แปลกประหลาดนี้ ว่าเป็นภัยคุกคามหลักที่ต้องถูกกวาดล้างแล้ว!","เดวี่รู้ดีว่า วัตถุบินได้ที่มีคนขับ ล่องหนได้ และบินได้เร็วเป็นพิเศษนั้น มีประโยชน์มากเพียงใดในการทำสงคราม!","พวกเขาจะต้องรั้งอีกฝ่ายเอาไว้ให้ได้!","และมันจะดีที่สุด หากสามารถยึดสิ่งประดิษฐ์เล่นแร่แปรธาตุนี้มา ในสภาพสมบูรณ์ที่สุดเท่าที่จะเป็นไปได้!","เมื่อคิดได้เช่นนี้ เดวี่ก็ก้มศีรษะลงและสื่อสารกับกริฟฟอนที่อยู่ด้านล่างทันที โดยประเมินตำแหน่งและระยะห่างของทั้งสองฝ่ายคร่าวๆ ว่ามันอยู่ในทิศตะวันออกเฉียงเหนือ และห่างออกไปประมาณ 600 เมตร!","นี่เป็นระยะที่ธนูและลูกศรไม่สามารถไปถึงได้ แต่เดวี่กลับเต็มไปด้วยความมั่นใจ เพราะก่อนที่เขาจะมาเป็นอัศวินกริฟฟอน...เขาก็เคยเป็นนักบวชมาก่อน!","“โชคดีที่เราหนีมาได้เร็ว!”","เมื่อเห็นเรือเหาะพุ่งออกมาจากวงล้อมของศัตรูด้วยความเร็วที่รวดเร็วเป็นพิเศษ ฮามิและคนอื่นๆ ก็ถอนหายใจด้วยความโล่งอก และหัวใจของพวกเขาก็เต็มไปด้วยความสุขของการรอดชีวิตจากหายนะ","แม้ว่าพวกเขาจะเตรียมพร้อมที่จะเสียสละแล้วก็ตาม แต่ถ้าหากสามารถหลบหนีไปได้ มันก็คงไม่มีใครคิดว่าตนเองมีอายุที่ยืนยาวเกินไปหรอก...","ตราบใดที่พวกเขาวิ่งไปให้ไกลกว่านี้ และฝ่ายตรงข้ามสูญเสียทิศทางของพวกเขาไป เมื่อถึงตอนนั้น พวกเขาก็จะปลอดภัยอย่างสมบูรณ์","ลูกเรือหลายคนที่อยู่ในเหตุการณ์ต่างก็ผ่อนคลายลงเช่นกัน","รองผู้บัญชาการที่คอยจับตาดูความเคลื่อนไหวของศัตรูอยู่เสมอ สัมผัสได้ถึงสัญญาณเตือนในใจ และจากนั้นเขาก็พุ่งเข้าหาฮามิโดยไม่ลังเล แล้วกดเขาลงกับพื้นทันที","แทบจะในวินาทีต่อมา คลื่นกระแทกที่รุนแรงก็ลอยข้ามมาจากระยะไกล และพุ่งชนเข้ากับห้องนักบินของเรือเหาะโดยตรง","เรือเหาะขนาดยักษ์สั่นสะเทือนอย่างรุนแรง และทุบทำลายแผ่นกั้นด้านหนึ่งจนแตกละเอียด","ยกเว้นฮามิและรองผู้บัญชาการที่ถูกกดให้ล้มลงก่อน นักบินที่เหลือก็ถูกโยนออกไปตามแรงกระแทก และกระแทกเข้ากับผนังด้านข้างของพวกเขาอย่างแรง...","อย่างไรก็ตาม ก่อนที่พวกเขาจะทันได้ฟื้นตัว การโจมตีระลอกที่สองก็มาถึงอีกครั้ง!","“สรรเสริญ เอลา คลื่นแสงศักดิ์สิทธิ์!”","เดวี่และอัศวินกริฟฟอนหลายคนที่เคยเป็นนักบวชตะโกนเสียงดังอีกครั้ง และคลื่นแสงที่รุนแรงก็พุ่งเข้ามาในพริบตา โจมตีเข้าใส่ทุกส่วนของห้องนักบิน","แม้ว่าเรือเหาะจะถูกสร้างขึ้นมาด้วยวัสดุพิเศษ และมีวงเวทเล่นแร่แปรธาตุ อย่างเช่น ความเหนียว, การทำให้แข็ง, ความเบา, และกันลม แต่มันก็ไม่สามารถต้านทานการระดมยิงด้วยพลังศักดิ์สิทธิ์อย่างต่อเนื่องได้","ถ้าไม่ใช่เพราะเดวี่และคนอื่นๆ ต้องการสกัดกั้นสิ่งประดิษฐ์แปรธาตุที่แปลกประหลาดนี้เอาไว้อย่างสมบูรณ์ เรือเหาะก็คงจะถูกยิงตกไปนานแล้ว","แต่ถึงกระนั้น ภายใต้การโจมตีระลอกที่สอง เรือเหาะก็ได้รับความเสียหายอย่างหนัก และความเร็วของมันก็เริ่มช้าลงเรื่อยๆ","“บ้าเอ๊ย ใบพัดด้านนอกต้องพังไปแล้วแน่ๆ!”","ดวงตาของฮามิแดงก่ำ หลังจากที่ศึกษาโครงสร้างของเรือเหาะมาแล้ว เขาก็รู้ดีว่าสิ่งนี้หมายความว่าอย่างไร การไม่มีพลังงานก็หมายความว่า พวกเขาได้สูญเสียความหวังในการหลบหนีไปแล้ว...","“ทุกคน ในเมื่อไอ้สารเลวพวกนี้ไม่ยอมเปิดทางรอดให้กับเรา ถ้างั้นพวกเราก็ทำได้เพียงแค่สู้กับพวกมันเท่านั้น!”","ฮามิหันศีรษะไปมองผู้คนที่อยู่ในเหตุการณ์ และตะโกนออกไปสุดเสียง","“สู้กับพวกมัน!”","“ฆ่าหนึ่งไม่ขาดทุน ฆ่าสองคือกำไร!”","นักบิน พลปืน และลูกเรือที่อยู่ในเหตุการณ์ต่างก็ตะโกนอย่างพร้อมเพรียงกัน พร้อมกับมีสีหน้าที่เด็ดเดี่ยว","ชีวิตของสามัญชนเหล่านี้มีราคาถูกมาก และคงจะไม่มีใครมาสนใจชีวิตของพวกเขา แต่มันแตกต่างออกไปในสถาบันอิเยตา ที่ซึ่งพวกเขาสามารถแลกมันมาได้ด้วยสิบเหรียญทองเวทมนตร์!","นั่นก็เพียงพอแล้ว!","และถ้าพวกเขาสามารถฆ่าศัตรูได้อีกสองสามคน มันก็คือกำไรมหาศาล!","หลังจากที่ตะโกนจบ ฮามิและคนอื่นๆ ก็ไม่หลบเลี่ยงอีกต่อไป แต่หยิบปืนคาบศิลาในมือขึ้นมา และยิงไปที่อัศวินกริฟฟอนที่กำลังเข้าใกล้อย่างรวดเร็ว...","เสียงปืนดังขึ้นอย่างต่อเนื่องบนท้องฟ้าที่ระดับความสูงหนึ่งพันเมตร เนื่องจากนี่เป็นครั้งแรกที่อัศวินกริฟฟอนต้องเผชิญหน้ากับปืนคาบศิลา พวกเขาจึงไม่ได้มีการป้องกันต่ออาวุธที่แปลกประหลาดนี้มากนัก และกริฟฟอนหลายตัวก็ถูกยิงเข้าอย่างจัง...","เพียงแต่ว่าผลลัพธ์ในการต่อสู้ของพวกเขาก็น่าสมเพชมากเช่นกัน ในฐานะผู้นำของกลุ่มสัตว์วิเศษ กริฟฟอนนั้นมีพลังชีวิตที่แข็งแกร่งเป็นอย่างมาก เว้นแต่ว่าจะถูกยิงเข้าที่ศีรษะอย่างจัง หรือถูกปืนคาบศิลาหลายกระบอกยิงอย่างต่อเนื่อง มันก็ยังห่างไกลจากคำว่าถึงตาย...","อัศวินกริฟฟอนผู้กล้าหาญถึงขั้นพุ่งตัวไปข้างหน้า อาศัยทักษะการบินอันประณีตของเขาควบคู่ไปกับเส้นทางการบินที่ยากจะเข้าใจ ซึ่งโชคดีมากพอที่จะหลีกเลี่ยงการยิงรอบแรกไปได้ และก่อนที่กระสุนรอบต่อไปจะถูกบรรจุ เขาก็บินไปถึงเรือเหาะแล้ว"]},{"n":339,"t":"ไฟฟอสฟอรัสขาวที่ถูกถอดรหัส!","c":["“ยอมรับการพิพากษาของพระเจ้าซะเถอะ คนบาป!”","อัศวินกริฟฟอนชูค้อนในมือขึ้น และตะโกนใส่ฮามิและคนอื่นๆ","ในเวลาเพียงไม่กี่วินาที ระยะห่างระหว่างทั้งสองฝ่ายก็ลดลงเหลือประมาณ 20 เมตร และฮามิกับคนอื่นๆ บนเรือเหาะก็ยังคงรีบเร่งบรรจุกระสุน","เห็นได้ชัดว่า เครื่องมือแปรธาตุที่ทรงพลังประเภทนี้ไม่สามารถยิงรัวได้!","วันนี้ เขาได้ตัดสินใจใช้ท่าไม้ตายแล้ว!","ท่าทางพึงพอใจปรากฏขึ้นบนใบหน้าของอัศวินกริฟฟอน แต่ในวินาทีต่อมา เขาก็เห็นฮามิทิ้งปืนคาบศิลาในมือลงกะทันหัน ก่อนจะหยิบขวดน้ำยาที่กำลังเขย่าของเหลวแปลกประหลาดออกมาจากกระเป๋า แล้วขว้างมันใส่หน้าเขาโดยตรง","ภายใต้การพุ่งทะยานด้วยความเร็ว เห็นได้ชัดว่ามันสายเกินไปที่จะหลบหลีก กริฟฟอนที่อยู่ใต้เท้าของอัศวินส่งเสียงร้องแหลมคม เมื่อปีกสั่นสะเทือน สายลมที่รุนแรงก็กลายเป็นใบมีดสายลม และตัดขวดน้ำยาที่ลอยอยู่ตรงหน้ามัน","แต่นี่คือสิ่งที่ฮามิต้องการพอดี เพราะน้ำยาขวดนี้คือสิ่งประดิษฐ์ใหม่ล่าสุดของสถาบันวิจัยการแปรธาตุ มันคือน้ำยา ลมหายใจแห่งสายลมหนาว!","แน่นอนว่านี่คือวิธีการของลินน์เพื่อให้เข้ากับชื่อของพ่อมด อันที่จริงแล้ว มันบรรจุไนโตรเจนเหลวเอาไว้!","เมื่อของที่อยู่ข้างในถูกทำลาย อุณหภูมิที่ต่ำสุดขั้วเกือบ -200 องศา ก็แสดงให้เห็นถึงพลังทำลายล้างที่น่าทึ่งในทันที หมอกสีขาวขยายตัวอย่างรวดเร็วเพื่อห่อหุ้มอัศวินกริฟฟอนเอาไว้ และแทบจะในพริบตา น้ำค้างแข็งบางๆ ก็ปรากฏขึ้นบนชุดเกราะ ศีรษะ และมือของเขาทันที...","กริฟฟอนที่อยู่ใต้เท้าของเขาก็ไม่มีข้อยกเว้น พลังชีวิตและความต้านทานเวทมนตร์ที่แข็งแกร่งของมัน ทำให้มันสามารถดิ้นรนได้นานขึ้นอีกหนึ่งวินาที จากนั้นมันก็กระแทกเข้ากับแผ่นกั้นห้องนักบินด้วยโมเมนตัมที่น่าอัศจรรย์ และกลายเป็นประติมากรรมน้ำแข็งที่ตกลงมาจากระดับความสูงหนึ่งพันเมตรในอากาศ...","อัศวินกริฟฟอนหลายคนที่ต้องการจะแย่งความดีความชอบ เมื่อเห็นสถานการณ์ที่น่าสลดใจของเพื่อนร่วมรบ พวกเขาก็รีบเปลี่ยนทิศทาง บินขึ้นไปบนที่สูงอย่างรวดเร็ว และเริ่มทำลายถุงลมที่เตะตาอยู่เหนือเรือเหาะ","แม้ถุงลมนั้นจะทำมาจากหนังอูฐที่เหนียวเป็นอย่างมาก แต่ภายใต้กรงเล็บของกริฟฟอน มันก็ไม่ต่างอะไรกับกระดาษบางๆ แผ่นหนึ่ง และมันก็ถูกฉีกขาดอย่างรวดเร็วจนเกิดรอยแยก","และไฮโดรเจนจำนวนมหาศาลที่ถูกเติมเต็มอยู่ข้างใน ก็พวยพุ่งออกมาอย่างต่อเนื่อง...","เหตุผลที่ไม่ใช่ฮีเลียม แต่เป็นไฮโดรเจนที่อันตรายกว่า แน่นอนว่าก็เพื่อความสะดวกในการระเบิดตัวเอง!","การต่อต้านของฮามิและคนอื่นๆ ก็มาถึงขีดจำกัดในไม่ช้า","เรือเหาะลำนี้ไม่ได้ติดตั้งอาวุธต่อสู้อากาศยาน ท้ายที่สุดแล้ว มันเป็นเรื่องยากที่ปืนใหญ่จะยิงโดนศัตรูที่เคลื่อนที่ด้วยความเร็วสูงในอากาศ และมันก็ไม่สามารถใช้งานได้ง่ายเหมือนกับปืนคาบศิลาในมือของพวกเขาด้วยซ้ำ","หลังจากที่ได้ลิ้มรสพลังของปืนคาบศิลา อัศวินกริฟฟอนก็ไม่ได้บินอยู่ในระดับเดียวกันกับพวกเขาเลย โดยจะบินให้สูงขึ้นหรือต่ำลงเพื่อทำการโจมตี","“ทุกคน ตอนนี้คือช่วงเวลาสุดท้ายแล้ว การที่พวกมันไม่ได้ใช้การโจมตีที่ทรงพลังนั้นต่อไป มันก็มีความเป็นไปได้เพียงอย่างเดียว นั่นก็คือพวกมันต้องการจะจับเป็นพวกเรา และยึดเรือเหาะลำนี้!”","ฮามิกล่าวด้วยน้ำเสียงทุ้มต่ำ ขณะที่มองไปยังผู้คนที่อยู่ในเหตุการณ์","“เมื่อใดที่พวกมันทำสำเร็จ สิ่งที่รอพวกเราอยู่ ก็คือการทรมานและความอัปยศอดสูที่ไม่มีวันสิ้นสุด...”","สิ่งที่ตอบกลับเขามาก็คือความเงียบ แม้ไม่มีใครตอบอะไร แต่ดวงตาของพวกเขากลับแน่วแน่อย่างถึงที่สุด","ฮามิกดปุ่มไม้ และด้านล่างของห้องโดยสารเรือเหาะก็เปิดออก ภายในนั้นคือลูกบอลสีดำที่มีขนาดเท่ากับศีรษะมนุษย์ ซึ่งเต็มไปด้วยดินปืนและฟอสฟอรัสขาว ซึ่งมีพลังต่อต้านภาคพื้นดินที่ทรงพลังมาก","แม้เรือเหาะจะมีความสามารถในการต่อสู้อากาศยานที่จำกัด แต่มันมีพลังทำลายล้างภาคพื้นดินสูงมาก หากกองทหารล่วงหน้าที่ข้ามพรมแดนมาในครั้งนี้มีจำนวนน้อยกว่าหนึ่งพันคน เรือเหาะลำนี้ก็สามารถเอาชนะพวกมันได้อย่างสมบูรณ์...","แต่ตอนนี้มันได้กลายมาเป็นวิธีการตายตกไปตามกัน!","ทุกคนจุดคบเพลิงอย่างเงียบๆ และพวกเขาก็ต้องการจะตัดสินชะตากรรมด้วยมือของพวกเขาเอง","ในเวลานี้ เดวี่กำลังทำลายเรือเหาะจากด้านล่างของเรือเหาะร่วมกับอัศวินกริฟฟอนอีกสองสามคน แต่การรับรู้ถึงอันตรายที่เกิดจากการต่อสู้ในสนามรบมาเป็นเวลานาน ได้ส่งสัญญาณเตือนขึ้นมาในใจของเขาอย่างเลือนราง ซึ่งเดวี่ก็เชื่อมั่นในการรับรู้ของตนเองเป็นอย่างมาก และบังคับกริฟฟอนใต้เท้าของเขาให้ออกห่างจากที่นี่ทันที พร้อมกับตะโกนเสียงดัง","“กระจายกำลัง...กระจายกำลังออกไปให้หมด!”","เหล่าอัศวินที่เหลือก็ปฏิบัติตามคำสั่งของเขาอย่างซื่อสัตย์ แต่น่าเสียดายที่มันยังคงช้าไปก้าวหนึ่ง เมื่อคบเพลิงห้าอันถูกโยนลงไป เสียงคำรามที่รุนแรงก็ดังก้องขึ้นบนท้องฟ้าที่ระดับความสูงหนึ่งพันเมตร!","ระเบิดนับร้อยลูกระเบิดขึ้นพร้อมกัน และเรือเหาะขนาดยักษ์ก็แตกสลายจากภายใน ในพริบตา และในที่สุดมันก็จุดชนวนถุงลมที่เต็มไปด้วยก๊าซไฮโดรเจนที่อยู่ด้านบน ซึ่งทำให้คลื่นไฟที่พลุ่งพล่าน กวาดพัดเอาอัศวินกริฟฟอนหลายสิบคนที่อยู่ใกล้เคียงเข้าไปในพริบตา...","เสียงร้องที่น่าสลดใจดังขึ้นอย่างต่อเนื่อง ราวกับว่ามีฝนไฟตกลงมาจากท้องฟ้า อัศวินกริฟฟอนที่ตายไปโดยตรงจากการระเบิดระลอกแรกนั้นยังถือว่าโชคดี แต่อัศวินกริฟฟอนที่ได้รับผลกระทบจากคลื่นไฟเท่านั้น นั่นคือความสิ้นหวังที่แท้จริง","เดวี่ก็เป็นหนึ่งในนั้น ด้วยการพึ่งพาสัมผัสที่หกอันพิเศษของเขา เขาจึงสามารถหลบหนีออกมาจากพื้นที่แกนกลางของการระเบิดได้ แต่ร่างกายของเขาก็ยังคงถูกคลื่นไฟแผดเผา","มันเป็นความรู้สึกแผดเผาที่ไม่อาจจะอธิบายได้ และเดวี่ก็ตบไฟฟอสฟอรัสขาวบนร่างกายของเขาอย่างเปล่าประโยชน์ ซึ่งทำให้มือของเขาถูกเผาไหม้","กริฟฟอนใต้เท้าของเขายิ่งบ้าคลั่งมากกว่า มันสะบัดตัวอย่างบ้าคลั่งและทำท่าทางต่างๆ กลางอากาศ จนกระทั่งร่างกายของมันถูกจุดไฟ และพุ่งลงพื้นราวกับลูกไฟ","ในเมื่อตอนนี้ศาสนจักรได้ตัดสินใจที่จะยึดอาณาจักรกลับคืนมา แน่นอนว่าศาสนจักรย่อมไม่สามารถส่งเพียงแค่กองทหารอากาศบางส่วนมาได้","หลังจากที่เดวี่ตกลงสู่พื้นพร้อมกับกริฟฟอนใต้เท้า บิชอปที่อยู่รอบๆ ก็ล้อมรอบเขาทันที และใช้พลังวารีศักดิ์สิทธิ์ พร้อมระดมโมเลกุลของน้ำในอากาศมาด้วยความพยายามที่จะดับเปลวไฟ อย่างไรก็ตาม สถานการณ์ไม่ได้ดีขึ้นเลยแม้แต่น้อย และเดวี่ที่อยู่ที่นั่น ก็ร้องคำรามด้วยความเจ็บปวด โดยมีเปลวไฟที่คอยแทรกซึมเข้าไปในเนื้อและเลือดของเขา แล้วเริ่มแผดเผาจากภายใน","ในขณะที่เหล่าบิชอปกำลังตกตะลึงและทำอะไรไม่ถูก เสียงหนึ่งก็ดังขึ้นในหูของทุกคน","“หยุดซะ! นี่คือไฟแห่งนรกที่ถูกอัญเชิญมาโดยพ่อมด และมันก็ไม่สามารถถูกชำระล้างได้ด้วยวิธีการปกติ...”","คนที่พูดคือชายวัยกลางคนในชุดคลุมสีแดงทอง และสวมหน้ากากเหล็ก","“ท่านเอ็ดเวลล์!”","ทุกคนที่อยู่ในเหตุการณ์รีบก้มศีรษะลงทำความเคารพอย่างรวดเร็ว และถามด้วยความเคารพ","“ถ้างั้นเราจะจัดการกับมันยังไงดี?”","เอ็ดเวลล์มองตรงไปที่เดวี่ และพูดขึ้นมาทันที","“กลั้นหายใจซะ!”","เดวี่ที่ถูกทรมานด้วยไฟฟอสฟอรัสขาวอันน่าสะพรึงกลัวจนแทบจะเสียสติไปแล้ว แต่หลังจากที่ได้ยินคำพูดของเอ็ดเวลล์ เขาก็ยังคงกัดฟันและกลั้นหายใจ","“สกัดกั้นอากาศออกไปก่อน นี่คือเงื่อนไขแรกสำหรับการเผาไหม้...”","เอ็ดเวลล์ยกมือขึ้น แสงที่นุ่มนวลพวยพุ่งออกมาห่อหุ้มเดวี่เอาไว้ และไฟฟอสฟอรัสขาวที่น่าสะพรึงกลัวก็ถูกระงับลงในทันที","“ประการที่สอง ลอกเนื้อและเลือดที่ได้รับบาดเจ็บเหล่านี้ออก เพื่อป้องกันไม่ให้มันดูดซับสารอาหาร...และสุดท้าย ก็รักษามันซะ!”","เมื่อเอ็ดเวลล์พูด แสงสีขาวที่นุ่มนวลในตอนแรก ก็กลายเป็นอาวุธสังหารในทันที!","ชั้นผิวหนังและเนื้อจากทั่วทั้งร่างกายของเดวี่ถูกลอกออกโดยตรง ซึ่งสามารถมองทะลุเห็นกระดูกได้อย่างเลือนราง โดยมีดวงตาเดวี่ที่เบิกกว้าง และแทบจะหมดสติ","โชคดีที่ความเจ็บปวดกินเวลาเพียงไม่กี่วินาที โดยเนื้อและเลือดที่สูญเสียไป ก็งอกกลับคืนมาในไม่ช้าภายใต้ผลลัพธ์ของพลังศักดิ์สิทธิ์..."]},{"n":340,"t":"ถึงเวลาที่ไฟฟอสฟอรัสขาวจะถูกกำจัดทิ้งแล้ว!","c":["กระบวนการรักษาทั้งหมดสิ้นสุดลงในเวลาเพียงแค่สามนาที และเมื่อเดวี่ยืนขึ้นอีกครั้ง อาการบาดเจ็บของเขาก็หายเป็นปลิดทิ้ง","เอ็ดเวลล์เคยมีประสบการณ์โดยตรงกับไฟประหลาดที่ดับไม่ได้นี้ที่เมืองท่า และข้อมูลที่ส่งต่อมาจากอาณาจักร ก็เน้นย้ำด้วยว่าอีกฝ่ายใช้สิ่งนี้เพื่อทำลายกองทหารชั้นยอดของอาณาจักรฮัดลาตา...","ในเมื่อครั้งนี้เขาเป็นผู้นำกองทัพมาด้วยตนเอง แน่นอนว่าเขาย่อมต้องเตรียมพร้อมมาเป็นอย่างดี!","“ขอบคุณ ท่านเอ็ดเวลล์...”","เดวี่กล่าวด้วยความซาบซึ้ง และสีหน้าของเขาก็เต็มไปด้วยความละอายใจอย่างถึงที่สุด","เขาเป็นฝ่ายริเริ่มที่จะนำทีมไปยึดสิ่งประดิษฐ์เล่นแร่แปรธาตุขนาดยักษ์นั่น เพื่อที่เขาจะได้หาวิธีรับมือกับมัน","ด้วยวิธีนี้ ความสูญเสียในสงครามครั้งต่อๆ ไปก็จะสามารถลดลงได้ ใครจะไปคิดว่าอีกฝ่ายจะระเบิดตัวเองในท้ายที่สุด และอัศวินกริฟฟอนกว่าสิบคนต้องตกตายไป...","เดวี่รู้สึกเสียใจเป็นอย่างมาก หากเขาไม่ต้องการที่จะจับเป็นศัตรู พวกเขาก็คงจะใช้พลังศักดิ์สิทธิ์ทำลายสิ่งประดิษฐ์เล่นแร่แปรธาตุนั้นไปโดยตรงแล้ว","“เพื่อเป็นการลงโทษสำหรับความล้มเหลวในภารกิจนี้ ตราบใดที่อัศวินกริฟฟอนถูกส่งออกไปในอนาคต เจ้าจะต้องพุ่งไปแนวหน้าเพื่อเผชิญหน้ากับศัตรู จนกว่าข้าจะออกคำสั่งให้ล่าถอย ศัตรูพ่ายแพ้ หรือ...ตาย!”","คำพูดที่เย็นชาของเอ็ดเวลล์ดังก้องอยู่ในหูของเดวี่ เพราะความตายของอัศวินกริฟฟอนกว่าสิบคน ถูกแลกมาด้วยผลลัพธ์ในการทำลายเรือเหาะลำเดียว ซึ่งเห็นได้ชัดว่ามันเป็นสิ่งที่เอ็ดเวลล์ไม่สามารถยอมรับได้","โดยปกติแล้ว อัศวินกริฟฟอนจะสามารถคัดเลือกได้จากกองทหารชั้นยอดของจักรวรรดิ หรือแม้แต่กองกำลังพิพากษาของพระเจ้าเท่านั้น เมื่อประกอบกับการฝึกฝนความเข้าขากัน และการฝึกฝนการต่อสู้ มันก็ต้องใช้เวลาหลายปีจึงจะเป็นรูปเป็นร่าง ซึ่งนี่ยังไม่รวมถึงค่าใช้จ่ายสำหรับกริฟฟอนอีก","อาจกล่าวได้ว่า การฝึกฝนทีมอัศวินกริฟฟอนขึ้นมานั้น ก็เพียงพอแล้วที่จะทำให้ดินแดนที่ร่ำรวยล้มละลายได้ แต่ตอนนี้พวกเขากลับมาตายอยู่ที่นี่!","หากไม่ใช่เพราะตอนนี้สงครามกำลังจะปะทุขึ้น และพลังต่อสู้ทุกหยดมีความล้ำค่าอย่างยิ่ง ชะตากรรมของเดวี่ก็ควรจะถูกควบคุมตัวกลับไป เพื่อรับการตัดสิน!","“ข้าขอสาบานในนามของพระเจ้า ตั้งแต่วันนี้เป็นต้นไป ข้าจะเป็นผู้นำแนวหน้าและสู้จนตัวตาย!”","เดวี่สาบานด้วยความตื่นเต้น","เอ็ดเวลล์พยักหน้า ในขณะเดียวกัน อัศวินกริฟฟอนที่เหลือก็บินกลับมา โดยมีศพของเพื่อนร่วมทางที่ถูกนำกลับมาด้วยเช่นกัน!","สภาพความตายของคนเหล่านี้น่าสะพรึงกลัวยิ่งกว่าคนก่อนหน้านี้ บางคนตายจากการระเบิดและร่างกายก็แหลกเหลว ในขณะที่บางคนถูกกัดกร่อนด้วยฟอสฟอรัสขาวที่ยังคงลุกไหม้อยู่...","อัศวินกริฟฟอนที่ยังมีชีวิตอยู่ต้องทนทุกข์ทรมานอย่างมาก เพื่อนำศพของเพื่อนร่วมทางกลับมา เนื่องจากขาดข้อมูล พวกเขาส่วนใหญ่จึงปนเปื้อนไปกับเปลวไฟที่น่าสะพรึงกลัวนี้","โดยไม่รอให้เอ็ดเวลล์ทำอะไร บิชอปที่เหลือก็ทำตามและเริ่มรักษาคนเหล่านี้","แม้ไฟแห่งนรกที่แปลกประหลาดนี้มีความน่าประหลาดใจและยากที่จะดับ แต่เมื่อรู้วิธีจัดการกับมันแล้ว แม้แต่บิชอปก็สามารถจัดการกับมันได้","เอ็ดเวลล์สั่งการเพียงไม่กี่คำ จากนั้นเขาก็เดินไปที่ศพสองศพที่ถูกปกคลุมไปด้วยน้ำแข็ง และเอื้อมมือออกไปสัมผัส แม้ว่าเขาจะไม่ได้สัมผัสมันจริงๆ แต่อุณหภูมิที่ต่ำสุดขั้วมากกว่าลบหนึ่งร้อยองศา ก็ยังคงทำให้เขารู้สึกไม่สบายใจ ช่างเป็นความเหน็บหนาวที่น่าสะพรึงกลัวยิ่งนัก...","สีหน้าของเอ็ดเวลล์ดูเคร่งขรึมขึ้นเล็กน้อย นี่มันเป็นเวทมนตร์ที่รับมือยากอีกชนิดหนึ่ง โดยสิ่งที่ทำให้เขากังวลมากขึ้นก็คือ ตามรายงานของเดวี่ มันเป็นเพียงแค่สามัญชนที่ใช้เวทมนตร์ไม่ได้ เป็นผู้ควบคุมสิ่งประดิษฐ์เล่นแร่แปรธาตุขนาดยักษ์นั่น แต่สิ่งประดิษฐ์เล่นแร่แปรธาตุนี้ กลับทำให้เกิดความสูญเสียอย่างมากต่ออัศวินกริฟฟอนชั้นยอดของจักรวรรดิ...","ขณะที่กำลังครุ่นคิด จู่ๆ เอ็ดเวลล์ก็ดูเหมือนจะสัมผัสได้ถึงบางสิ่ง และหันศีรษะไปมองยังทิศทางของท้องฟ้าที่อยู่ห่างไกล","ซึ่งในระดับความสูงที่ห่างออกไปสี่กิโลเมตร มีเรือเหาะอีกลำหนึ่งซึ่งกำลังมุ่งหน้าไปยังสถาบันอิเยตาด้วยความเร็วที่รวดเร็วเป็นพิเศษ และในฐานะกัปตัน อเล็กซ์ก็กำลังสังเกตสถานการณ์ของศัตรูด้วยกล้องส่องทางไกล แต่เมื่อเขาเห็นเอ็ดเวลล์หันศีรษะมามองทางนี้ เขาก็ต้องตกตะลึงทันที","“ระยะทางไกลขนาดนี้ เขายังหาเจอได้อีก...”","อเล็กซ์อ้าปากค้างโดยไม่รู้ตัว พร้อมกับขาของเขาที่รู้สึกอ่อนแรง","เรือเหาะที่ลาดตระเวนในพื้นที่ต่างๆ ล้วนไปเป็นกลุ่มละสองลำ ซึ่งมีระยะห่างสามถึงห้ากิโลเมตร","โดยประการแรกก็คือ เพื่อให้มีการสนับสนุนซึ่งกันและกัน และหลีกเลี่ยงอุบัติเหตุในระหว่างทาง ประการที่สองคือเพื่อป้องกันไม่ให้ศัตรูแอบเข้ามาในอาณาเขตของอาณาจักรอย่างเงียบๆ","เดิมที เมื่ออเล็กซ์เห็นว่าเรือเหาะที่ฮามิอยู่กำลังถูกโจมตี เขาต้องการจะรีบเข้าไปช่วยเหลือ แต่ใครจะไปจินตนาการได้ว่า ภายในเวลาเพียงไม่กี่นาที พวกเขาก็ได้เป็นพยานเห็นเรือเหาะถูกล้อมรอบด้วยอัศวินกริฟฟอน และระเบิดตัวเองในท้ายที่สุด...","อเล็กซ์ตระหนักได้ทันทีว่ามันสายเกินไปแล้ว และล้มเลิกแผนการสนับสนุนในทันที โดยหันหัวเรือเหาะแล้วรีบหนีไป","เพราะสิ่งที่สำคัญที่สุดในตอนนี้ ก็คือนำข้อมูลทั้งหมดที่นี่กลับไปอย่างครบถ้วน!","นครกรีนรีล หอคอยโคโรนา อาณาจักรท้องฟ้า","สมาชิกสภากว่าหนึ่งร้อยคนรวมตัวกันในห้องประชุม โดยส่งต่อข้อมูลที่ถูกส่งมาจากสถาบันอิเยตากันไปทีละคน","“ดูเหมือนว่าสงครามจะมาถึงเร็วกว่าที่เราคาดไว้มาก...”","ราฟาเอลกระซิบหลังจากที่อ่านจดหมายในมือ จากนั้นก็หันศีรษะไปมองลินน์ และพูดพร้อมกับถอนหายใจ","“เจ้ามีกลุ่มนักบินที่ยอดเยี่ยมมาก...ศาสตราจารย์ลินน์”","สมาชิกสภาที่เหลือก็พยักหน้าเช่นกัน การที่สามัญชนห้าคนที่ไม่รู้จักเวทมนตร์ เพิ่งจะแลกชีวิตของพวกเขากับอัศวินกริฟฟอนกว่าสิบคน ในแง่หนึ่ง ความตายของพวกเขานั้นก็มีค่าเป็นอย่างมาก...","โดยเทียบกับเรือเหาะรุ่นใหม่ล่าสุดที่มีมีราคาเพียงแค่ 2,000 เหรียญทองเวทมนตร์ และต้นทุนการผลิตก็ยิ่งต่ำกว่านั้น...","ลินน์รู้สึกเสียใจกับฮามิและคนอื่นๆ ในความคิดของเขา นักบินที่มีทักษะห้าคนนั้นล้ำค่ามากกว่าการฆ่าอัศวินกริฟฟอนเพียงไม่กี่คนเสียอีก","ตอนนี้โรงงานของสถาบันอิเยตากำลังผลิตเรือเหาะออกมาอย่างรวดเร็วมาก แต่กำลังคนสำหรับนักบินนั้นหายากมาก และมันก็ไม่ใช่เรื่องง่ายเลยที่จะฝึกฝนพวกเขาขึ้นมา","“ข้าเพิ่งอ่านข้อมูลเมื่อครู่นี้ และมันบอกว่าศาสนจักรดูเหมือนจะค้นพบวิธีทำลายไฟแห่งนรกลงได้แล้ว...”","สมาชิกสภาคนหนึ่งพูดขึ้นมาอย่างลังเล","เมื่อได้ยินเช่นนี้ ทุกคนที่อยู่ในเหตุการณ์ก็หันไปมองลินน์","เนื่องจากการโฆษณาชวนเชื่อของสภาและข่าวลือต่างๆ ที่แพร่สะพัดไปทั่ว พวกเขาจึงคุ้นเคยกับวีรกรรมระดับตำนานของดาวรุ่งแห่งเวทมนตร์ที่อยู่ตรงหน้าเป็นอย่างดี และแน่นอนว่าพวกเขาก็รู้ดีว่าอีกฝ่ายสามารถสร้างไฟแห่งนรกที่ไม่มีวันดับขึ้นมาได้","และตอนที่ลินน์เป็นพ่อมดระดับสามวงแหวน เขาก็ได้ใช้มันเพื่อทำลายเมืองท่าไปครึ่งหนึ่ง เมื่อไม่นานมานี้ เขาก็เพิ่งใช้มันเพื่อเอาชนะกองทหารชั้นยอดของอาณาจักรฮัดลาตา ด้วยสถิติการทำลายกองทัพทั้งสองครั้งนี้ ไม่ต้องสงสัยเลยว่ามันน่าทึ่งมาก ดังนั้น เปลวไฟที่แปลกประหลาดนี้ จึงแทบจะกลายเป็นสัญลักษณ์ของดาวรุ่งแห่งเวทมนตร์ผู้นี้ไปแล้ว!","ซึ่งมีข่าวลือว่า สิ่งนี้อาจจะถูกอัญเชิญมาจากขุมนรกที่ไม่มีวันสิ้นสุด โดยเปลวไฟชนิดนี้จะแผดเผาและกลืนกินผิวหนังและเนื้อของมนุษย์","การเสียสละของฮามิและคนอื่นๆ ที่สามารถทำผลงานได้ดีเยี่ยมในครั้งนี้ และระเบิดฟอสฟอรัสขาวที่ถูกพัฒนาขึ้นโดยลินน์ ก็มีส่วนช่วยเป็นอย่างมากเช่นกัน","แน่นอนว่าราฟาเอลไม่เชื่อว่าจะมีสิ่งที่เรียกว่าไฟแห่งนรกอยู่จริง แต่เขาก็ไม่ได้คาดคิดเลยว่าศาสนจักรจะหาวิธีรับมือได้รวดเร็วขนาดนี้..."]},{"n":341,"t":"ทำไมพวกท่านไม่ลองปืนใหญ่เลเซอร์ของข้าดูล่ะ?","c":["ภายใต้การจับจ้องของฝูงชน ลินน์มีท่าทีเป็นปกติและพูดขึ้นมาอย่างสบายๆ","“เวทมนตร์ใดๆ ล้วนมีความเป็นไปได้ที่จะถูกทำลาย และไฟฟอสฟอรัสขาวของข้าก็ไม่มีข้อยกเว้น”","เป็นเพราะเหตุนี้เอง หลังจากที่เข้ามาในดินแดนพ่อมด เขาจึงระมัดระวังเป็นอย่างมากที่จะเก็บข้อมูลเกี่ยวกับฟอสฟอรัสขาวเอาไว้","เพราะสิ่งนี้ มีไว้เพื่อรังแกพวกบิชอปที่ไร้การศึกษาในจักรวรรดิเซคัสเท่านั้น แต่หากเขากล้าใช้มันในปริมาณมหาศาลในดินแดนพ่อมด พ่อมดก็จะสามารถสร้างมันขึ้นมาใหม่ได้อย่างรวดเร็ว","ท้ายที่สุดแล้ว ฟอสฟอรัสก็ไม่ได้ผลิตยากอะไร และเพื่อให้สามารถผลิตจำนวนมากได้ เขาก็ได้ส่งมอบเทคโนโลยีนี้ให้กับพ่อมดที่เชื่อถือได้หลายคนในสถาบันวิจัยการแปรธาตุแล้ว","อันที่จริงแล้ว หลังจากที่ทะลวงขึ้นเป็นจอมเวทผู้ยิ่งใหญ่ ความสำคัญของฟอสฟอรัสขาวสำหรับลินน์ก็ลดลงเป็นอย่างมาก เพราะสิ่งนี้แทบจะไม่มีความหมายอะไรเลยในการต่อสู้ระดับจอมเวทผู้ยิ่งใหญ่ นอกเหนือจากสิ่งอื่นใดแล้ว อาณาเขตสุญญากาศก็สามารถลดพลังของมันลงได้อย่างมาก และต่อให้จะมีการผลิตไฟฟอสฟอรัสขาวออกมาเป็นจำนวนมาก แต่มันก็เทียบเท่ากับพลังของเวทมนตร์ระดับสี่หรือระดับห้าวงแหวนเท่านั้น","และลักษณะเฉพาะของฟอสฟอรัสขาวเอง ก็ยังเป็นตัวกำหนดด้วยว่าขีดจำกัดสูงสุดของมันจะไม่สูงเกินไปนัก...","แต่นั่นก็ไม่สำคัญ ในบรรดาอาวุธที่น่าสะพรึงกลัวมากมายที่ถูกบันทึกเอาไว้ในสมองของเขา ระเบิดฟอสฟอรัสขาวก็ทำได้เพียงถูกอธิบายว่าอยู่ในระดับปานกลางเท่านั้น...","และการที่เขาระบุให้มันเป็นตัวเลือกแรกนั้น ก็เป็นเพราะว่ามันสร้างได้สะดวกกว่าเป็นหลัก","“ประจวบเหมาะกับที่ข้าเพิ่งจะคิดค้นเวทมนตร์แห่งไฟแบบใหม่ที่ทรงพลังมากกว่าเดิมขึ้นมาในช่วงไม่กี่วันนี้พอดี และนี่ก็ถึงเวลาที่มันจะถูกกำจัดทิ้งแล้ว...”","ลินน์กล่าวด้วยความรู้สึกที่เต็มเปี่ยม","ไฟฟอสฟอรัสขาวเคยเป็นไพ่ตายของเขา และแก้ปัญหาให้กับเขามามากมาย แต่ตอนนี้มันไม่สามารถตามการเติบโตของเขาได้ทันแล้ว","ในฐานะจอมเวทผู้ยิ่งใหญ่ เขาสามารถทำหลายสิ่งหลายอย่างที่เขาไม่สามารถทำได้มาก่อนได้อย่างง่ายดาย อย่างเช่นการสร้างองค์ประกอบการผสมบางอย่างที่มีคุณสมบัติทางเคมีที่ซับซ้อนมากขึ้น...","สำหรับพ่อมดคนอื่นๆ การสร้างเวทมนตร์แบบใหม่ที่ทรงพลังขึ้นมานั้น ไม่ใช่งานง่ายเลย และโดยปกติแล้วก็มักจะต้องใช้เวลาหลายปี หรือแม้แต่หลายทศวรรษในการค้นหาข้อมูล และต้องใช้แรงบันดาลใจด้วย ซึ่งทำให้ใบหน้าของราฟาเอลและคนอื่นๆ กระตุก","นี่มันมีเวทมนตร์แห่งไฟที่ทรงพลังยิ่งกว่าไฟแห่งนรกแบบนั้นอยู่จริงๆ งั้นเหรอ พวกเขาคิดว่าแค่นี้มันก็เกินจริงพอแล้ว","ลินน์ไม่ได้ตั้งใจจะอธิบายอะไรมากนัก เขาเพียงแค่ยกมือขึ้นเคาะโต๊ะประชุม เพื่อดึงความสนใจของทุกคนให้หันเหไปจากไฟฟอสฟอรัสขาว เพราะพวกเขามีเรื่องสำคัญให้ต้องจัดการมากกว่านั้น","“ตามข้อมูลที่ได้รับจากนักบินที่ใช้กล้องส่องทางไกล คาดว่าครั้งนี้มีกองทหารจักรวรรดิกว่า 30,000 คนข้ามพรมแดนมา นอกจากอัศวินกริฟฟอนแล้ว ยังมีกองทหารพิเศษอีกประมาณ 5,000 คน ซึ่งทั้งหมดสวมชุดเกราะสีเงินแวววาว ที่ดูไม่ธรรมดา”","“และผู้นำของพวกมันก็คือชายที่สวมหน้ากากเหล็กและชุดคลุมสีแดงทอง ซึ่งไม่สามารถมองเห็นใบหน้าของเขาได้ และอายุของเขาด้วย”","ลินน์กล่าวด้วยน้ำเสียงทุ้มต่ำ","แม้ว่าทั้งสองจะเคยมองหน้ากันข้ามทะเลในเมืองท่า แต่ในตอนนั้นสายตาของลินน์ก็ยังไม่ดีมากนัก ดังนั้น เขาจึงรู้เพียงแค่ว่า มีคนอัญเชิญร่างเงาของเทพธิดาออกมา เพื่อหยุดยั้งการแพร่กระจายของไฟฟอสฟอรัสขาว แต่เขาก็ไม่รู้ว่าคนผู้นั้นเป็นใคร","“ผู้นำของพวกมันน่าจะเป็น เอ็ดเวลล์ พระคาร์ดินัลแห่งศาสนจักร และมีข่าวลือว่าเขามีความสำคัญมากในศาสนจักร โดยเขาอาจจะกลายมาเป็นประธานผู้พิพากษาคนต่อไป...”","แฮร์รอฟอธิบาย","เขามักจะอาศัยอยู่ในดินแดนพ่อมด และไม่เคยออกไปไหนเลย แต่นั่นก็ไม่ได้หมายความว่าสภาจะไม่มีสายลับอยู่ในจักรวรรดิ","เมื่อปีที่แล้ว นครกรีนรีลเกือบจะถูกทำลายโดยลัทธิวันสิ้นโลกที่บ้าคลั่งเหล่านั้น แฮร์รอฟจึงได้เรียนรู้จากความเจ็บปวด และเพิ่มการลงทุนในระบบข่าวกรองมากขึ้น","เพียงแต่ว่ามันดูเหมือนจะส่งผลลัพธ์เพียงเล็กน้อยในตอนนี้ เพราะสายลับของเขาเพิ่งจะบอกเขาเมื่อสามวันก่อน ว่ากองทัพของจักรวรรดิยังคงน่าจะรวมตัวกันอยู่ทางทิศตะวันออก แต่ผลลัพธ์ก็คือ อีกฝ่ายได้หันกลับมาและเข้าไปในอาณาจักรแล้ว หากไม่ใช่เพราะเรือเหาะที่ลินน์จัดเตรียมเอาไว้ให้พวกเขาสังเกตการณ์ชายแดน เกรงว่าพวกเขาก็คงจะยังคงถูกปิดหูปิดตาอยู่","หลังจากหยุดชะงักไปครู่หนึ่ง แฮร์รอฟก็พูดต่อ","“สำหรับกองทหารชุดเกราะสีเงินเหล่านั้น พวกมันน่าจะเป็นกองกำลังทัณฑ์ศักดิ์สิทธิ์ของศาสนจักร!”","ลินน์ขมวดคิ้ว แน่นอนว่าเขาเคยได้ยินเกี่ยวกับกองทหารที่ยอดเยี่ยมที่สุดของศาสนจักรหน่วยนี้มาบ้าง โดยมีข่าวลือว่าทุกคนในกองทหารหน่วยนี้ ล้วนแต่ได้รับพรจากทวยเทพ ซึ่งมีความกล้าหาญในการต่อสู้อย่างมาก และพวกมันก็เป็นสุดยอดในหมู่สุดยอด","“นี่น่าจะเป็นเพียงแค่กองทหารล่วงหน้าเท่านั้น!”","ออโรร่ากล่าวเตือนความจำ","พวกเขาเข้าควบคุมอาณาจักรทั้งหมด และการต่อสู้ในเมืองหลวง ก็ได้เปิดเผยความแข็งแกร่งส่วนหนึ่งของสมาคมเวทมนตร์เร้นลับออกมาแล้ว ไม่ว่าศาสนจักรจะยิ่งใหญ่ขนาดไหน มันก็เป็นไปไม่ได้เลยที่จะส่งคนมาเพียงแค่นี้ ต่อให้จะเป็นกองทหารชั้นยอดก็ตาม","ข่าวร้ายที่เข้ามาอย่างต่อเนื่อง ก็ทำให้สมาชิกสภาที่อยู่ในเหตุการณ์รู้สึกเศร้า แต่ก็โชคดีที่กองกำลังทัณฑ์ศักดิ์สิทธิ์บนพื้นดินนั้น ไม่ว่าพวกมันจะยอดเยี่ยมขนาดไหน พวกเขาก็ยังมีทุนมากพอที่จะต่อสู้ ด้วยกองกำลังปืนคาบศิลาที่ล้ำสมัยยิ่งกว่า","แต่อัศวินกริฟฟอนบนท้องฟ้านั้น ถือว่าเป็นปัญหาใหญ่ที่ยากจะแก้ไข ตราบใดที่พวกมันยังคงอยู่ เรือเหาะก็ไม่สามารถขึ้นสู่อากาศและทิ้งระเบิดได้","มันเป็นไปไม่ได้เลยที่จะปล่อยให้เรือเหาะต้องระเบิดในทุกๆ ครั้ง จริงมั้ย?","ข่าวกรองระบุอย่างชัดเจนว่า อัศวินกริฟฟอนต้องการจะยึดการควบคุมเรือเหาะในครั้งนี้ และพวกมันก็มีโอกาสดีมากที่จะจับเป็นนักบิน มิฉะนั้นพวกมันก็คงจะใช้เวทมนตร์จากระยะไกล และทำลายเรือเหาะทิ้งไปโดยตรงแล้ว","“บางทีพวกเราอาจจะพิจารณาเปลี่ยนพ่อมดสายแปรสภาพบางคน ให้กลายเป็นสัตว์ประหลาดบินได้ เพื่อปกป้องเรือเหาะเหล่านี้”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งเสนอแนะขึ้นมา","“ให้พวกเขาไปต่อสู้กับกริฟฟอนบนที่สูงงั้นเหรอ เจ้าบ้าไปแล้วรึไง?”","ซานเชซดุด่าอีกฝ่ายด้วยความโกรธ สำหรับแนวคิดที่ไม่สมจริงของเขา ซึ่งนี่มันเป็นเพียงแค่เรื่องตลกเกี่ยวกับชีวิตของพ่อมดสายแปรสภาพ","เมื่อการแปรสภาพด้วยเวทมนตร์เสร็จสิ้น พ่อมดก็จะสูญเสียความสามารถในการร่ายคาถาไปบางส่วน มันจึงเป็นเรื่องยากที่จะเอาชนะสัตว์ประหลาดที่ดุร้ายอย่างกริฟฟอนบนท้องฟ้าแบบตัวต่อตัวได้ นับประสาอะไรกับอัศวินกริฟฟอนเหล่านั้นที่สามารถร่วมมือกันร่ายพลังศักดิ์สิทธิ์ได้อีก","“เป็นไปได้มั้ยว่าเจ้ามีวิธีจัดการที่ดีกว่านี้?”","จอมเวทผู้ยิ่งใหญ่ถามด้วยรอยยิ้มเยาะ","แม้ว่าความคิดของเขาจะก่อให้เกิดความสูญเสียอย่างมาก แต่มันก็ยังคงเป็นทางออก...","ซานเชซสำลักไปครู่หนึ่ง และหลังจากครุ่นคิดอยู่นาน เขาก็เสนอให้พวกตนไม่ต้องส่งเรือเหาะขึ้นสู่อากาศ แล้วยอมแพ้ในเรื่องความได้เปรียบทางอากาศไปก่อน และหากอัศวินกริฟฟอนกล้าเข้าใกล้พื้นดินเพื่อโจมตี พวกเขาก็จะใช้ปืนคาบศิลาและเวทมนตร์เพื่อต่อโต้กลับอย่างดุเดือด","“ทำไมพวกท่านไม่ลองใช้เลเซอร์ดูล่ะ?”","จู่ๆ ลินน์ก็พูดขึ้นมาท่ามกลางการสนทนาของฝูงชน","การปรากฏตัวของอัศวินกริฟฟอนเหล่านี้เกินความคาดหมายของเขาไปบ้าง เห็นได้ชัดว่ามันสายเกินไปแล้วที่จะพัฒนาเรือบินรุ่นใหม่ขึ้นมา ดังนั้น ทำไมไม่ลองปืนใหญ่ต่อสู้อากาศยานเลเซอร์ดูล่ะ!","“เลเซอร์?!”","ออโรร่ามองไปที่ลินน์ด้วยความประหลาดใจ จากนั้นก็ตอบสนอง","“เจ้าหมายถึงเวทมนตร์ลำแสงอันใหม่นั่นน่ะเหรอ?”","ดวงตาของแฮร์รอฟและคนอื่นๆ ก็เปล่งประกายขึ้นมาทันที นึ่ถือเป็นวิธีที่ดีจริงๆ","อัศวินกริฟฟอนเหล่านั้นบินได้เร็วและคล่องตัวไม่ใช่เหรอ?","แต่ต่อให้พวกมันจะเร็วแค่ไหน มันจะยังเร็วเท่ากับแสงได้อีกมั้ยล่ะ?","นั่นคือเลเซอร์ที่มีความเร็วเกือบ 300,000 กิโลเมตรต่อวินาที และสามารถโคจรรอบทวีปได้ถึงเจ็ดรอบครึ่งเชียวนะ!"]},{"n":342,"t":"ต่อให้ได้รับความช่วยเหลือจากสมาคมเวทมนตร์เร้นลับ ก็อาจจะไม่สามารถเอาชนะสัตว์ประหลาดเช่นนี้ได้","c":["คำพูดของลินน์เปิดประตูสู่โลกใบใหม่ให้กับทุกคนที่อยู่ในเหตุการณ์ และพลังของเวทมนตร์เลเซอร์ พวกเขาก็ได้สัมผัสกับมันมาแล้วในการทดลองวัดความเร็วของแสงเมื่อไม่กี่วันก่อน มันทำได้เพียงถูกอธิบายว่าน่าสะพรึงกลัว โดยเฉพาะช่วงเวลาที่มีการยิงลำแสงออกมา ซึ่งจะไม่มีใครสามารถหลบหนีได้พ้น...","แต่มันก็ใช่ว่าจะไม่มีข้อเสียซะทีเดียว นั่นก็คือยิ่งระยะทางไกลออกไปมากเท่าไหร่ ความรุนแรงก็จะยิ่งลดลงมากเท่านั้น และระยะสังหารที่มีประสิทธิภาพก็คือประมาณสามหรือสี่ร้อยเมตร แต่หากพวกเขาต้องการจะรับมือกับกริฟฟอนที่สามารถบินได้สูงถึงหนึ่งพันเมตร พวกเขาก็จะต้องทำการปรับปรุงเพิ่มเติมเพื่อเพิ่มพลังให้กับสิ่งนี้เสียก่อน มิฉะนั้น...","สมาชิกสภาคนหนึ่งได้พูดคุยถึงแผนการปรับปรุงเวทมนตร์ลำแสงนี้อย่างกระตือรือร้น","เนื่องจากความเข้าใจเกี่ยวกับทัศนศาสตร์ยังอยู่ในช่วงเริ่มต้น ทำให้การปรับปรุงเหล่านี้จึงเป็นเพียงการสร้างแหล่งกำเนิดแสงที่ทรงพลังมากขึ้นเท่านั้น และจะโฟกัสมันไปที่จุดเดียวได้อย่างไร","ราฟาเอลเสนอแนะว่า พวกเขาสามารถประจำการพ่อมดเวทมนตร์แสงบางคนไว้บนเรือเหาะได้โดยตรง เพื่อทำการโจมตีจากทางอากาศ ซึ่งจะสามารถลดระยะทางลงได้อย่างมาก...","ลินน์ไม่ได้เข้าร่วมการพูดคุยในหมู่ผู้คน แต่เขามีแผนการที่สอดคล้องกันอยู่ในใจแล้ว ที่เขาบอกว่าเวทมนตร์เลเซอร์ ไม่ได้เรียบง่ายแค่การรวบรวมแสงเท่านั้น...","เลเซอร์มักจะถูกเรียกว่าการปล่อยแสงที่ถูกกระตุ้นของอะตอม มันคือพลังงานที่ถูกปล่อยออกมาในรูปของโฟตอน เมื่ออิเล็กตรอนในอะตอมดูดซับพลังงานและกระโดดจากระดับพลังงานต่ำไปยังระดับพลังงานสูง และจากนั้น ก็จะตกลงมาจากระดับพลังงานสูงไปยังระดับพลังงานต่ำ ซึ่งเป็นที่รู้จักกันในนามของไม้บรรทัดที่แม่นยำที่สุด และมีดที่เร็วที่สุด!","และเทคโนโลยีอาวุธเลเซอร์ของสหพันธรัฐก็สมบูรณ์แบบแล้วเช่นกัน ดังนั้น สิ่งที่เขาต้องทำก็มีเพียงแค่การเปลี่ยนทฤษฎีที่เกี่ยวข้องให้กลายเป็นเวทมนตร์ ซึ่งมันก็น่าจะใช้เวลาเพียงแค่ไม่กี่วัน","อีกคนหนึ่งที่ไม่ได้เข้าร่วมการพูดคุยก็คือซานเชซ ซึ่งมีการวิจัยเกี่ยวกับทัศนศาสตร์เพียงเล็กน้อย แต่เขากลับมีความสนใจในเรื่องอื่นเป็นอย่างมาก","“ศาสตราจารย์ลินน์ ข้าได้ยินมาว่าก่อนหน้านี้...ในระหว่างการต่อสู้เพื่อยึดเมืองหลวง พระคาร์ดินัลของอาณาจักรได้อัญเชิญร่างจำแลงของ...พระเจ้าจอมปลอมนั่นออกมา มันเป็นเรื่องจริงงั้นเหรอ?”","“จริง!”","ลินน์พยักหน้า","“ข้าไม่รู้ว่าพ่อมดระดับตำนานคนไหนจากสมาคมเวทมนตร์เร้นลับที่เป็นคนลงมือ?”","แฮร์รอฟถามด้วยความอยากรู้อยากเห็น","แม้ว่ามันจะเป็นเพียงแค่ร่างจำแลงของเอลา แต่มันก็มีพลังที่เหนือกว่าจอมเวทผู้ยิ่งใหญ่ ซึ่งไม่ใช่สิ่งที่ลินน์และคนอื่นๆ จะรับมือได้","เกี่ยวกับประเด็นนี้ พ่อมดที่อยู่ในเหตุการณ์ต่างก็มีความสงสัยใคร่รู้เป็นอย่างมาก แม้ว่าหนังสือพิมพ์เวทมนตร์รายวัน จะได้อธิบายถึงผลลัพธ์สุดท้ายของการต่อสู้ไปแล้ว แต่มันก็ไม่ได้กล่าวถึงกระบวนการทั้งหมดมากนัก","ลินน์ส่ายหัวและกล่าวอย่างตรงไปตรงมา","“อันที่จริงแล้ว แผนการสร้างอาณาจักรเวทมนตร์ในครั้งนี้ ได้รับการตกลงร่วมกันโดยข้าและแอนโธนี มันไม่มีนักวิชาการเข้ามาเกี่ยวข้องมากนัก และมันก็ไม่ใช่คำสั่งที่ถูกออกโดยสมาคมเวทมนตร์เร้นลับด้วย”","กล่าวอีกนัยหนึ่งก็คือ มันไม่ได้รับความช่วยเหลือจากพ่อมดระดับตำนานเลยงั้นเหรอ?","แฮร์รอฟรู้สึกแปลกใจมาก ว่าพวกเขาสามารถเอาชนะร่างจำแลงของพระเจ้าจอมปลอมนั่นมาได้อย่างไร...","เมื่อเห็นผู้คนถามถึงเรื่องนี้ ลินน์ก็ไม่ได้ตั้งใจจะปิดบังอะไร โดยเขาก็ได้พูดคุยเกี่ยวกับการต่อสู้ในเมืองหลวงอย่างคร่าวๆ ในท้ายที่สุด เพื่อที่จะทำลายตัวกลางของร่างจำแลง เขาจึงรวบรวมพลังของพ่อมดเต็มตัวหลายร้อยคนและจอมเวทผู้ยิ่งใหญ่ระดับหกวงแหวนอย่างแอนโธนี โดยทุกคนจะใช้เวทมนตร์สายฟ้าเพื่อชาร์จปืนใหญ่แม่เหล็กไฟฟ้าชนิดพิเศษ และเมื่อนั้นพวกเขาก็ได้ปลดปล่อยการโจมตีระดับตำนานออกมา","แน่นอนว่าหลังจากยิงปืนใหญ่นั้นออกไป ปืนใหญ่แม่เหล็กไฟฟ้าก็ได้รับความเสียหายจากการโอเวอร์โหลด และถูกส่งไปซ่อมแซมแล้ว...","“พวกเจ้านี่กล้าหาญกันจริงๆ!”","ออโรร่ากล่าวด้วยความประหลาดใจ","เมื่อนางได้ยินเกี่ยวกับแผนการสร้างอาณาจักรเวทมนตร์ครั้งแรก นางก็คิดว่ามันถูกสร้างขึ้นมาโดยผู้นำของสมาคมเวทมนตร์เร้นลับ","เพราะท้ายที่สุด จากดินแดนของจักรวรรดิ ซึ่งเป็นสถานที่ที่ศาสนจักรมีอำนาจมากที่สุด กลับถูกแบ่งแยกออกมาอย่างใช้กำลัง เรื่องใหญ่ขนาดนี้น่าตกใจจริงๆ!","และสิ่งที่สำคัญที่สุดก็คือ ลินน์และคนอื่นๆ สามารถทำมันได้จริงๆ!","โดย ผู้สร้างเวทมนตร์ วิกโตริโอ ก็มีความสนใจในอาวุธแม่เหล็กไฟฟ้าชนิดนี้เป็นอย่างมาก เพราะลินน์ก็เคยใช้มันครั้งหนึ่งเมื่อหนึ่งปีที่แล้วตอนที่เผชิญหน้ากับออกัสต์ และเขาก็ยังคงจำพลังของมันได้ดี","“โชคดีที่ทุกอย่างผ่านไปด้วยดี ไม่ใช่เหรอ?”","ลินน์กล่าวอย่างไม่ใส่ใจ","ตอนนี้เมื่อนึกถึงมัน การต่อสู้ในครั้งนั้นก็น่าตื่นเต้นมากจริงๆ แม้ว่าเขาจะใช้วิธีการที่ปลอดภัยที่สุด และสังหารโลซัคไปด้วยปรากฏการณ์ทางธรรมชาติและค่ายกลเล่นแร่แปรธาตุ แต่เขาก็ไม่ได้คาดคิดเลยว่าอีกฝ่ายจะมีความปรารถนาที่จะฝังจิตวิญญาณของตัวเองไว้กับผู้อื่น แม้กระทั่งได้รับความช่วยเหลือจากคำอธิษฐานของผู้ศรัทธาที่เคร่งศาสนาหลายหมื่นคน และอัญเชิญร่างจำแลงของเทพธิดาออกมาได้","จนกระทั่งในเวลาต่อมา เขาก็ได้รู้จากฮัตตาร์ว่า ตัวกลางของโลซัคในการอัญเชิญร่างจำแลงของพระเจ้า ก็คือวัตถุศักดิ์สิทธิ์ที่ถูกเก็บรักษาเอาไว้ในโบสถ์ เพื่อให้ผู้ศรัทธาเคารพบูชานั่นเอง","โชคดีที่เขาได้เตรียมปืนใหญ่แม่เหล็กไฟฟ้าเอาไว้เป็นไพ่ตายล่วงหน้า มิฉะนั้นเขาก็คงจะรับมือไม่ไหว","และตอนนี้ ความสนใจของศาสนจักรก็ถูกดึงดูดไปที่นั่นอย่างที่พวกเขาคาดหวังเอาไว้แล้ว...","“ในเมื่อเจ้าเคยเผชิญหน้ากับร่างจำแลงของนาง และยังเคยต่อสู้กับมันมาแล้ว เจ้าสามารถตัดสินระดับในปัจจุบันของนางคร่าวๆ ได้มั้ย?”","ออโรร่าถามอย่างเคร่งขรึม","นี่ถือเป็นตัวแปรที่ใหญ่ที่สุดในสงครามครั้งนี้ และยังเป็นสิ่งที่พวกเขากังวลมากที่สุดอีกด้วย","เพราะหลังจากชนะสงครามแห่งศรัทธา สิ่งที่เอลาทำนั้นบ้าคลั่งยิ่งกว่าพ่อมดพลังจิตวิญญาณทุกคนก่อนหน้านี้เสียอีก!","นางได้สร้างศาสนจักร ประกาศตนเป็นพระเจ้าที่แท้จริง และหล่อหลอมตำนานการสร้างโลกขึ้นมาในพระคัมภีร์ หลังจากหลายร้อยปีของการเลี้ยงดูให้เชื่อง นางก็ได้เปลี่ยนจักรวรรดิทั้งหมดให้กลายเป็นทุ่งหญ้าแห่งศรัทธา ซึ่งทำให้ไม่มีใครรู้เลยว่าพลังของนางเติบโตขึ้นไปถึงระดับไหนแล้ว...","ออโรร่าไม่สามารถเดาได้เลยว่าอีกฝ่ายได้หาวิธีกำจัดมลพิษทางจิตวิญญาณได้แล้วหรือยัง","สำหรับสิ่งที่เรียกว่าสวรรค์จุติของศาสนจักรนั้น ตามการคาดเดาของนาง มันก็น่าจะเป็นเวทมนตร์สร้างร่างจำแลงที่ทรงพลังมากกว่า ซึ่งจะใช้วัตถุศักดิ์สิทธิ์แห่งศรัทธาเป็นจุดยึดเหนี่ยว ทำให้เจตจำนงของใครบางคนสามารถจุติลงมาได้...","“มันพูดยาก...แต่ข้าคิดว่านางน่าจะได้รับผลกระทบไปไม่น้อยเลย”","ลินน์ครุ่นคิดอยู่นาน","เขาเคยเห็นร่างจำแลงของพระเจ้ามาสองครั้งแล้ว และเขาก็รู้สึกประทับใจในตัวนางมาก เพราะร่างอวตารเหล่านี้ล้วนแต่เผยให้เห็นถึงความศักดิ์สิทธิ์และความเมตตา","การที่จะบอกว่าอีกฝ่ายถูกกัดกร่อนด้วยศรัทธาไปจนหมดแล้วหรือไม่นั้น ลินน์ไม่กล้าที่จะตัดสินใจอย่างง่ายดาย แต่สิ่งที่แน่นอนก็คือ ร่างอวตารที่พวกเขาเผชิญหน้านั้นขาดความคล่องแคล่วที่ควรจะมีไปบ้าง ซึ่งนั่นก็เป็นเหตุผลสำคัญที่ทำให้ปืนใหญ่แม่เหล็กไฟฟ้าสามารถโจมตีโดนได้","โดยลินน์ก็กล่าวถึงรายละเอียดทั้งหมดเกี่ยวกับการอนุมานและการสังเกตของเขา","ซึ่งทำให้ประธานสภาหลายคนรู้สึกโล่งใจอย่างเห็นได้ชัด เพราะสิ่งที่พวกเขากังวลมากที่สุดก็คือ เอลาอาจจะค้นพบวิธีกำจัดมลพิษทางจิตวิญญาณได้แล้ว","แม้ว่าการสั่งสมมาหลายร้อยปีและผู้ศรัทธาหลายสิบล้านคนในจักรวรรดิ จะสามารถมอบพรทางเวทมนตร์ที่ไม่อาจจินตนาการได้ให้กับอีกฝ่าย แต่สิ่งที่สำคัญที่สุดสำหรับพ่อมด ก็คือการสั่งสมความรู้!","นี่คือแก่นแท้แห่งความแข็งแกร่งของพ่อมด!","นั่นทำให้ออโรร่าจินตนาการไม่ออกเลยว่า คู่ต่อสู้ที่มีชีวิตอยู่มาแปดหรือเก้าร้อยปี ซึ่งเก็บเกี่ยวจิตวิญญาณของผู้คนนับไม่ถ้วนและเปลี่ยนพวกมันให้กลายเป็นพลัง จะเป็นศัตรูที่น่าสะพรึงกลัวจนไม่มีใครอยากจะเผชิญหน้าด้วยได้ขนาดไหน!","ไม่ต้องพูดถึงการพึ่งพาพลังของสภาเลย ต่อให้ได้รับความช่วยเหลือจากสมาคมเวทมนตร์เร้นลับ พวกเขาก็อาจจะไม่สามารถเอาชนะสัตว์ประหลาดเช่นนี้ได้..."]},{"n":343,"t":"ฮัตตาร์ที่หวาดกลัว และขุนนางที่ก่อกบฏ","c":["“นี่เป็นข่าวดีที่สุดที่เราได้รับมาเลย!”","แฮร์รอฟกล่าวด้วยน้ำเสียงผ่อนคลาย หากระดับเวทมนตร์ของเอลา ยังอยู่ในระดับเดียวกับเมื่อหลายร้อยปีก่อน ความพยายามร่วมกันของพวกเขาก็เพียงพอแล้วที่จะเอาชนะนางได้","“อย่าประมาทไป แฮร์รอฟ!”","วิกโตริโอเตือน","“นอกจากความแข็งแกร่งของร่างต้นของเอลาแล้ว ลำพังแค่ศาสนจักรก็ไม่ใช่เรื่องง่ายที่จะจัดการ เพราะหลังจากหลายร้อยปีของการพัฒนา มันก็ได้กลายเป็นยักษ์ใหญ่ไปแล้ว”","อย่างน้อยในเบื้องหน้า พวกเขาก็ต้องเผชิญหน้ากับศัตรูระดับตำนานอย่างน้อยห้าคน...","ลินน์พยักหน้าเช่นกัน ร่างเงาของพระเจ้าก่อนหน้านี้ ได้แสดงพลังแห่งเวลาบางอย่างที่ดูเหมือนว่าจะสามารถบิดเบือนพื้นที่ และแม้กระทั่งทำให้มันช้าลงได้ ซึ่งนั่นทำให้เขากังวลเป็นอย่างมาก","นี่เป็นเพียงแค่ร่างอวตารเท่านั้น และเขาก็ไม่รู้เลยว่าร่างต้นของเอลา จะทรงพลังมากขนาดไหนเมื่อใช้ออกมา","การพูดคุยเรื่องสงครามกินเวลาไปตลอดช่วงเช้า และการตอบสนองของสภาก็รวดเร็วเป็นพิเศษ โดยการถ่ายทอดคำสั่งสงครามอย่างรวดเร็ว","เรือเหาะมากกว่าสองร้อยลำมารวมตัวกันจนเสร็จสิ้นในช่วงเย็น และมุ่งหน้าออกไปยังสถานที่ที่ห่างไกล...โดยมีเรือหุ้มเกราะทั้งสี่ลำที่จอดอยู่ที่ท่าเรือของอิเยตา ก็แล่นออกไปพร้อมกับเสียงหวูด ภายใต้ความสนใจของชาวเมือง","“สงครามกำลังจะเริ่มต้นขึ้น...”","แมรี่มองดูเรือเหาะและกองเรือหุ้มเกราะขนาดยักษ์ที่ปกคลุมไปทั่วท้องฟ้า และพึมพำกับตัวเอง โดยมีความกังวลเล็กน้อยอยู่ในใจ","สงครามเป็นคำที่ไม่คุ้นเคยสำหรับชาวเมืองอิเยตาที่สงบสุขมาอย่างยาวนาน แต่ในอดีต กะลาสีจากจักรวรรดิเซคัส ก็มักจะอธิบายให้พวกเขาฟังถึงฉากอันน่าสลดใจ ที่บรรดาลอร์ดโจมตีซึ่งกันและกัน ในโรงเตี๊ยม","โดยแมรี่ก็ทำได้เพียงแค่หวังอยู่เงียบๆ ในใจ ว่าพวกเขาจะสามารถเอาชนะสงครามครั้งนี้ได้","บนเรือเหาะและเรือหุ้มเกราะ มันกลับเป็นฉากที่แตกต่างออกไป เพราะทหารที่ถูกส่งไปยังอาณาจักรเพื่อปฏิบัติภารกิจ กำลังคุยโวว่า พวกเขาจะเอาชนะกระป๋องเหล็กที่สวมชุดเกราะเหล็กพุ่งเข้ามาได้อย่างง่ายดาย และไม่มีผู้เสียชีวิตเลยในการรบทั้งหมด","โดยมีทหารผู้โชคดีคนหนึ่งกลายเป็นลอร์ดที่มีดินแดนขนาดใหญ่ เพราะเขาสังหารเจ้าชายไปหนึ่งคน...หรือคนอื่นๆ ที่เหลือซึ่งสร้างผลงานอันยิ่งใหญ่ในสงครามเพื่อยึดครองเมืองหลวง ก็ได้รับรางวัลมากมายเช่นกัน","เฒ่ายอร์คก็ไม่มีข้อยกเว้น เนื่องจากความกล้าหาญของเขาในการต่อสู้ เขาได้ติดตามเรย์เดลและคนอื่นๆ เพื่อไปยึดประตูเมือง ยศของเขาได้รับการเลื่อนจากพลทหารธรรมดา ให้กลายเป็นหัวหน้าหน่วยที่สามารถนำทีมเล็กๆ ได้ แถมเขายังได้รับรางวัลเป็นเหรียญทองเวทมนตร์เต็มสิบเหรียญอีกด้วย","สำหรับเฒ่ายอร์ค ผู้ซึ่งเคยเป็นนายพรานเมื่อสองปีที่แล้ว เหรียญทองเวทมนตร์สิบเหรียญนั้นเป็นเงินจำนวนมหาศาลอย่างไม่ต้องสงสัย และไม่เคยเห็นว่าเหรียญทองหน้าตาเป็นอย่างไรมาก่อน แต่ตอนนี้เขาก็ได้เห็นมันแล้ว ซึ่งมีลวดลายที่สวยงามอย่างเหลือเชื่อ...","เหรียญทองเหล่านี้ สามารถนำไปแลกเป็นกองข้าวสาลีขนาดเท่าภูเขา ซึ่งช่วยให้เขามีอาหารกินไปได้เกือบตลอดชีวิต แต่ตอนนี้เฒ่ายอร์คไม่พอใจแค่การมีอาหารกินให้เพียงพออีกต่อไป เพราะตอนนี้เขาต้องการมากขึ้นไปอีก","นอกเหนือจากการกลายเป็นร้อยโทแล้ว เขายังต้องการซื้อรถยนต์สันดาปภายในเล่นแร่แปรธาตุที่สวยงาม และแม้กระทั่งส่งลูกๆ ของเขาไปโรงเรียนพลเรือนด้วย บางทีในอนาคตลูกๆ ของเขาอาจจะสามารถเข้าร่วมสถาบันวิจัยการแปรธาตุ และกลายมาเป็นผู้ช่วยของพ่อมดได้...","ทั้งหมดนี้ล้วนแต่เป็นสิ่งที่เฒ่ายอร์คไม่เคยกล้าคิดในอดีต แต่ตอนนี้มันกลับกลายเป็นบางสิ่งที่ดูเหมือนว่าจะอยู่ใกล้แค่เอื้อมแล้ว","นอกจากนี้ เมื่อเร็วๆ นี้อิเยตาก็เพิ่งจะเปิดโรงงานหลายแห่ง และผลิตอุปกรณ์แปลกใหม่มากมาย ซึ่งทำให้เฒ่ายอร์ครู้สึกตื่นเต้นมาก","อย่างเช่นสิ่งที่เรียกว่า หลอดไฟ โดยมันสามารถให้แสงสว่างในตอนกลางคืนได้สว่างไสวราวกับตอนกลางวัน ซึ่งมันใช้งานได้ง่ายกว่าเทียนมาก และตอนนี้มันได้กลายเป็นแฟชั่นใหม่ในเมืองอิเยตาไปแล้ว...","ทั้งหมดนี้จำเป็นต้องคว้ามาให้ได้ในสนามรบ โดยเขายังมีความมั่นใจอย่างมากในฝีมือการยิงปืนของเขา ซึ่งสามารถยิงโดนเป้าหมายภายในระยะ 70 เมตรได้อย่างแม่นยำ","“ครั้งนี้ข้าต้องระวังตัวให้ดี และจะต้องไม่ถูกไอ้พวกเวรนั่นแย่งผลงานไปอีก...”","เฒ่ายอร์คกำปืนคาบศิลากระบอกใหม่ในมือแน่น และพึมพำกับตัวเอง","เพราะตอนที่ทั้งเมืองค้นหาตัวองค์ชายใหญ่ก่อนหน้านี้ เฒ่ายอร์คก็โชคดีมากที่บังเอิญไปเจอเขา แต่เขากลับถูกแย่งผลงานไปโดยเด็กหนุ่มที่กำลังตื่นตระหนก ซึ่งมีฝีมือการยิงปืนที่แย่กว่าตัวเองมาก","ในวันต่อมา เวลาเที่ยงตรง ภายในเมืองหลวงของฮัดลาตา ในโถงใหญ่ของพระราชวัง ซึ่งขุนนางทั้งหมดของอาณาจักรมารวมตัวกันที่นี่ แต่พวกเขาแต่ละคนกลับเงียบงันราวกับหุ่นไม้","กษัตริย์องค์ใหม่ฮัตตาร์ กำลังโกรธเกรี้ยวและเอาแต่ตะโกนด่าทอ","“ไอ้พวกสารเลวพวกนี้...บัดซบเอ๊ย...”","ฮัตตาร์ได้รับข่าว การเข้ามาของกองทัพจักรวรรดิเมื่อสามวันก่อน ในตอนแรก เขาไม่ได้ให้ความสนใจกับมันมากนัก เพื่อที่จะรับมือกับสงครามในครั้งนี้ กองทัพของอาณาจักรก็ได้มารวมตัวกันแล้ว","อย่างไรก็ตาม การพัฒนาของสถานการณ์กลับเกินความคาดหมายของเขาไปมาก!","เพราะลอร์ดชายแดนในภาคตะวันตกของอาณาจักรต่างก็หันหลังให้เขากันไปทีละคน และพวกเขาก็ไม่มีความตั้งใจที่จะต่อต้านเลย ดังนั้น ภายในเวลาเพียงแค่สามวัน กองทัพจักรวรรดิก็ได้เข้าสู่พื้นที่ห่างไกลของอาณาจักร และเข้าควบคุมเมืองหลายแห่งได้อย่างรวดเร็ว","ไม่เพียงแค่นั้น ลอร์ดทางชายแดนตอนเหนือของอาณาจักรก็เตรียมพร้อมที่จะเคลื่อนไหวเช่นกัน และเอิร์ลชายแดนหลายคน ก็ถึงกับปฏิเสธการเรียกตัวของอาณาจักรอย่างหน้าไม่อาย","แล้วแบบนี้ จะไม่ให้ฮัตตาร์รู้สึกโกรธได้อย่างไร","ขุนนางที่เคยบอกว่าจงรักภักดีต่อเขา เปลี่ยนสีหน้าไปในชั่วพริบตา สิ่งนี้ยังนำไปสู่ความจริงที่ว่า จากกองทหาร 50,000 นายที่คาดว่าจะมารวมตัวกันเพื่อต่อสู้กับจักรวรรดิ ในท้ายที่สุด พวกเขาก็แทบจะรวบรวมคนมาได้เพียงประมาณ 30,000 คนเท่านั้น","และส่วนใหญ่ก็ยังเป็นทหารเกณฑ์ที่เป็นทาสติดที่ดิน ซึ่งถูกเกณฑ์มาเพียงชั่วคราวและขาดการฝึกฝน","ท่ามกลางเสียงคำรามอย่างบ้าคลั่งของฮัตตาร์ ขุนนางที่จงรักภักดีต่อกษัตริย์อย่างการ์ด ต่างก็แสดงสีหน้าเป็นกังวล แต่หลายคนกลับกำลังดูเรื่องตลกอยู่","โดยพวกเขานั้นเยาะเย้ยสิ่งที่เรียกว่า สงครามประกาศอิสรภาพ เพราะเมื่อกองทัพของศาสนจักรมาถึง การต่อต้านทั้งหมดก็จะไร้ประโยชน์!","และเป็นเพราะฮัตตาร์กักบริเวณพวกเขาไว้ในเมืองหลวงเท่านั้น พวกเขาจึงต้องยอมเชื่อฟังคำสั่ง","ในวินาทีต่อมา ประตูห้องโถงใหญ่ที่ปิดอยู่ก็ถูกเปิดออก และในขณะเดียวกัน ก็มีน้ำเสียงที่คุ้นเคยและน่าหวาดกลัวสำหรับทุกคนที่อยู่ในเหตุการณ์ดังขึ้น","“โปรดวางใจเถิด ฝ่าบาทฮัตตาร์ พวกเขาก็เป็นเพียงลอร์ดบางคน ที่ไม่สามารถมองเห็นสถานการณ์ได้อย่างชัดเจนก็เท่านั้น ตราบใดที่พระองค์เอาชนะกองทหารของศาสนจักรได้ พระองค์ก็จะสามารถกวาดล้างพวกมันในภายหลังได้”","“ท่านลินน์ ท่านแอนโธนี ในที่สุดพวกท่านก็มาถึง”","ฮัตตาร์มองไปที่ประตูและกล่าวด้วยความประหลาดใจ","ในโถงใหญ่ ขุนนางที่มีความคิดเป็นของตัวเองต่างก็สั่นสะท้าน หลังจากที่เห็นร่างของลินน์ ซึ่งรีบเก็บงำความคิดเล็กๆ น้อยๆ ของพวกเขาเอาไว้ทันที","เพราะเดือนที่ผ่านมา พวกเขานั้นได้เป็นพยานด้วยตาตนเอง ว่าอีกฝ่ายยกมือขึ้นเพื่อกระตุ้นปรากฏการณ์บนท้องฟ้า และกวาดล้างองครักษ์ไปหลายพันคนในการโจมตีเพียงครั้งเดียวได้อย่างไร พร้อมกับสังหารพระเจ้า...ที่จุติลงมาในรูปแบบของร่างอวตาร ภายใต้สายตาของชาวเมืองหลายหมื่นคนในเมืองหลวง","พ่อมดที่ดูเหมือนว่าจะยังเด็กอยู่ตรงหน้าพวกเขา ได้กลายเป็นพ่อมดที่ทรงพลังและน่าสะพรึงกลัวที่สุดในใจของพวกเขาไปแล้ว"]},{"n":344,"t":"ขบวนทหารที่ทำให้ทั้งอาณาจักรต้องตกตะลึง","c":["“ฝ่าบาทฮัตตาร์ โปรดยกโทษให้พวกเราด้วยที่มาสาย”","ลินน์พยักหน้าเล็กน้อย และให้เกียรติกษัตริย์องค์ใหม่อย่างเพียงพอ","โดยฮัตตาร์ที่เป็นเหมือนกับนักเดินทางที่คว้าฟางช่วยชีวิตเอาไว้ในความสิ้นหวัง จึงรีบพูดขึ้นมา","“ท่านลินน์ ในเมื่อตอนนี้กองทัพของศาสนจักรได้เข้าสู่อาณาจักรแล้ว พวกเราก็จะต้องรวบรวมกองกำลัง เพื่อขับไล่พวกมันออกไปจากพรมแดนให้เร็วที่สุด!”","“โปรดอยู่ในความสงบเถิดฝ่าบาท”","ลินน์ปลอบโยนฮัตตาร์ที่กำลังร้อนรนอย่างใจเย็น","เขาต้องบอกเลยว่า เมื่อเทียบกับผู้เป็นพ่ออย่างกษัตริย์บาเซลแล้ว การบ่มเพาะตนเองและความอดทนขององค์ชายรองนั้นแย่กว่ามาก...ส่วนขุนนางที่แปรพักตร์ในทิศตะวันตกของอาณาจักร ลินน์ก็ไม่ได้รู้สึกแปลกใจเลยแม้แต่น้อย","เพราะท้ายที่สุด อำนาจของศาสนจักรก็แทรกซึมอยู่ในอาณาจักรมาอย่างยาวนาน และพวกเขาก็เพิ่งจะยึดครองเมืองหลวงได้ ซึ่งนั่นยังไม่เพียงพอที่จะโน้มน้าวใจสาธารณชน การที่เกิดสถานการณ์เช่นนี้ขึ้น มันก็เป็นสิ่งที่เขาคาดการณ์เอาไว้แล้ว","ลินน์มองไปรอบๆ ขุนนางที่มีความคิดแตกต่างกันในสนาม และพูดช้าๆ","“กองหนุนจากดินแดนพ่อมดน่าจะมาถึงแล้ว หากพวกท่านสนใจ พวกท่านก็อาจจะลองออกไปดูด้วยกันก็ได้!”","“ถ้าอย่างนั้น ข้าก็อยากจะเห็นมันซะแล้วสิ!”","มาร์ควิสมอร์แทนกล่าวอย่างเยาะเย้ย","เมื่อไม่กี่ปีที่ผ่านมา เขามีโอกาสได้เห็นกองกำลังทัณฑ์ศักดิ์สิทธิ์ ที่เดินทางกลับมาจากการทำสงครามครูเสดเพื่อต่อต้านปีศาจประหลาดในเมืองศักดิ์สิทธิ์ ซึ่งสามารถอธิบายได้แค่ว่าไร้เทียมทาน!","โดยว่ากันว่า สมาชิกของกองกำลังทัณฑ์ศักดิ์สิทธิ์ ล้วนแต่ถูกคัดเลือกมาจากผู้ที่ยอดเยี่ยมที่สุดของกองทัพ หรือนักล่าแม่มด และพวกเขาทั้งหมดก็ยังเป็นอัศวินที่ได้รับพรจากพระเจ้า มันไม่ใช่เรื่องเกินจริงเลยที่จะบอกว่า คนเพียงแค่สามหรือสี่พันคน จะสามารถกวาดล้างได้ทั้งอาณาจักร!","นอกจากอัศวินกริฟฟอน และนักบวชที่ล้ำค่าเหล่านั้นแล้ว จะมีกองทัพประเภทไหนที่สามารถแข่งขันกับศาสนจักรได้อีก?","นำโดยลินน์ กษัตริย์ฮัตตาร์และกลุ่มขุนนางได้เดินออกไปจากโถงใหญ่ของพระราชวัง","ทันทีที่เขาออกไป มอร์แทนก็สังเกตเห็นแล้วว่ามีบางอย่างผิดปกติ เพราะข้างนอกนั้นไม่มีแสงแดดอันอบอุ่นสาดส่องลงมา แต่กลับกลายเป็นความมืดมิดแทน","“มันเริ่มมืดแล้ว แต่มันยังไม่ถึงเวลาคืนไม่ใช่เหรอ?”","การ์ด ซึ่งได้รับการเลื่อนยศให้เป็นอัครมหาเสนาบดี กล่าวด้วยความงง ในขณะที่ขุนนางข้างๆ เขา มองขึ้นไปบนท้องฟ้าด้วยความหวาดกลัว","“ดูบนท้องฟ้านั่นสิ!”","ทุกคนที่อยู่ในเหตุการณ์ต่างก็เงยหน้าขึ้นมองทีละคน และจากนั้นก็เห็นฉากที่น่าตกตะลึงเป็นอย่างยิ่ง","เรือเหาะหลายร้อยลำกำลังลอยอยู่ที่ความสูง 100 เมตร โดยแต่ละลำนั้นมีขนาดใหญ่เท่ากับบ้าน และพวกมันก็ปกคลุมท้องฟ้าเอาไว้ด้วยกัน ซึ่งเงาของพวกมันก็ได้ทอดยาวไปทั่วทั้งพระราชวัง สร้างฉากแปลกประหลาดที่ดูเหมือนว่าจะใกล้เข้าสู่ช่วงกลางคืนแล้ว ทั้งๆ ที่ตอนนี้ยังเป็นเวลาเที่ยงวัน...","แม้ว่าลินน์จะเคยใช้เรือเหาะในสงครามเพื่อทำลายกองกำลังชั้นยอดของอาณาจักร แต่ก็ถือเป็นครั้งแรกที่สิ่งนี้ได้ปรากฏขึ้นต่อหน้าทุกคนจริงๆ","และความตกใจที่เกิดจากวัตถุบินได้ขนาดยักษ์นี้ ก็เห็นได้อย่างชัดเจน แม้แต่มอร์แทนที่เคยเยาะเย้ยก่อนหน้านี้ ในตอนนี้ก็ยังต้องพูดไม่ออกด้วยความตกใจ","“ไปกันเถอะ พวกเขาจะลงจอดที่จัตุรัส!”","เสียงตะโกนของลินน์ปลุกขุนนางที่กำลังตกตะลึงให้ตื่นขึ้นจากความฝัน","ในตอนที่พวกเขามาถึงจัตุรัส เรือเหาะเหล่านี้ก็ได้จอดอย่างเป็นระเบียบเรียบร้อย บนจัตุรัสขนาดยักษ์แล้ว","โดยมีกองทัพจากดินแดนพ่อมดลึกลับ ซึ่งแตกต่างจากสิ่งที่พวกเขาเคยรู้จักมาอย่างสิ้นเชิง โดยองค์ประกอบของกองทัพนี้น่าแปลกประหลาดมาก เพราะไม่มีใครถือดาบ หอก หรือหน้าไม้เลย...","แถวของทหารที่สวมเครื่องแบบทางการ เดินลงมาจากเรือเหาะภายใต้สายตาของทุกคน โดยมีดาบปลายปืนอันแวววาวของพวกเขาส่องประกายเจิดจ้าภายใต้แสงแดดที่แผดเผา","มอร์แทนและคนอื่นๆ ขมวดคิ้ว เพราะพวกเขานั้นได้รวบรวมข้อมูลมากมายมาตั้งแต่การต่อสู้ในเมืองหลวงเมื่อกว่าหนึ่งเดือนก่อน ดังนั้น โดยธรรมชาติแล้ว พวกเขาก็สามารถรับรู้ได้ว่าสิ่งที่คนเหล่านี้ถืออยู่นั้นคืออาวุธที่เรียกว่าปืนคาบศิลา ซึ่งเป็นอาวุธที่แปลกใหม่ และมันทรงพลังพอที่จะเจาะทะลุชุดเกราะเหล็กได้จากระยะห่างร้อยก้าว โดยมีเสียงราวกับฟ้าร้องเมื่อถูกยิงออกไป...","ก่อนหน้านี้ มอร์แทนมักจะคิดอยู่เสมอว่า ทหารปืนคาบศิลา 3,000 นายที่ยึดเมืองหลวงได้นั้น เป็นขีดจำกัดที่ผู้ศรัทธาปีศาจเหล่านี้จะสามารถหามาได้แล้ว เพราะท้ายที่สุด อุปกรณ์เล่นแร่แปรธาตุประเภทนี้น่าจะสร้างได้ยากมาก และไม่น่าเพียงพอที่จะติดตั้งให้กับกองทัพที่มีคนนับหมื่นคนได้!","แต่สิ่งที่ดึงดูดความสนใจของเขามากยิ่งกว่า ก็คือก้อนเหล็กหน้าตาประหลาดที่ถูกนำลงมาจากเรือเหาะ...","ของที่หนักขนาดนี้ สามารถเคลื่อนที่ไปข้างหน้าได้อย่างอิสระ โดยไม่ต้องใช้ม้าหรืออูฐมาลากจูง มอร์แทนไม่สามารถคิดออกได้เลยว่าพลังของสิ่งนี้มาจากไหน ซึ่งทำได้เพียงเดาว่ามันเป็นเวทมนตร์อันชั่วร้ายของพ่อมดเหล่านั้น","สำหรับการต่อสู้ในช่วงแรกกับศาสนจักรนี้ ทั้งลินน์และสภาต่างก็ให้ความสนใจอย่างเต็มที่ โดยที่พวกเขาต้องชนะเท่านั้นและจะแพ้ไม่ได้ มิฉะนั้นความพยายามทั้งหมดก่อนหน้านี้ก็จะสูญเปล่า","นั่นจึงทำให้ลินน์นำทุกสิ่งที่เขาสามารถนำมาได้ มาด้วย!","ปืนใหญ่ รถหุ้มเกราะเล่นแร่แปรธาตุ ปืนใหญ่แม่เหล็กไฟฟ้า และเรือหุ้มเกราะที่แล่นอยู่บนทะเลเหล่านั้น...","อย่างไรก็ตาม เนื่องจากข้อจำกัดในการบรรทุกของเรือเหาะ นี่จึงเป็นเพียงกองทหารสนับสนุนระลอกแรกเท่านั้น ซึ่งมีจำนวนทั้งสิ้นประมาณ 12,000 คน","แต่ถึงกระนั้น ขบวนทหารขนาดเล็กเช่นนี้ ก็สร้างความตกตะลึงให้กับมอร์แทนและคนอื่นๆ ได้มากพอแล้ว!","“ท่านลินน์ ข้าไม่รู้เลยว่ากล่องเหล็กประหลาดเหล่านี้มีไว้ทำอะไร?”","กษัตริย์ฮัตตาร์ถามด้วยความอยากรู้อยากเห็น","สิ่งที่เขาสามารถคิดออกได้ก็มีเพียงแค่การให้กล่องเหล็กเหล่านี้ พุ่งชนเข้าไปในสนามรบ แต่เขารู้ว่ามันคงจะไม่ง่ายอย่างนั้น","“ท่านจะรู้ในอีกไม่กี่วัน”","ลินน์ยิ้ม แต่ไม่ได้ตั้งใจจะเปิดเผย","ขุนนางผู้ยิ่งใหญ่ของอาณาจักรเหล่านี้ ถูกพวกเขาบีบบังคับกึ่งหนึ่ง และถูกกักขังเอาไว้ในเมืองหลวง และฮัตตาร์ก็สามารถควบคุมส่วนใหญ่ของอาณาจักรได้ในระยะเวลาอันสั้น แต่ใครจะรู้ว่าจะมีใครสามารถหลบเลี่ยงการสอดแนมของพวกเขา และแอบรายงานข้อมูลเกี่ยวกับพวกเขาให้กับศาสนจักรเป็นการส่วนตัวได้หรือไม่","เหตุผลที่ขบวนทหารแบบนี้ถูกจัดขึ้นอย่างเปิดเผย ก็เพื่อรักษาสถานการณ์ให้มีเสถียรภาพ โดยไม่ให้บางคนเกิดความระแวดระวังและก่อให้เกิดความโกลาหลภายในอาณาจักร ซึ่งจะทำให้เกิดความยากลำบากทั้งภายในและภายนอก ดังนั้น อาวุธรุ่นใหม่เหล่านั้นจึงไม่สามารถเปิดเผยข้อมูลออกไปได้อย่างง่ายดาย...","ตอนนี้ดูเหมือนว่าผลลัพธ์น่าจะออกมาไม่เลว...สายตาของลินน์กวาดไปทั่วใบหน้าที่หวาดกลัวของขุนนาง จากนั้นก็มองไปที่ผู้ชมที่อยู่ไกลออกไป","การจงใจปกปิดของลินน์ ทำให้ฮัตตาร์ซึ่งเป็นกษัตริย์รู้สึกไม่พอใจเล็กน้อย แต่เขาก็ตระหนักดีว่าอาณาจักรฮัดลาตา จำเป็นต้องพึ่งพาพ่อมดเหล่านี้ในการต่อสู้กับศาสนจักร ดังนั้น เขาจึงทำได้เพียงสะกดกลั้นความไม่พอใจเล็กๆ น้อยๆ ในใจของเขาลงไป","หลังจากขบวนทหารสั้นๆ จบลง ลินน์ก็ได้ส่งมอบพิมพ์เขียวของเครื่องส่งสัญญาณเลเซอร์ที่เขาเตรียมไว้เมื่อนานมาแล้วให้กับแอนโธนี เพื่อให้ปรมาจารย์แห่งแม่เหล็กไฟฟ้าสามารถดำเนินการวิจัยได้ และเป็นการดีที่สุดที่จะผลิตมันขึ้นมาให้เร็วที่สุด เพื่อให้ทันกับสงครามครั้งต่อไป","สำหรับลินน์นั้น เขาได้กลับไปที่คฤหาสน์ที่ฮัตตาร์จัดเตรียมไว้ให้ เพื่อเตรียมพร้อมสำหรับการพัฒนาเวทมนตร์ไฟบทใหม่","ในครั้งนี้เขาไม่ได้ปรากฏตัวในอาณาจักรฮัดลาตา ในรูปแบบของร่างจำลองทางเวทมนตร์ แต่เขามาด้วยตัวเองจริงๆ","เพื่อสนับสนุนสงครามครั้งนี้ สภาได้ส่งพ่อมดหลายพันคนไปยังเมืองหลวง และยังมีจอมเวทผู้ยิ่งใหญ่อีกหลายคน แม้กระทั่งประธานสภาก็ยังต้องลงมือเมื่อจำเป็น และสมาคมเวทมนตร์เร้นลับย่อมไม่มีข้อยกเว้น"]},{"n":345,"t":"เปลวไฟแห่งนรกที่ไม่มีวันดับอย่างแท้จริง คลอรีนไตรฟลูออไรด์!","c":["ลินน์เข้าไปในส่วนลึกของคฤหาสน์เพียงลำพัง และหลังจากสั่งเอล็อคและคนอื่นๆ รวมถึงคนรับใช้และทหารยามในคฤหาสน์ไม่ให้รบกวนเขา เขาก็พูดขึ้นมาเงียบๆ ในใจ","‘071 แสดงสถานะปัจจุบันของฉันที’","[เป้าหมาย: ลินน์","สถานะทางกายภาพ: สูง","ระดับพลังเวท: 485","ระดับพลังจิตวิญญาณ: จอมเวทผู้ยิ่งใหญ่ (สี่วงแหวน)","ช่องเก็บเวท: [ฟอสฟอรัสขาว สัมผัสเพลิง], [ไนโตรเจนเหลว อาณาเขตน้ำแข็ง], [โล่จอมเวท], [บาเรียเวทมนตร์], [สนามพลังเบี่ยงเบนแบบย่อย]...","สี่วงแหวน: [สั่นสะเทือนมิติ], [พายุทรายเหล็ก], [ปืนใหญ่แม่เหล็กไฟฟ้า (ความเร็วเสียง 3 เท่า)], [สนามพลังเบี่ยงเบน], [จำลองร่างขั้นสูง], [อาณาเขตสุญญากาศ], [อาณาเขตแห่งความเชื่องช้า]","ผู้ใช้เครือข่ายเวทมนตร์: 43 คน]","หลังจากเลื่อนขั้นขึ้นเป็นจอมเวทผู้ยิ่งใหญ่ ลินน์ก็พบว่าพลังเวทมนตร์ของเขาเพิ่มขึ้นเป็นประมาณห้าเท่าของระดับเดิม และพลังในการคำนวณของเขาก็เพิ่มขึ้นในเวลาเดียวกัน แถมการควบคุมองค์ประกอบของเขาก็ได้รับการปรับปรุงให้ดีขึ้นไปอีกระดับด้วย","เพียงแต่ว่าเมื่อเทียบกับจอมเวทผู้ยิ่งใหญ่คนอื่นๆ แล้ว เขายังมีเวทมนตร์ระดับสี่วงแหวนไม่มากนัก โดยมีเวทมนตร์รวมทั้งหมดเพียงแค่เจ็ดชนิดเท่านั้น","ในหมู่พวกมัน เวทมนตร์สุญญากาศและเวทมนตร์แห่งความเชื่องช้า สามารถถือได้ว่าเป็นการใช้อาณาเขตของตัวเองในรูปแบบหนึ่ง ซึ่งเป็นวิธีการของจอมเวทผู้ยิ่งใหญ่","สำหรับเวทมนตร์ประเภทอื่นๆ อย่างการใช้มานาในการสั่นสะเทือนมิตินั้นก็สูงเป็นมาก ซึ่งสามารถถือได้ว่าเป็นเวทมนตร์เจาะเกราะระยะกลางที่สั้น และมีพลังทำลายล้างสูง","ส่วนปืนใหญ่แม่เหล็กไฟฟ้า ที่ถูกใช้โดยลินน์เพื่อชดเชยข้อบกพร่องในการต่อสู้ระยะไกล มันก็ทรงพลังและรวดเร็ว และใช้เวลาเตรียมการเพียงแค่หนึ่งหรือสองวินาทีเท่านั้น","แต่ในการต่อสู้ระดับจอมเวทผู้ยิ่งใหญ่ เขายังคงขาดเวทมนตร์พื้นที่ขนาดใหญ่ ที่สามารถปลดปล่อยออกมาได้อย่างรวดเร็ว และใช้เพื่อปราบปรามคู่ต่อสู้","แม้เวทมนตร์ระดับสี่วงแหวนอย่าง พายุทรายเหล็ก จะถือว่าดีมาก และมันก็ทรงพลังมากเมื่อได้รับการเสริมพลังจากเวทมนตร์สายฟ้า แต่มันก็เห็นได้ชัดว่ายังไม่สามารถทำให้ลินน์พอใจได้","ต้องรู้ก่อนว่าก่อนที่เขาจะกลายมาเป็นจอมเวทผู้ยิ่งใหญ่ ตำแหน่งนี้ก็มักจะถูกครอบครองโดยไฟฟอสฟอรัสขาวอยู่เสมอ","โดยเฉพาะพ่อมดเต็มตัวและบิชอปที่ไม่สามารถสร้างอาณาเขตสุญญากาศได้ ไฟฟอสฟอรัสขาวก็สามารถอธิบายได้เพียงแค่ว่า เป็นฝันร้าย และสิ่งที่ลินน์ตั้งใจจะเตรียมในครั้งนี้ ก็คือสิ่งที่จะสามารถนำมาแทนที่ฟอสฟอรัสขาวได้!","สารประกอบที่แม้แต่กองทัพสุดอื้อฉาวยังมองว่ามันอันตรายเกินกว่าจะนำมาใช้งาน และเหล่าผู้ก่อการร้ายที่เหี้ยมโหดที่สุดยังต้องหวาดผวา มันมีชื่อเรียกว่า...คลอรีนไตรฟลูออไรด์!","หากจะมีสิ่งใดที่สามารถเรียกว่าเพลิงนรกได้ และฟอสฟอรัสขาวทำได้เพียงแค่เฉียดใกล้คำนั้นแล้วล่ะก็...คลอรีนไตรฟลูออไรด์ก็คือสิ่งที่สมควรได้รับฉายานี้อย่างแท้จริง!","สารประกอบอนินทรีย์ที่มีพิษและมีฤทธิ์กัดกร่อนสูงชนิดนี้ มีจุดเดือดอยู่ที่ 11.3 องศาเซลเซียส และจุดหลอมเหลวอยู่ที่ -76.3 องศาเซลเซียส ซึ่งเป็นก๊าซไม่มีสีที่อุณหภูมิห้อง และจะกลายเป็นของเหลวสีเขียวเมื่อถูกทำให้เย็นลง โดยประโยชน์หลักๆ ของมันคือ การนำไปใช้เป็นเชื้อเพลิงขับเคลื่อนจรวด รวมถึงใช้ในกระบวนการผลิตและบำบัดเชื้อเพลิงนิวเคลียร์","ตัวมันเองนั้นไม่ไวไฟ แต่มันจะทำปฏิกิริยากับสารต่างๆ อย่างรุนแรง...","ในแง่หนึ่ง คลอรีนไตรฟลูออไรด์ก็ถือเป็นเวอร์ชันอัปเกรดของฟอสฟอรัสขาว ซึ่งมีคุณลักษณะของฟอสฟอรัสขาวอยู่มากมาย และมันก็ยังทรงพลังและน่าสะพรึงกลัวยิ่งกว่า!","อย่างน้อยไฟฟอสฟอรัสขาวก็สามารถถูกระงับได้ด้วยน้ำ ไม่สามารถลุกไหม้ได้ในอุณหภูมิต่ำ ไม่ลุกไหม้ขึ้นมาอีกครั้งจนกว่าอุณหภูมิจะสูงขึ้น และมันก็ยังจะถูกฝังด้วยทรายและสารที่ไม่ติดไฟอื่นๆ ได้ด้วย...","เพียงแต่วิธีการเหล่านี้ที่เคยถูกใช้เพื่อรับมือกับเปลวไฟฟอสฟอรัสขาว กลับไร้ประโยชน์เมื่ออยู่ต่อหน้าคลอรีนไตรฟลูออไรด์ เพราะสิ่งนี้สามารถเผาไหม้ได้แม้กระทั่งโลหะ คอนกรีตแข็ง และทราย!","นั่นก็คือ มันจะเผาไหม้จริงๆ ไม่ใช่การกัดกร่อนอย่างช้าๆ เหมือนฟอสฟอรัสขาว...","เมื่อคลอรีนไตรฟลูออไรด์สัมผัสกับน้ำ มันก็จะทำให้เกิดการระเบิดที่มีอุณหภูมิสูงเป็นพิเศษในทันที!","มันสามารถอธิบายได้เพียงแค่ว่าไร้เหตุผล!","เนื่องจากทั้งฟลูออรีนและคลอรีนต่างก็เป็นธาตุที่มีค่าอิเล็กโทรเนกาติวิตี (ความสามารถดึงดูดอิเล็กตรอน) สูงลิ่ว เมื่อพวกมันมารวมตัวกัน พวกมันจึงช่วงชิงอิเล็กตรอนจากสิ่งรอบข้างอย่างบ้าคลั่ง!","และพวกเราก็รู้กันดีว่า สสารทุกอย่างล้วนประกอบด้วยนิวเคลียสและอิเล็กตรอน ดังนั้นในทางทฤษฎีแล้ว ไม่ว่าจะเป็นวัสดุแบบไหน มันก็สามารถกลายเป็นสารอาหารให้กับคลอรีนไตรฟลูออไรด์ได้ทั้งนั้น","นี่คือเปลวไฟอมตะและเป็นไฟแห่งนรกที่แท้จริง...","เมื่อสิ่งนี้เกิดการลุกไหม้ขึ้นในห้องปฏิบัติการ ความหวังเดียวก็คือการวิ่งทวนลมไปทันทีที่พบเห็นมัน เพราะบนโลกนี้ยังไม่มีวิธีที่จะดับมันได้เลย!","เหตุผลที่ก่อนหน้านี้ลินน์ไม่นำสิ่งนี้ออกมา ก็เป็นเพราะคลอรีนไตรฟลูออไรด์นั้นไม่เสถียรเป็นอย่างยิ่ง และมันก็เป็นไปได้อย่างมากที่จะเผาตัวเขาเองจนควบคุมไม่ได้","นี่เป็นเหตุผลว่าทำไมคลอรีนไตรฟลูออไรด์ถึงได้มีประสิทธิภาพมาก แต่มันกลับไม่ได้ถูกสร้างเป็นอาวุธเพื่อครอบงำสนามรบ และในประวัติศาสตร์ก็มีคนจำนวนมากที่พยายามจะทำ แต่ก็ไม่ต้องสงสัยเลยว่าพวกเขาทั้งหมดต้องทนทุกข์ทรมานอย่างมากในขั้นตอนการขนส่ง...เพราะต่อให้สิ่งนี้จะถูกเก็บไว้ในภาชนะโลหะที่ได้รับการดูแลเป็นพิเศษ แต่มันก็ไม่ปลอดภัย 100%!","แต่ตอนนี้ เนื่องจากลินน์ได้รับการเลื่อนขั้นขึ้นเป็นจอมเวทผู้ยิ่งใหญ่แล้ว การควบคุมพลังเวทมนตร์และองค์ประกอบของเขาจึงได้รับการปรับปรุงให้ดีขึ้นเป็นอย่างมาก ดังนั้น เขาจึงกล้าที่จะพยายามควบคุมสารประกอบที่อันตรายอย่างยิ่งยวดนี้","ลินน์เรียกค้นข้อมูลทั้งหมดเกี่ยวกับคลอรีนไตรฟลูออไรด์ออกมาจากในสมองของเขา และสามารถดูสูตรทางเคมีสำหรับการเตรียมมันได้จากชื่อ","CI₂ + 3F₂ = 2CIF₃!","หลังจากตรวจสอบบันทึกสีแดงอย่างระมัดระวังหลายครั้ง ลินน์ก็หลับตาลงและเริ่มสังเคราะห์องค์ประกอบที่ซับซ้อน","พลังเวทในบริเวณโดยรอบพุ่งพล่านอย่างรวดเร็ว โดยสร้างพื้นที่สุญญากาศขึ้นมาเพื่อป้องกันไม่ให้คลอรีนไตรฟลูออไรด์หลุดการควบคุม ซึ่งอาจเป็นวิธีเดียวที่จะควบคุมมันได้...เพื่อหลีกเลี่ยงการสัมผัสของคลอรีนไตรฟลูออไรด์กับสารอื่นๆ!","แน่นอนว่า ไม่จำเป็นต้องใช้ออกซิเจนเพื่อจุดไฟสิ่งนี้ และมันก็สามารถลุกไหม้ได้แม้ว่ามันจะสัมผัสกับวัตถุในสภาพสุญญากาศก็ตาม เพราะโดยพื้นฐานแล้วมันคือการช่วงชิงอิเล็กตรอน...","ในอาณาเขตสุญญากาศที่ถูกแบ่งออก ลินน์ก็ได้เปิดขวดโหลทั้งสองใบ ซึ่งภายในมีองค์ประกอบของฟลูออรีนและคลอรีนถูกเก็บเอาไว้อยู่","พวกมันทั้งสองลอยออกมาอย่างรวดเร็ว และแขวนลอยอยู่ในอาณาเขตภายใต้การควบคุมของพลังจิตวิญญาณ","ลินน์ระมัดระวังเป็นอย่างมาก เขาบังคับเหนี่ยวรั้งองค์ประกอบทั้งหมดเอาไว้ในพื้นที่ขนาดเท่าฝ่ามือ เพื่อให้พวกมันสัมผัสและพุ่งชนกันเอง","ด้วยพลังของจอมเวทผู้ยิ่งใหญ่ มันยังห่างไกลจากความสามารถในการควบคุมองค์ประกอบบางอย่างได้อย่างแม่นยำ อย่างเช่นการทำให้พวกมันหยุดนิ่งไปโดยสมบูรณ์ หรือการร่ายเวทมนตร์ที่คล้ายคลึงกับการหยุดเวลาในระยะใดระยะหนึ่ง","พ่อมดทำได้เพียงชี้นำทิศทางขององค์ประกอบผ่านทางพลังจิตวิญญาณ เช่น การเคลื่อนที่ไปทางซ้ายและขวา หรือการใช้เวทมนตร์เพื่อบังคับให้พวกมันช้าลงให้มากที่สุด โดยรักษาให้อยู่ในสภาวะเกียจคร้าน","ไม่ว่าจะเป็นการบังคับสร้างอาณาเขตสุญญากาศ หรือการควบคุมองค์ประกอบให้มาสัมผัสและพุ่งชนกันตามอัตราส่วนที่กำหนด การใช้พลังเวทมนตร์และพลังจิตวิญญาณก็ไม่ใช่จำนวนน้อยๆ เลย","หากลินน์ยังคงเป็นพ่อมดระดับสามวงแหวน เขาคงจะต้องเผชิญหน้ากับสถานการณ์ที่น่าอึดอัด ซึ่งพลังจิตวิญญาณจะเหือดแห้งไปในเวลาเพียงแค่ไม่กี่วินาที แต่โชคดี ที่ตอนนี้การเลื่อนขั้นสำเร็จลงแล้ว และระดับการใช้พลังงานเช่นนี้ก็ยังอยู่ในขอบเขตที่ยอมรับได้","ถึงอย่างนั้น ลินน์ก็ยังคงต้องดิ้นรนไปตลอดทั้งบ่าย และหลังจากพยายามอยู่หลายครั้ง ในที่สุดเขาก็สามารถสังเคราะห์สิ่งที่ต้องการได้สำเร็จ","สารประหลาดชนิดหนึ่งปรากฏขึ้นบนฝ่ามือของลินน์ โดยอะตอมทั้งสี่ที่อยู่ภายในนั้นยึดเกาะกันอย่างแน่นหนา ก่อตัวขึ้นเป็นโครงสร้างรูปตัวที (T) ซึ่งประกอบไปด้วยพันธะสั้นหนึ่งเส้นและพันธะยาวสองเส้น...","นี่คือคลอรีนไตรฟลูออไรด์ ซึ่งเป็นที่รู้จักกันในนามของหนึ่งในสารประกอบที่อันตรายที่สุด!"]},{"n":346,"t":"ลินน์พ่ายแพ้?","c":["ในเวลานี้ สารประกอบที่อันตรายและน่าสะพรึงกลัวได้แขวนลอยอยู่บนฝ่ามือของเขา","รอยยิ้มปรากฏขึ้นบนใบหน้าที่ดูเหนื่อยล้าเล็กน้อยของลินน์ และจากนั้นเขาก็ร่าย เวทแยกแยะวัสดุขั้นสูง!","พลังเวทเปรียบเสมือนฉลามที่ได้กลิ่นเลือด ภายใต้การควบคุมของพลังจิตวิญญาณ มันได้พุ่งขึ้นมาอย่างบ้าคลั่งและห่อหุ้มคลอรีนไตรฟลูออไรด์เอาไว้","“มันไม่เกิดปฏิกิริยา...”","ลินน์พึมพำอย่างลับๆ","แต่มันก็เป็นเรื่องปกติเมื่อลองคิดดู เพราะพลังเวทนั้นไม่มีอิเล็กตรอน ดังนั้น แน่นอนว่ามันจะไม่มีปรากฏการณ์การถูกช่วงชิงเกิดขึ้น","ในขณะที่กำลังคิดเกี่ยวกับเรื่องนี้ พลังเวทก็ได้หลั่งไหลเข้าสู่คลอรีนไตรฟลูออไรด์ โดยประทับโครงสร้างและคุณลักษณะของมันลงไป และจากนั้นการคัดลอกก็เริ่มต้นขึ้น...","ในขณะเดียวกัน ลินน์ก็ได้ปลดปล่อยอาณาเขตสุญญากาศออกไป และหลังจากที่คลอรีนไตรฟลูออไรด์ได้สัมผัสกับสสารอื่นๆ มันก็เผยให้เห็นถึงความน่าสะพรึงกลัวในทันที เปลวไฟอันร้อนระอุและแปลกประหลาดได้ลุกไหม้ขึ้นอย่างรวดเร็ว...","ภายใต้การรับรู้ของลินน์ ไฮโดรเจน ออกซิเจน ไนโตรเจน และองค์ประกอบหายากต่างๆ ในอากาศ ล้วนแต่ถูกดึงเข้าไปใน ‘เพลิงแห่งนรก’ ดูเหมือนว่าคลอรีนไตรฟลูออไรด์จะไม่มีความละอายใจเลย มันเปรียบเสมือนคนตะกละที่ไม่มีวันอิ่ม ซึ่งกลืนกินองค์ประกอบทั้งหมดที่อยู่ใกล้เคียงอย่างบ้าคลั่ง แลh;เปลี่ยนมันให้กลายเป็นสารอาหารของตัวเอง","ในเวลาเพียงแค่ไม่กี่วินาที เปลวเพลิงที่เดิมทีมีขนาดเท่ากับนิ้วมือ ก็พองตัวขึ้นจนมีขนาดเท่ากับกำปั้นอย่างรวดเร็ว พร้อมกับก๊าซพิษจำนวนมากที่ถูกปล่อยออกมา...","นี่เป็นลักษณะประการที่สองของคลอรีนไตรฟลูออไรด์ ซึ่งจะสร้างก๊าซที่มีพิษร้ายแรงเมื่อทำปฏิกิริยากับสารอื่นๆ ซึ่งคล้ายคลึงกับฟอสฟอรัสขาว","“เรียกมันว่า เพลิงอมตะ ก็แล้วกัน”","ลินน์ลูบคางของเขา ท้ายที่สุดแล้ว สิ่งนี้ก็จำเป็นต้องมีชื่อ และมันก็ตรงไปตรงมาเกินไปที่จะเรียกมันว่าคลอรีนไตรฟลูออไรด์ ซึ่งโดยพื้นฐานแล้วมันก็เทียบเท่ากับการประกาศตัวตน","หลังจากยืนยันว่าลักษณะเฉพาะของ ‘คลอรีนไตรฟลูออไรด์’ นั้นเหมือนกับสิ่งที่ถูกบันทึกเอาไว้ในสมองจริงๆ ลินน์ก็เริ่มพยายามที่จะใช้มัน","เนื่องจากคลอรีนไตรฟลูออไรด์เหล่านี้ใช้การเลียนแบบทางเวทมนตร์ พวกมันจึงสามารถถูกควบคุมได้อย่างอิสระเหมือนกับเวทมนตร์อื่นๆ แต่ความยากก็จะสูงกว่าเล็กน้อย ท้ายที่สุดแล้ว อิเล็กตรอนที่ถูกแย่งชิงโดยคลอรีนไตรฟลูออไรด์นั้นเป็นของจริง และมันก็ต้องใช้การควบคุมทางจิตวิญญาณเพิ่มเติมในการบริโภค...","สำหรับเรื่องที่ว่า มันจะสามารถต่อต้านเวทมนตร์และพลังศักดิ์สิทธิ์ได้ตามที่เขาจินตนาการเอาไว้หรือไม่นั้น ยังไม่มีใครรู้ และเป็นคำถามที่จำเป็นต้องได้รับการตรวจสอบ...","หลังจากอาหารค่ำ ลินน์ก็ได้เชิญแอนโธนี ซึ่งกำลังค้นคว้าเกี่ยวกับเลเซอร์ และเสนอให้ทำการต่อสู้ทางเวทมนตร์เพื่อทดสอบพลังของเวทมนตร์บทใหม่","แอนโธนีก็ตกลงด้วยความสนใจเป็นอย่างยิ่ง","โดยสถานก็จะเป็นสนามฝึกซ้อมแบบเปิดภายในคฤหาสน์แห่งนี้!","ซึ่งหลังจากได้รับข่าว เอล็อคและคนอื่นๆ ก็วางมือจากงานของพวกเขาไปทีละคน พวกเขามีความสนใจในเวทมนตร์บทใหม่ของศาสตราจารย์เป็นอย่างมาก แม้แต่ราฟาเอลและคนอื่นๆ ก็ย่อมไม่มีข้อยกเว้น","“เจ้าคิดว่าท่านลินน์มีโอกาสชนะมากแค่ไหน?”","ซานเชซกระซิบกับเพื่อนหลายคนที่อยู่ข้างๆ เขา","“น้อยกว่า 10%...”","เดนนิสครุ่นคิดอยู่ครู่หนึ่ง แล้วตอบด้วยน้ำเสียงทุ้มลึก","ต้องรู้ก่อนว่า แอนโธนีเป็นจอมเวทผู้ยิ่งใหญ่ระดับหกวงแหวน ซึ่งอยู่ห่างจากขอบเขตตำนานเพียงแค่ก้าวเดียวเท่านั้น แถมเขายังได้พัฒนาเวทมนตร์แม่เหล็กไฟฟ้าที่เป็นเอกลักษณ์ขึ้นมาด้วย!","โดยลินน์นั้นเพิ่งจะเลื่อนขั้นสำเร็จเมื่อไม่นานมานี้...","ระดับสี่วงแหวน ปะทะ ระดับหกวงแหวน...ช่องว่างนี้ไม่สามารถชดเชยได้ด้วยการพึ่งพาเวทมนตร์ที่แปลกใหม่เพียงแค่หนึ่งหรือสองบท","อันที่จริง หากคู่ต่อสู้ของแอนโธนีไม่ใช่ดาวรุ่งแห่งเวทมนตร์ เขาเกรงว่าแม้แต่โอกาสชนะ 10% นี้ ก็คงจะไม่มีอยู่จริง","“นั่นก็ไม่แน่เสมอไป”","ราฟาเอลส่ายหัว ไม่เห็นด้วยกับข้อสรุปของเดนนิส","“อย่าลืมสิว่า ท่านลินน์เกือบจะสังหารออกัสต์ได้เชียวนะ!”","เขาและลินน์เคยต่อสู้เคียงบ่าเคียงไหล่กันมาแล้ว ในตอนที่จัดการกับลัทธิวันสิ้นโลก ลินน์ ซึ่งในเวลานั้นยังเป็นเพียงแค่พ่อมดระดับสามวงแหวน ได้พัฒนาเวทมนตร์มิติที่ทรงพลังขึ้นมา ซึ่งช่วยเหลือเขาในการเอาชนะสายลับของศาสนจักรที่แทรกซึมเข้ามาในดินแดนพ่อมด และเกือบจะสังหารออกัสต์ที่อาจก้าวเท้าเข้าสู่ระดับตำนานด้วยปืนใหญ่แม่เหล็กไฟฟ้า...","“แต่ถ้าข้าจำไม่ผิด คราวนั้นน่าจะเป็นท่านออโรร่าที่คอยช่วยเหลืออย่างลับๆ ไม่ใช่เหรอ?”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งเตือนสติ และในความเห็นของเขา ดาวรุ่งแห่งเวทมนตร์ดวงนี้ก็แค่เก็บเกี่ยวความดีความชอบมาได้เปล่าๆ ด้วยความโชคดี...","ไม่ว่าจะเปลี่ยนเป็นใครก็ตาม ตราบใดที่มีประธานสภาคอยช่วยเหลือ มันก็คงไม่ใช่เรื่องยากเลยที่จะแก้ไขการจลาจลในเมืองกรีนรีล","เมื่อเทียบกับซานเชซและคนอื่นๆ ที่ตัดสินจากโลกภายนอกและชั่งน้ำหนักผลลัพธ์ตามความแข็งแกร่งของทั้งสองฝ่ายแล้ว แอนโธนี ซึ่งอยู่ท่ามกลางพวกเขากลับดูเคร่งขรึมเป็นอย่างยิ่ง","เขารู้ดีว่าคนที่ยืนอยู่ฝั่งตรงข้ามไม่ใช่พ่อมดระดับสี่วงแหวนธรรมดาๆ แต่เป็นระดับตำนานจากอดีต แม้ว่าพลังของเขาจะยังไม่ฟื้นตัวกลับมาในตอนนี้ แต่มันก็ไม่ใช่เรื่องง่ายเลยที่จะรับมือ!","และแอนโธนีก็รู้สึกคลุมเครือว่าเลือดในร่างกายของเขา ที่สงบนิ่งมาอย่างยาวนานเริ่มเดือดพล่าน เมื่อต้องเผชิญหน้ากับพ่อมดระดับตำนานในยุครุ่งเรือง เขาก็ไม่ได้เป็นคู่ต่อสู้เลยแม้แต่น้อย แต่ตอนนี้เขาสามารถใช้โอกาสนี้ เพื่อสัมผัสกับพลังระดับตำนานได้","“พวกเราเริ่มกันเลยมั้ย? ท่านลินน์...”","แอนโธนีถาม","เมื่ออยู่ต่อหน้าคนนอก เขาไม่ได้เรียกลินน์ว่าอาจารย์อย่างหุนหันพลันแล่น เพราะท้ายที่สุด เขาก็ยังไม่สามารถแก้ไขสมการของแมกซ์เวลล์ที่ซับซ้อนได้ และยังไม่ได้รับการยอมรับจากอีกฝ่ายอย่างแท้จริง","“แน่นอน!”","ลินน์กล่าวอย่างสบายๆ โดยไม่รู้เลยว่าแอนโธนี ซึ่งตกอยู่ในความคิดของตัวเอง ได้เริ่มจริงจังขึ้นมาแล้ว","ซึ่งนับตั้งแต่ทะลวงผ่านขอบเขตขึ้นมา นี่เป็นครั้งแรกที่เขาได้ต่อสู้กับจอมเวทผู้ยิ่งใหญ่ตัวจริง แม้ว่าเขาจะเคยต่อสู้กับเฮลรามและออกัสต์มาก่อนในอดีต แต่ถ้าเขาไม่ได้ใช้ประโยชน์จากความประมาทของคู่ต่อสู้ ก็ต้องพึ่งพาความช่วยเหลือจากคนอื่นๆ","ในครั้งนี้ เขาอาศัยความแข็งแกร่งของตัวเองจริงๆ เพื่อต่อสู้กับพ่อมดระดับหกวงแหวน!","ในวินาทีที่ลินน์พยักหน้าตอบ แอนโธนีก็ยกมือขึ้น และในขณะที่ริมฝีปากของเขาขยับเล็กน้อย สายฟ้าสีน้ำเงินอมม่วงก็ปรากฏขึ้นบนปลายนิ้วของเขา","อัสนีบาต!","นี่เป็นเพียงแค่เวทมนตร์ระดับสี่วงแหวน แต่ข้อได้เปรียบของมันก็คือความเร็วในการร่ายที่รวดเร็วเป็นอย่างยิ่ง แทบจะในพริบตาที่เขายกปลายนิ้วขึ้นมา สายฟ้าที่กระพริบวาบก็เปรียบเสมือนงูสายฟ้าที่ดุร้าย ซึ่งพุ่งไปหาลินน์!","อย่างไรก็ตาม แสงสายฟ้าที่กระพริบวาบกลับถูกสกัดกั้นเอาไว้อย่างแน่นหนาในระยะสามเมตรจากร่างกาย และลินน์ที่อยู่ภายในนั้นก็ไม่ได้รับอันตรายใดๆ เลย","แน่นอนว่านี่คือกรงฟาราเดย์!","เมื่อต่อสู้กับแอนโธนี ผู้เชี่ยวชาญด้านเวทมนตร์สายฟ้า ลินน์ย่อมไม่ปล่อยปละละเลยในการป้องกันใดๆ","สีหน้าของแอนโธนียังคงไม่เปลี่ยนแปลง ความคิดของเขาขับเคลื่อนไป องค์ประกอบโลหะที่ไม่มีนัยสำคัญเหล่านั้น ซึ่งปะปนอยู่ในแสงไฟฟ้าที่กระพริบวาบ ได้กลายเป็นอาวุธสังหารในชั่วพริบตา พวกมันรวมตัวกันและยืดขยายออกไปอย่างรวดเร็ว...","โดยกระบวนการทั้งหมดนั้นใช้เวลาเพียงแค่ชั่วขณะ และลินน์ ซึ่งยืนอยู่ตรงหน้าเขา ก็ถูกแทงทะลุด้วยตะปูทองแดงขนาดใหญ่ที่แหลมคมหลายตัว และถูกตอกตรึงอยู่กับที่อย่างแน่นหนา...","“ท่านศาสตราจารย์!”","เมื่อมองดูลินน์ที่ร่างกายถูกแทงทะลุด้วยตะปูทองแดง เอล็อคก็ตะโกนออกมาด้วยความตื่นตระหนก และเพียร์ซรวมถึงคนอื่นๆ ก็ไม่มีข้อยกเว้น พวกเขาทั้งหมดต่างก็แสดงสีหน้าที่หวาดกลัวออกมา","พวกเขาไม่ได้คาดคิดเลยว่า มันจะเป็นเพียงแค่การทดลองเวทมนตร์ แต่จู่ๆ แอนโธนีก็ลงมือสังหารเขาต่อหน้าทุกคน"]},{"n":347,"t":"เพลิงอมตะที่กลืนกินทุกสรรพสิ่ง!","c":["เหล่าจอมเวทผู้ยิ่งใหญ่ไม่ได้รู้สึกตกใจเหมือนกับเอล็อคและคนอื่นๆ เพราะพวกเขาสามารถเห็นได้ว่า ตะปูทองแดงที่แทงทะลุออกไปนั้น ล้วนแต่หลีกเลี่ยงจุดสำคัญทั้งหมด","พลังทำลายของเวทมนตร์ระดับสูงมักจะน่าประหลาดใจ และในการต่อสู้ระดับจอมเวทผู้ยิ่งใหญ่ มันจึงไม่ใช่เรื่องง่ายที่จะออมมือถึงระดับนี้","ท้ายที่สุดแล้ว ก็ไม่มีใครรู้ว่าคู่ต่อสู้มีคาถาประเภทไหน และมันสามารถป้องกันได้หรือไม่","“นี่คือเวทมนตร์สายฟ้าเหรอ? มันพิเศษจริงๆ...”","ซานเชซขมวดคิ้วโดยไม่รู้ตัว ‘อัสนีบาต’ ที่แอนโธนีเพิ่งจะร่ายออกมานั้นเร็วมากจน แม้แต่ตัวเขาเองก็อาจจะไม่สามารถตอบสนองได้ทัน","เพียงแต่ราฟาเอลไม่ได้คาดคิดเลยว่าการต่อสู้นี้จะจบลงเร็วขนาดนี้ มันกินเวลาประมาณหนึ่งวินาที? และผู้ชนะก็ถูกตัดสินโดยตรง...","เขาคิดว่าจะได้ดูการต่อสู้ไปสักพัก เพื่อเพลิดเพลินไปกับการต่อสู้ที่ยอดเยี่ยม ท้ายที่สุดแล้ว ช่องว่างของความแข็งแกร่งก็ยังคงมากเกินไปอยู่ดี!","“ท่านคิดว่านี่คือจุดจบแล้วงั้นเหรอ? นี่มันเป็นเพียงแค่จุดเริ่มต้นชัดๆ!”","เดนนิสเตือนสติด้วยความโกรธ","หลังจากได้รับการเตือนจากเดนนิส ทุกคนที่อยู่ในเหตุการณ์ต่างก็สังเกตเห็นว่า สีหน้าของลินน์ยังคงเป็นปกติหลังจากถูกแทงด้วยตะปูทองแดง ซึ่งไม่มีร่องรอยของความเจ็บปวดบนใบหน้าของเขา และไม่มีเลือดไหลออกมาจากส่วนที่ถูกแทง แต่มันกลับลุกไหม้ขึ้นมาแทน","คือมันกำลังลุกไหม้อยู่จริงๆ!","เปลวไฟอันร้อนระอุระเบิดออกมาจากภายนอกร่างกาย และเสื้อผ้า ผิวหนัง และเนื้อของลินน์ก็ล้วนแต่ถูกแยกชิ้นส่วนแล้วกลายเป็นเชื้อเพลิงสำหรับเปลวไฟ ไม่เพียงแค่นั้น เปลวไฟก็กำลังขยายตัวอย่างรวดเร็วและกลืนกินทุกสิ่งรอบตัว ไม่ว่าจะเป็นตะปูทองแดงสีเหลืองอมส้ม หรือสายฟ้า!","รูม่านตาของแอนโธนีหดตัวลงเล็กน้อย เพราะเขารู้สึกว่าพลังเวทในการควบคุมของเขาถูกพรากไป ไม่เพียงแค่นั้น ไฟเหล่านี้ยังสามารถกลืนกินสายฟ้าได้!","“ลมหายใจแห่งเพลิง...”","ก่อนที่แอนโธนีจะคิดออก เสียงของลินน์ก็ดังมาจากด้านหลังเปลวไฟ","นับตั้งแต่วินาทีที่การต่อสู้เริ่มต้นขึ้น เขาได้ใช้เวทโพลาไรเซชัน โดยสิ่งที่ยังคงอยู่ในตำแหน่งเดิม ก็เป็นเพียงแค่ร่างจำลองทางเวทมนตร์เท่านั้น!","‘เพลิงอมตะ’ อันร้อนระอุ ได้กลืนกินทุกสิ่งที่ขวางหน้า และในการขยายตัวอย่างต่อเนื่อง มันก็ได้กลายเป็นคลื่นไฟที่พวยพุ่งเข้าหาแอนโธนี","อาณาเขตสุญญากาศ!","แอนโธนีดูเคร่งขรึม และพื้นที่รอบตัวเขาก็ขยายออกไปในทุกทิศทางอย่างรวดเร็ว เพื่อไล่องค์ประกอบทั้งหมดออกไป พร้อมกับพลังเวทในร่างกายก็เปลี่ยนให้กลายเป็นม่านน้ำอย่างรวดเร็ว เพื่อสกัดกั้นมันเอาไว้ตรงหน้าเขา","ตราบใดที่ไม่มีอากาศ เปลวไฟก็จะดับลงตามธรรมชาติ!","และน้ำก็คือศัตรูตัวฉกาจของไฟ!","นี่เป็นสามัญสำนึกอย่างไม่ต้องสงสัย และราฟาเอลรวมถึงคนอื่นๆ ที่กำลังเฝ้าดูก็รู้สึกแบบเดียวกัน แต่ในขณะนี้ สามัญสำนึกนี้กลับใช้ไม่ได้ผล!","หลังจากเข้าสู่อาณาเขตสุญญากาศแล้ว ‘เพลิงอมตะ’ ก็ยังคงลุกไหม้อยู่ ไม่เพียงแค่นั้น ในวินาทีที่มันพุ่งชนเข้ากับม่านน้ำ ‘เพลิงอมตะ’ ก็ไม่ได้ดับลง แต่มันกลับกลืนกินม่านน้ำเข้าไป แล้วระเบิดความร้อนราวกับดวงอาทิตย์ออกมา...","สีหน้าของแอนโธนีเปลี่ยนไปอย่างมาก และเขาก็ต้องถอยกลับไปครั้งแล้วครั้งเล่า ในขณะที่ความคิดของเขาพลิกผัน พลังเวทก็เปลี่ยนเป็นองค์ประกอบต่างๆ โดยธรรมชาติ แต่ไม่ว่าจะเป็นเกราะป้องกันที่ทำจากองค์ประกอบโลหะ กำแพงทราย หรือบาเรียแม่เหล็กไฟฟ้า พวกมันทั้งหมดต่างก็สูญเสียประสิทธิภาพไปโดยสิ้นเชิง!","ในพริบตา แอนโธนีก็ถูกกลืนกินเข้าไปในทะเลเพลิง และรอบตัวเขาก็เหลือเพียงแค่บาเรียสุดท้ายที่ทำจากเกล็ดงูเท่านั้น โดยเขารู้สึกได้ว่า พลังของบาเรียก็กำลังถูกทำให้อ่อนแอลงอย่างต่อเนื่อง ในขณะที่พลังของเปลวไฟกำลังเพิ่มขึ้นอย่างรวดเร็ว","ภายใต้กลไกเช่นนี้ อย่างมากที่สุดเพียงครึ่งนาที การป้องกันที่แข็งแกร่งที่สุดของเขาก็จะถูกทำลาย...","“สมกับที่เป็นตำนานจากอดีต...ไม่คิดเลยว่าจะเชี่ยวชาญเวทมนตร์ไฟที่น่าสะพรึงกลัวเช่นนี้”","แอนโธนีถอนหายใจอย่างลับๆ ในใจ","เพียงแต่แอนโธนีไม่ได้ตั้งใจจะยอมแพ้ เพราะมันยังมีอีกวิธีหนึ่งที่จะชนะได้ นั่นก็คือการโจมตีผู้ร่ายเวทโดยตรง!","อย่างไรก็ตาม เขาก็ได้ลองใช้องค์ประกอบมาแล้วถึง 17 ชนิด แต่ไม่ว่าอันไหนก็จะถูกกัดกร่อนโดยเปลวไฟทั้งหมด ส่วนที่เหลือก็อาจจะไม่มีข้อยกเว้น แต่ก็มีองค์ประกอบที่พิเศษกว่าซึ่งน่าจะมีประสิทธิภาพ","นั่นก็คือแสง!","ความคิดนี้แวบเข้ามาในใจของแอนโธนี และในวินาทีต่อมา ลำแสงสีขาวบริสุทธิ์ก็พุ่งออกมาจากคลื่นไฟที่พวยพุ่ง และทะลวงร่างของลินน์อีกครั้ง","แต่เห็นได้ชัดว่า นี่เป็นเพียงร่างจำลองทางเวทมนตร์อีกร่าง เพราะนับตั้งแต่ที่เขาได้เรียนรู้ เวทจำลองร่างขั้นสูง ลินน์ก็ใช้งานมันอย่างหนัก ซึ่งทำให้เขานั้นเชี่ยวชาญมันเป็นอย่างมาก","ภายใต้การห่อหุ้มของ ‘เพลิงอมตะ’ ทำให้แอนโธนีไม่สามารถรับรู้ได้อย่างรอบคอบว่าร่างที่แท้จริงของลินน์นั้นอยู่ที่ไหน แต่เขาก็ไม่จำเป็นต้องทำเช่นนั้น เพราะไม่มีสิ่งใดที่จะสามารถเร็วกว่าแสงได้!","ภายใต้การลากยิงของเลเซอร์ ก็ได้ทำให้รั้วเหล็กและเสาไม้ที่ถูกวางไว้บนสนามฝึกซ้อม ถูกตัดขาดในพริบตา พร้อมกับรอยตัดที่เรียบเนียนเป็นอย่างยิ่ง โดยทิ้งรอยขีดข่วนลึกเอาไว้บนกำแพงที่อยู่ห่างออกไป...","“หยุด หยุด!”","ราฟาเอลตะโกนด้วยความตื่นตระหนก","การที่แอนโธนีกวาดเลเซอร์ไปทั่ว โดยไม่รู้ว่าลินน์อยู่ที่ไหน และราฟาเอลก็ไม่ได้กังวลเกี่ยวกับความปลอดภัยของเขา เพราะพวกเขาที่อยู่ด้านนอกสนามรบนั้นสามารถต้านทานเลเซอร์ที่อ่อนแรงลงมาได้","แต่พ่อมดเต็มตัวอย่างเอล็อค อาจจะเหลือร่างกายเพียงแค่ครึ่งเดียว!","ท่ามกลางเสียงตะโกนของราฟาเอล แสงเลเซอร์ที่เจิดจ้าก็หยุดลงอย่างรวดเร็ว และลินน์ก็รู้ด้วยว่าสนามฝึกซ้อมไม่สามารถทนต่อการต่อสู้ของพวกเขาได้ ดังนั้น เขาจึงหยุดร่ายเวทเพื่อดับเปลวไฟที่กำลังลุกไหม้","‘เพลิงอมตะ’ ที่ปกคลุมร่างกายของแอนโธนีถูกระงับอย่างรวดเร็ว แต่สิ่งที่ทำให้ลินน์ประหลาดใจก็คือ ยังมีเปลวไฟจำนวนมากที่ติดอยู่กับสนามฝึกซ้อม ซึ่งแสดงให้เห็นสัญญาณจางๆ ของการหลุดการควบคุม","นั่นทำให้ลินน์ขมวดคิ้วโดยไม่รู้ตัว เพราะมันแตกต่างจากฟอสฟอรัสขาว คลอรีนไตรฟลูออไรด์นั้นไม่สามารถเผาไหม้ได้ด้วยตัวเอง และปรากฏการณ์การเผาไหม้นั้นเกิดจากการปล้นอิเล็กตรอนมาจากองค์ประกอบอื่นๆ นั่นก็คือ เปลวไฟเป็นเพียงแค่อนุพันธ์ของมัน","และในการทดลองก่อนหน้านี้ เขาก็เพิ่งจะสร้าง ‘เพลิงอมตะ’ ขนาดเท่ากำปั้นขึ้นมา ซึ่งสามารถควบคุมมันได้อย่างอิสระด้วยพลังจิตวิญญาณ แต่ตอนนี้เขากลับสูญเสียการควบคุมหลังจากที่มันกลืนกินสารอาหารจำนวนมหาศาลเข้าไป","ลินน์ครุ่นคิดอยู่ครู่หนึ่ง จากนั่นก็ทำได้เพียงใช้พลังเวทที่บริสุทธิ์ที่สุด เพื่อบังคับเอาสถานที่ที่ถูกเปลวไฟกัดกร่อนออก โดยปล่อยให้พวกมันแขวนลอยอยู่ในอาณาเขตสุญญากาศ แล้วปล่อยให้มันเผาไหม้อย่างช้าๆ…นั่นทำให้ ในใจของเขาแอบระแวดระวังขึ้นมา ว่าในอนาคตเขาจะต้องใช้เวทมนตร์ชนิดนี้ให้ระมัดระวังมากขึ้น","พลังของสิ่งนี้น่าสะพรึงกลัวจริงๆ ที่สามารถกดดันได้แม้กระทั่งจอมเวทผู้ยิ่งใหญ่ระดับหกวงแหวนอย่างแอนโธนี แต่ถ้าหากไม่ระวัง มันก็อาจจะ
