ฤษฎีนี้ช่าง...น่าทึ่งจริงๆ!”","ราฟาเอลมองไปที่ลินน์และอดไม่ได้ที่จะเอ่ยขึ้น","“นั่นไม่ได้หมายความว่าแท้จริงแล้วโลกใบนี้ไร้สีหรอกหรือ?”","ในอดีต พวกเขาเคยคิดว่าธาตุต่างๆ ล้วนมีสีเฉพาะตัว และวัตถุที่พวกมันประกอบเข้าด้วยกันก็จะแสดงระบบสีที่สอดคล้องกันออกมา โดยแสงทำหน้าที่เพียงแค่ช่วยให้พวกเขามองเห็นสีที่ปรากฏอยู่แต่เดิม หรือเกาะติดอยู่บนพื้นผิวของธาตุเท่านั้น","อย่างไรก็ตาม คำกล่าวของลินน์กลับตรงกันข้ามอย่างสิ้นเชิง สีทั้งหมดล้วนมาจากแสง และสิ่งที่พวกเขามองเห็นก็คือแสงที่ถูกวัตถุผลักไสออกมา ส่วนแสงที่ถูกดูดซับเข้าไปนั้นไม่สามารถมองเห็นได้งั้นหรือ?","นั่นก็คือ วัตถุสีแดงไม่ได้เป็นสีแดงเลยแม้แต่น้อย แต่มันจะสะท้อนแสงสีแดงทั้งหมดออกมา แล้วจากนั้นก็ดูดซับแสงสีอื่นๆ เข้าไป","ตามทฤษฎีแล้ว หากสามารถหาวิธี ‘มองเห็น’ สิ่งที่เรียกว่า ‘ธาตุแสง’ ที่อยู่ภายในวัตถุได้ สิ่งนี้ก็ควรจะแสดงสีที่ผสมผสานจากสีอื่นๆ ออกมาไม่ใช่หรือ?","ราฟาเอลรู้สึกยากที่จะทำความเข้าใจคำพูดของลินน์ และมันก็ยากที่จะจินตนาการถึงโลกที่สีถูกสลับสับเปลี่ยนไปมาจริงๆ","“ใช่แล้ว หากปราศจากแสง ก็จะไม่มีสี”","ลินน์พยักหน้าเห็นด้วยกับคำพูดของราฟาเอล","“นี่มันเป็นเพียงแค่ความเชื่อที่ผิด ชัดๆ!”","จอมเวทผู้ยิ่งใหญ่ในชุดคลุมสีม่วงตบโต๊ะแล้วลุกขึ้นยืน ก่อนจะตะโกนเสียงดัง","“ถ้าอย่างนั้น ทุกสิ่งที่เราเห็นก็กลับตาลปัตรไปหมดเลยสิ สิ่งที่เป็นสีดำซึ่งดูดซับแสงทั้งหมดเอาไว้ แท้จริงแล้วมันสว่างมาก แต่เราแค่มองไม่เห็นมันงั้นหรือ?”","“ไม่ มันไม่อาจกล่าวเช่นนั้นได้ ในเมื่อแสงถูกดูดซับเอาไว้และไม่สะท้อนออกมา โดยธรรมชาติแล้วมันย่อมไม่ส่องสว่าง”","ลินน์ยักไหล่ ก่อนจะพูดต่อไป","“และพวกท่านลองคิดดูสิ หากพวกท่านอยู่ในพื้นที่ปิดตายในตอนกลางคืน พวกท่านจะมองเห็นสีหรือไม่? ดังนั้น สีจึงดำรงอยู่ได้โดยอาศัยแสง”","เมื่อได้ยินเช่นนี้ ราฟาเอลและคนอื่นๆ ก็ผงะไปครู่หนึ่ง ส่วนซานเชซขมวดคิ้ว รู้สึกว่าคำกล่าวของลินน์นั้นไม่น่าเชื่อถือเอาเสียเลย","“ปรมาจารย์ลินน์ สิ่งที่เวทมนตร์ต้องการคือการพิสูจน์อย่างเข้มงวด ไม่ใช่การคาดเดา! การที่เราไม่สามารถมองเห็นสิ่งใดได้เมื่อปราศจากแสง นั่นหมายความว่าพวกมันไม่มีอยู่จริงหากเรามองไม่เห็นงั้นหรือ?”","เกล็นที่ยืนอยู่บนแท่นสูงรวบรวมความกล้าและเอ่ยแย้งขึ้นมา ซึ่งเป็นคนสุดท้ายที่จะเชื่อข้อโต้แย้งนี้","ท้ายที่สุดแล้ว เรื่องนี้ก็เกี่ยวข้องกับว่าเขาจะได้รับเหรียญตราจันทร์สีเงินหรือไม่ ทันทีที่ได้รับการพิสูจน์แล้วว่าแม่สีไม่ใช่แก่นแท้ของแสง แต่เป็นปรากฏการณ์ที่เกิดจากเหตุผลทางสรีรวิทยา ความสำคัญของผลงานการวิจัยของเขาก็จะดิ่งลงเหวอย่างแน่นอน","อย่างไรก็ตาม เขาเพิ่งจะโต้เถียงกับจอมเวทผู้ยิ่งใหญ่ และยังคงเป็นดาวรุ่งแห่งวงการเวทมนตร์ที่โด่งดังที่สุดในดินแดนพ่อมดอีกด้วย หลังจากที่ความกล้าหาญในใจของเกล็นค่อยๆ จางหายไป เหงื่อเย็นๆ ก็เริ่มผุดพรายขึ้นบนหน้าผากของเขา","เพื่อนที่อยู่ข้างๆ เขาก็ค่อยๆ กระตุกแขนเสื้อของเขาอย่างเงียบๆ เป็นเชิงส่งสัญญาณให้เกล็นอย่าไปขัดแย้งกับดาวรุ่งแห่งวงการเวทมนตร์อย่างวู่วาม อีกฝ่ายไม่จำเป็นต้องทำอะไรด้วยซ้ำ เพียงแค่แสดงเจตนาออกมาสักเล็กน้อย อนาคตของพวกเขาก็คงจะน่าเศร้ามากแล้ว","ลินน์ไม่ได้ใส่ใจกับคำถามอันเฉียบแหลมของเกล็น และกล่าวพร้อมกับรอยยิ้ม","“เป็นการโต้แย้งที่ดีมาก และสิ่งที่เจ้าพูดมาก็ไม่เลวเลย ทฤษฎีเวทมนตร์ทุกทฤษฎีจำเป็นต้องได้รับการตรวจสอบด้วยการทดลอง!”","“ตอนนี้ ทุกท่าน โปรดปิดหน้าต่างและประตูของหอประชุมแห่งนี้ให้มิดชิด...อย่าให้มีแสงใดๆ เล็ดลอดเข้ามาได้!”","เมื่อสิ้นเสียงของลินน์ พ่อมดแม่มดที่อยู่ริมหน้าต่างในหอประชุมก็ร่ายเวทอย่างพร้อมเพรียงกัน เพื่อปิดกั้นประตูและหน้าต่างทั้งหมด","ฉากงานสัมมนาวิชาการที่เดิมทีสว่างไสวก็กลายเป็นมืดมิดลงในทันที เหลือเพียงแสงสว่างจากด้านบนศีรษะของพวกเขา ซึ่งเป็นแสงที่ส่องลงมาจากยอดหอคอยโดยตรง เพื่อให้แสงสว่างเพียงเล็กน้อยเท่านั้น","“มีใครพกกระจกมาบ้าง?”","ลินน์ถามอีกครั้ง","“ข้ามี!”","เกล็นก้าวออกมาข้างหน้าหนึ่งก้าว และหยิบกระจกกลมบานหนึ่งออกมาจากอกเสื้อของเขา เมื่อเร็วๆ นี้เขาได้ทำการทดลองเกี่ยวกับแสง ดังนั้น แน่นอนว่ากระจกจะไม่มีทางอยู่ห่างจากตัวเขาอย่างแน่นอน","“ดีมาก!”","ลินน์พยักหน้า จากนั้นก็เรียกจอนนี่ให้เดินมาหา โดยให้เธอไปยืนอยู่ตรงหน้าแท่นสูง และใช้กระจกกลมสะท้อนแสงที่ส่องลงมาจากด้านบนศีรษะให้ตกลงไปบนร่างของเด็กสาว","ท่ามกลางความมืดมิด ร่างของจอนนี่ดูโดดเด่นสะดุดตาเป็นอย่างมาก เธอสวมกระโปรงยาวสีแดงสด ซึ่งกระโปรงนั้นก็พลิ้วไหวเบาๆ ราวกับเปลวเพลิง","“เจ้าพอจะรู้ไหมว่าเสื้อผ้าที่เธอสวมใส่อยู่นั้นเป็นสีอะไร?”","ลินน์ถาม","“แน่นอนว่าต้องเป็นสีแดงสิ!”","เกล็นตอบ","“ทุกคนก็เห็นเหมือนกันไม่ใช่หรือ?”","ราฟาเอลเม้มปาก ไม่เข้าใจเลยว่าทำไมลินน์ถึงถามคำถามงี่เง่าเช่นนี้ออกมา","“จงจดจำการตัดสินใจของพวกเจ้าในตอนนี้เอาไว้ให้ดี! เสื้อผ้าเป็นสีแดง อย่าลืมเสียล่ะ!”","ลินน์กล่าวอย่างมีความนัย","ราฟาเอลรู้สึกพูดไม่ออกเลยทีเดียว หรือว่าชุดนี้จะเปลี่ยนเป็นสีน้ำเงินในภายหลังได้งั้นหรือ?","เขาอยากจะรู้จริงๆ ว่าอีกฝ่ายต้องการจะทำบ้าอะไรกันแน่!","ลินน์หันสายตากลับไปมองเด็กสาวในชุดกระโปรงสีแดงอีกครั้ง และกล่าวพร้อมกับรอยยิ้ม","“ผิวพรรณของเจ้าช่างขาวเนียนและงดงามยิ่งนัก...”","จอนนี่ไม่คาดคิดเลยว่าศาสตราจารย์จะพูดเช่นนี้ออกมาต่อหน้าธารกำนัล ซึ่งเธอก็ดูจะเขินอายและประหม่าเล็กน้อยภายใต้สายตาที่คลุมเครือของพ่อมดแม่มดรอบกาย","สิ่งนี้เหมาะสำหรับการทดลองเป็นอย่างมาก...ลินน์กลืนประโยคครึ่งหลังลงคอไปอย่างเงียบๆ","“ต่อไปเจ้าจะต้องใช้...อุปกรณ์แยกแสงของเจ้า!”","ลินน์ก้าวไปข้างหน้าและตบไหล่ของเกล็นเพื่อเป็นการทักทาย","“ข้าควรจะทำอย่างไรดี ปรมาจารย์ลินน์?”","เกล็นถามด้วยความประหม่าขณะถือสิ่งประดิษฐ์เอาไว้ในมือ","“แยกแสงออกเหมือนที่เจ้าเคยทำ...”","ลินน์อธิบายขั้นตอนให้เกล็นฟังทีละขั้นตอนอย่างละเอียด จนกระทั่งเขามั่นใจแล้วว่าอีกฝ่ายเข้าใจ จากนั้นจึงประกาศว่าการทดลองสามารถเริ่มต้นขึ้นได้!"]},{"n":325,"t":"ปรมาจารย์ลินน์ ภูมิปัญญาของท่านช่างน่าทึ่งจริงๆ!","c":["พ่อมดแม่มดในหอประชุมต่างรู้สึกสงสัยเป็นอย่างมากเกี่ยวกับการทดลองที่ลินน์กำลังพูดถึง หลายคนยังคงจำได้ว่าดาวรุ่งแห่งวงการเวทมนตร์ผู้นี้ก็เคยมาที่นี่เมื่อหนึ่งปีก่อนเช่นกัน และได้ทำการทดลองลูกตุ้มอันน่าทึ่ง เพื่อพิสูจน์ว่าแผ่นดินใต้เท้าของพวกเขานั้นมีรูปร่างกลมและหมุนอยู่ตลอดเวลา","“ท่านแอนโธนี บนโลกใบนี้ไม่มีสีสันอยู่จริงๆ งั้นหรือ?”","ฟูล่าที่นั่งอยู่ท่ามกลางผู้ชมกระซิบถาม","แอนโธนีขมวดคิ้วและไม่ได้ตอบคำถาม เอล็อคและคนอื่นๆ ที่อยู่ข้างๆ เขาก็กำลังพึมพำอยู่ในใจเช่นกัน พวกเขายังคงเชื่อมั่นในคำพูดของคณบดี แต่ครั้งนี้มันก็ดูจะเกินจริงไปสักหน่อย...","เสียงพูดคุยในทำนองเดียวกันนี้ดังขึ้นไปทั่วทั้งหอประชุม ในขณะเดียวกัน เกล็นก็สูดหายใจเข้าลึกๆ และทำตามคำแนะนำของลินน์ โดยวางอุปกรณ์แยกแสงในมือของเขาไว้ใต้ลำแสงอาทิตย์ที่สาดส่องลงมาจากด้านบนศีรษะ","แสงสีขาวถูกแยกออกเป็นสายรุ้งเจ็ดสีอันงดงามตระการตาในทันที...","ทันใดนั้น เกล็นก็ปิดกั้นแสงสีอื่นๆ เอาไว้ เหลือเพียงแสงสีน้ำเงินเท่านั้น และเล็งมันไปที่จอนนี่","ลำแสงสีน้ำเงินอันสว่างจ้าสาดส่องลงบนร่างของเด็กสาวอย่างรวดเร็ว และพ่อมดแม่มดทุกคนในหอประชุมก็อดไม่ได้ที่จะลุกขึ้นยืนด้วยสีหน้าที่เต็มไปด้วยความตกตะลึง...","“นี่มัน... เป็นไปได้อย่างไรกัน? มันกลายเป็นสีดำงั้นหรือ?”","ราฟาเอลจ้องมองไปที่แท่นสูง ภายใต้แสงสีน้ำเงิน ผิวที่เดิมทีเคยขาวเนียนของเด็กสาวก็กลายเป็นสีฟ้าอมน้ำเงินเหมือนกับแสง ส่วนชุดกระโปรงสีแดงบนตัวของเธอกลับกลายเป็นสีดำสนิท","เกล็นเองก็พยายามข่มความประหลาดใจเอาไว้ และหมุนอุปกรณ์แยกแสงในมือ เพื่อเปลี่ยนจากแสงสีน้ำเงินเป็นแสงสีเขียว และจากนั้นก็เป็นแสงสีเหลือง แต่ไม่ว่าจะใช้แสงสีใดสาดส่องลงไป เสื้อผ้าของจอนนี่ก็ยังคงเป็นสีดำสนิท","หากไม่ใช่เพราะสีผิวของเธอที่เปลี่ยนไปตามแสงไฟ ทุกคนที่อยู่ในสายตาก็คงจะคิดว่าอุปกรณ์แยกแสงนั้นพังไปแล้วเสียอีก","จนกระทั่งเกล็นหมุนผ่านแสงสีน้ำเงินและเริ่มเปลี่ยนไปเป็นแสงสีแดง สถานการณ์ในที่สุดก็เปลี่ยนไป เมื่อแสงสีส้มสาดส่องลงบนร่างของจอนนี่ ชุดกระโปรงยาวก็กลับกลายเป็นสีแดงสดเหมือนเดิมในทันที","ปรากฏการณ์ทางแสงอันแปลกประหลาดนี้สร้างความประหลาดใจให้กับพ่อมดแม่มดที่อยู่ในเหตุการณ์เป็นอย่างมาก โดยเฉพาะจอมเวทผู้ยิ่งใหญ่ที่พูดต่อต้านลินน์ก่อนหน้านี้ ซึ่งตอนนี้ตกตะลึงไปจนทำอะไรไม่ถูก","“แสงสีเหลืองถูกดูดซับไปแล้ว!”","เกล็นพึมพำกับตัวเอง","ราฟาเอลและคนอื่นๆ นึกถึงสิ่งที่ลินน์เพิ่งพูดไปเมื่อครู่นี้ขึ้นมาได้อย่างรวดเร็ว สีส้มคือการผสมกันระหว่างสีแดงและสีเหลือง ในตอนนี้ที่แสงสีเหลืองถูกดูดซับไปแล้ว ก็จะมีเพียงแค่แสงสีแดงเท่านั้นที่สามารถสะท้อนกลับมาได้!","และก็เป็นไปตามที่พวกเขาคิด จากแสงสีส้มไปจนถึงแสงสีแดงและแสงสีม่วง ชั้นสีทั้งหมดจะแสดงให้เห็นเพียงแค่สีแดงที่มีความเข้มแตกต่างกันบนชุดกระโปรงเท่านั้น...","“นี่มันเป็นไปไม่ได้ ชุดนั้นจะต้องถูกร่ายมนตร์ใส่เอาไว้แน่ๆ!”","แม่มดคนหนึ่งตะโกนขึ้นมาด้วยความไม่เชื่อจากกลุ่มผู้ชม","“ใครก็ตามที่มีข้อสงสัยเกี่ยวกับการทดลองนี้ สามารถขึ้นมาลองทำดูด้วยตัวเองได้เลย ทุกสิ่งทุกอย่างที่พวกท่านสามารถหาได้ ล้วนแล้วแต่มีความสามารถในการสะท้อนและดูดซับแสง เพียงแต่ในระดับที่แตกต่างกันเท่านั้น”","ลินน์กล่าวพร้อมกับรอยยิ้ม","ตามคำแนะนำของลินน์ พ่อมดแม่มดสองสามคนที่อยากรู้อยากเห็นก็ได้เดินขึ้นไปบนแท่นสูง และวางเสื้อผ้า เศษผ้า สร้อยคอ เครื่องประดับต่างๆ ตลอดจนอุปกรณ์เล่นแร่แปรธาตุที่พวกเขาสามารถหาได้ลงบนใจกลางของแท่นสูง ก่อนจะสาดส่องพวกมันด้วยแสงสีต่างๆ","ผลลัพธ์ที่ได้นั้นเหมือนกับที่ลินน์พูดไว้ทุกประการ แต่เนื่องจากสิ่งของส่วนใหญ่ไม่ได้สะท้อนแสงสีใดสีหนึ่งออกมาอย่างบริสุทธิ์ มีเพียงชุดกระโปรงสีแดงบนตัวจอนนี่ที่ดูงดงามตระการตา และมีประสิทธิภาพที่ดีในการดูดซับแสงสีอื่นๆ มันจึงเกิดการเปลี่ยนแปลงที่ชัดเจนเช่นนี้","“มันกลายเป็นเรื่องจริงงั้นหรือเนี่ย... วัตถุไม่ได้มีสีสันอยู่ในตัวเองเลยแม้แต่น้อย และทุกสิ่งทุกอย่างที่เรามองเห็นก็คือการสะท้อนของแสง...”","หลังจากที่ได้ทำการทดลองบางอย่างด้วยตัวเองแล้ว ซานเชซก็ไม่รู้สึกสงสัยอีกต่อไป","หากวัตถุมีสีอยู่ในตัวเองแล้ว ภายใต้การสาดส่องของแสงสีต่างๆ มันก็ควรจะแสดงให้เห็นถึงการเปลี่ยนแปลงของสี แทนที่จะเปลี่ยนเป็นสีดำสนิท ดังนั้น คำอธิบายเพียงอย่างเดียวก็คือ วัตถุไม่ได้มีสีสัน และสีสันก็คือแสงที่พวกเขามองเห็น!","แต่ในไม่ช้า ซานเชซก็เอ่ยถามด้วยความสับสนราวกับว่าเขานึกอะไรบางอย่างขึ้นมาได้","“ปรมาจารย์ลินน์ ข้ายังมีข้อสงสัยบางอย่างที่อยากจะขอให้ท่านช่วยตอบ ในเมื่อวัตถุสามารถดูดซับแสงได้ แล้วมันมีขีดจำกัดหรือไม่ แล้วแสงที่ถูกดูดซับไปนั้นหายไปไหนกัน?”","ลินน์ชำเลืองมองซานเชซด้วยความประหลาดใจ คำถามนี้ลึกซึ้งมาก ท้ายที่สุดแล้ว มันคือการเปลี่ยนแปลงในระดับควอนตัม เขาสามารถอธิบายมันได้ แต่เขาไม่สามารถให้ข้อพิสูจน์ที่แน่ชัดได้...","หลังจากครุ่นคิดอยู่ครู่หนึ่ง ลินน์ก็ตอบอย่างระมัดระวัง","“ข้าคิดว่าพวกท่านอาจจะสังเกตเห็นว่าวัตถุสีขาวจะดูดซับความร้อนจากแสงอาทิตย์ได้ช้าที่สุด ในขณะที่วัตถุสีดำจะดูดซับความร้อนได้เร็วที่สุด ท้ายที่สุดแล้ว มันก็ดูดซับแสงทั้งหมดและได้รับพลังงานมากที่สุด!”","“เป็นอย่างนี้นี่เอง มันคือความร้อนที่เกิดจากการสะสมของ ‘ธาตุแสง’ งั้นหรือ?”","ราฟาเอลทำความเข้าใจด้วยทฤษฎีธาตุแสงที่แพร่หลายในดินแดนพ่อมด จากนั้นก็กล่าวด้วยความรู้สึกทึ่ง","“ภูมิปัญญาของท่านช่างน่าทึ่งจริงๆ ปรมาจารย์ลินน์... ดูเหมือนว่าการให้ท่านมาเป็นกรรมการตัดสิน จะเป็นการตัดสินใจที่ถูกต้องที่สุดแล้ว!”","หากลินน์ไม่ได้อยู่ที่นั่น พวกเขาคงจะยอมรับทฤษฎีแม่สีของเกล็นไปแล้วอย่างแน่นอน...","แม้ว่าการอนุมานทฤษฎีเวทมนตร์จะมักจะมาพร้อมกับความเชื่อที่ผิดๆ อยู่เสมอ และก็มีหลายทฤษฎีที่เคยได้รับการยอมรับและถึงขั้นได้รับการส่งเสริมจากสภาเวทมนตร์มาก่อน แต่สุดท้ายก็ถูกลบล้างไป ทว่าบรรดากรรมการที่ได้ทำการตัดสินใจไปแล้วก็ยังคงมีความรู้สึกราวกับว่าใบหน้าของพวกเขากำลังบวมเป่งจากการถูกตบหน้า","บนแท่นสูง เกล็นและคนอื่นๆ ดูหดหู่เป็นอย่างมาก แต่พวกเขาก็ไม่สามารถพูดอะไรเพื่อโต้แย้งได้ ท้ายที่สุดแล้ว ก็มีหลักฐานที่หนักแน่นดั่งเหล็กกล้าอยู่ตรงหน้าพวกเขา","“ปรมาจารย์ลินน์ ดูเหมือนว่างานวิจัยของพวกเราจะผิดพลาดนะ”","เกล็นกล่าวด้วยความผิดหวังขณะถืออุปกรณ์แยกแสงเอาไว้ในมือ","ลินน์กล่าวพร้อมกับรอยยิ้ม","“งานวิจัยของเจ้ามีข้อผิดพลาดก็จริง แต่มันก็มีคุณค่าเป็นอย่างมากเช่นกัน มันสามารถเป็นส่วนเสริมที่ดีให้กับทฤษฎีเวทมนตร์ของธาตุแสงได้ ท้ายที่สุดแล้ว ศัตรูของพวกเราก็มักจะเป็นมนุษย์”","“ในนามของข้า ข้าจะเสนอชื่อพวกเจ้าให้เข้ารับรางวัลเหรียญตราจันทร์สีเงิน!”","ลินน์กล่าวอย่างหนักแน่น","ในฐานะของกรรมการตัดสินทางวิชาการ เมื่อต้องเผชิญกับทฤษฎีเวทมนตร์ใหม่ๆ มันก็เป็นหน้าที่ของเขาที่จะต้องชี้ให้เห็นถึงข้อผิดพลาดและข้อบกพร่อง และการเสนอชื่ออีกฝ่ายให้เข้ารับรางวัลเหรียญตราจันทร์สีเงิน ก็เพื่อเป็นการส่งเสริมเจตนารมณ์ในการวิจัยเวทมนตร์","ใช้เวลาเพียงหนึ่งปีนับตั้งแต่ที่เขาคิดค้นแก้วขึ้นมา เกล็นและคนอื่นๆ ก็สามารถค้นพบคุณสมบัติของสิ่งนี้ สร้างปริซึมที่มีคุณสมบัติเหมาะสม และค้นพบการเปลี่ยนแปลงของแม่สีทั้งสามได้ ซึ่งนี่ก็ถือว่ายอดเยี่ยมมากแล้ว!","“พวกท่านคิดเห็นว่าอย่างไร?”","ลินน์ชำเลืองมองไปที่คณะกรรมการตัดสินและเอ่ยถาม","ราฟาเอลและคนอื่นๆ ต่างก็มองหน้ากัน ผลลัพธ์การวิจัยของเกล็นสมควรได้รับรางวัลเหรียญตราจันทร์สีเงินจริงๆ แต่พวกเขาก็เห็นได้ว่าลินน์มีความเข้าใจอย่างลึกซึ้งเกี่ยวกับทัศนศาสตร์ และเขาก็คุ้นเคยกับทฤษฎีแม่สีเป็นอย่างดี การที่เขาสามารถสั่งให้เกล็นทำการทดลองได้นั้น เขาควรจะรู้ทฤษฎีนี้มาตั้งนานแล้ว","แต่ในเมื่อลินน์เองก็ไม่ได้คัดค้าน หลังจากที่ทั้งสองสามคนหารือกันแล้ว พวกเขาก็เห็นพ้องต้องกันอย่างเป็นเอกฉันท์","เจตนารมณ์ของงานสัมมนาวิชาการเวทมนตร์คือการส่งเสริมให้พ่อมดทำการวิจัยเวทมนตร์และตีพิมพ์ผลลัพธ์ที่เกี่ยวข้อง ในเมื่อเกล็นและคนอื่นๆ ได้ศึกษาปรากฏการณ์ของแสงสีรุ้งและแม่สีทั้งสามด้วยตัวเอง พวกเขาก็ยังคงคู่ควรกับรางวัล..."]},{"n":326,"t":"ปฏิเสธการเสนอชื่อรับเหรียญตราจันทร์สีเงิน!","c":["หลังจากที่ได้รับการพิจารณาอย่างเป็นเอกฉันท์จากคณะกรรมการตัดสินหลายท่าน มติในการเสนอชื่อไปยังสภาเวทมนตร์เพื่อขอรับเหรียญตราจันทร์สีเงินก็ผ่านความเห็นชอบอย่างรวดเร็ว","พ่อมดแม่มดในหอประชุมต่างมองไปที่เกล็นด้วยความอิจฉา โดยทั่วไปแล้ว ตราบใดที่พวกเขาได้รับการอนุมัติจากจอมเวทผู้ยิ่งใหญ่ สิ่งที่เรียกว่าการเสนอชื่อไปยังสภาเวทมนตร์ก็เป็นเพียงแค่ขั้นตอนหนึ่งเท่านั้น","แต่ในขณะนั้นเอง เกล็นก็ลุกขึ้นยืนและพูดขัดจังหวะ","“เดี๋ยวก่อน ปรมาจารย์ทุกท่าน”","“เจ้ามีทฤษฎีเวทมนตร์แปลกใหม่ที่อยากจะอธิบายเพิ่มเติมอีกงั้นหรือ?”","ลินน์เอ่ยถามด้วยความอยากรู้อยากเห็น","“ไม่ ไม่มีเลยขอรับ”","เกล็นส่ายหัว จากนั้นก็พูดอย่างลังเล","“ขอบคุณสำหรับการยอมรับของท่าน ปรมาจารย์ลินน์ แต่ข้าอยากจะรู้ว่าเกี่ยวกับอุปกรณ์แยกแสงและทฤษฎีแม่สีนี้ ท่านน่าจะรู้อยู่ก่อนแล้วใช่หรือไม่?”","ลินน์ลังเลอยู่ครู่หนึ่ง เขาไม่อยากทำลายความมั่นใจของเกล็นมากเกินไป แต่เขาก็รู้ดีว่าสิ่งที่เขาเพิ่งพูดไปนั้นมันเกินไปจริงๆ ดังนั้นเขาจึงอธิบายออกมาหลังจากที่ครุ่นคิดอยู่นาน","“เมื่อประมาณกว่าหนึ่งเดือนก่อน บังเอิญว่าข้าได้ทำการทดลองที่คล้ายคลึงกันตอนที่ยังอยู่ในอาณาจักร ดังนั้นข้าจึงมีความเข้าใจอยู่บ้าง”","เอล็อคและคนอื่นๆ ท่ามกลางผู้ชมต่างก็พยักหน้าอย่างพร้อมเพรียง พวกเขาต่างก็เห็นด้วยตาตัวเองว่าท่านศาสตราจารย์ลินน์ได้ใช้ปริซึมขนาดเล็กในการทำการทดลองแยกแสงแบบเดียวกันนี้เป๊ะๆ","“เป็นอย่างนี้นี่เอง...”","เกล็นดูผิดหวังเล็กน้อย","แม้ว่าลินน์จะพูดอย่างถ่อมตัวมาก แต่เขาก็เข้าใจได้โดยธรรมชาติว่าทฤษฎีทั้งสองนั้นได้รับการตรวจสอบโดยอีกฝ่ายล่วงหน้าไปแล้ว ในฐานะผู้คิดค้นแก้วขึ้นมา นี่จึงไม่ใช่เรื่องน่าแปลกใจเลย","“ในกรณีนี้ ข้าก็ไม่สามารถรับเหรียญตราจันทร์สีเงินนี้ได้ เกียรติยศนี้ควรจะเป็นของท่าน...”","เกล็นมีความรู้สึกลังเลอยู่บ้าง แต่ก็ยังคงกล่าวออกมาอย่างหนักแน่น","เขารู้ดีว่าในฐานะผู้ที่ได้รับเหรียญตราโคโรนา และเป็นดาวรุ่งแห่งวงการเวทมนตร์ที่เปล่งประกายที่สุดในดินแดนพ่อมด ลินน์อาจจะไม่ได้ใส่ใจกับการเสนอชื่อเข้ารับเหรียญตราจันทร์สีเงินเลย แต่เกล็นก็ไม่ต้องการการกุศลแบบนี้ มันจะเป็นความอัปยศมากกว่าที่จะเป็นเกียรติแก่สถาบันเวทมนตร์ของเขา...","ทันทีที่คำพูดเหล่านี้ถูกกล่าวออกมา พ่อมดแม่มดทุกคนที่อยู่ในเหตุการณ์ต่างก็ตกตะลึง และเพื่อนๆ ของเกล็นก็ถึงกับขยิบตาให้เขาบ่อยครั้ง เพื่อพยายามทำให้อีกฝ่ายถอนคำพูดเหล่านี้กลับไป","ต้องรู้ก่อนนะว่า นี่คือเหรียญตราจันทร์สีเงินเชียวนะ!","ในงานสัมมนาวิชาการเวทมนตร์ประจำปี โดยปกติแล้วจะมีเพียงแค่สามหรือห้าคนเท่านั้นที่สามารถคว้ารางวัลอันทรงเกียรตินี้ไปได้ ไม่เกินจริงเลยที่จะกล่าวว่าเมื่อมีเหรียญตรานี้ ไม่ว่าพวกเขาจะไปที่ไหน พวกเขาก็จะกลายเป็นจุดสนใจอย่างแน่นอน","แม้แต่อัจฉริยะในด้านการวิจัยทางวิชาการเหล่านั้น ก็อาจจะมีโอกาสได้รับการเสนอชื่อเพียงแค่ครั้งเดียวในชีวิต และหากพลาดไป พวกเขาก็อาจจะไม่ได้รับการเสนอชื่ออีกเลย!","บนโต๊ะของคณะกรรมการตัดสิน ราฟาเอลและคนอื่นๆ ต่างก็แสดงความชื่นชมออกมาทางสีหน้า แม้ว่าพวกเขาทุกคนจะเชื่อว่าเหรียญตราจันทร์สีเงินนั้นควรจะเป็นของปรมาจารย์ลินน์ แต่เมื่อพวกเขาเห็นเกล็นปฏิเสธมันอย่างเด็ดขาด พวกเขาก็ทั้งประหลาดใจและรู้สึกยินดีไปพร้อมๆ กัน","ซึ่งก็เคยมีเรื่องทำนองนี้เกิดขึ้นมาแล้วในอดีต ตัวอย่างเช่น ในงานสัมมนาเมื่อห้าปีก่อน บังเอิญมีสถาบันสามสถาบันที่กำลังทำการวิจัยเกี่ยวกับธาตุเดียวกัน และพวกเขาก็ล้วนแต่ได้รับผลลัพธ์การวิจัยที่ดี แต่ปัญหาเพียงอย่างเดียวก็คือ หลายทฤษฎีนั้นทับซ้อนกันมากเกินไป","แน่นอนว่าพวกเขาไม่สามารถมอบเหรียญตราจันทร์สีเงินให้กับทุกคนได้ เพียงเพื่อที่จะแย่งชิงการเสนอชื่อนี้ ทั้งสามสถาบันก็ได้ต่อสู้กันในพื้นที่ของงานสัมมนา ซึ่งก่อให้เกิดผลกระทบที่เลวร้ายอย่างยิ่ง","และทางเลือกของเกล็นก็ฉลาดกว่ามากอย่างไม่ต้องสงสัย หากเขาได้รับเหรียญตรานี้โดยขัดต่อมโนธรรมของตัวเองในครั้งนี้ เขาจะต้องดึงดูดเสียงวิพากษ์วิจารณ์อย่างแน่นอน","การปฏิเสธในตอนนี้กลับเป็นการเปิดกว้างวิสัยทัศน์แทน ราฟาเอลพอจะจินตนาการได้เลยว่าชื่อของเกล็นจะแพร่กระจายไปทั่วทั้งดินแดนพ่อมดพร้อมกับงานสัมมนาในครั้งนี้","ท้ายที่สุดแล้ว นี่ก็เป็นครั้งแรกที่มีคนปฏิเสธการเสนอชื่อเข้ารับเหรียญตราจันทร์สีเงิน!","ลินน์ที่นั่งอยู่บนที่นั่งของคณะกรรมการตัดสินเช่นกันก็รู้สึกพูดไม่ออกเล็กน้อย เขาไม่คาดคิดเลยว่าการชี้ให้เห็นถึงข้อบกพร่องในทฤษฎีของเกล็น จะทำให้อีกฝ่ายยอมล้มเลิกการเสนอชื่อโดยสมัครใจ","เห็นได้ชัดว่านี่เป็นครั้งแรกของข้าในการเป็นกรรมการตัดสิน และข้าก็ยังจับจังหวะได้ไม่ดีพอ...","ลินน์ทบทวนตัวเองอย่างเงียบๆ แน่นอนว่าเขารู้ทฤษฎีเหล่านี้มาตั้งนานแล้ว แต่ท้ายที่สุดแล้ว เขาก็แค่ยืนอยู่บนไหล่ของยักษ์ เมื่อเทียบกับเกล็นและคนอื่นๆ แล้ว พวกเขาต่างหากที่เป็นผู้บุกเบิกวิทยาศาสตร์เวทมนตร์ที่แท้จริง!","มันคงจะแย่มากหากไปทำลายความมั่นใจของคนเหล่านี้","เนื่องจากเขากังวลว่าจะไปทำร้ายความภาคภูมิใจในตัวเองของอีกฝ่าย ลินน์จึงไม่ได้ยืนกรานที่จะมอบรางวัลให้กับเกล็น แต่กลับกล่าวด้วยน้ำเสียงทุ้มลึก","“ทัศนศาสตร์เป็นวิชาที่ใหม่มาก แม้แต่สมาคมเวทมนตร์เร้นลับก็ยังไม่เข้าใจธรรมชาติของมันอย่างถ่องแท้ ดังนั้นพวกเราทุกคนจึงอยู่ในเส้นทางเดียวกัน ในเมื่อพวกเจ้าได้ทำการวิจัยเกี่ยวกับอุปกรณ์แยกแสงและแม่สีทั้งสามนี้แล้ว ทำไมไม่ลองค้นคว้าเรื่องนี้ต่อไปล่ะ?”","“นอกจากแสงที่มองเห็นได้ด้วยตาเปล่าอย่างเช่นแม่สีทั้งสามแล้ว มันยังมีแสงอีกมากมายหลายชนิดที่เรามองไม่เห็น ซึ่งมีหลากหลายประเภท แปลกประหลาด และคุ้มค่าที่จะสำรวจ...”","ลินน์พูดอย่างฉะฉาน เป็นการเตือนให้เกล็นนึกถึงทิศทางของการวิจัย","มันมีรังสีที่มองไม่เห็นอยู่มากมาย เช่น รังสีอินฟราเรด รังสีอัลตราไวโอเลต รังสีเอ็กซ์ หรือสิ่งที่เรียกว่า รังสีแอลฟา เบตา และแกมมา เป็นต้น ตราบใดที่มีการวิจัยเพียงแค่อย่างใดอย่างหนึ่งในรังสีเหล่านี้ การจะมอบเหรียญตราจันทร์สีเงินให้ก็ไม่ใช่เรื่องที่เกินจริงไปเลย","หากเกล็นสามารถศึกษาธรรมชาติของแสงด้วยเหตุนี้ได้ นับประสาอะไรกับเหรียญตราจันทร์สีเงินเล็กๆ แม้แต่เหรียญตราโคโรนา ซึ่งเป็นรางวัลทางวิชาการที่สูงที่สุดในดินแดนพ่อมด ก็ยังไม่เพียงพอที่จะยกย่องความสำเร็จของเขา!","เกล็นรับฟังคำอธิบายของลินน์อย่างจริงจัง เขาไม่เต็มใจที่จะรับเกียรติยศที่มาจากการให้ทาน แต่นั่นก็ไม่ได้หมายความว่าเขาต้องการที่จะปฏิเสธคำแนะนำของอีกฝ่าย งานวิจัยที่ยากลำบากทั้งหมดไม่ได้สูญเปล่าไปเสียทีเดียว","“ปรมาจารย์ลินน์ พวกเราไม่สามารถมองเห็นแสงเหล่านี้ได้ และไม่อาจรับรู้ได้ผ่านทางพลังจิตวิญญาณ แล้วพวกเราควรจะศึกษามันได้อย่างไรกัน?”","ในหอประชุม นักเล่นแร่แปรธาตุที่อยู่แถวหน้าจู่ๆ ก็เอ่ยถามขึ้นมา","ลินน์เตือนอย่างใจเย็น","“พวกเราสามารถวิเคราะห์ แยกแยะ และสรุปได้โดยการสังเกตคุณลักษณะของผลกระทบจากแสงเหล่านี้ที่มีต่อวัตถุ และหาวิธีสร้างอุปกรณ์เล่นแร่แปรธาตุที่ช่วยให้พวกเรามองเห็นและรับรู้ถึงพวกมันได้...”","“บางทีเวทแปรสภาพก็อาจจะเป็นทางเลือกที่ดีเช่นกัน!”","ซานเชซที่อยู่ด้านข้างก็เสนอแนะขึ้นมาเช่นกัน","ในฐานะปรมาจารย์แห่งเวทมนตร์สายแปรสภาพ โดยธรรมชาติแล้วซานเชซได้สังเกตเห็นว่าสิ่งมีชีวิตที่แตกต่างกันสามารถมองเห็นสีที่แตกต่างกันได้ ตัวอย่างเช่น โทรลล์ยักษ์ที่เขามักจะจำแลงกายนั้น เกิดมาพร้อมกับอาการตาบอดสี และมันก็มองเห็นสิ่งต่างๆ มากมายเป็นสีเทา สีขาว และสีดำ","เพียงแต่ว่าเขามักจะคิดมาตลอดว่าสมองของสิ่งมีชีวิตเหล่านี้ไม่สามารถแยกแยะสีได้ แต่ตอนนี้เขารู้แล้วว่ามันเป็นเพราะการขาดสิ่งที่เรียกว่าเซลล์รับแสง","“ถูกต้อง นั่นเป็นทิศทางที่ดีมาก!”","ลินน์พยักหน้าเห็นด้วย สิ่งมีชีวิตบางชนิดมีเซลล์รูปกรวยถึงสี่ชนิดในจอประสาทตา และพวกมันก็สามารถมองเห็นความถี่ของแสงได้มากกว่ามนุษย์มาก...","พลังของพ่อมดแม่มดนั้นอยู่ที่เวทมนตร์อันน่าอัศจรรย์ ซึ่งช่วยให้พวกเขาสามารถกลายร่างเป็นสิ่งมีชีวิตเหล่านี้และสังเกตพวกมันได้โดยตรง เมื่อเทียบกับการใช้เครื่องมือวิจัยทางวิทยาศาสตร์ต่างๆ เพื่อวัดค่าแล้ว นี่ก็ถือเป็นข้อได้เปรียบที่ไม่น้อยเลยทีเดียว!","เพียงแต่ในอดีต พวกเขาไม่ได้คิดไปในทิศทางนี้ ตอนที่ลินน์อ่านหนังสือเกี่ยวกับการแปรสภาพเมื่อไม่นานมานี้ มันมีระบุเอาไว้ว่า งูเกิดมาพร้อมกับเวทมนตร์การรับรู้ชนิดหนึ่ง ซึ่งสามารถสัมผัสถึงความร้อนได้ด้วยลิ้นของพวกมัน ซึ่งก็เป็นแค่รังสีอินฟราเรดเท่านั้น..."]},{"n":327,"t":"ค่าคงที่พื้นฐานของจักรวาล!","c":["มีการพูดคุยถกเถียงกันอย่างไม่ขาดสายในหอประชุม และพ่อมดแม่มดที่มีความเชี่ยวชาญในเวทมนตร์สายแปรสภาพก็รู้สึกตื่นเต้นเป็นพิเศษ เพราะลินน์และซานเชซนั้นได้ชี้ให้เห็นถึงทิศทางสำหรับการศึกษาด้านทัศนศาสตร์อย่างไม่ต้องสงสัย","ตราบใดที่สามารถใช้เวทแปรสภาพแปลงร่างเป็นสิ่งมีชีวิตบางชนิด ศึกษาความสามารถในการรับรู้แสงของพวกมัน หรือแม้แต่ชำแหละสิ่งที่เรียกว่าเซลล์รับแสง แล้วเขียนรายงานสรุปออกมา จะไม่ได้รับเหรียญตราดาวประกายพฤกษ์หรอกหรือ?","“ถ้ารู้เร็วกว่านี้ ข้าก็คงไปเรียนวิชาเวทสายแปรสภาพแล้ว!”","เอล็อคกล่าวพร้อมกับถอนหายใจ เขาถนัดวิชาธาตุและการเล่นแร่แปรธาตุมากกว่า ส่วนเวทมนตร์สายแปรสภาพก็แค่พอผ่านเกณฑ์เท่านั้น","น่าเสียดายที่เหรียญตราดาวประกายพฤกษ์ซึ่งควรจะได้มาง่ายที่สุด กำลังจะหลุดลอยไปจากข้าเสียแล้ว!","อย่างไรก็ตาม เพียร์ซซึ่งมีความเชี่ยวชาญในเวทมนตร์สายแปรสภาพก็รู้สึกเศร้าใจอย่างยิ่งเช่นกัน เพียงแค่มองไปรอบๆ ก็จะรู้ได้เลยว่ามีผู้คนมากมายที่กำลังแข่งขันกันเพื่อชิงเหรียญตรานี้ ภายในไม่กี่สัปดาห์ ทฤษฎีเวทมนตร์ที่เกี่ยวข้องก็จะหลั่งไหลเข้าไปเต็มสภาเวทมนตร์ และมันก็อาจจะไม่ถึงคิวของเขาก็เป็นได้","เกล็นและคนอื่นๆ บนแท่นสูงต่างก็มองหน้ากันด้วยความรู้สึกท้อแท้ พวกเขาไม่มีประสบการณ์ในเวทมนตร์สายแปรสภาพมากนัก และมันก็คงจะเป็นเรื่องยากที่จะตามความคืบหน้าของคนอื่นๆ ในการวิจัยเรื่องแสงที่มองไม่เห็นให้ทัน","ลินน์เองก็พิจารณาถึงความกระตือรือร้นที่มีต่อวิชาทัศนศาสตร์ของพ่อมดแม่มดที่ไม่ได้อยู่ในภาคเวทมนตร์สายแปรสภาพเหล่านี้ เขาหยุดไปครู่หนึ่งแล้วจึงกล่าวต่อ","“นอกจากการค้นหารังสีที่มองไม่เห็นเหล่านั้นแล้ว พวกท่านยังสามารถเริ่มต้นการวิจัยจากอีกแง่มุมหนึ่งได้... เช่น การวัดความเร็วของแสง!”","วัดความเร็วของแสงงั้นหรือ?","ราฟาเอลและคนอื่นๆ ต่างก็ผงะไปครู่หนึ่ง โดยธรรมชาติแล้ว มีผู้คนมากมายที่สนใจในสิ่งมหัศจรรย์ที่อยู่ทุกหนทุกแห่งอย่างแสง แต่พวกเขาไม่สามารถรับรู้ถึง ‘ธาตุแสง’ ได้ ดังนั้น มันจึงเป็นเรื่องยากที่จะสังเกตและทำการวัดค่ามัน","เมื่อสิบกว่าปีก่อน ประธานสภาออโรร่า ได้ทำการทดลองโดยให้พ่อมดคนหนึ่งอยู่ห่างจากนางไปหนึ่งกิโลเมตร จากนั้นก็ใช้เวทมนตร์เพื่อสะท้อนแสงไปยังอีกคนหนึ่ง และความเร็วของแสงก็ถูกวัดจากเวลาที่แสงเดินทางไปถึง","แต่สิ่งนี้มีความเร็วสูงมากจนแม้แต่ความเร็วในการตอบสนองของพ่อมดระดับตำนานก็ไม่สามารถตรวจจับความแตกต่างเพียงเล็กน้อยนี้ได้ ในท้ายที่สุด แม่มดระดับตำนานผู้นี้ก็ทำได้เพียงแค่คาดเดาว่าความเร็วของแสงอาจจะเกิน 1,000 กิโลเมตรต่อวินาที และจำเป็นต้องทำการวัดจากระยะทางที่ไกลกว่านี้","แต่นี่ก็ก่อให้เกิดปัญหาที่สองตามมา นั่นก็คือแสงจะเกิดการกระเจิง และหากระยะทางไกลเกินไป แสงที่ส่งออกไปก็จะอ่อนลงเรื่อยๆ ทำให้ไม่สามารถวัดค่าได้แม่นยำยิ่งขึ้น...จนถึงขั้นมีบางคนสงสัยว่าแสงนั้นคงสามารถเดินทางไปถึงเป้าหมายได้ในพริบตา!","อย่างไรก็ตาม การทดลองนี้กลับได้รับผลพลอยได้ที่ไม่คาดคิด นั่นก็คือมันประสบความสำเร็จในการวัดความเร็วในการแพร่กระจายของเสียงว่าอยู่ระหว่าง 300 ถึง 400 เมตรต่อวินาที และมันก็จะผันผวนไปตามพื้นที่ที่แตกต่างกัน...","ซานเชซอธิบายให้ลินน์ฟังอย่างละเอียดเกี่ยวกับการทดลองวัดความเร็วแสงที่ประธานสภาออโรร่าเคยทำไว้","หนึ่งกิโลเมตร?","มันใกล้เกินไปจริงๆ และก็ยังขาดอุปกรณ์ที่เป็นมืออาชีพมากกว่านี้ ดังนั้น มันจึงเป็นเรื่องปกติที่จะล้มเหลว...","ลินน์เองก็ยังไม่รู้ความเร็วของแสงที่แน่นอนในโลกใบนี้...แต่มันต้องไม่ช้าเกินไปอย่างแน่นอน ตามข้อมูลจากชาติที่แล้วของเขา ระยะทางหนึ่งกิโลเมตรนั้นใช้เวลาเพียงแค่เศษหนึ่งส่วนแสนของวินาที ต่อให้จะเป็นพ่อมดระดับตำนาน ก็ไม่สามารถวัดค่ามันโดยอาศัยเพียงแค่ความเร็วในการตอบสนองได้","ลินน์ครุ่นคิดอยู่ครู่หนึ่ง แล้วจึงมองไปที่พ่อมดแม่มดในงานสัมมนา","“ข้ามีแนวคิดบางอย่างเกี่ยวกับการวัดความเร็วของแสงแล้ว แต่ข้ายังไม่ได้ตรวจสอบความถูกต้องของมัน มันต้องใช้เวลาเตรียมการสักสองสามวัน น่าจะเป็นหลังจากที่งานสัมมนาจบลง และก็ไม่อาจตัดความเป็นไปได้ที่จะล้มเหลวออกไปได้ ในช่วงเวลานี้ หากใครสามารถวัดความเร็วของแสงได้อย่างแม่นยำแล้วล่ะก็ ข้าก็จะเสนอให้สภาเวทมนตร์มอบเหรียญตราจันทร์สีเงินให้แก่เขา!”","“เหรียญตราจันทร์สีเงินงั้นหรือ? ปรมาจารย์ลินน์ นี่มันไม่พูดเกินจริงไปหน่อยหรือ?”","ซานเชซรีบพูดแทรกขึ้นมา","เพราะเงื่อนไขในการมอบเหรียญตราจันทร์สีเงินนั้นมีอยู่สองข้อ ข้อแรกคือต้องเสนอทฤษฎีที่สามารถเปลี่ยนแปลงระบบเวทมนตร์กระแสหลักบางอย่างได้","และในงานสัมมนาครั้งก่อน ตอนที่ลินน์เสนอทฤษฎีกฎแรงโน้มถ่วงสากล พวกเขาก็วางแผนที่จะมอบเหรียญตราจันทร์สีเงินให้กับเขา","เพียงแต่ ประธานสภาอย่างแฮร์รอฟสามารถโต้แย้งทุกความคิดเห็นได้ นอกจากนี้ ลินน์ยังได้คำนวณความเร็วของดาวเคราะห์ที่อยู่ใต้เท้าของเขา และใช้การทดลองเพื่อพิสูจน์ว่าดาวเคราะห์ดวงนี้หมุนและโคจรรอบดวงอาทิตย์อยู่ตลอดเวลา ซึ่งเป็นการลบล้างโลกทัศน์ของทุกคน ด้วยเหตุนี้ เขาจึงได้รับเหรียญตราโคโรนาอันทรงเกียรติมากยิ่งกว่ามาครอบครอง!","ข้อที่สองคือต้องสร้างคุณูปการอันใหญ่หลวงต่อดินแดนพ่อมดหรือสภาเวทมนตร์","แต่ตอนนี้มันเป็นเพียงแค่การวัดความเร็วของแสง ไม่ใช่การวิเคราะห์ถึงธรรมชาติของแสง เขาคิดว่าเหรียญตราดาวประกายพฤกษ์ก็เพียงพอแล้ว...","“ข้าไม่คิดว่ามันเป็นเรื่องเกินจริงเลย พ่อมดระดับตำนานในสมาคมเวทมนตร์เร้นลับ เคยกล่าวไว้ว่า เมื่อเทียบกับทัศนศาสตร์แล้ว ทฤษฎีเวทมนตร์ที่มีอยู่ในปัจจุบันนั้นเรียกได้ว่าเรียบง่ายหรือแม้กระทั่งหยาบ มันเป็นเพียงแค่การขยายความของปรากฏการณ์ในระดับมหภาคเท่านั้น ซึ่งทัศนศาสตร์นั้น เป็นหนึ่งในกุญแจสำคัญที่สุดในการเปิดเผยโลกแห่งความเป็นจริงในระดับจุลภาค!”","ลินน์กล่าวอย่างหนักแน่น","ความเร็วของแสงนั้นแตกต่างจากความเร็วของเสียง แรงต้านของอากาศ และแรงโน้มถ่วง ซึ่งจะเปลี่ยนแปลงไปเมื่อเปลี่ยนดาวเคราะห์","มันมีธรรมชาติแบบเดียวกับค่าคงที่แรงโน้มถ่วงที่ลินน์เคยวัดไว้ก่อนหน้านี้ เช่นเดียวกับศูนย์สัมบูรณ์ที่ยังไม่เคยวัด ค่าคงที่ฮับเบิล ค่าคงที่พลังค์ และอื่นๆ...","ค่าเหล่านี้ไม่ได้จำกัดอยู่เพียงแค่ดาวเคราะห์ดวงเดียว แต่มันเป็นกฎของวัตถุที่ผ่านไปทั่วทั้งจักรวาล...อย่างน้อยภายในขอบเขตการมองเห็นและการรับรู้ของมนุษย์ พวกมันก็ไม่มีวันเปลี่ยนแปลง!","และความเร็วของแสงก็มีความสำคัญเป็นพิเศษ และสูตรที่มีชื่อเสียงมากมายนั้นยังไม่อาจแยกออกจากค่าคงที่นี้เลย!","ตัวอย่างหนึ่งก็คือสมการมวล-พลังงานอันโด่งดัง E=mc^2!","E ทางด้านซ้ายหมายถึงพลังงาน m ทางด้านขวาหมายถึงมวล และ c คือความเร็วของแสง สูตรนี้มีความลึกลับของการแปลงสภาพระหว่างมวลและพลังงานซ่อนอยู่ ไม่ว่าจะเป็นการระเบิดของนิวเคลียร์หรือการทำลายล้างของปฏิสสารที่ทรงพลังยิ่งกว่า คุณก็สามารถใช้สูตรนี้ในการคำนวณมันได้!","แน่นอนว่า ยังคงมีเครื่องหมายคำถามว่าทฤษฎีความเร็วแสงคงที่นั้นเป็นเรื่องธรรมดาในโลกใบนี้หรือไม่ และสิ่งเหล่านี้ล้วนจำเป็นต้องได้รับการตรวจสอบโดยการทดลอง","ลินน์ต้องการที่จะคำนวณค่าคงที่พื้นฐานเหล่านี้มาโดยตลอด แต่ก่อนหน้านี้เขาทุ่มเทพลังงานส่วนใหญ่ไปกับสงครามในอาณาจักร ดังนั้นเขาจึงผัดวันประกันพรุ่งมาเรื่อยๆ","อาจกล่าวได้ว่า การเริ่มต้นจากการศึกษาด้านทัศนศาสตร์ได้ทำให้พวกเขาเปิดมุมมองหนึ่งของโลกแห่งความเป็นจริง จากสาขาในระดับมหภาคที่มีระเบียบแบบแผน ไปสู่สาขาในระดับจุลภาคที่วุ่นวายและแปลกประหลาด","แม้แต่สหพันธ์ในชาติที่แล้ว ก็ยังล้มเหลวในการศึกษาทฤษฎีควอนตัมอย่างถ่องแท้ แต่แม้เพียงความสำเร็จเล็กๆ น้อยๆ ก็เพียงพอที่จะบรรลุความสำเร็จอันยิ่งใหญ่อย่างเช่นการเดินทางข้ามดวงดาวได้แล้ว...","คำพูดที่ตรงไปตรงมาจนเกินไปของลินน์ ทำให้พ่อมดแม่มดที่อยู่ในเหตุการณ์รู้สึกยอมรับไม่ได้อยู่บ้าง ดินแดนพ่อมดได้พัฒนาเวทมนตร์มาเป็นเวลานับหลายร้อยปี แต่มันกลับถูกอีกฝ่ายอธิบายว่าเรียบง่ายและหยาบกระด้าง มันดูจะเป็นเรื่องที่น่าตื่นตระหนกไปสักหน่อย!","“ท่านระดับตำนานแห่งสมาคมเวทมนตร์เร้นลับผู้นี้ คงจะต้องเสียสติไปแล้วแน่ๆ ตอนที่เขากำลังศึกษาเรื่องแสง?”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งในกลุ่มผู้ชมเย้ยหยันและกล่าวขึ้น เขารู้สึกไม่พอใจเป็นอย่างมากกับคำพูดของลินน์ที่ดูถูกทฤษฎีเวทมนตร์ที่มีอยู่ในปัจจุบัน แม้ธาตุแสงนั้นจะมีความมหัศจรรย์อย่างแน่นอน แต่อย่างดีที่สุด มันก็เป็นเพียงแค่อิฐก้อนหนึ่งที่ประกอบขึ้นเป็นสิ่งก่อสร้างทางเวทมนตร์เท่านั้น...","หลังจากผ่านการพัฒนาและปรับปรุงมาหลายทศวรรษ ทฤษฎีธาตุแสงในดินแดนพ่อมดก็ได้สร้างกรอบการทำงานทั่วไปขึ้นมาแล้ว เพียงแต่มันยังไม่ผ่านการตรวจสอบขั้นสุดท้ายก็เท่านั้น"]},{"n":328,"t":"แผนการใหญ่กระจกพันบานเพื่อวัดความเร็วแสง!","c":["ลินน์ได้ยินการพูดคุยถกเถียงและข้อสงสัยของทุกคน แต่เขาไม่ได้รีบร้อนที่จะโต้แย้ง ท้ายที่สุดแล้ว การทดลองก็ทรงพลังยิ่งกว่าคำพูด!","เมื่อเห็นว่าบรรยากาศในลานเริ่มตึงเครียด ราฟาเอลจึงรีบเอ่ยปากเพื่อคลี่คลายสถานการณ์","“เกี่ยวกับหัวข้อวิธีการวัดความเร็วของแสงและทฤษฎีธาตุแสง เอาไว้พวกเราค่อยไปหารือกันเป็นการส่วนตัวหลังจากที่งานสัมมนาในวันนี้สิ้นสุดลงก็แล้วกัน เวลาของเรามีจำกัด และตอนนี้เราจะเข้าสู่รายการต่อไป...”","เกล็นและคนอื่นๆ โค้งคำนับและเดินออกจากสนามไปพร้อมกับอุปกรณ์แยกแสง ประมาณสองนาทีต่อมา พ่อมดอีกคนก็เดินขึ้นมาบนเวทีเพื่อแสดงผลการวิจัยของเขาให้ทุกคนได้เห็น ซึ่งก็คือซากของไฮดราและรายงานการวิจัยที่เกี่ยวข้อง!","สิ่งนี้มีค่ามากอย่างไม่ต้องสงสัย เพราะจำนวนของไฮดราในดินแดนพ่อมดนั้นมีอยู่น้อยมาก ดังนั้นจึงไม่มีรายงานการชำแหละสัตว์ประหลาดชนิดนี้อย่างละเอียดมาก่อน","หากพ่อมดสายแปรสภาพต้องการที่จะแปลงร่างเป็นสิ่งมีชีวิตชนิดใดชนิดหนึ่งอย่างสมบูรณ์ ขั้นตอนแรกก็คือการทำความเข้าใจโครงสร้างของสิ่งมีชีวิตชนิดนั้นอย่างถ่องแท้ การแปลงร่างเป็นสิ่งมีชีวิตเวทมนตร์นั้นยากยิ่งกว่า เมื่อพูดถึงเซลล์เวทมนตร์ แม้แต่พ่อมดเต็มตัวก็สามารถเลือกสิ่งมีชีวิตเวทมนตร์เพื่อแปลงร่างได้เพียงชนิดเดียวเท่านั้น","“ดีมาก แต่งานวิจัยของเจ้าพลาดสิ่งสำคัญไปอย่างหนึ่ง นั่นก็คือไฮดรามีหลายหัว ทันทีที่พ่อมดเลือกที่จะใช้เวทแปรสภาพกับสิ่งมีชีวิตชนิดนี้ เขาจะต้องเผชิญกับความเสี่ยงที่ไม่รู้จัก มันอาจจะทำให้วิญญาณถูกแบ่งแยกออกไป...”","ซานเชซกล่าวด้วยน้ำเสียงหนักแน่นขณะมองดูรายงานในมือของเขา","อย่างไรก็ตาม แม้ว่ามันจะมีความเสี่ยง แต่นี่ก็เป็นลักษณะพิเศษของไฮดราเช่นกัน ความสามารถในการงอกใหม่ของสิ่งนี้นั้นน่าเหลือเชื่อเป็นอย่างมาก แม้ว่าหัวของมันจะถูกตัดขาด แต่มันก็สามารถงอกหัวใหม่ขึ้นมาได้ ประสิทธิภาพในการต่อสู้นั้นน่าประทับใจมาก พ่อมดสายแปรสภาพจะมีตัวเลือกในการแปลงร่างเป็นสิ่งมีชีวิตเวทมนตร์เพิ่มขึ้นมาอีกหนึ่งอย่าง","เมื่อคิดได้เช่นนี้ ซานเชซจึงขอให้เขาทำการวิจัยเชิงลึกต่อไป หากเขาสามารถแก้ไขความเสี่ยงในการแปรสภาพ หรือไขความลับของการงอกใหม่แบบไร้ขีดจำกัดของไฮดราได้ เขาก็จะเสนอชื่อให้อีกฝ่ายได้รับเหรียญตราดาวประกายพฤกษ์อย่างแน่นอน...","พ่อมดที่ได้รับการยอมรับจากซานเชซดูมีความสุขมาก และเขาก็รีบมองไปที่จอมเวทผู้ยิ่งใหญ่คนอื่นๆ","ความเข้าใจในวิชาแปรสภาพของลินน์ยังอยู่ในช่วงเริ่มต้น และมันก็ไม่อาจเทียบได้กับปรมาจารย์ด้านการแปรสภาพอย่างซานเชซ เขาทำได้เพียงแค่ให้คำแนะนำเกี่ยวกับการชำแหละและการเก็บรักษาซากศพในมุมมองทางชีววิทยาเท่านั้น","กรรมการตัดสินที่เหลือก็พูดเสริมขึ้นมาเช่นกัน ราฟาเอลไม่เห็นด้วยอย่างยิ่งกับการพัฒนาเวทแปรสภาพของไฮดรา ท้ายที่สุดแล้ว การแบ่งจิตสำนึกออกเป็นหลายหัวนั้นก็เป็นเรื่องที่น่าขนลุกเมื่อคิดถึงมัน และมันก็อาจจะทำให้เกิดความเสียหายทางจิตวิญญาณที่ไม่อาจซ่อมแซมได้","แต่โดยทั่วไปแล้ว มีหลายคนที่เห็นด้วยกับการตัดสินใจของซานเชซ หากเขาสามารถศึกษาต่อไปและได้ผลลัพธ์ที่เข้มงวดมากยิ่งขึ้น พวกเขาก็จะไม่ลังเลที่จะเสนอชื่อเขาต่อสภาเวทมนตร์","“ดูเหมือนว่าจะมีผู้ที่ได้รับเหรียญตราดาวประกายพฤกษ์หลายคนในงานสัมมนาวิชาการวันนี้...”","ราฟาเอลกล่าวด้วยความรู้สึกทึ่งขณะมองดูพ่อมดเดินลงจากแท่น","เขาไม่ได้เห็นเหตุการณ์ที่ยิ่งใหญ่เช่นนี้มานานหลายทศวรรษแล้ว ดูเหมือนว่าการที่ลินน์ได้รับเกียรติยศสูงสุดในแวดวงวิชาการเมื่อปีที่แล้ว จะเป็นแรงบันดาลใจให้เกิดกระแสการวิจัยขึ้นในหมู่พ่อมดแม่มด","อย่างไรก็ตาม ราฟาเอลได้ปักธงเอาไว้อย่างไม่ต้องสงสัย หลังจากที่เขาพูดจบ ก็ไม่มีทฤษฎีใหม่หรือสิ่งประดิษฐ์ใหม่ใดๆ ที่ดึงดูดสายตาของพวกเขาได้เลยตลอดทั้งช่วงบ่าย","ลินน์เองก็รู้สึกผิดหวังมากเช่นกัน พ่อมดคนหนึ่งเดินขึ้นมาและบอกว่าเขาได้ค้นพบความลึกลับของธาตุ ซึ่งเพียงพอที่จะล้มล้างระบบธาตุที่มีอยู่","ด้วยบทเรียนจากเกล็น ลินน์จึงไม่ได้โต้แย้งอย่างตรงไปตรงมา แต่เขากลับเลือกที่จะชี้ให้เห็นถึงช่องโหว่ในทฤษฎีอย่างแนบเนียนที่สุดเท่าที่จะทำได้ และยกย่องจิตวิญญาณของอีกฝ่ายที่กล้าตั้งคำถามต่อผู้มีอำนาจ","จนกระทั่งถึงช่วงเย็น งานสัมมนาก็ได้สิ้นสุดลง และพ่อมดแม่มดเกือบทุกคนที่เดินออกมาจากหอประชุมก็กำลังพูดคุยกันถึงการทดลองวัดความเร็วแสงที่ลินน์พูดถึง","ช่วยไม่ได้ เหรียญตราจันทร์สีเงินนั้นดึงดูดใจเป็นอย่างมาก ถึงแม้ว่าจอมเวทผู้ยิ่งใหญ่หลายคนอาจจะไม่สามารถได้รับเกียรติยศเช่นนี้ก็ตาม!","บางคนถึงกับคิดไปในทางร้ายว่า หรือปรมาจารย์ลินน์จะต้องการครอบครองเหรียญตราจันทร์สีเงินอีกเหรียญให้กับตัวเองกันแน่ นั่นเป็นเหตุผลที่เขาจงใจทำให้ทัศนศาสตร์มีความสำคัญมากขนาดนี้","เพียงแต่ว่าการคาดเดาเช่นนั้นเห็นได้ชัดว่าไม่มีน้ำหนักเลย เพราะในงานสัมมนาวันนี้ ปรมาจารย์ลินน์ได้ค้นคว้าทฤษฎีแม่สีทั้งสามสำเร็จไปแล้ว แต่เขาก็ยังคงเต็มใจที่จะเสนอชื่อเกล็น... หากเขาเป็นคนที่ให้ความสำคัญกับเกียรติยศอย่างมากแล้วล่ะก็ มันเป็นไปไม่ได้เลยที่เขาจะยอมยกสิ่งที่คู่ควรกับเหรียญตราดาวประกายพฤกษ์ให้คนอื่นไปง่ายๆ","“เกล็น เจ้าคิดออกหรือยังว่าจะวัดความเร็วของแสงได้อย่างไร?”","ที่ด้านนอกประตู แม่มดหน้าตาจิ้มลิ้มคนหนึ่งมองไปที่เกล็นและกล่าวด้วยใบหน้าเศร้าหมอง พร้อมกับน้ำเสียงที่แฝงไปด้วยความไม่พอใจเล็กน้อย","“เมื่อครู่นี้เจ้าไม่ควรปฏิเสธความหวังดีของปรมาจารย์ลินน์เลยนะ นั่นมันเป็นสิ่งที่เจ้าใช้เวลาค้นคว้ามาหลายเดือนเชียวนะ”","เกล็นกล่าวอย่างจนใจ","“แนนซี่ ทุกคนที่อยู่ในงานเมื่อครู่นี้ก็เห็นว่าปรมาจารย์ลินน์ได้ค้นพบทฤษฎีเหล่านี้มาตั้งนานแล้ว ข้าไม่ได้เป็นผู้คิดค้นเลยแม้แต่น้อย หากข้าได้รับเหรียญตราดาวประกายพฤกษ์เพราะเรื่องนี้ ข้าเกรงว่าข้าคงจะถูกวิพากษ์วิจารณ์อย่างหนักแน่”","“มันก็แค่พวกขี้อิจฉาบางคนพูดจาไร้สาระเท่านั้นแหละ การได้รับเหรียญตราดาวประกายพฤกษ์ต่างหากที่สำคัญ...”","แม่มดที่ชื่อแนนซี่เบ้ปาก นางยังคงรู้สึกไม่พอใจอยู่บ้าง","เกล็นส่ายหัว เขาไม่ได้โต้เถียงต่อไป แต่เปลี่ยนเรื่องและปั้นหน้าขรึมก่อนจะพูดขึ้น","“ส่วนเรื่องวิธีวัดความเร็วของแสง... ข้าคิดว่าเราสามารถทำตามวิธีของท่านออโรร่าได้”","“แต่การทดลองของท่านประธานสภามันล้มเหลวไม่ใช่หรือ?”","แนนซี่ถามด้วยความสงสัย","“นั่นเป็นเพราะระยะทางมันยังไม่ไกลพอต่างหาก!”","เกล็นกล่าวอย่างหนักแน่น","“ตราบใดที่เพิ่มระยะทางขึ้นสิบเท่า หรือแม้แต่ร้อยเท่า มันก็จะใช้ได้อย่างแน่นอน นี่เป็นวิธีที่โง่เขลาที่สุดและรวดเร็วที่สุด!”","ร้อยเท่า... นั่นหมายความว่าต้องอยู่ห่างออกไปอย่างน้อยหนึ่งร้อยกิโลเมตร แล้วยังจะมองเห็นแสงได้อยู่อีกหรือ?","แนนซี่พึมพำกับตัวเอง","เกล็นรีบอธิบายแนวคิดของเขา ก่อนหน้านี้เขาได้ใช้หลักการขยายและย่อส่วนของกระจกเว้า-นูน เพื่อพัฒนาเวทมนตร์เล็กๆ ในการรวมแสง ซึ่งมันสามารถรวบรวมแสงให้กลายเป็นแสงจ้าที่เจิดจ้ามากยิ่งขึ้นได้","ด้วยวิธีนี้ แม้ว่าแสงจะกระเจิงเมื่อเดินทางเป็นระยะทางไกล มันก็น่าจะสามารถรักษาความเข้มของแสงที่สามารถมองเห็นได้ด้วยตาเปล่าเอาไว้ได้","ส่วนวิธีที่จะทำให้ได้ระยะทาง 100 กิโลเมตรนั้น แนวคิดของเขาก็คือการปล่อยให้แสงสะท้อนไปมาอย่างไม่หยุดหย่อน!","กระจกหนึ่งบานห่างกัน 100 เมตร กระจกสิบบานคือหนึ่งกิโลเมตร กระจกร้อยบานคือสิบกิโลเมตร และกระจกหนึ่งพันบานก็คือหนึ่งร้อยกิโลเมตร!","ตามที่ท่านออโรร่าคาดเดาเอาไว้ ความเร็วของแสงคือ 1,000 กิโลเมตรต่อวินาที และมันก็ใช้เวลา 0.1 วินาทีในการเดินทางตลอดระยะทาง ด้วยความเร็วในการตอบสนองของพ่อมด ความแม่นยำระดับนี้ก็พอจะตัดสินได้อย่างเฉียดฉิว...","“กระจกหนึ่งพันบาน”","แนนซี่เดาะลิ้น นางชื่นชมเกล็นที่คิดแผนการอันยิ่งใหญ่เช่นนี้ได้ แต่แล้วนางก็ลังเลอีกครั้ง","“ของแบบนี้มันไม่ถูกเลยนะ...”","กระจกบานหนึ่งมีราคาตั้งหลายเหรียญทองเวทมนตร์ พวกเขาไม่สามารถจ่ายเงินจนหมดตัวเพื่อซื้อมันมาได้หรอก!","“ดังนั้นเราก็ทำได้แค่ยืมมาเท่านั้นแหละ!”","เกล็นยักไหล่ เพื่อให้การทดลองของเขาดำเนินไปอย่างราบรื่น เขาทำได้เพียงแค่ต้องบากหน้าไปขอยืมมา"]},{"n":329,"t":"ดูเหมือนว่าปรมาจารย์ลินน์จะคำนวณพลาดเสียแล้วในครั้งนี้!","c":["ในขณะที่พ่อมดแม่มดแห่งนครกรีนรีลกำลังศึกษาวิธีการวัดความเร็วของแสง การสนทนาหนึ่งก็กำลังดำเนินอยู่ในคฤหาสน์ของประธานสภาระดับตำนานอย่างแฮร์รอฟเช่นกัน","“ทฤษฎีเวทมนตร์ที่มีอยู่ในดินแดนพ่อมดนั้นหยาบกระด้างมาก... เขาพูดแบบนั้นจริงๆ งั้นหรือ?”","หลังจากที่ได้ฟังคำบอกเล่าของออโรร่า แฮร์รอฟก็ขมวดคิ้วอย่างอดไม่ได้ คำพูดของลินน์นั้นถือเป็นการยั่วยุต่อดินแดนพ่อมดทั้งหมดอย่างไม่ต้องสงสัย","และมันยังเป็นการไม่เคารพอย่างยิ่งต่อเหล่าผู้บุกเบิกที่ทำงานอย่างหนักเพื่อพัฒนาและศึกษาเวทมนตร์ แม้ว่าพวกเขาจะมีความรู้ที่ไม่ธรรมดา แต่พวกเขาก็ไม่ควรจะเย่อหยิ่งถึงเพียงนี้","“ไม่ ข้าไม่คิดว่าเขาหมายถึงแค่ดินแดนพ่อมดหรอก ทฤษฎีเวทมนตร์ที่ได้รับการวิจัยโดย [สมาคมเวทมนตร์เร้นลับ] เองก็ไม่มีข้อยกเว้นเช่นกัน พวกมันทั้งหมดล้วนดูหยาบกระด้างอย่างยิ่งเมื่ออยู่ต่อหน้าทัศนศาสตร์...”","ออโรร่าอธิบาย และในขณะเดียวกันนางก็นึกย้อนไปถึงสิ่งที่ลินน์พูดในงานสัมมนา","ทัศนศาสตร์เป็นกุญแจสำคัญที่สุดในการเปิดเผยโลกแห่งความเป็นจริงในระดับจุลภาค...","โลกแห่งความเป็นจริงที่ว่านี้ หมายถึงอะไรกันแน่?","หรือว่าโลกที่พวกเขามองเห็นอยู่ในตอนนี้ จะเป็นสิ่งจอมปลอมงั้นหรือ?","ออโรร่าครุ่นคิดด้วยความสับสน นางไม่อาจเข้าใจความหมายของคำพูดเหล่านี้ได้อย่างถ่องแท้","แฮร์รอฟเองก็จมอยู่ในห้วงความคิดเช่นกัน จากการติดต่อกันก่อนหน้านี้และทฤษฎีแปลกใหม่ต่างๆ ที่ลินน์เสนอขึ้นมา ทำให้เห็นได้ชัดว่า [สมาคมเวทมนตร์เร้นลับ] มีความเข้าใจเกี่ยวกับเวทมนตร์และโลกใบนี้ลึกซึ้งยิ่งกว่าพวกเขามาก","หากคำพูดเหล่านี้ไม่ได้เป็นการจงใจเยาะเย้ยหรือความเย่อหยิ่ง มันก็คุ้มค่าที่จะสำรวจว่าแสงที่อยู่ทุกหนทุกแห่งนั้นมีความลับแบบใดซ่อนอยู่ ถึงได้คู่ควรกับการประเมินเช่นนี้...","แฮร์รอฟอยากจะเข้าร่วมการชุมนุมของพ่อมดระดับตำนานอีกครั้งและเอ่ยปากถามด้วยตัวเอง แต่น่าเสียดายที่จนถึงตอนนี้เขาก็ยังไม่ได้รับคำเชิญอีกเลย","แม้ว่าแฮร์รอฟ ซึ่งเป็นเจ้าของ [แหวนแห่งเวทลับ] จะมีสิทธิ์ในการจัดการชุมนุมของคนอื่นๆ ด้วยเช่นกัน แต่ดูเหมือนว่าเขาจะกระตือรือร้นมากเกินไป สิ่งสำคัญที่สุดก็คือเขายังไม่สามารถทำความเข้าใจทฤษฎีบิ๊กแบงได้ และเขาก็ยังไม่สามารถค้นคว้าทฤษฎีแปลกใหม่เพื่อให้กลุ่มตำนานได้สำรวจออกมาได้เลย","เมื่อคิดถึงเรื่องนี้ แฮร์รอฟก็พอจะเข้าใจเลือนรางว่าทำไมการชุมนุมของพ่อมดระดับตำนานจึงยังไม่ถูกจัดขึ้น มันเป็นเรื่องปกติที่การวิจัยเวทมนตร์จะต้องใช้เวลาเจ็ดหรือแปดปี หรือแม้แต่สิบปีจึงจะเกิดผลลัพธ์ งานสัมมนาวิชาการปีละครั้งของดินแดนพ่อมดก็นับว่าจัดขึ้นบ่อยมากแล้ว","“ดูเหมือนว่าพวกเราจะต้องให้ความสนใจกับการศึกษาด้านทัศนศาสตร์ให้มากขึ้นเสียแล้ว”","สีหน้าของแฮร์รอฟกลายเป็นเคร่งขรึมอย่างยิ่ง จากนั้นเขาก็มองไปที่ออโรร่าและเอ่ยถามด้วยความอยากรู้อยากเห็น","“เจ้าสามารถวัดความเร็วของแสงได้หรือไม่?”","ออโรร่าคือผู้ที่มีความเข้าใจด้านทัศนศาสตร์ลึกซึ้งที่สุดในหมู่พวกเขา หากนางไม่สามารถทำได้ ดินแดนพ่อมดทั้งหมดก็อาจจะไม่สามารถวัดความเร็วของแสงได้เช่นกัน","“ข้าคิดว่าเราสามารถเริ่มต้นที่ดาราศาสตร์ได้!”","ออโรร่ากล่าวด้วยน้ำเสียงทุ้มลึก","สิ่งที่ยากที่สุดในการวัดความเร็วแสงคืออะไร? แน่นอนว่าความเร็วของแสงนั้นรวดเร็วจนน่าเหลือเชื่อ และพวกเขาก็ไม่สามารถหาสถานที่ที่ใหญ่พอสำหรับการทดลองได้ อีกทั้งยังเป็นเรื่องยากที่จะสร้างแสงที่สว่างมากพอให้ครอบคลุมระยะทางหลายพันกิโลเมตร","และเมื่อพูดถึงระยะทางอันกว้างใหญ่ไพศาล แน่นอนว่ามันย่อมต้องเป็นท้องฟ้าที่เต็มไปด้วยดวงดาวในจักรวาล!","ตามข้อมูลที่พวกเขาคำนวณเมื่อปีที่แล้ว เส้นผ่านศูนย์กลางของดาวเคราะห์ทั้งดวงนั้นมีขนาดหลายหมื่นกิโลเมตร และระยะห่างระหว่างดาวเคราะห์ก็ยิ่งไกลออกไปอีก สิ่งสำคัญที่สุดก็คือดวงอาทิตย์ที่อยู่เหนือหัวของพวกเขานั้นเป็นวัตถุเรืองแสงที่มีขนาดใหญ่มาก ตราบใดที่รู้ระยะห่างระหว่างทั้งสองฝ่าย จะไม่สามารถวัดความเร็วของแสงได้หรอกหรือ?","“วิธีนี้ดีมาก!”","แฮร์รอฟกล่าวด้วยความชื่นชม แต่ไม่นานเขาก็หยุดชะงักไปราวกับคิดอะไรบางอย่างขึ้นมาได้","“ไม่ ไม่สิ วินาทีที่เรามองเห็นดวงอาทิตย์ แสงก็เดินทางมาถึงแล้ว และมันก็ไม่มีวิธีใดที่จะวัดความเร็วของแสงได้เลย”","ตามที่ลินน์กล่าว ทุกสิ่งที่พวกเขามองเห็นนั้นคือการสะท้อนของแสง ก่อนที่แสงจะเดินทางมาถึงพวกเขา พวกเขาก็ไม่สามารถมองเห็นดวงอาทิตย์ได้เลย แล้วจะใช้มันเป็นจุดอ้างอิงได้อย่างไร?","ออโรร่าก็ขมวดคิ้วเช่นกัน นางไม่เคยพิจารณาเรื่องนี้มาก่อน แต่หลังจากผ่านไปเพียงไม่กี่วินาที นางก็ยิ้มออกมาอีกครั้ง","“ถ้าอย่างนั้นก็สามารถลองใช้ดวงดาวดวงอื่นที่อยู่ไกลออกไปได้!”","“ตัวอย่างเช่น ดาวบริวารของดาวไทร์จะหายไปเป็นครั้งคราว สันนิษฐานว่ามันหมุนไปอยู่ด้านหลังของดาวไทร์ และถูกบดบังจากแสงของดวงอาทิตย์ ดังนั้นเราจึงมองไม่เห็นมัน...","วัฏจักรการหมุนของดาวเคราะห์ควรจะมีเสถียรภาพและเป็นไปอย่างสม่ำเสมอ แต่มันกลับไม่เป็นเช่นนั้น ตามการสังเกตของข้า เวลาที่ดาวบริวารหายไปนั้นไม่สม่ำเสมอเลยในหนึ่งปี และในแต่ละเดือนก็ยังมีความเร็วช้าที่แตกต่างกันไป...”","ปรากฏการณ์ทางดาราศาสตร์ที่แปลกประหลาดนี้เคยทำให้นางงุนงง แต่ตอนนี้นางมีคำตอบแล้ว!","เป็นเพราะในเวลาหนึ่งปี ดาวไทร์จะอยู่ในระยะห่างที่แตกต่างกันจากพวกเขาในวงโคจรของดวงอาทิตย์ แสงของดวงอาทิตย์ต้องใช้เวลาในการเดินทางไปยังดาวบริวารและสะท้อนกลับมาเพื่อให้พวกเขามองเห็น และมันก็ไม่ได้เดินทางมาถึงในทันที หากพวกเรารู้ระยะห่างระหว่างดาวทั้งสองดวงและดาวนิรันดร์ ก็อาจจะสามารถอนุมานความเร็วของแสงได้!","หลังจากที่ได้ฟังคำอธิบายของออโรร่า แฮร์รอฟก็รู้สึกทึ่งมาก","“เจ้ายังมีวิธีนี้อยู่นี่เอง ดูเหมือนว่าเจ้าจะได้รับเหรียญตราจันทร์สีเงินในปีนี้ไปแล้วล่ะ!”","ในขณะที่พูด แฮร์รอฟก็อดไม่ได้ที่จะหัวเราะออกมาดังๆ ดูเหมือนว่าในครั้งนี้ลินน์อาจจะคำนวณพลาดไปเสียแล้ว","การที่ลินน์กล้าที่จะให้สัญญาอย่างเปิดเผยว่าจะเสนอชื่อเพื่อรับเหรียญตราจันทร์สีเงินให้กับบุคคลที่สามารถวัดความเร็วแสงได้นั้น เห็นได้ชัดว่าเขามั่นใจมากว่าพวกเขาจะไม่สามารถหาวิธีวัดความเร็วแสงได้ภายในเวลาเพียงไม่กี่วัน แต่อีกฝ่ายก็ประเมินความสามารถของพวกเขาต่ำไปอย่างเห็นได้ชัด!","“มันยังมีปัญหาอยู่อีกอย่างหนึ่ง...”","ออโรร่ากล่าวอย่างลังเล","“ปัญหาอะไรหรือ?”","แฮร์รอฟเอ่ยถามพร้อมกับรอยยิ้ม","“เส้นผ่านศูนย์กลางและระยะทางของดาวเคราะห์แต่ละดวงนั้นยังคงอยู่ในระหว่างการคำนวณ ในปัจจุบันนี้ พวกเราคำนวณได้เพียงว่าดวงอาทิตย์และดวงจันทร์อยู่ห่างจากดาวนิรันดร์ที่อยู่ใต้เท้าของพวกเราไปไกลแค่ไหนเท่านั้น มันยังไม่ถึงคิวของดาวไทร์เลย...”","ออโรร่ากล่าวอย่างจนใจ","วิธีที่พวกเขาใช้ในการวัดเส้นผ่านศูนย์กลางและระยะทางของดาวเคราะห์ก็คือกฎสามข้อของดวงดาว และวิธีตรีโกณมิติแพรัลแลกซ์ที่ลินน์มอบให้ เนื่องจากดาวเคราะห์มีขนาดใหญ่มาก ข้อมูลที่คำนวณได้จึงน่าเหลือเชื่อ และก็มักจะจำเป็นต้องคำนวณและยืนยันซ้ำแล้วซ้ำเล่า ดังนั้นความคืบหน้าจึงเป็นไปอย่างเชื่องช้ามาก","“นี่มันก็ผ่านไปเกือบปีแล้วนะ และพวกเจ้ายังคำนวณไม่เสร็จอีกงั้นหรือ?”","สีหน้าของแฮร์รอฟดูไร้คำพูดเป็นอย่างมาก นั่นมันไม่ต่างอะไรกับการไม่ได้พูดเลยไม่ใช่หรือ? ลินน์จะทำการตรวจสอบหลังจากงานสัมมนานี้ แล้วพวกเขาจะมีเวลารอให้คำนวณอย่างเชื่องช้าได้อย่างไร?","ออโรร่ามองไปที่แฮร์รอฟด้วยสายตาว่างเปล่า พวกเขายังคงต้องตรวจสอบทฤษฎีที่ลินน์เสนอขึ้นมาในปีนี้ และต้องวาดแผนที่ดวงดาวอย่างละเอียดขึ้นมาใหม่อีกครั้ง ดาวไทร์นั้นไม่สำคัญมากนัก ดังนั้นมันจึงอยู่ในอันดับค่อนข้างต่ำของรายการโดยธรรมชาติ","นอกจากนี้ แม้ว่าการใช้วิธีนี้เพื่อวัดความเร็วแสงจะเป็นไปได้ แต่เมื่อพิจารณาถึงการหมุนของดาวเคราะห์แล้ว มันก็อาจจะมีข้อผิดพลาดบางอย่างเกิดขึ้นได้ และสามารถประมาณได้แค่ค่าโดยคร่าวเท่านั้น","“ในกรณีนี้ เจ้าก็สามารถใช้วิธีโง่ๆ ได้เท่านั้น เช่นการจำลองการทดลองดั้งเดิมของเจ้าขึ้นมาใหม่ หากหนึ่งกิโลเมตรไม่เพียงพอ ถ้าอย่างนั้นก็สิบกิโลเมตร หรือแม้แต่หนึ่งร้อยกิโลเมตร!”","แฮร์รอฟกล่าวอย่างหนักแน่น","“ที่จริงแล้ว มีผู้คนมากมายที่กำลังเตรียมที่จะทำการทดลองที่คล้ายคลึงกัน แนวคิดของพวกเขานั้นน่าสนใจมาก ปล่อยให้คนพวกนั้นดิ้นรนไปเถอะ”","ออโรร่าส่ายหัว ในเมื่อมีคนกำลังช่วยนางทำการตรวจสอบแล้ว ถ้าอย่างนั้นการประหยัดแรงไปได้สักหน่อยก็ไม่ใช่เรื่องแย่อะไร"]},{"n":330,"t":"ดูเหมือนว่าความเร็วของแสงจะไม่เร็วมากนัก","c":["ในช่วงเย็นของวันรุ่งขึ้น พ่อมดแม่มดและชาวเมืองนับพันคนต่างมารวมตัวกันที่ด้านนอกถนนสายหนึ่งในนครกรีนรีล เพื่อเฝ้าดูเกล็นและคนอื่นๆ แขวนกระจกผิวเรียบเอาไว้บนกำแพงทุกบานของถนน...","“เหลือกระจกอีกเพียงแค่ห้าสิบบานเท่านั้น ข้าจะจัดวางพวกมันตามแบบแปลน มุมของมันจะต้องไม่ผิดเพี้ยนไปเด็ดขาด!”","เกล็นสั่งการแนนซี่และคนอื่นๆ เสียงดัง เพื่อให้จัดวางกระจกในตำแหน่งที่เหมาะสม และปรับมุมตามผลลัพธ์จากการคำนวณอย่างแม่นยำของเขา","ต้องขอบคุณมือที่มั่นคงและความแม่นยำสูงของพ่อมด หากมุมคือ 15 องศา มันก็จะไม่มีทางถูกวางไว้ที่ 16 องศาอย่างเด็ดขาด มิฉะนั้นแล้ว การจะเชื่อมต่อแสงสะท้อนของกระจกนับร้อยบานเหล่านี้ก็ไม่ใช่เรื่องง่ายเลย","พ่อมดทั้งเจ็ดคนต้องใช้เวลาถึงหนึ่งวันเต็มในการคำนวณมุมหักเหเพียงอย่างเดียว!","เกล็นรู้สึกโล่งใจเล็กน้อยที่กระบวนการขอยืมกระจกนั้นราบรื่นมาก หลังจากที่รู้ว่าเขาจะใช้มันสำหรับการทดลองวัดความเร็วของแสง พ่อมดแม่มดที่อยากรู้อยากเห็นหลายคนก็ยอมมอบกระจกกลมที่พวกเขาเคยซื้อมาให้ด้วยความเต็มใจ","เขายังได้รับการอนุมัติจากสภาเวทมนตร์ ให้ใช้ถนนและจัตุรัสของนครกรีนรีลเป็นสถานที่ทดลองได้ เมื่อดวงอาทิตย์ตกดินและร้านค้าต่างๆ ปิดทำการ","เกล็นและคนอื่นๆ ต้องใช้เวลามากกว่าหนึ่งชั่วโมงในการจัดวางกระจกห้าสิบบานสุดท้ายให้เสร็จสิ้น เมื่อถึงเวลาที่พวกเขาทำเสร็จ ดวงอาทิตย์ก็ตกดินไปแล้ว และทั้งนครกรีนรีลก็ตกอยู่ในความมืดมิด","ภายใต้คำขอของเขา ทุกบ้านไม่มีการจุดเทียนเลยแม้แต่เล่มเดียว และทุกคนก็สามารถมองเห็นสิ่งต่างๆ รอบตัวได้อย่างชัดเจนด้วยแสงจันทร์เพียงเล็กน้อยเท่านั้น","“เกล็น ตอนนี้เจ้าพูดได้หรือยัง? เจ้าขอให้พวกเรายืมกระจกมาตั้งมากมายเพื่ออะไรกัน? เจ้าตั้งใจจะใช้สิ่งนี้เพื่อวัดความเร็วของแสงงั้นหรือ?”","พ่อมดคนหนึ่งที่คุ้นเคยกับเกล็นเอ่ยถามด้วยความร้อนรน","ทุกคนที่อยู่ในเหตุการณ์ต่างก็มีสีหน้าคาดหวังเช่นกัน เนื่องจากสิ่งล่อใจอย่างเหรียญตราจันทร์สีเงิน จึงมีพ่อมดแม่มดจำนวนไม่น้อยเลยที่ต้องการทำการทดลองนี้ให้สำเร็จ พวกเขามีแนวคิดที่หลากหลาย แต่เกล็นเป็นคนแรกที่นำแนวคิดของเขาไปปฏิบัติจริง!","เมื่อต้องเผชิญกับสายตาของทุกคน เกล็นก็ดูจะประหม่าเล็กน้อย แต่เขาก็ยังคงอธิบายต่อไป","“แผนของข้าก็คือการใช้หลักการที่กระจกสามารถสะท้อนแสงได้ เพื่อเพิ่มระยะทางในการเดินทางของแสง เพื่อใช้ในการวัดความเร็วของแสง...”","เขาได้วางกระจกจำนวนมากเอาไว้ในนครกรีนรีล หลังจากนี้ เขาจะสร้างลำแสงที่รุนแรงจากทางเข้าของเขตเมืองฝั่งตะวันออก สะท้อนผ่านกระจกไปจนถึงเขตเมืองฝั่งตะวันตก จากนั้นก็ไปยังเขตเมืองฝั่งใต้ และวนกลับมาเป็นวงกลม...","“ต้องใช้การสะท้อนทั้งหมด 1,000 ครั้ง และระยะทางรวมก็คือ 100 กิโลเมตร!”","เกล็นกล่าวด้วยความภาคภูมิใจ","เขาได้คำนวณจุดวางกระจกแต่ละจุดอย่างแม่นยำแล้ว นั่นก็หมายความว่า พวกเขาเพียงแค่ต้องยืนอยู่กับที่และรอให้แสงสะท้อนไปรอบๆ นครกรีนรีล และจุดตกลงสุดท้ายก็คือหอคอยที่อยู่เหนือหัวของพวกเขานั่นเอง!","“ข้าได้วางผ้าสีขาวเอาไว้บนยอดหอคอย ตราบใดที่พวกเจ้าเห็นจุดแสงที่มองเห็นได้ชัดเจนบนนั้น นั่นก็หมายความว่าแสงได้สะท้อนกลับมาครบรอบแล้ว และหลังจากที่มันเดินทางไปครบหนึ่งร้อยกิโลเมตร พวกเจ้าก็สามารถคำนวณความเร็วของแสงได้โดยใช้เวลาที่มันใช้ในการสะท้อนกลับมา...”","เกล็นอธิบาย","“ช่างเป็นแนวคิดที่แปลกใหม่จริงๆ มันยังสามารถทำแบบนี้ได้ด้วย...”","ราฟาเอลตระหนักได้ในทันที และมองดูพ่อมดที่ชื่อเกล็นผู้นี้ด้วยความชื่นชม ด้วยวิธีนี้ เพียงแค่ใช้ถนนไม่กี่สาย ก็สามารถสร้างระยะทาง 100 กิโลเมตรในการทดลองภายใต้สายตาของทุกคนได้แล้ว","พ่อมดแม่มดที่เหลือต่างก็ให้ความสนใจในทันที แผนการของเกล็นฟังดูเป็นไปได้มาก นี่มันคือระยะทาง 100 กิโลเมตรเต็ม ท้ายที่สุดแล้ว ธาตุแสงก็จำเป็นต้องใช้เวลาวิ่งสักหนึ่งหรือสองวินาทีใช่หรือไม่?","“คณบดีลินน์ ท่านคิดว่าวิธีนี้จะสามารถวัดความเร็วของแสงได้หรือไม่?”","เอล็อคอดไม่ได้ที่จะถามขึ้น แต่เขาก็รู้ดีว่าเมื่อเร็วๆ นี้คณบดีก็กำลังเตรียมการทดลองที่เกี่ยวข้องอยู่เช่นกัน ซึ่งมันจะเป็นตัวกำหนดว่าเหรียญตราจันทร์สีเงินจะตกเป็นของใคร","“มันเป็นไปได้ แต่ก็เป็นไปไม่ได้...”","ลินน์ยิ้มและกล่าวอย่างลึกลับ โดยไม่ได้เปิดเผยคำตอบออกมา","ข้าต้องบอกเลยว่าเกล็นนั้นมีความคิดสร้างสรรค์มาก เขาสามารถคิดวิธีนี้ขึ้นมาได้ แต่วิธีของเขาก็ยังขาดการพิจารณาในบางเรื่องอยู่...","เมื่อเห็นความคลุมเครือในสิ่งที่ลินน์พูด พ่อมดแม่มดในลานก็อดไม่ได้ที่จะเบ้ปาก ดูเหมือนว่าแม้แต่ดวงดาวแห่งเวทมนตร์เองก็ยังไม่รู้ผลลัพธ์ ดังนั้นเขาจึงทำได้เพียงใช้ข้ออ้างนี้เพื่อรักษาหน้าเท่านั้น","แต่นั่นก็ถูกต้องแล้ว หากอีกฝ่ายรู้ล่วงหน้า ข้าเกรงว่าพวกเขาคงจะวัดความเร็วของแสงไปนานแล้ว... ท้ายที่สุด การทดลองนี้ก็ไม่ได้ซับซ้อนอะไรเลย ตราบใดที่มีกระจกเพียงพอ การทดลองนี้ก็สามารถจำลองขึ้นมาใหม่ได้อย่างง่ายดาย","เกล็นไม่ได้พยายามโต้เถียงกับคำพูดของทุกคน เขาหยิบแบบแปลนในมือขึ้นมาเพื่อยืนยันเป็นครั้งสุดท้าย สูดหายใจเข้าลึกๆ และปรับสภาพของตัวเอง","เวลาผ่านไปทีละน้อย เมื่อถึงเวลาเกือบสามวินาทีก่อนเที่ยงคืน เกล็นก็ยกมือขึ้น และลูกไฟที่แผดเผาก็ปรากฏขึ้นกลางอากาศ ส่องสว่างไปทั่วทั้งถนน","แต่นี่เป็นเพียงแค่จุดเริ่มต้นเท่านั้น เกล็นและพ่อมดอีกห้าคนได้ร่ายเวทมนตร์ร่วมกัน ภายใต้พลังเวทมนตร์ที่พลุ่งพล่าน ชั้นสะท้อนแสงทรงกลมก็เริ่มปรากฏขึ้นรอบๆ ลูกไฟ ก่อตัวเป็นทรงกลมปิดในอากาศที่ปกคลุมลูกไฟเอาไว้ด้านใน โดยเหลือเพียงแค่รูเล็กๆ ที่มีเส้นผ่านศูนย์กลางหนึ่งเซนติเมตรเอาไว้...","แสงที่ปล่อยออกมาจากลูกไฟทั้งหมดถูกรวบรวมเข้าด้วยกัน และพุ่งออกไปผ่านรูเล็กๆ นั่น โดยมีเป้าหมายคือกระจกกลมบานแรก","เกล็นควบคุมเวลาได้อย่างแม่นยำมาก มันเป็นจังหวะที่นาฬิกาเวทมนตร์เดินไปถึงเลขศูนย์พอดี ในสายตาของผู้คนนับไม่ถ้วน ลำแสงที่เจิดจ้าก็ได้ปรากฏขึ้นทั่วทั้งถนน ซึ่งมันทอดยาวไปจนสุดสายตา","ด้านข้าง แนนซี่หันหลังให้กับเกล็น สายตาของนางจับจ้องไปที่ยอดหอคอยเพียงอย่างเดียว นางไม่กล้าแม้แต่จะกะพริบตา เพราะกลัวว่าจะพลาดจุดแสงที่ปรากฏขึ้นมา นางถือนาฬิกาเวทมนตร์เอาไว้ในมือ ทันทีที่นางเห็นจุดแสง นางจะต้องหยุดมันในทันที และเวลาที่ได้ก็คือเวลาที่แสงใช้ในการเดินทางผ่านระยะทางหนึ่งร้อยกิโลเมตร","หนึ่งวินาที... สามวินาที... ห้าวินาที... สิบวินาที...","แนนซี่จ้องมองจนแสบตา แต่บนผ้าสีขาวบนหอคอยกลับไม่มีอะไรเลย และก็ไม่มีจุดแสงใดๆ ปรากฏขึ้นมา","“ดูเหมือนว่าความเร็วของแสงจะไม่ค่อยเร็วนัก... นี่ก็ผ่านไปกว่าสิบวินาทีแล้ว ทำไมมันถึงยังมาไม่ถึงอีกล่ะ”","เอล็อคพึมพำและกล่าวขึ้น","“นี่คือระยะทาง 100 กิโลเมตรเต็มนะ ไม่ว่ามันจะเร็วแค่ไหน มันก็ต้องใช้เวลาครึ่งนาทีในการวิ่งไม่ใช่หรือ?”","เพียร์ซกล่าวพร้อมกับรอยยิ้ม","ราฟาเอลและคนอื่นๆ ขมวดคิ้ว และความคิดหนึ่งก็ปรากฏขึ้นในใจของพวกเขาอย่างเลือนราง หรือว่าการทดลองนี้จะมีอะไรผิดพลาดกัน?","เมื่อคิดได้เช่นนี้ จอมเวทผู้ยิ่งใหญ่หลายคนก็บินขึ้นไปในทันที โดยตั้งใจที่จะมองไปรอบๆ ทั้งเมืองจากที่สูง เพื่อมองหาต้นตอของปัญหา","เกล็นที่อยู่ด้านล่างก็สังเกตเห็นถึงความผิดปกติเช่นกัน เพราะความเข้มของแสงนั้นอ่อนลงเร็วกว่าที่เขาคาดไว้มาก เนื่องจากแสงสะท้อนของกระจกหลายบานที่เขามองเห็น...","ประมาณสิบวินาทีต่อมา ราฟาเอลและคนอื่นๆ ก็บินกลับลงมาจากกลางอากาศ และสีหน้าของพวกเขาก็ดูจนใจอยู่บ้าง","“ปรมาจารย์ราฟาเอล สถานการณ์เป็นอย่างไรบ้างขอรับ? เป็นเพราะแสงยังเดินทางมาไม่ถึงงั้นหรือ?”","เพื่อนของเกล็นรีบก้าวไปข้างหน้าและเอ่ยถามด้วยความสงสัย"]},{"n":331,"t":"เขตแดนสุญญากาศที่ครอบคลุมครึ่งเมือง!","c":["หลังจากที่ราฟาเอลกลับลงมาจากกลางอากาศ ประโยคแรกที่เขาพูดก็ทำให้ทุกคนที่อยู่ในเหตุการณ์ถึงกับตะลึงงัน","“ข้าเกรงว่ามันคงจะเป็นเรื่องยากที่จะทำการทดลองนี้ต่อไป!”","“ท่านปรมาจารย์ เกิดอะไรขึ้นงั้นหรือ? หรือว่ามุมหักเหของแสงจะผิดพลาด?”","แนนซี่ถามด้วยความร้อนรน แต่พวกเขาก็ยืนยันอย่างชัดเจนไปมากกว่าสิบครั้งแล้ว และกระจกแต่ละบานก็ถูกจัดวางอย่างระมัดระวังตามแบบแปลน","แต่ก่อนที่ราฟาเอลจะทันได้ตอบ เกล็นก็ถอนหายใจออกมา","“เป็นเพราะแสงอ่อนลงใช่หรือไม่?”","“ถูกต้อง!”","ราฟาเอลพยักหน้า","“ข้าเพิ่งตรวจสอบดูจากบนอากาศ ลำแสงที่เจ้าสร้างขึ้นมานั้นอ่อนแอมากจนไม่สามารถมองเห็นได้ด้วยตาเปล่า หลังจากที่มันสะท้อนผ่านกระจกบานที่เจ็ดสิบสาม...”","“มันเสื่อมสลายเร็วขนาดนั้นเลยงั้นหรือ?!”","สีหน้าของเกล็นซีดเผือด หากแสงสามารถทะลุผ่านกระจกไปได้สักสามหรือสี่ร้อยบาน มันก็อาจจะมีวิธีชดเชยได้ เพียงแค่หาพ่อมดมาเพิ่มอีกสองสามคนเพื่อช่วยกันร่ายเวท และสร้างลำแสงที่มีพลังมากกว่านี้ก็เพียงพอแล้ว","แต่นี่เป็นเพียงกระจกเจ็ดสิบสามบาน และพวกเขาก็เพิ่งเดินทางไปได้เพียงหนึ่งในสิบสี่ของระยะทางทั้งหมดเท่านั้น ด้วยความถี่ในการเสื่อมสลายเช่นนี้ พวกเขาจะต้องเพิ่มความเข้มของลำแสงขึ้นสิบหรือเป็นร้อยเท่าเลยงั้นหรือ?","นี่มันจะเป็นไปได้อย่างไร?","“ศาสตราจารย์ลินน์ ข้าคิดว่าท่านน่าจะรู้ว่าเกิดอะไรขึ้นใช่หรือไม่?”","ราฟาเอลหันไปมองลินน์และเอ่ยถาม","ทุกคนที่อยู่ในเหตุการณ์ต่างก็หันความสนใจไปที่ดาวรุ่งแห่งเวทมนตร์ และนึกขึ้นได้ทันทีถึงการประเมินการทดลองนี้ของลินน์เมื่อสักครู่","มันเป็นไปได้และเป็นไปไม่ได้...","ลินน์ไม่ได้พยายามทำตัวเป็นเรื่องตลกในเวลานี้ และอธิบายว่า","“การปล่อยให้แสงเดินทางไกลออกไปผ่านหลักการสะท้อนนั้นเป็นไปได้ แต่ถึงแม้ว่ากระจกจะสามารถสะท้อนแสงได้ แต่มันก็ไม่สามารถสะท้อนกลับมาได้อย่างสมบูรณ์ และแน่นอนว่ามันย่อมต้องสูญเสียพลังงานบางส่วนไปในทุกๆ ครั้งที่สะท้อน...”","“อีกนัยหนึ่งก็คือ เราควรจะลดจำนวนกระจกลง และเพิ่มระยะทางในการสะท้อนแต่ละครั้งใช่หรือไม่?”","พ่อมดคนหนึ่งคิดวิธีแก้ปัญหาขึ้นมาได้อย่างรวดเร็ว","“ไม่ มันจะไม่ได้ผลเลย”","เกล็นกล่าวพร้อมกับถอนหายใจ","“แสงไม่สามารถเดินทางไปได้ไกลมากนัก”","เขาได้ลองวิธีนี้ไปแล้ว เขาจึงได้ลดระยะห่างระหว่างกระจกสองบานลงเหลือเพียงประมาณ 100 เมตร","“นั่นเป็นเพราะธาตุในอากาศก็สะท้อนและดูดซับแสงเช่นกัน และตัวแสงเองก็ไม่ได้เดินทางขนานกัน แต่มันกระจายไปในทุกทิศทาง ดังนั้นเราจึงสามารถมองเห็นแสงได้...”","ลินน์อธิบายต่อไป","หรืออีกนัยหนึ่งก็คือ ตราบใดที่สามารถมองเห็นแสงได้ นั่นก็หมายความว่าแสงได้กระจายและสะท้อนเข้าสู่ดวงตาของพวกเขา... ราฟาเอลเข้าใจความหมายของลินน์ในทันที แต่จากนั้นเขาก็รีบโต้แย้งขึ้นมา","“นี่มันไม่น่าจะถูกต้อง แล้วแสงของดวงอาทิตย์เดินทางข้ามระยะทางหลายสิบล้านกิโลเมตรมาถึงดาวนิรันดร์ดวงนี้ได้อย่างไร?”","หลังจากคำเตือนของราฟาเอล พ่อมดแม่มดหลายคนก็ค้นพบ ‘ช่องโหว่‘ ในคำพูดของลินน์เช่นกัน หากแสงเสื่อมสลายลงอย่างต่อเนื่อง มันก็เป็นไปไม่ได้เลยที่แสงจากดวงอาทิตย์จะมาถึงที่นี่!","พ่อมดแห่งสถาบันพยากรณ์ได้คำนวณระยะห่างระหว่างดาวนิรันดร์และดวงอาทิตย์ ซึ่งมันเป็นค่าที่น่าอัศจรรย์มาก แม้แต่จุดที่ใกล้ที่สุดก็ยังห่างออกไปหลายร้อยล้านกิโลเมตร!","“ภายนอกดาวเคราะห์ของเรา ในจักรวาลอันกว้างใหญ่ ปริมาณของธาตุนั้นหาได้ยากมาก และแสงก็จะไม่สูญเสียพลังงานเมื่ออยู่ในสุญญากาศ ส่วนการเดินทางมาถึงดาวเคราะห์ดวงนี้นั้น มันก็เพียงแค่ถูกกระเจิงและถูกดูดซับโดยธาตุต่างๆ และมันก็ไม่ได้หายไป...”","ลินน์ส่ายหัว","ลินน์ตอบเพื่อคลายข้อสงสัยของทุกคน แต่ปัญหาที่ตามมาก็ทำให้เกล็นและคนอื่นๆ ถึงกับตะลึงงันไปอย่างสิ้นเชิง","ด้วยวิธีนี้ ปัญหาเรื่องความเข้มของแสงที่เสื่อมสลายไปตามระยะทางก็ไม่สามารถแก้ไขได้ เกล็นครุ่นคิดอย่างหนักอยู่ครู่หนึ่ง แต่เขาก็คิดไม่ออกว่าจะทำให้แสงเดินทางไปไกลกว่าระยะทาง 100 กิโลเมตร และให้พวกเขามองเห็นมันได้อย่างไร...","เป็นไปได้ไหมว่าพวกเราทำได้เพียงแค่ประกาศความล้มเหลว?","เกล็นไม่ยอมแพ้ เขาได้เตรียมการมามากมายและจัดการทดลองที่ยิ่งใหญ่ขนาดนี้ แต่ผลลัพธ์ก็ยังคงล้มเหลว...","เป็นเรื่องที่พอจะเดาได้เลยว่า ในวันพรุ่งนี้พวกเขาจะต้องกลายเป็นตัวตลกในหัวข้อการนินทาของพวกพ่อมดอย่างแน่นอน","ในตอนนั้นเอง จู่ๆ น้ำเสียงที่ดังกังวานราวกับระฆังก็ดังขึ้นในหูของทุกคน","“ถ้าอย่างนั้นก็ทำให้ธาตุที่ขัดขวางเหล่านี้หายไป สร้างเขตแดนสุญญากาศให้ใหญ่พอ และจำลองสภาพแวดล้อมของจักรวาลขึ้นมา แบบนี้มันจะไม่ดีกว่าหรือ?”","ผู้คนที่อยู่ในเหตุการณ์ต่างก็มองไปทางต้นเสียง และจากนั้นก็พบว่ามีประธานสภาระดับตำนานหลายคนกำลังเดินมาทางนี้ และคนที่พูดก็คือแฮร์รอฟ!","“ปรมาจารย์แฮร์รอฟ!”","เกล็นรู้สึกประหลาดใจและยินดีเป็นอย่างมาก","ถูกต้อง ตราบใดที่สามารถสร้างเขตแดนสุญญากาศที่ครอบคลุมระยะทางการแพร่กระจายของแสงได้ การอ่อนกำลังของความเข้มแสงก็จะลดลงอย่างมาก","มีเพียงพ่อมดระดับตำนานอย่างแฮร์รอฟเท่านั้น ที่สามารถคิดวิธีแก้ปัญหาที่บ้าบิ่นแต่ได้ผลลัพธ์ที่มีประสิทธิภาพมากเช่นนี้ขึ้นมาได้!","หลังจากที่แฮร์รอฟพูดจบ พ่อมดแม่มดที่รวมตัวกันอยู่ใกล้ๆ ก็เสนอคำแนะนำให้กับเกล็นเช่นกัน","ยกตัวอย่างเช่น กระจกหนึ่งพันบานนั้นมากเกินไป พวกเขาสามารถเพิ่มระยะทางของการสะท้อนแต่ละครั้งขึ้นเป็นหนึ่งกิโลเมตรได้ ดังนั้นกระจกเพียงร้อยบานก็เพียงพอแล้ว!","แม้แต่แอนโธนี่ก็ยืนขึ้นเช่นกัน เขามีความสนใจอย่างมากในการทดลองวัดความเร็วของแสงบนกระจก และยังเสนอว่าเขาสามารถใช้เวทสายฟ้าเพื่อสร้างแหล่งกำเนิดแสงที่มีพลังมากกว่านี้ได้...","ท่ามกลางการพูดคุยถกเถียงกันในหมู่ฝูงชน ปัญหาแล้วปัญหาเล่าก็ถูกแก้ไขไปทีละเรื่อง บรรยากาศการวิจัยเวทมนตร์ที่กระตือรือร้นเช่นนี้ทำให้ลินน์รู้สึกสบายใจเป็นอย่างมาก","แม้ว่าจะมีผู้คนจำนวนมากในสนามที่กำลังเฝ้าดูความตื่นเต้น และยังคงรอคอยที่จะได้เห็นเรื่องตลก แต่ก็ยังมีพ่อมดแม่มดจำนวนไม่น้อยที่ให้ความสำคัญกับการวิจัยเวทมนตร์ และต้องการที่จะค้นหาว่าความเร็วของแสงนั้นรวดเร็วแค่ไหน","เกล็นก็มีกำลังใจขึ้นมาเช่นกัน เขาปรับเปลี่ยนตำแหน่งและมุมของกระจกแต่ละบานบนแบบแปลน และลดจำนวนลงเหลือร้อยบาน เพื่อเตรียมการทดลองอีกครั้งด้วยแสงที่ทรงพลังกว่าเดิม!","“ทุกคนที่ไม่เกี่ยวข้องควรจะถอยออกไปก่อน และจอมเวทผู้ยิ่งใหญ่ทุกคนจงอยู่ต่อ!”","แฮร์รอฟกล่าวอย่างเคร่งขรึม ว่าการผลักไสธาตุในสเกลที่ใหญ่ขนาดนี้ แม้แต่เขาที่เป็นระดับตำนานก็ไม่สามารถทำมันเพียงคนเดียวได้ และเขาก็จะต้องรวบรวมความแข็งแกร่งของทุกคน","การเตรียมความพร้อมต้องใช้เวลาอีกหนึ่งชั่วโมงจึงจะถือว่าเสร็จสมบูรณ์","แอนโธนี่เป็นผู้นำ และแสงสายฟ้าที่กะพริบก็เริ่มปรากฏขึ้นในฝ่ามือของเขา และมันก็สว่างไสวมากขึ้นเรื่อยๆ สายฟ้าที่รุนแรงยังคงพุ่งทะยานต่อไป และทั้งพลเรือนและพ่อมดต่างก็ต้องหรี่ตาลง แสงสว่างจ้ามากจนผู้คนไม่สามารถมองดูมันโดยตรงได้...","“เริ่มกันเลย!”","แฮร์รอฟเน้นน้ำเสียงของเขา และเสียงของเขาก็ดังก้องไปทั่วทุกมุมเมือง","ในขณะเดียวกัน จอมเวทผู้ยิ่งใหญ่ยี่สิบคนและตำนานอีกสามคนก็ได้ร่ายเวทมนตร์ร่วมกัน และธาตุที่พลุ่งพล่านรอบตัวพวกเขาก็ถูกผลักออกไปอย่างรวดเร็วภายใต้การกระทำของพลังเวทมนตร์อันมหาศาล ในเวลาเพียงสามวินาที เขตแดนสุญญากาศที่ครอบคลุมพื้นที่ครึ่งหนึ่งของเมืองก็ก่อตัวขึ้นอย่างเงียบๆ !","“ช่างยิ่งใหญ่จริงๆ ...”","ลินน์กล่าวด้วยความรู้สึก ทักษะความคิดและความสามารถในทางปฏิบัติของพวกพ่อมดนั้นเหนือความคาดหมายของเขาไปมาก แต่พวกเขาก็รีบดึงสติกลับมาอย่างรวดเร็ว เขายกมือขึ้นเพื่อขยายอาณาเขตของตนเอง และทำภารกิจในส่วนเขตแดนสุญญากาศที่เขารับผิดชอบจนเสร็จสมบูรณ์"]},{"n":332,"t":"ลำแสงที่ทะลวงผ่านท้องฟ้า!","c":["หลังจากที่เขตแดนสุญญากาศค่อยๆ ก่อตัวขึ้น เกล็นก็ร่ายเวทรวบรวมแสงของเขาอีกครั้ง และลูกบอลสายฟ้าที่กะพริบลอยอยู่กลางอากาศก็ถูกห่อหุ้มเอาไว้","ลำแสงที่รุนแรงจนยากจะมองตรงๆ พุ่งออกมาจากรูเล็กๆ แต่เนื่องจากในเขตแดนสุญญากาศไม่มีธาตุใดๆ สำหรับสะท้อนแสง ทุกคนที่อยู่ในเหตุการณ์จึงไม่สามารถมองเห็นการดำรงอยู่ของลำแสงนั้นได้เลย และสามารถทำได้เพียงแค่ใช้กระจกกลมหนึ่งร้อยบานที่ตั้งขึ้นมาในนครแห่งพ่อมด เพื่อกำหนดวิถีของแสงเท่านั้น","“มันปรากฏขึ้นแล้ว ปรากฏขึ้นแล้ว!”","กลุ่มพ่อมดที่รออยู่ด้านนอกเขตแดนสุญญากาศมองไปที่ยอดหอคอยด้วยความประหลาดใจ แม้ว่าการสะท้อนที่ไม่สมบูรณ์ของกระจกจะทำให้ความเข้มของแสงลดลงไปทีละชั้น แต่ในครั้งนี้ แสงก็ไม่ได้หายไปหลังจากที่มันเดินทางครบหนึ่งร้อยกิโลเมตร ในทางกลับกัน ยอดหอคอยและผ้าสีขาวทั้งหมดกลับถูกส่องสว่างอย่างเจิดจ้า","“พวกเจ้าเห็นตอนที่มันมาถึงหรือไม่?”","เพียร์ซถามด้วยความอยากรู้อยากเห็น เมื่อสักครู่นี้เขากะพริบตา แต่เขาก็มองไม่ทันอยู่ดีว่าแสงเดินทางมาถึงยอดหอคอยเมื่อใด","“ราวกับเกิดขึ้นในพริบตาเดียว? มันเร็วเกินไป...”","เอล็อคส่ายหัว เมื่อสักครู่นี้เขาไม่ได้กะพริบตาเลยด้วยซ้ำ แต่เขาก็มองไม่ทันเช่นกัน","เขตแดนสุญญากาศที่ครอบคลุมพื้นที่ครึ่งหนึ่งของเมืองกำลังถอยร่นอย่างช้าๆ เพราะการรักษาระยะเขตแดนให้กว้างใหญ่ขนาดนี้ย่อมไม่ใช่เรื่องง่ายเลย แม้จะเป็นพ่อมดระดับตำนานก็ตาม","“เป็นอย่างไรบ้าง? มีผลลัพธ์อะไรออกมาหรือไม่?”","ราฟาเอลรีบบินกลับมาจากเขตเมืองฝั่งตะวันตกและรีบเอ่ยถาม","เกล็นรีบหันไปมองแนนซี่ แม่มดผู้รับหน้าที่บันทึกเวลา และนาฬิกาเวทมนตร์ในมือของนาง","เวลาบนหน้าปัดยังคงหยุดอยู่ที่ศูนย์นาที ศูนย์วินาที...","เกล็นขมวดคิ้ว หรือว่าอีกฝ่ายจะลืมจับเวลางั้นหรือ?","การทดลองที่สำคัญเช่นนี้ แม้แต่ประธานสภาก็ยังเข้าร่วมด้วย แล้วมันจะเกิดความผิดพลาดครั้งใหญ่ขนาดนี้ได้อย่างไร...","“ข้า...ข้ากดมันแล้วนะ!”","แนนซี่กล่าวด้วยความร้อนรนจนแทบจะร้องไห้ เพราะจุดเริ่มต้นและจุดสิ้นสุดของแสงมันแทบจะเกิดขึ้นในเวลาเดียวกัน!","นาฬิกาเวทมนตร์เรือนนี้เป็นเครื่องมือแปรธาตุที่มีความแม่นยำอย่างยิ่ง ซึ่งมีทรายแห่งกาลเวลาถูกเก็บเอาไว้ข้างใน และเวทมนตร์ก็ถูกทำให้แข็งตัวอยู่บนนั้น มันจะต้องร่วงหล่นสิบเม็ดต่อวินาที ซึ่งหมายความว่าความแม่นยำของมันสามารถไปถึงระดับ 0.1 วินาที","ซึ่งความเร็วของมือแนนซี่นั้นก็รวดเร็วมากอย่างเห็นได้ชัด และนางก็กดมันได้ทันเวลาอย่างยิ่ง ดังนั้นจึงไม่มีทรายแห่งกาลเวลาหล่นลงมาเลยแม้แต่เม็ดเดียว","“เมื่อครู่นี้พวกเจ้ามองเห็นชัดเจนหรือไม่?”","แฮร์รอฟหันหน้าไปมองออโรร่าและวิตโตริโอ ประธานสภาทั้งสองก็ส่ายหัวเช่นกัน พวกเขาก็ให้ความสนใจอยู่ตลอดเวลา แต่พวกเขาก็ยังคงมองไม่ทันอยู่ดี","ทุกคนที่อยู่ในเหตุการณ์ต่างก็มีสีหน้าตกตะลึง แสงเดินทางผ่านระยะทางหนึ่งร้อยกิโลเมตรและไปปรากฏขึ้นที่นั่น โดยที่แม้แต่พ่อมดระดับตำนานก็ยังไม่สามารถตรวจจับเบาะแสใดๆ ได้เลยในระหว่างกระบวนการทั้งหมด","ถ้างั้นความเร็วของมันคือเท่าไหร่กัน? 10,000 กิโลเมตร? 100,000 กิโลเมตร? หรือ 1,000,000 กิโลเมตร?","“หรือว่าจริงๆ แล้วแสงจะเดินทางมาถึงในทันที?”","ซานเชซคาดเดา นี่ก็คือทฤษฎีความเร็วแสงที่เป็นอนันต์ซึ่งเคยแพร่หลายในดินแดนพ่อมดมาก่อน ไม่ว่าระยะทางจะไกลแค่ไหน มันก็สามารถเดินทางไปถึงจุดหมายได้ในชั่วพริบตา","ในเมื่อเป็นเช่นนี้ แล้วทำไมถึงยังต้องมาทดสอบความเร็วของแสงอยู่อีก?","ไม่ว่าเจ้าจะวัดมันอย่างไร มันก็คงจะไม่มีผลลัพธ์ใดๆ ออกมา","ออโรร่าส่ายหัว นางเข้าใจดีว่ามันจะต้องมีขีดจำกัด ในช่วงหลายวันนี้ นางก็มีความคืบหน้าในการวิจัยทางดาราศาสตร์อยู่บ้าง นอกจากดาวไทร์แล้ว ดาวเคราะห์และดาวบริวารหลายดวงก็สามารถสังเกตเห็นปรากฏการณ์วัฏจักรที่ไม่เสถียรได้เช่นกัน","สิ่งนี้จะต้องเกี่ยวข้องกับการแพร่กระจายของความเร็วแสง...เพียงแต่ว่าค่านี้อาจจะมากกว่าที่พวกเขาจินตนาการเอาไว้","“ดูเหมือนว่าการทดลองในครั้งนี้จะล้มเหลวแล้ว!”","เกล็นถอนหายใจและกล่าวขึ้น แม้ว่าเขาจะไม่เต็มใจอย่างมาก แต่เขาก็ต้องยอมรับความจริงข้อนี้ อาจกล่าวได้เลยว่าพวกเขาทำทุกอย่างเท่าที่ทำได้ไปหมดแล้ว!","แม้แต่ความสำเร็จในการปล่อยให้แสงเดินทางผ่านระยะทาง 100 กิโลเมตร แต่ตอนนี้ดูเหมือนว่าระยะทางนี้ จะไม่แตกต่างอะไรจากระยะทาง 100 เมตรสำหรับแสงเลย และมันก็เดินทางมาถึงในชั่วพริบตา!","เกล็นรู้สึกละอายใจเป็นอย่างมาก เขาไม่คาดคิดมาก่อนเลยว่าตนเองจะต้องใช้ความพยายามมากมาย และได้รับความช่วยเหลือจากกลุ่มจอมเวทผู้ยิ่งใหญ่และประธานสภา แต่สุดท้ายแล้ว เขากลับไม่ได้อะไรเลย","“ข้าคิดว่าการทดลองนี้มีคุณค่าอย่างมาก”","จู่ๆ เสียงของลินน์ก็ดังขึ้น","“อย่างน้อยการได้รับเหรียญตราดาวประกายพฤกษ์สักหนึ่งเหรียญก็ไม่ใช่เรื่องแปลกอะไร”","“ศาสตราจารย์ลินน์ แม้ว่าท่านจะต้องการเข้าข้างเขา แต่ท่านก็ไม่ควรเอาชื่อเสียงของสภาเวทมนตร์มาล้อเล่นใช่หรือไม่?”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งกล่าวอย่างไม่พอใจนัก","แผนการของเกล็นในการวัดความเร็วของแสงด้วยการสะท้อนของกระจกนั้นน่าสนใจมาก แต่มันก็เป็นความจริงที่ว่า ไม่ได้รับผลลัพธ์จากการวิจัยใดๆ ออกมาเลย!","หากการทำแบบนี้สามารถรับเหรียญตราดาวประกายพฤกษ์ได้ ถ้าอย่างนั้นทุกคนก็คงจะมีเหรียญตราแบบนี้กันหมดแล้ว!","ลินน์ไม่ได้ตอบ แต่เขาชี้ไปที่กระจกกลมบานแรก...","ทุกคนที่อยู่ในเหตุการณ์ต่างก็มองตามไปด้วยความงุนงง แม้ว่าเขตแดนสุญญากาศโดยรอบจะถูกถอนออกไปแล้ว แต่เวทมนตร์รวบรวมแสงนั้นก็ยังคงทำงานอยู่ และเกลียวความร้อนบางๆ ก็กำลังลอยขึ้นมา...","แคร็ก...","พร้อมกับเสียงดังเบาๆ จู่ๆ กระจกบานนั้นก็แตกละเอียด","พลังงานที่อยู่ภายในลำแสงนี้มีความน่าสะพรึงกลัวเป็นอย่างมาก แม้ว่ากระจกกลมจะสามารถสะท้อนแสงได้ 99% แต่พลังงานที่ถูกดูดซับเอาไว้อีก 1% ที่เหลือนั้น ก็เกินขีดจำกัดที่กระจกจะสามารถทนทานได้!","เมื่อปราศจากสิ่งกีดขวางอย่างกระจก พลังและความน่าสะพรึงกลัวของลำแสงก็ถูกเปิดเผยออกมาอย่างไม่ต้องสงสัย!","พ่อมดคนหนึ่งที่ยืนอยู่ด้านหลังถูกลำแสงพุ่งชนอย่างโชคร้าย และไหล่ทั้งข้างของเขาก็ถูกทะลวงผ่านไปในชั่วพริบตา เสียงกรีดร้องอันแหลมคมดังก้องไปทั่วทั้งถนนในทันที และพ่อมดแม่มดที่รวมตัวกันอยู่ใกล้ๆ ก็รีบแยกย้ายกันไปด้วยความตื่นตระหนก แต่ความเร็วของแสงนั้นรวดเร็วเกินไป ทั้งหมดนี้จึงไร้ประโยชน์...","เกล็นไม่คาดคิดว่าเรื่องแบบนี้จะเกิดขึ้น แต่แก่นแท้ของแสงนั้นยังอยู่ในการควบคุมของเขา เขาจึงทำได้เพียงแค่เบี่ยงลำแสงออกไปโดยสัญชาตญาณ...","ลำแสงที่บางเฉียบแต่ทว่ารุนแรงนั้น ราวกับเป็นดาบศักดิ์สิทธิ์ที่มีความยาวเกือบจะไม่มีที่สิ้นสุด มันฉีกกระชากทุกสิ่งที่ขวางหน้า พ่อมดที่ได้รับบาดเจ็บถูกตัดไหล่ขาดไปครึ่งหนึ่ง จากนั้นมันก็ผ่ากำแพงด้านหลังเขาขาดออกเป็นสองซีกในแนวเฉียงราวกับมีดหั่นเนย และทิ้งรอยไหม้สีแดงสดใสเอาไว้บนพื้น ซึ่งเป็นฉากที่กระเบื้องถูกทำลายและหลอมละลาย ก่อนที่ท้ายที่สุดลำแสงจะพุ่งตรงขึ้นไปบนอากาศ","หลังจากที่ตอบสนองได้ แอนโธนี่ก็รีบยกเลิกเวทสายฟ้าของเขาในทันที และเมื่อสูญเสียแหล่งกำเนิดแสงที่ทรงพลังไป ลำแสงที่เจิดจ้าก็หายไปอย่างไร้ร่องรอย","ความวุ่นวายในสนามก็สงบลงเช่นกัน ฟูล่าปาดเหงื่อเย็นบนหน้าผาก เมื่อครู่นี้นางก็อยู่ในระยะโจมตีของลำแสงเช่นกัน แต่เมื่อนางเห็นว่าสิ่งนั้นเริ่มเบี่ยงเบนออกไป นางก็ก้มศีรษะลงตามสัญชาตญาณ ดังนั้นศีรษะของนางจึงไม่ถูกตัดขาด","โดยที่อุณหภูมิอันน่าอัศจรรย์และพลังทำลายล้างนั้น ยังคงทิ้งเงามืดขนาดใหญ่เอาไว้ในใจของนาง...","อุบัติเหตุในการทดลองที่เกิดขึ้นอย่างกะทันหันนี้ ทำให้มีผู้ได้รับบาดเจ็บมากกว่าสิบคน สิ่งเดียวที่ควรขอบคุณก็คือ ไม่มีใครเสียชีวิตจากเหตุการณ์นี้","จากสองคนที่โชคร้ายที่สุด คนหนึ่งถูกตัดไหล่ขาดไปครึ่งหนึ่ง ส่วนอีกคนหนึ่งถูกลำแสงพุ่งชนเข้าอย่างจังเมื่อลำแสงเปลี่ยนทิศทาง!","โชคดีที่อีกฝ่ายมีความระมัดระวังมากพอ ที่จะร่ายโล่เวทมนตร์คุ้มครองตัวเองเอาไว้ในขณะที่เฝ้าดูการทดลอง แต่ถึงอย่างนั้นก็ยังมีรอยแผลเป็นลึกที่หน้าอกของเขา และไม่มีเลือดไหลออกมาจากบาดแผล เพราะบาดแผลนั้นถูกทำให้แข็งตัวโดยตรงจากอุณหภูมิที่สูงลิ่ว","คนที่เหลือยังโชคดีที่อยู่ห่างจากลำแสงออกไปหลายร้อยเมตร พวกเขาเพียงแค่ถูกเผาไหม้ หรือตาบอดชั่วคราวจากแสงที่รุนแรง และมันก็ไม่ใช่อาการบาดเจ็บที่คุกคามถึงชีวิต..."]},{"n":333,"t":"เวทมนตร์ระดับตำนาน แสงตะวัน!","c":["แม้ว่าอุบัติเหตุในการทดลองที่อยู่นอกเหนือการควบคุม จนทำให้มีผู้ได้รับบาดเจ็บจำนวนมาก แต่พ่อมดแม่มดที่รวมตัวกันอยู่รอบๆ ก็ไม่ได้ถอยกลับไป หลังจากที่เสริมการป้องกันของตนเองแล้ว พวกเขาก็พูดคุยกันอย่างตื่นเต้นเกี่ยวกับลำแสงอันน่าสะพรึงกลัวเมื่อสักครู่นี้...","ในขั้นตอนของการศึกษาเวทมนตร์ มักจะมีความเสี่ยงตามมาด้วยเสมอ และมันเป็นเรื่องปกติที่จะมีอุบัติเหตุต่างๆ เกิดขึ้น ดังนั้น จึงมีพ่อมดแม่มดไม่น้อยที่ได้รับบาดเจ็บสาหัส ตาบอด สูญเสียแขนขา หูหนวก และแม้กระทั่งถูกพิษจนตาย","อย่างไรก็ตาม สิ่งนี้ก็ไม่ได้หยุดยั้งการวิจัยและความกระตือรือร้นที่มีต่อเวทมนตร์ของพวกเขาได้","เมื่อพิจารณาจากระดับของการปรุงยาในดินแดนพ่อมดแล้ว ตราบใดที่พวกเขาไม่ตายคาที่ พวกเขาก็สามารถรอดชีวิตมาได้","“มันเป็นเวทมนตร์ที่ทรงพลังมากจริงๆ ...”","ราฟาเอลถอนหายใจในขณะที่เขาสังเกตดูบ้านเรือนที่ถูกทำลาย และกระเบื้องอันแข็งแกร่งที่ถูกตัดจนแยกออก","ในที่สุดพ่อมดแม่มดที่อยู่ในเหตุการณ์ก็เข้าใจ ว่าทำไมลินน์ถึงมอบเหรียญตราดาวประกายพฤกษ์ให้กับเกล็น มันไม่ใช่เพราะการทดลองด้วยกระจกที่อีกฝ่ายใช้เพื่อวัดความเร็วของแสง แต่เป็นเพราะเวทมนตร์รวบรวมแสงนี้ต่างหาก!","เมื่อตัดสินจากความเสียหายที่เกิดขึ้นบนถนนสายนี้ ลำแสงที่ถูกรวบรวมเข้าด้วยกันสามารถตัดผ่านบ้านเรือนที่อยู่ในระยะ 50 เมตรได้อย่างง่ายดาย ซึ่งทะลวงผ่านโล่เวทมนตร์ และสร้างความเสียหายร้ายแรงต่อศัตรูที่ไม่มีชุดเกราะและเวทป้องกันภายในระยะ 100 เมตร...","แม้ว่ามันจะขยายออกไปไกลถึงสามร้อยเมตร แต่แสงที่รุนแรงนี้ก็สามารถทำให้ผู้คนตาบอดหรือถูกเผาไหม้ได้","“นี่มันคือเวทมนตร์ระดับสี่ ไม่สิ เวทมนตร์ระดับห้าอย่างน้อยใช่หรือไม่?”","ซานเชซกล่าวด้วยน้ำเสียงทุ้มต่ำ","พลังของลำแสงนั้นนับว่าแข็งแกร่ง แต่ความน่าสะพรึงกลัวที่แท้จริงของมันก็คือความเร็วของมัน ด้วยระยะทางหนึ่งร้อยกิโลเมตรที่สามารถไปถึงได้ในชั่วพริบตา และไม่มีความเป็นไปได้เลยที่จะหลบเลี่ยง มันจึงสามารถใช้เพื่อลอบโจมตีทีละคนได้อย่างยอดเยี่ยม","แม้ว่าจะเป็นการต่อสู้แบบเผชิญหน้า แต่มันก็เทียบเท่ากับการถืออาวุธที่มีระยะสังหารมากกว่า 100 เมตรเอาไว้ในมือ หากโจมตีออกไปแบบสุ่มๆ มันก็ไม่มีที่ให้ซ่อนตัวได้เลย!","เกล็นก็ไม่อยากจะเชื่อเลยเช่นกัน ว่าเวทมนตร์รวบรวมแสงของเขาจะน่าสะพรึงกลัวได้ถึงเพียงนี้","ไม่ใช่ว่าเขาไม่เคยทำการทดลองที่เกี่ยวข้องมาก่อนในอดีต แต่เขาไม่เคยรวบรวมลำแสงให้ไปถึงระดับที่น่าทึ่งเช่นนี้มาก่อน","แน่นอนว่านี่ไม่ใช่ผลงานของเขาเพียงคนเดียว เพราะเวทมนตร์สายฟ้าที่ร่ายโดยแอนโธนี่นั้นก็เป็นสิ่งที่ขาดไปไม่ได้ และเกล็นเพียงคนเดียวก็ไม่สามารถสร้างแสงที่รุนแรงเช่นนี้ได้","“ดูเหมือนว่าเวทมนตร์ธาตุแสงจะไม่ถูกใช้เป็นเพียงแค่เวทสนับสนุนอีกต่อไปในอนาคต!”","ออโรร่ากล่าวพร้อมกับรอยยิ้ม และภายในใจของนาง ก็ได้คิดถึงวิธีใช้เวทมนตร์รวบรวมแสงเอาไว้มากมายแล้วเช่นกัน","แม้ว่าเวทมนตร์โพลาไรซ์ที่นางสร้างขึ้นในอดีตจะทรงพลังและแปลกประหลาดมาก แต่มันก็มักจะถูกใช้เพื่อวัตถุประสงค์ในการสนับสนุน เช่น การล่องหน การหลอกลวงทางสายตา การฉายภาพเวทมนตร์ การสร้างแสงจ้าเพื่อทำให้ผู้คนตาบอด ฯลฯ แต่ตอนนี้ มันสามารถถูกใช้เป็นวิธีหลักในการต่อสู้ได้แล้ว!","“ขอแสดงความยินดีด้วยเกล็น เจ้าจะเป็นคนแรกที่ได้รับการเสนอชื่อให้รับเหรียญตราดาวประกายพฤกษ์ในงานสัมมนาวิชาการครั้งนี้!”","ราฟาเอลกล่าวแสดงความยินดี","เกล็นมีสีหน้าที่ตะลึงงัน และไม่เคยคิดเลยว่าการทดลองวัดความเร็วแสงที่เขาตั้งความหวังเอาไว้สูง จะไม่ได้รับผลลัพธ์ใดๆ กลับมา แต่กลับเป็นเวทมนตร์รวบรวมแสงที่เขาไม่ได้สนใจมากนักในตอนแรก ที่ทำให้เขาได้รับเหรียญตราดาวประกายพฤกษ์ไปครอง","อย่างไรก็ตาม ถนนที่ถูกทำลายและผู้บาดเจ็บจากอุบัติเหตุในการทดลองก็ทำให้เขาต้องปวดหัวอย่างหนัก เพราะเขาต้องจ่ายเงินชดเชย ซึ่งโชคดีที่ไม่มีใครเสียชีวิตจากเหตุการณ์นี้ มิฉะนั้นแล้วเขาคงจะต้องเจอกับปัญหาใหญ่แน่","“ขอบคุณสำหรับคำแนะนำของท่านศาสตราจารย์ลินน์...”","เกล็นไม่ลืมที่จะขอบคุณลินน์ที่ช่วยเตือนสติเขาได้ทันเวลา","ก่อนหน้านี้ เกล็นทั้งอิจฉาและริษยาดาวรุ่งแห่งเวทมนตร์ผู้โด่งดังคนนี้เล็กน้อย แต่ตอนนี้เขามีเพียงแค่ความชื่นชมเท่านั้น","ความรู้ที่ลึกซึ้งและกว้างขวางของอีกฝ่ายนั้น เกินกว่าที่เขาจะจินตนาการไปมาก จากความสามารถในการชี้ให้เห็นอย่างแม่นยำ ว่ากระจกไม่สามารถสะท้อนแสงได้อย่างสมบูรณ์ และปรากฏการณ์การกระเจิงของแสง มันก็ไม่ยากเลยที่จะมองออกว่าลินน์น่าจะเคยทำการทดลองที่คล้ายคลึงกันนี้มานานแล้ว","“วิธีการมันขึ้นอยู่กับเจ้า ข้าต้องบอกเลยว่าเวทมนตร์รวบรวมแสงและการทดสอบความเร็วแสงด้วยการสะท้อนกระจกของเจ้านั้นยอดเยี่ยมมาก”","ลินน์กล่าวพร้อมกับรอยยิ้ม","“น่าเสียดายที่การทดลองยังคงล้มเหลว”","เกล็นกล่าวพร้อมกับถอนหายใจ","ลินน์ยิ้มและไม่ได้ตอบกลับ ในความเป็นจริง แนวคิดของเกล็นนั้นไม่ได้มีปัญหาอะไรมากนัก และมันเป็นไปได้จริงๆ ที่จะวัดความเร็วของแสงออกมาอย่างคร่าวๆ","แน่นอนว่า ข้อกำหนดเบื้องต้นนี้ก็คือความเร็วในการตอบสนองจะต้องรวดเร็วพอ!","ตามข้อมูลจากชาติที่แล้วของเขา แสงจะใช้เวลาประมาณสามในหมื่นวินาทีในการเดินทางผ่านระยะทางหนึ่งร้อยกิโลเมตร ซึ่งเขาก็ไม่แน่ใจว่าพ่อมดระดับตำนานจะสามารถตรวจจับความเปลี่ยนแปลงเพียงเล็กน้อยนี้ได้หรือไม่ แต่ตอนนี้ดูเหมือนว่าพวกเขาจะไม่สามารถทำได้!","เขาประเมินความสามารถในการตอบสนองของพ่อมดเหล่านี้สูงเกินไป...","แต่เวทมนตร์รวบรวมแสงของเกล็นก็ทำให้เขาประหลาดใจเช่นกัน","และความสะดวกสบายของเวทมนตร์นั้น ก็เหนือความคาดหมายจริงๆ ลินน์อดไม่ได้ที่จะนึกถึง กระจกรวมแสงตะวัน ขนาดใหญ่ยักษ์ที่ถูกสร้างขึ้นโดยสหพันธ์ในชาติก่อนในพื้นที่รกร้าง โดยอุณหภูมิที่สูงลิ่วที่ถูกสร้างขึ้นมานั้นก็สามารถหลอมละลายเหล็กกล้าได้ในชั่วพริบตา และหากมันถูกรวบรวมอยู่ที่จุดเดียว มันก็อาจจะสามารถไปถึงอุณหภูมิพื้นผิวของดวงดาวได้หลายเท่า...","ลินน์รู้สึกว่าเขาอาจจะสามารถบินขึ้นไปในอากาศ และร่ายเวทมนตร์รวบรวมแสงขนาดใหญ่เพื่อจำลองสิ่งนี้ขึ้นมาได้ นั่นแหละคือ แสงตะวัน ที่แท้จริง!","เมื่อคิดถึงเรื่องนี้ ลินน์ก็รู้สึกประหลาดใจที่พบว่า เขาดูเหมือนจะเชี่ยวชาญเวทมนตร์ระดับตำนานอีกบทหนึ่งแล้ว แต่มันก็มีความต้องการที่สูงกว่าในเรื่องของฤดูกาลและสภาพอากาศ ซึ่งจะทรงพลังพอที่จะใช้มันได้ก็ในตอนเที่ยงวันของฤดูร้อน...","บางทีเขาอาจจะก้าวไปอีกขั้น และสร้างเวทมนตร์เลเซอร์ที่แท้จริงออกมาได้...","ในขณะที่ลินน์กำลังคิดเกี่ยวกับเวทมนตร์ใหม่ กลุ่มพ่อมดก็กำลังพูดคุยกันเกี่ยวกับการทดลองสะท้อนกระจกที่ล้มเหลว","ในความเป็นจริง มีพ่อมดแม่มดไม่น้อยที่ต้องการทดสอบการวัดลำแสงให้เสร็จสิ้นและรับเหรียญตราจันทร์สีเงิน ซึ่งวิธีการที่พวกเขาคิดขึ้นมานั้นก็มีทุกรูปแบบ แต่มันก็แยกไม่ออกจากข้อโต้แย้งเดียว นั่นก็คือการสร้างระยะทางที่ยาวพอ และหาวิธีบันทึกเวลาที่แสงเดินทางผ่าน แต่ความเป็นจริงก็สาดน้ำเย็นเข้าใส่พวกเขา","การทดลองของเกล็นในครั้งนี้ สามารถกล่าวได้ว่าประสบความสำเร็จสูงสุดในทุกๆ ด้าน แม้แต่ประธานสภาก็ยังลงมือด้วยตัวเอง นั่นทำให้พวกเขาคิดไม่ออกจริงๆ ว่าจะจำลองระยะทางที่ยาวกว่านี้ เพื่อวัดความเร็วของแสงได้อย่างไร...","“ศาสตราจารย์ลินน์ มันมีวิธีวัดความเร็วของแสงจริงๆ งั้นหรือ?”","ซานเชซถามด้วยความสับสน","พ่อมดแม่มดที่อยู่ในเหตุการณ์ทั้งหมดต่างก็มองไปที่ดาวรุ่งแห่งเวทมนตร์เช่นกัน","“แน่นอน!”","ลินน์พยักหน้า หยุดไปครู่หนึ่ง แล้วพูดต่อ","“อันที่จริง วิธีการของข้านั้นไม่ได้ซับซ้อนอะไร และก็ไม่ได้มีฉากที่ใหญ่โตเช่นนี้...”","สิ่งนี้ทำให้ราฟาเอลและคนอื่นๆ ยิ่งอยากรู้อยากเห็นมากขึ้นไปอีก แต่ลินน์ก็แค่ส่ายหัวและแสร้งทำเป็นปกปิดเอาไว้","“อุปกรณ์ทดลองยังต้องใช้เวลาเตรียมการอีกสักหน่อย แต่อย่างไรก็ตาม พวกเจ้าก็จะได้รู้ในอีกไม่กี่วันข้างหน้า!”","ราฟาเอลและคนอื่นๆ ต่างก็พูดไม่ออก แต่พวกเขาก็ไม่มีทางเลือกอื่น นอกจากต้องเดาอยู่ในใจว่าวิธีการ ‘ไม่ซับซ้อน’ ที่ลินน์พูดถึงคืออะไร","แฮร์รอฟสงสัยว่ามันจะใช้เวทมนตร์บางอย่างเพื่อชะลอความเร็วของแสงให้ช้าลง เพื่อตอบสนองต่อความต้องการในการวัดหรือไม่ หรือสร้างแสงจ้าเพื่อยิงขึ้นไปบนดวงจันทร์ จากนั้นก็วัดมันตามเวลาที่มาถึงและระยะทางที่ถูกประเมินเอาไว้","พ่อมดบางคนถึงกับคิดด้วยความมุ่งร้ายว่า ดาวรุ่งแห่งเวทมนตร์ผู้นี้อาจจะกำลังเล่นตุกติกอยู่ มันคงจะน่าขันมากหากการทดลองในภายหลังต้องพบกับความล้มเหลวแบบเกล็น..."]},{"n":334,"t":"ข้าต้องการเพียงแค่เฟืองเล็กๆ หนึ่งตัว เพื่อใช้วัดความเร็วของแสง!","c":["การทดลองวัดลำแสงของเกล็น แม้ว่าท้ายที่สุดแล้วจะล้มเหลวอย่างไม่เป็นท่า แต่มันก็ผลักดันความอยากรู้อยากเห็นของพ่อมดแม่มดเกี่ยวกับความเร็วของแสง ให้ขึ้นไปสู่จุดสูงสุดอีกครั้ง","เพราะผลลัพธ์ของการทดลองทำให้พวกเขาตกตะลึงมากเกินไป และพลังอันน่าสะพรึงกลัวของการรวบรวมแสงที่รุนแรงจนกลายเป็นลำแสง ก็ทำให้พ่อมดแม่มดทุกคนพูดถึงเรื่องนี้เช่นกัน","เป็นที่คาดการณ์ได้เลยว่า วิชาทัศนศาสตร์จะกลายเป็นทิศทางการวิจัยของพ่อมดแม่มดหลายคนในอนาคต","อย่างไรก็ตาม เกี่ยวกับการวัดความเร็วของแสง พ่อมดแม่มดก็ถูกแบ่งออกเป็นสองฝ่าย บางคนยืนกรานว่าความเร็วของแสงนั้นเป็นอนันต์ เพราะท้ายที่สุด พวกเขาก็สามารถมองเห็นดวงอาทิตย์และดวงจันทร์ที่อยู่ห่างไกลจากที่นี่ได้ในพริบตาเดียว","การวัดความเร็วของแสงเป็นเรื่องไร้สาระ!","ในขณะที่อีกกลุ่มหนึ่งคิดว่า ความเร็วของแสงนั้นมีขีดจำกัด เพราะทุกสิ่งย่อมมีขีดจำกัดของมัน และ ‘ธาตุแสง’ ก็ไม่มีข้อยกเว้น เพียงแต่พวกเขาคิดไม่ออกว่าจะทำการทดลองเช่นนี้ต่อไปได้อย่างไร","สำหรับแสง แม้แต่ระยะทาง 100 กิโลเมตรก็เกิดขึ้นในชั่วพริบตา หากสิ่งนี้มีความเร็ว มันก็จะต้องเกิน 10,000 กิโลเมตรต่อวินาทีแน่ๆ ในขณะที่เส้นรอบวงของดาวนิรันดร์มีเพียงแค่ 40,000 กว่ากิโลเมตรเท่านั้น!","“เป็นไปได้ไหมที่จะทำการทดลองที่ปลายทั้งสองด้านของดาวเคราะห์?”","แนวคิดนี้ผุดขึ้นมาในใจของซานเชซ ด้วยวิธีนี้ สถานที่ทดลองก็จะมีขนาดใหญ่พอ แล้วพวกเขาจะไปที่นั่นได้อย่างไร?","“เจ้าทึ่ม ดาวเคราะห์ดวงนี้เป็นทรงกลม และแสงก็เดินทางเป็นเส้นตรง มันจะถูกปิดกั้นหรือไม่ก็บินออกไปในจักรวาล แต่มันไม่สามารถไปถึงอีกฝั่งหนึ่งได้หรอก”","ราฟาเอลกล่าวเยาะเย้ย","“ถ้างั้นเจ้ามีวิธีไหนอีกเล่า?”","ซานเชซถามด้วยความโกรธ","ราฟาเอลอ้าปากค้าง จากนั้นก็ส่ายหัวอย่างช่วยไม่ได้","“แล้วข้าจะไปรู้ได้อย่างไร?”","ดาวรุ่งแห่งเวทมนตร์ผู้นี้มีความคิดมากมายเหลือเกิน ก่อนงานสัมมนาเวทมนตร์เมื่อปีที่แล้ว ใครจะไปคิดว่าเพียงแค่การตั้งแท่งน้ำแข็งบนพื้นทะเล และวัดความยาวของเงา ก็สามารถคำนวณเส้นรอบวง ความยาว และปริมาตรของดาวเคราะห์ทั้งดวงได้แล้ว?","ดังนั้น ราฟาเอลจึงเดาไม่ออกเลยว่า ครั้งนี้อีกฝ่ายจะมีความคิดที่แปลกใหม่และยอดเยี่ยมแบบไหนออกมาให้เห็นอีก...","ความอยากรู้อยากเห็นก็คือความอยากรู้อยากเห็น งานสัมมนาเวทมนตร์ในปีนี้จะยังคงดำเนินต่อไป หลังจากผ่านไปสามวัน ก็มีผู้ได้รับเหรียญตราดาวประกายพฤกษ์สามคน","เกล็นผู้สร้างเวทมนตร์รวบรวมแสง ฟูล่าผู้เป็นตัวแทนของแอนโธนีขึ้นไปบนเวทีเพื่ออธิบายทฤษฎีแม่เหล็กไฟฟ้า และ...โยลันด์ ผู้สร้างกล้องจุลทรรศน์แบบเรียบง่าย...โดยพ่อมดแห่งสถาบันพยากรณ์ผู้นี้ถึงกับพูดไม่ออก หลังจากที่ถูกลินน์หักล้างแนวคิดในงานสัมมนาปีที่แล้ว ดังนั้น เขาจึงเรียนรู้จากความเจ็บปวด และอุทิศตนให้กับงานวิจัย","ในขณะที่ใช้กล้องโทรทรรศน์ดาราศาสตร์เพื่อสังเกตดูดวงดาวที่อยู่ห่างไกล โยลันด์ก็ทำการปรับปรุงสิ่งนั้นตามอำเภอใจ และสร้างกล้องจุลทรรศน์ขึ้นมาได้สำเร็จ","แม้ว่าทั้งสองจะเคยเผชิญหน้ากันในงานสัมมนาเมื่อปีที่แล้ว แต่ลินน์ก็ไม่ได้เก็บเอาความขัดแย้งเล็กๆ น้อยๆ นี้มาใส่ใจ มันเป็นเพียงแค่ข้อพิพาททางวิชาการ ไม่ว่าการโต้เถียงจะรุนแรงแค่ไหน มันก็เป็นเรื่องปกติ เพื่อไม่ให้ตนเองต้องรู้สึกรังเกียจ ลินน์จึงใจกว้างมากที่จะเสนอชื่อโยลันด์ให้รับเหรียญตราดาวประกายพฤกษ์","ความมีน้ำใจเช่นนี้ทำให้โยลันด์รู้สึกละอายใจเป็นอย่างยิ่ง","เขาเตรียมตัวรับมือกับการถูกเพ่งเล็งในครั้งนี้ไว้แล้ว และถึงขั้นเขียนสุนทรพจน์ล่วงหน้านับหมื่นคำ เพื่ออธิบายถึงความสำคัญของงานวิจัยชิ้นนี้ แต่เขาไม่คาดคิดเลยว่ามันจะไม่จำเป็นต้องใช้เลย เพราะลินน์เป็นคนแรกที่เสนอชื่อของเขาต่อคณะกรรมการเพื่อมอบเหรียญตราดาวประกายพฤกษ์ให้","ในช่วงไม่กี่วันที่ทำงานร่วมกัน ราฟาเอลพยายามพูดอ้อมค้อมอยู่เสมอ โดยหวังว่าลินน์จะเปิดเผยรายละเอียดบางอย่าง แต่ฝ่ายหลังก็ปฏิเสธที่จะตอบกลับ...เขาจึงทำได้เพียงแค่พึมพำกับตัวเอง ซึ่งบางทีข้อสันนิษฐานของซานเชซอาจจะถูกต้อง ดาวรุ่งแห่งเวทมนตร์ผู้นี้ยังไม่แน่ใจเกี่ยวกับการทดลองอย่างเต็มที่ เขาจึงเก็บมันไว้เป็นความลับ","ลินน์ไม่ได้ให้ความสนใจกับข่าวลือต่างๆ ที่แพร่กระจายอย่างบ้าคลั่งในดินแดนพ่อมด และหลังจากที่กลับไปที่ห้องรับรองของสถาบันอิเยตา เขาก็เรียกเอล็อคและคนอื่นๆ มา และถามเกี่ยวกับการเตรียมตัวของพวกเขา","“ศาสตราจารย์ลินน์ เฟืองที่ท่านให้พวกเราสร้างเสร็จเรียบร้อยแล้ว!”","เอล็อคและเพียร์ซกล่าวอย่างเหนื่อยล้า","เพราะพวกเขานั้นใช้เวลาสามวันในการผลิตเฟืองขนาดเดียวกันสิบตัว ซึ่งมีตั้งแต่ 500 ซี่ไปจนถึง 1,200 ซี่ และตามคำแนะนำของศาสตราจารย์ ว่าต้องมั่นใจในความแม่นยำ และระยะห่างระหว่างช่องว่างของเฟืองแต่ละซี่จะต้องเท่ากันทุกประการ และความแม่นยำจะต้องไปถึงระดับหนึ่งในพันของเซนติเมตร","นั่นจึงมีเพียงพ่อมดเต็มตัวเท่านั้นที่สามารถทำงานละเอียดเช่นนี้ได้ ซึ่งนั่นก็คือเหตุผลที่ลินน์ตั้งใจพาพวกเขามาที่นี่ด้วย ท้ายที่สุดแล้ว มันก็ต้องมีคนรับผิดชอบงานนี้!","และลิเดียกับจอห์นนี่ก็รับผิดชอบในการผลิตกระจกกึ่งสะท้อนและกระจกเงา ซึ่งตอนนี้ก็เสร็จสมบูรณ์แล้วเช่นกัน","“ดีมาก ดูเหมือนว่าการทดลองจะสามารถเริ่มได้ในคืนนี้!”","ลินน์ตรวจสอบอุปกรณ์ทดลองต่างๆ และพยักหน้าด้วยความพึงพอใจ","เอล็อคและคนอื่นๆ รู้สึกแปลกใจเป็นอย่างยิ่ง ศาสตราจารย์ขอให้พวกเขาสร้างเฟืองจำนวนมากไปทำไมกัน?","“เราจะใช้สิ่งเหล่านี้เพื่อวัดความเร็วของแสงงั้นหรือ?”","ลิเดียยกมือขึ้นแล้วถาม","“ใช่แล้ว มีแค่เฟืองพวกนี้ก็พอ!”","ลินน์พยักหน้า","ในตอนกลางคืน ภายในนครกรีนรีล พ่อมดแม่มดที่ได้รับข่าวและมาเฝ้าดูการทดลองต่างก็หลั่งไหลกันเข้ามาจนเต็มจัตุรัส","ด้วยฉายาดาวรุ่งแห่งเวทมนตร์ ควบคู่ไปกับการทดลองวัดความเร็วของแสง จึงไม่มีใครอยากพลาดโอกาสสำคัญเช่นนี้","“ศาสตราจารย์ลินน์ พวกเรารอมาหลายวันแล้ว ตอนนี้ท่านคงจะไม่ปิดบังอะไรแล้วใช่หรือไม่?”","ราฟาเอลกล่าวอย่างช่วยไม่ได้","“วิธีการของข้านั้นง่ายมาก และทุกอย่างที่ข้าต้องการก็อยู่ที่นี่แล้ว!”","ลินน์กล่าวพร้อมกับรอยยิ้ม","ราฟาเอลและคนอื่นๆ มองไปที่อุปกรณ์ทดลองตรงหน้าลินน์ด้วยความอยากรู้อยากเห็น โดยมีสิ่งที่สะดุดตาที่สุดก็คือ เครื่องมือแปรธาตุที่ดูแปลกประหลาด ซึ่งหลังจากที่ลินน์อธิบาย พวกเขาก็ตระหนักได้ว่าสิ่งนี้ถูกใช้เพื่อปล่อยลำแสงออกมา และหลักการของมันก็ใกล้เคียงกับเวทมนตร์รวบรวมแสงของเกล็น","มีกระจกสะท้อนแสงถูกวางเอาไว้บนกำแพงเมืองของเขตพื้นที่โดยรอบ ซึ่งอยู่ห่างจากจัตุรัสแห่งนี้เพียงแค่สี่กิโลเมตร...","“นี่มันไม่ใช่กระจกที่เกล็นสร้างขึ้นมาเมื่อไม่กี่วันก่อนเพื่อวัดความเร็วแสงหรอกหรือ?”","แนนซี่พึมพำเบาๆ และพ่อมดแม่มดที่อยู่ในเหตุการณ์ทั้งหมดก็พยักหน้าอย่างพร้อมเพรียงกัน","ต้องรู้ก่อนว่า เกล็นใช้กระจกหนึ่งร้อยบานเพื่อสร้างระยะทางหนึ่งร้อยกิโลเมตร แต่ท้ายที่สุดมันก็ยังคงจบลงด้วยความล้มเหลว แม้ว่ากระจกที่ลินน์ตั้งไว้จะทอดยาวผ่านนครกรีนรีลไปกว่าครึ่งเมือง แต่เมื่อนับรวมระยะทางไปกลับแล้ว มันก็เป็นระยะทางเพียงแค่แปดกิโลเมตร ซึ่งยังไม่ถึงหนึ่งในสิบเลยด้วยซ้ำ","มันเป็นไปไม่ได้เลยที่จะวัดความเร็วของแสงออกมาได้!","“ดังนั้นเราจึงต้องเพิ่มสิ่งนี้เข้าไป!”","ลินน์ชี้ไปที่สิ่งที่อยู่ในมือของเอล็อค","“นี่คือส่วนที่สำคัญที่สุดของการทดลองนี้!”","“เฟืองงั้นหรือ?”","ราฟาเอลจำมันได้ตั้งแต่แรกเห็น และไม่ใช่เรื่องแปลกใหม่สำหรับนักเล่นแร่แปรธาตุ เพราะมันเคยปรากฏอยู่ในเครื่องจักรไอน้ำที่สร้างโดยสมาคมการเล่นแร่แปรธาตุมาก่อนหน้านี้แล้ว","แล้วสิ่งนี้มันเกี่ยวอะไรกับการวัดความเร็วของแสงกัน?"]},{"n":335,"t":"วิธีของข้าคือการใช้เฟืองและแสงเพื่อเปรียบเทียบความเร็ว!","c":["ภายใต้สายตาที่งุนงงของทุกคน เอล็อคได้ติดตั้งเฟืองเอาไว้ที่ด้านหน้าของเครื่องมือแปรธาตุที่ใช้ปล่อยลำแสง และวางกระจกที่มีลักษณะแปลกประหลาดมากเอาไว้ระหว่างพวกมัน","ลินน์อธิบายในที่สุด","“นี่คือกระจกกึ่งสะท้อน! มันแตกต่างจากกระจกธรรมดาทั่วไป เพราะตามชื่อของมันเลย มีเพียงด้านเดียวเท่านั้นที่ปล่อยให้ลำแสงส่องผ่านไปได้!”","เกล็นมองไปมาด้วยความประหลาดใจ ด้านหนึ่งสามารถมองเห็นฉากที่อยู่ด้านหลังได้อย่างชัดเจน ในขณะที่อีกด้านหนึ่งกลับเบลอ","“การทดลองนี้เรียบง่ายมาก นั่นก็คือเครื่องมือแปรธาตุนี้จะปล่อยลำแสงออกมา เมื่อเฟืองหยุดนิ่ง แสงก็จะสะท้อนกลับมาทางเดิมหลังจากที่ผ่านช่องว่างของซี่เฟืองไปกระทบเข้ากับกระจกเงา ในอีกด้านหนึ่งของกระจกกึ่งสะท้อนก็จะเกิดจุดแสงที่ใหญ่ขึ้น ซึ่งช่วยให้เราสามารถมองเห็นมันได้อย่างชัดเจน!”","ในขณะที่พูด ลินน์ก็เปิดการทำงานของเครื่องมือแปรธาตุ และลำแสงสองเส้นก็ปรากฏขึ้นกลางอากาศทันที","อย่างที่เขาพูดเอาไว้ แสงผ่านกระจกกึ่งสะท้อน ข้ามช่องว่างของซี่เฟือง ไปกระทบเข้ากับกระจกสะท้อนที่อยู่ห่างออกไปอย่างแม่นยำ ก่อนจะสะท้อนกลับมา และผ่านช่องว่างของซี่เฟืองมากระทบเข้ากับกระจกกึ่งสะท้อนอีกครั้ง","“แต่ถ้าเฟืองเริ่มหมุน...แสงที่ผ่านช่องว่างของซี่เฟืองไปก็อาจจะถูกปิดกั้นได้เมื่อมันสะท้อนกลับมา”","ลินน์หยุดไปครู่หนึ่ง และด้วยความคิด ภายใต้การควบคุมของหัตถ์เวท เฟืองก็ค่อยๆ หมุนขึ้นมา","ลินน์ไม่จำเป็นต้องอธิบายให้มากความ ทุกคนก็สามารถมองเห็นได้ว่าลำแสงที่อยู่ด้านหลังเฟืองขนาดยักษ์เริ่มปรากฏและหายไป และจุดแสงบนกระจกกึ่งสะท้อนก็กะพริบเช่นกัน นั่นเป็นเพราะเมื่อแสงสะท้อนกลับมา มันอาจจะผ่านช่องว่างของซี่เฟืองได้พอดี หรือมันอาจจะถูกบดบังด้วยตัวเฟืองก็ได้...","ในขณะที่พ่อมดแม่มดกำลังขมวดคิ้วและครุ่นคิดเกี่ยวกับปรากฏการณ์นี้ คำพูดของลินน์ก็ดังขึ้นอีกครั้ง","“ในทางทฤษฎี หากความเร็วของเฟืองนั้นมากพอ แสงที่ผ่านช่องว่างซี่แรกไปและสะท้อนกลับมาในระยะทางแปดกิโลเมตร ก็จะผ่านช่องว่างซี่ที่สองได้พอดี ด้วยวิธีนี้...”","ก่อนที่ลินน์จะพูดจบ เกล็นก็พูดขึ้นด้วยความตกใจ ราวกับว่าคิดอะไรบางอย่างออก","“ถ้าเป็นอย่างนั้น ธาตุแสงทุกตัวที่สามารถผ่านช่องว่างแรกไปได้ ก็จะสะท้อนกลับมาจากช่องว่างที่สองอย่างแน่นอน และมันก็ไม่มีความเป็นไปได้เลยที่จะถูกบดบัง ซึ่งลำแสงและจุดแสงก็จะปรากฏออกมาให้เห็นอย่างชัดเจนมาก!”","คำพูดของเกล็นเปรียบเสมือนการโยนหินก้อนใหญ่ลงไปในทะเลสาบที่เงียบสงบ และพ่อมดแม่มดที่อยู่ในเหตุการณ์ก็ระเบิดความตื่นเต้นออกมาทันที","“นี่มันเป็น...แนวคิดที่อัจฉริยะมาก!”","ราฟาเอลกล่าวด้วยน้ำเสียงที่สั่นเครือ","ก่อนหน้านี้ เขาเอาแต่คิดอยู่เสมอว่าดาวรุ่งแห่งเวทมนตร์ผู้นี้จะใช้วิธีไหนในการวัดความเร็วของแสง แต่เขาไม่คาดคิดเลยว่าอีกฝ่ายจะสามารถทำมันได้ด้วยเฟืองเล็กๆ เพียงแค่ตัวเดียวเท่านั้น!","วิธีการนี้โดดเด่นมาก และมีอยู่แค่สองคำเท่านั้น นั่นก็คือ กลอุบาย!","ส่วนที่สำคัญที่สุดของการทดลองนี้ ก็คือการทำให้เวลาที่เฟืองหมุนไปหนึ่งซี่ สัมพันธ์กับเวลาที่แสงถูกปล่อยออกไปและสะท้อนกลับมา","ความละเอียดอ่อนก็คือ แสงจะต้องเดินทางผ่านระยะทางเต็มแปดกิโลเมตร ในขณะที่เฟืองตรงหน้าเพียงแค่ต้องหมุนไปเพียงเล็กน้อย เพื่อไปให้ถึงช่องว่างซี่ที่สอง!","นั่นก็หมายความว่า ระยะห่างของเฟืองแต่ละซี่นั้น แสดงถึงระยะทางที่แสงเดินทางไปแล้วแปดกิโลเมตร หากมีช่องว่างเฟืองทั้งหมดหนึ่งพันซี่ และพวกมันหมุนครบหนึ่งรอบ แสงก็จะต้องเดินทางไปแล้วแปดพันกิโลเมตร!","พ่อมดแม่มดที่เข้าใจประเด็นนี้ก็อดไม่ได้ที่จะสูดหายใจเข้าลึกๆ เฟืองเล็กๆ ตัวนี้ก็เปรียบเสมือนเครื่องขยายเสียงชั้นยอดเลย!","ความเร็วของแสงอาจจะรวดเร็วอย่างไม่น่าเชื่อ แต่ความเร็วของเฟืองก็สามารถเพิ่มขึ้นได้อย่างรวดเร็วเช่นกัน...","“นี่คืออัตราส่วนความเร็วระหว่างเฟืองและแสง!”","แฮร์รอฟถอนหายใจออกมาเช่นกัน","มันก็แค่ลินน์ไม่ได้ปฏิบัติตามกฎเกณฑ์ เฟืองเดินทางไปเพียงแค่ห้ามิลลิเมตร (ระยะทางของหนึ่งซี่) และแสงก็ต้องวิ่งไปแปดกิโลเมตร...ช่องว่างที่แตกต่างกันนับแสนเท่า!","ท้ายที่สุด เจ้าก็เพียงแค่ต้องรู้ระยะทางที่เฟืองเคลื่อนที่ไป แล้วคูณด้วยความแตกต่างที่หลากหลายนี้ นั่นก็คือ ให้ดูที่จำนวนซี่ที่แยกเฟืองเอาไว้ และจำนวนรอบของเฟืองในหนึ่งวินาที และเจ้าก็สามารถคำนวณความเร็วของแสงกลับมาได้!","มิน่าล่ะลินน์ถึงมั่นใจนักว่าเขาสามารถวัดความเร็วของแสงได้...","“มันน่าทึ่งมาก สมกับเป็นดาวรุ่งแห่งเวทมนตร์จริงๆ!”","ซานเชซกล่าวด้วยความถอนหายใจ","เขาเชื่อมั่นอย่างหมดใจ ว่าสมองแบบไหนกันที่จะสามารถคิดวิธีแบบนี้ขึ้นมาได้","อย่างไรก็ตาม ก็ยังมีพ่อมดแม่มดอีกจำนวนไม่น้อยที่เฝ้าดูด้วยสีหน้าที่งุนงง","บ้าอะไรกันที่พวกเจ้ากำลังพูดถึง? ทำไมข้าถึงไม่เข้าใจเลย...","แต่เพื่อรักษาศักดิ์ศรีในฐานะพ่อมด พวกเขาก็ยังคงพยักหน้าแสร้งทำเป็นเข้าใจ และพูดคำชมเชยออกไปสองสามคำ","“สมกับเป็นดาวรุ่งแห่งเวทมนตร์...”","“วิธีนี้ดีมาก! ข้ารู้ว่าเขาจะต้องมีวิธีแน่!”","ท่ามกลางเสียงสรรเสริญ ก็ยังมีเสียงต่อต้านซ่อนอยู่ และคนอื่นๆ ยืนกรานว่าความเร็วของแสงนั้นเป็นอนันต์ ไม่ว่าลินน์จะเร่งความเร็วของเฟืองได้เร็วแค่ไหน มันก็เปล่าประโยชน์!","“ศาสตราจารย์ลินน์ พวกเราเริ่มได้เลยหรือไม่?”","ลิเดียตะโกนถามเสียงดัง","ลินน์พยักหน้า และขอให้เด็กสาวฮาล์ฟลิงสตาร์ทเครื่องยนต์สันดาปภายใน เพื่อเพิ่มความเร็วของเฟือง","ภายใต้สายตาของทุกคน เฟือง 720 ซี่ที่อยู่ตรงหน้าเขาเริ่มหมุนอย่างช้าๆ จากนั้นความเร็วก็ค่อยๆ เพิ่มขึ้น ห้ารอบต่อวินาที สิบรอบ สิบห้ารอบ...และในไม่ช้ามันก็กลายเป็นภาพติดตา","ลำแสงและจุดแสงบนกระจกกึ่งสะท้อนก็กะพริบอย่างต่อเนื่องเช่นกัน และความถี่ก็เร็วขึ้นเรื่อยๆ เพราะแสงเปลี่ยนไปมาระหว่างผ่านกับไม่ผ่านอยู่เสมอ...","“มันเร็วมาก...”","แม่มดแนนซี่พึมพำกับตัวเอง ซึ่งนางไม่สามารถมองเห็นความเร็วของเฟืองได้เลย","“ด้วยความเร็วระดับนี้ แสงจะสามารถแยกแยะช่องว่างเล็กๆ ระหว่างซี่เฟืองได้จริงๆ งั้นหรือ?”","จำเป็นต้องรู้ว่า ระยะห่างระหว่างช่องว่างของซี่เฟืองแต่ละซี่นั้นมีเพียง 0.5 ซม. เท่านั้น และมันก็จะกลายเป็นเครื่องมือตัดอันแหลมคมเมื่อมีความเร็วสูง แล้วถ้าเกิดธาตุแสงไม่สามารถหาช่องว่างของซี่เฟืองเจอในตอนที่มันวิ่งผ่านไปล่ะ?","พวกเขาจะไม่สามารถมองเห็นมันได้เลยใช่หรือไม่?","“พวกเราอาจจะไม่สามารถแยกแยะได้ แต่แสงจะต้องทำได้อย่างแน่นอน!”","ลินน์กล่าวด้วยความมั่นใจ","“ดูสิ ความถี่ในการกะพริบของลำแสงและจุดแสงดูเหมือนจะ...ช้าลงนะ!”","ราฟาเอลรีบเตือน","เขาไม่ได้เป็นเพียงคนเดียวที่สังเกตเห็นสิ่งนี้ เพราะการเปลี่ยนแปลงนั้นชัดเจนมากจนไม่สามารถเป็นเพียงแค่ภาพลวงตาได้ หลังจากที่ความเร็วในการหมุนของเฟืองเพิ่มขึ้นอีกครั้ง ใบหน้าของพ่อมดแม่มดที่อยู่ในเหตุการณ์ก็แสดงความตกใจออกมา...","“จุดแสง...หายไปแล้ว!”","ซานเชซเบิกตากว้าง และก็มีฉากที่แปลกประหลาดอย่างมากปรากฏขึ้นตรงหน้าเขา ลำแสงเล็กๆ ที่ถูกปล่อยออกมาจากเครื่องมือแปรธาตุ ได้หยุดอยู่ที่เฟืองเมื่อมันสะท้อนกลับมา แต่ลำแสงในระยะห่างจากเฟืองไปจนถึงกระจกกึ่งสะท้อนกลับหายไปในทันที มันไม่ปรากฏขึ้นและหายไปเหมือนเมื่อก่อนแล้ว และบนกระจกกึ่งสะท้อนก็ไม่มีจุดแสงใดๆ เลย","ซึ่งนี่มันตรงกันข้ามกับสิ่งที่ลินน์พูดเอาไว้อย่างสิ้นเชิง...","“นี่มันเกิดอะไรขึ้น?”","ราฟาเอลแทบจะกระชากเคราของเขาออกมา ในหัวเต็มไปด้วยความสงสัย","“นั่นเป็นเพราะแสงที่ผ่านช่องว่างของซี่เฟืองไป ได้กระทบเข้ากับซี่เฟืองพอดีเมื่อมันสะท้อนกลับมา สิ่งนี้แสดงให้เห็นว่าความเร็วของแสงนั้นมีขีดจำกัด และพวกเราก็ประสบความสำเร็จไปแล้วครึ่งหนึ่ง!”","คำพูดของลินน์ดังก้องอยู่ในหูของทุกคน"]},{"n":336,"t":"แสงสามารถโคจรรอบทวี
