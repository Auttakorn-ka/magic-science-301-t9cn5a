<style>

<script>
const CHAPTERS = [{"n":301,"t":"ยุคสมัยมันเปลี่ยนไปแล้ว เจ้าโง่!","c":["“คุ้มกันฝ่าบาท!”","“ฆ่าพวกกบฏพวกนั้น!”","ภายในพระราชวังฮัดลาตา ซิมมอนส์หัวหน้าองครักษ์ตะโกนก้อง สั่งการให้องครักษ์ของเขาใช้โล่ในมือต้านทานการโจมตีอันดุเดือดจากปืนคาบศิลา","แม้กองกำลังส่วนใหญ่ในเมืองหลวงถูกส่งไปปฏิบัติภารกิจในคืนนี้ แต่บาเซลก็คาดการณ์ถึงความเป็นไปได้ที่จะล้มเหลว หรือแม้แต่ความเป็นไปได้ที่จะเป็นการล่อเสือออกจากถ้ำ ดังนั้นย่อมเป็นไปไม่ได้ที่พระราชวังจะปราศจากการป้องกัน","นอกจากองครักษ์ส่วนหนึ่งที่อยู่เฝ้าแล้ว ยังมีบิชอปหลายคนและนักบวชอีกสิบกว่าคนคอยช่วยในการป้องกัน ดังนั้นแม้ว่าเรย์เดลจะนำกำลังมาเป็นจำนวนมากและใช้ปืนคาบศิลา แต่ก็ยังไม่สามารถบุกทะลวงเข้ามาได้ในทันที","จนกระทั่งเสาสายฟ้าขนาดมหึมาที่สว่างไสวพอจะทำให้เมืองหลวงยามค่ำคืนนั้นสว่างจ้าตกลงมาจากฟากฟ้า สถานการณ์จึงพลิกผัน","เรย์เดลและคนอื่นๆ ต่างก็ตกตะลึง และโชคดีที่พวกเขาได้รับคำสั่งมาก่อนหน้านี้ ซึ่งพอจะคาดเดาได้ว่าเกิดอะไรขึ้น","องครักษ์ที่เฝ้าพระราชวังตกอยู่ในความโกลาหลอย่างหลีกเลี่ยงไม่ได้ โดยเฉพาะเหล่านักบวชและบิชอปที่ช่วยป้องกัน เพราะเสาสายฟ้าที่ตกลงมาจากฟากฟ้านั้น ไม่ใช่พลังศักสิทธิ์ที่พวกเขารู้จัก!","“อย่าตื่นตระหนก นั่นคือการลงทัณฑ์พวกกบฏโดยท่านคาร์ดินัลโลซัค พระเจ้า...ทรงอยู่กับข้า!”","ซิมมอนส์ตะโกนเสียงแหบพร่า พยายามหยุดความโกลาหลของกองทัพไว้ แต่ก็ไม่อาจขวางกั้นเหล่าทหารที่ล้มลงจากการระดมยิงของปืนและกระสุนที่พุ่งเข้ามาได้","แต่สิ่งที่ทำให้ซิมมอนส์นั้นถอนหายใจด้วยความโล่งอกเพียงอย่างเดียวก็คือ หลังจากที่ถูกยิงไปไม่กี่ชุด เสียงของปืนก็เงียบลง","เรย์เดลและพวกพ้องกระสุนหมดแล้ว!","จากการสู้รบระหว่างทางตั้งแต่เมืองหลวงจนมาถึงพระราชวัง กระสุนที่พกติดตัวมาได้ใช้ไปจนหมดสิ้น ซึ่งทำให้ทุกคนต้องยกปืนคาบศิลาขึ้น เพื่อเตรียมพร้อมสำหรับการต่อสู้ประชิดตัว!","ซิมมอนส์จึงตระหนักได้อย่างรวดเร็วจากการกระทำของคนเหล่านั้น และเริ่มฮึกเหิมขึ้นมาทันที","“ทุกคน ตั้งสติให้ดี โอกาสของตอบโต้มาถึงแล้ว พวกสาวกของปีศาจเหล่านั้นไม่สามารถใช้อาวุธเวทมนตร์ที่ทรงพลังได้อีกแล้ว และตอนนี้ก็เป็นเวลาที่เราจะได้รับชัยชนะ!”","เหล่าองครักษ์ที่ถูกบีบให้รวมกลุ่มอยู่ในแนวโล่และถูกระดมยิงด้วยปืนคาบศิลา ต่างก็กำดาบยาวแน่นและพุ่งเข้าใส่ฝ่ายตรงข้ามราวกับหมาป่า","ซิมมอนส์ก็ไม่เว้น โดยเล็งเป้าหมายไปที่เรย์เดลซึ่งเป็นผู้บัญชาการในทันที ตราบใดที่เขาสังหารผู้นำได้ก่อน มันจะต้องสร้างความเสียหายต่อขวัญกำลังใจของพวกกบฏเหล่านี้อย่างมหาศาล!","ซิมมอนส์สะบัดดาบด้วยความเร็วที่เหนือชั้น สังหารนักแม่นปืนสองคนที่ล้อมเขาอยู่ได้ในพริบตา","เพราะในฐานะหัวหน้าองครักษ์ที่กษัตริย์บาเซลทรงวางพระทัย แม้ว่าซิมมอนส์จะไม่ใช่อัศวินขุนนางที่มีสายเลือดชั้นเลิศ แต่เขานั้นก็ได้รับน้ำยาพรศักดิ์สิทธิ์จากผลงานทางทหาร และมีสมรรถภาพร่างกายเหนือกว่าคนทั่วไป ซึ่งเมื่อคมดาบฟาดฟันลงมา ย่อมต้องมีใครสักคนโหยหวนและล้มลงในกองเลือด","“ถอยไปจากข้า!”","เรย์เดลตะโกนลั่น หยุดไม่ให้ผู้คนมารุมล้อมเพื่อปกป้องตน","“ก็กล้าหาญดีนี่!”","ซิมมอนส์สลัดเลือดบนอาวุธในมือออก จากนั้นรอยยิ้มที่โหดเหี้ยมก็ปรากฏขึ้นที่มุมปากของเขา","“แต่ชีวิตของเจ้าน่ะ ข้าขอรับไว้เอง!”","สิ้นเสียงนั้น ร่างกายของซิมมอนส์ก็พุ่งทะยานราวกับพายุ ซึ่งข้ามระยะทางกว่าสิบเมตรในเวลาเพียงสองหรือสามก้าว และเหวี่ยงดาบขนาดใหญ่ในมือหมายฟันใส่เรย์เดล","อย่างไรก็ตาม เรย์เดลที่กำลังเผชิญหน้ากับเขากลับโยนปืนคาบศิลาในมือทิ้งโดยตรง แล้วดึงปืนสั้นขนาดเท่าฝ่ามือสีดำสนิทออกมาจากกระเป๋าที่ติดกับเข็มขัดแทน และเล็งปากกระบอกสีดำไปที่ซิมมอนส์","ความเย็นเยียบแล่นพล่านจากฝ่าเท้าขึ้นสู่ศีรษะในทันที ซิมมอนส์ ผู้ซึ่งเพิ่งเห็นการยิงของปืนคาบศิลา ย่อมคาดเดาได้ว่ามันคือสิ่งที่คล้ายคลึงกัน","แต่ในระยะประชิดเช่นนี้ การหลบหลีกย่อมสายเกินไป ซิมมอนส์จึงทำได้เพียงวางดาบขวางลำตัว เปลี่ยนจากการรุกเป็นรับ และด้วยความเร็วในการตอบสนองอันยอดเยี่ยมเช่นนี้ เขานั้นสามารถปัดป้องลูกธนูที่พุ่งเข้ามาได้ด้วยซ้ำ...","แม้ว่าอาวุธเวทมนตร์แปลกๆ ชนิดนี้จะยิงกระสุนได้เร็วกว่าธนูหน้าไม้มาก แต่เขาก็มั่นใจว่าจะสามารถป้องกันมันได้!","ปัง!","เสียงปืนก็ดังขึ้นอย่างฉับพลัน!","สีหน้าของซิมมอนส์เปลี่ยนจากเคร่งขรึมเป็นหวาดกลัว เพราะสิ่งที่พุ่งออกมาจากปากกระบอกปืนไม่ใช่กระสุนเพียงนัดเดียว แต่เป็นนับสิบหรือนับร้อย!","ซึ่งมีกระสุนจำนวนมากพุ่งออกจากปากกระบอกปืนแล้วกระจายตัวออกเป็นรูปกรวย ภายใต้ระยะครอบคลุมของกระสุนที่กว้างขวางเช่นนี้ จึงทำให้ซิมมอนส์นั้นไม่สามารถแม้แต่จะหลบหลีกขั้นพื้นฐานได้ แขนซ้าย หัวไหล่ เอว และช่องท้องของเขาล้วนถูกกระสุนตะกั่วที่พุ่งเข้ามาเจาะทะลุ จนแตกละเอียดกลายเป็นชิ้นส่วนกระจายไปทั่วท้องฟ้า และโปรยปรายลงสู่พื้นดิน…โดยมีร่างของซิมมอนส์ที่ล้มลงบนพื้นราวกับใบไม้ร่วง พร้อมดวงตาที่เต็มไปด้วยความแค้นเคืองและไม่ยินยอม นี่ไม่ใช่วิธีการต่อสู้และความตายที่อัศวินควรได้รับ...","“ยุคสมัยมันเปลี่ยนไปแล้ว เจ้าโง่!”","เรย์เดลส่ายหน้า นี่เป็นสินค้าชั้นเลิศที่โรงงานเล่นแร่แปรธาตุผลิตขึ้นมาเพื่อเขาโดยเฉพาะ","เดิมทีมันตั้งใจจะเอาไว้ใช้รับมือกับพวกบิชอปในสถานการณ์ฉุกเฉิน แต่ในเมื่อซิมมอนส์ยืนกรานที่จะเข้ามาหา ก็ให้เขาได้ลิ้มลองอาวุธปืนนี้เสียหน่อย!","เรย์เดลเก็บปืนสั้น หยิบดาบอัศวินของคู่ต่อสู้ขึ้นมา พร้อมกับเสียบมันลงบนศพของซิมมอนส์แล้วชูขึ้นสูง จากนั้นก็ตะโกนก้องว่าผู้นำตายแล้ว เพื่อทำลายจิตวิญญาณการต่อสู้ของทหารองครักษ์","ในขณะนี้ภายในพระราชวัง เหล่าข้าราชบริพารและขุนนางต่างตกอยู่ในความโกลาหล มีเสียงดาบและเสียงปืนดังมาจากภายนอกอย่างต่อเนื่อง แต่บาเซลก็ยังคงนั่งอยู่บนบัลลังก์โดยไม่มีท่าทีว่าจะขยับเขยื้อน","“ฝ่าบาทบาเซล พวกคนงานเหมืองสารเลวนั่นกำลังจะบุกเข้ามาแล้ว หากไม่รีบหนีไปตอนนี้ มันจะสายเกินไปพะย่ะค่ะ”","ข้าราชบริพารผู้จงรักภักดีคุกเข่าลงกับพื้นและกล่าวด้วยความกระวนกระวาย","“ไม่ พวกเขาอยู่ที่หน้าประตูแล้ว”","สีหน้าของบาเซลสงบนิ่งมาก ในวินาทีที่เขาได้รับรายงานว่าพระราชวังถูกโจมตี เขาก็คาดเดาได้แล้วว่าปฏิบัติการต่อต้านพวกพ่อมดในคืนนี้นั้นเป็นเพียงกับดัก","ราวกับเหยื่อที่ติดอยู่ในใยแมงมุม ที่แม้จะดิ้นรนไปก็เปล่าประโยชน์ ซึ่งบาเซลนั้นก็ตระหนักถึงเรื่องนี้เป็นอย่างดี และไม่มีความตั้งใจที่จะหลบหนี พร้อมด้วยอายุขัยของเขาที่มาถึงจุดสิ้นสุดแล้ว","ยิ่งไปกว่านั้น นี่คืออาณาจักรของเขา ดินแดนของตระกูลบาเซลที่ปกครองสืบทอดกันมาหลายชั่วอายุคน เขานั้นยังคงต้องตรวจสอบผู้สืบทอดคนใหม่ ว่าบุตรชายที่โง่เขลาของเขาจะมีความสามารถในการปกครองอาณาจักรหรือไม่!","เสียงดังสนั่นหวั่นไหวดังมาจากที่ไกลๆ ก็เข้าใกล้มาเรื่อยๆ พร้อมกับการสังหารและเสียงฝีเท้าจำนวนมาก จนทำให้พระราชวังทั้งหลังเริ่มสั่นสะเทือนเล็กน้อย ราวกับว่ามันกำลังจะพังทลายลง","หลังจากนั้นไม่นาน ทุกอย่างก็กลับสู่ความสงบ และประตูพระราชวังก็เปิดออกในที่สุด","ฮัตตาร์เป็นคนแรกที่ก้าวเข้าสู่พระราชวัง โดยมีดาบเปื้อนเลือดอยู่ในมือ พร้อมกับลินน์ที่ไม่ได้คิดจะแย่งซีนของเขา จึงเดินตามหลังมาพร้อมกับแอนโธนี","สายตาของกษัตริย์บาเซลกวาดผ่านร่างของแอนโธนี และหยุดอยู่ที่ร่างของลินน์เป็นเวลานาน สุดท้ายจึงหันไปมองฮัตตาร์และถอนหายใจ","“หากเจ้าเดินเข้ามาในโถงนี้เพียงลำพังในคืนนี้ ข้าคงจะมีความสุขมาก ฮัตตาร์!”"]},{"n":302,"t":"พลังที่ไร้การควบคุมย่อมนำพาหายนะมาสู่อาณาจักรแห่งนี้ไม่ช้าก็เร็ว!","c":["“แน่นอนสิ ท่านคงมีความสุขมาก ถ้าข้ามาตามนัดเพียงลำพัง ข้าคงกลายเป็นผีเฝ้าที่นี้ไปแล้ว!”","ฮัตตาร์ตอบกลับพร้อมรอยยิ้มเยาะเย้ย","“ข้าไม่นึกเลยว่าเจ้าจะมองข้าเช่นนี้ ฮัตตาร์...”","กษัตริย์กล่าวด้วยถอนหายใจ","“แต่นั่นคือสิ่งที่ท่านทำไม่ใช่หรือ? ท่านพ่อ?”","สีหน้าของฮัตตาร์พลันเย็นชาลง พร้อมจ้องมองบาเซลผู้แก่ชราที่นั่งอยู่บนบัลลังก์ตรงหน้า โดยมีน้ำเสียงสูงขึ้นเล็กน้อยขณะถามอย่างกึกก้อง","“แล้วแฮโรลด์ล่ะ? ไอ้ขยะนั่นที่ไม่มีประโยชน์อะไรเลยนอกจากคอยเอาใจศาสนจักร ข้าด้อยกว่ามันตรงไหน?”","“ตอบข้ามา ท่านพ่อ!”","ฮัตตาร์คำราม กัดฟันแน่น ดวงตาเบิกโพลงตะโกนอย่างโกรธจัด","บาเซลจ้องมองฮัตตาร์อย่างเงียบงัน แต่ฮัตตาร์ยังคงตั้งคำถามกับเขาอย่างไม่ลดละ","“การลดอำนาจของศาสนจักรและรวบรวมสิทธิ์ทั้งหมดไว้ในมือท่าน นั่นไม่ใช่สิ่งที่ท่านทำมาตลอดหรือ? หรือว่าท่านกลัว? กลัวอำนาจของศาสนจักรเหมือนกับแฮโรลด์ เต็มใจจะเป็นเพียงกษัตริย์หุ่นเชิด?”","“การที่เจ้ายังไม่เข้าใจในเรื่องนี้ นั่นก็หมายความว่าเจ้านั้นยังไม่มีคุณสมบัติ และยังห่างไกลจากการที่จะแบกรับภาระสำคัญในฐานะกษัตริย์”","บาเซลมองบุตรชายคนที่สองของเขาด้วยความผิดหวังอย่างยิ่ง","“จริงหรือ?”","ใบหน้าของฮัตตาร์บิดเบี้ยว แต่ไม่นานเขาก็กลับมาสงบนิ่งและหัวเราะลั่น","“แต่ตอนนี้มันพิสูจน์แล้วว่าข้าคิดถูก แฮโรลด์พ่ายแพ้และคาร์ดินัลโลซัคตายแล้ว ตั้งแต่วันพรุ่งนี้เป็นต้นไป ข้าจะเป็นกษัตริย์องค์ใหม่ของฮัดลาตา!”","“และข้า...ก็เหนือกว่าท่านแล้ว ท่านพ่อ! เพราะข้าจะขับไล่นักบวชพวกนั้นทั้งหมดออกจากดินแดน โดยจะนำพื้นที่ทุกตารางนิ้วเข้าสู่การปกครองของกษัตริย์และเหล่าขุนนาง ซึ่งจะกลายเป็นกษัตริย์แห่งฮัดลาตาอย่างแท้จริง!”","ฮัตตาร์กล่าวอย่างตื่นเต้นอย่างหาที่สุดไม่ได้","“หากเป็นเช่นนั้น เจ้าก็เข้ามาสิ”","บาเซลลุกขึ้นจากบัลลังก์อย่างยากลำบาก จากนั้นก็ชักดาบออกมาแล้วชี้ไปที่ฮัตตาร์","“เมื่อร้อยกว่าปีก่อน ณ ที่แห่งนี้ ปู่ของเจ้า เขาก็ตัดหัวกษัตริย์องค์ก่อนและยึดบัลลังก์แห่งฮัดลาตามา...และในวันนี้ เจ้าจงแสดงให้ข้าได้เห็น ถึงความสง่างามของกษัตริย์ในตัวเจ้าหน่อยซิ!”","ฮัตตาร์ผู้ถูกดาบชี้ใส่ชะงักไปครู่หนึ่ง และไม่คิดว่าบาเซลผู้มีอายุเกินแปดสิบปีจะคิดต่อสู้กับเขาเพื่อตัดสินในการเป็นเจ้าของบัลลังก์ ซึ่งนั่นก็ทำให้เขาทำอะไรไม่ถูกไปชั่วขณะ","แม้ว่าเขาจะมาเพื่อยึดบัลลังก์ แต่เขาก็ไม่ได้หมายความว่าต้องฆ่ากษัตริย์ เขาเพียงแค่อยากให้บาเซลเข้าใจว่าเขาเป็นผู้สมัครที่ดีที่สุดที่จะเป็นขึ้นกษัตริย์","“แน่นอน เจ้าจะเลือกให้คนอื่นมาฆ่าพ่อของเจ้าก็ได้!”","คำพูดของบาเซลเฉียบคมมาก แฝงด้วยการเสียดสี","ในเมื่อเรื่องมาถึงขั้นนี้ ฮัตตาร์จึงไม่ลังเลอีกต่อไป โดยสลัดเลือดบนดาบยาวทิ้งแล้วพุ่งเข้าใส่บาเซลในขณะที่กำด้ามดาบแน่น","เคร้ง","เสียงโลหะปะทะกันดังบาดหูพร้อมประกายไฟ โดยที่บาเซลผู้แก่ชราและร่างกายทรุดโทรมราวกับจะถูกลมพัดปลิว กลับถือดาบยาวไว้แน่นและรับการโจมตีเอาไว้ได้","“เจ้ามีฝีมือแค่นี้หรือ ฮัตตาร์?”","กษัตริย์บาเซลกล่าวด้วยความผิดหวัง","“อำนาจและฐานะนั้นเป็นสิ่งสำคัญ แต่พลังต่างหากคือสิ่งที่เป็นของเจ้าอย่างแท้จริง และมันจะเป็นที่พึ่งสุดท้ายของเจ้า...”","ฮัตตาร์โกรธจัดในทันที ตวัดดาบฟันไปที่ศีรษะของบาเซลขณะคำรามอย่างโกรธเคือง","“นั่นคือเหตุผลที่ข้าไม่อยากฆ่าท่านเมื่อครู่นี้ไง!”","เสียงดาบปะทะกันดังก้องอยู่ในพระราชวังอันกว้างใหญ่ ซึ่งท่วงท่าของฮัตตาร์นั้นทั้งรวดเร็วและสวยงาม ในฐานะเจ้าชาย เขาจึงได้รับการฝึกฝนที่ดีที่สุดและเข้มงวดที่สุด พร้อมด้วยพลังของสายเลือดที่ทรงพลัง ความแข็งแกร่งของเขาจึงไม่ควรมองข้าม","แต่คู่ต่อสู้ของเขาคือกษัตริย์แห่งฮัดลาตา ผู้ซึ่งเคยนำทัพเปิดศึกไปทั่วทุกแห่งหน และเป็นที่รู้จักในนาม ‘บาเซล สิงโตผู้พิชิต!’","“อย่าปล่อยให้โทสะชี้นำการกระทำของเจ้า นี่คือข้อห้ามร้ายแรง และจงอย่าแสดงสีหน้าให้ข้าเห็นเป็นอันขาด เพราะมันจะเปิดเผยการเคลื่อนไหวต่อไปของเจ้าจนหมดสิ้น!”","บาเซลรับการโจมตีอันหนักหน่วงของฮัตตาร์อีกครั้ง จากนั้นจึงหมุนดาบและทิ้งรอยเลือดที่ชัดเจนไว้บนใบหน้าของฮัตตาร์ และกล่าวด้วยน้ำเสียงเย็นชา","“คมดาบของศัตรูนั้นไม่มีความเมตตา!”","ลินน์สังเกตการต่อสู้ระหว่างพ่อลูกด้วยความสนใจอย่างยิ่ง โดยสนใจราชวงศ์และขุนนางที่สืบทอดสายเลือดเหล่านี้มาก","ตามที่ผู้สร้างเวทมนตร์วิตตอริโอ้กล่าว ‘สายเลือดชั้นเลิศ’ ที่สืบทอดกันมาเหล่านี้อาจเป็นซากปรักหักพังของยุคเก่า และอาจเป็นลูกหลานของพ่อมดสายแปรสภาพที่ทรงพลังบางคน","ซึ่งมันก็เหมือนกับโอเว่นที่ดื่มน้ำยาเวทมนตร์เพื่อรับพลังของสัตว์ประหลาด...","สำหรับความแข็งแกร่งของทั้งสอง ฮัตตาร์นั้นมีสมรรถภาพร่างกายประมาณพ่อมดสายแปรสภาพระดับสอง ในขณะที่กษัตริย์บาเซลนั้นแข็งแกร่งกว่าอย่างเห็นได้ชัด แม้ร่างกายจะชราแต่เขาก็ยังคงรับดาบทุกเล่มของฮัตตาร์ได้อย่างใจเย็น","แม้ภายนอกดูเหมือนว่าทั้งสองจะสูสีกัน แต่ไม่นานความแตกต่างก็เริ่มปรากฏชัดขึ้น โดยฮัตตาร์นั้นรู้สึกกระวนกระวายมากขึ้นเรื่อยๆ เมื่อไม่อาจโจมตีให้ชนะได้เป็นเวลานาน","“การฝืนใช้พลังที่ไม่อาจควบคุม สิ่งที่เจ้าจะได้รับมีเพียงการสะท้อนกลับ!”","สีหน้าของบาเซลนั้นยังคงเรียบเฉย แต่ครั้งนี้เขาไม่ได้ตั้งรับอีกต่อไป และดาบยาวในมือก็ฉวยจังหวะตวัดฟันเข้าปะทะกับใบดาบของอีกฝ่ายในมุมที่ยากจะรับมือ","“สำหรับวิชาดาบ ไม่ใช่แค่ยิ่งเร็วยิ่งดีเสมอไปหรอกนะ!”","ฮัตตาร์รู้สึกชาหนึบที่มือขวา ก่อนที่ดาบยาวจะหลุดปลิวออกจากมือไป","แต่บาเซลกลับไม่ได้ใช้โอกาสนั้นโจมตีซ้ำและทิ้งดาบในมือไป จากนั้นจึงคว้าร่างของฮัตตาร์เข้ามาใกล้ โดยกำลังอ้าปากพูดบางสิ่ง แต่ในวินาทีต่อมาเขากลับรู้สึกเจ็บแปลบที่หน้าอก ซึ่งมีกริชเล่มหนึ่งได้แทงทะลุเข้าที่หัวใจของเขา","และผู้ที่ลงมือก็คือ ฮัตตาร์!","“นี่คือสิ่งที่ท่านสอนข้า…ว่าไม่ควรลดการป้องกันลงเด็ดขาด”","ฮัตตาร์สงบนิ่งท่ามกลางความบ้าคลั่ง โดยที่ถ้อยคำเหล่านี้แทบจะเค้นลอดออกมาจากไรฟัน","เลือดก้อนโตไหลออกมาจากมุมปากของบาเซล แต่รอยยิ้มกลับปรากฏขึ้นบนใบหน้า เขากลับจับมือของฮัตตาร์และแทงมีดสั้นให้ลึกเข้าไปอีก พร้อมดวงตาของเขาที่เผาไหม้ราวกับคบเพลิง","“อย่าได้หวาดกลัว จงจดจำความรู้สึกนี้ไว้ ลูกข้า...บัลลังก์นั้นถูกหล่อหลอมขึ้นจากเหล็กและเลือด และผู้เดียวที่เจ้าสามารถเชื่อใจได้อย่างแท้จริงก็คือตัวเจ้าเอง”","“ไม่ว่าจะนักบวช ขุนนาง หรือพ่อมด...ล้วนไม่แตกต่างกัน...พลังที่ไร้การควบคุมย่อมนำพาหายนะมาสู่อาณาจักรแห่งนี้ไม่ช้าก็เร็ว!”","เสียงของบาเซลเบามาก ผสมกับเสียงครวญครางที่เจ็บปวด ซึ่งแทบจะดังอยู่ในหูของฮัตตาร์","“เจ้าทำพลาดแล้ว เจ้าไม่ควรทำลายล้างศาสนจักรจนย่อยยับและทำลายสมดุลนี้ลงเลย แต่มันสายไปแล้ว...ตอนนี้มันสายเกินไปแล้ว!”","“และสำหรับข้าแล้ว ไม่ว่าจะเป็นเจ้าหรือแฮโรลด์ก็ล้วนเหมือนกัน....”","บาเซลต้องการพูดต่อ แต่เลือดที่พุ่งขึ้นมานั้นได้ปิดกั้นลำคอของเขา และร่างกายของเขาก็ทรุดลงลงอย่างหมดเรี่ยวแรง..."]},{"n":303,"t":"มงกุฎเปื้อนเลือด","c":["ภายในท้องพระโรง เมื่อร่างของบาเซลล้มลงกระแทกพื้น มงกุฎทองคำก็ร่วงหล่นจากบนศีรษะแล้วกลิ้งไปจนหยุดอยู่ตรงหน้าฮัตตาร์","ในที่สุดเขาก็ได้ในสิ่งที่ปรารถนามาตลอด แต่ฮัตตาร์กลับไม่อาจเค้นความยินดีใดๆ ออกมาได้เลยแม้แต่น้อย เพราะถ้อยคำของบาเซลนั้นยังคงดังกึกก้องอยู่ในหัวราวกับมนสะกด","ลินน์ทอดสายตาไปยังกษัตริย์แห่งฮัดลาตาอยู่ครู่หนึ่ง","ไม่ว่าจะเป็นความกล้าหาญชาญชัยที่ยอมใช้พวกพ่อมดเพื่อต่อกรกับศาสนจักร การพยายามค้นหาสมดุลระหว่างสองขั้วอำนาจ หรือการยอมรับความตายอย่างสงบนิ่ง และใช้ความตายนั้นสอนบทเรียนสุดท้ายแก่บุตรชาย ทั้งหมดนี้ทำให้เขาสัมผัสได้ถึงความสามารถและอุปนิสัยของกษัตริย์ผู้นี้","แต่เขาก็แก่เกินไป และระดับของเขากับบุตรชายทั้งสองนั้นยังห่างชั้นอยู่มาก ซึ่งอาจเป็นเหตุผลที่บาเซลไม่ตัดสินใจเลือกผู้สืบทอดบัลลังก์เสียทีเป็นเวลานาน","ลินน์รออยู่นาน เมื่อเห็นว่าฮัตตาร์ยังคงเหม่อลอยไม่ได้สติเสียที เขาก็อดไม่ได้ที่จะเอ่ยเตือน","“ขอแสดงความยินดีที่ทรงได้ครองบัลลังก์ องค์ชายฮัตตาร์ อ้อ ไม่สิ ข้าควรเรียกท่านว่าฝ่าบาทต่างหาก!”","“สถานการณ์ในเมืองหลวงนั้นยุ่งเหยิงเป็นอย่างมาก เราจำเป็นต้องระดมกำลังคนเพิ่มเพื่อปราบปรามพวกกองกำลังต่อต้านเหล่านั้น และที่สำคัญไปกว่านั้น เรายังจับตัวแฮโรลด์พี่ชายของท่านไม่ได้ ซึ่งนั่นถือเป็นภัยคุกคามที่ไม่อาจมองข้าม...”","ฮัตตาร์ก้มลงเก็บมงกุฎเปื้อนเลือดที่ตกอยู่บนพื้น จากนั้นหันไปมองเหล่าข้าราชบริพารที่ตัวสั่นเทาด้วยความหวาดกลัวอยู่ตรงมุมห้อง แล้วกล่าวด้วยน้ำเสียงเย็นชา","“สังหารพวกมันซะ ท่านแอนโธนี...”","คนพวกนี้เห็นบาเซลสิ้นพระชนม์ด้วยน้ำมือของเขาเอง จะปล่อยให้พวกมันมีชีวิตรอดต่อไปไม่ได้เด็ดขาด!","ซึ่งแอนโธนีก็ไม่ได้ลงมือทันที แต่เหลือบมองลินน์ก่อนเป็นอันดับแรก และเมื่อเห็นว่าอีกฝ่ายไม่คัดค้าน เขาจึงยื่นมือออกไป พร้อมกับกระแสไฟฟ้าสีน้ำเงินอมม่วงที่แผ่คลุมทุกคนในทันที","ในชั่วพริบตา เหล่าข้าราชบริพารภายในวังก็สิ้นใจลงท่ามกลางอาการชักกระตุกและเสียงร้องโหยหวน","ซึ่งฮัตตาร์เองก็มองเห็นความลังเลในสายตาของแอนโธนี แต่เขาก็ไม่ได้เอ่ยอะไร เพียงแค่เรียกทหารยามที่ประจำการอยู่นอกประตูเข้ามา แล้วออกคำสั่งให้ไล่จับแฮโรลด์ทั่วทั้งเมือง","“ด้วยข้อหาที่ว่าเขาไม่พอใจที่ถูกเสด็จพ่อกักบริเวณ จึงได้สมคบคิดกับคาร์ดินัลโลซัคเพื่อลอบปลงพระชนม์กษัตริย์ จงนำข่าวนี้ไปกระจายให้ทั่วทั้งเมืองหลวงภายในเวลาที่สั้นที่สุด!”","“ขอรับ ฝ่าบาท!”","ทหารยามตอบรับโดยไม่ลังเล ก่อนจะรีบวิ่งออกไปเพื่อถ่ายทอดคำสั่ง","นขณะนั้นเอง คลื่นพลังศักดิ์สิทธิ์อันรุนแรงก็ปะทุขึ้นมาจากที่ไกลๆ อย่างกะทันหัน ซึ่งแอนโธนีก็สัมผัสได้ถึงความผิดปกติทันที และมองออกไปนอกพระราชวังพร้อมกับขมวดคิ้วเล็กน้อย","ในเมื่อคาร์ดินัลโลซัคตายไปแล้ว จะมีใครที่ไหนสามารถใช้พลังศักดิ์สิทธิ์ที่ทรงอานุภาพขนาดนี้ได้อีก?","ลินน์ไม่ได้รับรู้ถึงคลื่นพลังนั้นเลยแม้แต่น้อย แต่เขาก็สังเกตเห็นความเคลื่อนไหวของแอนโธนี และกำลังจะเอ่ยถาม แต่ในตอนนั้น เขาก็มองเห็นลำแสงสีแดงฉานพุ่งทะยานขึ้นสู่ท้องฟ้า ก่อนจะระเบิดออก","“นั่นมันพลุสัญญาณ!”","ด้านนอกคฤหาสน์ของฮัตตาร์ เหล่าพลปืนคาบศิลาที่ประจำการอยู่ที่นี่ต่างเอาแต่คิดเรื่อยเปื่อยว่าจะได้รับรางวัลแบบไหนบ้าง หลังจากที่สร้างผลงานบุกยึดเมืองหลวงสำเร็จ","“เมืองหลวงแห่งฮัดลาตานี่มันรกไปหมดทุกที่เลย ไม่สวยงามเหมือนอิเยตาสักนิด”","เฒ่ายอร์คเบะปากด้วยความเหยียดหยาม ตอนที่ได้ยินว่าพวกเขากำลังจะบุกโจมตีเมืองหลวงของอาณาจักร เขาก็แอบตั้งตารอ แต่เมื่อเข้ามาถึง กลับพบว่ามันไม่มีอะไรน่าประทับใจเลย","“พวกพ่อมดเคยบอกไว้ไม่ใช่เหรอ? ว่าพวกคนที่อยู่นอกดินแดนพ่อมดน่ะ เป็นพวกป่าเถื่อนโง่เขลา พวกเขายังแยกไม่ออกด้วยซ้ำว่าพวกเรากำลังยืนอยู่บนทวีปหรือบนลูกบอลกลมๆ”","พลปืนคาบศิลาที่ชื่ออาปูตอบกลับด้วยเสียงเยาะเย้ย จากนั้นก็สะบัดตัวแล้วพึมพำ","“พวกเจ้าเฝ้าตรงนี้ไปก่อนนะ ข้าจะไปปลดทุกข์สักหน่อย...”","อาปูซึ่งเกิดในดินแดนพ่อมดนั้นไม่ได้เคารพยำเกรงพวกที่เรียกตัวเองว่าขุนนางเลยสักนิด ซึ่งเขาหันหลังเดินไปที่กองซากปรักหักพังบนพื้น ก่อนจะถอดกางเกงลงแล้วปัสสาวะรดในคฤหาสน์ขององค์ชาย เขาควรจะเป็นคนแรกที่ได้ทำแบบนี้สินะ?","อาปูคิดอย่างภาคภูมิใจ พร้อมสายน้ำที่พุ่งกระฉูดออกมาจากใต้ร่าง และในขณะที่เขากำลังปลดปล่อยอย่างสบายตัวอยู่นั้น เขาก็เหลือบไปเห็นสิ่งของใสแจ๋วราวคริสตัลที่ดูเหมือนจะส่องประกายอยู่ท่ามกลางซากปรักหักพัง...","หรือว่านั่นจะเป็นสมบัติล้ำค่าที่องค์ชายทรงเก็บซ่อนไว้ในคฤหาสน์กัน?","อาปูเปลี่ยนความคิดทันที แม้ว่ากองกำลังพลปืนคาบศิลาจะมีกฎสั่งห้ามซุกซ่อนและปล้นสะดมอย่างเด็ดขาด แต่ตราบใดที่ไม่มีใครเห็น ก็แปลว่าเขาไม่ได้ทำผิดกฎ ด้วยการใช้วิธีมือไวตาไวเช่นนี้ในยามปกติ เขาจึงแอบกอบโกยของดีๆ ไปได้ไม่น้อยเลย","เมื่อคิดได้ดังนั้น อาปูก็ย่อตัวลงนั่งยองๆ อย่างเงียบเชียบ แต่ผิดคาด วัตถุที่สะท้อนแสงคริสตัลชิ้นนั้นกลับลอยพุ่งตรงดิ่งมาหาเขา","ของชิ้นนี้ถึงกับร่อนมาเสิร์ฟถึงที่ด้วยตัวเองเลยหรือเนี่ย?","ความคิดสุดท้ายนี้แล่นเข้ามาในหัวของอาปู ก่อนที่ตราสัญลักษณ์ขนาดเล็กชิ้นนั้นจะพุ่งกระแทกเข้าที่หัวของเขา ทำให้เขาสูญเสียสติไปในทันที และล้มพับลงไปกองกับพื้น","“อาปู เจ้าไม่ได้ลื่นฉี่ตัวเองล้มลงไปหรอกนะ?”","เฒ่ายอร์คเห็นอาปูนอนอยู่บนพื้นจึงเดินเข้าไปหาแล้วพูดหยอกล้อ","อาปูหยัดตัวลุกขึ้นยืนอย่างโอนเอน โดยมีตราสัญลักษณ์อันงดงามฝังแน่นอยู่บนหน้าผากของเขา","เฒ่ายอร์คเดินไปได้ไม่กี่ก้าวก็สังเกตเห็นสิ่งนี้เช่นกัน ขณะที่เขากำลังจะเอ่ยถาม จู่ๆ อาปูก็ยกปืนคาบศิลาขึ้นประทับบ่า!","เป็นเพราะไม่มีเสียงปืนดังขึ้น เฒ่ายอร์คจึงตระหนักได้ว่าปืนคาบศิลาในมือของอาปูคงจะใช้งานไม่ได้แล้วเนื่องจากเปียกฝนและความชื้น และอีกฝ่ายก็ไม่มีทางเอาปืนคาบศิลามาล้อเล่นกับเขาแบบนี้แน่ เขาจึงรีบตะโกนบอกคนรอบข้างทันที","“ระวังตัวด้วยทุกคน! อาปูอาจจะถูกใครบางคนควบคุมอยู่ มาช่วยกันมัดเขาไว้เร็ว!”","พลปืนคาบศิลาหลายคนที่ได้ยินเสียงตะโกนรีบวิ่งเข้ามาล้อมเขาไว้ทันที เนื่องจากอาปูเป็นสหายของพวกเขา จึงไม่มีใครใช้ปืนคาบศิลาเล็งใส่ และต้องการเพียงแค่จับมัดเขาไว้เท่านั้น","แต่อาปู ซึ่งปกติเป็นคนชอบลักขโมยและชอบเล่นตลก กลับแสดงพละกำลังและทักษะการต่อสู้ที่เหนือธรรมดาออกมา โดยใช้ปืนคาบศิลาเป็นค้อน แล้วฟาดทุกคนล้มลงกับพื้นได้ในเวลาเพียงสองสามนาที","โชคดีที่เวลาไม่นานก็มีคนแห่เข้ามาสมทบมากขึ้นเรื่อยๆ หลายคนถึงขั้นง้างนกสับแล้วเล็งปืนมาทางนี้","สีหน้าของอาปูเปลี่ยนเป็นเคร่งเครียด พร้อมปากที่ขยับมุบมิบเบาๆ จากนั้นก็ยื่นนิ้วชี้ออกไป โดยมีแสงสีขาวสว่างจ้าบาดตาสาดส่องขับไล่ความมืดมิดในทันที ซึ่งทำให้ดวงตาของทุกคนที่อยู่ที่นั่นพร่ามัว","เสียงอุทานดังระงม เฒ่ายอร์คและคนอื่นๆ ที่ตาบอดไปชั่วขณะจึงทำได้เพียงพึ่งพาสัญชาตญาณของตน เล็งปืนคาบศิลาไปทางตำแหน่งของอาปูแล้วยิงกราดสุ่มไปมั่วๆ จนทำให้เกิดการบาดเจ็บจากการยิงพวกเดียวกันเองไม่น้อย","ซึ่งเมื่อพวกเขาได้รับการมองเห็นกลับคืนมา และแฮมม์นำคนกลับมาถึง อาปูก็หายตัวไปนานแล้ว","“ใช้พลุสัญญาณแจ้งให้ท่านลินน์ทราบ!”","เฒ่ายอร์คตะโกนเสียงดัง","แฮมม์ซึ่งไม่มีเวลาซักถามรายละเอียด ก็รีบหยิบกระสุนพิเศษออกมายัดใส่ปืนคาบศิลาทันที แล้วยิงเตือนขึ้นสู่ท้องฟ้า โดยมีแสงสีแดงฉานสว่างวาบและระเบิดออกท่ามกลางท้องฟ้ายามราตรีอันมืดมิด..."]},{"n":304,"t":"ร่างจำแลงแห่งองค์พระผู้เป็นเจ้าปรากฏขึ้นอีกครั้ง!","c":["ภายในตรอกมืดแห่งหนึ่งในเมืองหลวงของฮัดลาตา อาปูผู้หลบหนีมาได้กุมบาดแผลที่ไหล่ซ้ายพลางหอบหายใจ ซึ่งมีเลือดสีเข้มหยดไหลลงมาจากบาดแผลจนย้อมชุดเกราะหนังสีดำจนชุ่มโชก","อาปูขมวดคิ้วแน่นและเริ่มร่ายเวทรักษาแผล แต่เขาก็สัมผัสได้ว่าเศษกระสุนที่แตกกระจายยังคงฝังลึกอยู่ในร่างกายของเขา","“ร่างกายนี้มันอ่อนแอเกินไป...”","อาปูพึมพำกับตัวเองด้วยความหงุดหงิด ในฐานะนักบวชระดับหกวงแหวนผู้ทรงพลัง เขาไม่เคยนึกฝันเลยว่าจะมีวันที่ตนเองต้องตกต่ำถึงเพียงนี้","หากไม่ใช่เพราะพลังจากตราสัญลักษณ์ศักดิ์สิทธิ์ ป่านนี้เขาคงสิ้นใจไปนานแล้ว","และตราสัญลักษณ์ศักดิ์สิทธิ์ชิ้นนี้ ก็ทำขึ้นจากกระดูกนิ้วของนักบุญองค์แรก โดยถูกเก็บรักษาไว้ในโบสถ์หลักเพื่อสั่งสมพลังแห่งศรัทธา ซึ่งสามารถนำมาใช้ช่วยในการร่ายพลังศักดิ์สิทธิ์ระดับสูงได้","นั่นคือสิ่งที่ทำให้เขามั่นใจว่าจะสามารถเผชิญหน้ากับจอมเวทผู้ยิ่งใหญ่ทั้งสองคนได้ แต่สิ่งที่โลซัคไม่คาดคิดก็คือ โคดี้ผู้ที่เขาเคยตรวจสอบความทรงจำด้วยตนเอง กลับใช้วิธีการบางอย่างที่เขาไม่รู้ลบร่องรอยและซ่อนตัวจากการตรวจสอบของพลังศักดิ์สิทธิ์ แล้วล่อลวงพวกเขาทั้งหมดให้ติดกับดัก...","และพลังเวทมนตร์นั้นก็ถาโถมเข้ามาเร็วเกินกว่าที่เขาจะตั้งตัวทัน ซึ่งทำให้ร่างกายของเขากลายเป็นอัมพาตและหมดสติไปในทันที โลซัคจึงทำได้เพียงส่งจิตสำนึกที่เหลืออยู่เพียงน้อยนิดเข้าไปในตราสัญลักษณ์ศักดิ์สิทธิ์ ก่อนที่ร่างเนื้อของเขาจะถูกทำลายจนแหลกสลายไปในสายฟ้าและการระเบิด","ทำให้ตอนนี้เขาต้องตัดสินใจ ว่าจะอยู่ที่นี่เพื่อจัดการกับสาวกปีศาจทั้งสอง หรือจะส่งข่าวกลับไปยังจักรวรรดิเซคัส","“องค์พระผู้เป็นเจ้าผู้ยิ่งใหญ่ โปรดช่วยผู้ศรัทธาที่เคร่งครัดที่สุดของพระองค์ด้วย...”","“โปรดประทานบทลงโทษ และลงทัณฑ์คนชั่วเหล่านั้นด้วยเถิด!”","“ผู้ศรัทธาที่เคร่งครัดที่สุดของพระองค์พร้อมจะสละทุกสิ่ง ณ ที่แห่งนี้...”","เสียงตะโกนดังก้องแว่วออกมาจากตราสัญลักษณ์ศักดิ์สิทธิ์อย่างเลือนราง มันคือเสียงของชาวเมืองหลวงที่ต่างพากันซ่อนตัวอยู่ในบ้านด้วยความหวาดกลัว และกำลังสวดอ้อนวอนต่อองค์พระผู้เป็นเจ้าผู้ยิ่งใหญ่","นั่นทำให้โลซัคสัมผัสได้ในทันทีว่า นี่คือโอกาส และเป็นโอกาสในการโต้กลับ โดยที่คำอธิษฐานของคนนับหมื่น ซึ่งเพียงพอแล้วที่จะทำให้เขาสามารถใช้พิธีกรรมอัญเชิญเทพจุติ เพื่อให้เศษเสี้ยวแห่งร่างจำแลงขององค์พระผู้เป็นเจ้าผู้ยิ่งใหญ่ลงมาจุติบนโลกนี้","“จงมา! เหล่าผู้ศรัทธาที่เคร่งครัดที่สุดของพระผู้เป็นเจ้า จงมาที่นี่!”","โลซัคส่งเสียงผ่านจิตสำนึกที่เชื่อมต่อกับตราสัญลักษณ์ศักดิ์สิทธิ์ ไปยังผู้ศรัทธาทุกคนซ้ำแล้วซ้ำเล่า","ทั่วทั้งเมืองหลวง เหล่าชาวเมืองที่กำลังสวดอ้อนวอนอย่างเคร่งครัดต่างได้ยินเสียงเรียกนั้นดังก้องอยู่ในหัว","“นี่คือพระประสงค์ของพระผู้เป็นเจ้า!”","“องค์พระผู้เป็นเจ้า พระองค์มิได้ทอดทิ้งผู้ศรัทธาของพระองค์...”","บรรดาผู้ศรัทธาต่างตะโกนด้วยความตื่นเต้น โดยไม่สนการปะทะที่ยังคงดำเนินอยู่ในจุดต่างๆ ของเมืองหลวง พวกเขาเปิดประตูบ้านแล้วเดินออกมาอย่างมุ่งมั่น ก่อนจะมารวมตัวกันจากทุกทิศทางยังจัตุรัสใจกลางเมืองหลวง","“เกิดอะไรขึ้น คนพวกนี้เป็นบ้าไปแล้วหรือไง?”","เรย์เดลผู้ซึ่งนำกำลังเข้ายึดประตูเมืองทั้งสามแห่งของเมืองหลวง และกำลังจะจับกุมแฮโรลด์องค์ชายใหญ่ ก็ได้เห็นฉากอันน่าประหลาดนี้","ซึ่งมีครอบครัวจำนวนมากที่ก่อนหน้านี้ซ่อนตัวอยู่ในบ้านต่างพากันออกมาที่ถนน พากันตะโกนก้องว่านี่คือพระประสงค์ของพระผู้เป็นเจ้า และคลื่นฝูงชนที่มืดฟ้ามัวดินก็เดินถาโถมเข้ามาราวกับพายุ","โดยมีเหล่าพลปืนคาบศิลาที่รับหน้าที่รักษาความสงบต่างก็ตกตะลึง เพราะถึงแม้พวกเขาจะยิงปืนเตือนนัดแล้วนัดเล่า แต่ก็ไม่อาจหยุดยั้งสถานการณ์นี้ได้","“เราควรทำอย่างไรดี? เราจะสังหารคนพวกนี้เลยไหม?”","เพื่อนร่วมหน่วยพลปืนคนหนึ่งถามด้วยความทำอะไรไม่ถูก","ซึ่งนั่นก็ทำให้เรย์เดลนั้นลังเลใจ แม้ว่าชาวเมืองเหล่านี้จะไม่ได้โจมตีพวกเขา แต่ใครที่ตาถึงหน่อยก็ย่อมดูออกว่าคนเหล่านี้มีบางอย่างผิดปกติ","แต่การจะสังหารพลเรือนที่ไร้ทางสู้ ย่อมขัดต่อเป้าหมายของพวกเขา","เสียงสวดอ้อนวอนในใจกลางจัตุรัสดังกระหึ่มขึ้นเรื่อยๆ พลังศรัทธาของคนนับหมื่นได้กลายเป็นกุญแจสำคัญและเป็นจุดเชื่อมประสาน เมื่อเห็นว่าจังหวะเวลาเหมาะสมแล้ว โลซัคก็ได้ถอดตราสัญลักษณ์ศักดิ์สิทธิ์ที่หน้าผากแล้วโยนขึ้นไปในอากาศ","“สรรเสริญ สวรรค์จุติ!”","โลซัคกล่าวคำร่ายโบราณที่ลึกลับและยากจะเข้าใจ","ในพริบตา ลำแสงสีขาวในตราสัญลักษณ์ศักดิ์สิทธิ์ก็พุ่งตรงขึ้นสู่ท้องฟ้า ส่องสว่างไปทั่วทั้งเมืองหลวง ราวกับดวงดาวในยามราตรีกำลังสั่นสะเทือนและร่วงหล่นลงมา โดยที่แสงสีขาวบริสุทธิ์นั้นค่อยๆ แปรเปลี่ยนเป็นร่างจำแลงของเทพธิดาผู้ศักดิ์สิทธิ์และสูงส่ง ซึ่งก้มมองลงมายังเหล่าสรรพชีวิตด้วยสายตาที่เปี่ยมไปด้วยพลังอำนาจและบรรยากาศอันศักดิ์สิทธิ์","บทเพลงสวดสรรเสริญอันไพเราะดังก้องอยู่บนฟากฟ้า และความยิ่งใหญ่ที่ไม่อาจเอื้อนเอ่ยได้ก็แผ่ซ่านปกคลุมไปทั่วท้องนภา ซึ่งทำให้ผู้ศรัทธาทุกคนต่างคุกเข่าลงกับพื้น พร้อมสรรเสริญความเมตตาและความยิ่งใหญ่ของพระผู้เป็นเจ้าด้วยท่าทีที่นอบน้อมที่สุด","เรย์เดลและเหล่าพลปืนต่างตกตะลึงจนยืนแข็งทื่อ เมื่อจ้องมองไปยังร่างจำแลงของเทพธิดาบนท้องฟ้า เหงื่อเย็นเยียบก็ผุดพรายบนหน้าผากของพวกเขา และขาทั้งสองข้างต่างพากันอ่อนแรงโดยไม่รู้ตัว","แม้แต่แฮมม์และคนอื่นๆ ที่เคยทอดทิ้งความศรัทธาไปแล้ว ก็ยังทรุดตัวลงคุกเข่ากับพื้นอย่างไม่อาจควบคุม พร้อมทั้งสารภาพบาปออกมาด้วยเสียงอันดัง","“ข้าไม่นึกเลยว่าโลซัคจะหลงเหลือพลังถึงเพียงนี้”","ลินน์ซึ่งอยู่ในเมืองหลวงก็กำลังจับตามองเหตุการณ์นี้อยู่เช่นกัน และได้รับรายงานจากหน่วยพลปืนคาบศิลามาแล้ว จึงรู้ดีว่าเกิดอะไรขึ้นที่คฤหาสน์ของฮัตตาร์","อาปูที่จู่ๆ ก็มีพฤติกรรมแปลกไปและหายตัวไปอย่างลึกลับหลังจากทำร้ายเพื่อนร่วมงาน น่าจะถูกเข้าสิงไปแล้ว และคนเดียวที่จะสามารถทำเรื่องเช่นนี้ได้ก็มีเพียงคาร์ดินัลโลซัคเท่านั้น","อีกฝ่ายยังฉลาดแกมโกงถึงขั้นแฝงตัวมากับกลุ่มฝูงชนนับหมื่นคน โดยใช้คนยากไร้เหล่านี้เป็นโล่กำบัง ซึ่งลินน์ก็ไม่เต็มใจที่จะทำการสังหารหมู่หากไม่จำเป็นถึงที่สุด เพราะมันจะไม่เป็นผลดีต่อการปกครองในระยะยาวของพวกเขา","“ท่านมีวิธีจัดการกับเจ้านี่ไหม แอนโธนี?”","ลินน์ถามด้วยความใคร่รู้","“ท่านล้อข้าเล่นหรือไร แม้ว่านี่จะเป็นเพียงร่างจำแลงที่บรรจุพลังของนางเอาไว้เพียงเล็กน้อย แต่มันก็อยู่เหนือไปอีกระดับแล้ว”","สีหน้าของแอนโธนีเคร่งเครียดถึงขีดสุด บัดนี้เขารู้ตัวแล้วว่าตนเองได้ประเมินพลังของพระคาร์ดินัลนั่นต่ำเกินไป เพราะต่อให้เขาจะกลายเป็นพ่อมดระดับหกวงแหวนแล้ว แต่พลังของสถาบันเวทมนตร์เพียงแห่งเดียวก็ยังห่างไกลนักจากการสถาปนาอาณาจักรเวทมนตร์ขึ้นมาได้","“ด้วยพลังของท่านในตอนนี้ ท่านยังสามารถร่ายเวทมนตร์ระดับตำนานบทที่สองได้อยู่ไหม?”","แอนโธนีถามเชิงหยั่งเชิง","“เพราะเมื่อครู่ ข้าสัมผัสได้ถึงพลังศักดิ์สิทธิ์อันรุนแรง โดยวัตถุที่สนับสนุนร่างจุตินี้ควรจะอยู่ที่จุดกึ่งกลางระหว่างคิ้วของนาง”","“แน่นอนว่าไม่ได้!”","ลินน์ส่ายหน้า","เขาเป็นเพียงพ่อมดระดับสามวงแหวน และยังไม่มีความสามารถถึงระดับนั้น","เวทมนตร์ที่ลินน์เตรียมการมาหลายวันและแสดงผลลัพธ์ได้อย่างยอดเยี่ยมเมื่อครู่ เป็นเพราะความช่วยเหลือจากปรากฏการณ์ทางธรรมชาติและค่ายกลเล่นแร่แปรธาตุเท่านั้น","“เช่นนั้นเราก็ทำได้เพียงถอยทัพในตอนนี้!”","แอนโธนีถอนหายใจ เขาไม่นึกเลยว่าพวกเขาจะทุ่มเททำมาขนาดนี้จนสามารถยึดเมืองหลวงได้สำเร็จ แต่กลับต้องหนีเอาตัวรอดอย่างทุลักทุเล","ซึ่งไม่มีใครจะกระวนกระวายไปกว่าฮัตตาร์อีกแล้ว เขาอุตส่าห์ได้ขึ้นครองบัลลังก์อย่างยากลำบาก แต่ตอนนี้กลับต้องถอยทัพและมอบเมืองหลวงคืนให้กับพี่ชายของตน นี่คือสิ่งที่ฮัตตาร์จะไม่มีวันยอมให้เกิดขึ้นเด็ดขาด","“แล้วหน่วยพลปืนคาบศิลาในเมืองหลวงล่ะ? ไม้เท้าพ่นไฟในมือของพวกเขามันไม่ทรงพลังหรือไง? ข้ายังมีพลหน้าไม้อีกสามพันคน รวมกันเป็นพันๆ คนก็น่าจะยิงนางให้ร่วงลงมาได้บ้างสิ!”","ฮัตตาร์เอ่ยด้วยสีหน้าดุดัน","แอนโธนีชำเลืองมองเขา แล้วกำลังจะเอ่ยเยาะเย้ยข้อสันนิษฐานอันเพ้อฝันของฮัตตาร์ แต่เขากลับได้ยินเสียงของลินน์ที่เอ่ยขึ้นเสียก่อน","“ไม่จำเป็นต้องถอยทัพหรอก ข้าเตรียมบางอย่างไว้รับมือกับสถานการณ์ที่ไม่คาดคิดเช่นนี้อยู่แล้ว เพียงแต่ข้าไม่คิดว่ามันจะได้ใช้...”","ลินน์ที่เอ่ยขึ้นอย่างกะทันหัน ทำเอาทุกคนที่กำลังหมดหวังต่างพากันกลับมามีความหวังขึ้นอีกครั้ง"]},{"n":305,"t":"ตอนนี้ข้าก็แค่อยากจะอัดนางให้ยับ!","c":["“ท่านลินน์ ท่านมีวิธีจัดการกับนางด้วยหรือ?”","ฮัตตาร์เอ่ยถามอย่างร้อนรน เพราะเขาก็ไม่ต้องการสูญเสียเมืองหลวงไปตั้งแต่คืนแรกที่ยึดบัลลังก์มาได้เช่นกัน","แอนโธนีเองก็มองลินน์ด้วยความประหลาดใจอย่างยิ่ง ไม่ใช่ว่าเขาไม่อาจใช้เวทมนตร์ระดับตำนานได้อีกแล้วหรอกหรือ?","ลินน์ไม่ได้อธิบายสิ่งใด เขาเพียงยิ้มแล้วกล่าวว่า","“พวกเขามาถึงแล้ว!”","สิ้นคำ เสียงล้อรถบดเบียดพื้นถนนก็ดังแว่วมาจากอีกฟากของถนน ซึ่งก็ทำให้แอนโธนีและคนอื่นๆ ต่างหันขวับไปมองตามเสียง","บนถนนปูอิฐนั้น มีอูฐหลายตัวกำลังออกแรงลากรถม้าสามคันซึ่งคลุมด้วยผ้าใบสีดำมุ่งหน้ามาทางพวกเขา โดยมีผู้นำขบวนคือ ฟิลิปและคนอื่นๆ ที่หายหน้าไปนานตั้งแต่ตอนอพยพออกจากคฤหาสน์ นอกจากนี้ยังมีจอห์นนี่ ฟูล่า และพรรคพวกวิ่งตามขบวนรถมาติดๆ","“พวกเจ้าปลอดภัยกันดีใช่ไหม?”","ลินน์กวาดสายตามองไปรอบๆ เพื่อนับจำนวนคน เมื่อเห็นว่าไม่มีใครขาดหายไป เขาก็ถอนหายใจออกมาด้วยความโล่งอก","“พวกเราไม่เป็นอะไรหรอก แต่ก็มันน่ากลัวจนเกือบจะตายอยู่แล้ว...”","เอล็อคบ่นอุบอิบเสียงแผ่ว","แม้ลินน์จะกำชับไว้แล้วว่าให้รีบหนีทันทีที่เห็นแอนโธนีลงมือ และให้ไปหลบในหลุมหลบภัยของคฤหาสน์ แต่ฟูล่าและคนอื่นๆ กลับดื้อดึงไม่ยอมถอย จึงทำให้เสียเวลาไปไม่น้อย จนเกือบต้องเอาชีวิตไปทิ้งเพราะสายฟ้าที่ฟาดกระหน่ำลงมาพร้อมกับแรงระเบิดที่ตามมาติดๆ","“ท่านน่าจะบอกพวกเราล่วงหน้านะ ท่านศาสตราจารย์ลินน์”","เพียร์ซกล่าวด้วยน้ำเสียงที่ยังคงสั่นเทา","ลินน์ไม่ได้เอ่ยตอบ เพราะสิ่งสำคัญที่สุดในการวางกับดัก ก็คือการเก็บรักษาความลับ แม้จะไม่ใช่ว่าเขาจะไม่ไว้ใจเอล็อคและพรรคพวก แต่เขานั้นต้องเผื่อใจรับความเป็นไปได้ที่คนเหล่านี้อาจถูกจับกุมและถูกค้นความทรงจำ","แอนโธนีซึ่งยืนอยู่ด้านข้างดึงผ้าคลุมรถออก ก่อนจะตระหนักได้ว่าสิ่งที่อยู่ตรงหน้าไม่ใช่รถม้า แต่เป็นสิ่งประดิษฐ์รูปร่างแปลกประหลาดที่ดูคล้ายปืนใหญ่","แต่มันกลับมีขนาดที่กะทัดรัด และดูทรงอานุภาพกว่าปืนใหญ่ทั่วไปมาก!","ตัวเครื่องมีความสูงกว่าสองเมตร พร้อมมีล้อสี่ล้อติดตั้งอยู่บนฐานอันแข็งแกร่ง แต่สิ่งที่ดึงดูดสายตาที่สุด ก็คือรางปืนยาวสองเส้นที่ทอดยาวออกไปเบื้องหน้า ซึ่งสลักอักขระเวทมนตร์แม่เหล็กไฟฟ้าไว้อย่างหนาแน่น","“นี่คือสิ่งใดกัน?”","แอนโธนีเอ่ยถามด้วยความประหลาดใจ","“อาวุธแม่เหล็กไฟฟ้าอันทรงอานุภาพ ซึ่งข้าคิดว่าจะไม่ได้ใช้มันเสียแล้วในครั้งนี้”","ลินน์เดินไปหยุดอยู่หน้าปืนใหญ่แม่เหล็กไฟฟ้ากระบอกหนึ่ง และเริ่มปรับทิศทางปากกระบอกปืนทันที โดยเล็งเป้าหมายไปยังร่างจำแลงของเทพธิดาขนาดมหึมาบนท้องฟ้า","เดิมทีนี่คือแผนสำรองเพื่อป้องกันไม่ให้พระคาร์ดินัลหลุดรอดจากแผนการที่ไม่ยอมเดินเข้าสู่กับดัก หรือในกรณีที่ค่ายกลเล่นแร่แปรธาตุของเขาเกิดขัดข้องจนไม่สามารถทำงานได้ตามปกติ จึงตั้งใจให้ฟิลิปและคนอื่นๆ ที่ซ่อนตัวอยู่ในเงามืด หาจังหวะยิงปืนใหญ่แม่เหล็กไฟฟ้าและปลิดชีพโลซัคในทันที","ไม่นึกฝันเลยว่า ไม้ตายนี้จะต้องถูกนำมาใช้เพื่อต่อกรกับเทพเจ้าที่แท้จริง...แม้ว่าจะเป็นเพียงแค่ร่างจำแลงก็ตามที...","ทันทีที่ลินน์สับคันโยก คลื่นพลังเวทอันรุนแรงก็ปะทุขึ้น โดยมีกระแสไฟฟ้าปริมาณมหาศาลที่ถูกกักเก็บไว้ในหินอสนีบาตถูกดึงออกมาใช้ ซึ่งทำให้รูนบนรางปืนสว่างวาบขึ้นทีละตัว ก่อกำเนิดสนามแม่เหล็กอันทรงพลังที่พันธนาการลูกปืนใหญ่ขนาดเท่าหัวคนไว้ตรงกลางอย่างแน่นหนา...","เนื่องจากเวลาในการวิจัยยังมีจำกัด ปืนใหญ่แม่เหล็กไฟฟ้ารุ่นทดลองนี้จึงสามารถเร่งความเร็วกระสุนได้เพียงประมาณเจ็ดเท่าของความเร็วเสียงเท่านั้น","แม้ว่ามันจะเป็นพลังทำลายล้างที่น่าสะพรึงกลัว แต่มันก็ยังห่างไกลจากขีดจำกัดสูงสุดของมันอยู่อีกมาก!","“ทุกคน ใช้เวทโซ่สายฟ้า!”","ลินน์ตะโกนลั่น พร้อมยื่นมือออกไปร่ายเวท ซึ่งทำให้มีกระแสไฟฟ้าจำนวนมากฟาดเข้าใส่รูนรับกระแสไฟฟ้าในทันที","ฟูล่าและคนอื่นๆ เข้าใจถึงความตึงเครียดของสถานการณ์ดี พวกเขาจึงลงมือทำตามโดยไม่ลังเล ซึ่งมีพ่อมดฝึกหัดและพ่อมดหลายร้อยคนจากทั้งสถาบันต่างทุ่มเทปล่อยพลังเวททั้งหมดที่มีลงในปืนใหญ่แม่เหล็กไฟฟ้า","รางปืนยาวที่เปลี่ยนเป็นสีแดงฉานจากอุณหภูมิ และความผันผวนของพลังเวทที่รุนแรงขึ้นเรื่อยๆ มันจึงเปิดเผยตำแหน่งของพวกเขาในที่สุด...","ร่างจำแลงของเทพธิดาที่ลอยตระหง่านอยู่บนฟากฟ้าหันขวับมามองทันที","ห้วงเวลาคล้ายกับไหลย้อนกลับไปเมื่อสองปีก่อน ซึ่งลินน์นั้นก็จำได้อย่างแม่นยำ ว่าตอนที่เขาหลบหนีออกจากจักรวรรดิเซคัสด้วยเรือ เขาก็เคยเผชิญหน้ากับเหตุการณ์เช่นนี้มาแล้ว","ในตอนนั้น เขาทำได้เพียงหนีเอาชีวิตรอดอย่างทุลักทุเลโดยอาศัยทะเลหมอกคอยช่วยเหลือ แต่ตอนนี้...ลินน์ก็แค่อยากจะอัดนางให้ยับ!","“องค์พระผู้เป็นเจ้าผู้ยิ่งใหญ่เสด็จมาแล้ว!”","ในขณะนี้ ณ จัตุรัสใจกลางเมืองหลวง ผู้ศรัทธานับหมื่นคนกำลังคุกเข่ากราบอยู่บนพื้นอย่างภักดี และสวดอ้อนวอนอย่างต่อเนื่อง ซึ่งแสดงความปีติยินดีด้วยการจุมพิตลงบนผืนดินใต้ฝ่าเท้า","โลซัคยืนโดดเดี่ยวอยู่กลางจัตุรัส หลังจากปลดปล่อยพลังของตราสัญลักษณ์ศักดิ์สิทธิ์ เขาก็ทำได้เพียงควบคุมร่างจำแลงนั้นผ่านสายใยบางเบา ซ้ำยังสูญเสียความสามารถในการใช้พลังศักดิ์สิทธิ์ไปจนหมดสิ้น","แต่มันไม่สำคัญอีกต่อไป!","เพราะพระประสงค์ของพระผู้เป็นเจ้าได้ลงมาจุติแล้ว!","ผ่านทางเนตรแห่งเทพที่เชื่อมต่อกับตราสัญลักษณ์ศักดิ์สิทธิ์ โลซัคจึงค้นพบเป้าหมายอย่างรวดเร็ว ซึ่งเป็นจอมเวทผู้ยิ่งใหญ่แอนโธนีที่กำลังรวมตัวอยู่กับบรรดาลูกศิษย์บนถนนสายหนึ่งทางทิศตะวันตกของเมืองหลวง","ฮัตตาร์ก็อยู่ที่นั่นด้วย นอกจากนี้ยังมีพ่อมดหนุ่มที่ปรากฏตัวพร้อมเวทจำลองร่าง ซึ่งน่าจะเป็นลินน์ที่ศาสนจักรต้องการตัว","ถือโอกาสนี้กำจัดพวกมันไปพร้อมๆ กันเลย!","รังสีอำมหิตและโทสะวาบผ่านดวงตาของโลซัค เขาหลับตาลงและอธิษฐานขอให้องค์พระผู้เป็นเจ้าผู้ยิ่งใหญ่ประทานทัณฑ์แก่พวกคนบาปเหล่านั้น","ร่างจำแลงของเทพธิดาที่หยุดนิ่งอยู่บนท้องฟ้าก็ยกมือขวาขึ้น ก่อนที่นิ้วชี้ที่เรียวยาวราวกับหยกจะทะลวงผ่านกำแพงมิติและกาลเวลา มาปรากฏอยู่เบื้องหน้าของทุกคนในพริบตา","นิ้วชี้ที่ใหญ่มหึมาราวกับภูผาก็ได้กดทับลงมาจากเบื้องบน ประหนึ่งกำลังจะบดขยี้มดปลวกให้ตายคาที่","แต่มดปลวกก็ยังมีเขี้ยวเล็บ แอนโธนีนั้นก้าวออกมาข้างหน้าหนึ่งก้าว พร้อมร่ายเวทป้องกันที่ทรงพลังที่สุดเท่าที่เขาเคยเรียนรู้มา","พลังเวทแปรสภาพอย่างรวดเร็วกลายเป็นเกล็ดงูเรียงซ้อนกัน ก่อตัวเป็นโดมครึ่งวงกลมเพื่อปกป้องทุกคน ก่อนจะปะทะเข้ากับนิ้วชี้ขนาดมหึมา","แต่ม่านเกล็ดงูอันแข็งแกร่งกลับยุบตัวลงทันที พร้อมกับมีรอยร้าวเล็กๆ ปรากฏขึ้น และแตกกระจายออกเป็นเสี่ยงๆ ในเวลาเพียงเสี้ยววินาที","ภายใต้แรงสะท้อนกลับของพลังเวทอันมหาศาล ร่างของแอนโธนีก็สั่นสะท้านอย่างรุนแรง แต่โชคดีที่ในจังหวะนั้น ลำแสงสีฟ้าครามสองสายก็ได้พุ่งทะยานผ่านไป ซึ่งทะลวงผ่านดัชนีที่พยายามจะบดขยี้พวกเขาจนแหลกละเอียด","เป็นปืนใหญ่แม่เหล็กไฟฟ้าอีกสองกระบอกภายใต้การควบคุมของฟิลิปและธีโอดอร์ที่เปิดฉากโจมตีก่อน!","แต่บาดแผลที่เกิดขึ้นกลับมีจำกัดยิ่งนัก ไม่มีเลือดไหลริน ไม่มีเศษเนื้อปลิวว่อน เพราะสิ่งที่ทะลวงผ่านนั้นเป็นเพียงแค่ภาพลวงตา และนิ้วที่ถูกเจาะทะลุก็สมานตัวกลับมาด้วยความเร็ว จากนั้น นิ้วชี้ก็แปรเปลี่ยนเป็นฝ่ามือ พร้อมด้วยแสงศักดิ์สิทธิ์อันเข้มข้นและรุนแรงก็ได้แผ่พุ่งออกมาจากฝ่ามือนั้น","ซึ่งทำให้รัศมีที่ถูกฝ่ามือปกคลุมได้แปรเปลี่ยนเป็นอาณาเขตปิดตาย โดยที่อากาศภายในนั้นถูกอัดแน่นและเต็มไปด้วยแรงกดดันอันหนักหน่วง จนทำให้การหายใจนั้นกลายเป็นเรื่องที่ยากลำบากอย่างยิ่ง...","และในเวลาเดียวกันนั้นเอง ปืนใหญ่แม่เหล็กไฟฟ้าที่ตั้งอยู่ตรงกลางก็พร้อมยิงในที่สุด!","ด้วยการรวบรวมพลังเวทจากพ่อมดนับร้อย กระสุนซึ่งถูกพันธนาการไว้ด้วยแรงแม่เหล็กอย่างแน่นหนาก็เปล่งเสียงคำรามกึกก้องไปทั่วฟ้าดิน ภายใต้การควบคุมของลินน์ มันพุ่งทะยานเข้าหาฝ่ามือที่บดบังท้องฟ้าด้วยความเร็วที่ไม่อาจมองตามทัน..."]},{"n":306,"t":"แสงที่บิดเบือนเวลาและปืนใหญ่แม่เหล็กไฟฟ้า","c":["ความเร็ว 25 เท่าของความเร็วเสียง!","ในวินาทีที่กระสุนพุ่งออกจากลำกล้อง ปัญญาประดิษฐ์สนับสนุนได้คำนวณความเร็วขาออกไว้เรียบร้อยแล้ว การผสานรวมระหว่างเวทมนตร์และเทคโนโลยีปะทุขึ้นด้วยพลังที่ไม่อาจจินตนาการได้ ส่งผลให้พลังทำลายล้างของปืนใหญ่แม่เหล็กไฟฟ้าก้าวขึ้นสู่ระดับใหม่!","เสียงโซนิคบูมที่เกิดขึ้นในเสี้ยววินาทีทำลายแผ่นกระเบื้องและผนังดินของบ้านเรือนโดยรอบจนพังยับเยิน ฟูล่า เพียร์ซ และคนอื่นๆ ที่อยู่ใกล้มากต่างถูกแรงปะทะกระแทกลงไปกองกับพื้น มือทั้งสองข้างปิดหูไว้แน่น...","ในขณะเดียวกันบนท้องฟ้า ลำแสงที่ส่องประกายพุ่งเข้าปะทะกับฝ่ามือที่บดบังท้องฟ้า กระสุนโลหะแข็งแกร่งถูกความร้อนสูงเผาจนกลายเป็นสีแดงฉาน บนพื้นผิวของทรงกลมสลักอักขระเวทมนตร์เสริมพลังทั้งการทลายเวท ความคม และความแข็งแกร่งไว้โดยรอบ","ภาพที่เห็นราวกับก้อนกรวดพุ่งชนภูเขาลูกใหญ่ ทว่าผลลัพธ์กลับตาลปัตรอย่างสิ้นเชิง ในจังหวะที่ปะทะกัน ฝ่ามือข้างนั้นกลับบอบบางราวกับกระดาษ ไม่สามารถแม้แต่จะขวางกั้นมันไว้ได้แม้แต่น้อย แต่กลับถูกเจาะทะลวงอย่างง่ายดาย... ลำแสงสีแดงฉานพุ่งผ่านไป โดยมีเป้าหมายคือใจกลางหน้าผากของร่างจำแลงแห่งพระผู้เป็นเจ้า!","ราวกับสัมผัสได้ถึงภัยคุกคามจากอาวุธชิ้นนี้ แสงสว่างเจิดจ้ามากมายพลันพวยพุ่งออกมาจากร่างศักดิ์สิทธิ์นั้น","ระยะห่างจากจุดยิงของปืนใหญ่แม่เหล็กไฟฟ้าไปยังกึ่งกลางระหว่างคิ้วของร่างเทพนั้นมีเพียง 700 เมตร สำหรับกระสุนที่มีความเร็ว 25 เท่าของความเร็วเสียง มันใช้เวลาเดินทางเพียง 0.08 วินาทีเท่านั้น!","ทว่าการเดินทางนี้กลับยาวนานอย่างน่าประหลาด ความเร็วของกระสุนปืนใหญ่แม่เหล็กไฟฟ้าค่อยๆ ลดลงจนมองเห็นได้ด้วยตาเปล่า จากยี่สิบห้าเท่าเหลือยี่สิบเท่า สิบห้าเท่า และสุดท้ายเหลือเพียงเก้าเท่าของความเร็วเสียง!","ลินน์ผู้ฝึกฝนสนามพลังเบี่ยงเบนเข้าใจในทันทีว่า นี่ไม่ใช่เพราะความเร็วของปืนใหญ่แม่เหล็กไฟฟ้าลดลง แต่เป็นเพราะมิติและเวลาต่างหากที่กำลังบิดเบี้ยวในขณะนี้!","การที่มันช้าลงเป็นเพียงปรากฏการณ์ของการบิดเบือนมิติและเวลาเท่านั้น!","แต่ถึงกระนั้น พลังทำลายล้างที่น่าสะพรึงกลัวของปืนใหญ่แม่เหล็กไฟฟ้าก็ยังคงเจาะทะลุเกราะป้องกันที่สร้างขึ้นจากแสงศักดิ์สิทธิ์ได้อย่างง่ายดาย และพุ่งตรงผ่านเปลือกนอกที่เป็นส่วนประกอบของร่างจำแลงเทพไป","สิ่งที่ต่างออกไปคือเสี้ยววินาทีนั้นทำให้ร่างเงาของเทพธิดาเบี่ยงออกไปเพียงไม่กี่เซนติเมตร จึงไม่ถูกจุดกึ่งกลางระหว่างคิ้ว และทำให้ตราสัญลักษณ์ศักดิ์สิทธิ์ที่กำลังสั่นไหวอยู่ท่ามกลางความว่างเปล่านั้นรอดพ้นไปได้","โลซัคผู้เฝ้ามองฉากนี้ผ่านเนตรแห่งเทพถึงกับถอนหายใจด้วยความโล่งอก ตราบใดที่แกนกลางยังไม่ได้รับความเสียหาย ส่วนที่เหลือก็สามารถซ่อมแซมได้ด้วยวิชาศักดิ์สิทธิ์","น่าเสียดายที่โลซัคลืมไปว่าปืนใหญ่แม่เหล็กไฟฟ้าไม่ได้มีแค่กระบอกเดียว!","ลินน์ไม่ใช่คนไร้เดียงสาถึงขนาดจะฝากทุกอย่างไว้กับการโจมตีครั้งเดียว!","ห่างกันไม่ถึงหนึ่งวินาที ปืนใหญ่แม่เหล็กไฟฟ้าอีกสองกระบอกที่เล็งไว้ก่อนหน้าก็คำรามลั่น คราวนี้แม้จะไม่มีพลังเวทจากพ่อมดหลายร้อยคนช่วยหนุน ทำให้ความเร็วของกระสุนช้าลงกว่าเดิมมาก แต่ก็ยังมีความเร็วสูงถึงเจ็ดเท่าของความเร็วเสียง!","ด้วยการสนับสนุนจากพลังประมวลผลอันมหาศาลของเหล่าพ่อมด กระสุนทั้งสองเปรียบเสมือนด้ายเงินที่พุ่งเข้าปะทะกับตราสัญลักษณ์ศักดิ์สิทธิ์ขนาดเล็กได้อย่างแม่นยำ","“ไม่!” โลซัคแผดเสียงร้องโหยหวนอย่างเจ็บปวด","แรงแม่เหล็กไฟฟ้าที่ความเร็วเจ็ดเท่าของความเร็วเสียงนั้นเทียบเท่ากับเวทมนตร์ระดับหกวงแหวน ต่อให้ตราสัญลักษณ์ศักดิ์สิทธิ์จะทำขึ้นจากกระดูกนิ้วของนักบุญองค์แรก ก็ไม่อาจต้านทานแรงปะทะอันรุนแรงนี้ได้ และแตกสลายลงในทันที","กระสุนความเร็วเหนือเสียงสองนัดปะทะเข้าหากัน คลื่นเสียงและแรงระเบิดรุนแรงดังกึกก้องไปทั่วทั้งเมืองหลวง เมืองทั้งเมืองสั่นสะเทือนภายใต้แรงกระแทกอันรุนแรง","แสงจากเนตรแห่งเทพหรี่เลือนลงอย่างรวดเร็ว และร่างจำแลงขนาดมหึมาของเทพก็เริ่มแตกสลาย ราวกับกระจกที่ร้าวราน มันค่อยๆ ลอกลอกออกทีละส่วนจนกลายเป็นจุดแสงสว่างไสว ก่อนจะเลือนหายไปในความว่างเปล่า...","สิ่งที่ถูกทำลายไปพร้อมกันนั้น คือดวงจิตของโลซัคที่สถิตอยู่ในตราสัญลักษณ์ศักดิ์สิทธิ์","จิตสำนึกของโลซัคกำลังถูกดึงออกไปทีละน้อย เลือดสีแดงสดทะลักออกจากมุมปากของเขา แววตาเต็มไปด้วยความสิ้นหวังและความไม่ยินยอม...","จัตุรัสทั้งแห่งตกอยู่ในความเงียบงันราวกับป่าช้า ผู้ศรัทธาที่เคร่งครัดนับหมื่นคนซึ่งเมื่อครู่ยังตะโกนร้องด้วยความตื่นเต้นให้องค์พระผู้เป็นเจ้าลงทัณฑ์พวกคนบาป กลับต้องมาเห็นร่างจำแลงแห่งเจตจำนงของพระองค์ถูกทำลายลงด้วยลำแสงพราวระยับไม่กี่สาย","“พระผู้เป็นเจ้าพ่ายแพ้งั้นหรือ?” “เป็นไปไม่ได้! นี่ต้องเป็นภาพลวงตา นี่ต้องเป็นภาพลวงตาแน่ๆ!”","เสียงกรีดร้องด้วยความหวาดกลัวดังระงมไปทั่วจัตุรัส ผู้คนนับไม่ถ้วนที่ความเชื่อพังทลายลงต่างพากันตะโกนอย่างเสียสติว่าสิ่งที่เห็นเป็นเพียงภาพหลอน หรือไม่ก็เอาแต่โขกหัวลงกับพื้นด้วยความสิ้นหวัง แต่ถึงกระนั้นก็ไม่อาจเปลี่ยนผลลัพธ์ที่เกิดขึ้นได้","ร่างจำแลงเจตจำนงแห่งพระผู้เป็นเจ้าถูกทำลายลงแล้ว!","“ในที่สุด...” ลินน์ถอนหายใจออกมาด้วยความโล่งอกเมื่อเห็นร่างจำแลงอันน่าสะพรึงกลัวนั้นเลือนหายไปในความว่างเปล่า","เขารู้ดีว่าตนเองไม่มีความมั่นใจมากนักในการเอาชนะเมื่อครู่ เขาเพียงแค่เกร็งทำหน้าตายต่อหน้าแอนโธนีและคนอื่นๆ เท่านั้น แต่โชคดีที่เขาตัดสินใจขนอาวุธสังหารชิ้นนี้มาล่วงหน้าเพราะอุบัติเหตุที่เกิดขึ้น ไม่อย่างนั้นพวกเขาคงทำได้เพียงถอยทัพออกจากเมืองหลวงด้วยความผิดหวัง และทุกสิ่งที่ทำมาทั้งหมดก็จะสูญเปล่า","“นี่คือเวทมนตร์ประเภทใดกัน? ดูเหมือนจะเกี่ยวข้องกับแม่เหล็กไฟฟ้าหรือ?” แอนโธนีที่ยังไม่อาจดึงสติกลับมาจากลำแสงที่สามารถทำลายล้างทุกสิ่งได้ เอ่ยถามอย่างไม่หยุดหย่อน","“สิ่งนี้เรียกว่า ปืนใหญ่แม่เหล็กไฟฟ้า!” ลินน์ตอบพร้อมรอยยิ้ม","“ใช้แรงแม่เหล็กอันแข็งแกร่งที่เกิดจากกระแสไฟฟ้าในการผลักดันกระสุนอย่างนั้นหรือ?” แอนโธนีผู้ซึ่งเพิ่งเริ่มศึกษาบทสมการของแมกซ์เวลล์วิเคราะห์หลักการของมันได้อย่างรวดเร็ว","ในอดีต เขาเคยใช้พลังแห่งอสนีบาตโดยตรงในการสังหารศัตรู แต่เขาไม่เคยคิดฝันเลยว่าเวทมนตร์แม่เหล็กไฟฟ้าจะสามารถนำมาประยุกต์ใช้ได้ถึงเพียงนี้ แถมพลังของมันยังร้ายกาจอย่างยิ่ง","“ถูกต้องแล้ว” ลินน์พยักหน้าโดยไม่ได้อธิบายรายละเอียดมากเกินไป ท้ายที่สุดแล้ว พวกเขายังมีเรื่องยุ่งยากอีกมากมายที่ต้องเร่งจัดการในคืนนี้","เมื่อลินน์และคนอื่นๆ มาถึงจัตุรัส สถานการณ์ที่วุ่นวายก็ถูกควบคุมไว้ได้โดยกองพลปืนคาบศิลาที่นำโดยเรย์เดล แม้จะมีผู้ศรัทธาจำนวนมาก แต่ทั้งหมดต่างก็ขวัญเสียและไม่มีใครคิดจะขัดขืนอีกต่อไป","ส่วนอาปูที่หายตัวไปนั้นถูกพบตัวแล้ว แต่ร่างของเขากลับเย็นชืดไปเสียแล้ว หลังจากตรวจสอบ ลินน์ก็ยืนยันได้ในที่สุดว่าอีกฝ่ายถูกควบคุมร่างอยู่จริงๆ","“ท่านลินน์ เราควรจัดการกับชาวเมืองเหล่านี้อย่างไรดี?” เรย์เดลหันมาถามด้วยความกังวลเล็กน้อย เขาเกรงว่าลินน์จะสั่งประหารคนทั้งหมด แต่ในใจเขาก็รู้ดีว่าการปล่อยคนเหล่านี้ไว้จะเป็นภัยแฝงขนาดไหน","“ควบคุมตัวไว้ก่อน แล้วค่อยตัดสินใจหลังจากสอบสวนอีกครั้ง” ลินน์กล่าวหลังครุ่นคิดชั่วครู่","ต้องบอกว่าการที่โลซัครวบรวมผู้ศรัทธาที่เคร่งครัดมาไว้ในจัตุรัสจำนวนมากเช่นนี้ ช่วยเขากำจัดเสี้ยนหนามก้อนโตไปได้มาก หากคนคลั่งศาสนาเหล่านี้แฝงตัวอยู่ในเมืองหลวงและคอยแอบเคลื่อนไหว ก็อาจจะสร้างปัญหาเล็กๆ น้อยๆ ให้พวกเขาจากภายในได้","ตอนนี้ดีแล้วที่ปัญหาทั้งหมดโผล่ออกมาพร้อมกัน จะได้แก้ไขไปคราวเดียว!","ผู้ที่ยอมรับการปรับทัศนคติจะยังคงได้เป็นพลเมืองของเมืองหลวงต่อไป และเขาจะไม่เอาความเรื่องในอดีต","ส่วนพวกที่ถูกล้างสมองจนกู่ไม่กลับ... ก็นำไปใช้ประโยชน์ในการสร้างสะพานและถนนเพื่อวางรากฐานโครงสร้างพื้นฐานเสียสิ!","แรงงานของคนนับหมื่นจะไม่เสียเปล่าอย่างแน่นอน!"]},{"n":307,"t":"แม้แต่ทวยเทพก็ยังต้องร่วงหล่นภายใต้พลังแห่งเวทมนตร์และเทคโนโลยี!","c":["เวลาหนึ่งวันผ่านไปอย่างรวดเร็ว ภายใต้การควบคุมร่วมกันระหว่างกองทหารองครักษ์ที่ยอมสวามิภักดิ์และหน่วยพลปืนคาบศิลา ความวุ่นวายในเมืองหลวงก็สงบลงในที่สุด","ศาสนจักรถูกทำลายล้างโดยตรง นักบวชทั้งหมดที่อยู่ภายในถูกจับกุมและประหารชีวิต แม้แต่องค์ชายใหญ่แฮโรลด์ก็ไม่อาจหนีรอดจากการไล่ล่า เพราะในขณะที่เขาพยายามหลบหนีออกจากเมืองหลวงท่ามกลางความชุลมุน เขาก็ถูกระดมยิงด้วยปืนคาบศิลาเข้าที่หน้าอกจนสิ้นใจตายคาที่อย่างหมดทางรอด","และฮัตตาร์ก็ประกาศต่อโลกภายนอกในทันทีว่า ต้นตอที่ก่อให้เกิดความวุ่นวายในเมืองหลวงจนส่งผลให้มีผู้เสียชีวิตจำนวนมากได้ถูกประหารแล้ว และในวันรุ่งขึ้น เขาก็ได้ขึ้นครองบัลลังก์อย่างเร่งด่วนท่ามกลางสายตาของกลุ่มขุนนางที่ร่วมเป็นพยาน จากนั้นจึงเริ่มปูนบำเหน็จรางวัลอย่างงาม!","ขุนนางบางส่วนที่แสดงความสนับสนุนล้วนได้รับมอบทองคำ เงิน และดินแดน ส่วนลินน์และแอนโธนีซึ่งมีผลงานมากที่สุด ก็ได้รับการแต่งตั้งให้เป็นดยุกแห่งอาณาจักร และตามที่เคยให้สัญญาไว้ ดินแดนขนาดใหญ่ทางตะวันออกของอาณาจักรซึ่งติดกับทะเลทั้งหมดได้ถูกมอบให้เป็นอาณาเขตของพวกเขา","ดินแดนเหล่านี้เดิมทีเป็นของเอิร์ลจอยซ์และมาร์ควิสอีกหลายคนในอาณาจักร แต่ตอนนี้พวกเขาเหล่านั้นไม่ตายในสนามรบ ก็ถูกจับกุมในฐานะผู้เลือกข้างผิด เพื่อเป็นการดึงตัวพวกพ่อมดให้มาร่วมกันต่อกรกับจักรวรรดิและศาสนจักร ฮัตตาร์จึงยินดีที่จะแสดงความใจกว้างอย่างยิ่ง","สำหรับคนอื่นๆ ที่มีผลงานในศึกชิงบัลลังก์ครั้งนี้ ฮัตตาร์ก็ไม่ได้ละเลยพวกเขาแต่อย่างใด ยกตัวอย่างเช่น เรย์เดลที่ได้รับการแต่งตั้งให้เป็นเอิร์ล เพราะท้ายที่สุด เขาคือผู้นำกองกำลังเข้าโจมตีเมืองหลวงและเอาชนะกองทหารองครักษ์ประจำเมืองได้ ผลงานเช่นนี้ย่อมไม่เล็กน้อยเลย","ส่วนพลปืนคาบศิลาที่โชคดีสังหารแฮโรลด์ได้ ก็ได้กลายเป็นขุนนางและได้รับบรรดาศักดิ์เป็นไวเคานต์","“รู้สึกอย่างไรบ้างกับการได้เป็นขุนนาง เรย์เดล?”","ลินน์เอ่ยเย้า","“ไม่ดีเลยครับ ท่านลินน์ การยอมรับการแต่งตั้งจากกษัตริย์ฮัตตาร์ มันก็จะขัดแย้งกับทุกสิ่งที่เราเคยทำมาทั้งหมด พวกเรากวาดล้างขุนนางเก่าพวกนั้น เพื่อมาเป็นขุนนางใหม่เสียเองอย่างนั้นหรือ?”","เรย์เดลกล่าวด้วยน้ำเสียงสับสน","“แน่นอนว่าความพยายามของพวกเราจะไม่สูญเปล่า แต่ทุกอย่างย่อมต้องเป็นไปตามขั้นตอน จริงไหม?”","ลินน์ส่ายหน้า","ลินน์รู้สึกยินดีเล็กน้อยที่เรย์เดลยังคงยึดมั่นในอุดมการณ์เดิม และไม่ถูกสั่นคลอนจากการเปลี่ยนแปลงฐานะอย่างกะทันหัน ต่างจากในหน้าประวัติศาสตร์ ที่มีผู้คนมากมายนั้นสามารถระเบิดพลังใจอันน่าทึ่งออกมาได้ในช่วงต้นของการปฏิวัติ แต่ท้ายที่สุดก็ต้องพ่ายแพ้ต่อความเสื่อมทราม ซึ่งคือรากเหง้าของการมีอยู่ของกฎแห่งวัฏจักรประวัติศาสตร์ที่พบเห็นได้ทั่วไป...","“อีกไม่กี่วัน เจ้าค่อยแวะมาที่อิเยตาสิ ข้าคิดว่าเจ้าน่าจะค้นพบคำตอบบางอย่างได้ที่นั่น!”","ลินน์กล่าวพร้อมรอยยิ้ม","“อิเยตาหรือ?”","เรย์เดลกระซิบด้วยความปรารถนา เพราะเขาก็เคยได้ยินพวกพ่อมดพูดถึงสถานที่อันมหัศจรรย์แห่งนี้มาบ้าง","มันคือเมืองที่ถูกสร้างขึ้นโดยเหล่าพ่อมด และเปี่ยมล้นไปด้วยพลังแห่งเวทมนตร์","“ท่านลินน์! พลุที่ท่านให้พวกเราทำเตรียมไว้พร้อมหมดแล้วนะ!”","ขณะที่ทั้งสองกำลังคุยกัน ลิเดียก็รีบวิ่งเข้ามาและตะโกนด้วยความตื่นเต้น","“ตกลง ไปดูด้วยกันเถอะ!”","ลินน์พยักหน้า","ค่ำคืนนี้ เพื่อเฉลิมฉลองการขึ้นครองราชย์ของกษัตริย์องค์ใหม่ จึงมีการจัดงานเลี้ยงอันยิ่งใหญ่ขึ้นในเมืองหลวง แต่ลินน์ไม่ได้สนใจที่จะไปปั้นหน้าเสแสร้งกับพวกขุนนางเหล่านั้น เพราะเขามีวิธีเฉลิมฉลองในแบบของเขาเอง!","ในขณะนี้ จัตุรัสในเมืองหลวงเต็มไปด้วยผู้คน หลังจากต้องเดินทางรอนแรมและต่อสู้มาตลอดทั้งคืน ในที่สุดพลปืนคาบศิลาและเหล่าคนงานเหมืองก็ได้พักผ่อนอย่างเต็มที่เสียที พวกเขาจุดกองไฟตรงกลางจัตุรัส ดื่มด่ำกับเนื้อย่างและเหล้าองุ่นที่ถูกส่งมาให้ พลางพูดคุยกันถึงชัยชนะและเกียรติยศเมื่อคืนที่ผ่านมา","โดยเฉพาะพลปืนคาบศิลาที่ตามแฮมม์ไปยังคฤหาสน์ขององค์ชาย พวกเขากำลังใช้คลังคำศัพท์อันน้อยนิดที่มีเพื่อบรรยายถึงฉากอันน่าตื่นตะลึงตอนที่สายฟ้าฟาดกระหน่ำลงมา","แม้แต่ชาวเมืองหลวงบางส่วนก็มาร่วมงานด้วย ซึ่งนี่เป็นสิ่งที่ลินน์จงใจจัดเตรียมไว้เป็นพิเศษ","หลังจากการต่อสู้ในเมืองหลวงจบลง ลินน์ก็ได้ขอให้คนที่ว่างงานไปช่วยชาวเมืองที่ได้รับผลกระทบจากภัยพิบัติสร้างบ้านเรือนขึ้นใหม่ และมอบเงินชดเชยให้จำนวนหนึ่งเพื่อแลกกับความไว้วางใจจากพวกเขา","สำหรับเรื่องเงินทุน ย่อมมาจากความใจกว้างของกษัตริย์องค์ใหม่อยู่แล้ว...","ฮัตตาร์ไม่ได้ใส่ใจเรื่องความเป็นความตายของชาวเมืองเหล่านี้นัก แต่เขาก็จะไม่หักหน้าพวกลินน์เพียงเพราะเรื่องเล็กน้อยเช่นนี้","ดังนั้นเมื่องานเฉลิมฉลองจัดขึ้นในคืนนี้ ลินน์จึงให้พวกเขาไปเชิญชาวเมืองที่เคยช่วยเหลือไว้มาร่วมงานทั้งหมด","แม้ท้ายที่สุด จะมีชาวเมืองไม่ถึงหนึ่งในสี่ที่กล้าตอบรับคำเชิญ แต่นี่ก็นับเป็นจุดเริ่มต้นที่ดีอย่างไม่ต้องสงสัย เพราะการเปลี่ยนแปลงค่านิยมย่อมต้องค่อยเป็นค่อยไปเสมอ...","“ท่านลินน์...”","เมื่อเห็นร่างของลินน์ปรากฏตัว เสียงโห่ร้องยินดีก็ดังกระหึ่มขึ้นทั่วจัตุรัสทันที ทุกคนต่างลุกขึ้นยืนและแหวกทางให้เขาอย่างพร้อมเพรียง","หลังจากผ่านการต่อสู้เมื่อคืน จึงไม่มีใครไม่รู้ว่าพ่อมดผู้นี้ทรงพลังเพียงใด ซึ่งสามารถเปลี่ยนสีท้องฟ้าได้ด้วยการสะบัดมือ และเรียกสายฟ้าอันน่าสะพรึงกลัวลงมาทำลายล้างกองทหารองครักษ์นับพันนาย","แถมยังมีข่าวลืออีกว่า ร่างจำแลงแห่งพระผู้เป็นเจ้าที่ปรากฏขึ้นเหนือเมืองหลวงเมื่อวานนี้ ก็ถูกพ่อมดหนุ่มผู้นี้บดขยี้จนแหลกสลายเช่นกัน","ในสายตาของใครหลายคน ลินน์ได้กลายเป็นร่างอวตารของเทพแห่งอสนีบาต เป็นเทพเจ้าที่แท้จริง หรือไม่ก็เป็นทูตสวรรค์ไปเสียแล้ว","เมื่อมองดูสีหน้าอันตื่นเต้นของทุกคน ลินน์ก็แย้มยิ้มแล้วกล่าว","“ทุกคน นั่งลงเถิด ชัยชนะในครั้งนี้เป็นผลพวงมาจากความพยายามร่วมกันของพวกเราทุกคน พลังของทุกๆ คนล้วนเป็นสิ่งที่ขาดไม่ได้...”","“แต่พวกเจ้าต้องจดจำไว้ว่า ชัยชนะนี้เป็นเพียงแค่จุดเริ่มต้น เพราะจักรวรรดิและศาสนจักรยังคงมีอยู่ โดยพยายามที่จะทำลายชัยชนะของเรา และจะต้อนพวกเจ้าทุกคน ให้กลับเข้าไปในเหมืองอันมืดมิด ที่ซึ่งการทำงานหนักไม่อาจแลกมาซึ่งรางวัลที่คู่ควร...”","ลินน์กวาดสายตามองทุกคนที่อยู่ที่นั่น เฝ้าดูสีหน้าของพวกเขาที่ค่อยๆ แปรเปลี่ยนเป็นความโกรธแค้น","“ถ้าอย่างนั้นก็อัดพวกมันสิ!”","คนงานเหมืองที่กำลังเมามายคนหนึ่งตะโกนลั่น ราวกับเป็นการจุดชนวนระเบิดในฝูงชน ซึ่งทำให้ทั่วทั้งจัตุรัสเดือดพล่านขึ้นมาทันที ผู้คนต่างตะโกนก้องว่าจะโค่นล้มศาสนจักรและจักรวรรดิ และจะเป่าหัวพวกมันให้กระจุยด้วยปืนคาบศิลา","“ถูกต้อง! จักรวรรดิและศาสนจักรไม่มีอะไรให้น่าหวาดกลัว จงใช้ปืนคาบศิลาในมือพวกเจ้าบดขยี้พวกมันให้หมด และต่อให้เป็นทวยเทพ ก็ยังต้องร่วงหล่นภายใต้พลังอันยิ่งใหญ่ของเวทมนตร์และเทคโนโลยี!”","ลินน์ตะโกนเสียงดังกึกก้อง พร้อมชูแก้วไม้ในมือขึ้น","“ส่วนตอนนี้ จงสนุกกับงานเลี้ยงและเฉลิมฉลองชัยชนะของพวกเราเสียเถิด! จากนี้เป็นต้นไป ฐานะของพวกเจ้าไม่ใช่ทาสในเหมืองอีกต่อไป และพวกเจ้าจะไม่ถูกอาณาจักรตามล่า เพราะพวกเจ้าทุกคนล้วนเป็นอิสระแล้ว!”","เมื่อได้ยินคำพูดของลินน์ เสียงโห่ร้องยินดีดังสนั่นหวั่นไหวไปทั่วจัตุรัส ทุกคนต่างชูแก้วไม้ในมือขึ้น ปากตะโกนคำว่า “อิสรภาพจงเจริญ” และ “ช่างหัวพระเจ้าสิ” จากนั้นก็หัวเราะร่วนและกระดกเหล้าองุ่นรสแรงในแก้วลงคอ","ลินน์ส่งสัญญาณเงียบๆ ซึ่งลิเดียที่รอคอยอยู่แล้วก็รีบจุดพลุที่วางเรียงรายอยู่บนจัตุรัส","ฟิ้ว ฟิ้ว","ในไม่ช้าทุกคนในจัตุรัสก็ได้เห็นฉากอันงดงามตระการตา ลำแสงหลากสีพุ่งทะยานขึ้นสู่ท้องฟ้าก่อนจะระเบิดออก ดอกไม้ไฟสีสันสดใสราวกับช่อดอกไม้ในกลางฤดูร้อน บานสะพรั่งแต่งแต้มสีสันอันวิจิตรตระการตาอยู่บนฟากฟ้า"]},{"n":308,"t":"ดาบเปลี่ยนเป็นคันไถได้ และคันไถก็แปรเปลี่ยนเป็นดาบได้เช่นกัน!","c":["ประกายพลุสว่างวาบได้ทำลายความเงียบสงบของเมืองหลวง ซึ่งทำเอาชาวเมืองจำนวนมากที่เพิ่งผ่านพ้นไฟสงครามมาหมาดๆ คิดไปว่าสงครามได้ปะทุขึ้นอีกครั้งแล้ว และต่างหวาดผวากันไปหมด แม้จะได้มองเห็นดอกไม้ไฟอันงดงามตระการตาอยู่ภายนอกบ้าน แต่พวกเขาก็ยังอดกังวลไม่ได้ว่ามันอาจจะเป็นเวทมนตร์ประหลาดอันใดอีกหรือไม่","โชคดีที่หลังจากเฝ้ารออยู่นานก็ไม่มีทหารบุกรุกเข้ามา เหล่าพลเรือนที่เพิ่งผ่านพ้นการสู้รบมาจึงเริ่มเพลิดเพลินไปกับการแสดงพลุอันเป็นเอกลักษณ์นี้","“งดงามเหลือเกิน!”","จอห์นนี่จ้องมองท้องฟ้ายามราตรีอันสว่างไสว ที่ซึ่งดอกไม้ไฟหลากสีสันยังคงเบ่งบานอย่างต่อเนื่อง ประกายของมันสว่างไสวเสียจนบดบังแสงดาวไปจนหมดสิ้น","“สิ่งนี้ก็ทำมาจากดินปืนด้วยอย่างนั้นหรือ?”","จอห์นนี่หันหน้าไปมองลินน์ เพราะผงสีดำอันเป็นเอกลักษณ์นี้คือผงเล่นแร่แปรธาตุอันน่าสะพรึงกลัวในความทรงจำของเธอ","ไม่ว่าจะเป็นกองทหารองครักษ์ชั้นยอดนับพันนายที่ถูกกวาดล้างจนสิ้นซากในเมืองท่า หรือจะเป็นปืนคาบศิลาและปืนใหญ่ที่สามารถเจาะทะลุชุดเกราะและระเบิดก้อนหินได้ ล้วนเป็นสิ่งที่แสดงแสนยานุภาพของมันออกมาได้อย่างเต็มที่","แต่ในครั้งนี้ จอห์นนี่ได้เห็นอีกด้านหนึ่งของดินปืน โดยที่พลุเหล่านี้นั้นเปรียบเสมือนปืนใหญ่ขนาดเล็ก แต่สิ่งที่พุ่งทะยานออกมาจากพวกมันไม่ใช่กระสุนปืนใหญ่ที่มุ่งสังหารชีวิต แต่กลับเป็นช่อดอกไม้ไฟที่ส่องประกายสว่างไสวยิ่งกว่าดวงดาว...","“ดาบสามารถเปลี่ยนเป็นคันไถได้ และคันไถก็สามารถแปรเปลี่ยนเป็นดาบได้เช่นกัน ทั้งหมดนี้ขึ้นอยู่กับว่าผู้มีสติปัญญาต้องการจะใช้งานมันอย่างไร!”","ลินน์เอ่ยพร้อมรอยยิ้ม","“มันก็เหมือนกับเวทสายฟ้า ที่เจ้าสามารถใช้มันเพื่อสังหารคน และก็สามารถใช้มันเพื่อส่องสว่างในยามค่ำคืนได้เช่นกัน...”","“บางทีสักวันหนึ่ง หากโลกนี้ไม่มีสงครามอีกต่อไป คงจะมีพ่อมดอีกมากมายที่ยินดีจะเรียนรู้เวทมนตร์สายก่อสร้างเหล่านี้ และใช้พลังเวทมนตร์เพื่อยกระดับคุณภาพชีวิตของทุกคน”","ลินน์กล่าวด้วยความซาบซึ้ง","ในอนาคต อาจจะมีพ่อมดสถาปัตยกรรมผู้เชี่ยวชาญด้านอัตราส่วนซีเมนต์และโครงสร้างเหล็ก หรือพ่อมดวิศวกรรมผู้เชี่ยวชาญด้านการผลิตและบำรุงรักษาเครื่องมือต่างๆ","“จะต้องมีวันนั้นอย่างแน่นอน!”","จอห์นนี่กล่าวด้วยความมั่นใจ เพราะทุกสิ่งที่ลินน์เคยกล่าวไว้ล้วนกลายเป็นจริงแล้วในตอนนี้ และเธอก็เชื่อว่าวันนั้นคงอยู่ไม่ไกลเกินรอ","“ศาสตราจารย์ลินน์ ท่านจะไม่มาดื่มด้วยกันสักหน่อยหรือ?”","เอล็อคและคนอื่นๆ ที่จับกลุ่มกันอยู่รอบกองไฟโบกมือทักทาย","ลิเดียซึ่งอยู่ด้านข้างแทรกตัวกลมกลืนไปกับฝูงชนอย่างเป็นกันเอง โดยเธอร่วมแบ่งปันเหล้าองุ่นกับเหล่าทหาร และกระดกเหล้าแก้วใหญ่ลงคอ ซึ่งเรียกเสียงปรบมือเกรียวกราวจากทุกคน","ร่างนี้ไม่สามารถดื่มเหล้าได้...ลินน์นึกอยากจะปฏิเสธ แต่เมื่อคิดดูอีกที เขาก็ไม่อยากทำลายบรรยากาศอันสนุกสนานของทุกคน จึงเดินเข้าไปร่วมวงด้วยรอยยิ้ม","ในยามปกติ พวกเขามักจะถูกปั่นหัวด้วยคำถามแปลกประหลาดที่ศาสตราจารย์มอบให้อยู่เสมอ เมื่อตอนนี้มีโอกาส พวกเขาย่อมต้องการที่จะเอาคืนเป็นธรรมดา","ลินน์รู้ทันความคิดอันซุกซนของเอล็อคและคนอื่นๆ เป็นอย่างดี แต่เขาก็ไม่เคยปฏิเสธ ซึ่งดื่มแก้วแล้วแก้วเล่าโดยที่สีหน้าไม่ได้เปลี่ยนไปเลยแม้แต่น้อย","แท้จริงแล้ว เหล้าทั้งหมดนี้ได้ถูกเขาแอบใช้เวทมนตร์ย่อยสลายจนกลายเป็นธาตุพื้นฐานไปหมดแล้ว ใครใช้ให้เขาเป็นเพียงเวทจำลองร่างในตอนนี้กันล่ะ ต่อให้อยากดื่มแค่ไหนก็ไม่อาจดื่มได้อยู่ดี","จนกระทั่งมีใครบางคนนึกขึ้นได้ว่า ตอนนี้ท่านศาสตราจารย์น่าจะยังอยู่ที่อิเยตา แต่มันก็สายเกินไปเสียแล้ว เอล็อคและคนอื่นๆ ที่เมามายต่างก็ล้มพับกองกันไปเป็นแถบ","วันรุ่งขึ้น เมื่อแสงแรกแห่งยามเช้าสาดส่องลงมายังเมืองหลวง เรย์เดลก็ตื่นขึ้น เขาถูศีรษะที่ปวดตุบจากอาการเมาค้างเพราะดื่มหนักไปเมื่อวาน ซึ่งรอบกายก็รายล้อมไปด้วยกลิ่นเหล้าคละคลุ้ง","บนพื้นกระเบื้องของจัตุรัสนั้นเต็มไปด้วยเหล่าคนงานเหมืองหน้าแดงก่ำและนอนแผ่หลาอย่างไม่สนใจภาพลักษณ์อยู่บนพื้นสกปรกที่เต็มไปด้วยคราบเหล้า พร้อมกับส่งเสียงกรนดังสนั่น","เรย์เดลก้าวไปข้างหน้าเพื่อปลุกแฮมม์และคนอื่นๆ จากนั้นก็ขอให้พวกเขาไปไล่ปลุกคนอื่นๆ ทีละคน เพื่อให้มาช่วยกันทำความสะอาดจัตุรัสที่เละเทะแห่งนี้","ลินน์เดินทางไปยังพระราชวังตั้งแต่เช้าตรู่ เพื่อหารือเกี่ยวกับภารกิจต่อไป","แม้ว่าการต่อสู้จะจบลงแล้ว แต่ก็ยังมีอีกหลายสิ่งที่ต้องจัดการภายในอาณาจักร ตัวอย่างเช่น โบสถ์ในแต่ละเขตแดนที่ยังคงถูกคุ้มกันโดยเหล่านักบวชและบิชอป","นั่นหมายความว่าพวกเขาจะต้องเร่งจัดการกับปัญหาภายในเหล่านี้ให้มากที่สุดเท่าที่จะทำได้ก่อนที่ข่าวจะแพร่สะพัดออกไป เพื่อเตรียมความพร้อมสำหรับสงครามครั้งต่อไปกับจักรวรรดิและศาสนจักร","“แต่อาณาจักรของเรานั้นกว้างใหญ่ยิ่งนัก น่าจะมีดินแดนที่มีโบสถ์ตั้งอยู่ไม่ต่ำกว่า 200 แห่ง การจะกำจัดพวกมันในระยะเวลาอันสั้นย่อมไม่ใช่เรื่องง่ายเลย”","มาร์ควิสการ์ด ซึ่งเพิ่งได้รับการเลื่อนตำแหน่งเป็นอัครมหาเสนาบดีแห่งอาณาจักร เอ่ยพลางขมวดคิ้ว","“เราสามารถใช้ประโยชน์จากความเร็วของเรือเหาะ ร่วมมือกับลอร์ดในพื้นที่ต่างๆ เพื่อใช้ยุทธวิธีเด็ดหัว ซึ่งใช้พ่อมดเพียงไม่กี่คนและหน่วยพลปืนคาบศิลา 100 นายก็พอแล้วที่จะบดขยี้โบสถ์หนึ่งแห่งให้ราบคาบ!”","ลินน์กล่าวด้วยน้ำเสียงทุ้มต่ำ","“หากเราทำได้รวดเร็วพอ ดินแดนทั้งหมดในเขตใจกลางอาณาจักรก็จะตกอยู่ภายใต้การควบคุมของเราภายในไม่กี่วัน ส่วนพื้นที่อื่นๆ เราคงต้องค่อยๆ จัดการไป”","“บางทีเราอาจจะพิจารณาปล่อยข่าวลวงบางอย่าง เพื่อล่อลวงให้บิชอปเหล่านั้นเดินทางมายังเมืองหลวง”","แอนโธนีเสนอแนะ","ดวงตาของฮัตตาร์เป็นประกายขึ้นมาทันที นี่นับว่าเป็นความคิดที่ดีทีเดียว","แม้ว่าการต่อสู้ในเมืองหลวงเมื่อสองวันก่อนจะดุเดือดเลือดพล่าน โดยมีทั้งเกลียวคลื่นสายฟ้าและร่างจำแลงของเทพปรากฏขึ้น แต่เนื่องจากการปิดกั้นข่าวสารอย่างรัดกุม ผลลัพธ์สุดท้ายของสงครามจึงยังคงถูกจำกัดอยู่แค่ในขอบเขตของเมืองหลวงเท่านั้น","เกรงว่าคนของศาสนจักรในเขตแดนต่างๆ คงไม่มีทางจินตนาการได้เลยว่า เมืองหลวงอันกว้างใหญ่จะถูกตีแตกได้ภายในชั่วข้ามคืน และโลซัคที่ซึ่งถือครองความได้เปรียบอย่างสมบูรณ์แบบจะจบชีวิตลงอย่างง่ายดายเช่นนี้ แล้วหากพวกเขาสามารถล่อลวงพวกมันมาที่เมืองหลวงได้...","ท่ามกลางการปรึกษาหารือของทุกคน แผนการถอนรากถอนโคนศาสนจักรออกจากอาณาจักรอย่างสมบูรณ์ก็ถูกร่างขึ้นอย่างรวดเร็ว โดยหลักๆ แล้ว ปฏิบัติการเด็ดหัวและแผนล่อลวงจะถูกดำเนินไปพร้อมๆ กัน ซึ่งขึ้นอยู่กับระยะห่างระหว่างแต่ละดินแดนกับเมืองหลวง รวมถึงความแข็งแกร่งของโบสถ์ในท้องถิ่นนั้นๆ ว่าควรจะล่อพวกมันมาที่เมืองหลวง หรือจะส่งคนไปสังหารทิ้งโดยตรง","“ถ้าเช่นนั้น เราควรจะปิดบังเรื่องการสวรรคตของฝ่าบาทไว้ก่อนดีหรือไม่?”","ขุนนางแห่งอาณาจักรผู้หนึ่งเสนอขึ้นอย่างกะทันหัน","ทั้งโถงพลันเงียบกริบจนแทบจะได้ยินเสียงเข็มตกพื้น แม้ว่าข้อเสนอนี้อาจจะเป็นการล่วงเกินกษัตริย์ฮัตตาร์องค์ปัจจุบัน แต่มันก็ถือเป็นวิธีหนึ่งที่ใช้ได้จริง","หากแสร้งทำเป็นว่ากษัตริย์บาเซลยังคงมีชีวิตอยู่ และอาณาจักรยังคงเชื่อฟังคำสั่งของจักรวรรดิ บางทีสงครามครั้งนี้อาจถูกยืดเวลาออกไปหรือกระทั่งหลีกเลี่ยงได้เลย","เพราะจักรวรรดิและศาสนจักรนั้นเปรียบเสมือนภูเขาสูงตระหง่าน ที่เพียงพอจะบดขยี้ทุกคนให้แหลกสลาย","สีหน้าของฮัตตาร์ดูย่ำแย่อย่างถึงที่สุด เขาไม่เห็นด้วยกับข้อเสนอนี้เลยแม้แต่น้อย เพราะนั่นหมายความว่าตัวเขาซึ่งเป็นกษัตริย์ จะยังไม่ได้รับการยอมรับจากพสกนิกรในอาณาจักรไปอีกเป็นเวลานาน","“ข้าเกรงว่ามันคงจะยาก การตายของพระคาร์ดินัลไม่น่าจะปิดบังไว้ได้นานหรอก”","ลินน์ส่ายหน้าและปฏิเสธข้อเสนอนั้นทันที","หากพวกเขาสามารถจับเป็นได้โดยตรงแบบเดียวกับนูเออร์ แล้วทำการปิดกั้นประสาทสัมผัสทั้งห้าและจองจำเอาไว้ บางทีอาจจะพอยับยั้งไม่ให้อีกฝ่ายหวนคืนสู่อาณาจักรแห่งพระผู้เป็นเจ้าในรูปแบบของวิญญาณได้","ยิ่งไม่ต้องพูดถึงเลยว่า ก่อนหน้านี้โลซัคได้ทำการอัญเชิญร่างจำแลงของตัวตนผู้นั้นให้มาจุติแล้ว ป่านนี้พวกเบื้องบนของศาสนจักรก็คงจะได้รับเทวโองการและทราบข่าวการล่มสลายของอาณาจักรแล้วเช่นกัน","และศาสนจักรย่อมไม่มีทางยอมปล่อยให้อาณาจักรใดหลุดพ้นจากการควบคุมของตนไปได้หรอก..."]},{"n":309,"t":"ก้าวข้ามสู่จอมเวทผู้ยิ่งใหญ่!","c":["ในช่วงบ่ายของวันที่สามหลังสิ้นสุดสงครามในเมืองหลวง เรือเหาะที่บรรทุกทหารและเหล่าพ่อมดได้ค่อยๆ ลอยตัวขึ้นสู่ท้องฟ้า และมุ่งหน้าไปยังส่วนต่างๆ ของอาณาจักรเพื่อปฏิบัติภารกิจเด็ดหัว","เรือเหาะสามลำมุ่งหน้าไปยังจุดรอยต่อระหว่างอาณาจักรฮัดลาตาและจักรวรรดิเซคัส เพื่อจับตาดูความเคลื่อนไหวของกองกำลังศัตรู หากพบสัญญาณการรวบรวมกำลังทหารหรือการข้ามพรมแดน พวกเขาก็จะส่งข่าวกลับมาทันที!","นอกจากนี้ เรย์เดล แฮมม์ และคนอื่นๆ ก็ได้ขึ้นเรือเหาะไปด้วยเช่นกัน แต่จุดหมายของพวกเขาคือ อิเยตา","ในฐานะลอร์ดคนใหม่ของดินแดนทางตะวันออกของอาณาจักร เรย์เดลที่ยังไม่มีความรู้เรื่องการสร้างดินแดนและการจัดสรรที่อยู่ให้แก่คนยากไร้เลย ครั้งนี้เขาจึงเดินทางไปอิเยตาเพื่อแสวงหาหนทางใหม่ๆ ให้กับผู้คนที่สละฐานะคนงานเหมืองและได้รับอิสรภาพมา โดยผู้ร่วมทางไปกับเขาก็คือจอมเวทผู้ยิ่งใหญ่แอนโธนีและคนอื่นๆ","แม้พ่อมดส่วนใหญ่ของสถาบันจะถูกส่งตัวไปช่วยปฏิบัติภารกิจเด็ดหัว แต่ลูกศิษย์ระดับหัวกะทิอย่างฟูล่ายังคงอยู่เคียงข้างแอนโธนี ซึ่งเดินทางไปอิเยตาเพื่อเข้าพบลินน์ด้วยตนเอง และลินน์ก็ถือโอกาสนี้เชิญชวนให้เข้าร่วมงานสัมมนาวิชาการประจำปีนี้ไปด้วยเลย!","ถึงแม้สงครามกับจักรวรรดิจะใกล้เข้ามาทุกที แต่การรวบรวมกองทัพและเตรียมเสบียงศึกก็ต้องใช้เวลา ไม่ว่าศาสนจักรจะรวดเร็วเพียงใด พวกเขาก็คงมาไม่ถึงที่นี่ในวันพรุ่งนี้หรอก","จากการประเมินของพวกเขา อย่างเร็วที่สุดน่าจะใช้เวลาประมาณครึ่งเดือนในการเตรียมการ และมีความเป็นไปได้สูงที่ข้อมูลเรื่องปืนคาบศิลาและปืนใหญ่จะรั่วไหลออกไป ดังนั้น การจะหวังพึ่งอาวุธเทคโนโลยีเหล่านี้เพื่อช่วงชิงความได้เปรียบอีกครั้งอาจไม่ใช่เรื่องง่ายนัก","โชคยังดีที่ลินน์ไม่ได้ตั้งใจจะแบกรับภาระนี้ไว้เพียงลำพัง เพราะถ้าปราศจากการช่วยเหลือจากสภาเวทมนตร์ พวกเขาก็คงยากที่จะเอาชนะสงครามครั้งนี้ได้","ด้วยอิทธิพลของศาสนจักรที่กว้างใหญ่ไพศาล และดินแดนของจักรวรรดิก็ใหญ่โตกว่าอาณาจักรหลายเท่า ซึ่งมีพระคาร์ดินัลอย่างโลซัคอยู่ไม่ต่ำกว่าหลายสิบคน รวมถึงบุคคลระดับสูงอย่างพระสันตะปาปาและประธานศาลพิพากษา ซึ่งเรายังไม่รู้ระดับพลังที่แท้จริงของพวกเขาทั้งสิ้น","อย่างไรก็ตาม ก่อนที่แอนโธนีและคนอื่นๆ จะมาถึง ลินน์ก็กำลังเตรียมการ ทำเรื่องสำคัญที่สุดเรื่องหนึ่ง นั่นคือการก้าวข้ามผ่านสู่การเป็นจอมเวทผู้ยิ่งใหญ่!","เขารอคอยวันนี้มานาน และมันกำลังจะมาถึงเร็วกว่าที่คาดไว้ ทั้งหมดนี้เป็นผลมาจากการที่ลินน์ฝึกฝนเวทแยกแยะวัสดุพื้นฐานอย่างต่อเนื่องผ่านการเชื่อมต่อทางจิตกับปัญญาประดิษฐ์สนับสนุนในช่วงนี้ ซึ่งเป็นแก่นแท้ของพ่อมดและเป็นหนทางเดียวในการฝึกฝนพลังจิต","เวลานี้ ช่วงเวลาแห่งการก้าวข้ามมาถึงแล้ว!","“ท่านลินน์ ท่านพร้อมที่จะก้าวข้ามแล้วหรือ?”","เควิน ศาสตราจารย์เวทมนตร์สายแปรสภาพที่เพิ่งทราบข่าวถึงกับตกใจ และดูจะตื่นเต้นยิ่งกว่าตัวลินน์เองเสียอีก","ทำอย่างไรได้ ในเมื่อความหวังของสถาบันอิเยตาทั้งหมดฝากไว้กับลินน์ พวกเขาจึงอดไม่ได้ที่จะกังวล","เพราะจอมเวทผู้ยิ่งใหญ่นั้นมีความสำคัญต่อทุกสถาบันเป็นอย่างยิ่ง และบ่อยครั้งที่สถานะนี้เป็นตัวบ่งชี้ถึงความรุ่งโรจน์หรือความเสื่อมถอยของสถาบันพ่อมด แถมยังเป็นหลักประกันด้านพลังและสิทธิ์ในการออกเสียงอีกด้วย","“แต่มันไม่เร็วเกินไปหรือ? ท่านอยากจะเลื่อนไปสักสองสามวันไหม?”","หลังจากความยินดีในช่วงแรกผ่านไป เควินก็เริ่มลังเลขึ้นมาอีกครั้ง เพราะท้ายที่สุด การจะก้าวข้ามสู่ระดับจอมเวทผู้ยิ่งใหญ่นั้นมาพร้อมกับความเสี่ยงมากมาย และหากล้มเหลวอาจจมดิ่งสู่สภาวะจิตใจพังทลายเป็นเวลานาน หรือเลวร้ายที่สุดก็คือเสียสติไปเลย","“ต้องเป็นวันนี้ จะไม่เตรียมการอะไรอีกแล้ว!”","ลินน์กล่าวอย่างมั่นใจ เพราะตอนนี้เขานั้นต้องการพลังที่มากขึ้น","ในศึกชิงเมืองหลวงครั้งนี้ เขายังต้องอาศัยปัจจัยภายนอกเป็นหลักในการโค่นพระคาร์ดินัล และหากพึ่งพาเพียงพลังของตนเอง เขาคงไม่มีแม้แต่คุณสมบัติที่จะยืนเผชิญหน้ากับอีกฝ่ายด้วยซ้ำ","นี่ไม่ใช่เรื่องดี เพราะไม่ว่าเจ้าจะเตรียมการมาดีเพียงใด ความผิดพลาดย่อมเกิดขึ้นได้เสมอ และพลังของตนเองต่างหากคือรากฐานของจริง","ลินน์ละทิ้งภารกิจในฐานะศาสตราจารย์ แล้วพาเควินและคนอื่นๆ ไปยังหอคอยวิสลิ่ง ซึ่งเป็นเขตพื้นที่แก่นกลางของท่าเรืออิเยตาทั้งหมด!","เดิมทีสถานที่นี้ถูกเฮลรามใช้เพื่อจัดตั้งค่ายกลวิญญาณที่ครอบคลุมทั่วเมืองทางใต้ ตอนนี้หลังจากการปรับปรุงใหม่ หอคอยวิสลิ่งก็ได้กลายเป็นสถานที่สำหรับเก็บรักษาสิ่งของสำคัญ","ที่ชั้นใต้ดินชั้นล่างสุด ซึ่งเป็นที่เก็บคริสตัลเวทมนตร์จำนวนมหาศาล และปรมาจารย์นักเล่นแร่แปรธาตุอย่างเดนนิสก็กำลังจดจ่ออยู่กับการวาดค่ายกลการเล่นแร่แปรธาตุขนาดใหญ่","นี่คือค่ายกลการเล่นแร่แปรธาตุ เนตรแห่งธาตุ ที่ใช้เพื่อสนับสนุนพ่อมดเต็มตัวให้ก้าวข้ามสู่ระดับจอมเวทผู้ยิ่งใหญ่ โดยมันจะสร้างสภาพแวดล้อมที่มีพลังเวทหนาแน่นอย่างมหาศาล และทำให้ผู้ที่อยู่ภายในสามารถเข้าถึงโลกแห่งธาตุที่จอมเวทผู้ยิ่งใหญ่เท่านั้นที่จะมองเห็นได้เป็นการชั่วคราว","โดยผู้ที่สร้างค่ายกลนี้ขึ้น ก็คือผู้ควบคุมธาตุอัลทอค","และก่อนที่จะก้าวข้ามสู่จอมเวทผู้ยิ่งใหญ่ได้นั้น จำเป็นต้องดื่มยาแสงจันทร์ของซินเธีย ที่จะสามารถเพิ่มขีดจำกัดพลังจิตของผู้ดื่มได้ภายในหนึ่งชั่วโมง ซึ่งจะช่วยให้พ่อมดระดับสามวงแหวนนั้นสามารถก้าวข้ามขีดจำกัดของตนเองได้","แต่เนื่องจากยาตัวนี้มีผลข้างเคียงที่รุนแรง หากก้าวข้ามล้มเหลวจะเพิ่มความเสี่ยงที่จิตจะแตกสลายได้ จึงถูกสั่งห้ามใช้ไปเมื่อเจ็ดสิบปีก่อน","เดนนิสอธิบายข้อควรระวังในการก้าวข้ามสู่จอมเวทผู้ยิ่งใหญ่ให้ลินน์ฟังอย่างเคร่งขรึม โดยทั่วไปแล้ว ทั้งค่ายกลการเล่นแร่แปรธาตุและตัวยานั้นเป็นเพียงปัจจัยสนับสนุนเท่านั้น","การเป็นจอมเวทผู้ยิ่งใหญ่นั้นไม่มีหนทางลัด มิเช่นนั้นในดินแดนพ่อมดที่มีพ่อมดเต็มตัวนับพันคน คงไม่เหลือจอมเวทผู้ยิ่งใหญ่เพียงแค่สามสิบคนเช่นนี้","ลินน์รับฟังอย่างตั้งใจ การมีความมั่นใจก็เป็นเรื่องหนึ่ง แต่ไม่ได้หมายความว่าเขาจะประมาทเลินเล่อได้","“เริ่มกันเถอะ!”","ลินน์สูดหายใจเข้าลึกๆ หลังจากปรับสภาพร่างกายและจิตใจจนสมบูรณ์แบบ เขาก็เดินเข้าไปยังใจกลางค่ายกลการเล่นแร่แปรธาตุ","อืมมมม","เสียงพลังเวทที่พุ่งพล่านดังขึ้นกะทันหัน ลวดลายการเล่นแร่แปรธาตุบนพื้นสว่างวาบขึ้นตามรอยเท้าของเขา ไม่นานชั้นล่างสุดของหอคอยวิสลิ่งทั้งหมดก็ถูกปกคลุมด้วยแสงเรืองรองสีน้ำเงิน","“ว่าแต่ ท่านลินน์น่าจะมีอายุ 20 ปีในปีนี้ใช่ไหม?”","เดนนิสถามขึ้นกะทันหัน","“เรื่องนี้...ข้าเองก็ไม่แน่ใจ แต่เมื่อสองปีก่อน ตอนที่ศาสตราจารย์ลินน์มาที่นี่ครั้งแรก เขาน่าจะมีอายุไม่ถึง 20 ปีนะ”","เควินชะงักไปครู่หนึ่งก่อนกล่าวอย่างลังเล","“หากการก้าวข้ามครั้งนี้สำเร็จ นี่จะเป็นการสร้างสถิติใหม่ขึ้นมาอีกครั้ง!”","เดนนิสกล่าวด้วยความตื้นตันใจ เพราะจอมเวทผู้ยิ่งใหญ่ที่มีอายุไม่ถึง 22 ปี นี้ไม่ใช่แค่อัจฉริยะธรรมดาแล้ว","แม้ก่อนหน้านี้สถิตินี้จะถูกถือครองโดยออกัสต์ แต่เมื่อดาวรุ่งแห่งเวทมนตร์ดวงนี้ถูกพิสูจน์ว่าเป็นของปลอม สถิตินั้นย่อมไม่นับรวม","และในตอนที่เขาได้ก้าวข้ามเป็นจอมเวทผู้ยิ่งใหญ่ เขาก็มีอายุเกินสี่สิบปีไปแล้ว ซึ่งต่อให้ถือว่ารวดเร็วแล้วก็เถอะ...","เมื่อค่ายกลการเล่นแร่แปรธาตุเริ่มทำงาน พลังเวทอันมหาศาลก็ถูกสกัดออกจากคริสตัลเวทมนตร์และรวบรวมไว้ที่ใจกลางค่ายกลอย่างต่อเนื่องโดยไม่มีท่าทีว่าจะหยุดลง","เมื่อเห็นดังนั้น เดนนิสก็อดไม่ได้ที่จะขมวดคิ้ว","“ท่านเดนนิส มีปัญหาอะไรหรือ?”","เควินรีบถามขึ้น พร้อมกับเหล่าพ่อมดจากสถาบันที่มารวมตัวกันในหอคอยวิสลิ่งต่างก็มีสีหน้าเคร่งเครียด","“จำเป็นต้องใช้พลังเวทมหาศาลขนาดนี้เชียวหรือ...”","เดนนิสพึมพำกับตัวเองเสียงแผ่ว บัดนี้ไม่ใช่เขาที่ควบคุมค่ายกล แต่เป็นลินน์ที่อยู่ใจกลางค่ายกล และคริสตัลเวทมนตร์หนึ่งร้อยก้อนที่เตรียมไว้ก่อนหน้านี้ก็ถูกดูดกลืนไปจนหมดสิ้น แต่ค่ายกลเวทมนตร์ก็ยังไม่มีทีท่าว่าจะหยุดทำงานแต่อย่างใด"]},{"n":310,"t":"การสร้างอาณาเขตและทะเลแห่งธาตุ!","c":["“ไปเอาคริสตัลเวทมนตร์มาเพิ่มอีก!”","เดนนิสเอ่ยด้วยน้ำเสียงเคร่งขรึม","เควินรีบปฏิบัติตามอย่างรวดเร็ว โดยร่วมมือกับพ่อมดจากสถาบันอีกกว่าสิบคน เร่งขนย้ายลังบรรจุคริสตัลเวทมนตร์มาให้เร็วที่สุดเท่าที่จะทำได้ จากนั้นก็นำมันไปวางไว้ตามจุดศูนย์กลางแต่ละแห่งของวงเวทตามคำสั่งของเดนนิส เมื่อแล้วเสร็จ เควินจึงเอ่ยถามต่อ","“ท่านเดนนิส เกิดอะไรขึ้นกันแน่ครับ พิธีเลื่อนระดับนี้มีความผิดปกติอะไรหรือเปล่า?”","เมื่อเห็นความหนาแน่นของพลังเวทที่พุ่งทะยานขึ้นตรงใจกลางวงเวท ต่อให้เป็นเควินที่ไม่ได้เชี่ยวชาญด้านการแปรธาตุมากนัก ก็ยังพอมองออกว่ามีบางอย่างผิดปกติ","“ตามหลักแล้ว มันไม่ควรจะต้องใช้พลังเวทมากมายขนาดนี้ ในช่วงเจ็ดสิบปีที่ผ่านมา มีจอมเวทผู้ยิ่งใหญ่กว่าสิบคนที่เลื่อนระดับผ่านเนตรแห่งธาตุ ถึงแม้ในอดีตพวกเขาจะเคยล้มเหลว แต่ก็ไม่เคยเกิดสถานการณ์แบบนี้ขึ้นมาก่อน...”","เดนนิสเอ่ยอย่างสับสนเช่นกัน หลังจากครุ่นคิดอยู่นาน เขาก็พูดขึ้นอีกครั้ง","“อย่างไรก็ตาม ตัวอย่างที่เกี่ยวข้องก็ยังมีน้อยเกินไป ซึ่งแต่ละคนก็ล้วนมีพรสวรรค์ จุดแข็ง และอาณาเขตที่สร้างขึ้นแตกต่างกันไป ไม่มีอะไรรับประกันได้ว่าการคาดเดาของข้าจะถูกต้อง และสิ่งเดียวที่เราทำได้ในตอนนี้คือการรอคอย”","เควินมองร่างที่อยู่ตรงใจกลางวงแหวนแปรธาตุด้วยความกังวลใจอย่างยิ่ง และไม่มีทางเลือกอื่นนอกจากแอบหวังให้ทุกอย่างผ่านพ้นไปด้วยดี","ในเวลาเดียวกัน ลินน์ผู้ซึ่งกำลังถูกเควินพูดถึง ก็กำลังทุ่มเทสมาธิทั้งหมดไปกับการควบคุมวงแหวนแปรธาตุ โดยที่พลังจิตของเขาก็ดูเหมือนจะได้รับการยกระดับขนานใหญ่จากวงเวท","เดิมที พลังจิตของเขาสามารถครอบคลุมพื้นที่รอบตัวได้เพียงสามเมตรเท่านั้น และเขาสามารถควบคุมธาตุต่างๆ ได้ภายในขอบเขตนี้ แต่ตอนนี้ ภายใต้อิทธิพลของวงแหวนแปรธาตุ มันได้ขยายอาณาเขตออกไปมากกว่าสิบเท่า","และกุญแจสำคัญในการเลื่อนระดับขึ้นเป็นจอมเวทผู้ยิ่งใหญ่นั้นมีอยู่สองประการ","หนึ่งคือการบรรลุการทะลวงขีดจำกัดของพลังจิต และสองคือการสร้างอาณาเขตขนาดเล็กขึ้นมา","ภายในอาณาเขตนี้ ธาตุทั้งหมดล้วนประกอบขึ้นจากพลังเวท โดยที่พ่อมดคนนั้นสามารถควบคุมและเปลี่ยนรูปพวกมันได้อย่างง่ายดาย เพียงแค่ยกมือ ก็สามารถสร้างพื้นที่สูญญากาศในอาณาเขตนั้นได้","และสิ่งนี้เองที่ทำให้จอมเวทผู้ยิ่งใหญ่นั้นมีพลังที่จะกดข่มพ่อมดเต็มตัวได้อย่างเบ็ดเสร็จ","เนื่องจากธาตุทั้งหมดในอาณาเขตตกอยู่ภายใต้การควบคุมของเขา นั่นก็หมายความว่าคู่ต่อสู้จะไม่สามารถใช้ธาตุใดๆ ในอากาศเพื่อเสริมพลังได้โดยตรง ในขณะที่อันตรายอาจพุ่งโจมตีมาจากจุดใดก็ได้ภายในอาณาเขตของเขา","ลินน์พยายามหดระยะครอบคลุมของพลังจิตลงเรื่อยๆ จากที่เคยครอบคลุมวงแหวนแปรธาตุทั้งหมด ให้ลดลงมาเหลือ 20 เมตร 18 เมตร และ 15 เมตรห่างจากร่างกาย...","ซึ่งทำให้ธาตุชนิดต่างๆ ในอากาศเริ่มปรากฏชัดเจนขึ้นเรื่อยๆ ภายใต้การรับรู้ของเขา แม้เขาจะไม่สามารถมองเห็นรูปร่างของพวกมันได้โดยตรง แต่มันก็ควบคุมได้ง่ายกว่าเมื่อก่อนมาก","เมื่อระยะครอบคลุมของพลังจิตมาหยุดอยู่ที่สิบสองเมตรรอบตัว ลินน์ก็รู้สึกว่าเขาถึงจุดที่ต้องหยุดพัก จากนั้นจึงทุ่มเทพลังจิตทั้งหมดเข้าไปสู่ห้วงมิติแห่งจิตสำนึกอันกว้างใหญ่","ทุกสิ่งทุกอย่างในที่แห่งนี้ช่างมืดมิดและว่างเปล่า","แต่ในความว่างเปล่านี้ กลับมีจุดแสงจางๆ ปรากฏขึ้น ซึ่งเจิดจรัสราวกับดวงดาวที่ทอแสงระยิบระยับบนท้องฟ้ายามค่ำคืน โดยที่แต่ละจุดแสงล้วนเป็นตัวแทนของช่องเก็บเวท","นี่คือรูปร่างพื้นฐานของอาณาเขตพ่อมด หรือแก่นแท้ของอาณาเขตที่เกิดจากการฉายภาพห้วงจิตสำนึกออกสู่ภายนอก...","ตอนนี้เขาจำเป็นต้องสร้างทะเลแห่งธาตุของตนเองขึ้นมา และใช้มันเพื่อทดแทนธาตุภายนอก จากนั้นจึงทำให้ทั่วทั้งอาณาเขตเกิดความเสถียร เพื่อที่เขาจะสามารถก้าวผ่านขั้นตอนที่สำคัญที่สุดในการเลื่อนระดับเป็นจอมเวทผู้ยิ่งใหญ่ได้","เมื่อลินน์รวบรวมความคิด จุดแสงสองจุดก็ปรากฏขึ้นในห้วงจิตสำนึกอันว่างเปล่า","พวกมันคือธาตุไฮโดรเจนและออกซิเจน!","พวกมันคือสองธาตุที่ลินน์ได้สัมผัสและใช้งานบ่อยที่สุดนับตั้งแต่ทะลุมิติมา ตามมาด้วยไนโตรเจน ฟอสฟอรัส ฟลูออรีน ฮีเลียม...ธาตุชนิดต่างๆ เริ่มล่องลอยอยู่ในห้วงจิตสำนึกมากขึ้นเรื่อยๆ ราวกับเซลล์เนื้อเยื่อที่แบ่งตัวทำซ้ำ จนในไม่ช้าก็เติมเต็มทุกซอกทุกมุมของห้วงจิตสำนึก...","หลังจากควบแน่นธาตุพื้นฐานกว่าสิบชนิด ธาตุโลหะอย่างเช่น ทองแดง เหล็ก และอะลูมิเนียม ก็ตามมา...นี่นับเป็นครั้งแรกที่ลินน์เปลี่ยนพลังเวทให้กลายเป็นธาตุโลหะโดยไม่ได้รับความช่วยเหลือจากสมองกลของเขา โดยกระบวนการนี้ก็มีความยากลำบากเป็นพิเศษ และต้องใช้เวลามากกว่าการสร้างธาตุชนิดอื่นๆ เกือบสิบเท่า","โชคดีที่ลินน์ได้บันทึกธาตุโลหะเหล่านี้เอาไว้แล้วด้วยเวทแยกแยะวัสดุขั้นสูง ดังนั้นหลังจากใช้ความพยายามอยู่พักหนึ่ง ในที่สุดเขาก็สามารถเลียนแบบและสร้างธาตุโลหะพื้นฐานขึ้นมาได้ถึงเก้าชนิด","ณ วินาทีนี้ ทะเลแห่งธาตุได้ก่อตัวขึ้นแล้ว และมีธาตุทั้งหมดสี่สิบเก้าชนิดปรากฏอยู่บนนั้น","พวกมันล้วนเป็นสมบัติล้ำค่าของโลกเวทมนตร์ เป็นผลึกแห่งการสำรวจโลกธรรมชาติของเหล่าพ่อมดนับไม่ถ้วน แต่ลินน์ยังไม่พร้อมที่จะจบลงเพียงแค่นี้","ด้วยการใช้ประโยชน์จากการเลื่อนระดับและวงแหวนแปรธาตุใต้ฝ่าเท้า ลินน์จึงอยากทดสอบดูว่า เขาจะสามารถพัฒนาทะเลแห่งธาตุให้ดียิ่งขึ้นไปอีกได้หรือไม่","เงื่อนไขพื้นฐานสำหรับพ่อมดในการควบคุมและเลียนแบบธาตุ คือการใช้เวทแยกแยะวัสดุเพื่อวิเคราะห์ธาตุชนิดนั้นอย่างละเอียดลึกซึ้ง แล้วถ้าหากทำในทางกลับกันล่ะ?","หลังจากล่วงรู้ถึงโครงสร้างจำลองของธาตุชนิดใดชนิดหนึ่งแล้ว จะสามารถข้ามกระบวนการค้นหาและวิเคราะห์ธาตุนั้นไป แล้วใช้พลังเวทเลียนแบบมันขึ้นมาโดยตรงได้หรือไม่","นี่เป็นความคิดที่บ้าระห่ำอย่างแน่นอน...แต่หากมันเป็นไปได้ ในทางทฤษฎีแล้ว เขาก็จะสามารถสร้างธาตุใดๆ ก็ตามบนตารางธาตุได้ทั้งหมด!","เมื่อถึงเวลานั้น อย่าว่าแต่การสร้างระเบิดนิวเคลียร์ด้วยมือเปล่าเลย แม้แต่การปั้นระเบิดปฏิสสารก็ไม่ใช่ปัญหาอีกต่อไป","เมื่อคิดได้ดังนี้ ลินน์ก็แทบรอไม่ไหวที่จะทำการทดลอง และเป้าหมายที่เขาเลือกก็คือ ธาตุพลูโทเนียม!","นี่คือธาตุกัมมันตรังสีซึ่งเป็นวัตถุดิบสำคัญสำหรับอุตสาหกรรมพลังงานปรมาณู โดยมันสามารถใช้เป็นเชื้อเพลิงนิวเคลียร์และสารตั้งต้นฟิชชันสำหรับอาวุธนิวเคลียร์ ซึ่งหาได้ยากยิ่งในธรรมชาติ และการจะได้มา ก็จำเป็นต้องสกัดพลูโทเนียมที่มีอยู่น้อยนิดออกมาจากแร่ยูเรเนียม","ลินน์ได้ดึงข้อมูลงานวิจัยของสหพันธ์เกี่ยวกับธาตุพลูโทเนียมออกมาจากสมองกลโดยตรง และพยายามใช้พลังเวทสร้างมันขึ้นมาใหม่โดยอ้างอิงจากข้อมูลเหล่านี้","“จำนวนอิเล็กตรอนรอบนอกและโปรตอนของธาตุพลูโทเนียม คือ 94 จำนวนนิวตรอนคือ 145 และมวลอะตอมสัมพัทธ์คือ…”","ลินน์พึมพำแผ่วเบา จุดแสงแห่งพลังเวทส่องประกายวาบขึ้นในห้วงจิตสำนึก และธาตุชนิดใหม่ก็ค่อยๆ ก่อตัวขึ้น","ทุกสิ่งที่เกิดขึ้นในห้วงจิตสำนึกถูกฉายภาพออกไปยังอาณาเขตที่กำลังควบแน่นอย่างต่อเนื่อง โดยมีพลังเวทอันมหาศาลกำลังถูกเผาผลาญและเปลี่ยนสภาพกลายเป็นธาตุชนิดต่างๆ ไม่หยุดหย่อน","ในที่สุดเดนนิสก็เข้าใจว่าเหตุใดอัตราการเผาผลาญคริสตัลเวทมนตร์จึงได้น่าสะพรึงกลัวถึงเพียงนี้ โดยทั่วไปแล้ว อาณาเขตที่ก่อตัวขึ้นในขั้นต้นจะมีความกว้างเพียงประมาณห้าเมตรเท่านั้น แต่รูปร่างพื้นฐานของอาณาเขตที่ลินน์สร้างขึ้นกลับขยายอาณาเขตออกไปมากกว่าสิบเมตรแล้ว","ไม่เพียงเท่านั้น แต่อีกฝ่ายยังสร้างธาตุรวดเดียวถึงสี่สิบเก้าชนิดเพื่อเติมเต็มทะเลแห่งธาตุ นี่คือการเตรียมความพร้อมแบบรวดเดียวจบเลยงั้นหรือ?","มันช่างบ้าระห่ำเหลือเกิน แต่สิ่งสำคัญที่สุดในตอนนี้คือการทำให้อาณาเขตเสถียรภาพและเสร็จสิ้นการเลื่อนระดับต่างหาก ส่วนการสร้างทะเลแห่งธาตุนั้นสามารถค่อยๆ ทำในภายหลังก็ยังได้!","เดนนิสส่ายศีรษะ แต่หลังจากนั้น ใบหน้าของเขาก็พลันแข็งค้าง โดยเขากำลังมองตรงไปยังใจกลางของวงแหวนแปรธาตุ ที่ซึ่งสัมผัสได้ถึงขุมพลังใหม่ที่ค่อยๆ ก่อตัวขึ้น และเอ่ยออกมาด้วยความตกตะลึง","“นี่มัน...ธาตุชนิดใหม่หรือ?!”"]},{"n":311,"t":"เขากำลังสร้างธาตุชนิดใหม่!","c":["เดนนิสอดไม่ได้ที่จะก้าวไปข้างหน้าสองสามก้าว และยืนจ้องมองลินน์ซึ่งอยู่ใจกลางวงเวทอย่างตาไม่กะพริบ โดยที่ธาตุชนิดใหม่นี้กำลังค่อยๆ ก่อตัวขึ้นบนมือขวาที่ยื่นออกมาของอีกฝ่าย","ซึ่งมีขนาดเล็กเกินเปรียบและไม่อาจมองเห็นได้ด้วยตาเปล่า แต่มันกลับปรากฏเด่นชัดเป็นพิเศษภายใต้การรับรู้","นั่นจึงทำให้เดนนิสนั้นมั่นใจอย่างยิ่งยวดว่านี่ไม่ใช่ธาตุใดๆ ที่เขารู้จักอย่างแน่นอน และมันไม่ได้จัดอยู่ในหมวดหมู่ของประเภทธาตุที่เคยค้นพบมาก่อนเลยด้วยซ้ำ","เพราะนับตั้งแต่วินาทีที่มันปรากฏตัวขึ้น ธาตุชนิดนี้ก็แผ่ซ่านพลังอำนาจอันแปลกประหลาดบางอย่างออกมาอย่างต่อเนื่อง","เมื่อคิดได้ดังนี้ เดนนิสก็ไม่อาจระงับความตื่นเต้นเอาไว้ได้","ธาตุ คืออะไร?","ตามทฤษฎีเวทมนตร์แห่งดินแดนพ่อมด ธาตุคือแก่นแท้ของสรรพสิ่ง และเป็นรากฐานของการดำรงอยู่ทั้งมวล!","แล้วธาตุบนโลกนี้มีทั้งหมดกี่ชนิดกันล่ะ?","ตราบใดที่เป็นพ่อมดที่เคยศึกษาศาสตร์แห่งธาตุอย่างเป็นระบบ ย่อมสามารถตอบได้ทันทีว่า มีทั้งหมดสี่สิบเก้าชนิด!","เพื่อที่จะค้นหาธาตุเหล่านี้ พวกเขาได้รื้อค้นและตรวจสอบทุกสิ่งทุกอย่างเท่าที่จะหาได้ในดินแดนพ่อมด โดยใช้เวทแยกแยะวัสดุเพื่อย่อยสลายพวกมันทีละชิ้น จากนั้นจึงนำมาจัดหมวดหมู่","และธาตุทั้งสี่สิบเก้าชนิดคือคำตอบ ซึ่งพ่อมดแห่งสถาบันธาตุบางคนถึงกับฟันธงว่า บางทีอาจจะไม่มีธาตุชนิดอื่นใดหลงเหลืออยู่ในโลกนี้อีกแล้ว และใช้สิ่งนี้เป็นรากฐานในการสร้างสรรค์เวทมนตร์ที่สอดคล้องกัน","แน่นอนว่าเดนนิสเย้ยหยันคำกล่าวอ้างนั้น","โดยเฉพาะอย่างยิ่งหลังจากที่เขาได้คำนวณพื้นที่ของดาวนิรันดร์ผ่านการทดลอง เดนนิสก็ต้องตกตะลึงเมื่อตระหนักว่าโลกใบนี้ช่างกว้างใหญ่ไพศาลนัก และต้องมีธาตุชนิดใหม่ที่ยังไม่มีใครรู้จักซุกซ่อนอยู่อีกมากมาย ซึ่งพวกเขายังหาไม่พบ","อย่างไรก็ตาม โลกเวทมนตร์ทั้งใบไม่ได้มีการค้นพบธาตุชนิดใหม่มานานเกือบ 30 ปีแล้ว และด้วยเหตุนี้เอง ผู้ควบคุมธาตุอัลทอค จึงได้ฝากความหวังของเขาไว้กับโลกในระดับอนุภาคที่เล็กยิ่งกว่าเดิม","แต่บัดนี้ ธาตุชนิดใหม่ได้ปรากฏขึ้นตรงหน้าเขาแล้ว และมันอาจเป็นประเภทธาตุที่ใหม่เอี่ยมอ่องเลยด้วยซ้ำ แล้วสิ่งนี้จะไม่ทำให้เดนนิสรู้สึกตื่นเต้นจนเนื้อเต้นได้อย่างไร","สำหรับพ่อมดทุกคนที่เชี่ยวชาญศาสตร์แห่งธาตุ นี่คือข่าวดีอันยิ่งใหญ่!","หากไม่ใช่เพราะลินน์กำลังอยู่ระหว่างการทะลวงขีดจำกัด และวงแหวนแปรธาตุยังคงทำงานไม่หยุด เดนนิสคงจะพุ่งพรวดเข้าไปสอบถามในทันทีว่าเกิดอะไรขึ้นกับธาตุชนิดใหม่นี้","ในขณะที่เดนนิสกำลังรอคอยด้วยความกระวนกระวายใจ วงแหวนแปรธาตุที่กำลังทำงานอย่างราบรื่นก็พลันเกิดความปั่นป่วนขึ้นมา โดยแก่นกลางของความไม่เสถียรนี้ ก็มีต้นตอมาจากธาตุชนิดใหม่ในมือของลินน์","“หยุดนะ!”","สีหน้าของเดนนิสเปลี่ยนไปอย่างฉับพลัน เขาไม่สนใจเรื่องธาตุชนิดใหม่อีกต่อไป แล้วรีบตะโกนออกไปสุดเสียง","แต่ก่อนที่สิ้นเสียง พลังธาตุอันมหาศาลก็เกิดการปะทุขึ้น พร้อมกับพลังเวทอันมหาศาลที่ถูกกักเก็บไว้ในวงเวทก็สูญเสียการควบคุมในชั่วพริบตา ซึ่งก่อตัวเป็นพายุธาตุอันรุนแรงและกวาดล้างทุกสรรพสิ่งรอบด้าน","วงแหวนแปรธาตุทั้งวงแหลกสลาย พายุธาตุพุ่งเข้าปะทะกับโครงสร้างอิฐหินรอบๆ จนแตกกระจุยกระจาย...","เควินและคนอื่นๆ ที่อยู่ใกล้เคียงต่างเซถลาและเกือบถูกพัดเข้าไปในพายุธาตุ หลังจากทรงตัวยืนหยัดได้ในที่สุด พวกเขาล้วนเผยให้เห็นถึงความหวาดหวั่น","หรือว่าการทะลวงระดับจะล้มเหลว?","เควินลอบคิดด้วยความกังวลใจ","หลังจากพายุธาตุสงบลง ร่างของลินน์ก็ปรากฏขึ้นตรงหน้าทุกคนอย่างรวดเร็ว ดูเหมือนว่าจะไม่มีอะไรบาดเจ็บร้ายแรง นอกเสียจากใบหน้าที่มอมแมม แต่เขากลับขมวดคิ้วแน่นราวกับกำลังครุ่นคิดอะไรบางอย่างอยู่","เมื่อเห็นคิ้วที่ขมวดมุ่นของลินน์ เควินก็เข้าใจในทันที และสีหน้าเสียดายปรากฏขึ้นบนใบหน้าของเขา จากนั้นจึงก้าวไปข้างหน้าเพื่อปลอบโยนพร้อมกับถอนหายใจ","“ท่านศาสตราจารย์ลินน์ การทะลวงขึ้นเป็นจอมเวทผู้ยิ่งใหญ่นั้นไม่ใช่เรื่องง่าย และท่านยังมีเวลาอีกมาก ความล้มเหลวเพียงชั่วคราวก็ไม่ใช่เรื่องใหญ่อะไร”","“เดี๋ยวนะ ใครบอกว่าข้าทะลวงระดับล้มเหลว?”","ลินน์ชะงักไปและเอ่ยถามด้วยความงุนงง","“ถ้าอย่างนั้นหมายความว่า ท่านทำสำเร็จแล้วหรือ?”","เควินถามด้วยความประหลาดใจ","“แน่นอนสิ!”","ลินน์พยักหน้าพร้อมกับรอยยิ้ม จากนั้นเมื่อเขารวบรวมความคิด พลังเวทในอาณาเขตก็แปรสภาพกลายเป็นธาตุเหล็กอย่างเป็นธรรมชาติ พวกมันรวมตัวกันในชั่วพริบตา และกลายเป็นดาบใหญ่ที่มีความยาวหลายเมตรลอยตระหง่านอยู่กลางอากาศ","พื้นที่สิบสองเมตรรอบกายล้วนอยู่ภายในอาณาเขตของเขา และเขาสามารถควบคุมพลังเวทเหล่านี้ให้เปลี่ยนแปลงและผสมผสานกันได้อย่างใจนึก","“ยอดเยี่ยมไปเลย ตอนนี้สถาบันอิเยตาก็มีจอมเวทผู้ยิ่งใหญ่แล้ว!”","เควินพูดอย่างตื่นเต้น โดยไร้ซึ่งความกังขาใดๆ ในใจ เพราะการเลียนแบบธาตุโลหะได้เช่นนี้ เป็นสิ่งที่จอมเวทผู้ยิ่งใหญ่เท่านั้นที่ทำได้จริงๆ!","พ่อมดคนอื่นๆ ในสถาบัน ต่างก็รู้สึกยินดีปรีดาเช่นกัน","นับตั้งแต่การจากไปของจอมเวทผู้ยิ่งใหญ่เฮลราม อิเยตาก็สูญเสียเสาหลักไป แม้ว่าทฤษฎีแปลกใหม่มากมายที่ลินน์นำเสนอจะโดดเด่นเจิดจรัสในงานสัมมนาวิชาการ จนทำให้ชื่อเสียงของสถาบันอิเยตาดังก้องไปทั่วดินแดนพ่อมด แต่ไม่ว่าอย่างไร จอมเวทผู้ยิ่งใหญ่ก็คือหลักประกันความแข็งแกร่งของสถาบันอย่างแท้จริง!","“เดี๋ยวก่อน ในเมื่อท่านทำสำเร็จแล้ว อาการคลุ้มคลั่งของพลังเวทเมื่อครู่นี้มันเกิดอะไรขึ้นกัน?”","เควินเพิ่งนึกเรื่องนี้ขึ้นมาได้ จึงเอ่ยถามอย่างสับสน","แต่ก่อนที่ลินน์จะได้ตอบคำถาม เดนนิสก็พูดแทรกขึ้นมาอย่างร้อนรน","“ท่านศาสตราจารย์ลินน์ เมื่อครู่นี้ท่านกำลังจะสร้างธาตุชนิดใหม่ขึ้นมาใช่หรือไม่?”","น้ำเสียงของเดนนิสเต็มไปด้วยความจริงจังอย่างที่สุด และเขายังใช้คำว่า ‘สร้าง’ เลยด้วยซ้ำ!","ธาตุในอดีตล้วนได้รับการอธิบายว่าเป็น ‘การค้นพบ’ เพราะพวกมันล้วนมีอยู่ในธรรมชาติแต่เดิม พวกเขาเพียงแค่ค้นพบธาตุชนิดนั้น และใช้เวทแยกแยะวัสดุเพื่อวิเคราะห์แล้วนำมันมาใช้งาน","แต่สิ่งที่ลินน์ทำนั้นแตกต่างออกไป แม้ในตอนแรก เดนนิสนั้นคิดว่าอีกฝ่ายเพียงแค่ใช้พลังเวทเพื่อเลียนแบบธาตุใหม่ที่ยังไม่มีใครรู้จัก แต่ในวินาทีที่ธาตุนั้นหลุดการควบคุม เขาก็ตระหนักได้ถึงความผิดปกติ เพราะลินน์กำลังสร้างบางสิ่งขึ้นมาจากความว่างเปล่าอย่างชัดเจน...มันคือธาตุชนิดใหม่!","แต่สิ่งนี้จะเป็นไปได้อย่างไร?","แม้แต่พ่อมดระดับตำนานยังไม่อาจทำเรื่องที่ฝืนกฎเกณฑ์เช่นนี้ได้ แต่ลินน์กลับเกือบจะทำมันสำเร็จเมื่อครู่นี้","“ไม่หรอก มันไม่ใช่การสร้างขึ้นใหม่ ข้าเพียงแค่ได้ยินปรมาจารย์แห่งสมาคมเวทมนตร์เร้นลับพูดถึงโครงสร้างและรูปแบบจำลองของธาตุพลูโทเนียม ดังนั้นข้าจึงอยากลองดูว่าจะสามารถจำลองมันขึ้นมาได้หรือไม่”","ลินน์ส่ายหัวและอธิบาย","“แต่น่าเสียดายที่ในท้ายที่สุดมันก็ยังล้มเหลว!”","ในความเห็นของเขา การใช้ธาตุของเหล่าพ่อมดนั้นสามารถเปรียบเทียบได้กับการเขียนโปรแกรม โดยสิ่งที่พวกเขาทั้งหมดต้องทำก็เพียงแค่ใช้พลังเวทเพื่อ ‘คัดลอก’ และ ‘วาง’ โค้ดที่สามารถรันได้สำเร็จ และตราบใดที่พวกเขาไม่ทำการสุ่มเปลี่ยนแปลงมั่วซั่ว มันก็ยังพอถูไถใช้งานต่อไปได้","ซึ่งสิ่งที่ลินน์ทำเมื่อครู่นี้ก็คือการคาดเดาว่าโค้ดนั้นเขียนมาด้วยอะไร จากนั้นก็เขียนตาม และพบ ‘บั๊ก’ ในระหว่างกระบวนการรันระบบ","อย่างไรก็ตาม เมื่อพิจารณาจากการสร้างธาตุตามปกติแล้ว รูปแบบจำลองธาตุพลูโทเนียมในฐานข้อมูลของสหพันธ์ก็ไม่ได้มีปัญหาแต่อย่างใด แต่มันกลับติดขัดอย่างกะทันหันในขณะที่กำลังเลียนแบบชั้นอิเล็กตรอน เพราะสิ่งนี้เกี่ยวข้องกับระดับควอนตัม ซึ่งเขายังไม่รู้วิธีที่จะทำให้เกิดการเปลี่ยนสถานะของอิเล็กตรอนที่อยู่รอบนอกนิวเคลียส รวมถึงวิธีทำให้พวกมันมีการกระจายตัวตามความน่าจะเป็น...","นั่นหมายความว่า เขาเพียงแค่คลำทางเขียนโค้ดชิ้นนี้ไปแบบมั่วๆ และผลลัพธ์ที่ได้ก็คือปัญหานั่นเอง..."]},{"n":312,"t":"อันที่จริงแล้ว เรือรบลำนี้พวกเราเอาไว้ใช้ตกปลา!","c":["“ธาตุพลูโทเนียม...รูปแบบจำลองธาตุ?!”","ในตอนแรกเดนนิสรู้สึกประหลาดใจที่ธาตุชนิดใหม่นี้มีอยู่จริง จากนั้นเขาก็ยิ่งรู้สึกประหลาดใจมากขึ้นไปอีกกับสิ่งที่เรียกว่ารูปแบบจำลองธาตุ","“หรือว่าท่านผู้ควบคุมธาตุอัลทอคจะพูดถูก และธาตุยังสามารถถูกแบ่งย่อยลงไปได้อีก?”","เดนนิสขมวดคิ้วโดยไม่รู้ตัว ทฤษฎีกระแสหลักในดินแดนพ่อมดปัจจุบันมีแนวโน้มไปทางที่ว่า ธาตุไม่สามารถแบ่งแยกได้ พวกมันคือรากฐานของโลก เพราะนี่คือขีดจำกัดของเวทแยกแยะวัสดุ และพวกเขาไม่สามารถแยกย่อยธาตุพื้นฐานลงไปได้อีกแล้ว","พ่อมดระดับตำนานอัลทอคได้เสนอทฤษฎีการแบ่งย่อยธาตุ แต่จู่ๆ เขาก็เกิดเสียสติไปก่อนที่จะพบหลักฐานใดๆ บันทึกที่เขาเขียนยังเปิดเผยถึงลัทธิวันสิ้นโลก ซึ่งเป็นกลุ่มคนวิกลจริตที่เชื่อว่าโลกกำลังจะก้าวเข้าสู่จุดจบ ดังนั้นมันจึงถูกมองว่าเป็นเพียงสมมติฐานที่ไม่น่าเชื่อถือเท่านั้น","“แน่นอน!”","ลินน์พยักหน้า","“ตามสมมติฐานของนักวิชาการบางคนในสมาคมเวทมนตร์เร้นลับ ธาตุประกอบด้วยนิวเคลียสของอะตอมและอิเล็กตรอนที่โคจรรอบนิวเคลียส”","เดนนิสรู้สึกสนใจในหัวข้อนี้เป็นอย่างมาก และรีบเอ่ยถามว่าสิ่งที่เรียกว่านิวเคลียสของอะตอมและอิเล็กตรอนคืออะไร","ลินน์ไม่ได้อธิบายอะไรมากนัก เขาเพียงบอกว่านี่เป็นเพียงทฤษฎีเวทมนตร์ และจำเป็นต้องมีการทดลองที่เกี่ยวข้องเพื่อพิสูจน์มัน","แม้ว่าจะมีรูปแบบจำลองธาตุมากกว่าหนึ่งร้อยชนิดอยู่ในฐานข้อมูลของสมองกล แต่ลินน์ก็สามารถยืนยันได้เพียงแค่ว่ารูปแบบจำลองของธาตุพลูโทเนียมน่าจะถูกต้อง และที่สำคัญไปกว่านั้น สำหรับเดนนิสที่ไม่เคยสัมผัสกับทฤษฎีควอนตัมมาก่อน เกรงว่ามันคงเป็นเรื่องยากที่จะทำความเข้าใจว่าอะตอมถูกสร้างขึ้นและทำงานอย่างไร","ท้ายที่สุดแล้ว เหล่าพ่อมดเชื่อว่าโลกทั้งใบขับเคลื่อนไปตามกฎเกณฑ์บางอย่าง และพ่อมดก็สามารถร่ายเวทมนตร์ได้โดยการทำความเข้าใจและใช้ประโยชน์จากกฎเกณฑ์เหล่านั้น เขายังสงสัยด้วยซ้ำว่าพ่อมดระดับตำนานที่เป็นที่รู้จักในนามผู้ควบคุมธาตุ อาจจะเคยสัมผัสกับโลกจุลภาคมาแล้ว และเป็นเพราะลักษณะเฉพาะของควอนตัมที่ไม่อาจยอมรับได้นั่นเองที่ทำให้เขาเกิดเสียสติไปอย่างกะทันหัน","“ท่านศาสตราจารย์ เรือเหาะที่เดินทางกลับมาจากอาณาจักรฮัดลาตามาถึงแล้วครับ”","ศิษย์ฝึกหัดหลายคนเดินเข้ามาทางประตู พร้อมกับโค้งคำนับและรายงานต่อลินน์","“ดูเหมือนว่าแขกของเราจะมาถึงแล้วนะ!”","รอยยิ้มปรากฏขึ้นบนใบหน้าของลินน์","“ออกไปดูด้วยกันเถอะ”","ในเวลาเดียวกัน เรือเหาะขนาดมหึมาก็เคลื่อนผ่านหมอกหนาทึบ มาถึงน่านฟ้าเหนือเมืองท่า และค่อยๆ ร่อนลงจอดที่ลานกว้างซึ่งถูกขยายออกเป็นพิเศษ","“นี่คือดินแดนพ่อมดงั้นหรือ? ข้าไม่คิดเลยว่าจะมีสถานที่ที่เจริญรุ่งเรืองเช่นนี้อยู่อีกฟากหนึ่งของท้องทะเล...”","ฟูล่าเดินตามธีโอดอร์และคนอื่นๆ ลงมาจากเรือเหาะ พร้อมกับมองไปรอบๆ อย่างไม่หยุดหย่อน","ทุกสิ่งที่ปรากฏอยู่ในเมืองท่าแห่งนี้ล้วนเป็นสิ่งแปลกใหม่สำหรับฟูล่า ซึ่งมันแตกต่างอย่างสิ้นเชิงจากเมืองใดๆ ในอาณาจักรฮัดลาตา แม้แต่เมืองหลวงที่เจริญรุ่งเรืองที่สุดก็ยังไม่อาจเทียบชั้นได้","อันที่จริงแล้ว นอกเหนือจากใจกลางเมือง พื้นที่ทั้งหมดของเมืองหลวงล้วนสกปรกและยุ่งเหยิง อีกทั้งมักจะมีกลิ่นเหม็นที่ไม่พึงประสงค์ลอยคละคลุ้งอยู่เสมอ","หลังจากใช้ชีวิตอยู่ที่นั่นมาเป็นเวลานาน ฟูล่าก็ไม่ได้คิดว่ามันมีอะไรผิดปกติ ทว่าหลังจากมาถึงอิเยตา นางถึงได้ตระหนักว่าเมืองเมืองหนึ่งสามารถสะอาดและเป็นระเบียบเรียบร้อยได้ถึงเพียงนี้","และเพียงชั่วครู่เดียว นางก็เห็นเรือเหาะเจ็ดลำบินอยู่เหนือเมืองแล้ว นอกเหนือจากรถม้าธรรมดาที่สัญจรไปมาบนท้องถนน ยังมีกล่องเหล็กรูปร่างแปลกประหลาด ซึ่งสามารถเคลื่อนที่ไปได้อย่างรวดเร็วโดยไม่ต้องอาศัยอูฐหรือม้ามาลากจูง","จากปล่องควันของโรงงานที่อยู่ไกลออกไป มีควันสีขาวพ่นออกมาเป็นจังหวะ ‘ฉึก-ฉัก’ ซึ่งเป็นสิ่งที่ไม่สามารถพบเห็นได้เลยในอาณาจักรฮัดลาตา","“นั่นมันอะไรกัน? ช่างเป็นเรือที่ลำใหญ่โตอะไรเช่นนี้?!”","สายตาของแอนโธนีจับจ้องไปยังเรือขนาดมหึมาที่จอดเทียบท่าอยู่บนทะเล","ความสูงของเรือลำยักษ์นี้สูงถึง 50 เมตร และมีความยาวมากกว่า 100 เมตร บนทั้งสองด้านของตัวเรือมีปืนใหญ่หน้าตาน่าเกรงขามเรียงรายอยู่เป็นแถว มันจอดตระหง่านอยู่บนท่าเรืออย่างโดดเด่นสะดุดตา ราวกับเป็นเกาะที่สามารถเคลื่อนที่ได้","“นี่คือเรือรบที่กำลังอยู่ระหว่างการก่อสร้าง ซึ่งทั้งหมดสร้างขึ้นจากเหล็กกล้า!”","ธีโอดอร์แนะนำให้ทุกคนรู้จักอย่างภาคภูมิใจ แม้ว่าเขาจะไม่ได้กลับมาที่อิเยตาเป็นเวลานานแล้ว แต่ก็มีโครงร่างทั่วไปของเรือรบลำนี้อยู่ก่อนที่เขาจะจากไป ดังนั้นเขาจึงไม่รู้สึกแปลกใจแต่อย่างใด","“เรือที่ทำจากเหล็กกล้าสามารถลอยน้ำได้ด้วยหรือ?”","แฮมม์ถามด้วยความประหลาดใจ","แม้แต่แอนโธนีก็ยังรู้สึกสนใจเป็นอย่างมาก หรือว่าจะมีใครร่ายเวทมนตร์อันทรงพลังบางอย่างใส่เรือเหล็กยักษ์ลำนี้? แต่เรือลำใหญ่ขนาดนี้มีน้ำหนักหลายร้อยตัน มันจะไม่กินพลังเวทจนไม่อาจประเมินได้เลยงั้นหรือ","“แน่นอนสิ!”","ธีโอดอร์เอ่ยอย่างภาคภูมิใจ","“ท่านศาสตราจารย์กล่าวว่า เหตุผลที่วัตถุลอยอยู่บนน้ำได้นั้น เป็นเพราะแรงโน้มถ่วงที่มันได้รับมีค่าน้อยกว่าแรงพยุงของน้ำ...”","ด้วยความรู้ที่เขาได้เรียนมาจากลินน์ ธีโอดอร์จึงอธิบายทฤษฎีบทของกลศาสตร์ให้ทุกคนที่อยู่ตรงหน้าฟัง—วัตถุที่จมอยู่ในของไหลสถิตจะได้รับแรงพยุงซึ่งมีค่าเท่ากับน้ำหนักของของไหลที่ถูกแทนที่ด้วยวัตถุนั้น","ดังนั้น เพียงแค่ใช้สูตรคำนวณความหนาแน่นโดยนำมวลมาหารด้วยปริมาตร ตราบใดที่มันมีค่าน้อยกว่าน้ำ มันก็จะสามารถลอยน้ำได้อย่างเป็นธรรมชาติ ยกตัวอย่างเช่น เรือรบเหล็กกล้าของพวกเขามีห้องโดยสารกลวงอยู่ที่ด้านล่าง ดังนั้นส่วนที่จมลงไปในน้ำจึงมีความหนาแน่นโดยรวมน้อยกว่าน้ำมาก","“ตราบใดที่เป็นไปตามเงื่อนไขนี้ ไม่ว่าสิ่งใดก็สามารถลอยบนน้ำได้ ท่านศาสตราจารย์ลินน์ยังได้คิดค้นคำศัพท์ใหม่ขึ้นมา เรียกว่า ระวางขับน้ำ! มันคือปริมาณน้ำที่เรือเข้าไปแทนที่ในน้ำ...”","ธีโอดอร์แนะนำอย่างฉะฉาน","“จะมีการสร้างเรือแบบนี้เพิ่มขึ้นอีกหลายลำ และเมื่อถึงเวลานั้น การออกเรือเพียงครั้งเดียวก็จะสามารถนำปลาทะเลกลับมาได้มากพอให้ผู้คนนับหมื่นกินไปได้ตลอดทั้งสัปดาห์!”","ตกปลาเนี่ยนะ?!","ทุกคนที่อยู่ตรงหน้าถึงกับตอบสนองไม่ทัน พวกเขาเพิ่งจะฟังธีโอดอร์โอ้อวดว่าเรือเหล็กยักษ์ลำนี้ทรงพลังเพียงใด แต่ตอนนี้กลับมาบอกพวกเขาว่าเจ้าสิ่งนี้มีไว้เพื่อใช้ตกปลา มันช่างเป็นเรื่องยากที่จะทำใจยอมรับได้ชั่วขณะ","ธีโอดอร์เบ้ปาก อันที่จริงแล้ว เขาก็รู้สึกเหมือนกันว่านี่มันเป็นการทำอะไรที่เกินกว่าเหตุไปสักหน่อย แต่ท่านศาสตราจารย์ลินน์กลับไม่คิดเช่นนั้นอย่างเห็นได้ชัด","ตามความเห็นของลินน์ ในเมื่อทุกสิ่งถูกสร้างขึ้นมาแล้ว จะปล่อยให้มันว่างเปล่าในช่วงที่ไม่มีสงครามไม่ได้ การตกปลาไม่เพียงแต่สร้างผลประโยชน์ และช่วยปรับปรุงเมนูอาหารของเมืองเท่านั้น แต่บางทีอาจจะได้ยิงสัตว์ทะเลเพิ่มอีกสักสองสามตัว เพื่อให้เหล่าพลปืนได้ฝึกฝนความแม่นยำของพวกเขาด้วย","เรย์เดลไม่ได้จับจ้องสายตาไปที่เรือหุ้มเกราะอันสง่างามเหมือนฟูล่าและค
