้ว!","มีเพียงเรือรบใบชักสามลำที่อยู่ไกลออกไปหน่อยเท่านั้นที่โชคดีรอดมาได้ แต่ในวินาทีต่อมา พวกมันก็ถูกเล็งเป้าด้วยปืนใหญ่หลายกระบอก โดยปืนใหญ่คริสตัลเวทมนตร์ที่เงียบสงบมานานก็เริ่มสะสมพลัง และเพียงแค่การระดมยิงพร้อมกันหนึ่งระลอก เรือ ‘ผู้โชคดี’ เหล่านั้นก็ถูกระเบิดจนขาดสะบั้น...","หลังจากควันปืนจางหายไป บนผิวน้ำก็เต็มไปด้วยซากปรักหักพังและคราบเลือดที่ไหลนอง","หลังจากทำลายเรือศัตรูที่ขวางทางไปได้สิบกว่าลำ เส้นทางข้างหน้าก็เปิดโล่ง แต่การเสียสละของกองกำลังด้านข้างกลุ่มนี้ก็ไม่ได้สูญเปล่า เพราะกองเรือหลักของจักรวรรดิได้เคลื่อนเข้ามาใกล้ในระยะไม่ถึงร้อยเมตรแล้ว","ออโรร่าสัมผัสได้อย่างฉับไวถึงความผันผวนของพลังงานที่น่าสะพรึงกลัวจากด้านหลัง...นี่คือพลังศักดิ์สิทธิ์ระดับตำนาน!","บนเรือธงใบชักขนาดยักษ์ โยชัวผู้เป็นประธานผู้พิพากษายกคทาในมือขึ้น เสียงอันกึกก้องของเขาดังกังวานไปทั่วทั้งน่านน้ำ!","“พระเจ้าประทานสายฝนและน้ำค้าง หยาดหยดรวมกันเป็นสายน้ำ แม่น้ำและมหาสมุทรล้วนเป็นสิ่งที่พระเจ้าสร้างขึ้น ความชั่วร้ายที่เหยียบย่างเข้ามา ณ ที่แห่งนี้ จะต้องพินาศลง!”","ทันทีที่สิ้นเสียงของโยชัว ผิวน้ำทะเลที่กำลังปั่นป่วนจากการถูกปืนใหญ่ระดมยิง ก็ถูกยกตัวสูงขึ้น!","คลื่นยักษ์ที่สูงหลายสิบเมตรก่อตัวขึ้นบนผิวน้ำ มันม้วนตัวและถาโถมเข้ามาด้วยพลังที่สามารถทำลายล้างทุกสิ่ง หวังจะกวาดล้างกองเรือทั้งหมดให้สิ้นซากในคราวเดียว!","พลังศักดิ์สิทธิ์ระดับตำนานอันน่าสะพรึงกลัว ทำให้สีหน้าของบรรดาพ่อมดในกองเรือเปลี่ยนไปอย่างเห็นได้ชัด แต่พวกเขาก็รีบร่วมมือกันต่อต้านอย่างรวดเร็ว","‘อาณาเขตน้ำแข็ง’","จอมเวทผู้ยิ่งใหญ่หกคน พร้อมด้วยพ่อมดเต็มตัวอีกกว่าร้อยคนร่ายเวทมนตร์พร้อมกัน คลื่นยักษ์ที่กำลังโหมกระหน่ำถูกแช่แข็งด้วยความเร็วที่มองเห็นได้ด้วยตาเปล่า เกลียวคลื่นที่กระเซ็นขึ้นมาถูกหยุดนิ่ง กลายเป็นกำแพงน้ำแข็งขนาดยักษ์ขวางกั้นระหว่างกองเรือทั้งสองฝั่ง","ลำแสงเลเซอร์อันรุนแรงปรากฏขึ้นอีกครั้ง ลำแสงที่มีเส้นผ่านศูนย์กลางเพียง 0.05 มิลลิเมตร ตัดผ่านกำแพงน้ำแข็งอันแข็งแกร่ง และพุ่งตรงไปยังเรือธงของจักรวรรดิที่อยู่ด้านหลัง","ความเร็วของแสงนั้นรวดเร็วจนยากจะจินตนาการ แต่เมื่อต้องผ่านการขัดขวางและการหักเหของน้ำแข็ง พลังทำลายของมันก็ลดลงไปมาก หลังจากเจาะทะลุม่านพลังศักดิ์สิทธิ์เข้าไปได้ มันก็ทำได้เพียงแค่กรีดเป็นรอยทางยาวบนตัวเรือธงเท่านั้น...","น้ำทะเลไหลทะลักเข้ามาอย่างต่อเนื่อง เรือรบใบชักเริ่มโคลงเคลงไปมา","บนใบหน้าของโยชัวปรากฏร่องรอยของความโกรธแค้น คทาในมือเปล่งประกายแสงศักดิ์สิทธิ์ออกมา แต่ในวินาทีต่อมา เขาก็เหมือนจะสัมผัสได้ถึงอะไรบางอย่าง จึงเงยหน้าขึ้นมองท้องฟ้าที่เต็มไปด้วยหมอก","เรือเหาะขนาดใหญ่ห้าสิบลำปรากฏขึ้นบนท้องฟ้าไกลๆ และกำลังมุ่งหน้ามาทางนี้ด้วยความเร็วสูง","“นั่นมันสิ่งประดิษฐ์เล่นแร่แปรธาตุของพวกพ่อมด”","ซิริดเอ่ยขึ้นด้วยสีหน้าเคร่งเครียด","ตามรายงานของสายลับที่แฝงตัวอยู่ในอาณาจักร เจ้านี่แหละที่เรียกว่าเรือเหาะ ซึ่งเคยทำลายกองกำลังปราบปรามของอาณาจักรนับหมื่นคนมาแล้ว","โยชัวจ้องมองเรือเหาะที่กำลังเคลื่อนเข้ามาใกล้ ก่อนจะถอนหายใจออกมาในที่สุด แล้วเอ่ยขึ้น","“ถ่ายทอดคำสั่งลงไป ถอยทัพ!”","ด้วยการเสริมทัพจากกองกำลังทางอากาศเหล่านี้ หากพวกเขาดึงดันที่จะบุกขึ้นฝั่งที่ดินแดนพ่อมด พวกเขาจะต้องเผชิญกับความสูญเสียอย่างหนักหนาสาหัสแน่นอน","ต่อให้เป็นเขาเอง ก็ต้องยอมรับว่าพวกพ่อมดเหล่านี้ มีความได้เปรียบในการรบทางทะเลอย่างไม่มีใครเทียบได้จริงๆ"]},{"n":383,"t":"วิธีรับมือการอัญเชิญเทพ!","c":["ด้วยการอาศัยกำแพงน้ำแข็งที่ขวางกั้น กองเรือของจักรวรรดิก็เริ่มหันหัวเรือกลับเพื่อถอนกำลัง และเพื่อป้องกันการถูกไล่ตาม โยชัวยังได้สร้างพายุทอร์นาโดที่สูงหลายสิบเมตรพัดโหมกระหน่ำ เพื่อตัดขาดกองเรือทั้งสองออกจากกันอย่างสิ้นเชิง ก่อนจะแล่นหายเข้าไปในส่วนลึกของทะเลที่เต็มไปด้วยหมอกอย่างใจเย็น...","ทางด้านของออโรร่าและคนอื่นๆ ก็สามารถรวมกลุ่มกับกองกำลังเสริมที่ตามมาสมทบได้สำเร็จ","หลังจากที่ทั้งสองฝ่ายได้ตรวจสอบและแลกเปลี่ยนข้อมูลกัน ออโรร่าถึงทราบว่าสงครามที่เมืองหลวงนั้นสิ้นสุดลงแล้ว แถมการต่อสู้ยังดุเดือดและอันตรายเป็นอย่างมาก พระคาร์ดินัลในรายงานข่าวกรองคนนั้น กลับมีพลังระดับตำนาน และเกือบจะอัญเชิญตัวตนระดับนั้นลงมาได้สำเร็จ","“ดูเหมือนว่าการคาดการณ์ของข้าจะผิดพลาดไปหน่อย”","ออโรร่าขมวดคิ้ว","ตามที่นางคาดเดาไว้ก่อนหน้านี้ ในเมื่อศาสนจักรตัดสินใจส่งกองเรือออกเดินทางไกลเพื่อมาโจมตีดินแดนพ่อมด การโจมตีฝั่งอาณาจักรก็มีความเป็นไปได้สูงว่าจะเป็นแค่การสับขาหลอกเท่านั้น","ไม่คิดเลยว่าศาสนจักรจะทุ่มสุดตัว และมีแผนที่จะเล่นงานทั้งสองฝั่งพร้อมกัน โดยกอบกู้อาณาจักรคืนมาพร้อมกับกวาดล้างดินแดนพ่อมดให้สิ้นซากในคราวเดียว!","น่าเสียดายที่พวกเขาไม่มีระบบสื่อสารที่สามารถส่งข่าวสารแบบเรียลไทม์ข้ามทะเลหมอกอันกว้างใหญ่นี้ได้ กองเรือที่นางส่งกลับไป น่าจะสวนทางกับแฮร์รอฟและวิกตอริโอที่กำลังมุ่งหน้าไปช่วยเหลือเมืองหลวงพอดี","“ท่านออโรร่า พวกเราจะไล่ตามไปอีกไหมครับ?”","ทิครีบเอ่ยถามขึ้น ในเมื่อตอนนี้มีเรือเหาะมาสมทบแล้ว พวกเขาก็กลับมาเป็นฝ่ายคุมเกมอีกครั้ง โดยสามารถร่วมมือกันทั้งทางน้ำและทางอากาศ เพื่อจมกองเรือของจักรวรรดิให้จมอยู่ใต้ทะเลแห่งนี้ได้อย่างราบคาบ","นี่เป็นข้อเสนอที่เย้ายวนใจมาก แต่ออโรร่าก็ส่ายหน้าปฏิเสธหลังจากครุ่นคิดอยู่ครู่หนึ่ง","“ไม่ล่ะ แค่จัดเตรียมคนไว้สะกดรอยตามพวกมันก็พอ ถ้าพวกมันมีทีท่าว่าจะบุกกลับมาอีกเมื่อไหร่ เราค่อยลงมือโจมตี!”","หลังจากทำสงครามทางทะเลมาเกือบทั้งวัน กระสุนปืนใหญ่ของกองเรือก็ร่อยหรอจนแทบจะไม่เหลือแล้ว","ส่วนเรือเหาะที่ตามมาสมทบพวกนั้นก็อยู่ในสภาพเดียวกัน พวกเขาเพิ่งจะผ่านการต่อสู้ครั้งใหญ่มาหมาดๆ และยังไม่ทันได้พักฟื้นเลยด้วยซ้ำ ก็ต้องรีบรุดมาที่นี่อย่างเร่งด่วน แถมระเบิดเพลิงที่พกมาก็คงมีไม่พอที่จะใช้รับมือกับสงครามใหญ่อีกครั้งแน่","แต่สิ่งที่สำคัญที่สุดก็คือ นางกังวลว่านักบวชระดับตำนานบนเรือของจักรวรรดิ หากถูกต้อนให้จนมุม อาจจะทำเหมือนกับเอ็ดเวล ที่อัญเชิญเทพองค์นั้นลงมาประทับร่าง","ถ้าเป็นแบบนั้นคงรับมือยากแน่ๆ...","แต่ในเมื่อตอนสู้กัน อีกฝ่ายไม่ได้บุ่มบ่ามใช้มันออกมา นั่นก็หมายความว่าการร่ายเวทศักดิ์สิทธิ์บทนั้น อย่างน้อยก็ต้องจ่ายค่าตอบแทนที่หนักหนาสาหัสยิ่งกว่าการสูญเสียกองเรือไปหนึ่งในสามเสียอีก!","...","เมื่อออโรร่านำกองเรือกลับมาถึงเมืองหลวง เวลาล่วงเลยไปหลายวันแล้ว","ภายในเมืองหลวงยังคงอบอวลไปด้วยกลิ่นควันดินปืน และสามารถมองเห็นร่องรอยความเสียหายได้ในทุกที่ โดยเฉพาะในย่านสลัมที่เคยถูกใช้เป็นสมรภูมิรบนั้นได้รับความเสียหายอย่างหนัก และจำนวนผู้บาดเจ็บล้มตายก็ไม่ใช่ตัวเลขน้อยๆ เลย","ลินน์มองเห็นว่านี่เป็นโอกาสที่ดีเยี่ยม จึงสั่งให้ส่งบุคลากรทั้งหมดที่ไม่เกี่ยวข้องกับการรักษาความปลอดภัย ออกไปช่วยเหลือประชาชนที่ได้รับผลกระทบเหล่านั้นทันที","แม้แต่พ่อมดก็ไม่มีข้อยกเว้น แม้ว่าพวกเขาจะไม่ได้ให้ความสำคัญกับพวกชาวบ้านในสลัมมากนัก แต่ด้วยความศรัทธาในตัวของดาวรุ่งแห่งเวทมนตร์อย่างลินน์ พวกเขาก็พร้อมที่จะทำตามอย่างว่าง่าย","ตอนนี้ทั่วทั้งเมืองหลวงต่างโจษจันกันว่า ดาวรุ่งแห่งเวทมนตร์ผู้นี้ และประธานสภาทั้งสองท่าน เป็นผู้ขับไล่เทพที่จุติลงมาในเมืองหลวงออกไป","จนถึงขั้นมีคนคาดเดาว่า ลินน์อาจจะก้าวข้ามไปสู่ระดับตำนานแล้ว ไม่อย่างนั้นเขาจะสามารถเข้าไปแทรกแซงการต่อสู้ในระดับนั้นได้อย่างไร","แต่ข้อสันนิษฐานนี้ดูจะเกินจริงไปสักหน่อย เพราะตามที่พวกเขาจำได้ ดาวรุ่งแห่งเวทมนตร์ผู้นี้เพิ่งจะก้าวขึ้นเป็นพ่อมดสี่วงแหวนเมื่อไม่กี่เดือนก่อนเอง พ่อมดส่วนใหญ่จึงได้แต่เยาะเย้ยข่าวลือที่ว่านี้","เพราะมีข่าววงในบอกว่า หลังจากการต่อสู้ครั้งนั้น ท่านลินน์ได้รับบาดเจ็บไม่น้อยเลยทีเดียว ส่วนราฟาเอลที่อยู่ในเหตุการณ์ด้วยก็ได้รับบาดเจ็บสาหัส ถึงขั้นต้องนอนพักฟื้นอยู่บนเตียงตั้งหลายวัน","ดังนั้น ความเป็นจริงก็น่าจะเป็น ประธานสภาทั้งสองท่าน เป็นคนรับหน้าที่ต่อสู้ พร้อมกับปกป้องพวกเขาทั้งสองคนไปด้วยมากกว่า...","แต่ไม่ว่าความจริงจะเป็นอย่างไร พวกพ่อมดก็ยังคงปฏิบัติตามคำสั่งที่ได้รับมอบหมายอย่างเคร่งครัด พวกเขาใช้เวทมนตร์ในการซ่อมแซมถนนหนทางและบ้านเรือนที่เสียหาย เพียงแค่ห้าวัน งานบูรณะซ่อมแซมก็เสร็จสิ้นไปแล้วกว่าครึ่ง ความเร็วในการทำงานของพวกเขาถือว่าเร็วติดปีกเลยทีเดียว...","สำหรับประชาชนในสลัมของเมืองหลวง ก็ไม่ได้ถูกความศรัทธากัดกินจนหมดหนทางเยียวยากันทุกคน หลังจากได้รับการช่วยเหลืออย่างเต็มที่ถึงสองครั้งติดต่อกัน คนส่วนใหญ่ก็เริ่มตระหนักได้ว่า ต้นเหตุของความเสียหายทั้งหมด คือสิ่งที่เรียกตัวเองว่าผู้ส่งสารจากพระเจ้า แต่คนที่มาช่วยซ่อมแซมบ้านให้พวกเขา กลับเป็นคนที่ถูกตราหน้าว่าเป็น ‘ลูกสมุนของเทพนอกรีตและปีศาจร้าย’ ซะอย่างนั้น!","ในฐานะที่เป็นหนึ่งในชาวสลัม ไฮเดนยิ่งเชื่อมั่นในความคิดของตัวเองมากขึ้น ว่าพวกพ่อมดไม่ได้น่ากลัวเหมือนที่ศาสนจักรโฆษณาชวนเชื่อเอาไว้","ถ้าสลับบทบาทกัน ไฮเดนคิดว่าพวกนักบวชและพวกขุนนางของศาสนจักร ไม่มีทางที่จะยอมควักกระเป๋า หรือใช้พลังศักดิ์สิทธิ์มาช่วยซ่อมแซมบ้านพังๆ ให้พวกเขาแบบนี้แน่นอน!","...","ข่าวลือที่แพร่กระจายไปทั่วเมืองหลวง รวมถึงการเปลี่ยนแปลงทางความคิดของชาวสลัมนั้น ลินน์ก็ไม่มีเวลาว่างพอที่จะมาใส่ใจเรื่องพวกนี้หรอก","หลังจากสงครามสิ้นสุดลง ก็มีเรื่องจุกจิกมากมายที่ต้องจัดการ แม้แต่ผู้ป่วยอย่างลินน์ก็ต้องฝืนลุกขึ้นมาทำงาน และหลังจากที่ออโรร่าและคนอื่นๆ เดินทางกลับมาถึงเมืองหลวงอย่างปลอดภัย สภาก็ได้เรียกประชุมภายในขึ้นทันที","ถึงแม้ว่าก่อนที่พวกนางจะมาถึง เรือเหาะที่กลับมาก่อนหน้านี้ จะได้รายงานเรื่องราวที่เกิดขึ้นในทะเลหมอกไปบ้างแล้ว แต่พวกเขาก็ยังไม่ทราบรายละเอียดที่แน่ชัด","ดังนั้น ออโรร่าจึงเป็นคนเล่าเรื่องราวทั้งหมดตั้งแต่ต้นจนจบให้พวกเขาฟังด้วยตัวเอง","“ไม่คิดเลยว่าศาสนจักรจะมีวิธีระบุตำแหน่งของดินแดนพ่อมดได้แล้ว!”","ราฟาเอลกล่าวด้วยความหวาดกลัว แม้ใบหน้าของเขาจะยังคงซีดเซียวเหมือนคนป่วย","หลังจากพักฟื้นมาห้าวัน ราฟาเอลก็รอดพ้นจากสภาวะครึ่งเป็นครึ่งตายมาได้อย่างหวุดหวิด อย่างน้อยเขาก็ต้องใช้เวลาอีกครึ่งเดือนกว่าจะฟื้นตัวได้อย่างสมบูรณ์","อันที่จริง การที่เขารอดชีวิตมาได้จากการโจมตีของเทพเจ้าโดยตรง ก็ถือเป็นความโชคดีอย่างมหาศาลแล้ว!","เหล่าพ่อมดที่มาร่วมประชุม เมื่อได้ฟังเรื่องราวจากออโรร่า ก็รู้สึกหวาดหวั่นไม่แพ้กัน","ในตอนนี้ การป้องกันของดินแดนพ่อมดถือว่าหละหลวมมาก กองกำลังระดับสูงที่คอยคุ้มกันมีไม่ถึงหนึ่งในสี่ของเมื่อก่อนด้วยซ้ำ โดยจอมเวทผู้ยิ่งใหญ่สามสิบคนก็เหลืออยู่แค่เก้าคน ส่วนแฮร์รอฟ วิกตอริโอ และออโรร่าที่เป็นประธานสภาก็ต่างพากันมาสนับสนุนอาณาจักรกันหมด","มีเพียง ผู้ควบคุมธาตุ อัลท็อก ซึ่งเป็นประธานสภาเพียงคนเดียวเท่านั้นที่ยังคงประจำการอยู่ที่ดินแดนพ่อมด","แต่ราฟาเอลและคนอื่นๆ ต่างก็รู้ดีว่า ประธานสภาท่านนี้ค่อนข้างจะมีสติฟั่นเฟือน การจะคาดหวังให้เขาเป็นผู้นำในการจัดกำลังคนเพื่อป้องกันการโจมตี ดูจะไม่ใช่ความคิดที่เข้าท่าเท่าไหร่นัก","“เจ้าตัดสินใจถูกแล้ว เมื่อเทียบกับทางฝั่งอาณาจักร การถ่วงเวลาและกักขังกองเรือรบนั้นไว้กลางทะเลถือเป็นเรื่องที่สำคัญกว่าจริงๆ!”","แฮร์รอฟพยักหน้าเห็นด้วย พวกเขาไม่อาจแบกรับความสูญเสียหากต้องเสียดินแดนพ่อมดไปได้","“เรื่องการสื่อสารคือสิ่งที่เราต้องรีบจัดการให้เร็วที่สุด เพื่อป้องกันไม่ให้เกิดเหตุการณ์ทำนองนี้ซ้ำรอยเดิมอีก...”","วิกตอริโอเอ่ยเสริม การพึ่งพาเพียงแค่เรือและเรือเหาะในการส่งสารนั้นช้าเกินไป และค่ายกลเวทมนตร์สื่อสารที่มีอยู่ในปัจจุบัน ก็ไม่มีประสิทธิภาพพอที่จะส่งสัญญาณได้ไกลขนาดนั้น","ทุกคนในที่ประชุมต่างก็เริ่มถกเถียงกันถึงเรื่องการพัฒนาเวทมนตร์สื่อสารรูปแบบใหม่ แต่ผ่านไปไม่นาน หัวข้อสนทนาก็เปลี่ยนกลับมาที่เรื่องสำคัญยิ่งกว่า นั่นก็คือ จะรับมือกับการอัญเชิญเทพอันน่าสะพรึงกลัวของศาสนจักรได้อย่างไร!"]},{"n":384,"t":"การอัญเชิญเทพที่ต้องแลกด้วยระดับตำนาน!","c":["“แฮร์รอฟ พวกเจ้าเคยเผชิญหน้ากับเทพองค์นั้นมาแล้ว น่าจะพอรู้เรื่องของนางมาบ้างกระมัง...”","ออโรร่าหันไปมองประธานสภาทั้งสองท่าน และเอ่ยถามขึ้น","แฮร์รอฟและวิกตอริโอมองหน้ากัน ก่อนจะส่ายหน้าและถอนหายใจออกมา","“พูดได้คำเดียวว่า ช่องว่างระหว่างพลังนั้น ห่างชั้นกว่าที่เจ้าคิดไว้มาก!”","“หรือว่าต่อให้พวกเจ้าร่วมมือกัน ก็ยังไม่สามารถดึงความสนใจของนางไว้ได้เลยงั้นหรือ?”","ออโรร่าขมวดคิ้วถามด้วยความไม่เข้าใจ","“อันที่จริงแล้ว การอัญเชิญเทพของเอ็ดเวลนั้นยังไม่สมบูรณ์ พวกเราก็แค่ได้เผชิญหน้ากับสิ่งที่ถูกเรียกว่าเทพองค์นั้นเพียงชั่วครู่เท่านั้น”","แฮร์รอฟเอ่ยขึ้นอย่างจนใจ","“นางใช้พลังศักดิ์สิทธิ์เพียงแค่บทเดียวตั้งแต่ต้นจนจบ...ถึงแม้ข้าจะฝืนป้องกันเอาไว้ได้ แต่ก็ไม่มีความมั่นใจเลยว่าจะสามารถทำลายพลังศักดิ์สิทธิ์บทนั้นได้!”","วิกตอริโอเอ่ยเสริม","“ที่จริงแล้ว ถ้าลินน์ไม่ได้ลอบโจมตีสังหารเอ็ดเวลที่เป็นผู้ร่าย พวกเราทุกคนก็คงต้องตายกันอยู่ที่นั่นแน่ๆ!”","เมื่อพูดถึงตรงนี้ วิกตอริโอก็หยุดชะงักไปครู่หนึ่ง พลางนึกย้อนไปถึงพลังศักดิ์สิทธิ์อันทรงพลังที่ราวกับจะหยุดห้วงเวลาและมิติได้ ซึ่งมันสามารถทำลายเวทมนตร์ของพวกเขาได้ในพริบตา แม้แต่ ‘เพลิงอมตะ’ อันทรงพลังและแปลกประหลาดที่ลินน์ครอบครอง ก็ยังไม่เว้น","เมื่อได้ยินดังนั้น บรรดาพ่อมดที่อยู่ในที่ประชุมต่างก็ตกตะลึงไปตามๆ กัน","เกี่ยวกับมหาสงครามในเมืองหลวงนั้น ประธานสภาทั้งสองท่าน ท่านลินน์ และท่านราฟาเอล ต่างก็ปิดปากเงียบมาโดยตลอด พวกเขาจึงรับรู้เรื่องราวเบื้องลึกเบื้องหลังได้เพียงเล็กน้อยจากคำบอกเล่าของเพียร์ซและคนอื่นๆ","ดังนั้น พวกเขาจึงคิดมาตลอดว่าเป็นประธานสภาทั้งสองท่านที่เป็นคนเอาชนะเทพที่ควบคุมศาสนจักร และขับไล่อีกฝ่ายออกไปได้สำเร็จ","แต่ไม่คิดเลยว่าความเป็นจริง จะแตกต่างจากที่พวกเขาคิดไว้ราวฟ้ากับเหว","ถ้าแม้แต่ประธานสภาร่วมมือกันยังไม่มีหวังที่จะเอาชนะได้ หากครั้งหน้าอีกฝ่ายใช้การอัญเชิญเทพแบบนี้อีก พวกเขาจะมิกลายเป็นเพียงลูกแกะที่รอวันถูกเชือดหรอกหรือ?","เมื่อคิดได้เช่นนี้ ซานเชซและคนอื่นๆ ก็เกิดความวิตกกังวลขึ้นมาทันที เสียงพูดคุยเซ็งแซ่ดังระงมไปทั่วทั้งห้องประชุม","ถึงขั้นมีบางคนเสนอว่า พวกเขาควรถอนกำลังออกจากอาณาจักรฮัดลาตาทันที แล้วกลับไปตั้งรับที่ดินแดนพ่อมด จากนั้นค่อยหาวิธีซ่อมแซมค่ายกลป้องกันของทะเลหมอก","ข้อเสนอนี้ได้รับการสนับสนุนจากพ่อมดเกือบครึ่งหนึ่งในทันที ในเมื่อพลังของเทพเอลล่านั้น แข็งแกร่งเกินกว่าที่พวกเขาจะคาดเดาได้ และมองไม่เห็นหนทางที่จะเอาชนะได้เลย การกลับไปกบดานอยู่ที่ดินแดนพ่อมดเหมือนเมื่อก่อน ก็ไม่ใช่เรื่องเลวร้ายอะไร","เมื่อเห็นว่าข้อเสนอของ ‘กลุ่มคนขี้ขลาด’ เริ่มมีคนเห็นด้วยมากขึ้นเรื่อยๆ ลินน์ก็ทนดูต่อไปไม่ไหว จึงต้องเอ่ยเตือนสติขึ้นมา","“พวกท่านอย่าลืมสิ ครั้งนี้ศาสนจักรได้ส่งกองเรือมาที่ทะเลหมอก นั่นก็แสดงว่าพวกมันน่าจะหาวิธีระบุตำแหน่งของดินแดนพ่อมดได้แล้ว หากตอนนี้เรามัวแต่คิดจะกลับไปตั้งรับ ก็เท่ากับนั่งรอความตายเท่านั้น!”","พื้นที่ของดินแดนพ่อมดนั้นเล็กเกินไป แถมมีประชากรเพียงหกแสนคน และยังขาดแคลนทรัพยากรในหลายๆ ด้าน การปิดประเทศแบบที่ผ่านมาย่อมเป็นอุปสรรคต่อการพัฒนาอุตสาหกรรมอย่างมาก","แถมพวกเขายังทุ่มเททั้งเวลา แรงกาย และทรัพยากรจำนวนมหาศาลไปกับแผนการสร้างอาณาจักรเวทมนตร์อีกด้วย หากต้องล่าถอยกลับไปในตอนนี้ ก็คงขาดทุนย่อยยับแน่!","“แล้วท่านจะให้พวกเราทำยังไงล่ะ ท่านลินน์? ขนาดท่านร่วมมือกับประธานสภาทั้งสองท่าน ยังเอาชนะเทพองค์นั้นไม่ได้เลยไม่ใช่หรือ? อย่างน้อยถ้าอยู่ที่ดินแดนพ่อมด พวกเราก็ยังอาศัยความได้เปรียบทางภูมิศาสตร์ เพื่อสกัดกั้นกองกำลังปราบปรามของศาสนจักรกลางทะเลได้นะ”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งที่สนับสนุนกลุ่มคนขี้ขลาด เอ่ยขึ้นอย่างหัวเสีย","ทิคก็พยักหน้าเห็นด้วย ถ้ามีวิธีที่ดีกว่านี้ คงไม่มีใครอยากจะหดหัวกลับไปอย่างอับอายหรอก","ชัยชนะในสงครามทั้งสองครั้งนี้ แลกมาด้วยชีวิตของพ่อมดจำนวนไม่น้อย และพวกเขาก็ทุ่มเทกำลังไปไม่น้อยเช่นกัน...","“อย่างน้อยพวกเราทุกคนก็ยังมีชีวิตรอดมายืนอยู่ตรงนี้ได้ นั่นก็แสดงว่าสถานการณ์ยังไม่เลวร้ายถึงขั้นต้องล่าถอยหรอกครับ”","ลินน์เอ่ยด้วยสีหน้าเรียบเฉย ซึ่งสามารถดึงดูดความสนใจของทุกคนได้ในทันที","“ข้าคิดว่า ‘ประตูแห่งสรวงสวรรค์’ ไม่ใช่พลังศักดิ์สิทธิ์ที่จะนำมาใช้ได้ง่ายๆ ไม่อย่างนั้นตอนที่กองเรือของจักรวรรดิถูกโจมตีอย่างหนัก อีกฝ่ายก็น่าจะใช้การอัญเชิญเทพไปแล้ว...”","“จริงไหมครับ? ท่านออโรร่า?”","ลินน์หันไปถาม","ออโรร่าพยักหน้า ซึ่งสอดคล้องกับข้อสันนิษฐานของนางอย่างพอดิบพอดี","บรรดาพ่อมดในที่ประชุมต่างพากันตกอยู่ในความเงียบ เมื่อครู่นี้พวกเขาถูกคำพูดของประธานสภาทั้งสองท่านทำให้หวาดกลัวไปหน่อย ตอนนี้ถึงเพิ่งนึกขึ้นได้ว่า ศาสนจักรไม่น่าจะสามารถใช้การอัญเชิญเทพได้ตามอำเภอใจ","“ท่านวิกตอริโอ ท่านพอจะได้ข้อมูลที่มีประโยชน์จากความทรงจำของพระคาร์ดินัลที่ถูกจับตัวมาได้บ้างไหมครับ?”","ลินน์หันไปมองผู้รังสรรค์เวทมนตร์ที่อยู่ข้างๆ แล้วเอ่ยถามอย่างคาดหวัง","หลังจากสงครามในอาณาจักรสิ้นสุดลง พวกเขาจับเป็นนักบวชและบิชอปมาได้จำนวนไม่น้อย โดยคนที่ตำแหน่งสูงที่สุดก็คือ พระคาร์ดินัลพูลสัน ซึ่งก็น่าจะเป็นคนที่รู้ข้อมูลเหล่านี้มากที่สุด","เพียงแต่ด้วยเหตุผลด้านความศรัทธา การล้วงข้อมูลนี้จึงไม่ใช่เรื่องง่าย เพราะความทรงจำของพูลสันนั้นได้รับการปกป้องด้วยพลังศักดิ์สิทธิ์ที่แข็งแกร่ง การบุ่มบ่ามใช้เวทมนตร์พลังจิตวิญญาณตรวจสอบความทรงจำ อาจทำให้เกิดการสะท้อนกลับได้ ดังนั้น งานนี้จึงตกเป็นความรับผิดชอบของวิกตอริโอ","“จากการอนุมานความทรงจำของพูลสัน ข้าเกรงว่าการอัญเชิญเทพแบบนั้น คงต้องแลกมาด้วยชีวิตของคนระดับตำนานเลยล่ะ!”","วิกตอริโอเอ่ยขึ้นด้วยน้ำเสียงเคร่งขรึม","ในเวลาเพียงห้าวัน เขายังไม่สามารถถอดรหัสสมองของพูลสันได้ทั้งหมด แต่ก็ได้ข้อมูลที่มีประโยชน์มาไม่น้อย","เช่น ตลอดประวัติศาสตร์หลายร้อยปีของศาสนจักร มีบันทึกการใช้ ‘ประตูแห่งสรวงสวรรค์’ เพียงแค่หกครั้งเท่านั้น และผู้ร่ายทั้งหมด ล้วนเป็นนักบวชระดับตำนานทั้งสิ้น ซึ่งหลังจากสงครามสิ้นสุดลง คนเหล่านี้มักจะลาออกจากตำแหน่งและถอยไปอยู่เบื้องหลัง แถมอายุขัยยังสั้นลงอย่างเห็นได้ชัด โดยมีนักบุญคนหนึ่งถึงกับเสียชีวิตหลังจากนั้นเพียงไม่กี่ปี","เห็นได้ชัดว่า การจะรองรับพลังของเทพเจ้านั้นไม่ใช่เรื่องง่าย เพราะทันทีที่ใช้พลังศักดิ์สิทธิ์บทนี้ ไม่ว่าจะสำเร็จหรือล้มเหลว ศาสนจักรจะต้องสูญเสียกำลังรบระดับสูงสุดไปหนึ่งคนอย่างแน่นอน","นอกจากนี้ เขายังคาดเดาว่า ร่างจริงของเทพเอลา อาจจะอยู่ในมิติอื่น นั่นก็คือสิ่งที่เรียกว่าสรวงสวรรค์ และคงถูกจำกัดด้วยเงื่อนไขบางอย่าง ทำให้ไม่สามารถอยู่บนโลกมนุษย์ได้นานนัก...","วิกตอริโอเล่าข้อสันนิษฐานทั้งหมดของตนเองออกมา","เมื่อได้ยินเช่นนั้น ซานเชซและคนอื่นๆ ถึงค่อยถอนหายใจด้วยความโล่งอก อย่างน้อยพวกเขาก็ไม่ต้องคอยกังวลว่า ขณะที่กำลังนอนหลับอยู่ เทพองค์นั้นจะบินมาฆ่าพวกเขาทั้งหมด","หากไม่ถึงคราวคับขันจริงๆ คาดว่าคงไม่มีใครในระดับตำนาน จะยอมสละพลังและชีวิตของตัวเองง่ายๆ หรอก","ตามรายงานข่าวกรอง ในตอนนี้ศาสนจักรมีตัวตนระดับตำนานอยู่เพียงแค่ห้าคนเท่านั้น ส่วนเอ็ดเวลนั้นถือเป็นตัวแปรที่อยู่นอกเหนือความคาดหมาย","แต่กรณีแบบนี้น่าจะมีเพียงแค่คนเดียวเท่านั้น เพราะการจะก้าวขึ้นสู่ระดับตำนานได้นั้น ไม่ใช่เรื่องง่ายเลย","ต้องรู้ก่อนนะว่า ประธานสภาในปัจจุบันของดินแดนพ่อมด ล้วนแต่ต้องอาศัยเวลาในการสั่งสมประสบการณ์อย่างยาวนาน เพื่อยืดอายุขัยให้ยืนยาวขึ้น","แม้จอมเวทผู้ยิ่งใหญ่จะสามารถก้าวข้ามขีดจำกัดของร่างกายมนุษย์ และมีอายุขัยอยู่ได้ถึงประมาณสองร้อยปี แต่สำหรับพ่อมดระดับตำนาน จะสามารถมีชีวิตอยู่ได้นานแค่ไหนนั้น ก็ไม่มีใครทราบได้...","ยกตัวอย่างเช่น วิกตอริโอ ซึ่งเป็นประธานสภาที่อายุมากที่สุดในบรรดาประธานสภาทั้งหมด ก็ไม่มีใครรู้ว่าเขาอายุเท่าไหร่กันแน่ รู้เพียงแค่ว่าเขาอยู่ที่ดินแดนพ่อมดมานานกว่าสามร้อยปีแล้ว ซึ่งมีประสบการณ์ที่ลึกลับซับซ้อนมาก และมีข่าวลือว่า พรสวรรค์ของประธานสภาท่านนี้ ไม่ได้โดดเด่นอะไรเลย เขาเพิ่งจะบรรลุระดับตำนานตอนที่อายุร้อยแปดสิบกว่าปีเท่านั้น..."]},{"n":385,"t":"ในเมื่อไม่อาจเอาชนะศัตรูในระดับอะตอมได้ งั้นก็ลองระดับควอนตัมดู!","c":["จากการวิเคราะห์ของ ‘ผู้รังสรรค์เวทมนตร์’ วิกตอริโอ บรรดาสมาชิกสภาที่อยู่ในที่ประชุมต่างก็คลายความหวาดกลัวต่อการอัญเชิญเทพลงไปได้มาก ในเมื่อตอนนี้พวกเขายังไม่มีวิธีต่อกรกับเทพองค์นั้น งั้นก็ต้องหาวิธีหลีกเลี่ยงการปะทะกันซึ่งหน้าแทน","พวกเขาอาจจะใช้วิธีเดียวกับที่ท่านลินน์และประธานสภาทั้งสองท่านทำในครั้งนี้ นั่นก็คือพุ่งเป้าสังหารไปที่ผู้ร่าย เพื่อตัดกระแสพลังศักดิ์สิทธิ์ หรือไม่ก็ใช้วิธีลอบสังหาร เพื่อกำจัดผู้นำของกองทัพทัณฑ์ศักดิ์สิทธิ์ ประธานผู้พิพากษา และสมาชิกระดับสูงคนอื่นๆ ของศาสนจักรทีละคน...","ท่ามกลางเสียงพูดคุยปรึกษาหารืออย่างกระตือรือร้นของทุกคน ลินน์กลับไม่ได้มองโลกในแง่ดีขนาดนั้น","ต่อให้พยายามหลีกเลี่ยงมากแค่ไหน ท้ายที่สุดแล้ว เทพีองค์นั้นก็ยังคงเป็นศัตรูที่พวกเขาต้องเผชิญหน้าอยู่ดี","แถมพวกนักบวชของศาสนจักรก็ไม่สามารถใช้ตรรกะของคนทั่วไปมาตัดสินได้ พวกคลั่งศาสนาบางคนก็เหมือนกับคนเสียสติ ที่พร้อมจะสละทุกสิ่งทุกอย่างเพื่อพระเจ้า","บางทีในสายตาของคนพวกนั้น ความตายอาจจะเป็นแค่การกลับคืนสู่อ้อมกอดของพระเจ้าเร็วขึ้นก็เท่านั้น","ส่วนเรื่องที่จะเอาชนะเอลาได้อย่างไร ลินน์ก็พอจะมีแนวทางอยู่ในใจบ้างแล้ว","ในเมื่ออีกฝ่ายสามารถควบคุมอะตอมและโมเลกุลที่ถูกจำลองขึ้นจากเวทมนตร์และพลังศักดิ์สิทธิ์ได้อย่างแม่นยำ การจะเอาชนะอีกฝ่ายในระดับเดียวกันนั้น ย่อมเป็นเพียงความฝันลมๆ แล้งๆ","ความหวังเดียวของพวกเขา คือการแซงทางโค้ง โดยเจาะลึกลงไปในระดับควอนตัมที่เล็กยิ่งกว่า และอาศัยสิ่งนั้นเพื่อพัฒนาเวทมนตร์ที่สามารถสังหารเทพได้!","ขณะที่ลินน์กำลังครุ่นคิดอยู่นั้น จู่ๆ แฮร์รอฟที่อยู่ข้างๆ ก็เอ่ยถามขึ้น","“ลินน์ไม่ทราบว่า ‘สมาคมเวทมนตร์เร้นลับ’ มีความคิดเห็นอย่างไรกับสงครามระหว่างศาสนจักรและอาณาจักรในครั้งนี้บ้าง?”","เมื่อได้ยินเช่นนั้น เสียงพูดคุยในห้องประชุมก็เงียบลงทันที ราฟาเอลและคนอื่นๆ เพิ่งนึกขึ้นได้ว่า สงครามในครั้งนี้ ไม่ได้มีแค่สภาเวทมนตร์เท่านั้น แต่ยังมีสมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ เข้ามาเกี่ยวข้องด้วย","นี่ถือเป็นกำลังเสริมที่แข็งแกร่งมาก!","แม้พวกเขาจะไม่ค่อยรู้เรื่องราวเกี่ยวกับองค์กรเวทมนตร์อันลึกลับนี้มากนัก แต่ก็พอจะคาดเดาความน่าเกรงขามจากข้อมูลหลายๆ อย่างได้","อย่างเช่นสมาชิกของสมาคมเวทมนตร์เร้นลับไม่กี่คนที่พวกเขารู้จักในตอนนี้ ล้วนเป็นบุคคลที่โดดเด่นในหมู่พ่อมดทั้งสิ้น","โดยเฉพาะลินน์ คงไม่ต้องพูดถึง ไม่รู้ว่าพ่อมดระดับตำนานคนไหนของสมาคมเวทมนตร์เร้นลับเป็นคนสั่งสอน ถึงได้ทำให้เด็กหนุ่มที่อายุยังน้อยคนนี้ สามารถทะลวงขึ้นเป็นจอมเวทผู้ยิ่งใหญ่ได้ แถมยังมีความเชี่ยวชาญด้านคณิตศาสตร์ พลังสนามแม่เหล็ก ธาตุ และการเล่นแร่แปรธาตุอย่างหาตัวจับยาก","ในช่วงสองปีที่มาถึงดินแดนพ่อมด เขายังได้รับเหรียญตราโคโรนาหนึ่งเหรียญ และเหรียญตราจันทร์สีเงินอีกสองเหรียญ...จนกลายเป็นดาวรุ่งแห่งเวทมนตร์ที่ทุกคนจับตามอง!","หากไม่ติดตรงที่เขายังไม่ได้ตีพิมพ์บทความสำคัญใดๆ เกี่ยวกับการแปรสภาพและการปรุงยา พวกเขาคงคิดว่าท่านลินน์ผู้นี้เก่งกาจรอบด้านไปเสียทุกเรื่องแล้ว","นอกจากนี้ยังมีแอนโธนี่ จอมเวทผู้ยิ่งใหญ่หกวงแหวน ที่เป็นผู้คิดค้นเวทมนตร์สายฟ้าอันทรงพลังขึ้นมาด้วยตนเอง อาจเรียกได้ว่าเขาสามารถสร้างศาสตร์แขนงใหม่ขึ้นมาได้ด้วยตัวคนเดียว ทำให้พ่อมดเต็มตัวสามารถควบคุมพลังแห่งสายฟ้าได้...","คนสุดท้ายก็คือท่านไลบ์นิซ ผู้คิดค้นแคลคูลัส ข้อถกเถียงเรื่องการวิ่งแข่งของเต่าระหว่างเขากับท่านซีโน ได้แพร่สะพัดไปทั่วดินแดนพ่อมด และก่อให้เกิดกระแสการถกเถียงเกี่ยวกับเรื่องความเคลื่อนไหวและความสงบนิ่ง รวมถึงความจำกัดและความไร้ขีดจำกัด","ดังนั้น ในมุมมองของราฟาเอล สมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ ล้วนเป็นพ่อมดที่มีพรสวรรค์และเปี่ยมไปด้วยความรู้ ซึ่งในบรรดาคนเหล่านั้นก็น่าจะมีพ่อมดระดับตำนานรวมอยู่ด้วย หากพวกเขายินดีที่จะร่วมมือกับสภาเวทมนตร์อย่างจริงใจ โอกาสที่พวกเขาจะเอาชนะศาสนจักรก็ย่อมเพิ่มสูงขึ้นอย่างมาก","ภายใต้สายตาที่เต็มไปด้วยความคาดหวังของบรรดาสมาชิกสภา ลินน์จึงครุ่นคิดและเอ่ยขึ้นอย่างระมัดระวัง","“สำหรับสงครามกับศาสนจักรในครั้งนี้ ภายใน ‘สมาคมเวทมนตร์เร้นลับ’ ยังคงมีความคิดเห็นที่แตกต่างกันอยู่ค่อนข้างมาก แม้จะมีคนเห็นด้วยอยู่ไม่น้อย แต่ส่วนใหญ่ก็ยังคงรอดูสถานการณ์ไปก่อน แถมยังมีหลายคนที่คิดว่าเพียงแค่กำลังของพวกเรา คงไม่เพียงพอที่จะปกป้องอาณาจักรทั้งอาณาจักรเอาไว้ได้...”","เมื่อฟังคำอธิบายของลินน์ ราฟาเอลและคนอื่นๆ ก็เริ่มเข้าใจแล้วว่า ‘สมาคมเวทมนตร์เร้นลับ’ เป็นเพียงองค์กรทางวิชาการที่ค่อนข้างหละหลวม ซึ่งมักจะรับสมัครเฉพาะนักวิจัยด้านวิชาการเท่านั้น ปกติแล้วทุกคนมักจะนัดพบกันในมิติขนาดเล็ก โดยที่แต่ละคนอาจจะไม่รู้ตัวตนที่แท้จริงของกันและกันด้วยซ้ำ...","แต่สำหรับสมาชิกในสมาคมแล้ว พวกเขาไม่ค่อยให้ความสำคัญกับตำแหน่งหรือสถานะทางสังคมเท่าไหร่นัก เพราะที่นี่ ความรู้คือทุกสิ่ง!","และด้วยความที่สมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ มีความคิดเห็นเกี่ยวกับสงครามครั้งนี้แตกต่างกันไป จึงเป็นไปไม่ได้เลยที่จะระดมกำลังพลจำนวนมากมาช่วยรบเหมือนอย่างที่สภาเวทมนตร์ทำ","ระหว่างที่ลินน์กำลังอธิบายระบบโครงสร้างของ ‘สมาคมเวทมนตร์เร้นลับ’ เขาก็แอบคิดในใจว่า วันหลังคงต้องหาทางหลอกล่อพวกพ่อมดในอาณาจักรและจักรวรรดิ ให้เข้ามาเป็นสมาชิกของสมาคมเวทมนตร์เร้นลับให้มากขึ้น แบบนี้น่าจะพอตบตาคนอื่นไปได้บ้าง","“ส่วนผู้บริหารของ ‘สมาคมเวทมนตร์เร้นลับ’ ข้าคิดว่าพวกเขาคงจะมีความสนใจในตัวเทพองค์นั้นอยู่ไม่น้อย”","ลินน์กล่าวเสริม","“หรือว่าพวกเขาต้องการจะเข้าร่วมสงครามกวาดล้างศาสนจักรด้วย?”","แฮร์รอฟถามด้วยความประหลาดใจระคนดีใจ","“เรื่องนี้ข้าเองก็ไม่ทราบเหมือนกัน”","ลินน์ส่ายหน้าปฏิเสธ","ขณะนั้นเอง ออโรร่าก็เอ่ยถามขึ้นมาว่า","“ข้าได้ยินมาว่า ตอนที่ ‘สมาคมเวทมนตร์เร้นลับ’ ส่งเจ้าเข้ามาในดินแดนพ่อมด พวกเขาได้มอบหมายให้เจ้าส่งมอบแหวนแห่งศาสตร์เร้นลับให้กับบุคคลที่เปี่ยมไปด้วยสติปัญญาที่สุด เจ้าก็เลยมอบมันให้กับแฮร์รอฟ ใช่ไหม?”","ลินน์สัมผัสได้ถึงความไม่พอใจในน้ำเสียงของแม่มดผู้นี้ ทำเอาเขาถึงกับหัวเราะไม่ออกร้องไห้ไม่เข้า","ตอนนั้นเขารู้จักแค่แฮร์รอฟที่เป็นพ่อมดระดับตำนานเพียงคนเดียวเท่านั้น แถมออโรร่าและวิกตอริโอก็เป็นผู้ควบคุมสถาบันพยากรณ์และสถาบันวิจัยการเล่นแร่แปรธาตุ ซึ่งดูแล้วไม่น่าจะเป็นเป้าหมายที่เหมาะสมที่สุด","“‘สมาคมเวทมนตร์เร้นลับ’ ไม่เคยปฏิเสธผู้ที่รอบรู้และมากความสามารถอย่างประธานสภาทั้งสองท่าน ครั้งก่อนเป็นเพียงแค่การติดต่อทำความรู้จักเบื้องต้นเท่านั้น ข้าเชื่อว่าในการประชุมหารือครั้งหน้า พวกท่านจะต้องได้รับคำเชิญอย่างแน่นอน”","ออโรร่าและวิกตอริโอพยักหน้ารับ พวกเขารู้สึกสนใจสมาคมเวทมนตร์เร้นลับแห่งนี้มาก ส่วนแฮร์รอฟนั้นนอกจากจะตั้งตารอคอยแล้ว ก็ยังรู้สึกกังวลอยู่ลึกๆ เพราะตอนที่เข้าร่วมการประชุมระดับตำนานครั้งก่อน เขาเกือบจะเสียหน้าไปแล้ว","เพราะทฤษฎีและข้อสันนิษฐานเกี่ยวกับการกำเนิดโลกที่อีกฝ่ายพูดถึงนั้น เขาใช้เวลาศึกษาทำความเข้าใจมาปีกว่าแล้ว แต่ก็ยังไม่สามารถทำความเข้าใจได้อย่างถ่องแท้เลย...","……","การประชุมภายในของบรรดาสมาชิกสภาดำเนินไปจนถึงช่วงเที่ยง นอกเหนือจากการหารือเรื่องวิธีรับมือกับการอัญเชิญเทพแล้ว ประเด็นหลักอีกเรื่องหนึ่งก็คือ พวกเขาควรจะตั้งรับอยู่ที่เมืองหลวงต่อไป หรือควรจะเป็นฝ่ายเริ่มโจมตีเพื่อยึดดินแดนของอาณาจักรคืนมา หรือแม้กระทั่งบุกโจมตีเข้าไปในเขตแดนของจักรวรรดิเลยดี","ในเรื่องนี้ ฮัตตาร์ได้เร่งรัดมาหลายครั้งแล้ว เพราะในตอนนี้ ดินแดนกว่าครึ่งของอาณาจักรถูกยึดครองไปหมดแล้ว กษัตริย์อย่างเขาก็แทบจะกลายเป็นเพียงกษัตริย์ในนามเท่านั้น!","แต่ถึงอย่างนั้น กษัตริย์หุ่นเชิดอย่างเขาก็ไม่มีอิทธิพลมากพอที่จะเปลี่ยนแปลงการตัดสินใจของสภาได้ หลังจากหารือกันหลายรอบ ลินน์ก็ตัดสินใจว่าจะตั้งรับอยู่ที่เมืองหลวงไปก่อน เพื่อรอให้เสบียง โดยเฉพาะกระสุนปืน ฟื้นตัวกลับมา!","ในศึกปกป้องเมืองหลวงครั้งนี้ สถาบันวิจัยการเล่นแร่แปรธาตุได้สร้างอาวุธร้ายแรงอย่างปืนกลขึ้นมา ซึ่งมันได้แสดงประสิทธิภาพในการรบได้อย่างยอดเยี่ยม ปืนกลเพียงสามกระบอก สามารถสังหารกองทัพทัณฑ์ศักดิ์สิทธิ์ได้หลายร้อยคนภายในเวลาเพียงหนึ่งนาที ซึ่งถือเป็นผลงานที่น่าทึ่งมาก","ต้องรู้ก่อนนะว่า กองทัพทัณฑ์ศักดิ์สิทธิ์พวกนี้ สามารถต้อนทหารองครักษ์และกองทหารปืนคาบศิลาหลายพันคนให้ล่าถอยได้อย่างง่ายดาย แต่กลับต้องมาตกเป็นเป้าสังหารของปืนกล ขอเพียงแค่มีกระสุนปืนเพียงพอ พวกเขาก็สามารถกุมความได้เปรียบในสงครามครั้งนี้ไว้ในมือได้!"]},{"n":386,"t":"ไพ่ตายใบใหม่แห่งการรบทางอากาศ เครื่องบินรบ","c":["“ท่านศาสตราจารย์ลินน์ กินแอปเปิลหน่อยสิครับ...”","“นวดแบบนี้สบายไหมคะ?”","“ท่านศาสตราจารย์ ได้เวลาดื่มยาแล้วครับ!”","ณ คฤหาสน์อันหรูหราแห่งหนึ่งในเมืองหลวงของอาณาจักรฮัดลาตา ลินน์กำลังเอนกายพักผ่อนอยู่บนเก้าอี้ที่แสนสบาย โดยมีบรรดาพ่อมดจากสถาบันคอยดูแลเอาใจใส่อย่างไม่คลาดสายตา","ในศึกปกป้องเมืองหลวงครั้งล่าสุด ลินน์ได้ฝืนดึงพลังประมวลผลทั้งหมดของเครือข่ายเวทมนตร์มาใช้เพื่อร่าย ‘เพลิงอมตะ’ และ ‘เวทมนตร์เลเซอร์’ ผลที่ตามมาคือการสะท้อนกลับอย่างรุนแรง ซึ่งเกือบจะทำให้เขาสมองตายไปแล้ว","แม้จะได้รับการรักษาด้วยยาระดับตำนานถึงสองชนิดติดต่อกันจนรอดชีวิตมาได้ แต่เขาก็ยังไม่สามารถใช้เวทมนตร์ได้อย่างอิสระในช่วงเวลาสั้นๆ นี้","เรื่องนี้ทำเอาเอล็อคและคนอื่นๆ ตกใจแทบแย่ เพราะลินน์ซึ่งเป็นดาวรุ่งแห่งเวทมนตร์นั้น ถือเป็นเสาหลักของสถาบันเลยก็ว่าได้ ดังนั้น พวกเขาจึงไม่ยอมให้เกิดความผิดพลาดใดๆ ขึ้นเด็ดขาด!","แม้ลินน์จะยืนยันซ้ำแล้วซ้ำเล่าว่าสภาพร่างกายของเขาดีขึ้นมากแล้ว และต้องการแค่การพักผ่อน แต่บรรดาพ่อมดในสถาบันก็ยังคงไม่วางใจ พวกเขาไปเสาะหาขุมทรัพย์ยาล้ำค่ามากมายที่ช่วยฟื้นฟูความเสียหายทางจิตวิญญาณและเพิ่มความมีชีวิตชีวามาให้เขา แถมยังมีผู้เชี่ยวชาญด้านสมุนไพรมาจัดตารางการพักฟื้นให้อย่างเข้มงวด...สรุปง่ายๆ ก็คือ กินให้อิ่ม นอนให้หลับ บำรุงร่างกายให้ดี และไม่ต้องทำอะไรทั้งนั้น!","นอกจากนี้ ยังมีการจัดเตรียมพ่อมดนับร้อยนาย รวมถึงกองทหารยุคใหม่ที่ติดอาวุธปืนคาบศิลาทั้งกองทัพ มารับหน้าที่ดูแลความปลอดภัยให้กับคฤหาสน์แห่งนี้ เพราะเกรงว่าจะมีศัตรูแอบลอบเข้ามาสังหารดาวรุ่งแห่งเวทมนตร์ผู้ ‘ไร้ทางสู้’ ในเวลานี้","ส่วนคนที่ลินน์คุ้นเคยอย่างจอห์นนี่ ลิเดีย และเอล็อค ก็ถูกส่งตัวมาดูแลกิจวัตรประจำวันของเขา พร้อมกับทำหน้าที่เป็นองครักษ์ส่วนตัวไปในตัว ซึ่งตามที่ธีโอดอร์กล่าวไว้ นี่ถือเป็นภารกิจที่สำคัญที่สุดของสถาบันในตอนนี้!","การเตรียมการที่ดูจะโอเวอร์เกินไปของธีโอดอร์และคนอื่นๆ ทำให้ลินน์รู้สึกจนใจเป็นอย่างมาก เขาแค่ไม่สามารถใช้พลังเวทได้อย่างอิสระชั่วคราวเท่านั้น ไม่ได้กลายเป็นคนพิการเสียหน่อย ต่อให้อยู่ในช่วงที่อ่อนแอที่สุด เขาก็ยังสามารถใช้หมัดอัดพวกทหารรักษาพระองค์ที่ถูกล้างสมองให้สลบไปได้เป็นสิบๆ คน...","แต่ก็ต้องยอมรับว่า ชีวิตที่มีคนคอยป้อนข้าวป้อนน้ำแบบนี้มันช่างสุขสบายเสียจริง แม้เขาจะไม่ได้เป็นคนพิการ แต่ก็รู้สึกเหมือนใกล้จะโดนเลี้ยงจนกลายเป็นคนง่อยไปแล้ว","“ท่านศาสตราจารย์ นี่คือผลไม้สีม่วงที่กษัตริย์ฮัตตาร์รับสั่งให้คนนำมามอบให้ค่ะ ข้าลองชิมดูแล้ว ไม่มีพิษ และรสชาติก็อร่อยมากเลยนะคะ!”","ที่ด้านข้าง ลิเดียหยิบผลไม้สีม่วงที่ปอกเปลือกเรียบร้อยแล้วป้อนเข้าปากลินน์ จากนั้นก็คอยบีบนวดต้นขาให้เขาอย่างเอาอกเอาใจ แต่เรี่ยวแรงของนางกลับมหาศาลจนลินน์ถึงกับต้องกัดฟันกรอดด้วยความเจ็บปวด","“พอแล้วๆ ปล่อยได้แล้ว!”","ลินน์ปัดมือของเด็กสาวฮาล์ฟลิ่งออกอย่างจนใจ หากขืนปล่อยให้นางนวดต่อไป ขาของเขาคงได้พังแน่ๆ!","ลิเดียหดคอลงราวกับลูกสัตว์ตัวน้อยที่ทำความผิด สีหน้าของนางดูน่าสงสารเป็นอย่างยิ่ง","“พูดมาเถอะ มีธุระอะไรกับข้างั้นหรือ?”","ลินน์ส่ายหน้าแล้วเอ่ยถาม","แม้ว่าลิเดียจะเป็นหนึ่งในคนที่ถูกส่งมาดูแลเขา แต่ช่วงหลายวันมานี้นางก็เอาแต่อู้งาน และแอบทำของแปลกๆ อยู่เงียบๆ การที่จู่ๆ วันนี้นางมาเอาอกเอาใจเขาแบบนี้ มันต้องมีเรื่องอะไรแอบแฝงอยู่แน่ๆ","“ข้าเขียนแบบแปลนขึ้นมาแผ่นหนึ่ง อยากจะรบกวนให้ท่านช่วยดูให้หน่อยค่ะ...”","ลิเดียรีบล้วงเอาแบบแปลนออกมาจากอกเสื้อ กางออก และนำไปวางไว้ตรงหน้าของลินน์","บนแบบแปลนนั้นปรากฏภาพของเครื่องบินที่ดูหยาบและเรียบง่ายมาก โดยมีรูปร่างหน้าตาคล้ายคลึงกับเครื่องบินที่เขาเคยเห็นตอนเพิ่งมาถึงเมืองท่าอิเยตาใหม่ๆ แต่สามารถสังเกตเห็นการปรับเปลี่ยนรายละเอียดหลายอย่างได้อย่างชัดเจน","ลิเดียจ้องมองลินน์ด้วยความตื่นเต้นและประหม่า ถึงแม้ว่าการปรากฏตัวของเรือเหาะ จะช่วยเติมเต็มความฝันที่จะได้บินขึ้นไปบนท้องฟ้าของนางแล้ว แต่นั่นก็เป็นผลงานของท่านศาสตราจารย์ ดังนั้น ตลอดปีกว่าที่ผ่านมาลิเดียก็ไม่เคยล้มเลิกความคิดที่จะสร้างเครื่องบินของตัวเองเลย","และนางยังจำได้ดีว่า ลินน์เคยบอกไว้ว่าแนวคิดการออกแบบของนางไม่ได้มีปัญหาอะไร สาเหตุหลักที่ทำให้เครื่องบินของนางบินขึ้นสู่ท้องฟ้าได้ยาก เป็นเพราะพลังขับเคลื่อนไม่เพียงพอ!","การประดิษฐ์เครื่องยนต์สันดาปภายในขึ้นมา ช่วยแก้ปัญหานี้ได้อย่างชัดเจน และทำให้การสร้างเครื่องบินให้สมบูรณ์เป็นไปได้","ในจินตนาการของนาง เครื่องบินชนิดนี้ แม้จะไม่สามารถใช้ขนส่งกองทหารหรืออาวุธยุทโธปกรณ์ได้เหมือนเรือเหาะ แต่ข้อดีของมันคือความเร็วและความคล่องตัว หากติดตั้งปืนกลหรืออาวุธลำแสงไว้ที่ด้านหน้า ก็จะสามารถต่อสู้กับเหล่าอัศวินกริฟฟอนบนท้องฟ้าได้อย่างสูสี...","ลินน์มองดูแบบแปลนอย่างละเอียดอยู่ครู่หนึ่ง และหลังจากให้สมองกลช่วยวิเคราะห์แล้ว เขาก็เอ่ยพร้อมรอยยิ้ม","“ทำได้ดีมาก มีพัฒนาการนะ!”","“แล้วมันจะบินขึ้นไหมคะ?”","ลิเดียเอ่ยถามอย่างใจร้อน","“เรื่องบินน่ะ ไม่มีปัญหาหรอก...”","ลินน์เอ่ยพลางครุ่นคิด แต่ก่อนที่ลิเดียจะได้กระโดดโลดเต้นด้วยความดีใจ เขาก็พูดต่อขึ้นมาเสียก่อน","“แต่ถ้าเจ้าอยากจะให้มันทำความเร็วได้ถึงสองร้อยกิโลเมตรต่อชั่วโมงตามที่คาดหวังไว้เมื่อเร่งเครื่องเต็มกำลังล่ะก็ เป็นไปไม่ได้หรอก เพราะโครงสร้างภายนอกของเครื่องบินลำนี้ยังมีข้อบกพร่องอยู่ และไม่สามารถต้านทานแรงต้านอากาศได้อย่างมีประสิทธิภาพ แถมวัสดุก็ไม่ได้มาตรฐาน หากต้องบินด้วยความเร็วสูง มันจะต้องหลุดเป็นชิ้นๆ อย่างแน่นอน!”","“ก่อนหน้านี้ข้าเคยให้สมุดบันทึกความรู้เบื้องต้นเกี่ยวกับ ‘อากาศพลศาสตร์’ กับเจ้าไปไม่ใช่หรือ? เจ้าอ่านไปถึงไหนแล้วล่ะ?”","ลินน์ถามกลับ","เมื่อได้ยินคำว่า ‘อากาศพลศาสตร์’ สีหน้าของลิเดียก็บิดเบี้ยวด้วยความทุกข์ใจทันที วิชาบ้าอะไรก็ไม่รู้ เข้าใจยากชะมัด ไม่ใช่สิ่งที่มนุษย์จะเรียนได้เลย!","ก่อนที่จะได้อ่านสมุดบันทึกเล่มนั้น ลิเดียนั้นเคยคิดมาตลอดว่าตัวเองมีพรสวรรค์ด้านคณิตศาสตร์ ไม่ว่าจะเป็นสมการ เลขยกกำลัง หรือเรขาคณิต นางก็สามารถเรียนรู้ได้อย่างรวดเร็ว แม้กระทั่งแคลคูลัส นางก็ยังพอจะทำความเข้าใจได้บ้าง แต่ ‘อากาศพลศาสตร์’ กลับทำให้นางสับสนมึนงงไปหมด แทบไม่อยากจะเชื่อเลยว่านี่เป็นเพียงแค่ความรู้เบื้องต้นเท่านั้น","เมื่อเห็นท่าทางคิ้วขมวดด้วยความหงุดหงิดของเด็กสาวฮาล์ฟลิ่ง ลินน์ก็เดาได้ทันทีว่าลิเดียคงเรียนไม่รู้เรื่องแน่ๆ","แต่นั่นก็ไม่ใช่เรื่องแปลกอะไร เพราะ ‘อากาศพลศาสตร์’ เป็นแขนงหนึ่งของ ‘กลศาสตร์ของไหล’ ซึ่งมีเนื้อหาและการคำนวณที่มหาศาลมาก แม้กระทั่งในยุคปัจจุบัน ปัญหาบางอย่างเกี่ยวกับ ‘กลศาสตร์ของไหล’ ก็ยังไม่สามารถหาคำตอบได้เลย","จนกระทั่งศตวรรษที่ 22 ถึงได้มีการนำพลังการประมวลผลที่ก้าวกระโดดของควอนตัมคอมพิวเตอร์ มาช่วยในการคาดการณ์และคำนวณได้อย่างแม่นยำ","สมุดบันทึกที่ลินน์ให้ลิเดียไป ย่อมเป็นฉบับดั้งเดิมที่อิงตามหลักกลศาสตร์ดั้งเดิม ไม่น่าเชื่อเลยว่ามันจะยังคงยากเกินไปสำหรับนาง!","“เจ้าสามารถเปรียบเทียบอากาศเหมือนกับทะเล และเครื่องบินของเจ้าก็คือปลาที่แหวกว่ายอยู่ในทะเล รูปร่างของพวกมันถูกออกแบบมาเพื่อต่อต้านแรงต้านของน้ำให้ได้ดียิ่งขึ้น ซึ่งลักษณะเช่นนี้ก็สามารถพบเห็นได้ในนกเช่นกัน ข้าเรียกมันว่า รูปร่างแบบเพรียวลม...”","ลินน์ใช้นิ้วแทนพู่กัน และใช้พลังเวทแทนน้ำหมึกเพื่อปรับแก้แบบแปลนให้ลิเดีย พร้อมกับอธิบายให้นางฟังไปด้วย","ลิเดียจ้องมองลินน์ที่กำลังขีดเขียนลงบนแบบแปลนตาไม่กระพริบ เพียงแค่ห้านาที รายละเอียดทั้งหมดก็ถูกปรับแก้จนเสร็จสมบูรณ์","โครงร่างยังคงเป็นโครงร่างเดิม แต่ดูสวยงามขึ้นมาก ราวกับมีความงามที่ไม่อาจบรรยายได้...","ลินน์ไม่รู้ว่าลิเดียกำลังคิดอะไรอยู่ ไม่อย่างนั้นเขาคงจะบอกนางไปแล้วว่า ความสวยงามก็คือพลังรูปแบบหนึ่ง!","เครื่องจักรสงครามที่มีอานุภาพทำลายล้างสูง มักจะมีรูปร่างหน้าตาที่สวยงามและดูน่าเกรงขาม เพราะนั่นคือการออกแบบที่สอดคล้องกับธรรมชาติมากที่สุด..."]},{"n":387,"t":"ความสงสัยของระดับตำนานและอากาศพลศาสตร์!","c":["ลิเดียจ้องมองแบบแปลนด้วยความหลงใหล นางพิจารณาความหมายของการปรับแก้แต่ละจุดอย่างถี่ถ้วน และเมื่อเห็นส่วนหางที่ลินน์ตั้งใจวาดเพิ่มเข้าไป นางก็อดไม่ได้ที่จะเอ่ยถามขึ้นมา","“ท่านศาสตราจารย์ หางส่วนนี้มีไว้ทำอะไรคะ? ทำไมถึงต้องมีปีกทั้งด้านหน้าและด้านหลังด้วย?”","“เจ้าลองสังเกตดูสิ นกทุกตัวล้วนมีขนหางไม่ใช่หรือ? นั่นแหละคือแรงบันดาลใจสำหรับส่วนหางนี้”","ลินน์ตอบพร้อมรอยยิ้ม","ลิเดียชะงักไปครู่หนึ่ง ก่อนจะนึกขึ้นได้ จริงด้วยสิ ไม่ว่าจะเป็นสัตว์ประหลาดที่ทรงพลังหรือนกธรรมดาๆ ต่างก็มีขนหางยาวๆ อยู่ด้านหลังทั้งนั้น แม้แต่มังกรยักษ์ก็ยังมีหางยาวเลย","“มันเอาไว้ใช้รักษาความสมดุลและช่วยในการเลี้ยวใช่ไหมคะ?”","ลิเดียรีบคาดเดา","“ถูกต้อง”","ลินน์พยักหน้า การมีธรรมชาติเป็นครู มักจะเป็นส่วนสำคัญอย่างยิ่งในการหาแรงบันดาลใจในการออกแบบ","เมื่อทำความเข้าใจได้แล้ว ลิเดียก็ชี้ไปที่ปีกซึ่งถูกดัดแปลง","นี่คือจุดที่ทำให้นางประหลาดใจยิ่งกว่า เพราะปีกทั้งสองข้างที่ลินน์วาดนั้นไม่ได้ตรงแหน่วไปซะทีเดียว แต่ส่วนปลายของมันกลับเชิดขึ้น ซึ่งดูแปลกประหลาดมาก เพราะไม่มีนกชนิดไหนที่มีปลายปีกตั้งชันแบบนี้","“จุดนี้เกี่ยวข้องกับความรู้ด้านอากาศพลศาสตร์น่ะ สรุปสั้นๆ ก็คือ มันสามารถลดกระแสลมวนที่ปลายปีก ลดแรงต้านเหนี่ยวนำ และเพิ่มอัตราส่วนลักษณะจำกัดได้...”","ลินน์อธิบายเป็นฉากๆ","ลิเดียฟังแล้วก็ถึงกับมึนงง กระแสลมวนที่ปลายปีกอะไร อัตราส่วนลักษณะอะไรกัน นางไม่เห็นจะรู้จักเลยสักนิด...","“เอาแบบนี้แล้วกัน เรามาพับเครื่องบินกระดาษสักสองลำเพื่อทดสอบดูก็ได้!”","ลินน์ครุ่นคิดอยู่ครู่หนึ่ง ก่อนจะเปลี่ยนเรื่อง","ลิเดียกระตือรือร้นขึ้นมาทันที เครื่องบินกระดาษคือของเล่นที่บินได้ ซึ่งท่านศาสตราจารย์เคยสอนนางพับ มันน่าสนใจมาก ใช้เพียงกระดาษแผ่นเดียวก็สามารถสร้างขึ้นมาได้ และหลักการบินของมันก็คล้ายคลึงกับเครื่องบินที่นางกำลังสร้างมาก ราวกับเป็นแบบจำลองเครื่องบินขนาดจิ๋วที่ใช้พลังงานของตัวเองในการขับเคลื่อน","ในช่วงเวลานี้นางยังได้คิดค้นวิธีพับแบบใหม่ที่ทำให้มันบินได้ไกลมากๆ อีกด้วย...","ลิเดียรีบวิ่งเหยาะๆ ไปหยิบกระดาษขนาดเท่ากันมาสองแผ่น ยื่นแผ่นหนึ่งให้ลินน์ จากนั้นก็ลงมือพับอย่างรวดเร็ว","ไม่นาน เครื่องบินกระดาษอันประณีตก็ปรากฏขึ้นบนฝ่ามือของเด็กสาว โดยนางยังเหลือบมองลินน์ที่ยังคงพับกระดาษอยู่ จากนั้นก็ออกตัววิ่งและขว้างเครื่องบินกระดาษออกไปสุดแรงเกิด","อย่างที่เขาว่า พลังมหาศาลมักจะสร้างปาฏิหาริย์!","ภายใต้แรงขว้างเต็มพิกัดของลิเดีย เครื่องบินกระดาษก็พุ่งทะยานออกไปไกลเกือบสามสิบเมตร ก่อนจะร่วงหล่นลงพื้นอย่างทุลักทุเล","ลิเดียยืนเท้าเอวด้วยความดีใจ หันกลับไปมองท่านศาสตราจารย์ นี่คือการขว้างที่ไกลที่สุดตั้งแต่ที่นางเคยพับเครื่องบินกระดาษมาเลยนะ!","“ตาข้าแล้วสินะ?”","ลินน์พับปลายปีกให้เชิดขึ้น โดยเขาไม่ได้ลุกขึ้นยืนด้วยซ้ำ และไม่ได้ออกแรงมากนัก เพียงแค่กะมุมให้ดี แล้วปล่อยเครื่องบินกระดาษออกจากมือเบาๆ","สิบเมตร ยี่สิบเมตร สามสิบเมตร...เครื่องบินกระดาษยังคงบินต่อไปอย่างไม่ลดละ แถมยังตีโค้งกลางอากาศ ก่อนจะวนกลับมาตกบนมือของลินน์พอดิบพอดี","ลิเดียถึงกับยืนอึ้ง จนเริ่มสงสัยว่าท่านศาสตราจารย์แอบใช้เวทมนตร์หรือเปล่า...","แต่เดี๋ยวก่อน ตอนนี้ท่านศาสตราจารย์ยังใช้เวทมนตร์ไม่ได้นี่นา!","“เจ้าจะลองทำดูเองก็ได้นะ!”","ลินน์ยักไหล่ เขาย่อมมองเห็นความกังขาของเด็กสาว","ลิเดียไม่ยอมแพ้ นางรีบวิ่งไปเก็บเครื่องบินกระดาษของตัวเองกลับมา ดัดแปลงส่วนปีกเพียงเล็กน้อย แล้วทดลองขว้างดูอีกครั้ง","เนื่องจากมุมที่ขว้างแตกต่างกัน เครื่องบินกระดาษจึงไม่ได้บินกลับมา แต่มันก็พุ่งทะลุระยะห้าสิบเมตรไปได้อย่างง่ายดาย...","“สุดยอดไปเลย!”","ลิเดียร้องอุทานด้วยความประหลาดใจ การปรับเปลี่ยนเพียงเล็กน้อย กลับทำให้ระยะทางเพิ่มขึ้นกว่าเจ็ดสิบเปอร์เซ็นต์ ช่างน่าเหลือเชื่อจริงๆ!","ในวินาทีนั้น ความสนใจใน ‘อากาศพลศาสตร์’ ของลิเดียก็ถูกปลุกขึ้นมาอีกครั้ง วิชานี้มันช่างน่าสนุกจริงๆ!","หลังจากที่ลินน์แสดงให้เห็นถึงความเหนือชั้นของการออกแบบใหม่ด้วยการลงมือทำจริง เขาก็เริ่มปรึกษาหารือกับลิเดียเรื่องวัสดุที่จะนำมาใช้สร้างเครื่องบินรูปแบบใหม่","สำหรับเรื่องนี้ ลินน์เองก็ให้ความสำคัญเป็นอย่างมาก","เพราะเครื่องบินรบคืออาวุธสำคัญในการรบทางอากาศอย่างแท้จริง การใช้เรือเหาะเพื่อป้องกันภัยทางอากาศ ท้ายที่สุดแล้วก็ไม่ใช่ทางออกที่ถูกต้อง ในครั้งนี้ พวกเขาอาศัยเวทมนตร์เลเซอร์ที่เพิ่งคิดค้นขึ้นมาใหม่ ลอบโจมตีศัตรูแบบไม่ทันตั้งตัว จนสามารถกวาดล้างกองอัศวินกริฟฟอนได้ทั้งกองทัพ!","แต่บทเรียนอันแสนเจ็บปวดในครั้งนี้ ย่อมทำให้ศาสนจักรระมัดระวังตัวมากขึ้น","ไม่ว่าจะเป็นในศึกปกป้องเมืองหลวงหรือสงครามทางทะเล พวกเขาล้วนเคยใช้เวทมนตร์เลเซอร์มาแล้วไม่ต่ำกว่าหนึ่งครั้ง ตอนนี้ข้อมูลเกี่ยวกับเวทมนตร์เลเซอร์ได้รั่วไหลออกไปแล้ว การจะสร้างผลงานอันยอดเยี่ยมเช่นนี้อีกในครั้งหน้า คงเป็นเรื่องยาก","ดังนั้น เครื่องบินรุ่นใหม่นี้จึงจะกลายเป็นไพ่ตายใบใหม่แห่งการรบทางอากาศของพวกเขา...","……","ในช่วงสองวันต่อมา ลินน์ก็ยังคงใช้ชีวิตอันหรูหราสุขสบาย โดยมีคนคอยปรนนิบัติอยู่ในคฤหาสน์ พร้อมกับคอยให้คำแนะนำลิเดียเกี่ยวกับการสร้างเครื่องบินเป็นระยะๆ","ในช่วงนี้ ทางฝั่งศาสนจักรดูเงียบสงบผิดปกติ ไม่มีทีท่าว่าจะเคลื่อนไหวใดๆ อย่างน้อยเรือเหาะสอดแนมที่พวกเขาส่งออกไป ก็ยังไม่พบวี่แววว่าจักรวรรดิจะยกทัพมาบุกอีก","ลินน์คาดเดาว่า ความพ่ายแพ้อย่างย่อยยับของกองกำลังปราบปรามทั้งสองทัพ คงทำให้จักรวรรดิบอบช้ำไปไม่น้อย...","นอกจากนี้ กองเรือระยะไกลของจักรวรรดิอาจจะยังคงลอยลำอยู่กลางทะเล การจะเปิดศึกอีกครั้งในเวลาอันสั้นคงเป็นไปไม่ได้","เพียงแต่ความแข็งแกร่งที่พวกเขาแสดงออกมา แม้จะทรงพลัง แต่ก็ยังไม่เพียงพอที่จะทำให้ศาสนจักรเกิดความหวาดกลัว อย่างมากก็แค่รู้สึกระแวงเท่านั้น เป็นที่คาดการณ์ได้เลยว่า หากอีกฝ่ายเปิดฉากโจมตีอีกครั้ง ย่อมต้องเตรียมกองกำลังที่แข็งแกร่งยิ่งกว่าเดิมมาอย่างแน่นอน...","หลังจากพักฟื้นมาเป็นเวลาสิบวัน อาการปวดหัวตึบๆ ก่อนหน้านี้ก็หายเป็นปลิดทิ้ง นั่นหมายความว่าเขาฟื้นฟูความสามารถในการร่ายเวทได้แล้ว และในที่สุดก็สามารถเข้าไปปั่นหัวประธานสภาทั้งสองท่านในมิติเวทมนตร์ได้เสียที","นี่คือเรื่องที่ต้องให้ความสำคัญเป็นอันดับแรก หนึ่งคือเพื่อชักนำให้บรรดาพ่อมดไปสำรวจโลกในระดับจุลภาคมากยิ่งขึ้น เพื่อค้นหาวิธีเอาชนะเทพเอลาให้ได้ และสองคือ เพื่อเพิ่มจำนวนสมาชิกให้กับเครือข่ายเวทมนตร์ของเขา ซึ่งจะช่วยเพิ่มขีดความสามารถในการประมวลผล","ถึงแม้ว่าในตอนนี้ พลังประมวลผลของเครือข่ายเวทมนตร์จะเพียงพอแล้ว หรืออาจจะเกินขีดจำกัดที่เขาจะรับไหวไปแล้วด้วยซ้ำ แต่การวางแผนล่วงหน้าก็ไม่ใช่เรื่องเสียหายอะไร การเสี่ยงตายในครั้งนี้ ยังทำให้ลินน์มีความสามารถในการควบคุมและทำความเข้าใจเกี่ยวกับพลังเวทเพิ่มขึ้นอีกขั้น โดยเขารู้สึกได้เลยว่าตัวเองเข้าใกล้การเป็นพ่อมดห้าวงแหวนมากขึ้นทุกที!","‘จริงสิ 071 ก่อนหน้านี้เจ้าไม่สามารถดึงพลังประมวลผลของพ่อมดที่อยู่ระดับสูงกว่ามาใช้ได้ไม่ใช่หรือ?’","ลินน์นึกคำถามขึ้นมาได้ จึงเอ่ยถามขึ้นมาในใจ","ก่อนหน้านี้ตอนที่เขายังเป็นแค่พ่อมดเต็มตัว เขาเคยทดลองว่าจะสามารถดึงพลังประมวลผลของจอมเวทผู้ยิ่งใหญ่อย่างแอนโธนี่มาใช้ได้หรือไม่ ผลปรากฏว่าไม่สามารถทำได้ เพราะระดับพลังจิตวิญญาณของอีกฝ่ายสูงกว่าเขา เขาจึงไม่สามารถรองรับพลังของจอมเวทผู้ยิ่งใหญ่คนใดได้เลย","จนกระทั่งเขาทะลวงระดับได้สำเร็จ ถึงเพิ่งได้รับการตอบรับ","ในมุมมองของลินน์ ช่องว่างระหว่างจอมเวทผู้ยิ่งใหญ่กับพ่อมดระดับตำนานก็ไม่น่าจะน้อยเช่นกัน การที่เขาเพิ่งจะก้าวเข้าสู่อาณาเขตของจอมเวทผู้ยิ่งใหญ่ แต่กลับสามารถดึงพลังประมวลผลของแฮร์รอฟมาใช้ได้ จึงทำให้เขารู้สึกประหลาดใจอยู่ไม่น้อย"]},{"n":388,"t":"ข้าสงสัยว่าระดับตำนานของพวกเขากับพวกเราจะไม่เหมือนกัน!","c":["[จากการประเมิน เป้าหมายตามข้อตกลงกำลังเผชิญกับภัยคุกคามต่อชีวิตอย่างรุนแรง ระบบจะทำการยกเลิกการปกป้องผู้ใช้ชั่วคราว คาดการณ์ว่าในกรณีที่การต่อสู้ไม่ทวีความรุนแรงขึ้น และไม่มีบุคลากรทางการแพทย์มาช่วยเหลือ จะสามารถรอดชีวิตต่อไปได้อีก 7 นาที 26 วินาที!]","ตายช้าก็ยังดีกว่าตายเร็วล่ะนะ อื้ม ก็ถือว่าฉลาดใช้ได้เลย...ลินน์แอบบ่นในใจ","[ปัจจุบัน ผู้ใช้ทั้งห้าสิบสามคนที่เชื่อมต่อกับเครือข่ายเวทมนตร์ ยังไม่มีผู้ใดที่มีระดับพลังจิตวิญญาณก้าวข้ามเป้าหมายตามข้อตกลงอย่างสมบูรณ์]","เสียงเตือนจากปัญญาประดิษฐ์สนับสนุนที่ดังขึ้นอีกครั้ง ทำให้ลินน์ชะงักไปเล็กน้อย หลังจากให้ 071 เรียกดูข้อมูลการวิเคราะห์ ‘ผู้ใช้’ อย่างแฮร์รอฟ เขาก็ต้องตกใจเมื่อพบว่า ระดับพลังจิตวิญญาณของประธานสภาระดับตำนานผู้นี้ กลับอยู่ในระดับเดียวกับจอมเวทผู้ยิ่งใหญ่หกวงแหวนอย่างแอนโธนี่...","เพียงแต่พลังในการประมวลผลนั้นแข็งแกร่งกว่าแอนโธนี่มาก!","การค้นพบนี้ทำให้ลินน์รู้สึกประหลาดใจเป็นอย่างยิ่ง ผ่านไปครู่ใหญ่เขาถึงเพิ่งจะนึกขึ้นได้ว่า ระดับพลังที่เรียกๆ กันอยู่นี้ มนุษย์เป็นคนกำหนดขึ้นมาเองทั้งนั้น!","ตั้งแต่หนึ่งวงแหวนไปจนถึงเจ็ดวงแหวน จากพ่อมดเต็มตัวไปจนถึงพ่อมดระดับตำนาน การแบ่งระดับหรือแม้แต่วิธีการเลื่อนระดับเหล่านี้ ล้วนเป็นสิ่งที่บรรดาพ่อมดค่อยๆ ค้นพบและเรียนรู้มาทีละก้าว","ถ้าพวกเขาพอใจ จะแบ่งเป็นพ่อมดหนึ่งวงแหวนขั้นต้น พ่อมดหนึ่งวงแหวนขั้นสูง ฯลฯ ซอยย่อยออกเป็นระดับชั้นนับไม่ถ้วนก็ยังได้...","เพียงแต่ที่ผ่านมา แต่ละระดับขั้นใหญ่ๆ ล้วนมีสัญลักษณ์ที่บ่งบอกได้อย่างชัดเจน เช่น พ่อมดเต็มตัวสามารถใช้พลังเวทจำลองธาตุต่างๆ ได้ ส่วนจอมเวทผู้ยิ่งใหญ่ก็สามารถควบคุมธาตุโลหะและสร้างอาณาเขตของตัวเองได้ เป็นต้น...","หรือว่าระดับพลังจิตวิญญาณของจอมเวทผู้ยิ่งใหญ่จะมาถึงขีดสุดแล้ว?","การเลื่อนระดับที่สูงขึ้นไปกว่านี้ เป็นเพียงแค่การเพิ่มปริมาณ แต่ไม่ได้เปลี่ยนคุณภาพงั้นหรือ?","ลินน์แอบคิดในใจ แต่ไม่นานเขาก็ปัดข้อสันนิษฐานนี้ทิ้งไป เพราะเทพเอลานั่นแหละคือตัวอย่างที่ดีที่สุด ความแข็งแกร่งของอีกฝ่ายเหนือกว่าพวกเขามาก เรียกได้ว่าอยู่กันคนละระดับชั้นอย่างสิ้นเชิง","หลังจากครุ่นคิดอยู่ครู่หนึ่ง ลินน์ก็เอ่ยถามขึ้นในใจอีกครั้ง","‘071 จากการต่อสู้ครั้งก่อน เจ้าสามารถวิเคราะห์สถานะของเอ็ดเวลกับเทพองค์นั้นได้ไหม?’","[เป้าหมาย เอ็ดเวล สัญญาณชีพเริ่มต้นอ่อนแรง หลังจากฟื้นคืนชีพ ไม่มีสัญญาณชีพที่ชัดเจน เป้าหมาย เอลา สิ่งมีชีวิตไม่ทราบสายพันธุ์ ร่างพลังงานเข้มข้น อันตรายระดับสูงสุด]","‘หมายความว่าเอ็ดเวลอาจจะไม่ใช่มนุษย์ ส่วนเอลาก็ยืนยันแล้วว่าไม่ใช่มนุษย์งั้นหรือ?’","ลินน์เอ่ยด้วยความประหลาดใจ ไม่นานเขาก็นึกถึงความสามารถอันน่าเหลือเชื่อที่เอ็ดเวลแสดงออกมาในระหว่างการต่อสู้ เช่น ร่างกายถูกเลเซอร์ตัดขาดก็ยังรอดชีวิตมาได้ หรือการผลุบๆ โผล่ๆ ไปมา แถมยังหลบซ่อนจากการรับรู้ของพวกเขาได้อย่างง่ายดาย","[ประเมินผล ระดับพลังชีวิตและระดับพลังจิตวิญญาณของทั้งสอง เป็นเป้าหมายตามข้อตกลง...]","คราวนี้ลินน์ไม่ได้แค่ประหลาดใจ แต่ถึงขั้นตกตะลึงเลยทีเดียว ผลการวิเคราะห์ของปัญญาประดิษฐ์สนับสนุนนั้นเหนือความคาดหมายของเขาไปมาก จนเขาชักจะเริ่มสงสัยแล้วว่าเจ้านี่มันไม่ได้ซ่อมบำรุงมานานเกินไปจนเครื่องรวนหรือเปล่า","เอลาน่ะยังพอเข้าใจได้ แต่ระดับพลังจิตวิญญาณของเอ็ดเวลเนี่ยนะที่สูงกว่าพวกเขา?","มันไม่น่าจะใช่สิ ถึงแม้ว่าเอ็ดเวลจะแข็งแกร่งมาก แต่หลังจากที่เขาดึงพลังการประมวลผลของเครือข่ายเวทมนตร์มาใช้ ก็ยังพอจะรับมือได้ อีกฝ่ายไม่มีปัญญาทำอะไรกับคุณสมบัติการแย่งชิงอิเล็กตรอนของคลอรีนไตรฟลูออไรด์ด้วยซ้ำ ดูแล้วไม่น่าจะเก่งไปกว่าประธานสภาอย่างแฮร์รอฟเลยนะ","ลินน์ขมวดคิ้วแน่นและตกอยู่ในภวังค์ความคิด","ถึงแม้ว่าทั้งแฮร์รอฟและเอ็ดเวลจะถูกเรียกว่าระดับตำนานเหมือนกัน และมีพลังต่อสู้เหนือกว่าระดับจอมเวทผู้ยิ่งใหญ่ แต่สถานะของทั้งสองดูเหมือนจะแตกต่างกันอย่างชัดเจน","“ร่างพลังงานเข้มข้น...”","ลินน์พึมพำกับตัวเองเบาๆ นี่คือคำที่ปัญญาประดิษฐ์สนับสนุนใช้เรียกเทพเอลา บางทีอาจจะหมายความว่าอีกฝ่ายได้ละทิ้งกายเนื้อ และเปลี่ยนไปอยู่ในรูปแบบของพลังงานแทน","หลังจากที่เพียร์ซเตือนสติ ในระหว่างการต่อสู้ครั้งก่อน เขาก็สังเกตเห็นแล้วว่า พลังศักดิ์สิทธิ์ทุกบทที่เอ็ดเวลร่ายออกมา ซึ่งเหนือกว่าระดับพระคาร์ดินัล ล้วนเป็นการยืมพลังจาก ‘วาจาศักดิ์สิทธิ์’ และการขยาย ‘อาณาเขตแห่งพระเจ้า’ ทั้งสิ้น","เห็นได้ชัดว่า นี่ไม่ใช่พลังของเอ็ดเวลเองทั้งหมด...","ข้อสงสัยมากมายผุดขึ้นมาในหัวของลินน์ แต่ข้อมูลที่เกี่ยวข้องนั้นมีน้อยเกินไป แถมตอนนี้เขายังเป็นแค่จอมเวทผู้ยิ่งใหญ่สี่วงแหวน ยังห่างไกลจากระดับตำนานอีกมาก จึงไม่สามารถวิเคราะห์อะไรที่เป็นประโยชน์ออกมาได้มากนัก","บางทีในการประชุมหารือครั้งนี้ เขาอาจจะลองหลอกถามข้อมูลจากประธานสภาระดับตำนานทั้งหลายดู เผื่อว่าพวกเขาจะรู้เบื้องลึกเบื้องหลังอะไรบ้าง...","ลินน์หยิบ ‘แหวนแห่งศาสตร์เร้นลับ’ สองวงที่ทำเตรียมไว้ล่วงหน้าออกมา บรรจุลงในกล่องอย่างประณีต จากนั้นก็เรียกตัวเอล็อคมา เพื่อให้เขานำสิ่งนี้ไปมอบให้กับประธานสภาทั้งสองด้วยตัวเอง","เอล็อครับแหวนทั้งสองวงมา ก่อนจะเอ่ยถามด้วยความเป็นห่วง","“ท่านศาสตราจารย์ อาการบาดเจ็บของท่านเป็นอย่างไรบ้างครับ? ตามการคาดการณ์ของท่านฮินส์ อีกสองวันนี้อาการน่าจะเริ่มดีขึ้นแล้วนี่ครับ”","“ดีขึ้นบ้างแล้วล่ะ แต่ถ้าจะให้หายขาด คงต้องใช้เวลาอีกสักสี่ห้าวัน”","ลินน์ตอบพร้อมกับแววตาที่เป็นประกาย เขาตั้งใจจะให้อาการบาดเจ็บของตัวเองหายดี หลังจากที่การประชุมระดับตำนานสิ้นสุดลงไปแล้วจะดีกว่า","……","ช่วงพลบค่ำ ภายในลานกว้างของพระราชวัง บรรดาประธานสภาต่างก็มารวมตัวกัน พวกเขาได้รับข้อความจากแหวนแล้วว่า...เวลาในการนัดหมายคือเวลาเที่ยงคืนตรงของคืนนี้!","แม้ว่าการรวมตัวในครั้งนี้ จะเป็นการส่งผ่านพลังเวทที่แฝงไปด้วยจิตวิญญาณของผู้ถือครอง ‘แหวนแห่งศาสตร์เร้นลับ’ เข้าไปยังมิติพิเศษ ซึ่งในทางทฤษฎีแล้วสามารถทำได้จากทุกที่","แต่แฮร์รอฟก็ยังจงใจเรียกทั้งสองคนมาพบ เพื่อกำชับออโรร่าและวิกตอริโอเป็นพิเศษว่า หากระหว่างการหารือมีทฤษฎีหรือหลักการอะไรที่ฟังไม่เข้าใจเลย ก็พยายามอย่าแสดงออกให้เห็นชัดเจนจนเกินไป กลับมาแล้วค่อยค่อยปรึกษาหารือกันทีหลังได้","ที่สำคัญที่สุดคือ ห้ามทำให้ดินแดนพ่อมดต้องเสียหน้าเด็ดขาด!","“สมาคมเวทมนตร์เร้นลับที่เจ้าว่า มันวิเศษวิโสขนาดนั้นเชียวหรือ?”","วิกตอริโอเอ่ยถามด้วยสีหน้าไม่พอใจ พวกเขาต่างก็เป็นพ่อมดระดับตำนานด้วยกันทั้งนั้น ถึงแม้ว่าจะมีความเชี่ยวชาญในด้านที่ต่างกัน แต่ก็ไม่น่าจะมีความรู้ที่ห่างชั้นกันขนาดนั้น...","แฮร์รอฟไม่ได้อธิบายอะไรยืดยาว แต่กลับเอ่ยด้วยน้ำเสียงหยอกล้อ","“ข้าคิดว่าเจ้าคงเอาแหวนแห่งศาสตร์เร้นลับวงนั้นไปศึกษาดูแล้วใช่ไหม? เป็นยังไงบ้างล่ะ ถอดรหัสได้ไหม?”","วิกตอริโอยิ้มแหยๆ ในฐานะนักเล่นแร่แปรธาตุระดับตำนาน เขาย่อมสนใจสิ่งประดิษฐ์เล่นแร่แปรธาตุที่สมาชิก ‘สมาคมเวทมนตร์เร้นลับ’ ใช้ติดต่อสื่อสารกันอยู่แล้ว!","ตัวแหวนแห่งศาสตร์เร้นลับนั้นดูธรรมดาๆ ไม่ได้มีอะไรพิเศษ ด้วยโครงสร้างของมัน เขาแค่มองแวบเดียวก็สามารถจำลองขึ้นมาได้แล้ว แต่เมื่อลองศึกษาเกี่ยวกับการส่งผ่านพลังเวท และพยายามแกะรอยย้อนกลับผ่านข้อความที่อีกฝ่ายส่งมา เขากลับพบอุปสรรคชิ้นใหญ่","ความถี่ของพลังเวทที่ใช้ในการสื่อสารนั้นเปลี่ยนแปลงอยู่แทบจะทุกวินาที แม้เขาใช้เวลาปลุกปล้ำกับมันไปทั้งบ่าย แต่ก็ยังหาคลื่นความถี่ที่แน่นอนไม่ได้เลย ยิ่งไม่ต้องพูดถึงการถอดรหัส!","เพียงแค่มองจากจุดนี้ ก็เห็นได้ชัดว่า ‘สมาคมเวทมนตร์เร้นลับ’ นั้นมีของดีซ่อนอยู่จริงๆ...","แม้ว่าวิกตอริโอจะรักษาหน้าด้วยการไม่พูดออกไปตรงๆ แต่สีหน้าของเขาก็เปิดเผยทุกอย่างออกมาหมดแล้ว แฮร์รอฟย่อมดูออกว่าอีกฝ่ายกำลังเจอทางตัน","อันที่จริง เขาเองก็เคยลองทำแบบเดียวกันมาแล้ว แต่ก็คว้าน้ำเหลวเช่นกัน","หลังจากหยุดไปครู่หนึ่ง แฮร์รอฟก็เอ่ยด้วยสีหน้าเคร่งเครียด","“นอกจากนี้ ข้ายังสงสัยว่าวิธีเลื่อนขั้นเป็นระดับตำนานของพวกเขา จะไม่เหมือนกับพวกเรา!”"]},{"n":389,"t":"ทฤษฎีอะตอมของโปร์!","c":["“ไม่เหมือนงั้นหรือ? ไม่เหมือนยังไงล่ะ?”","วิกตอริโอเอ่ยถามด้วยความสับสนเล็กน้อย หรือว่ายังมีวิธีอื่นในการเลื่อนขั้นเป็นระดับตำนานอีกงั้นหรือ?","แฮร์รอฟครุ่นคิดอยู่ครู่หนึ่ง ราวกับกำลังสรรหาคำพูดที่ถูกต้องแม่นยำมาอธิบาย จู่ๆ เขาก็นึกอะไรบางอย่างขึ้นมาได้ จึงเอ่ยขึ้นว่า","“ข้าคิดว่าสถานะของพวกเขาอาจจะคล้ายคลึงกับใครบางคน...”","“เจ้าหมายถึง...เทพองค์นั้นน่ะหรือ?”","ออโรร่าพูดแทรกขึ้นมาด้วยความตกใจปนสงสัย","แฮร์รอฟพยักหน้าอย่างระมัดระวัง ก่อนหน้านี้เขายังนึกไม่ออกว่าความรู้สึกแปลกๆ นี้คืออะไร จนกระทั่งได้ปะทะกับเทพเอลาซึ่งๆ หน้า เขาถึงเพิ่งจะตระหนักได้ถึงความคล้ายคลึงกันระหว่างสองฝ่าย","“หรือว่าพวกเขาก็ใช้วิถีแห่งศรัทธาเหมือนกัน?”","ออโรร่าขมวดคิ้ว","แม้นางจะไม่ได้รังเกียจการใช้พลังจากวิธีนี้ เพราะเมื่อเทียบกับวิธีการเลื่อนขั้นอันแสนเก่าแก่และน่าขนลุก อย่างการแย่งชิงวิญญาณของพวกพ่อมดจิตวิญญาณแล้ว วิธีนี้ถือว่าสงบสุขกว่ามาก","แต่วิธีการนี้ก็มีข้อบกพร่องที่ร้ายแรงอย่างหนึ่ง นั่นคือมันสามารถเปลี่ยนแปลงความคิดของคนๆ หนึ่งได้อย่างลึกซึ้ง ซึ่งนั่นเป็นเหตุผลว่าทำไมพวกเขาถึงได้ปฏิเสธมัน","แฮร์รอฟพูดตัดบทข้อสันนิษฐานของออโรร่า","“แค่คล้ายคลึงเท่านั้น ข้าเคยพูดคุยกับพวกเขาในมิติขนาดเล็ก ความคิดของคนพวกนี้เฉียบคมมาก ดูแล้วไม่น่าจะมีความผิดปกติอะไร แถมทฤษฎีหรือหลักการต่างๆ ก็ไม่มีเรื่องไหนเกี่ยวข้องกับความศรัทธาเลย ตรงกันข้าม พวกเขากลับตั้งอยู่บนพื้นฐานของการค้นคว้ากฎเกณฑ์ของโลกใบนี้เฉกเช่นเดียวกับพวกเรา”","“งั้นเป็นไปได้ไหมว่า พวกเขาอาจจะหาวิธีหลีกเลี่ยงข้อบกพร่องนั้นได้แล้ว?”","วิกตอริโอเอ่ยอย่างลังเล","“จะเป็นไปได้ยังไง? ถ้าเป็นอย่างนั้นจริง ป่านนี้จักรวรรดิกับศาสนจักรคงไม่ได้อยู่อย่างสงบสุขแบบนี้หรอก”","แฮร์รอฟส่ายหน้า การใช้ ‘วิถีบรรลุเทพด้วยศรัทธา’ จำเป็นต้องมีผู้ศรัทธาจำนวนมหาศาล","ระดับตำนานมากมายขนาดนี้...เทพมากมายขนาดนี้ ทวีปทั้งทวีปคงได้วุ่นวายไปตั้งนานแล้ว ยิ่งไม่ต้องพูดถึงการอยู่ร่วมกันอย่างสันติเลย เพราะต่างฝ่ายต่างก็เป็นศัตรูตัวฉกาจของกันและกัน!","“เอาเถอะ ไม่ว่ายังไง ไปดูด้วยตาตัวเองเดี๋ยวก็รู้ไม่ใช่หรือ?”","ออโรร่าเอ่ยพร้อมรอยยิ้ม ขณะที่ ‘แหวนแห่งศาสตร์เร้นลับ’ บนนิ้วของนางเริ่มเปล่งแสงพลังเวทจางๆ ออกมา","เวลาเที่ยงคืนตรงมาถึงแล้ว!","วิกตอริโอพยักหน้ารับ ทั้งสามคนกระตุ้นพลังจากแหวนในมือแทบจะพร้อมกัน ภายใต้ความร่วมมืออย่างสมัครใจ พลังเวทที่ห่อหุ้มจิตวิญญาณเอาไว้ ก็ถูกพุ่งออกไปด้วยความเร็วแสงในทันที","วินาทีต่อมา ทั้งสามก็รู้สึกได้ว่าวิสัยทัศน์ของตัวเองถูกตัดขาด ก่อนที่พื้นที่อันมืดมิดจะปรากฏขึ้นเบื้องหน้า","“ที่นี่คือมิติขนาดเล็กงั้นหรือ?”","ออโรร่ามองไปรอบๆ ในห้วงอวกาศอันกว้างใหญ่ไพศาลเบื้องหน้า มีแสงดาวส่องประกายระยิบระยับนับไม่ถ้วน และมีดาวฤกษ์ดวงใหญ่ที่กำลังลุกไหม้อย่างร้อนแรงอยู่แทบเท้าของพวกเขา","เมื่อมองจากระยะไกล มันดูราวกับลูกไฟขนาดยักษ์ ‘เปลวเพลิง’ บนพื้นผิวของมันพวยพุ่งและขยายตัวอย่างต่อเนื่อง พร้อมกับปลดปล่อยแสงสว่างเจิดจ้าออกมา นี่คือตัวตนที่ยิ่งใหญ่ที่สุดเท่าที่ออโรร่าเคยพบเห็นมาในชีวิต!","แม้จะอยู่ห่างออกไปไม่รู้กี่กิโลเมตร แต่พวกเขาก็ยังสามารถสัมผัสได้ถึงแรงกดดันอันน่าสะพรึงกลัวได้อย่างชัดเจน มันคือความรู้สึกสั่นสะท้านที่มาจากส่วนลึกของจิตใจ!","ออโรร่าแยกแยะได้อย่างรวดเร็วว่า สิ่งนี้ไม่ใช่แค่ภาพลวงตาธรรมดาๆ โดยรอบๆ ดาวฤกษ์ดวงนี้ยังมีดวงดาวขนาดมหึมาอีกหลายดวงโคจรล้อมรอบอยู่ พวกมันหมุนรอบตัวเองและหมุนรอบดาวฤกษ์เป็นวัฏจักรซ้ำแล้วซ้ำเล่า...","‘สมาคมเวทมนตร์เร้นลับ’ ถึงกับจำลองภาพระบบดาวเคราะห์ออกมาได้เชียวหรือ...","สิ่งนี้ทำให้ออโรร่าผู้เชี่ยวชาญด้านดาราศาสตร์รู้สึกหลงใหลเป็นอย่างมาก เวลาที่นี่ดูเหมือนจะถูกเร่งความเร็วขึ้นเป็นพันเป็นร้อยเท่า ทำให้นางสามารถมองเห็นกฎการโคจรของดวงดาวได้อย่างชัดเจน โดยไม่จำเป็นต้องพึ่งพาการคำนวณหรือการสังเกตการณ์ทางดาราศาสตร์เพื่อจินตนาการเอาเองในหัว","วิกตอริโอเองก็ไม่ต่างกัน ไม่ว่าใครก็ตามที่ได้เผชิญหน้ากับดวงดาวอันยิ่งใหญ่เหล่านี้เป็นครั้งแรก ล้วนต้องรู้สึกตื่นตะลึงด้วยกันทั้งสิ้น","“ยินดีต้อนรับสู่ดินแดนเหนือกาลเวลา!”","น้ำเสียงที่อ่อนโยนดังขึ้นจากด้านหลังของพวกเขา","ออโรร่ารีบเก็บซ่อนอารมณ์ของตนเองในทันที ก่อนจะหันกลับไปมอง","ไม่รู้ว่าตั้งแต่เมื่อไหร่ ร่างสี่ร่างได้ปรากฏขึ้นและล่องลอยอยู่กลางอากาศเสียแล้ว","“ดูเหมือนพวกท่านคงจะเป็นผู้บริหารของ ‘สมาคมเวทมนตร์เร้นลับ’ สินะคะ ไม่ทราบว่าจะให้ข้าเรียกพวกท่านว่าอะไรดี?”","ออโรร่ายิ้มพลางเอ่ยถาม","“ผู้บริหารอะไรนั่นคงไม่ใช่หรอก...ที่นี่ไม่มีสิ่งที่เรียกว่าผู้บริหาร ไม่ว่าจะเป็น ‘สมาคมเวทมนตร์เร้นลับ’ หรือมิติเวทมนตร์แห่งนี้ ล้วนเป็นเพียงเครื่องมือที่ใช้สำหรับแลกเปลี่ยนความรู้เท่านั้น”","ชายชราที่อยู่ขวาสุดเอ่ยขึ้นอย่างสบายๆ เส้นผมสีขาวที่ยุ่งเหยิงฟูฟ่องบนศีรษะของเขา ดูราวกับดวงดาวในห้วงอวกาศอันกว้างใหญ่นี้ไม่มีผิด","แต่ออโรร่านั้นเชื่อครึ่งไม่เชื่อครึ่ง เพราะที่นี่ไม่น่าจะเป็นแค่สถานที่สำหรับแลกเปลี่ยนความรู้ง่ายๆ แบบนั้นหรอก","ลำพังแค่มิติขนาดเล็กและภาพระบบดาวเคราะห์ที่เพิ่งเห็นเมื่อครู่นี้ ก็ไม่รู้แล้วว่าต้องใช้พลังงานไปมากขนาดไหนถึงจะสร้างขึ้นมาได้","จากที่แฮร์รอฟเคยเล่าให้ฟัง จุดแสงในห้วงอวกาศแต่ละจุดนั้น เป็นตัวแทนของดาวฤกษ์หนึ่งดวง และภาพอันน่าตื่นตาตื่นใจแบบนี้ก็มีอยู่ทั่วทั้งมิติ...","“ชื่อเป็นเพียงแค่สัญลักษณ์เท่านั้น หากดึงดันที่จะเรียกให้ได้ล่ะก็ เรียกข้าว่า ไอน์สไตน์ ก็แล้วกัน”","ชายชราผมขาวกล่าวเสริม","คนอีกสามคนที่ยืนอยู่ข้างๆ ก็เริ่มแนะนำตัวเช่นกัน","“มารี สกวอดอฟสกา-กูว์รี...”","“ไอแซก นิวตัน...”","“นิลส์ โปร์!”","ชายคนสุดท้ายเอ่ยแนะนำตัวด้วยรอยยิ้ม","ออโรร่าพยักหน้ารับ ก่อนจะบอกชื่อของตัวเองไปเช่นกัน","ทางด้านวิกตอริโอก็กำลังสังเกตคนทั้งสี่อยู่เงียบๆ เช่นเดียวกับแฮร์รอฟ เขาเองก็เคยเผชิญหน้ากับการอัญเชิญเทพเอลามาแล้ว ดังนั้น เขาจึงสัมผัสได้อย่างรวดเร็วว่า พ่อมดระดับตำนานทั้งสี่คนของ ‘สมาคมเวทมนตร์เร้นลับ’ มอบความรู้สึกที่คล้ายคลึงกับเทพองค์นั้น แต่ในขณะเดียวกันก็มีบางอย่างที่แตกต่างออกไป...","ส่วนจุดสนใจของแฮร์รอฟนั้นอยู่ที่อื่น โดยสายตาของเขานั้นจับจ้องไปยังชายผมหยิกไม่วางตา ที่แท้เจ้าก็คือ นิวตัน คนที่โดนแอปเปิลหล่นใส่หัวนั่นเองสินะ?","ตอนที่เขามาเยือนมิติแห่งนี้ในครั้งก่อน เนื่องจากมัวแต่ตกตะลึงและถูกทำลายความมั่นใจซ้ำแล้วซ้ำเล่า การชุมนุมก็จบลงก่อนที่เขาจะได้ทำความรู้จักชื่อและตัวตนของแต่ละคน ดังนั้น จนถึงตอนนี้ แฮร์รอฟถึงเพิ่งจะมีความเข้าใจพื้นฐานเกี่ยวกับพวกเขา","“ในเมื่อมากันครบแล้ว งั้นเรามาเริ่มการหารือของวันนี้กันเถอะ!”","นิวตันยื่นมือออกไปดีดนิ้วดังเป๊าะ ทันใดนั้น ลูกไฟสีแดงขนาดยักษ์ที่อยู่ใต้เท้าของพวกเขาก็เริ่มยุบตัวลง ก่อนจะระเบิดออกอย่างรุนแรง...","และแล้วก็เกิดการระเบิดของซูเปอร์โนวาอีกครั้ง แสงสว่างและความร้อนอันไร้ที่สิ้นสุดสาดส่องไปทั่วทุกทิศทุกทาง ส่องสว่างไปทั่วห้วงอวกาศอันมืดมิด เป็นภาพอันตระการตาของการดับสูญของดาวฤกษ์ที่ทำลายล้างระบบดาวเคราะห์ทั้งระบบ","พวกเขายืนอยู่ไกลมาก กว่าแสงจะเดินทางมาถึงก็กินเวลาไปหลายนาที แต่พลังงานและคลื่นรังสีอันน่าสะพรึงกลัวนั้น ไม่ได้สร้างความเสียหายใดๆ ให้กับพวกเขาเลย ระหว่างพวกเขากับปรากฏการณ์นั้นราวกับมีแผ่นฟิล์มบางๆ กั้นอยู่ พวกเขาสัมผัสได้เพียงความร้อนที่แผดเผาจนแทบจะหลอมละลายวิญญาณ เมื่อตอนที่คลื่นรังสีพัดผ่านไปเท่านั้น","หลังจากที่คลื่นกระแทกที่รุนแรงที่สุดพาดผ่านไป นิวตัน ไอน์สไตน์ และกูรี ก็หันไปมองพ่อมดชายที่อยู่ข้างๆ","“การรวมตัวครั้งนี้เจ้าเป็นคนริเริ่มสินะ โปร์?”","“ถูกต้อง วันนี้เรื่องที่ข้าจะพูดก็คือเรื่อง อะตอม!”","โปร์พยักหน้าและเอ่ยอย่างเป็นธรรมชาติ"]},{"n":390,"t":"ใช้แรงโน้มถ่วงเป็นไม้บรรทัด ใช้กาลอวกาศเป็นฉากหลัง เหล่าระดับตำนานถึงกับตกตะลึง!","c":["“อะตอมงั้นหรือ?”","วิกตอริโอชะงักไปเล็กน้อย ก่อนจะเอ่ยถามด้วยความไม่เข้าใจ","“หรือก็คือ ธาตุ นั่นแหละ!”","โปร์พูดเสริม ก่อนจะเอ่ยถามต่อ","“พวกเจ้ามีความรู้ความเข้าใจเกี่ยวกับมันมากน้อยแค่ไหน?”","เมื่อเห็นว่าหัวข้อการหารือในครั้งนี้เกี่ยวข้องกับเรื่องของธาตุ แฮร์รอฟก็ถอนหายใจด้วยความโล่งอก เพราะถ้าขืนยังคุยเรื่องภาพระบบดาวเคราะห์หรือการเกิดดับของจักรวาลต่อไป เขาคงไม่มีปัญญาแม้แต่จะสอดปากพูดอะไรแน่ๆ","“ธาตุคือรากฐานในการก่อกำเนิดสรรพสิ่งบนโลกใบนี้ พวกเราต้องพึ่งพามันในการร่ายเวทมนตร์ส่วนใหญ่ และมันยังเป็นสายเวทมนตร์ที่เก่าแก่ที่สุดอีกด้วย...”","วิกตอริโอเป็นฝ่ายริเริ่มเปิดบทสนทนา","ศาสตร์แห่งธาตุคือแขนงวิชาเวทมนตร์ที่สำคัญที่สุดอย่างไม่ต้องสงสัย มันถูกยกย่องให้เป็นรากฐานของระบบเวทมนตร์เทียบเท่ากับพลังจิตวิญญาณ ถึงขั้นมีพ่อมดธาตุบางคนที่เย่อหยิ่งคิดว่า ไม่ว่าจะเป็นการเล่นแร่แปรธาตุ ปรุงยา แปรสภาพ หรืออะไรก็ตาม ท้ายที่สุดแล้วมันก็คือการใช้พลังของธาตุทั้งนั้น!","ตลอดหลายปีแห่งการค้นคว้าในดินแดนพ่อมด พวกเขาก็ค้นพบธาตุพื้นฐานทั้งหมดสี่สิบเก้าชนิด และสามารถนำมาพัฒนาต่อยอดจนกลายเป็นเวทมนตร์กว่าพันบท เรียกได้ว่าเป็นการสร้างยุคทองของเวทมนตร์เลยทีเดียว!","หลังจากนั้น ออโรร่าก็รับช่วงต่อจากวิกตอริโอ โดยนางพูดถึงองค์ประกอบและการใช้งานของธาตุผสม ไปจนถึงกฎเกณฑ์ของการทำปฏิกิริยาเวทมนตร์ระหว่างธาตุแต่ละชนิด...","เมื่อพูดจบ ทั้งสองคนก็หันไปมองพ่อมดระดับตำนานของ ‘สมาคมเวทมนตร์เร้นลับ’ พร้อมกัน","ลินน์ที่กำลังรับบทเป็นโปร์ ยืนฟังทั้งสองคนอธิบายเรื่องศาสตร์แห่งธาตุอย่างตั้งใจ และเมื่อเห็นว่าวิกตอริโอกับออโรร่าพูดถึงพื้นฐานเพียงเล็กน้อยแล้วก็หยุดลง เขาจึงอดไม่ได้ที่จะเอ่ยขึ้นว่า","“แค่นี้เองหรือ? แล้วเรื่องอื่นๆ ล่ะ?”","วิกตอริโอขมวดคิ้ว ก่อนจะเอ่ยว่า","“การค้นคว้าเกี่ยวกับธาตุของดินแดนพ่อมดในปัจจุบันก็คงมีแค่นี้แหละ ดูเหมือนว่าเจ้าจะมีมุมมองที่ลึกซึ้งกว่านี้สินะ?”","“แน่นอน ข้าคิดว่าความเข้าใจเกี่ยวกับธาตุของพวกเจ้านั้นตื้นเขินเกินไปจริงๆ!”","โปร์ส่ายหน้าพลางถอนหายใจ","หลังจากที่อยู่ในดินแดนพ่อมดมาปีกว่าๆ เขาก็พอจะเข้าใจทฤษฎีเวทมนตร์ของบรรดาพ่อมดอยู่บ้าง ซึ่งระดับความรู้ของพวกเขาก็คงเทียบเท่ากับเด็กมัธยมต้นในชาติก่อน หรือบางทีอาจจะรู้น้อยกว่าเด็กมัธยมต้นเสียอีก...","เพียงแต่ก่อนหน้านี้ ลินน์เคยได้ยินมาว่า ‘ผู้ควบคุมธาตุ’ อัลทอค เคยพยายามศึกษาลึกลงไปถึงระดับจุลภาค เขาจึงลองหยั่งเชิงถามออโรร่ากับคนอื่นๆ ดู ว่าพวกเขามีความรู้ความเข้าใจในด้านนี้มากน้อยแค่ไหน","แต่ผลลัพธ์ที่ได้กลับทำให้เขาผิดหวังมาก...","แต่พอลองคิดดูดีๆ มันก็เป็นเรื่องปกติ พวกเขาในชาติก่อนล้วนยืนอยู่บนไหล่ของยักษ์ ทฤษฎีและสูตรทุกอย่างที่ร่ำเรียนมา ล้วนเป็นสิ่งที่ปรมาจารย์ด้านฟิสิกส์และเคมีทุ่มเทใช้เวลาทั้งชีวิตในการค้นคว้าและสรุปออกมาทั้งสิ้น","ในขณะที่บรรดาพ่อมดต้องเริ่มคลำหาหนทางใหม่ตั้งแต่ศูนย์","ถึงแม้เวทมนตร์จะมอบความสะดวกสบายให้มากมาย แต่ในบางครั้งมันก็อาจเป็นเหมือนเส้นผมบังภูเขา ที่ทำให้พวกเขาหยุดชะงักและไม่ก้าวหน้าในบางสาขาวิชาไปหลายปี","คำพูดที่ดูถูกเหยียดหยามของโปร์ ทำให้ออโรร่าถึงกับหรี่ตาลง ส่วนใบหน้าของวิกตอริโอก็ฉายแววไม่พอใจอย่างเห็นได้ชัด แต่ก่อนที่พวกเขาจะทันได้ระเบิดอารมณ์ออกมา อีกฝ่ายก็พูดต่อว่า","“นอกจากคุณสมบัติทางเคมีพื้นฐานแล้ว ข้าคิดว่าเรื่องมวล ความหนาแน่น จุดหลอมเหลว จุดเดือด มวลโมเลกุล คาบ และอื่นๆ ของธาตุ ล้วนเป็นหัวข้อที่คู่ควรแก่การศึกษาวิจัยเป็นอย่างยิ่ง...”","โปร์ร่ายยาวออกมาเป็นชุด ทำเอาวิกตอริโอถึงกับปวดหัวตึบ จนอดไม่ได้ที่จะขัดขึ้นมาว่า","“เดี๋ยวก่อน เรื่องมวลโมเลกุลกับคาบอะไรนั่นพักไว้ก่อนเถอะ แต่ไอ้ที่เรียกว่าความหนาแน่นกับมวลเนี่ย มันจะคำนวณออกมาได้ยังไง?”","ขนาดของธาตุนั้นเล็กมาก เล็กเสียจนมองด้วยตาเปล่าไม่เห็น แถมพวกมันยังเคลื่อนที่อยู่ตลอดเวลา แล้วพวกเขาจะไปหาไม้บรรทัดหรือตาชั่งที่เล็กขนาดนั้นมาจากไหน เพื่อนำมาวัดขนาดและชั่งน้ำหนักให้ได้ผลลัพธ์ที่แม่นยำ","อีกอย่าง ธาตุบางชนิดอย่างไฮโดรเจน ยังมีแรงลอยตัวพุ่งขึ้นสู่อากาศ การจะชั่งน้ำหนักมันจึงเป็นเรื่องเพ้อฝันชัดๆ เป็นไปไม่ได้เลยที่จะคำนวณออกมาเป็นน้ำหนักติดลบใช่ไหมล่ะ?","วิกตอริโอทำหน้าเยาะเย้ย สิ่งที่เรียกว่าการชั่งน้ำหนัก มันก็แค่เรื่องเพ้อเจ้อไร้สาระ!","“หรือว่าถ้าไม่มีไม้บรรทัดกับตาชั่ง เราก็จะประเมินน้ำหนักและปริมาตรของสิ่งต่างๆ ไม่ได้เลยงั้นหรือ?”","โปร์เอ่ยถามด้วยรอยยิ้ม","ถ้าไม่ใช้วิธีนี้แล้วเราจะคำนวณยังไงล่ะ?","วิกตอริโอที่กำลังไม่พอใจตั้งท่าจะเถียงกลับ แต่ในวินาทีต่อมาเขาก็ต้องชะงักไป เพราะจู่ๆ เขาก็นึกขึ้นมาได้ว่า ตอนที่พวกเขาคำนวณมวลของดวงดาว พวกเขาก็ไม่ได้ใช้ตาชั่งเหมือนกันนี่นา!","คุณสมบัติของทั้งสองอย่างตรงข้ามกันอย่างสิ้นเชิง อันหนึ่งใหญ่โตมโหฬาร ส่วนอีกอันก็เล็กจิ๋วสุดๆ...","“เจ้าหมายความว่า...?”","แฮร์รอฟก็นึกถึงความเป็นไปได้อย่างหนึ่งขึ้นมาได้ทันที เขาจึงหันไปมองโปร์ด้วยความตกตะลึง","โปร์ไม่ได้ตอบอะไร เขากลับใช้นิ้วเขียนตัวเลขชุดหนึ่งขึ้นมากลางอากาศ","[6.67×10^-11 N·m^2/kg^2!]","“ใช้เจ้านี่เป็นไม้บรรทัดดีไหมล่ะ?”","โปร์เอ่ยด้วยน้ำเสียงขบขัน","“นี่มัน...ค่าคงที่ความโน้มถ่วงสากลงั้นหรือ?”","ทุกคนที่อยู่ที่นั่นต่างก็มองออกในทันที ในตอนที่ลินน์คำนวณหาค่าคงที่ความโน้มถ่วง แฮร์รอฟกับออโรร่าก็อยู่ในเหตุการณ์ด้วย พวกเขาจึงประทับใจในสิ่งนี้เป็นอย่างมาก","“หมายความว่า ใช้กาลอวกาศเป็นฉากหลัง และใช้ค่าคงที่ความโน้มถ่วงสากลเป็นไม้บรรทัด...”","แฮร์รอฟเป็นคนแรกที่เข้าใจความหมาย","“ถูกต้อง ข้าเองก็ได้ยินเรื่องการทดลองของลินน์ที่ดินแดนพ่อมดมาบ้างเหมือนกัน ต้องยอมรับเลยว่ามันเป็นความคิดที่ยอดเยี่ยมมาก!”","โปร์เอ่ยชมเชย","“อย่างที่ทราบกันดี มวลของวัตถุจะส่งผลกระทบต่อกาลอวกาศ ซึ่งค่านี้สามารถคำนวณได้โดยใช้สูตรความโน้มถ่วงสากล อีกทั้งค่าคงที่ความโน้มถ่วงก็ไม่อาจเปลี่ยนแปลงได้ มันจึงเป็นไม้บรรทัดที่ดีที่สุด!”","“แม้ว่าอะตอมเพียงหนึ่งตัว จะสร้างความผันผวนให้กับกาลอวกาศเพียงเล็กน้อยจนยากที่จะวัดค่าได้อย่างแม่นยำ แต่เราสามารถสร้างพื้นที่สุญญากาศขึ้นมา แล้วรวบรวมธาตุชนิดเดียวกันเอาไว้ จากนั้นก็ใช้วิธีขยายการบิดเบี้ยวขนาดเล็ก เพื่อขยายความผันผวนที่พวกมันสร้างต่อกาลอวกาศให้ชัดเจนยิ่งขึ้น และในขั้นตอนสุดท้ายของการคำนวณ เราก็แค่หารด้วยตัวคูณนั้นออกไป เพียงเท่านี้เราก็สามารถคำนวณย้อนกลับ เพื่อหามวลของธาตุได้แล้ว!”","วิธีนี้ไม่ใช่การลอกเลียนแบบความคิดของใคร แต่เป็นสิ่งที่ลินน์คิดค้นขึ้นมาโดยอาศัยคุณสมบัติพิเศษของพ่อมด","เพราะการพัฒนาเทคโนโลยีในชาติก่อน ไม่ได้มีวิธีการรับรู้กาลอวกาศและควบคุมอะตอมที่ดีขนาดนี้ ดังนั้นการคำนวณมวลของอะตอม จึงต้องอาศัยกฎการเคลื่อนที่ข้อที่สองของนิวตัน หรือ F=ma ในการคำนวณย้อนกลับ","a คือความเร่งของวัตถุที่มีมวล m เมื่อได้รับแรง F ดังนั้น เพียงแค่สลับสูตรนิดหน่อย ก็จะได้ว่ามวล m เท่ากับแรง F หารด้วยความเร่ง a!","แน่นอนว่า เนื่องจากอะตอมนั้นเล็กเกินไป จึงจำเป็นต้องใช้เครื่องแมสสเปกโตรเมทรี เข้ามาช่วย...","ในระยะเวลาอันสั้นนี้ เขาคงไม่สามารถสร้างเจ้านั่นขึ้นมาได้ แต่โชคดีที่บรรดาพ่อมดก็มีวิธีในแบบของพ่อมด!","พวกเขามีความสามารถในการควบคุมอะตอมและรับรู้ถึงกาลอวกาศ ซึ่งเป็นข้อได้เปรียบอันเป็นเอกลักษณ์เฉพาะในการ ‘วิจัยเวทมนตร์’ แน่นอนว่าเขาต้องดึงมันมาใช้ประโยชน์ให้ได้มากที่สุด!","ส่วนเรื่องปัญหาใช่ว่าจะไม่มี เช่น การที่อะตอมหลายตัวอาจจะสร้างความปั่นป่วนและส่งผลกระทบซึ่งกันและกัน จนทำให้ผลการวัดคลาดเคลื่อน แต่โชคดีที่พวกเขาสามารถปรับจำนวนของอะตอม เพื่อค่อยๆ หาอัตราส่วนที่เหมาะสม และลดปัจจัยรบกวนให้เหลือน้อยที่สุดได้...","“ช่างเป็นความคิดที่ยอดเยี่ยมจริงๆ!”","วิกตอริโอยอมจำนนอย่างราบคาบ ความคิดที่สร้างสรรค์และลึกล้ำของพ่อมด ‘สมาคมเวทมนตร์เร้นลับ’ ทำให้เขารู้สึกเลื่อมใสจากใจจริง","ก่อนหน้านี้ ตอนที่คำนวณหาเส้นรอบวงของดาวเคราะห์ พวกเขาก็ใช้สูตรสามเหลี่ยมที่เรียบง่ายที่สุดอย่างทฤษฎีบทพีทาโกรัส และในครั้งนี้ พวกเขากลับใช้ค่าคงที่ความโน้มถ่วงสากล!"]},{"n":391,"t":"จัดอันดับธาตุทั้งหมด ตารางธาตุ!","c":["ออโรร่าและแฮร์รอฟเองก็ต่างจมดิ่งไปกับหลักการคำนวณมวลอะตอมอันแสนแยบยลนี้ ไม่ต่างอะไรกับวิกตอริโอ","ธาตุนั้นมีขนาดเล็กเพียงใด พวกเขาเองก็ไม่รู้ เพราะในหยดน้ำเพียงหนึ่งหยด ก็มีธาตุน้ำอยู่หลายแสนหรืออาจจะถึงหลายล้านตัว และธาตุน้ำก็ประกอบขึ้นจากธาตุพื้นฐานอย่างไฮโดรเจนและออกซิเจน คงทำได้เพียงใช้คำว่า เล็กจนเหลือเชื่อ มาอธิบายเท่านั้น!","หากไม่สามารถรับรู้ได้ด้วยพลังเวท เกรงว่าพ่อมดหลายคนคงจะสงสัยด้วยซ้ำว่าสิ่งที่มีชื่อเรียกว่าธาตุนี้ มีอยู่จริงบนโลกหรือไม่","การคำนวณปริมาตรและน้ำหนักให้กับธาตุที่เล็กจิ๋วปานนี้ แทบจะเป็นเรื่องที่เป็นไปไม่ได้ แต่โปร์กลับเปลี่ยนสิ่งที่เป็นไปไม่ได้ให้กลายเป็นไปได้!","ก่อนหน้านี้ ตอนที่ลินน์คำนวณหาค่าคงที่ เขาก็ใช้การทดลองที่คล้ายคลึงกัน โดยใช้แสงขยายแรงดึงดูดอันแผ่วเบาที่มองไม่เห็นด้วยตาเปล่าระหว่างลูกเหล็กสองลูก เพื่อคำนวณออกมาได้อย่างแม่นยำ!","นี่เป็นเรื่องที่สามารถทำได้จริง!","ในขณะที่ทั้งสามคนกำลังทึ่งอยู่นั้น ไอแซก นิวตัน ที่อยู่ด้านข้างก็เริ่มเอ่ยด้วยน้ำเสียงหงุดหงิดเล็กน้อย","“วันนี้เรื่องที่เจ้าจะพูดคงไม่ได้มีแค่นี้หรอกใช่ไหม โปร์? เรื่องตื้นเขินพวกนี้ไม่มีความจำเป็นต้องพูดให้มากความหรอก!”","ตื้นเขิน...สีหน้าของวิกตอริโอกลายเป็นแปลกประหลาด แต่เขาก็ไม่สามารถเอ่ยปากเถียงอะไรออกไปได้ เพราะลำพังแค่ไอ้เรื่องตื้นเขินพวกนี้ พวกเขายังคำนวณออกมาไม่ได้เลย!","ในหัวของวิกตอริโออดไม่ได้ที่จะนึกถึงคำพูดของใครบางคน ตอนที่เพิ่งมาถึงดินแดนพ่อมดใหม่ๆ","[ทฤษฎีเวทมนตร์ของดินแดนพ่อมดล้าหลังไปตั้งนานแล้ว!]","วิกตอริโอและออโรร่ามองหน้ากัน ก่อนจะยิ้มแห้งๆ ออกมาพร้อมกัน","แฮร์รอฟส่ายหน้า เขาเคยบอกไปแล้วว่า อยู่ที่นี่ต้องระมัดระวังคำพูดและการกระทำให้ดี เพื่อไม่ให้ความรู้ที่น้อยนิดของพวกเขาต้องถูกเปิดเผย...","ในขณะที่รู้สึกจนปัญญา ทั้งสามคนก็หันไปมองโปร์ด้วยความสงสัยใคร่รู้ว่า จุดประสงค์ที่แท้จริงของการเรียกพวกเขามาพบในครั้งนี้คืออะไรกันแน่","“เรื่องที่ข้าจะพูดแน่นอนว่าไม่ได้มีแค่นี้!”","โปร์รับคำของไอแซก ก่อนจะเอ่ยด้วยน้ำเสียงโอหังเล็กน้อย","“อันที่จริง ข้ากำลังเตรียมที่จะจัดอันดับอะตอมทั้งหมด!”","โปร์ดีดนิ้วเป๊าะ ตารางขนาดใหญ่ก็ปรากฏขึ้นเบื้องหน้าทุกคน","ตารางนั้นถูกจัดเรียงเป็นแถวแนวนอนและแนวตั้ง แต่มันยังไม่ได้ถูกเติมตัวเลขหรือสัญลักษณ์ใดๆ ลงไป เป็นเพียงแค่ตารางเปล่าๆ เท่านั้น","“ตารางนี้ข้ายังทำไม่เสร็จ เพราะยังขาดปัจจัยสำคัญอีกหลายอย่าง ซึ่งอาจจะส่งผลต่อลำดับของพวกมัน ข้าจึงหวังว่าทุกท่านจะมาช่วยกันทำให้มันสมบูรณ์!”","โปร์เอ่ยด้วยน้ำเสียงจริงใจ","“ท่านโปร์ ความรู้ความเข้าใจเกี่ยวกับธาตุของท่าน ก็น่าจะชัดเจนมากพอแล้วไม่ใช่หรือ?”","วิกตอริโอถามด้วยความสับสน","ในเมื่ออีกฝ่ายมีวิธีคำนวณหามวลของธาตุได้ ปริมาตรก็ไม่น่าจะใช่ปัญหา แถมยังมีเรื่องความหนาแน่น มวลโมเลกุลอะไรนั่นอีก เรียกได้ว่ารู้ลึกรู้จริงจนแทบจะพลิกธาตุกลับตะเข็บดูได้อยู่แล้ว!","“ไม่มีใครกล้าพูดหรอกว่าตัวเองเข้าใจอะตอมอย่างทะลุปรุโปร่ง และข้าเองก็ไม่ใช่ข้อยกเว้น!”","โปร์ส่ายหน้าพลางถอนหายใจ","“สำหรับอะตอม แม้ข้าจะทำการค้นคว้ามาบ้างอย่างผิวเผิน แต่ก็ยังมีอยู่จุดหนึ่งที่ข้ายังไม่เข้าใจมันอย่างถ่องแท้ นั่นก็คือ โครงสร้างของอะตอม!”","“โครงสร้าง? ท่านหมายถึงรูปร่างของธาตุงั้นหรือ?”","ออโรร่าโพล่งถามขึ้นมา","“ไม่ใช่ โครงสร้างภายในต่างหาก!”","โปร์เน้นย้ำ","“ข้าคิดว่าอะตอมสามารถแบ่งแยกได้!”","คำพูดของโปร์ถือเป็นการท้าทายทฤษฎีเวทมนตร์กระแสหลักของดินแดนพ่อมดอย่างไม่ต้องสงสัย เพราะพ่อมดทุกคนที่เริ่มเรียนเวทมนตร์จะถูกสอนมาตลอดว่า ธาตุคือสสารที่เป็นรากฐานของการก่อกำเนิดโลกทั้งใบ!","ทฤษฎีที่ว่าธาตุไม่สามารถแบ่งแยกได้นั้น ได้รับการพิสูจน์ผ่านการทดลองมาแล้วนับครั้งไม่ถ้วน!","แม้จะอยู่ภายใต้อุณหภูมิสูงนับหมื่นองศา หรือถูกนำมาพุ่งชนกัน ตัวธาตุเองก็ยังคงมั่นคงดุจขุนเขา!","ในตอนที่นำมาตัดก็เช่นกัน แม้ของมีคมจะทะลวงผ่านไปได้ แต่ธาตุที่อยู่ภายในกลับไม่ได้รับความเสียหายใดๆ ‘ผู้ควบคุมธาตุ’ อย่างอัลทอค ถึงขั้นเคยสรุปเอาไว้ว่า ธาตุแต่ละตัวจะผลักไสกันเอง และมีระยะห่างระหว่างกันที่น้อยที่สุดอยู่","ถึงขนาดมีพ่อมดบางคนเชื่อว่า ธาตุคือสสารที่แข็งแกร่งที่สุดในโลก และไม่มีวันถูกทำลายได้","แต่เนื่องจากเมื่อครู่นี้ โปร์เพิ่งจะอธิบายวิธีการคำนวณอะตอมอันแสนแยบยล ซึ่งเปลี่ยนสิ่งที่เป็นไปไม่ได้ให้กลายเป็นไปได้ ทั้งสามคนจึงไม่ได้เอ่ยปากโต้แย้งออกไปสุ่มสี่สุ่มห้า ทำได้เพียงยืนฟังเหล่าระดับตำนานของสมาคมเวทมนตร์เร้นลับ ถกเถียงกันว่าโครงสร้างภายในของอะตอมนั้น เป็น ‘ทรงกลมตัน’ ‘ลูกเกด’ หรือ ‘รูปแตงโม’ กันแน่...","ทฤษฎีเกี่ยวกับโครงสร้างอะตอมเหล่านี้ไม่ใช่แค่การจินตนาการไปเองลอยๆ อย่างน้อยก็มีความสอดคล้องทางตรรกะ และมีพื้นฐานความเป็นจริงรองรับ โปร์ยังเคยทำการทดลองเพื่อพิจารณาว่าภายในอะตอมนั้นเป็นทรงตันหรือกลวงอีกด้วย","ในวินาทีนี้ วิกตอริโอและออโรร่าต่างก็สัมผัสได้อย่างลึกซึ้ง ถึงความรู้สึกเหมือนนั่งอยู่บนเข็มทิ่มแทงของแฮร์รอฟ ในตอนที่เขาเข้าร่วมการประชุมหารือเป็นครั้งแรก","มันเหมือนกับพ่อมดฝึกหัดที่หลงเข้าไปอยู่ในกลุ่มของพ่อมดเต็มตัว ที่กำลังถกเถียงกันว่าจะใช้พลังเวทจำลองธาตุได้อย่างไร ซึ่งอธิบายได้ด้วยคำว่ามึนงงและทำตัวไม่ถูกเท่านั้น","เมื่อต้องเผชิญกับคำถามที่ถูกโยนมาเป็นระยะๆ เหงื่อเย็นๆ ก็ผุดซึมเต็มหน้าผากของวิกตอริโอ โดยเขาต้องฝืนตอบไปสองสามประโยคเพื่อเอาตัวรอดไปที","สิ่งเดียวที่ทำให้เขารู้สึกโล่งใจก็คือ ดูเหมือนโปร์และคนอื่นๆ จะยังไม่เข้าใจโครงสร้างภายในของอะตอมอย่างสมบูรณ์เช่นกัน และปัจจุบันทฤษฎีเหล่านี้ยังอยู่ในขั้นตอนของการปรับปรุงให้สมบูรณ์ แต่ยังขาดหลักฐานเชิงประจักษ์...","และนี่ก็คือเป้าหมายของการหารือในครั้งนี้ เพื่อสำรวจแก่นแท้ของอะตอม แล้วสร้างตารางจัดอันดับธาตุตามคุณสมบัติของพวกมัน!","หากทำสำเร็จ ไม่ต้องสงสัยเลยว่า [ตารางจัดอันดับธาตุ] นี้ จะกลายเป็นรากฐานของระบบเวทมนตร์ทั้งหมด!","นั่นหมายความว่าความเข้าใจและการใช้งานธาตุของบรรดาพ่อมด จะก้าวเข้าสู่อีกระดับที่เหนือล้ำยิ่งกว่า!","แต่อะตอมสามารถแบ่งแยกได้จริงๆ หรือ?","แล้วต้องใช้พลังระดับไหนกัน ถึงจะสามารถผ่าอะตอมหนึ่งตัวออกเป็นสองซีกได้...","วิกตอริโอตกอยู่ในห้วงความคิดอย่างหนัก ประธานสภาอีกคนอย่างอัลทอค ก็เคยตั้งสมมติฐานที่คล้ายคลึงกัน และพยายามที่จะศึกษาลงลึกไปในระดับจุลภาค แต่ก็ไม่มีใครรู้ว่าเขาทำสำเร็จหรือไม่ รู้เพียงแต่ว่าเขาดูเหมือนคนเสียสติ เอาแต่พร่ำเพ้อพูดจาเลื่อนเปื้อนเกี่ยวกับวิญญาณธาตุอยู่ทุกวัน แม้แต่ต้นฉบับที่ทิ้งไว้ก็มีแต่ข้อความไร้สาระทั้งหน้ากระดาษ","และด้วยเหตุนี้เอง พวกเขาจึงได้ระงับการทดลองและการค้นคว้าเกี่ยวกับธาตุไป...ดูเหมือนว่าตอนนี้ จะมีความจำเป็นต้องรื้อฟื้นมันขึ้นมาใหม่อีกครั้งแล้ว","การหารือเกี่ยวกับคุณสมบัติและโครงสร้างภายในของอะตอมดำเนินไปกว่าหนึ่งชั่วโมง และโมเดลที่เป็นไปได้หลายรูปแบบถูกจำลองขึ้นมาด้วยพลังเวทและแสดงให้เห็นกลางอากาศ ซึ่งเป็นการเปิดหูเปิดตาให้กับแฮร์รอฟ ออโรร่า และวิกตอริโอ เป็นอย่างมาก","จนกระทั่งการหารือใกล้จะสิ้นสุดลง ออโรร่าก็ก้าวออกไปข้างหน้า และเริ่มเข้าสู่เรื่องสำคัญ","“ทุกท่าน ข้าคิดว่าพวกท่านคงพอจะทราบเรื่องสงครามระหว่างศาสนจักรกับอาณาจักรที่เพิ่งเกิดขึ้นเร็วๆ นี้แล้วใช่ไหม?”","“ได้ยินมาบ้างเหมือนกัน”","ไอน์สไตน์ผู้มีผมและหนวดเคราสีขาวโพลน ซึ่งยืนอยู่ทางซ้ายมือพยักหน้ารับ ก่อนจะเอ่ยต่อ","“การต่อสู้ในครั้งนี้พวกเจ้าได้รับชัยชนะ และขับไล่กองกำลังปราบปรามของศาสนจักรออกจากอาณาจักรไปได้แล้วไม่ใช่หรือ?”","ชัยชนะ?","แฮร์รอฟส่ายหน้าด้วยความขมขื่น แทนที่จะเรียกว่าชัยชนะ สู้บอกว่าพวกเขารอดตายมาได้เพราะโชคช่วยยังจะดีเสียกว่า!"]},{"n":392,"t":"พ่อมดหกวงแหวนคือขีดจำกัดที่มนุษย์สามารถไปถึงได้!","c":["เมื่อเห็นใบหน้าที่ดูไม่ได้ของแฮร์รอฟ โปร์ก็อดไม่ได้ที่จะหัวเราะเบาๆ","“ดูเหมือนพวกเจ้ากำลังเผชิญกับปัญหาบางอย่างอยู่สินะ?”","“ปัญหานี้ไม่ได้มีแค่พวกเราที่ต้องเผชิญหรอกนะ”","ออโรร่าชิงพูดขึ้นมา พร้อมกับตอบโต้ด้วยถ้อยคำที่เผ็ดร้อน","“การที่จักรวรรดิและศาสนจักรเป็นภัยคุกคามต่อพื้นที่อยู่อาศัยของบรรดาพ่อมด เรื่องนี้ไม่เพียงแต่จะเกี่ยวข้องกับสภาเท่านั้น แต่มันยังเกี่ยวข้องกับ ‘สมาคมเวทมนตร์เร้นลับ’ ด้วยไม่ใช่หรือ?”","เมื่อเทียบกับดินแดนพ่อมดที่ถูกตัดขาดจากโลกภายนอกโดยมีทะเลกั้นขวาง สมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ ต่างหากล่ะ ที่ถูกศาสนจักรคุกคามอย่างหนักที่สุด พ่อมดระดับตำนานอย่างโปร์อาจจะไม่สนใจการถูกไล่ล่า แต่สมาชิกธรรมดาทั่วไปคงไม่ได้เก่งกาจถึงขั้นนั้นทุกคนแน่","“อีกอย่าง แผนการของอาณาจักรเวทมนตร์ก็ถูกเสนอและดำเนินการโดยสมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ เรื่องนี้สมควรจะเป็นกิจการภายในของ ‘สมาคมเวทมนตร์เร้นลับ’ ตั้งแต่แรกแล้วต่างหาก”","วิกตอริโอที่อยู่ด้านข้างก็พูดเสริมขึ้นมา","แม้ว่าหนึ่งในเป้าหมายของการเข้าร่วมการชุมนุมระดับตำนานในครั้งนี้ คือการแสวงหาพันธมิตร แต่ไม่ว่าจะเป็นออโรร่าหรือวิกตอริโอ ต่างก็เห็นได้ชัดว่าไม่ต้องการสูญเสียความได้เปรียบในการเจรจา เพียงแค่คำพูดไม่กี่ประโยค พวกเขาก็สามารถปัดความรับผิดชอบกลับไปให้อีกฝ่ายได้แล้ว","ตอนนี้คนที่ต้องต่อกรกับศาสนจักรได้กลายเป็นบรรดาสมาชิกของ ‘สมาคมเวทมนตร์เร้นลับ’ ไปเสียแล้ว ส่วนดินแดนพ่อมดก็เป็นเพียงผู้ที่คำนึงถึงภาพรวม จึงได้ยื่นมือเข้ามาช่วยเหลือเพื่อไม่ให้สถานการณ์เลวร้ายลง...","คนระดับสูงของสมาคมเวทมนตร์เร้นลับอย่างโปร์ หากไม่ลงมือช่วยเหลือ มันก็คงจะดูไม่สมเหตุสมผลเอาเสียเลย!","แผนการของออโรร่าเรียกได้ว่าแยบยลมาก แต่พ่อมดระดับตำนานของ ‘สมาคมเวทมนตร์เร้นลับ’ ย่อมไม่ถูกหลอกให้คล้อยตามไปง่ายๆ","มาดามกูว์รีเอ่ยด้วยรอยยิ้มว่า","“พวกเราแตกต่างจากพวกเจ้า ‘สมาคมเวทมนตร์เร้นลับ’ ไม่ได้จำกัดอิสระในการกระทำของสมาชิก พวกเขามีสิทธิ์ที่จะตัดสินใจว่าจะทำอะไร และก็ควรที่จะรับผิดชอบต่อการกระทำของตัวเองด้วยเช่นกัน...”","พูดอีกอย่างก็คือ แผนการของอาณาจักรเวทมนตร์ไม่ได้ถูกกำหนดขึ้นโดยพวกเขา และพวกเขาก็ไม่ได้มีหน้าที่ที่จะต้องไปช่วยเหลือสมาชิกคนใดคนหนึ่งเป็นพิเศษ","ท่าทีที่ดูไม่ใส่ใจของพวกเขา ทำให้ออโรร่ารู้สึกประหลาดใจเป็นอย่างมาก เพราะตามที่นางคาดการณ์ไว้ ลินน์น่าจะมีสถานะใน ‘สมาคมเวทมนตร์เร้นลับ’ ไม่ต่ำต้อยอย่างแน่นอน อย่างน้อยก็ควรจะเป็นลูกศิษย์ของระดับตำนานสักคน ด้วยพรสวรรค์และความแข็งแกร่งของเขา ย่อมเป็นตัวตนที่องค์กรเวทมนตร์ใดๆ ก็มิอาจทอดทิ้งได้","สรุปว่าพวกเขาแน่ใจว่าลินน์จะไม่ตกอยู่ในอันตราย หรือพวกเขาก็แค่ไม่สนใจจริงๆ กันแน่?","นิวตันผู้มีเส้นผมหยิกสลวย เอ่ยปากตอบข้อสงสัยในใจของออโรร่าว่า","“อันที่จริง ด้วยสภาพของพวกเราในตอนนี้ ไม่สะดวกที่จะลงมือทำอะไรสักเท่าไหร่ ต่อให้มีใจอยากจะช่วยพวกเจ้า ก็คงทำไม่ได้อยู่ดี”","ไม่สะดวกที่จะลงมือ เป็นเพราะได้รับบาดเจ็บสาหัสอย่างงั้นหรือ? หรือว่า...","แฮร์รอฟและวิกตอริโอต่างก็ครุ่นคิดถึงความเป็นไปได้ต่างๆ นานา ในขณะที่ออโรร่าเลือกที่จะถามออกไปตรงๆ ว่า","“ทุกท่าน โปรดพูดมาตามตรงเถิด หากพวกท่านมีปัญหาอะไร ก็ลองบอกมาได้ เผื่อพวกเราจะได้ช่วยกันคิดหาวิธีแก้ไข”","ลินน์แอบปวดหัวอยู่เงียบๆ ออโรร่ารับมือยากกว่าแฮร์รอฟเสียอีก ผู้หญิงคนนี้คิดอะไรก็พูดออกมาอย่างนั้น ไม่มีความเกรงใจเลยสักนิด!","หลังจากครุ่นคิดอยู่ครึ่งวินาที ลินน์ก็ควบคุมโปร์ให้พูดขึ้นว่า","“ถือเสียว่า ในตอนนี้พวกเราไม่ได้อยู่บนทวีปแห่งนี้ก็แล้วกัน”","และก่อนที่ทั้งสามคนจะได้ถามอะไรต่อ เขาก็พูดขึ้นมาอีกครั้ง","“หากพวกเจ้าต้องการที่จะรับมือกับเทพ ‘เอลา’ ละก็ ข้าก็พอจะมีข้อมูลและคำแนะนำอยู่บ้าง”","“ข้าเคยปะทะกับเทพจอมปลอมองค์นั้น และระดับตำนานของศาสนจักรมาแล้ว ขอพูดตามตรงเลยว่า ระดับพลังจิตวิญญาณและระดับชีวิตของพวกนั้น สูงส่งกว่าพวกเจ้ามากนัก!”","“หรือจะพูดอีกอย่างก็คือ ระดับพลังจิตวิญญาณของพวกเจ้า ดูเหมือนจะมีแค่ระดับจอมเวทผู้ยิ่งใหญ่เท่านั้น!”","คำพูดของลินน์สามารถดึงดูดความสนใจของออโรร่าและคนอื่นๆ ได้สำเร็จ ในชั่วพริบตา ก็ไม่มีใครสนใจที่จะถามแล้วว่า ทำไมพวกเขาถึงไม่อยู่บนทวีปแห่งนี้","จิตใจของวิกตอริโอสั่นสะท้าน ก่อนจะรีบเอ่ยถามว่า","“หรือว่าพวกท่าน...ค้นพบวิธีที่จะก้าวข้ามขีดจำกัดนั้นได้แล้วงั้นหรือ?”","ขีดจำกัด...","คำๆ นี้ทำเอาลินน์ถึงกับไม่รู้จะตอบกลับไปอย่างไร","แต่แฮร์รอฟและออโรร่ากลับเข้าใจเป็นอย่างดี ว่าวิกตอริโอกำลังพูดถึงเรื่องอะไร","พ่อมดหกวงแหวน คือขีดจำกัดที่มนุษย์สามารถก้าวไปถึงได้!","มันเหมือนกับกำแพงอันแข็งแกร่ง ที่ตั้งตระหง่านอยู่ตรงหน้าจอมเวทผู้ยิ่งใหญ่ทุกคน ซึ่งแตกต่างจากอุปสรรคในการเลื่อนระดับในอดีต เพราะนี่ดูเหมือนจะเป็นจุดสูงสุดที่เผ่าพันธุ์มนุษย์จะสามารถไปถึงได้ ภายใต้ข้อจำกัดของร่างกายเนื้อ","แน่นอนว่า ในเมื่อมีขีดจำกัด ก็ย่อมต้องมีผู้ที่สามารถก้าวข้ามมันไปได้!","ผู้ใช้พลังจิตวิญญาณในยุคโบราณบางคน อาศัยการกลืนกินและปล้นชิงวิญญาณของผู้อื่น เพื่อเปลี่ยนความเปลี่ยนแปลงเชิงปริมาณ ให้กลายเป็นการเปลี่ยนแปลงเชิงคุณภาพ จนมีพลังที่เหนือล้ำกว่าจอมเวทผู้ยิ่งใหญ่ไปมาก และพวกเขาก็เรียกตัวเองว่า เทพ!","ในขณะเดียวกัน ก็มีพ่อมดส่วนน้อยนิด ที่ใช้วิธีการอันแยบยลต่างๆ นานา เพื่อให้ได้มาซึ่งพลังที่ทัดเทียมกับบรรดาเทพมารเหล่านั้น และเพื่อแยกแยะความแตกต่างระหว่างสองกลุ่มนี้ จึงมีการก่อตั้งตำแหน่งพิเศษที่อยู่เหนือจอมเวทผู้ยิ่งใหญ่ขึ้นมา ซึ่งเรียกขานกันว่า ระดับตำนาน!","และด้วยเหตุนี้เอง การก้าวขึ้นเป็นระดับตำนาน จึงไม่ได้มีขอบเขตที่ชัดเจน และไม่มีวิธีการเลื่อนระดับที่สามารถเผยแพร่ให้คนทั่วไปได้รู้ เหมือนกับพ่อมดเต็มตัวและจอมเวทผู้ยิ่งใหญ่","หรืออาจพูดได้ว่า มาตรฐานในการวัดความเป็นระดับตำนานมีเพียงข้อเดียวเท่านั้น นั่นก็คือการมีระดับพลังที่เหนือล้ำกว่าจอมเวทผู้ยิ่งใหญ่!","ตลอดหลายปีที่พวกเขาอาศัยอยู่ในดินแดนพ่อมด พวกเขาพยายามค้นหาเส้นทางการเลื่อนระดับที่สมบูรณ์แบบมาโดยตลอด และก็ได้ทำการทดลองไปไม่น้อย","ตัวอย่างเช่น เมื่อหนึ่งร้อยห้าสิบปีก่อน มีมังกรดำตัวหนึ่งที่มีพลังอันน่าสะพรึงกลัว ได้ข้ามผ่านประตูมิติของเหมืองคริสตัลเวทมนตร์เข้ามา และได้สร้างความเสียหายอย่างใหญ่หลวงให้กับดินแดนพ่อมด","สุดท้ายแล้ว พวกเขาทั้งหลายก็ร่วมมือกันหาวิธีกักขังมันเอาไว้ และใช้วิชาลับทำลายวิญญาณของอีกฝ่าย จากนั้นก็ให้ฟาเยซ จอมเวทผู้ยิ่งใหญ่สายจิตวิญญาณที่แข็งแกร่งที่สุดในตอนนั้น เข้ายึดครองร่างของมังกรดำตัวนั้น และกลายเป็นระดับตำนานคนที่ห้าของสภา!","แต่กระบวนการทั้งหมดนี้เรียกได้ว่าอันตรายแบบสุดๆ และความสำเร็จที่เกิดขึ้นก็มาจากโชคชะตาล้วนๆ ถึงเก้าในสิบส่วน!","และตามคำบอกเล่าของฟาเยซ เขาก็ยังไม่สามารถควบคุมและหลอมรวมเข้ากับร่างนี้ได้อย่างสมบูรณ์ โดยวิญญาณของเขานั้นเปรียบเสมือนการเข้าไปสิงสู่อยู่ในเปลือกที่แข็งแกร่ง และสามารถดึงพลังของอีกฝ่ายออกมาใช้ได้เพียงหกถึงเจ็ดส่วนเท่านั้น...","“เมื่อเทียบกับพวกเราแล้ว บางทีพวกท่านอาจจะคู่ควรกับการถูกเรียกว่า พ่อมดระดับตำนานอย่างแท้จริงมากกว่า!”","แฮร์รอฟเอ่ยขึ้นมาด้วยความทอดถอนใจ","ในเมื่อโปร์สามารถมองออกว่าระดับพลังจิตวิญญาณของเขา ยังหยุดชะงักอยู่ที่ระดับจอมเวทผู้ยิ่งใหญ่ นั่นก็หมายความว่าอีกฝ่ายอาจจะค้นพบวิธีที่จะก้าวข้ามขีดจำกัดนั้นได้แล้ว","ดูเหมือนว่าดินแดนพ่อมดจะปิดตัวเองมานานเกินไปจริงๆ...","แม้ลินน์จะไม่รู้เบื้องลึกเบื้องหลังทั้งหมด แต่จากปฏิกิริยาของแฮร์รอฟและคนอื่นๆ เขาก็พอจะเดาออก เขาสั่งการเพียงในใจ ไอน์สไตน์ที่อยู่ในจักรวาลจำลองก็ส่ายหน้า ก่อนจะเอ่ยอย่างเป็นธรรมชาติว่า","“เส้นทางแห่งเวทมนตร์นั้นขรุขระ พวกเราทุกคนต่างก็เป็นเพียงผู้ที่กำลังคลำหาทางไปข้างหน้าท่ามกลางความมืดมิด ไม่มีใครสามารถมั่นใจได้หรอกว่าตัวเองกำลังเดินอยู่บนเส้นทางที่ถูกต้อง!”","แฮร์รอฟ ออโรร่า และวิกตอริโอ ต่างก็ให้ความสนใจในวิธีที่เหล่าระดับตำนานของ ‘สมาคมเวทมนตร์เร้นลับ’ ใช้ในการก้าวข้ามขีดจำกัดเป็นอย่างมาก แต่พวกเขาก็รู้ดีว่า นี่คือความลับที่ยิ่งใหญ่ที่สุดของพ่อมดระดับตำนานทุกคน","พวกเขาไม่ยอมเปิดเผยวิธีการก้าวขึ้นเป็นระดับตำนานของตัวเอง และก็ไม่มีสิทธิ์ที่จะไปเรียกร้องให้อีกฝ่ายพูดออกมาเช่นกัน","เมื่อเชื่อมโยงกับคำพูดของโปร์และคนอื่นๆ ที่บอกว่า ‘ไม่สะดวกที่จะลงมือ’ ออโรร่าก็อดไม่ได้ที่จะสงสัยว่า วิธีที่คนกลุ่มนี้ใช้เพื่อก้าวข้ามขีดจำกัด อาจจะไม่ได้สมบูรณ์แบบอย่างที่คิดก็เป็นได้"]},{"n":393,"t":"มหภาคเป็นเพียงเปลือกนอก จุลภาคต่างหากคือรากฐานของสรรพสิ่ง!","c":["การหารือเกี่ยวกับเรื่องระดับตำนานดำเนินไปได้ไม่นานนัก เนื่องจากข้อมูลที่มีอยู่จำกัด ลินน์จึงไม่กล้าคุยเรื่องนี้มากจนเกินไป เขาจึงรีบเปลี่ยนเรื่องและเอ่ยขึ้นมาว่า","“จากข้อสันนิษฐานของข้า เป็นไปได้มากว่าเอลาอาจจะละทิ้งร่างกายเนื้อ และดำรงอยู่ด้วยรูปแบบของพลังงาน...”","ก่อนหน้านี้ ลินน์เคยอธิบายถึงความแตกต่างระหว่างพลังงานและมวลเอาไว้ในทฤษฎีเวทมนตร์ที่เขาตีพิมพ์ออกไปแล้ว แฮร์รอฟและคนอื่นๆ จึงไม่ได้รู้สึกแปลกหูหรือใหม่กับคำๆ นี้นัก","“ท่านหมายความว่า นางทิ้งร่างกายเนื้อของตัวเอง แล้วดำรงอยู่ด้วยรูปแบบของวิญญาณงั้นหรือ?”","วิกตอริโอลูบเคราพลางครุ่นคิด","ในตอนนี้เขาเริ่มตระหนักถึงความคล้ายคลึงกันระหว่างกลุ่มของโปร์กับเทพองค์นั้นแล้ว ร่างกายของพวกเขาทั้งหมดต่างก็ปลดปล่อยพลังงานออกมาตลอดเวลา ราวกับว่าเพียงแค่ยืนอยู่เฉยๆ ก็สามารถบิดเบือนกาลอวกาศรอบๆ ตัวได้","แต่มันก็ยังมีความแตกต่างกันอยู่บ้าง เอลาให้ความรู้สึกเหมือนเป็นแหล่งรวมพลังศักดิ์สิทธิ์อันทรงพลัง ในขณะที่โปร์ให้ความรู้สึกเหมือนกับดวงดาวฤกษ์ที่พวกเขาเพิ่งจะได้เห็นเมื่อครู่นี้มากกว่า","วิญญาณก็ควรจะเป็นพลังงานรูปแบบหนึ่งเช่นกัน ข้อสันนิษฐานนี้ผุดขึ้นมาในใจของวิกตอริโอ","เมื่อก้าวเข้าสู่ระดับจอมเวทผู้ยิ่งใหญ่ วิญญาณก็แข็งแกร่งพอที่จะหลุดพ้นจากร่างกายเนื้อ และคงอยู่ภายนอกได้เป็นเวลานาน เพียงแต่มันยังคงได้รับผลกระทบและสร้างความเสียหายให้กับดวงวิญญาณได้อยู่ดี","เหมือนกับคนเปลือยกายที่ต้องเผชิญกับลมหนาว ไม่ช้าก็เร็วต้องหนาวตายในที่สุด แต่ดวงวิญญาณระดับตำนานจะสามารถดำรงอยู่ตลอดไปโดยปราศจากร่างกายเนื้อได้หรือไม่ พวกเขาเองก็ไม่รู้เหมือนกัน","“ไม่ มันต้องมีอะไรมากกว่านั้นแน่”","ลินน์ส่ายหน้า ปฏิเสธข้อสันนิษฐานของวิกตอริโอ หากเป็นเพียงแค่นั้น ปัญญาประดิษฐ์สนับสนุนจะต้องแจ้งเตือนเขาอย่างแน่นอน","ท้ายที่สุดแล้ว ปัญญาประดิษฐ์สนับสนุน 071 ก็เคยดูดซับวิญญาณมาแล้ว และข้อมูลเหล่านั้นก็ถูกบันทึกเอาไว้ในฐานข้อมูลเรียบร้อยแล้ว","ในเมื่อไม่ใช่วิญญาณ แล้วมันจะเป็นอะไรได้อีกล่ะ?","ทุกคนที่อยู่ที่นั่นต่างก็ตกอยู่ในห้วงความคิด...","“ถ้าเป็นไปได้ พวกเจ้าก็น่าจะลองจับนักบวชระดับตำนานของศาสนจักรมาสักคน แล้วเอามาศึกษาวิจัยดูให้ละเอียด ไม่แน่ว่าอาจจะได้อะไรดีๆ กลับมาบ้างก็ได้”","ลินน์ควบคุมโปร์ให้เอ่ยแนะนำ","และนี่ก็เป็นความคิดแรกที่ผุดขึ้นมาในหัวของลินน์ หลังจากที่ปัญญาประดิษฐ์สนับสนุนเตือนเขาว่า ระดับพลังจิตวิญญาณและระดับพลังชีวิตของ ‘เอลา’ กับเอ็ดเวลนั้น ล้วนอยู่เหนือกว่าจอมเวทผู้ยิ่งใหญ่!","นั่นก็คือการจับตัวทั้งสองคนมาศึกษาดูให้รู้แล้วรู้รอด!","เพียงแต่ ‘เอลา’ แข็งแกร่งเกินไป ลินน์จึงทำได้เพียงล้มเลิกความคิดอันหอมหวานที่จะจับ ‘เทพ’ มาวิจัย แล้วหันไปพุ่งเป้าไปที่นักบวชระดับตำนานที่อยู่ในระดับรองลงมาแทน","คำแนะนำของ ‘โปร์’ ทำเอาวิกตอริโอถึงกับทำหน้าไม่ถูก นักบวชระดับตำนานส่วนใหญ่ล้วนเป็นระดับสูงสุดของศาสนจักร แถมยังมีความแข็งแกร่งเป็นเลิศ ลำพังแค่จะเอาชนะยังไม่ใช่เรื่องง่าย นับประสาอะไรกับการจับเป็นมาศึกษาวิจัย","แต่ทำไมพอออกมาจากปากของ ‘โปร์’ มันถึงฟังดูง่ายดายราวกับปอกกล้วยเข้าปากแบบนี้ล่ะ!","ลินน์ไม่สนใจปฏิกิริยาของพวกเขา หลังจากที่ปลูกฝังความคิดเรื่อง ‘จับคนมาวิจัย’ ให้กับแฮร์รอฟและคนอื่นๆ แล้ว เขาก็ควบคุมโปร์ให้พูดต่อไปอีกว่า","“เอลา มีความสามารถในการควบคุมระดับอะตอมที่สูงมาก การจะเอาชนะนางในด้านนี้ไม่ใช่เรื่องง่าย แต่พวกเจ้าสามารถเริ่มต้นจากระดับจุลภาคที่ลึกลงไปกว่านั้น เพื่อหาวิธีเอาชนะนางได้!”","“มหภาคเป็นเพียงเปลือกนอก จุลภาคต่างหากคือรากฐานของสรรพสิ่ง และเส้นทางที่แท้จริงสู่ระดับตำนาน ก็อาจจะซ่อนอยู่ในนั้น...”","“มหภาค...จุลภาค...”","แฮร์รอฟพึมพำกับตัวเองเบาๆ","หลังจากครุ่นคิดอยู่ครู่หนึ่ง ออโรร่ากับวิกตอริโอก็เตรียมที่จะเอ่ยถามอะไรบางอย่าง แต่แล้วในขณะนั้นเอง แสงสว่างจ้าก็สาดส่องลงมาจากเบื้องบน ก่อนที่มิติแห่งนี้จะกลับคืนสู่ความมืดมิดอันไร้ที่สิ้นสุดอีกครั้ง","ภายใต้การเร่งเวลาที่เร็วกว่าปกติเป็นสิบล้านเท่า แสงจากการระเบิดของซูเปอร์โนวาได้จางหายไปจนหมดสิ้น แฮร์รอฟมีสีหน้าเสียดาย เขาตระหนักดีว่านี่หมายความว่าอย่างไร","และก็เป็นไปตามคาด ในวินาทีต่อมา น้ำเสียงอันทรงอำนาจและแหบพร่าของคนแก่ ก็ดังขึ้นข้างหูของพวกเขา","“การหารือในครั้งนี้ สิ้นสุดลงเพียงเท่านี้!”","คนที่พูดขึ้นมาก็คือไอน์สไตน์ และจากนั้นจักรวาลจำลองก็เริ่มสั่นสะเทือนอย่างรุนแรง ก่อนจะดีดแฮร์รอฟและคนอื่นๆ ออกไป","...","เวลาตีสองตรง แฮร์รอฟ ออโรร่า และวิกตอริโอ ก็หลุดออกมาจากมิติเวทมนตร์ ใบหน้าของพวกเขาก็ยังคงเต็มไปด้วยความสับสน ตกตะลึง และมึนงง พวกเขายังคงไม่สามารถสลัดตัวเองหลุดพ้นจากข้อมูลมหาศาลที่ได้รับจากการหารือในครั้งนี้ได้","“ดูเหมือนว่าที่เจ้าเคยบอกไว้จะถูกต้องนะแฮร์รอฟ ‘สมาคมเวทมนตร์เร้นลับ’ กลุ่มนี้ จำเป็นต้องรับมือด้วยความระมัดระวังอย่างยิ่ง”","วิกตอริโอเอ่ยด้วยสีหน้าเคร่งเครียด","แม้ว่าก่อนจะเข้าไปในมิติเวทมนตร์ วิกตอริโอจะพยายามประเมินความสามารถของพ่อมดระดับตำนานเหล่านี้เอาไว้สูงลิ่วแล้ว แต่หลังจากการชุมนุมในครั้งนี้ ความตื่นตระหนกและหวาดหวั่นในใจของเขากลับเพิ่มมากขึ้นกว่าเดิมเสียอีก","โดยเฉพาะชายที่ชื่อโปร์คนนั้น เขาสามารถมองออกถึงก้นบึ้งของพวกเขาได้เพียงแค่ปรายตามอง...ความแข็งแกร่งของพวกเขาคงต้องใช้คำว่า ไม่อาจหยั่งถึง มาอธิบายเท่านั้น","“ข้าก็เคยเตือนเจ้าแล้วว่าต้องระวังตัวให้ดี!”","แฮร์รอฟพูดอย่างจนปัญญา เขาเว้นจังหวะไปครู่หนึ่ง ก่อนจะเอ่ยต่อ","“แล้วเรื่องธาตุที่พวกเขาพูดถึง...หรือก็คือ โครงสร้างภายในของอะตอม พวกเจ้ามีความคิดเห็นว่าอย่างไร?”","“แม้จะยังไม่มีหลักฐานแน่ชัด แต่ความเป็นไปได้นี้ก็มีอยู่จริง”","ออโรร่าพยักหน้าเห็นด้วย","แน่นอนว่าต้องมี ‘ธาตุ’ ที่มีขนาดเล็กกว่าอะตอมพื้นฐานอย่างแน่นอน ยกตัวอย่างเช่น ธาตุสายฟ้า ธาตุแสงสว่าง และพวกวิญญาณธาตุ...เพียงแต่ก่อนหน้านี้พวกเขาไม่สามารถสัมผัสถึงพวกมันได้ จึงไม่สามารถยืนยันได้ว่า ‘ธาตุ’ เหล่านี้มีอยู่จริงหรือไม่","แต่การที่แอนโทนี่สามารถสร้างเวทมนตร์สายสายฟ้าขึ้นมาได้ ก็เป็นเครื่องพิสูจน์แล้วว่าธาตุสายฟ้านั้นมีอยู่จริง แถมยังสามารถถูกควบคุมโดยพ่อมดได้อีกด้วย ซึ่งนั่นก็หมายความว่า ธาตุพื้นฐานไม่ได้เป็นสิ่งที่มีขนาดเล็กที่สุดอย่างที่พวกเขาเข้าใจกัน","เมื่อคิดได้เช่นนี้ ออโรร่าก็โพล่งขึ้นมาว่า","“ข้าว่าพวกเราควรสั่งให้คนไปรวบรวมบันทึกทั้งหมดของอัลทอคมาดีกว่านะ บางทีมันอาจจะมีประโยชน์ต่อการวิจัยในระดับจุลภาคก็ได้”","แฮร์รอฟและวิกตอริโอพยักหน้าเห็นด้วย ในเมื่อเป็นไปได้อย่างยิ่งว่า ระดับจุลภาคจะเกี่ยวข้องกับวิธีการเลื่อนเป็นระดับตำนาน รวมถึงวิธีการสังหาร ‘เทพ’ ดังนั้นพวกเขาก็จำต้องทุ่มเทความสนใจทั้งหมดไปที่เรื่องนี้","ส่วนเรื่องของวิญญาณธาตุ...สุดท้ายแล้วมันต้องมีวิธีรับมือสิ!","เพื่อที่จะก้าวไปสู่จุดสูงสุด พวกเขาไม่เคยหวาดหวั่นต่ออันตรายใดๆ และหากพวกเขาสามารถค้นหาสาเหตุที่ทำให้อัลทอคกับพ่อมดธาตุคนอื่นๆ เสียสติไปอย่างกะทันหันได้ บางทีอาจจะยังมีหวังที่จะรักษาพวกเขาให้กลับมาเป็นปกติได้","พลังของ ‘ระดับตำนาน’ แต่ละคนนั้นล้ำค่าเกินกว่าจะสูญเสียไป...","ศาสนจักรมีนักบวชระดับตำนานถึงห้าคน ส่วนสภาพ่อมด ต่อให้รวมอัลทอคที่เสียสติไปแล้ว พวกเขาก็มีระดับตำนานแค่สี่คนเท่านั้น ซึ่งนอกจากจะขาดแคลนกำลังรบในระดับสูงแล้ว แม้แต่กำลังรบในระดับแนวหน้าก็ยังไม่เพียงพออีกด้วย","“และตารางจัดอันดับธาตุนั่น พวกเราก็ต้องให้ความสำคัญกับมันให้มากด้วย!”","วิกตอริโอพูดเสริมขึ้นมา เพราะนี่คือรากฐานสำคัญของระบบเวทมนตร์ทั้งหมด","ตามที่เขาประเมินเอาไว้ ‘สมาคมเวทมนตร์เร้นลับ’ น่าจะรวมแต่กลุ่มคนระดับหัวกะทิ ถึงแม้สมาชิกแต่ละคนจะเก่งกาจเพียงใด แต่จำนวนคนก็คงมีไม่มากนัก","ในเมื่อตอนนี้พวกเขารู้วิธีการคำนวณมวลของธาตุแล้ว ที่เหลือก็แค่ลงมือทำ","หากพวกเขาร่วมมือกันระดมความคิด ไม่แน่ว่าอาจจะสามารถเติมเต็มตารางจัดอันดับนี้ให้สมบูรณ์ได้เร็วกว่า ‘สมาคมเวทมนตร์เร้นลับ’ และอาจจะค้นพบเส้นทางใหม่สู่การเป็นระดับตำนานก็เป็นได้!"]},{"n":394,"t":"ระดับตำนานก็คือครึ่งเทพ ครึ่งเทพก็คือระดับตำนาน!","c":["“ในที่สุดก็เรียบร้อยสักที!”","ลินน์ที่เพิ่งหลุดออกมาจากมิติเวทมนตร์ถอนหายใจออกมาอย่างโล่งอก การจะหลอกลวงพ่อมดระดับ ‘ตำนาน’ เหล่านี้ไม่ใช่เรื่องง่ายเลยจริงๆ","แต่การชุมนุมในครั้งนี้ ก็ทำให้เขาได้รับข้อมูลจำนวนมหาศาลเกี่ยวกับพ่อมดระดับสูงเช่นกัน","ข้อแรก ขีดจำกัดที่พ่อมดคนหนึ่งจะสามารถไปถึงได้ด้วยพรสวรรค์และความพยายามของตนเอง ก็คือพ่อมดหกวงแหวน!","ส่วนเหตุผลที่แน่ชัดว่าเป็นเพราะอะไรนั้น ลินน์เองก็ยังไม่ทราบแน่ชัด แต่จากท่าทีที่ดูมั่นใจของแฮร์รอฟและคนอื่นๆ แล้ว เรื่องนี้คงไม่ใช่เรื่องที่พูดขึ้นมาลอยๆ แน่!","ข้อสอง การประเมินระดับของปัญญาประดิษฐ์สนับสนุนนั้นไม่ได้ผิดพลาด ไม่ว่าจะเป็นแฮร์รอฟ ออโรร่า หรือวิกตอริโอ ระดับพลังจิตวิญญาณของพวกเขาไม่ได้แตกต่างไปจากจอมเวทผู้ยิ่งใหญ่เลย เพียงแต่พลังรบของพวกเขานั้นแข็งแกร่งกว่าจอมเวทผู้ยิ่งใหญ่โดยทั่วไปมาก","หรือจะเรียกพวกเขาว่าเป็น ระดับตำนานจอมปลอม ก็คงไม่ผิดนัก!","ซึ่งก็อธิบายได้ว่า ทำไมปัญญาประดิษฐ์สนับสนุนถึงสามารถดึงเอาพลังการประมวลผลของประธานสภาเหล่านี้มาใช้เพื่อเจาะระบบได้ นั่นก็เป็นเพราะอีกฝ่ายอยู่ในระดับเดียวกับเขานั่นเอง","ส่วนพวกผู้บริหารระดับสูงของศาสนจักรอย่างเอ็ดเวล","แม้ว่าจากการประเมินของปัญญาประดิษฐ์สนับสนุน ระดับพลังจิตวิญญาณและระดับพลังชีวิตของคนพวกนั้นจะสูงกว่าจอมเวทผู้ยิ่งใหญ่ แต่ลินน์กลับรู้สึกว่า พวกนั้นก็น่าจะเป็นระดับตำนานจอมปลอมเหมือนกัน...","เขาเคยปะทะกับเอ็ดเวลด้วยตัวเอง ย่อมมีสิทธิ์ที่จะประเมินและตัดสินอีกฝ่าย","นอกจากนี้ ตอนที่ออโรร่าอยู่ที่ทะเลหมอก นางก็เคยปะทะกับนักบวชระดับตำนานของศาสนจักรมาแล้ว แม้ว่าการต่อสู้จะไม่ได้กินเวลานานนัก แต่นางก็สามารถรับมือได้","ลินน์อดสงสัยไม่ได้ว่า คนที่สามารถก้าวข้ามขีดจำกัดนั้นไปได้จริงๆ จะมีแค่ ‘เอลา’ เพียง
