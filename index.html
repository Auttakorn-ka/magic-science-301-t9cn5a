ส่งผลย้อนกลับมาหาตัวเองได้ ซึ่งเปรียบเสมือนดาบสองคม...","อย่างน้อยด้วยพลังจิตวิญญาณในปัจจุบันของเขา มันก็ยังไม่เพียงพอที่จะควบคุมองค์ประกอบที่อันตรายนี้ได้อย่างสมบูรณ์","หลังจากที่เปลวไฟโดยรอบถูกเอาออกและดับลง แอนโธนีก็แอบถอนหายใจด้วยความโล่งอก เมื่อกี้เขาเกือบจะคิดว่าตัวเองกำลังจะถูกฝังอยู่ในทะเลเพลิงแล้ว","ราฟาเอลและคนอื่นๆ เดินไปที่สนามฝึกซ้อมที่ขรุขระ และซานเชซก็แทบจะรอไม่ไหวที่จะถาม","“ท่านลินน์ เวทมนตร์ไฟที่ท่านเพิ่งจะใช้ไปนั้น เป็นของจริงเหรอ? หรือมันเป็นเพียงแค่กลอุบายของเวทมนตร์ลวงตา? ข้าเพิ่งจะเห็นว่ามันดูเหมือนจะกำลังลุกไหม้อยู่ในสุญญากาศ...”"]},{"n":348,"t":"เป็นไปไม่ได้ กฎแห่งไฟสามประการของข้าจะไม่มีวันผิดพลาด!","c":["มีคนจำนวนไม่น้อยเลยที่มีความคิดเช่นเดียวกับซานเชซ ท้ายที่สุดแล้ว พวกเขาก็ได้เฝ้าดูการต่อสู้ทั้งหมด และเป็นประจักษ์พยานให้กับสิ่งที่ไม่น่าเชื่อและขัดกับสามัญสำนึกทุกรูปแบบ ดังนั้น พวกเขาจึงอดไม่ได้ที่จะสงสัยว่านี่คือภาพลวงตาที่ทรงพลังบางอย่างหรือไม่","เพราะท้ายที่สุด มันก็เป็นไปไม่ได้ที่ไฟจะเผาไหม้สายฟ้า นับประสาอะไรกับการเปลี่ยนม่านน้ำให้กลายเป็นเชื้อเพลิง...","“แน่นอนว่ามันคือเปลวไฟ”","ลินน์กล่าวอย่างไม่ลังเล","“งั้นมันก็มีนรกอยู่จริงๆ เหรอ?”","ราฟาเอลถามด้วยความไม่อยากเชื่อ","เขานึกถึงข่าวลือในดินแดนพ่อมดทันที ว่าดาวรุ่งแห่งเวทมนตร์ผู้นี้ครอบครองเปลวไฟจากส่วนลึกที่สุดของนรก ซึ่งสามารถเผาไหม้และกลืนกินได้ทุกสรรพสิ่ง","ก่อนหน้านี้ราฟาเอลมักจะเยาะเย้ยคำกล่าวอ้างนี้อยู่เสมอ แต่ตอนนี้เขากลับรู้สึกสงสัยเล็กน้อย เพราะเขาไม่สามารถหาคำคุณศัพท์อื่นมาอธิบายนอกจากคำว่าเพลิงแห่งนรกได้เลย","“นรกมันก็เป็นแค่เรื่องไร้สาระที่ศาสนจักรสร้างขึ้นมา ข้าไม่ได้คาดคิดเลยนะว่าท่านจะเชื่อเรื่องนี้ด้วย?”","ลินน์กล่าวด้วยรอยยิ้ม หยุดชะงักไปชั่วครู่ แล้วพูดต่อ","“แน่นอนว่ามันไม่ใช่สิ่งที่ท่านคิด ข้าเรียกมันว่าเพลิงอมตะ มันคือเปลวไฟที่ถูกสร้างขึ้นโดยเวทมนตร์!”","“แต่นี่มันไม่ใช่เวทมนตร์เลยสักนิด! และมันก็ละเมิด ‘กฎแห่งไฟสามประการ’ ของข้าโดยสิ้นเชิง เปลวไฟแบบนี้ไม่มีทางมีอยู่จริงได้!”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งอดไม่ได้ที่จะโต้แย้งเสียงดัง","ลินน์มองเขาด้วยสายตาแปลกๆ และราฟาเอลก็รีบแนะนำ","“นี่คือท่านอเดลา ผู้ซึ่งมีความสำเร็จในศาสตร์แห่งไฟเป็นอย่างสูง!”","“ท่านอเดลาที่เป็นผู้เสนอทฤษฎีองค์ประกอบไฟน่ะหรือ?”","ลินน์ตระหนักได้ทันที ว่าเขาเคยพบกับอีกฝ่ายมาแล้วสองสามครั้งในการประชุมของจอมเวทผู้ยิ่งใหญ่ครั้งก่อน แต่เขายังไม่มีการพูดคุยอย่างลึกซึ้ง","“ถูกต้อง เป็นข้าเอง!”","อเดลาพยักหน้าอย่างภาคภูมิใจ นางศึกษาองค์ประกอบไฟมาหลายทศวรรษแล้ว และได้สรุปคุณสมบัติรวมถึงกฎเกณฑ์มากมายที่เกี่ยวข้องกับไฟเอาไว้","ซึ่งรวมถึงกฎแห่งไฟสามประการด้วย นั่นก็คือ อุณหภูมิ (ความเร็วในการเคลื่อนที่ขององค์ประกอบ) เชื้อเพลิง และออกซิเจนที่เพียงพอ...โดยที่ไฟทั้งหมดจะไม่สามารถดำรงอยู่ได้หากปราศจากองค์ประกอบเหล่านี้...","และองค์ประกอบไฟมีอยู่ในวัสดุที่ติดไฟได้ทุกชนิด แต่มันมีขนาดเล็กกว่าองค์ประกอบปกติ ดังนั้นพ่อมดจึงไม่สามารถรับรู้มันได้ผ่านทางพลังจิตวิญญาณ และมันจะปรากฏขึ้นภายใต้การกระตุ้นของอุณหภูมิสูงและออกซิเจนเท่านั้น","อเดลาเล่าให้ลินน์ฟังอย่างภาคภูมิใจเกี่ยวกับทฤษฎีองค์ประกอบไฟของนาง ซึ่งเป็นข้อสรุปที่เขาได้รับหลังจากการวิจัยอย่างเข้มงวดและการทดลองนับครั้งไม่ถ้วน!","ด้วยเหตุนี้ ในการโต้เถียงเกี่ยวกับเรื่องที่ว่าไฟคืออะไรเมื่อยี่สิบปีก่อน นางจึงเอาชนะ ‘ทฤษฎีโฟลจิสตัน’ และ ‘ทฤษฎีมานาเพลิง’ ได้ในคราวเดียว และได้รับเหรียญตราจันทร์สีเงินมาครอบครอง!","แต่เปลวไฟที่ลินน์อัญเชิญออกมาเมื่อกี้ กลับละเมิดกฎทั้งสามประการนี้โดยสิ้นเชิง!","ยกตัวอย่างเช่น การเผาไหม้ในสุญญากาศ ซึ่งละเมิดข้อเท็จจริงที่ว่าเปลวไฟต้องการออกซิเจนที่เพียงพอเพื่อดำรงอยู่","แถมโลหะและทรายก็ไม่ใช่วัสดุที่ติดไฟได้ แต่มันกลับเกิดปรากฏการณ์การเผาไหม้ที่แปลกประหลาดขึ้น ดังนั้น นี่จะต้องเป็นของปลอม มันจะต้องเป็นภาพลวงตาอย่างแน่นอน!","หลังจากได้ฟังการวิเคราะห์ของอเดลาและทฤษฎีองค์ประกอบไฟที่ว่ามา ลินน์ก็รู้สึกพูดไม่ออกไปชั่วขณะ","กฎแห่งไฟสามประการที่เรียกว่านี้ ค่อนข้างคล้ายคลึงกับองค์ประกอบสามประการของการเผาไหม้ในชาติก่อนของเขา","อย่างไรก็ตาม การที่สามารถศึกษามาได้ไกลถึงขนาดนี้ ก็ถือว่าเก่งกาจมากแล้ว เพราะการอภิปรายเกี่ยวกับธรรมชาติของเปลวไฟในชาติก่อนนั้นก็กินเวลานานนับพันปี และต้องรอจนถึงยุคสมัยใหม่ถึงจะได้ข้อสรุปออกมา","ลินน์ไม่ได้อธิบายอะไรมาก เขาเพียงแค่ยื่นมือออกไปโดยตรง และเปลวไฟอันร้อนระอุก็ลุกไหม้ขึ้นอย่างรวดเร็ว...","นี่คือเพลิงอมตะ!","ซึ่งทำให้เหล่าพ่อมดที่อยู่ในเหตุการณ์อดไม่ได้ที่จะรู้สึกใจสั่น แต่พวกเขาก็ยังคงก้าวเข้าไปใกล้สองสามก้าว และมองดูเปลวไฟขนาดเท่ากำปั้นด้วยความแปลกใหม่เป็นอย่างยิ่ง","แอนโธนีดูเคร่งขรึม เขาเพิ่งจะได้สัมผัสกับความไร้พลัง เมื่อต้องเผชิญหน้ากับเปลวไฟประหลาดนี้มาด้วยตัวเอง ดูเหมือนว่าทุกสิ่งทุกอย่าง จะเป็นสารอาหารที่อร่อยที่สุดสำหรับมัน","อเดลาถึงกับยื่นมือออกไปเพื่อตรวจสอบความถูกต้อง แต่ลินน์ก็หยุดนางเอาไว้ เพราะหากเขาถูกสิ่งนี้เผาไหม้ เขาก็ไม่มีวิธีแก้ไข โดยวิธีเดียวที่คิดได้ คือการเฉือนเนื้อที่สัมผัสออกไป และหากใช้เวลานานกว่านั้นสักหน่อย การตัดมือก็ถือเป็นเรื่องเบาๆ แล้ว เพราะถึงแม้ว่าท่านจะไม่ตาย ท่านก็ต้องถูกเผาทั้งเป็นอยู่ดี!","แม้ว่าในท้ายที่สุด นางจะไม่สามารถสัมผัสมันได้จริงๆ แต่อเดลาก็สัมผัสได้ถึงความร้อนมหาศาลอย่างชัดเจน","และในระยะประชิดเช่นนี้ นางก็ไม่เชื่อว่าอีกฝ่ายจะสามารถปิดบังการรับรู้พลังเวทของนางได้ ดังนั้น นางจึงตัดรั้วเหล็กออกมาชิ้นหนึ่ง แล้ววางมันลงบนเพลิงอมตะ","โดยรั้วเหล็กที่เรียวบางก็ลุกไหม้ขึ้นท่ามกลางสายตาของทุกคน!","มันไม่เหมือนกับการหลอมละลายหลังจากสัมผัสกับอุณหภูมิสูง แต่มันคือการเผาไหม้จริงๆ โดยที่เปลวไฟกำลังลุกลามไปตามรั้วที่เรียวบาง...อเดลาจึงใช้ ‘หัตถ์เวท’ เพื่อดึงก้อนหินก้อนหนึ่งมาอย่างไม่เต็มใจนัก","ผลลัพธ์ก็คือ...แม้แต่ก้อนหินยังติดไฟ!","สุดท้ายคือการทดลองในสุญญากาศ ทุกคนจึงได้เห็นภาพที่น่าอัศจรรย์ใจ นั่นก็คือก้อนหินที่กำลังลุกไหม้อยู่ในสุญญากาศ!","หากบางสิ่งบางอย่างดูเหมือนไฟ และมีพฤติกรรมเหมือนกับไฟ ไม่ว่ามันจะแปลกประหลาดแค่ไหน มันก็ไม่ต้องสงสัยเลยว่ามันคือไฟอย่างแน่นอน!","“มันเป็นไปไม่ได้ ก้อนหินไม่มีทางถูกใช้เป็นเชื้อเพลิงได้ มันไม่น่าจะถูกต้อง แล้วทำไมมันถึงสามารถลุกไหม้ได้โดยปราศจากออกซิเจน...”","อเดลาพึมพำกับตัวเอง รู้สึกสับสนอย่างสมบูรณ์ และแทบจะเป็นบ้า","ราฟาเอลและคนอื่นๆ มองดูอเดลาด้วยความเห็นอกเห็นใจเป็นอย่างยิ่ง เพราะพวกเขาทุกคนนั้นรู้ดีว่าอีกฝ่ายได้อุทิศชีวิตส่วนใหญ่ให้กับการวิจัยเกี่ยวกับองค์ประกอบไฟ และตอนนี้พวกเขากลับพบว่า ทฤษฎีที่ศึกษามานั้นผิดทั้งหมด การโจมตีครั้งนี้ก็เพียงพอแล้วที่จะทำให้ใครก็ตามต้องพังทลาย...","จู่ๆ ลินน์ก็พูดขึ้นมาในขณะนี้","“อันที่จริง กฎแห่งไฟสามประการของท่านนั้นดีมาก และมันก็ไม่ได้มีปัญหาใหญ่อะไร”","อเดลาหยุดชะงักไปครู่หนึ่ง นางทั้งประหลาดใจและสับสน และแทบจะคิดว่าตัวเองฟังผิดไป","แต่ก่อนที่นางจะได้ถาม ลินน์ก็ยังคงอธิบายต่อไป","“อย่างไรก็ตาม ข้าก็ต้องแก้ไขสองสามจุด ยกตัวอย่างเช่น ออกซิเจนเป็นเงื่อนไขที่เพียงพอสำหรับปฏิกิริยาการเผาไหม้ก็จริง แต่มันก็ไม่ใช่เงื่อนไขที่จำเป็น!”","“พูดให้ถูกก็คือ ตราบใดที่มีสารออกซิไดซ์ มันก็เพียงพอแล้ว!”","เมื่อได้ยินเช่นนี้ ทุกคนที่อยู่ในเหตุการณ์ต่างก็ขมวดคิ้ว","เงื่อนไขที่เพียงพอ และเงื่อนไขที่จำเป็น สองคำใหม่นี้ค่อนข้างแปลกหูสำหรับบางคน ซึ่งพวกเขาก็แทบจะไม่สามารถเข้าใจมันได้เลย แต่คำว่าสารออกซิไดซ์พวกเขากลับไม่รู้จักมันเลย","สารออกซิไดซ์ คือสารที่ได้รับอิเล็กตรอนในปฏิกิริยาออกซิเดชัน-รีดักชัน ยกตัวอย่างเช่น คลอรีนไตรฟลูออไรด์ ซึ่งเป็นสารออกซิไดซ์และสารทำฟลูออริเนชันที่แข็งแกร่งมาก ซึ่งทำหน้าที่แทนที่บทบาทของออกซิเจนโดยตรง นี่จึงเป็นหนึ่งในเหตุผลที่มันสามารถลุกไหม้ได้!","อย่างไรก็ตาม มีองค์ประกอบไม่มากนักที่สามารถใช้เป็นสารออกซิไดซ์ได้ และส่วนใหญ่ก็เป็นสารประกอบ...","เมื่อพิจารณาถึงระดับความรู้ที่จำกัดของราฟาเอลและคนอื่นๆ ลินน์จึงไม่ได้อธิบายอะไรยืดยาว มิฉะนั้นเขาคงจะต้องอธิบายว่าปฏิกิริยารีดอกซ์คืออะไร และจากนั้นก็ต้องเริ่มพูดคุยเกี่ยวกับโครงสร้างภายในของอะตอม...","ดังนั้น หลังจากครุ่นคิดอยู่ครู่หนึ่ง ลินน์ก็พูดให้ง่ายที่สุดเท่าที่จะเป็นไปได้","“พูดในภาษาคนทั่วไปก็คือ องค์ประกอบบางอย่างสามารถแทนที่ออกซิเจน เพื่อเป็นเงื่อนไขในการจุดไฟได้ ดังนั้น มันจึงสามารถเผาไหม้ต่อไปได้ แม้จะอยู่ในสภาพแวดล้อมที่ไร้ออกซิเจนก็ตาม...”"]},{"n":349,"t":"คาร์ดินัลเอ็ดเวลผู้ชั่วร้าย","c":["“ข้ารู้ เหมือนกับดวงอาทิตย์ไง...ดวงอาทิตย์ก็สามารถเผาไหม้ในสุญญากาศได้เหมือนกัน!”","ลิเดียรีบพูดขึ้นมา เมื่อตอนที่ลินน์สอนวิชาดาราศาสตร์ให้พวกนาง เขาได้พูดถึงปรากฏการณ์แปลกประหลาดนี้ แต่เขาไม่ได้อธิบายถึงเหตุผล","ลินน์ส่ายหัวอย่างขบขัน แสงของดวงอาทิตย์ไม่ได้เกิดจากการเผาไหม้ แต่เกิดจากนิวเคลียร์ฟิวชันภายในดวงอาทิตย์ต่างหาก โดยแสงสว่างและความร้อนนั้นเป็นเพียงแค่สิ่งที่ปรากฏออกมาเท่านั้น","อย่างไรก็ตาม ตัวอย่างที่ลิเดียยกมานั้นเหมาะสมมากสำหรับความเข้าใจ และอเดลาก็เข้าใจในทันทีว่า มันไม่ได้หมายความว่าการเผาไหม้จะไม่ต้องการออกซิเจน แต่สามารถใช้องค์ประกอบอื่นมาแทนที่ได้","“เป็นเช่นนี้นี่เอง”","อันที่จริง นางเคยทำการทดลองที่คล้ายกันนี้มาก่อน แต่องค์ประกอบหลายสิบชนิดที่ใช้ในการทดลองก็ไม่มีอันไหนที่สามารถแทนที่บทบาทของออกซิเจนได้เลย ดังนั้น นางจึงได้ข้อสรุปว่าออกซิเจนเป็นสิ่งจำเป็นสำหรับการเผาไหม้","แต่ทำไมก้อนหินและโลหะถึงสามารถใช้เป็นเชื้อเพลิงได้ด้วยล่ะ?","ลินน์ไม่ได้ตั้งใจจะอธิบายต่อไป หลังจากดับ ‘เพลิงอมตะ’ ในฝ่ามือแล้ว เขาก็หันไปมองแอนโธนี แล้วพูดด้วยรอยยิ้ม","“ท่านแอนโธนี ข้าไม่ได้คาดคิดเลยว่าท่านจะพัฒนามันได้เร็วขนาดนี้ ท่านสามารถทำให้เวทมนตร์เลเซอร์สมบูรณ์แบบได้ ภายในเวลาเพียงแค่ไม่กี่ชั่วโมงเท่านั้น”","เขาจำได้ว่าเขาเพิ่งจะมอบพิมพ์เขียวที่เกี่ยวข้องให้กับแอนโธนีเมื่อเช้านี้เอง อาจกล่าวได้ว่าการพัฒนาเวทมนตร์ทั้งสองบทนั้นเริ่มต้นขึ้นเกือบจะพร้อมๆ กัน!","“มันเป็นเพียงแค่ต้นแบบเท่านั้น ยังห่างไกลจากความสมบูรณ์แบบมาก”","แอนโธนีกล่าวด้วยความรู้สึกสะเทือนใจ","เวทมนตร์เลเซอร์ชนิดนี้ถูกลินน์เรียกว่าสถานะกระตุ้นขององค์ประกอบ ซึ่งมีระดับพลังงานทั้งหมดห้าระดับ และในขณะนี้ เขาสามารถสร้างเลเซอร์ได้ที่ระดับพลังงานที่สามเท่านั้น","นอกจากนี้ ยังมีวิธีที่สองในการเพิ่มพลังของเลเซอร์ นั่นก็คือการบีบอัดเส้นผ่านศูนย์กลาง ยิ่งเส้นผ่านศูนย์กลางของเลเซอร์มีขนาดเล็กเท่าไหร่ พลังทำลายล้างของมันก็จะยิ่งแข็งแกร่งมากขึ้นเท่านั้น!","หลังจากที่เขาบีบอัดเลเซอร์จาก 5 มิลลิเมตร ให้เหลือ 0.5 มิลลิเมตร พลังของมันก็เพิ่มขึ้นหลายเท่าตัว โดยมีพลังทำลายล้างเทียบเท่ากับเวทมนตร์ระดับห้าวงแหวน โดยยังสามารถบีบอัดต่อไปได้แทบจะไม่มีที่สิ้นสุด","ในมุมมองของแอนโธนี นี่คือเวทมนตร์ที่ไม่มีขีดจำกัดสูงสุด ตราบใดที่มันถูกบีบอัดให้มีขนาดเล็กเพียงพอ มันก็จะต้องไปถึงเวทมนตร์ระดับตำนานอย่างแน่นอน!","“ข้าแค่ไม่รู้ว่าระดับตำนานท่านไหนเป็นคนเขียนทฤษฎีสถานะกระตุ้นขององค์ประกอบนี้ขึ้นมา?”","แอนโธนีถามด้วยความอยากรู้อยากเห็น ผู้ที่เสนอทฤษฎีนี้สามารถอธิบายได้เพียงว่า เป็นผู้ที่มีความเข้าใจเกี่ยวกับองค์ประกอบอย่างลึกซึ้งเท่านั้น","“ข้าพัฒนามันขึ้นมาโดยอาศัยเวทมนตร์รวบรวมแสงของเกล็น ผสมผสานเข้ากับทฤษฎีโครงสร้างองค์ประกอบในสมาคมเวทมนตร์เร้นลับ”","ลินน์อธิบายอย่างเป็นธรรมชาติ","เมื่อตอนที่ทำการวัดความเร็วของแสงก่อนหน้านี้ เขานั้นเป็นคนพูดเองว่า การวิจัยเกี่ยวกับแสงของสมาคมเวทมนตร์เร้นลับนั้นยังอยู่ในช่วงเริ่มต้น และตอนนี้มันก็ไม่ใช่เรื่องง่ายเลยที่จะตบหน้าตัวเอง ดังนั้น ลินน์จึงทำได้เพียงรับความดีความชอบมาเป็นของตัวเองอย่างช่วยไม่ได้","ราฟาเอลและคนอื่นๆ ไม่รู้ว่าจะพูดอะไรอีกต่อไป ในช่วงเวลาหลังจากการสัมมนา ดาวรุ่งแห่งเวทมนตร์ผู้นี้ไม่เพียงแต่จะสร้างเวทมนตร์ไฟที่น่าสะพรึงกลัวขึ้นมาเท่านั้น แต่ยังใช้เวลาในการวิจัยและดัดแปลงเวทมนตร์เลเซอร์อีกด้วย","ช่องว่างระหว่างผู้คนนั้นยิ่งใหญ่กว่าช่องว่างระหว่างคนกับสุนัขเสียอีก...","“ว่าแต่ ใครเป็นผู้ชนะในการต่อสู้ครั้งนี้ล่ะ?”","ซานเชซจู่ๆ ก็ถามขึ้นมาโดยไม่ทันคิด","สำหรับซานเชซจากสายแปรสภาพแล้ว การอภิปรายเกี่ยวกับทฤษฎีเวทมนตร์เหล่านี้สำคัญน้อยกว่าการโต้เถียงเกี่ยวกับเรื่องแพ้ชนะมากนัก","และสถานการณ์ในสนามเมื่อกี้ก็ถือว่าอันตรายมาก ซึ่งเป็นตอนที่ผู้ชนะกำลังจะถูกตัดสินพอดี แต่น่าเสียดายที่ราฟาเอลหยุดมันเอาไว้ก่อน","คำพูดของซานเชซดึงดูดความสนใจของทุกคนได้อย่างไม่ต้องสงสัย แม้เวทมนตร์ไฟของลินน์นั้นน่าสะพรึงกลัว แต่เวทมนตร์เลเซอร์ของแอนโธนีก็ไม่มีทางที่จะหลบหลีกได้เลยเมื่อถูกกวาดยิง","“แน่นอนว่าข้าแพ้!”","แอนโธนีตอบกลับด้วยสีหน้าปกติ","เขาไม่สามารถหยุดยั้ง ‘เพลิงอมตะ’ ชนิดนั้นได้ แต่ลินน์อาจจะสามารถหยุดยั้งเวทมนตร์เลเซอร์ของเขาได้ ท้ายที่สุดแล้ว หลักการของเวทมนตร์บทนี้ ลินน์ก็เป็นคนบอกเขาเอง และมันก็เป็นไปไม่ได้ที่จะไม่มีวิธีรับมือ","แอนโธนีเป็นคนที่เปิดกว้างมาก และการเผชิญหน้ากับอดีตตำนาน ต่อให้พ่ายแพ้ก็ถือเป็นเรื่องปกติ","สิ่งเดียวที่เขาไม่ได้คาดคิดก็คือ เขาพ่ายแพ้เร็วขนาดนี้...","ความตรงไปตรงมาในการยอมรับของแอนโธนี ทำให้ราฟาเอลและคนอื่นๆ ประหลาดใจ และจากนั้นพวกเขาทั้งหมดก็มองไปที่ลินน์ ซึ่งเป็นชัยชนะที่ท่วมท้นเมื่อต้องเผชิญหน้ากับจอมเวทผู้ยิ่งใหญ่ระดับหกวงแหวนด้วยพลังของพ่อมดระดับสี่วงแหวน และมันเป็นเรื่องที่ยากจะเชื่อ","“ในเมื่อไม่มีผลลัพธ์ ก็ถือว่าเสมอกันก็แล้วกัน”","ลินน์ไม่ได้ตั้งใจจะเอาเปรียบแอนโธนี เพราะเขาไม่ได้ใส่ใจเกี่ยวกับผลแพ้ชนะเลย การที่เขาสามารถลงมือและเข้าใจว่า ธรรมชาติของคลอรีนไตรฟลูออไรด์นั้นเหมือนกับที่เขาคิดเอาไว้ สำหรับลินน์ แค่นั้นมันก็เพียงพอแล้ว ท้ายที่สุด ก็ไม่มีใครรู้ว่าอีกฝ่ายจะงัดเวทมนตร์แปลกประหลาดแบบไหนออกมาอีกบ้าง","การต่อสู้ระหว่างพ่อมดนั้น หากไม่ถึงนาทีสุดท้าย มันก็เป็นเรื่องยากที่จะพิสูจน์ผู้แพ้ชนะ","เมื่อพูดถึงเรื่องการแพ้ชนะของการต่อสู้ครั้งนี้ เรื่องราวในอดีตก็ถูกเปิดเผยออกมาอย่างเรียบง่าย ซึ่งทำให้ซานเชซที่มีความสนใจในตอนแรกเริ่มรู้สึกเบื่อหน่าย ดังนั้น เขาจึงต้องเปลี่ยนหัวข้อไปที่สงครามในครั้งต่อไป","เนื่องจากการขัดขวางของอัศวินกริฟฟอน ในช่วงไม่กี่วันที่ผ่านมา การตรวจจับด้วยเรือเหาะจึงลดลงอย่างมาก โดยนักบินเหล่านั้นก็กล้าที่จะสังเกตการณ์ด้วยกล้องส่องทางไกลในระยะห่างอย่างน้อยสามกิโลเมตรเท่านั้น","และถึงกระนั้น พวกเขาก็ยังเกือบจะถูกยิงตก","เอ็ดเวลผู้ชั่วร้ายคนนั้นมีลูกไม้จริงๆ เขาถึงกับซ่อนอัศวินกริฟฟอนบางส่วนเอาไว้ในป่า และปล่อยให้กองทัพเดินทัพอย่างเชื่องช้า เมื่อเรือเหาะเข้าไปใกล้เพื่อตรวจจับ เขาก็จะพุ่งออกมาจากป่า","หากนักบินไม่ตอบสนองในทันที และเรือเหาะทั้งสองลำไม่ได้หนีด้วยความเร็วสูง พวกเขาก็คงจะถูกสังหารไปแล้ว...","ด้วยเหตุนี้ จึงมีนักบินเพียงไม่กี่คนเท่านั้นที่เต็มใจจะเข้าไปใกล้และตรวจสอบ พวกเขาจึงทำได้เพียงแค่รับรู้ความเคลื่อนไหวของกองกำลังนี้อย่างผิวเผิน และไม่สามารถรับข้อมูลเพิ่มเติมได้เลย","แม้ว่าเวทมนตร์เลเซอร์จะถูกพัฒนาขึ้นมาแล้ว แต่มันก็ต้องใช้เวลามากในการติดตั้งพวกมันในวงกว้าง ลินน์จึงแนะนำว่า สามารถสอนเวทมนตร์บทนี้ให้กับพ่อมดเต็มตัวที่ไว้ใจได้บางคน และใช้พวกเขาเป็นเครื่องกำเนิดเลเซอร์มนุษย์","การยึดครองน่านฟ้ามีความสำคัญมาก เพราะสามารถลดจำนวนผู้เสียชีวิตลงได้อย่างมหาศาล...","“ถ้าอย่างนั้น มันคงจะดีกว่าถ้าพวกเราจะลงมือด้วยตัวเอง และกำจัดอัศวินกริฟฟอนที่น่ารำคาญพวกนี้ไปซะ จนกว่าพวกมันจะไม่กล้าบินขึ้นมาอีก!”","อเดลากล่าวอย่างดุร้าย","“ไม่ ผลลัพธ์ของมันเลวร้ายเกินไป!”","ลินน์ส่ายหัว","แม้ว่าจอมเวทผู้ยิ่งใหญ่เหล่านี้จะสามารถบินได้ แต่พวกเขาก็มีความยืดหยุ่นน้อยกว่าอัศวินกริฟฟอนกลางอากาศมาก และต่อให้พวกเขาจะโจมตีอย่างกะทันหัน พวกเขาก็สามารถสังหารอัศวินกริฟฟอนได้อย่างมากเพียงแค่หลายสิบคน โดยที่ไม่สามารถหยุดยั้งอัศวินกริฟฟอนคนอื่นๆ ได้เลย","ต้องรู้ก่อนว่า จำนวนของพระคาร์ดินัลในศาสนจักรนั้น มีแนวโน้มที่จะมากกว่าพวกเขา และกลุ่มคนพวกนี้ก็ยังไม่มีความตั้งใจที่จะลงมือจนถึงตอนนี้  ซึ่งอาจจะเข้ามาขัดขวางได้ทุกเมื่อ หากพวกเขาสูญเสียพลังเวทไปโดยเปล่าประโยชน์ และข้อมูลเวทมนตร์ที่สำคัญเกิดรั่วไหลออกไป พวกเขาก็จะถูกตอบโต้ในการต่อสู้ครั้งต่อไป ซึ่งมันเป็นเรื่องยากที่จะควบคุม","ไม่ทำก็คือไม่ทำ แต่ถ้าหากจะทำ ก็ต้องกวาดล้างอัศวินกริฟฟอนไปให้หมด!","มิฉะนั้น หากคนพวกนี้ล่าถอยกลับไปได้สำเร็จและไปขบคิดสักพัก บางทีพวกมันอาจจะคิดหาวิธีทำลายเวทมนตร์เลเซอร์ได้ และเมื่อถึงตอนนั้น พวกเขาก็จะต้องเผชิญกับการก่อกวนที่ไม่มีวันสิ้นสุด","เวทมนตร์และพลังศักดิ์สิทธิ์นั้นมีต้นกำเนิดเดียวกัน ซึ่งไม่ใช่สิ่งที่เป็นไปไม่ได้..."]},{"n":350,"t":"นี่คือผู้ทำลายล้างเมืองท่า อาชญากรผู้อยู่เบื้องหลังการทำลายล้างศาสนจักร!","c":["ในวันฤดูร้อนอันแสนอบอ้าว อาณาจักรฮัดลาตา ในพื้นที่รกร้างว่างเปล่าห่างจากเมืองหลวงเพียงไม่กี่กิโลเมตร","เงาสีดำขนาดใหญ่กำลังแผ่ขยายจากสุดขอบฟ้าอีกด้านหนึ่งมุ่งหน้าสู่เมืองหลวง พร้อมกับธงสีน้ำตาลที่โบกสะบัดไปมาในอากาศ ท่ามกลางเสียงกลองและเสียงฝีเท้าของม้าอย่างเป็นระเบียบ","“พวกมันมาถึงเร็วกว่าที่คิดนะ!”","ราฟาเอลและคนอื่นๆ ยืนอยู่บนกำแพงเมือง จ้องมองดูกองทัพที่กำลังเคลื่อนตัวเข้ามาใกล้จากระยะไกล มันเป็นกลุ่มก้อนสีดำทึบที่มองไม่เห็นจุดสิ้นสุด","เมื่อประเมินคร่าวๆ แล้ว น่าจะมีคนอย่างน้อยแปดหมื่นคนขึ้นไป...ซึ่งถูกแบ่งออกเป็นสามกลุ่มใหญ่ โดยกองทหารทั้งสองฝั่งนั้นมีจำนวนคนมากมาย แต่การจัดกระบวนทัพกลับค่อนข้างกระจัดกระจาย แม้แต่อาวุธและชุดเกราะของทหารก็ยังไม่ครบถ้วน","“ฮีบรู, ออสตัน, บาร์โรว์...พวกคนทรยศต่ออาณาจักร!”","ฮัตตาร์กัดฟันพูดด้วยความโกรธแค้น เขาจำได้จากธงที่โบกสะบัดสูงตระหง่าน และตราประจำตระกูลบนผืนธง ว่านี่คือกองทัพของดยุคบริเวณชายแดนของอาณาจักร","ส่วนลินน์ก็ได้ร่ายเวทมนตร์มองไกล มองไปยังกองทหารชุดเกราะสีเงินที่ถูกคุ้มกันอยู่ตรงกลาง ซึ่งทุกคนล้วนมีรูปร่างกำยำสูงใหญ่ เดินหน้าไปอย่างเคร่งขรึม ดวงตาที่เย็นชาและไร้ความปรานีจ้องมองไปข้างหน้า ทำให้ผู้ที่พบเห็นต้องรู้สึกหวาดกลัว","นี่คือกองทัพทัณฑ์ศักดิ์สิทธิ์อันโด่งดัง เพียงแค่เวลาสิบกว่าวัน กองทัพของศาสนจักรก็บุกมาถึงใต้กำแพงเมืองหลวงแล้ว","อันที่จริง จากข้อมูลที่พวกเขาได้รับ ตลอดเส้นทางนี้ก็ไม่ใช่ว่าจะไม่มีขุนนางคนไหนคิดจะลุกขึ้นมาต่อต้าน แต่มันก็เป็นเพียงแค่ความพยายามที่สูญเปล่า แม้กำแพงเมืองที่แข็งแกร่งจะสามารถต้านทานกองทัพภาคพื้นได้ แต่มันก็ไม่สามารถต้านทานอัศวินกริฟฟอนที่โจมตีลงมาจากฟากฟ้าได้เลย","ไม่จำเป็นต้องให้บิชอปลงมือด้วยซ้ำ ทั้งเมืองก็จะถูกยึดครองภายในเวลาเพียงหนึ่งชั่วโมง","“พวกเราต้องออกไปตั้งรับนอกเมืองไหมครับ? ท่านลินน์?”","เรย์เดลเอ่ยถามด้วยสีหน้าเคร่งขรึม","ส่วนเฒ่ายอร์คและคนอื่นๆ ที่อยู่ด้านข้าง กลับแสดงสีหน้าคาดหวังและกระตือรือร้น","แม้ว่ากองทัพของศาสนจักรจะมีจำนวนมากกว่าพวกเขาหลายเท่า แต่พวกเขาก็ไม่ได้หวาดกลัวเลยสักนิด ในตอนที่ดยุคริคแมนนำกองทัพที่มีจำนวนมากกว่าพวกเขาหลายเท่ามาบุกโจมตี ก็ยังถูกปืนคาบศิลาในมือของพวกเขาจัดการจนต้องหนีหัวซุกหัวซุนไม่ใช่หรือไง...","ดังนั้น ในสายตาของเฒ่ายอร์ค นี่ไม่ใช่กองทัพศัตรูแปดหมื่นคน แต่เป็นหัวคนจำนวนมหาศาลที่ต้องแย่งชิงกันต่างหาก","“ไม่ ตอนนี้ยังไม่ใช่เวลาที่เหมาะสม!”","ลินน์ส่ายหัว","เมื่อพิจารณาจากความเร็วในการผลิตเครื่องยิงเลเซอร์ในปัจจุบัน พวกเขาอาจจะต้องใช้เวลาอีกประมาณสองถึงสามวัน จึงจะสามารถนำไปติดตั้งบนเรือเหาะได้ และในสถานการณ์ที่พวกเขาไม่สามารถควบคุมน่านฟ้าได้ การบุ่มบ่ามออกไปรบนอกเมือง อาจจะทำให้เกิดความสูญเสียที่ไม่น้อยเลย","ท้ายที่สุดแล้ว คู่ต่อสู้ของพวกเขาในครั้งนี้ไม่ใช่ทหารของขุนนางที่ถือดาบแบบง่ายๆ แต่ยังเป็นพวกที่ครอบครองพลังศักดิ์สิทธิ์อันแข็งแกร่งอีกด้วย","“ท่านคิดว่าอย่างไร? ฝ่าบาทฮัตตาร์?”","ลินน์หันหน้าไปมองกษัตริย์ที่อยู่ข้างๆ","ภายในใจของฮัตตาร์นั้นร้อนรนอย่างยิ่ง ตอนนี้ดินแดนส่วนใหญ่ทางตะวันตกของอาณาจักรได้ตกอยู่ในเงื้อมมือของศัตรูหมดแล้ว และเขาอยากจะสั่งให้พ่อมดเหล่านี้พุ่งออกไปบดขยี้กองทัพของศาสนจักรที่น่ารังเกียจพวกนี้โดยเร็วที่สุด เพื่อทวงคืนดินแดนที่สูญเสียไป และประหารขุนนางที่ก่อกบฏเหล่านั้นให้หมด","แต่ในท้ายที่สุด ฮัตตาร์ก็อดกลั้นเอาไว้ เพราะเขาก็เข้าใจดีว่าการที่ลินน์พูดแบบนี้ ย่อมหมายความว่าอีกฝ่ายยังไม่มีความมั่นใจเต็มที่ เขาจึงทำได้เพียงแค่กัดฟันและกล่าวว่า","“งั้นก็ทำตามนั้นเถอะ ใช้การตั้งรับ...แทนการโจมตี!”","...","ในเวลาเดียวกัน กองทัพของศาสนจักรก็มาหยุดพักอยู่ที่พื้นที่รกร้างนอกเมืองหลวง","ชายวัยกลางคนผู้สวมชุดเกราะสีเงิน ซึ่งมีตราสัญลักษณ์ศักดิ์สิทธิ์วาดอยู่บนหน้าอกของเขา ก็จ้องมองไปที่กำแพงเมืองอย่างไม่วางตา ด้วยสายตาที่โดดเด่น แม้จะอยู่ห่างออกไปหลายกิโลเมตร เขาก็ยังสามารถมองเห็นเป้าหมายของตนเองจากฝูงชนได้อย่างชัดเจน และเอ่ยขึ้นด้วยความสนใจ","“นั่นคือจอมเวทผู้ยิ่งใหญ่ลินน์ ที่ถูกตั้งค่าหัวสามแสนเหรียญทองจักรวรรดิสินะ? ดูเหมือนว่าจะอายุน้อยกว่าที่ข้าคิดไว้เยอะเลย...”","“อย่าประมาทไป อาร์โน นี่ไม่ใช่เป้าหมายที่จะรับมือได้ง่ายๆ”","เอ็ดเวลที่สวมหน้ากากเหล็กเอ่ยเตือนด้วยสีหน้าเคร่งขรึม จากนั้นเขาก็เล่าข้อมูลเกี่ยวกับลินน์ให้อีกฝ่ายฟัง","ก่อนหน้านี้ จอมเวทผู้ยิ่งใหญ่คนนี้ถูกตั้งค่าหัวถึงห้าหมื่นเหรียญทองจักรวรรดิ ในข้อหาเผาทำลายเมืองท่า และค่าหัวนั่นก็เป็นเขาเองที่เป็นคนเขียนลงไป แต่ตอนนี้อีกฝ่ายกลับเป็นผู้บงการกบฏในอาณาจักร ค่าหัวก็ย่อมต้องเพิ่มขึ้นตามลำดับ จนตอนนี้มันสะสมมากถึงสามแสนเหรียญทองแล้ว!","นี่เป็นจำนวนเงินที่เกินจริงมาก แม้แต่คนยากจน หากมีเงินจำนวนนี้ ก็สามารถซื้อตำแหน่งดยุคที่มีอำนาจที่แท้จริงได้เลย!","และในบันทึกคนบาปของพระคัมภีร์ศักดิ์สิทธิ์ คำอธิบายเกี่ยวกับอีกฝ่าย ก็ได้มีหลายข้อหาเพิ่มเข้ามา ทั้งการทำลายล้างศาสนจักรในอาณาจักร การสังหารพระคาร์ดินัล และ...ข้อหาลบหลู่พระผู้เป็นเจ้า!","ความชั่วร้ายเหล่านี้สามารถใช้คำว่า ‘ชั่วร้ายอย่างถึงที่สุด’ มาอธิบายได้เลย และอาชญากรที่เคยปรากฏในหน้าพระคัมภีร์ศักดิ์สิทธิ์ในอดีต ก็ยังไม่มีใครสามารถนำมาเปรียบเทียบกับเขาได้เลย!","“มันครอบครองไฟนรกที่แปลกประหลาด ซึ่งสามารถกลืนกินเลือดเนื้อของผู้คนได้ และมันก็ยากที่จะดับได้ด้วยวิธีปกติ”","เอ็ดเวลเอ่ยเตือน","“ตราบใดที่องค์ประกอบในอากาศถูกแยกออกไป การเผาไหม้ของมันก็จะถูกสกัดกั้นเอาไว้ได้ นอกจากนี้ ทรายและหินที่ไม่ติดไฟก็สามารถฝังมันได้เช่นกัน โดยที่อุณหภูมินั้นเป็นกุญแจสำคัญ...”","เอ็ดเวลอธิบายอย่างละเอียด ก่อนหน้านี้เขาได้ส่งคนไปค้นหาซากเรือเหาะลำนั้น และได้ทำการวิเคราะห์คุณลักษณะของเปลวไฟชนิดนี้ บิชอปก็ได้พยายามใช้วิธีต่างๆ ในการดับไฟ และในที่สุดพวกเขาก็ใช้วิธีเอาทรายมากลบ","“ในเมื่อเป็นเช่นนั้น ข้าขอรับเงินรางวัลสามแสนเหรียญทองนี้ไปก็แล้วกัน!”","อาร์โนฉีกยิ้มที่มุมปาก และจดจำคำพูดของเอ็ดเวลเอาไว้อย่างหนักแน่นในใจ","“ต่อให้เจ้าจะมีความสามารถ แต่เวทมนตร์น้ำแข็งของเขาก็ไม่ธรรมดาเช่นกัน...","ใบหน้าที่สวมหน้ากากเหล็กของเอ็ดเวลนั้น ไม่สามารถมองเห็นการแสดงออกทางอารมณ์ใดๆ ได้ หลังจากที่เอ่ยเตือนอีกครั้ง เขาก็หันหน้าไปมองดยุคของอาณาจักรหลายคน","“ฮีบรู, ออสตัน, บาร์โรว์...พวกเจ้าจะเป็นผู้นำกองทัพของอาณาจักรในฐานะทัพหน้า!”","“แต่ว่า...ท่านเอ็ดเวล พ่อมดเหล่านั้นสามารถร่ายเวทมนตร์ที่แปลกประหลาดได้มากมาย ข้าเกรงว่าแค่พวกเรา คงไม่สามารถแม้แต่จะเข้าใกล้กำแพงเมืองได้เลยขอรับ”","ดยุคบาร์โรว์เอ่ยด้วยน้ำเสียงสั่นเครือเล็กน้อย","ขุนนางของอาณาจักรที่ยืนดูอยู่รอบๆ ก็มีท่าทีลังเลเช่นกัน แม้ว่าพวกเขาจะเลือกที่จะยอมจำนนโดยไม่ลังเล ในตอนที่กองทัพของศาสนจักรบุกโจมตี แต่นี่ก็ไม่ได้หมายความว่าพวกเขาจะมีความศรัทธามากขนาดนั้น","จากข้อมูลที่ได้รับ กองทัพที่ได้รับการฝึกฝนโดยพ่อมดเหล่านั้น ใช้อาวุธเวทมนตร์ประหลาดบางอย่าง ซึ่งมีอานุภาพทำลายล้างที่รุนแรงมาก","กองทหารม้าที่ได้รับการฝึกฝนมาอย่างดีตลอดทั้งกองทัพ ถูกบดขยี้อย่างง่ายดายในระหว่างการพุ่งชาร์จ แม้ว่าพวกเขาจะสามารถยึดเมืองหลวงแห่งนี้ได้ พวกเขาก็คงจะล้มตายเป็นจำนวนมาก","“นี่คือโอกาสเดียวของพวกเจ้า ในการใช้ความจริงเพื่อพิสูจน์ความจงรักภักดีที่มีต่อพระผู้เป็นเจ้า และสารภาพบาปที่พวกเจ้าได้ก่อขึ้น!”","คำพูดของเอ็ดเวลนั้น เต็มไปด้วยน้ำเสียงที่ไม่เปิดโอกาสให้โต้แย้ง","เอ็ดเวลไม่รู้สึกดีกับพวกขุนนางที่กลับกลอกแบบนี้เลยแม้แต่น้อย","หลังจากที่กลุ่มพ่อมดสังหารกษัตริย์บาเซลและก่อกบฏ ก็มีเพียงขุนนางส่วนน้อยที่ภักดีต่อศาสนจักรเท่านั้นที่เลือกที่จะต่อต้าน ในขณะที่คนส่วนใหญ่นั้นลังเล หรือแม้กระทั่งร่วมมือกับพวกพ่อมด เพื่อโจมตีนักบวชและบิชอปในท้องถิ่น","ไม่ต้องสงสัยเลยว่าคนเหล่านี้ล้วนเป็นคนบาป ดังนั้น เอ็ดเวลจึงได้กวาดต้อนขุนนางทั้งหมดในดินแดนตะวันออกของอาณาจักร ไม่ว่าจะเป็นบารอน ไวเคานต์ หรือแม้แต่ดยุค จนสามารถรวบรวมกองทัพได้มากมายขนาดนี้"]},{"n":351,"t":"กองทัพประชิดกำแพงเมือง และปืนคาบศิลาที่ยากจะทะลวงการป้องกัน","c":["ภายใต้การบีบบังคับของเอ็ดเวล ฮีบรูและบาร์โรว์ต่างก็มองหน้ากัน ภายในใจของพวกเขารู้สึกเสียใจเป็นอย่างยิ่ง หากกองทัพของพวกเขาล้มตายจนหมด แม้ว่าพวกเขาจะมีตำแหน่งเป็นดยุค มันก็ไม่อาจรับมือกับการโจมตีจากขุนนางคนอื่นๆ ได้เลย","ถ้ารู้ว่าจะเป็นแบบนี้ พวกเขาสู้ยอมทำตามคำสั่งของฮัตตาร์ แล้วยกทัพเข้าเมืองหลวงไปเลยยังจะดีเสียกว่า...","แต่ตอนนี้ความเสียใจก็สายเกินไปแล้ว ไม่ว่าฮีบรูและบาร์โรว์จะไม่ยินยอมเพียงใด พวกเขาก็ทำอะไรไม่ได้อยู่ดี","ในขณะนั้นเอง น้ำเสียงอันเฉยเมยของเอ็ดเวลก็ดังขึ้นข้างหูของทุกคน","“ในหมู่พวกเจ้าทั้งหมด ใครสามารถยึดเมืองหลวงได้ หรือใครสร้างผลงานได้โดดเด่นที่สุด คนผู้นั้นก็คือผู้ปกครองอาณาจักรฮัดลาตาคนต่อไป!”","คำพูดของเอ็ดเวลนั้นราวกับก้อนหินก้อนใหญ่ที่ถูกโยนลงไปในทะเลสาบอันเงียบสงบ เหล่าขุนนางที่อยู่ในเหตุการณ์ต่างก็มีดวงตาเบิกโพลงด้วยความตื่นเต้น","ฮีบรูและบาร์โรว์ก็ไม่มีข้อยกเว้น นี่คือโอกาสที่จะได้ปกครองทั่วทั้งอาณาจักรเชียวนะ!","และมันก็อาจจะเป็นโอกาสเดียวเท่านั้น!","ในฐานะขุนนางของอาณาจักร พวกเขาสามารถโจมตีกันเองเพื่อแย่งชิงดินแดน หรือแม้แต่ใช้วิธีการอันดำมืดสารพัดรูปแบบ แต่มีเพียงสิ่งเดียวที่พวกเขาไม่สามารถล้ำเส้นได้ นั่นก็คือการขึ้นเป็นกษัตริย์!","เว้นเสียแต่ว่าจะได้รับการยอมรับจากศาสนจักร...และสวมมงกุฎภายใต้การเป็นพยานและรับพรจากพระผู้เป็นเจ้า!","เมื่อหนึ่งร้อยกว่าปีก่อน กษัตริย์องค์แรกของตระกูลบาเซล ก็แย่งชิงบัลลังก์มาด้วยวิธีนี้เช่นกัน!","นั่นก็หมายความว่า หลังจากที่ได้เป็นกษัตริย์แล้ว ตราบใดที่ไม่ทรยศต่อศาสนจักร ก็สามารถส่งต่อบัลลังก์ไปชั่วนิรันดร์ได้ภายใต้ความคุ้มครองของพระผู้เป็นเจ้า!","แต่ตอนนี้ กษัตริย์บาเซลสิ้นพระชนม์แล้ว และองค์ชายใหญ่ก็สิ้นพระชนม์อย่างน่าอนาถในเมืองหลวงเช่นกัน บวกกับคำรับรองของเอ็ดเวล ก็ยิ่งทำให้การเปลี่ยนกษัตริย์มีความเป็นไปได้มากยิ่งขึ้น!","เมื่อคิดได้เช่นนี้ เหล่าขุนนางของอาณาจักรต่างก็ตื่นเต้นเป็นอย่างยิ่ง เพราะภายใต้การสนับสนุนของศาสนจักร แม้ว่าจะเป็นเพียงบารอนตัวเล็กๆ ก็ยังมีโอกาสที่จะก้าวขึ้นเป็นกษัตริย์ได้!","ฮีบรูลงมือทันที เขาขี่ม้าพุ่งไปอยู่ต่อหน้าทหาร และเอ่ยขึ้นด้วยความฮึกเหิมว่า","“เหล่าสาวกของพระผู้เป็นเจ้า พวกสาวกของปีศาจนอกรีตอยู่ที่เมืองหลวงตรงหน้าพวกเจ้า พวกมันพยายามที่จะเปิดประตูสู่นรก เพื่อทำลายล้างทั้งอาณาจักร และปล่อยให้ปีศาจ ภัยพิบัติ และโรคระบาดแพร่กระจายไปทั่วอาณาจักร...","พวกเราจะปล่อยให้เรื่องแบบนี้เกิดขึ้นไม่ได้เด็ดขาด พวกคนชั่วและพวกนอกรีตเหล่านี้ จะต้องชดใช้ด้วยเลือด สำหรับการกระทำอันชั่วร้ายของพวกมัน!”","“แค่ฆ่าศัตรูที่อยู่ตรงหน้าพวกเจ้าได้หนึ่งคน ก็จะได้รับเหรียญทองจักรวรรดิหนึ่งเหรียญ ฆ่าพ่อมดได้หนึ่งคน จะได้รับการแต่งตั้งเป็นอัศวิน และใครที่สามารถปีนขึ้นไปบนกำแพงเมืองได้เป็นคนแรก จะได้รับรางวัลเป็นทองคำนับพัน และได้รับการแต่งตั้งเป็นเอิร์ล!”","คำพูดของฮีบรูที่ดังกังวานราวกับระฆังใบใหญ่ ดังก้องไปทั่วพื้นที่รกร้างว่างเปล่า ภายใต้การกระตุ้นของรางวัลอันหนักหน่วง ความกระตือรือร้นของกองทัพนับหมื่นก็ถูกปลุกให้ตื่นขึ้นมาในพริบตา","“พระผู้เป็นเจ้าสถิตอยู่กับพวกเรา!”","ฮีบรูตะโกนเสียงดัง","“พระผู้เป็นเจ้าสถิตอยู่กับพวกเรา!”","ขวัญกำลังใจของกองทัพนับหมื่นพุ่งสูงขึ้น พวกเขาต่างก็ตะโกนออกมาพร้อมกัน เสียงตะโกนอันดังกังวานนั้น ดังก้องกังวานไปทั่วขอบฟ้า ราวกับเสียงฟ้าร้อง","จากนั้น ขุนนางหลายสิบคนก็นำทหารส่วนตัวของพวกเขา บุกตะลุยเข้าสู่เมืองหลวงอย่างยิ่งใหญ่...","เสียงรัวกลองก็ดังขึ้นเรื่อยๆ พร้อมกับบทสวดสรรเสริญอันศรัทธาของเหล่านักบวชและบิชอป","“เจ้าแห่งดวงดาวและเทพีแห่งดวงจันทร์ผู้ยิ่งใหญ่ พระผู้สร้างสรรพสิ่งบนโลก ขอทรงโปรดประทานพร และมอบแสงสว่าง ความหวัง รวมถึงความแข็งแกร่งให้กับพวกเราด้วยเถิด...”","ท่ามกลางบทสวดสรรเสริญอันไพเราะ แสงพลังศักดิ์สิทธิ์ก็ปรากฏขึ้นบนร่างของทหารของขุนนางนับหมื่นคน ในเวลานี้ จิตใจของพวกเขาเต็มไปด้วยความกล้าหาญและความแข็งแกร่งอันไร้ที่สิ้นสุด","“มาแล้ว พวกมันมาแล้ว!”","ความน่าเกรงขามของการพุ่งชาร์จของกลุ่มคนนับหมื่น ทำให้เฒ่ายอร์คและคนอื่นๆ ที่เตรียมพร้อมอยู่ก่อนแล้ว อดไม่ได้ที่จะรู้สึกประหม่า แต่พวกเขาก็ยังคงเล็งปืนคาบศิลาเอาไว้ทันที และรอคอยให้ศัตรูเข้ามาอยู่ในระยะการยิงอย่างเงียบๆ","แน่นอนว่าสภาพแวดล้อมในการยิงปืนคาบศิลาที่ดีที่สุดก็คือ การที่ทั้งสองฝ่ายอยู่ในระนาบเดียวกัน และเข้าแถวเรียงหน้ากระดานเพื่อทำการยิง อย่างไรก็ตาม การอยู่บนที่สูงก็สามารถช่วยให้มองเห็นวิสัยทัศน์ได้กว้างไกลยิ่งขึ้น ยิ่งไปกว่านั้น ศัตรูของพวกเขาในครั้งนี้ก็มีจำนวนมากเกินไป จนพวกเขาไม่ต้องกังวลเลยว่าจะยิงพลาด","พลปืนหนึ่งหมื่นคนที่ประจำการอยู่บนกำแพงเมือง ถูกแบ่งออกเป็นหลายกลุ่ม และพวกเขาจะทำการยิงตามคำสั่ง เพื่อสร้างการยิงที่ต่อเนื่อง","เมื่อเสียงปืนระลอกแรกดังขึ้น ทหารที่พุ่งชาร์จเข้ามาเป็นกลุ่มก็ล้มลงเป็นแถวๆ เมื่อประเมินคร่าวๆ แล้ว มีคนล้มลงไปมากกว่าหนึ่งพันคน ซึ่งฉากนี้ดูตระการตาเป็นอย่างยิ่ง แต่เพียงหนึ่งวินาทีต่อมา ผู้คนเกือบเจ็ดสิบเปอร์เซ็นต์ก็ลุกขึ้นยืนอีกครั้ง พร้อมดวงตที่แดงก่ำ แล้วตะโกนว่า ‘เพื่อพระผู้เป็นเจ้า’ และพุ่งเข้าหากำแพงเมืองต่อไป","พ่อมดที่เฝ้าดูการต่อสู้อยู่บนกำแพงเมือง ต่างก็มีสีหน้าเคร่งขรึมเป็นอย่างยิ่ง","โดยลินน์สามารถมองเห็นได้ว่า คนเหล่านี้ได้รับการคุ้มครองจากพลังศักดิ์สิทธิ์","เพราะครั้งที่แล้ว ที่เขาเผชิญหน้ากับกองทัพของอาณาจักร เขาก็เคยเห็นอะไรที่คล้ายกันนี้ เพียงแต่คู่ต่อสู้ในตอนนั้นเป็นเพียงบิชอปไม่กี่คนและนักบวชหลายสิบคน ซึ่งความแข็งแกร่งของพลังศักดิ์สิทธิ์ที่ถูกปล่อยออกมานั้นมีจำกัด โดยสามารถล้างสมองและเพิ่มความกล้าหาญให้กับผู้คนได้เท่านั้น","แต่ครั้งนี้มันแตกต่างออกไป พวกเขาถึงกับร่ายโล่ศักดิ์สิทธิ์ของจริงให้กับผู้คนนับหมื่นคน ซึ่งความแข็งแกร่งน่าจะใกล้เคียงกับเวทมนตร์ป้องกันระดับหนึ่งวงแหวน แม้ว่ามันจะไม่สามารถต้านทานการโจมตีของปืนคาบศิลาได้ แต่มันก็สามารถลดทอนความรุนแรงลงได้อย่างมาก","หากยิงโดนจุดที่ชุดเกราะแข็งแกร่งกว่า มันก็ไม่สามารถทะลวงการป้องกันได้เลย และทำได้เพียงกระแทกทำให้ล้มลงเท่านั้น","หากพลปืนในตอนนี้ไม่ได้ใช้ปืนคาบศิลา แต่เป็นหน้าไม้ล่ะก็ เกรงว่าแม้แต่จะทำลายการป้องกันก็ยังเป็นเรื่องยากเลยด้วยซ้ำ!","“โชคดีนะที่โล่เหล่านี้ใช้ได้แค่ครั้งเดียว...”","เมื่อมองเห็นทหารที่ลุกขึ้นมาเหล่านั้น ส่วนใหญ่ล้มลงและไม่สามารถลุกขึ้นมาได้อีกเลยหลังจากถูกยิงระลอกที่สอง ราฟาเอลก็ถอนหายใจด้วยความโล่งอกทันที","แต่นี่ก็เทียบเท่ากับว่าหนึ่งคนมีชีวิตเพิ่มขึ้นมาอีกหนึ่งชีวิต","เมื่อคิดได้เช่นนี้ ราฟาเอลก็หันศีรษะไปมองลินน์ และเขาก็รู้สึกชื่นชมในวิสัยทัศน์อันกว้างไกลของดาวรุ่งแห่งเวทมนตร์คนนี้จริงๆ","เมื่อหลายวันก่อน ในตอนที่พวกเขาพูดคุยกันถึงวิธีการรับมือกับสงครามในครั้งนี้ พวกเขาต่างก็เสนอให้เป็นฝ่ายเปิดฉากโจมตีก่อน โดยอาศัยความได้เปรียบด้านอาวุธยุทโธปกรณ์ เพื่อบดขยี้กองทัพของศาสนจักรในพื้นที่รกร้างว่างเปล่า หรือถึงขั้นบุกทะลวงเข้าไปในเขตแดนของจักรวรรดิเลยด้วยซ้ำ","ท้ายที่สุด ชัยชนะสองครั้งก่อนหน้านี้ก็ได้มาอย่างง่ายดายเกินไป กองทัพปืนคาบศิลาก็สามารถบดขยี้ศัตรูที่มีจำนวนมากกว่าพวกเขาหลายเท่า ด้วยอัตราการบาดเจ็บที่ต่ำมาก เรียกได้ว่าศัตรูของพวกเขานั้นไม่สามารถต้านทานได้อย่างมีประสิทธิภาพเลยด้วยซ้ำ แล้วแบบนี้ทำไมถึงไม่บุกทะลวงเข้าไปเลยล่ะ?","มีเพียงลินน์เท่านั้นที่ยืนกรานที่จะป้องกันเมืองเอาไว้ ก่อนที่จะสืบหาข้อมูลเชิงลึกของศัตรู และพยายามหลีกเลี่ยงการต่อสู้ในที่ราบให้มากที่สุดเท่าที่จะทำได้","แม้นี่เป็นประโยชน์ต่อทีมปืนคาบศิลาก็จริง แต่มันก็เหมาะอย่างยิ่งสำหรับการต่อสู้ด้วยกองทัพขนาดใหญ่ และการพุ่งชาร์จของทหารม้าเช่นกัน!","ตอนนี้ดูเหมือนว่า ด้วยการมีอยู่ของพลังศักดิ์สิทธิ์คุ้มครองขนาดใหญ่เช่นนี้ ปืนคาบศิลาจึงไม่สามารถแสดงอานุภาพออกมาได้ร้อยเปอร์เซ็นต์ หากพวกเขาไปต่อสู้ในพื้นที่รกร้างว่างเปล่า ขบวนทัพของพวกเขาก็มีความเป็นไปได้สูงที่จะถูกตีจนแตกพ่าย...","ในเวลาเดียวกัน เหล่าสมาชิกของทีมปืนคาบศิลา ต่างก็พบว่าศัตรูในครั้งนี้ของพวกเขานั้นไม่ธรรมดาจริงๆ เพราะพวกเขาสามารถรับการโจมตีจากปืนคาบศิลาได้โดยไม่ตาย และยังสามารถแบกบันไดปีนกำแพงเข้ามาใกล้ได้อย่างแข็งขัน ซึ่งทำให้พวกเขาทุกคนต้องละทิ้งทัศนคติที่หยิ่งยโสไปในทันที","เฒ่ายอร์คที่ถูกจัดให้อยู่ในกลุ่มที่สามสำหรับการยิง ได้ใช้กล้องส่องทางไกลที่แลกมาด้วยความดีความชอบทางทหาร ในระหว่างการยิงสองระลอกแรก เพื่อสังเกตการณ์ความเคลื่อนไหวของศัตรูอย่างระมัดระวัง","และในไม่ช้าเขาก็พบว่า ทหารที่ตายไปในการยิงระลอกแรก ล้วนแต่ถูกยิงเข้าที่จุดอ่อนของชุดเกราะ หรือไม่ก็โชคร้ายสุดๆ ที่ถูกยิงเข้าที่ใบหน้าโดยตรง","นั่นก็หมายความว่า ไม่ใช่ว่าปืนคาบศิลาในมือของพวกเขาไม่สามารถทะลวงการป้องกันได้ แต่มันต้องผ่านการป้องกันถึงสองชั้น ทั้งจากพลังศักดิ์สิทธิ์และชุดเกราะ ดังนั้น หัวกระสุนจึงไม่สามารถสร้างความเสียหายที่รุนแรงถึงชีวิตได้..."]},{"n":352,"t":"การป้องกันเมืองหลวงอันน่าเศร้าสลด","c":["“กองที่สาม ยิง!”","เสียงตะโกนอันแหลมสูงดังก้องไปทั่วกำแพงเมือง","เฒ่ายอร์ครีบดึงสลักปืน และวางกล้องส่องทางไกลที่ปรับกำลังขยายแล้วลงบนพานท้ายปืน เล็งเป้าหมายไปที่พวกขุนนางในชุดเครื่องแต่งกายอันหรูหรา เพื่อทำการยิง","ในระหว่างการยิงสองระลอกก่อนหน้านี้ เขาได้พบเป้าหมายของเขาแล้ว และมันก็คือคนที่มีเสื้อผ้าที่ดูเตะตาที่สุด!","“บุก...บุกเข้าไป!”","ใต้กำแพงเมืองหลวง ดยุคบาร์โรว์ตะโกนเสียงดัง แม้ว่าเสียงปืนและเสียงคำรามของปืนใหญ่ที่หนาแน่นจะดังขึ้นอย่างต่อเนื่องบนสมรภูมิ แต่ภายในใจของเขาก็ไม่มีความหวาดกลัวเลยแม้แต่น้อย เพราะเขาเชื่อว่า พระผู้เป็นเจ้ากำลังคุ้มครองเขาอยู่ และเชื่อว่าชุดเกราะที่เขาซื้อมาในราคาสูงลิ่ว จะมีการป้องกันที่ดีที่สุด","และตอนนั้น บาร์โรว์ก็ราวกับเห็นภาพตอนที่ตนเองบุกเข้าไปในเมือง สังหารกษัตริย์จอมปลอมฮัตตาร์ และสวมมงกุฎ!","ความตื่นเต้นที่ยากจะอธิบายได้พุ่งพล่านไปทั่วสมอง แต่ในวินาทีต่อมา ความคิดของเขาก็หยุดชะงักลง ก่อนจะมีกระสุนตะกั่วทรงกลมพุ่งทะลวงอากาศมา และเจาะทะลุม่านพลังศักดิ์สิทธิ์ในพริบตา ก่อนจะพุ่งตรงผ่านช่องโหว่ของชุดเกราะ และเจาะเข้าไปในดวงตาของบาร์โรว์!","พลังศักดิ์สิทธิ์ค่อยๆ จางหายไป สติสัมปชัญญะก็หลุดลอยไปอย่างรวดเร็ว ในชั่วขณะที่บาร์โรว์สูญเสียสติ เขาก็เพิ่งจะตระหนักได้ว่า ตำแหน่งกษัตริย์ที่พูดถึงนั้น แท้จริงแล้วมันก็เป็นเพียงแค่สิ่งล่อใจที่ว่างเปล่า พวกเขาเหล่านี้เป็นเพียงแค่เศษสวะ ที่ถูกใช้เป็นเครื่องมือในการรับการโจมตีจากศัตรูเท่านั้นเอง","“สมบรูณ์แบบ!”","เฒ่ายอร์คที่เพิ่งจะเก็บหัวศัตรูไปได้หนึ่งคนบนกำแพงเมือง ก็ร้องตะโกนเชียร์ให้กับความแม่นยำในการยิงของตนเอง เจ้าคนโชคร้ายเมื่อกี้ใส่ชุดเกราะหรูหราขนาดนั้น ไม่ว่ายังไงก็ต้องเป็นขุนนางชั้นสูงอย่างแน่นอนใช่ไหมล่ะ?","แบบนี้ก็เท่ากับว่าเขาได้เหรียญทองมาอีกหลายเหรียญแล้ว!","หลังจากที่เฒ่ายอร์คบรรจุกระสุนใหม่อย่างมีความสุข เขาก็หยิบกล้องส่องทางไกลขึ้นมา เพื่อมองหาเป้าหมายต่อไปทันที","มีสมาชิกทีมปืนคาบศิลาไม่น้อยเลยที่มีความคิดเล็กๆ แบบเดียวกับเขา พวกขุนนางบนสมรภูมิที่ถูกควบคุมด้วยพลังศักดิ์สิทธิ์และความโลภ ต่างก็ถูกสังหารอย่างน่าอนาถ ท่ามกลางเสียงปืนที่ดังขึ้นอย่างต่อเนื่อง","แม้จะไม่ใช่ทุกคนที่จะเป็นมือปืนที่แม่นยำ และพวกขุนนางก็สวมชุดเกราะที่ประณีตที่สุด แต่พวกเขาก็ไม่สามารถทนต่อการถูกเล็งด้วยปืนคาบศิลาหลายสิบกระบอกได้ เพียงแค่การยิงระลอกเดียว ร่างกายของพวกเขาก็พรุนเป็นรังผึ้งในทันที","จำนวนผู้บาดเจ็บและเสียชีวิตที่เพิ่มมากขึ้นเรื่อยๆ ทำให้ฮีบรูและคนอื่นๆ ที่กำลังเลือดขึ้นหน้า ก็ค่อยๆ หลุดพ้นจากผลกระทบของพลังศักดิ์สิทธิ์","ท้ายที่สุด พวกเขาก็ไม่ใช่คนยากจนที่หลอกง่าย แม้ว่าจะมีอำนาจในการปกครองอาณาจักรเป็นสิ่งล่อใจ แต่ท้ายที่สุด พวกเขาก็ไม่สามารถต้านทานความหวาดกลัวต่อความตายได้อยู่ดี ฝีเท้าในการบุกของพวกเขาเริ่มช้าลงเรื่อยๆ หรือไม่ก็หดตัวไปอยู่ด้านหลัง เพื่อสั่งการให้กองทัพสู้รบแทน...","ขณะที่ยอดผู้เสียชีวิตของทหารกลับรุนแรงยิ่งกว่า ในเวลาไม่ถึงหนึ่งชั่วโมง มีผู้เสียชีวิตใต้กำแพงเมืองมากกว่าสี่พันคน และเลือดสีแดงฉานก็ย้อมผืนดินกว้างใหญ่นอกเมืองให้กลายเป็นสีแดง...","เสียงฆ่าฟันและเสียงปืนยังคงดังก้องไปทั่วสมรภูมิ บางครั้งก็มีพายุลูกศรพุ่งตกลงมาเป็นระยะๆ แต่มันก็มักจะถูกขัดจังหวะด้วยการทิ้งระเบิดของปืนใหญ่ในไม่ช้า ซึ่งไม่ได้เป็นภัยคุกคามมากนัก...","ความเสียสละเหล่านี้ไม่ใช่ว่าจะไร้ประโยชน์ เพราะพวกเขาได้ก้าวข้ามเส้นแห่งความตาย บุกทะลวงมาจนถึงใต้กำแพงเมือง และตั้งบันไดปีนกำแพงขึ้นมาได้แล้ว","พร้อมเครื่องกระทุ้งประตูเมืองที่ได้รับการเสริมพลังป้องกัน ก็มาถึงประตูเมืองแล้วเช่นกัน ภายใต้การคุ้มครองของกำแพงมนุษย์ แต่มันก็ถูกกระสุนปืนใหญ่ยิงใส่ติดต่อกันหลายนัด จนทำให้มันเอียงไปบ้าง","ค้อนเหล็กหนักๆ กระแทกเข้ากับประตูเมืองครั้งแล้วครั้งเล่า ส่งเสียงดังอู้อี้ที่ยากจะทนฟังได้","แต่นอกจากจะสั่นสะเทือนเล็กน้อยแล้ว ประตูเมืองก็ยังคงตั้งตระหง่านอยู่ เพราะด้านหลังของมันคือกำแพงคอนกรีตหนาถึงครึ่งเมตร ซึ่งถูกสร้างขึ้นโดยลินน์และคนอื่นๆ ด้วยการใช้เวทมนตร์ มันจึงมีความแข็งแกร่งเป็นอย่างยิ่ง อย่าว่าแต่เครื่องกระทุ้งกำแพงเลย ต่อให้เป็นพลังศักดิ์สิทธิ์ ก็ยังยากที่จะทะลวงมันเข้าไปได้","เมื่อเห็นทหารมารวมตัวกันที่ใต้ประตูเมืองมากขึ้นเรื่อยๆ พ่อมดที่ยืนอยู่บนกำแพงเมืองก็ลงมือในที่สุด เปลวไฟ น้ำแข็ง สายฟ้า หินถล่ม...เวทมนตร์หลายบทตกลงมาอย่างต่อเนื่อง ทำให้สมรภูมิทั้งหมดกลายเป็นนรกบนดิน!","เพียงแค่การทิ้งระเบิดเวทมนตร์ระลอกเดียว ก็มีผู้เสียชีวิตและบาดเจ็บหลายพันคน พร้อมด้วยบันไดปีนกำแพงและเครื่องกระทุ้งกำแพงที่สร้างขึ้นมาอย่างยากลำบาก ก็ถูกเผาทำลายจนกลายเป็นเถ้าถ่าน...","หลังจากที่กวาดล้างทหารที่เข้ามาใกล้กำแพงเมืองไปแล้ว เอล็อคและคนอื่นๆ ก็หยุดร่ายมนตร์ และปล่อยให้ทีมปืนคาบศิลาทำการโจมตีต่อไป","พลังเวทของพ่อมดไม่ใช่สิ่งที่มีอยู่อย่างไม่จำกัด โดยปกติแล้ว หากพวกเขาร่ายเวทมนตร์ระดับเดียวกันห้าถึงหกบทติดต่อกัน พวกเขาก็จะเข้าสู่สภาวะขาดแคลนพลังจิต แถมพวกผู้ใช้พลังศักดิ์สิทธิ์เหล่านั้นก็ยังไม่ได้เข้าสู่สมรภูมิโดยตรงเลย ดังนั้น พวกเขาจึงไม่สามารถทุ่มเทพลังมากเกินไปได้","ด้วยจำนวนผู้เสียชีวิตที่เพิ่มขึ้น กลับไม่ได้ทำให้ทหารที่เหลือรู้สึกหวาดกลัวเลย พวกเขายังคงบุกตะลุยไปข้างหน้า ราวกับว่ามองไม่เห็น หรือไม่ได้ยินเสียงกรีดร้องอันน่าสลดใจของเพื่อนร่วมรบที่อยู่ข้างๆ โดยเอาแต่พร่ำร้องคำว่า ‘เพื่อพระผู้เป็นเจ้า’ และเดินหน้าวางบันไดปีนกำแพงต่อไป...","พลังศักดิ์สิทธิ์ประเภทสนับสนุนเหล่านี้ ยิ่งมีความเชื่อมั่นลึกซึ้งมากเท่าไหร่ ผลกระทบที่ได้รับก็จะยิ่งมากขึ้นเท่านั้น!","และกลุ่มคนยากจนระดับล่างเหล่านี้ล้วนไม่มีอะไรจะเสีย พวกเขาทำได้เพียงพึ่งพาการสวดอ้อนวอน เพื่อต่อสู้กับความยากลำบากในชีวิต และในเวลานี้ ในสายตาของพวกเขา ลินน์และคนอื่นๆ ที่อยู่บนกำแพงเมือง ก็เปรียบเสมือนต้นเหตุของความชั่วร้ายทั้งหมด เป็นคนที่สร้างความทุกข์ยากให้กับพวกเขา!","พวกเขาถึงขั้นบ้าคลั่งจนทำให้เฒ่ายอร์คเกิดความรู้สึกลังเลในตอนที่ลั่นไกปืน คนเหล่านี้มันก็แค่ผีร้ายจากนรกชัดๆ ถึงขนาดที่ว่าบางคนขาขาดไปแล้ว ก็ยังคลานมาจนถึงใต้กำแพงเมือง และใช้เล็บขูดขีดกำแพงเมืองอันแข็งแกร่ง!","“ช่างน่าสลดใจจริงๆ!”","ราฟาเอลถอนหายใจด้วยความเวทนา นี่เป็นครั้งแรกที่เขาได้เผชิญหน้ากับสงครามขนาดใหญ่เช่นนี้ แต่เขาก็ไม่มีเจตนาที่จะลงมือ ทำได้เพียงมองดูอย่างเงียบๆ เพราะฉากเล็กๆ แค่นี้ ยังห่างไกลจากเวลาที่พวกเขาต้องลงมือมากนัก","ลินน์ขมวดคิ้วเล็กน้อยด้วยความประหลาดใจเป็นอย่างยิ่ง เขาไม่เข้าใจว่าเอ็ดเวลกำลังทำอะไรอยู่ หรือว่าจะส่งคนเหล่านี้มาตายเปล่างั้นเหรอ?","ตามหลักยุทธศาสตร์แล้ว หากไม่มีกองกำลังมากกว่าหลายเท่า และไม่มีอาวุธหรือยุทธวิธีที่ทันสมัยกว่า การบุกโจมตีเมืองก็ไม่ต่างอะไรจากการส่งคนไปตาย...","ต่อให้คนหลายหมื่นคนนี้จะตายไปจนหมด พวกเขาก็ไม่มีทางทำให้เมืองนี้สั่นคลอนได้แม้แต่น้อย...","เอ็ดเวลไม่มีทางเป็นคนบ้าบิ่นที่รู้จักแต่การบุกโจมตีอย่างแน่นอน มิฉะนั้น เขาก็คงจะไม่มีคุณสมบัติที่จะนำกองทัพมาปราบปรามอาณาจักร และเป็นผู้นำกองทัพทัณฑ์ศักดิ์สิทธิ์และอัศวินกริฟฟอน ซึ่งเป็นกองกำลังชั้นยอดทั้งสองกองนี้ได้หรอก","“เป็นไปได้ไหมว่าพวกมันต้องการใช้ชีวิตของคนยากจนเหล่านี้ เพื่อผลาญกระสุนของพวกเรา?”","ซานเชซคาดเดา","เมื่อได้ยินเช่นนี้ ราฟาเอลและคนอื่นๆ ก็เริ่มเป็นกังวลขึ้นมา","เพราะพลปืนคาบศิลาหนึ่งหมื่นคนที่ทำหน้าที่ป้องกันอยู่บนกำแพงเมือง เพียงแค่ทำการยิงไปไม่กี่ระลอก ก็ผลาญกระสุนไปหลายหมื่นนัดแล้ว และปริมาณที่ใช้ในแต่ละชั่วโมงนั้น ก็เริ่มต้นที่หนึ่งแสนนัดเลยทีเดียว!","แม้พวกเขาจะไม่เข้าใจกระบวนการผลิตกระสุนตะกั่ว แต่พวกเขาก็สังเกตเห็นว่ามันมีลักษณะกลม และมีขนาดมาตรฐานเหมือนกันหมด ต่อให้กระบวนการผลิตจะไม่ซับซ้อน แต่มันก็ต้องใช้เวลาไม่น้อยเลย","“ฮ่าฮ่า นั่นมันก็เป็นแค่ความเพ้อฝันเท่านั้นแหละ! พวกเจ้าคงไม่รู้ล่ะสิ ว่ากระสุนเหล่านั้นถูกสร้างขึ้นมาได้อย่างไร!”","เดนนิสหัวเราะเยาะและเอ่ยขึ้น","“ต่อให้มันจะสร้างง่ายแค่ไหน คนๆ หนึ่งจะปั้นได้สักกี่ลูกในหนึ่งวันกันเชียว?”","จอมเวทผู้ยิ่งใหญ่คนหนึ่งกล่าวอย่างขบขัน","“กระสุนพวกนั้นคงไม่สามารถตกลงมาจากฟ้าได้หรอก ใช่ไหม?”","เขาพอจะเดาวิธีการผลิตได้บ้าง ซึ่งก็คงไม่พ้นการนำแร่ตะกั่วมาหลอมด้วยความร้อนสูง แล้วหาวิธีทำให้มันกลายเป็นลูกกลมๆ ขนาดเท่ากัน","“ไม่หรอก มันตกลงมาจากฟ้าจริงๆ นั่นแหละ!”","เดนนิสกล่าวด้วยสีหน้าแปลกประหลาด"]},{"n":353,"t":"ผลาญของชัดๆ น้ำมันมีไว้ให้พวกเจ้าใช้แบบนี้งั้นเหรอ?","c":["คำพูดตรงไปตรงมาของเดนนิส ทำให้เหล่าพ่อมดที่อยู่ในเหตุการณ์ต่างตกตะลึง และแทบจะคิดว่าอีกฝ่ายกำลังล้อเล่นอยู่หรือเปล่า","กระสุนปืนคาบศิลาจะตกลงมาจากฟ้าได้อย่างไร แม้ว่าจะเป็นเรื่องตลก มันก็ยังดูไร้สาระเกินไปหน่อย!","แต่ไม่นานนัก พวกเขาก็ได้ยินลินน์ที่อยู่ด้านข้างพยักหน้าและกล่าวว่า","“การผลิตกระสุนตะกั่วนั้น แทบจะไม่ต้องใช้แรงงานคนเลยจริงๆ จะบอกว่ามันตกลงมาจากฟ้าก็ไม่ผิดนัก”","การผลิตกระสุนตะกั่วของพวกเขานั้น อาศัย ‘วิธีกระสุนตก’ ที่แพร่หลายในศตวรรษที่ 18!","เพียงแค่มีสิ่งก่อสร้างที่สูงหลายสิบเมตร โดยมีเตาหลอมอยู่ด้านบนสุด และด้านล่างเป็นสระน้ำขนาดใหญ่สำหรับรองรับกระสุนตะกั่ว","เมื่อต้องการผลิตกระสุนตะกั่ว ก็เพียงแค่หลอมน้ำตะกั่วที่ด้านบนของหอคอย จากนั้นก็เทตะกั่วเหลวลงมาจากที่สูง โดยตะกั่วเหลวเหล่านั้นจะอยู่ในสภาวะไร้น้ำหนักกลางอากาศ และภายใต้แรงตึงผิว มันจะก่อตัวเป็นทรงกลมโดยธรรมชาติ และเย็นตัวลงอย่างรวดเร็วในระหว่างที่ร่วงหล่น จนกลายเป็นกระสุนตะกั่วทรงกลมในที่สุด","นั่นก็หมายความว่า การผลิตกระสุนตะกั่วนั้นใช้แรงโน้มถ่วงของดวงดาวเป็นค้อน และใช้แรงตึงผิวของของเหลวในการขึ้นรูป ตลอดกระบวนการแทบไม่ต้องใช้แรงงานคนเลย ตราบใดที่มีแร่ตะกั่วเพียงพอ พวกเขาก็สามารถผลิตมันออกมาเป็นจำนวนมากได้อย่างรวดเร็ว!","และอาณาจักรฮัดลาตาก็ขาดแคลนทุกอย่าง ยกเว้นแร่ธาตุต่างๆ!","เพื่อรับมือกับสงครามในครั้งนี้ เขาได้สร้างโรงงานหอคอยหล่อกระสุนในเมืองหลวงมากกว่าสิบแห่ง และกักตุนแร่ตะกั่วเอาไว้มากกว่าสิบตัน ไม่ต้องพูดถึงอย่างอื่นเลย เอาเป็นว่ากระสุนปืนคาบศิลามีเพียงพออย่างแน่นอน!","นี่ก็คือข้อดีของการตั้งรับอยู่ในเมือง เพราะพวกเขาไม่ต้องกังวลเรื่องเสบียงเลย...","ภายใต้การอธิบายของลินน์ ซานเชซและคนอื่นๆ ก็ยังคงสับสนอยู่ดี แม้ว่าวิธีนี้จะฟังดูง่าย แต่หลักการที่เกี่ยวข้องกลับไม่สามารถทำความเข้าใจได้ง่ายขนาดนั้น","วัตถุตกลงมาตามธรรมชาติภายใต้แรงโน้มถ่วง นั่นเป็นเรื่องจริง แต่เมื่อพิจารณาถึงแรงต้านของอากาศ มันก็ควรจะเป็นรูปวงรีหรือรูปหยดน้ำสิ แล้วทำไมมันถึงตกลงไปในน้ำด้วยรูปทรงกลมล่ะ?","พวกเขาไม่เคยสังเกตเรื่องนี้อย่างละเอียดมาก่อนเลย","ราฟาเอลถึงกับดึงเอาไอน้ำในอากาศ มาทำการทดลองการตกอย่างอิสระของของเหลวบนกำแพงเมืองเลยด้วยซ้ำ...","...","ภายนอกเมืองหลวงของอาณาจักรฮัดลาตา","เอ็ดเวลที่คอยสังเกตการณ์ความเคลื่อนไหวของศัตรูอยู่ตลอดเวลา ก็ตระหนักถึงการกระทำอันแปลกประหลาดของเหล่าจอมเวทผู้ยิ่งใหญ่ได้ในทันที และเกิดความระมัดระวังขึ้นมา","“พวกมันกำลังสร้างกระแสน้ำเหรอ? ไม่สิ หยดน้ำต่างหาก?”","อาร์โนก็มีสีหน้าสับสนเช่นกัน ด้วยสายตาที่ได้รับการเสริมพลังจากพลังศักดิ์สิทธิ์ ทำให้เขาสามารถมองเห็นการกระทำคร่าวๆ ของทุกคนบนกำแพงเมืองที่อยู่ห่างออกไปสองกิโลเมตรได้อย่างชัดเจน","“อาจจะเป็นท่าเริ่มต้นของเวทมนตร์บางอย่าง!”","พระคาร์ดินัลคนหนึ่งคาดเดา","“หรือไม่ก็อาจจะเป็นเวทมนตร์ประเภทคำสาป!”","เหล่าบิชอปต่างก็ระมัดระวังตัวเช่นกัน ในอดีตตอนที่พวกเขานำคนไปจับกุมพ่อมด สิ่งที่ทำให้พวกเขาปวดหัวมากที่สุด ก็คือการถูกลอบโจมตีด้วยเวทมนตร์อันแปลกประหลาดสารพัดรูปแบบ","เอ็ดเวลครุ่นคิดอยู่ครู่หนึ่ง แต่เขาก็ไม่เข้าใจเลยว่าคนพวกนั้นกำลังทำอะไรอยู่ เพื่อความรอบคอบ เขาจึงยกมือขึ้นและร่ายพลังศักดิ์สิทธิ์ระดับหกวงแหวน การคุ้มครองแห่งสรวงสวรรค์","ม่านพลังที่มองไม่เห็นค่อยๆ ลอยขึ้นมา และโอบล้อมทุกคนที่อยู่ในเหตุการณ์เอาไว้ โลกทั้งใบดูเหมือนจะกลายเป็นภาพลวงตา ราวกับว่าพวกเขาถูกกั้นด้วยแผ่นฟิล์มบางๆ เมื่อมองจากข้างในออกไปข้างนอก ก็ราวกับกำลังมองปลาและกุ้งที่ว่ายอยู่ในทะเลสาบผ่านผิวน้ำ","แต่การโจมตีที่คิดเอาไว้กลับไม่มาถึง กลุ่มจอมเวทผู้ยิ่งใหญ่เพียงแค่สร้างหยดน้ำออกมา แล้วก็จ้องมองพวกมันหยดลงบนพื้น ราวกับกำลังเล่นเกมที่ทั้งน่าขันและไร้เดียงสา","ซึ่งนั่นเป็นไปไม่ได้อย่างแน่นอน!","ตอนนี้พวกเขากำลังอยู่ในช่วงสงคราม อีกฝ่ายไม่มีทางทำเรื่องไร้สาระอย่างแน่นอน มันจะต้องมีความหมายที่ลึกซึ้งแอบแฝงอยู่อย่างแน่นอน!","“อาวุธเวทมนตร์พวกนี้ยอดเยี่ยมมากจริงๆ!”","เมื่อเทียบกับเอ็ดเวลที่ยังคงครุ่นคิด อาร์โนกลับมุ่งความสนใจไปที่สมรภูมิ","สถานการณ์โดยรวมเรียกได้ว่าเป็นการถูกโจมตีอยู่ฝ่ายเดียว กองกำลังส่วนตัวของขุนนางที่บุกโจมตีเมืองหลวงมีจำนวนรวมกว่าห้าหมื่นคน แต่ตอนนี้มีผู้เสียชีวิตไปเกือบหมื่นคนแล้ว ยังไม่สามารถบรรลุผลงานใดๆ ได้เลย ซึ่งร่วงหล่นเป็นแถวๆ ภายใต้การกวัดแกว่งของเคียว ราวกับฟางข้าวในทุ่งนา","อาร์โนจำต้องเก็บความดูถูกที่มีต่อพ่อมดเหล่านี้เอาไว้ก่อนหน้านี้ แม้พวกเขาจะรวบรวมข้อมูลเกี่ยวกับอาวุธปืนมาบ้างแล้ว แต่ดูเหมือนว่าตอนนี้ มันจะแข็งแกร่งกว่าที่คาดการณ์ไว้มาก","แม้ว่าทหารของขุนนางเหล่านี้ จะมีการป้องกันสองชั้นจากชุดเกราะและพลังศักดิ์สิทธิ์ แต่พวกเขาก็ไม่สามารถต้านทานมันได้ทั้งหมด","และปืนใหญ่พวกนั้นก็ยิ่งร้ายกาจเข้าไปใหญ่ หากถูกโจมตีเข้าอย่างจัง ไม่ว่าจะใส่ชุดเกราะหนาแค่ไหน ก็จะถูกบดขยี้จนกลายเป็นกองเนื้อในทันที","มิน่าล่ะ พวกมันถึงสามารถยึดเมืองหลวง และกวาดล้างศาสนจักรของอาณาจักรได้อย่างง่ายดาย...","“รอให้ทะลวงเมืองหลวงได้เมื่อไหร่ ก็อย่าลืมไว้ชีวิตสักสองสามคนล่ะ ถ้าเราสามารถเค้นวิธีสร้างอาวุธพวกนี้ออกมาได้ การจัดการกับพวกปีศาจต่างแดนก็คงจะง่ายขึ้นเยอะเลย!”","จู่ๆ อาร์โนก็ยิ้มและกล่าวขึ้นมา","“สิ่งเหล่านี้ล้วนเป็นสิ่งที่ถูกสร้างขึ้นด้วยเวทมนตร์ มันเป็นความรู้ของปีศาจ สมควรที่จะถูกทำลายให้สิ้นซาก...”","พระคาร์ดินัลที่อยู่ด้านข้างแย้งด้วยความไม่พอใจอย่างยิ่ง","การบุ่มบ่ามเข้าไปดูและเรียนรู้ความรู้ต้องห้าม อาจส่งผลที่ตามมาอย่างคาดไม่ถึง","ในอดีต ผู้นำระดับสูงของศาสนจักรบางคนก็เคยมองว่า สิ่งประดิษฐ์บางอย่างของพ่อมดนั้นมีความน่าสนใจเป็นอย่างมาก และสามารถนำมาใช้ประโยชน์ได้ ผลปรากฏว่ามีนักบวช หรือแม้กระทั่งบิชอปบางคนที่จิตใจอ่อนแอ หลังจากที่ได้อ่านบันทึกเวทมนตร์ที่ยึดมาได้ ซึ่งถูกล่อลวงด้วยความรู้ของปีศาจ และหันหลังให้กับความเมตตาของพระผู้เป็นเจ้า...","นับแต่นั้นเป็นต้นมา ในปฏิบัติการจับกุมพ่อมด หน้าหนังสือ บันทึก และวัตถุดิบในการร่ายเวทที่ยึดมาได้ จะต้องถูกเผาทำลายทันที หรือไม่ก็ถูกนำไปเก็บไว้ในหอสมุดต้องห้าม!","มีความเป็นไปได้สูงที่เทพเจ้าผู้ชั่วร้ายและปีศาจ จะร่ายเวทมนตร์เอาไว้ในความรู้ต้องห้ามเหล่านั้น และใครก็ตามที่อ่านมัน จะต้องร่วงหล่นลงสู่ขุมนรกอย่างแน่นอน!","“พวกเรายังไม่ลงมืออีกเหรอขอรับ? ท่านเอ็ดเวล?”","อาร์โนขี้เกียจจะโต้เถียงกับคนพวกนี้ จึงหันไปมองเอ็ดเวล และเอ่ยถามขึ้นมา","หากขืนเป็นแบบนี้ต่อไป คนห้าหมื่นคนนี้มีแนวโน้มสูงที่จะตายอยู่ที่นี่ทั้งหมด และเป็นการตายที่ไร้ค่าอย่างสิ้นเชิง","เอ็ดเวลไม่ได้ตอบคำถาม แต่กลับเอ่ยถามกลับไปว่า","“เตรียมน้ำมันไฟไว้เรียบร้อยแล้วหรือยัง?”","“ของพวกนั้นถูกส่งมาถึงตั้งนานแล้วขอรับ!”","รอยยิ้มกว้างปรากฏขึ้นบนใบหน้าของอาร์โน เขาโบกมือเบาๆ จากนั้นทหารยามในชุดเกราะสีเงินกว่าร้อยคน ก็ขนถังโลหะที่บรรจุของเหลวหนืดสีดำมา","น้ำมันไฟเหล่านี้ถูกค้นพบโดยชาวประมงคนหนึ่งเมื่อหลายเดือนก่อน หลังจากการเกิดแผ่นดินไหว จู่ๆ พื้นดินก็เกิดรอยแยก และมีน้ำมันสีดำพุ่งทะลักออกมาจากด้านใน แต่กลับไม่มีใครรู้ว่าใครจุดไฟ จนทำให้เกิดเพลิงไหม้ที่ลุกโชนต่อเนื่องยาวนานถึงครึ่งเดือน","ชาวประมงในพื้นที่ต่างก็คิดว่าประตูสู่นรกถูกเปิดออกแล้ว จึงรีบรายงานให้ศาสนจักรทราบ และในท้ายที่สุด พระคาร์ดินัลคนหนึ่งก็ต้องลงมือด้วยตัวเอง เพื่อดับไฟนั่นให้สงบลง!","หลังจากผ่านการตรวจสอบแล้ว ก็พบว่าสิ่งนี้ไม่มีส่วนเกี่ยวข้องกับสิ่งที่เรียกว่าปีศาจเลย และไม่มีร่องรอยของเวทมนตร์ด้วยซ้ำ มันจึงถูกใช้เป็นอาวุธอันทรงพลังในสงครามต่อต้านพวกนอกรีตและปีศาจต่างแดน ซึ่งมันก็ให้ผลลัพธ์ที่ดีมากทีเดียว...","“แต่ดูเหมือนว่าระยะการยิงของเครื่องยิงหิน จะไม่สามารถโยนน้ำมันไฟพวกนี้เข้าไปได้นะขอรับ...”","บิชอปคนหนึ่งขมวดคิ้วกล่าว ปืนใหญ่ที่พ่อมดพวกนั้นสร้างขึ้น มีระยะการยิงที่ไกลกว่าเครื่องยิงหินมาก และเครื่องยิงหินก็ตกเป็นเป้าหมายในการถูกโจมตีได้ง่าย","“ในเมื่อทำบนพื้นดินไม่ได้ งั้นเราก็โจมตีจากบนฟ้าแทนสิ!”"]},{"n":354,"t":"ปิโตรเลียม หยาดโลหิตแห่งอุตสาหกรรม แหล่งกำเนิดแห่งพลังงาน!","c":["จากบนท้องฟ้า?","เหล่าบิชอปที่อยู่ในเหตุการณ์ต่างก็ตระหนักขึ้นมาได้ หลังจากที่พวกเขาตกตะลึงไปชั่วครู่","เรือเหาะของพ่อมดพวกนั้นไม่ได้ลอยขึ้นไปบนท้องฟ้า เห็นได้ชัดว่าพวกมันหวาดกลัวต่ออำนาจของอัศวินกริฟฟอน ซึ่งนั่นก็หมายความว่า พวกเขาสามารถเลียนแบบอีกฝ่าย โดยใช้ความได้เปรียบด้านความเร็วและระดับความสูงของอัศวินกริฟฟอน เพื่อเปิดฉากโจมตีจากบนท้องฟ้าได้!","“เดวี่ ครั้งนี้ก็ให้เจ้าเป็นคนนำทีม!”","เอ็ดเวลเอ่ยถามต่อไป","“ข้าเข้าใจแล้วขอรับ ท่านเอ็ดเวล หากไม่สามารถทำภารกิจให้สำเร็จได้ ข้าจะไม่มีวันกลับมาอย่างเด็ดขาด!”","เดวี่วางมือขวาไว้ที่หน้าอก และกล่าวสาบานอย่างหนักแน่น จากนั้นเขาก็นำกลุ่มอัศวินกริฟฟอน ซึ่งมีน้ำมันไฟที่ห่อด้วยผ้าผืนพิเศษ พุ่งทะยานขึ้นสู่ท้องฟ้า","“ข้าจะไปด้วย ข้าอยากจะไปเจอสาวกของพวกปีศาจนอกรีต และทดสอบความสามารถของพวกมันหน่อย!”","หลังจากที่อาร์โนทนไม่ไหวและขออนุญาตจากเอ็ดเวลเพื่อเข้าร่วมการต่อสู้ เขาก็รับเอาน้ำมันไฟมาหนึ่งชุด และเข้าทำหน้าที่แทนอัศวินกริฟฟอนคนหนึ่ง","อัศวินกริฟฟอนหลายร้อยคนพุ่งทะยานขึ้นสู่ท้องฟ้า โดยมีขนสีทองที่ส่องประกายเจิดจ้าภายใต้แสงอาทิตย์ ราวกับเป็นกลุ่มเมฆสีทอง","“ระวังตัวด้วย กริฟฟอนพวกนั้นขึ้นไปบนฟ้าแล้ว!”","บนกำแพงเมือง ลินน์ได้เพิ่มระดับเสียงขึ้น และเอ่ยเตือน","ความจริงแล้วไม่จำเป็นต้องเตือนเลย เพราะการเคลื่อนไหวที่ยิ่งใหญ่ขนาดนี้ ไม่สามารถปกปิดได้เลย ราฟาเอลและคนอื่นๆ ที่กำลังครุ่นคิดว่าทำไมของเหลวในอากาศถึงกลายเป็นทรงกลม ก็ถูกบังคับให้ต้องหยุดคิด และเตรียมพร้อมรับมือ","การที่กองกำลังระดับหัวกะทิเหล่านี้เริ่มเคลื่อนไหว นั่นก็หมายความว่าศาสนจักรกำลังจะเอาจริงแล้ว!","เพียงแค่หนึ่งนาที อัศวินกริฟฟอนพวกนั้นก็พุ่งทะยานขึ้นไปบนน่านฟ้าของเมืองหลวง โดยรักษาระดับความสูงไว้ที่ประมาณหนึ่งพันเมตร พวกมันบินวนเวียนไปมาอย่างต่อเนื่อง และบางครั้งก็โฉบลงมาในระยะความสูงประมาณสามถึงสี่ร้อยเมตรเหนือหัวของพวกเขา ซึ่งเรียกได้ว่าเป็นการยั่วยุอย่างเต็มที่ และยังประสบความสำเร็จในการรบกวนการทำงานของทีมปืนคาบศิลาด้วย","นั่นก็เพราะไม่มีใครรู้ว่าอัศวินกริฟฟอนที่ลอยอยู่บนท้องฟ้าเหล่านี้ จะเปิดฉากโจมตีเมื่อไหร่","“เวทระเบิดเพลิง!”","พ่อมดสองสามคนที่ทนต่อการถูกยั่วยุไม่ไหว ต่างก็ร่ายเวทมนตร์ขึ้นมาพร้อมกัน หลังจากที่อัศวินกริฟฟอนโฉบลงมาอีกครั้ง","ลูกไฟหลายลูกพุ่งทะยานขึ้นไปในอากาศ พุ่งเป้าไปที่อัศวินกริฟฟอนหลายคนที่อยู่บนที่สูง ด้วยการใช้สูตรคณิตศาสตร์คำนวณตำแหน่งการบินของศัตรูเอาไว้ล่วงหน้า จึงแม่นยำอย่างแน่นอน","แต่แผนการของพวกเขากลับล้มเหลว กริฟฟอนเพียงแค่กระพือปีกอย่างแรง แล้วก็เปลี่ยนทิศทางกลางอากาศอย่างกะทันหัน พวกมันก็สามารถหลบหลีกเปลวไฟและแรงระเบิดได้อย่างง่ายดาย ยิ่งไปกว่านั้น นอกจากพวกมันจะไม่มีความคิดที่จะบินหนีขึ้นไปแล้ว พวกมันกลับลดระดับความสูงลงมาอีก แล้วบินเฉียดหัวพวกเขาไป ทำให้เหล่าพ่อมดโกรธจัดจนต้องร่ายมนตร์สวนกลับ","เวทมนตร์ ห่าฝนศรเวท, เวทพายุหิมะ, เวทระเบิดเพลิงต่อเนื่อง...","ในชั่วพริบตา เวทมนตร์หลายสิบบทก็พุ่งทะยานขึ้นสู่ท้องฟ้า โดยหวังว่าจะอาศัยความได้เปรียบด้านจำนวน เพื่อบีบบังคับให้อัศวินกริฟฟอนที่ปราดเปรียวเหล่านี้ร่วงหล่นลงมา","แต่ก็น่าเสียดายที่เดวี่คาดการณ์ไว้ล่วงหน้าแล้ว ในวินาทีที่เขาสัมผัสได้ถึงคลื่นพลังเวทอันรุนแรง เขาก็สั่งให้ทุกคนบินขึ้นไปบนที่สูงอีกครั้ง ซึ่งทำให้เวทมนตร์ทั้งหมดพลาดเป้าไปอีกครั้ง...","ราฟาเอลรีบเอ่ยห้ามทันที","“หยุดได้แล้ว อย่าเปลืองพลังเวทไปโดยเปล่าประโยชน์ พวกมันกำลังใช้กลอุบายอยู่!”","“บ้าเอ๊ย ถ้าใช้เวทมนตร์บทนั้นได้ อัศวินกริฟฟอนพวกนี้ก็คงไม่กล้าอวดดีขนาดนี้หรอก!”","แนนซี่พึมพำกับตัวเองอย่างหงุดหงิด เพราะเธอและเกล็นนั้นได้เรียนรู้เวทเลเซอร์ที่ได้รับการปรับปรุงโดยลินน์และแอนโธนี่แล้ว แต่ลินน์นั้นไม่อนุญาตให้พวกเขาใช้มันง่ายๆ โดยบอกเพียงว่าเวลาที่เหมาะสมยังมาไม่ถึง...","“ทนไปก่อนเถอะ พวกมันไม่กล้าเข้ามาใกล้หรอก ถ้าเข้ามาใกล้เกินไป ก็จะถูกพวกเรายิงตกได้ง่ายๆ ทำเป็นมองไม่เห็นพวกมันไปก็แล้วกัน!”","ราฟาเอลส่ายหัวและกล่าว","เหล่าพ่อมดที่อยู่บนกำแพงเมืองต่างก็รู้สึกไม่พอใจเป็นอย่างมาก แต่พวกเขาก็ทำอะไรไม่ได้ เพราะเวทมนตร์ของพวกเขานั้น ไม่สามารถข้ามระยะทางไกล เพื่อสร้างความเสียหายให้กับกริฟฟอนที่เคลื่อนที่ด้วยความเร็วสูงได้เลย","อีกฝ่ายปราดเปรียวเกินไป ไม่มีทางยิงโดนเลย!","เดวี่นำอัศวินกริฟฟอนไปยั่วยุพ่อมดบนกำแพงเมืองอย่างต่อเนื่องในอากาศ หลังจากที่ประเมินระยะปลอดภัยคร่าวๆ แล้ว กริฟฟอนส่วนใหญ่ก็กระจายตัวออกไป","ส่วนอาร์โนนั้นยังไม่จากไป เขาเลือกที่จะต่อสู้ร่วมกับกลุ่มอัศวินกริฟฟอนส่วนน้อยที่อยู่รั้งท้าย โดยเล็งเป้าไปที่ปืนใหญ่ซึ่งตั้งอยู่บนกำแพงเมือง และสั่งให้กริฟฟอนของเขาโฉบลงมาที่ระดับความสูงประมาณห้าร้อยเมตร จากนั้นก็โยนห่อผ้าที่ทาน้ำมันไฟที่ถูกจุดชนวนในมือของตน ใส่เป้าหมายอย่างแรง","“เดี๋ยวก่อน นั่นมันอะไรน่ะ?”","เกล็นตาไว เขามองขึ้นไปบนท้องฟ้าตลอดเวลา และสังเกตเห็นความผิดปกติในทันที","“ไฟ! มันคือไฟ!”","พ่อมดคนหนึ่งตะโกนเสียงดัง","“นั่นคือพลังศักดิ์สิทธิ์งั้นเหรอ?”","เมื่อมองดูห่าลูกไฟที่ตกลงมาจากฟากฟ้า เดนนิสก็ขมวดคิ้วและกล่าวขึ้นมา","“ไม่รู้สิ แต่มันต้องเกี่ยวข้องกับอัศวินกริฟฟอนพวกนั้นแน่ๆ...”","ซานเชซส่ายหัว สีหน้าของเขาดูเคร่งเครียดเป็นพิเศษ เพราะภาพเดียวกันนี้ ปรากฏขึ้นทุกซอกทุกมุมเหนือน่านฟ้าของเมืองหลวง ราวกับว่ามีฝนไฟตกลงมาจากฟากฟ้า...","“ม่านพลังเวท!”","บนกำแพงเมือง พ่อมดเต็มตัวหลายร้อยคนร่ายเวทมนตร์พร้อมกัน และทันใดนั้น ม่านพลังเวทรูปวงแหวนก็ปรากฏขึ้นเหนือหัวของพวกเขาทันที โดยห่อผ้าที่ทาน้ำมันไฟเริ่มแตกสลายอย่างรวดเร็วภายใต้การกัดกร่อนของเปลวไฟ และเมื่อมันพุ่งชนเข้ากับม่านพลังเวท ก็เกิดเสียงระเบิดดังสนั่นหวั่นไหว","ซึ่งมีของเหลวสีดำที่ยังไม่ถูกเผาไหม้บางส่วน ก็ได้เกาะติดอยู่กับม่านพลังเวทเหนือหัวของพวกเขาทันที","ในขณะเดียวกัน กลิ่นฉุนก็ลอยเข้ามาแตะจมูกของทุกคน","ก๊าซพิษงั้นเหรอ?","พ่อมดที่มีความรู้เรื่องเวทมนตร์พิษ เริ่มตระหนักได้ทันทีที่สารนี้แทรกซึมเข้ามาในม่านพลัง พวกเขาจึงกลั้นหายใจอย่างระมัดระวังทันที","แต่ลินน์กลับจดจำของเหลวสีดำที่ยังเผาไหม้ไม่หมดพวกนี้ได้อย่างรวดเร็ว พร้อมสีหน้าของเขาที่เต็มไปด้วยความตกตะลึงปนประหลาดใจ","“เดี๋ยวก่อน...หรือว่านี่คือ...ปิโตรเลียม?!”","“ปิโตรเลียม? นั่นมันอะไรน่ะ?”","เดนนิสและคนอื่นๆ ต่างก็สับสนไปหมด นี่เป็นคำศัพท์ที่พวกเขาไม่เคยได้ยินมาก่อนอีกแล้ว","“มันคือเชื้อเพลิงเหลวที่สำคัญมากๆ”","ลินน์อธิบาย","ปิโตรเลียมคืออะไร? มันคือหยาดโลหิตแห่งอุตสาหกรรม แหล่งกำเนิดพลังงาน และเป็นหนึ่งในรากฐานที่สำคัญที่สุดสำหรับความทันสมัย นอกเหนือจากการใช้เป็นเชื้อเพลิงแล้ว มันยังสามารถนำมาทำเป็นพลาสติก ยางมะตอย ยางสังเคราะห์ และอื่นๆ อีกมากมาย","แม้ว่าในตอนนี้ ดินแดนของพ่อมดจะขับเคลื่อนด้วยเครื่องยนต์สันดาปภายในพลังเวท ซึ่งจะเปลี่ยนพลังเวทให้เป็นไฮโดรเจน โดยทำให้เกิดการระเบิดของก๊าซเพื่อให้พลังงาน ซึ่งมีประสิทธิภาพสูงกว่าเชื้อเพลิงเหลวมาก แต่ต้นทุนของมันก็เป็นปัญหาใหญ่","อย่างเช่นคริสตัลเวทมนตร์ที่มีขนาดตามมาตรฐานหนึ่งก้อน จะมีมูลค่าสามเหรียญทองเวทมนตร์ แต่มันสามารถใช้เป็นเชื้อเพลิงให้กับเรือเหาะได้เพียงห้าวันเท่านั้น","หากไม่ใช่เพราะสงคราม ที่ทำให้สภาเวทมนตร์ต้องให้การสนับสนุนโดยไม่คิดต้นทุน หรือถึงขั้นต้องนำเอาคริสตัลเวทมนตร์ที่สะสมเอาไว้ในอดีตออกมาใช้ พวกเขาก็คงจะไม่กล้าสนับสนุนการใช้เชื้อเพลิงของเรือเหาะหลายร้อยลำอย่างต่อเนื่องได้หรอก","เมื่อใดก็ตามที่กระบวนการด้านเวทมนตร์ ถูกผลักดันให้ครอบคลุมทั่วทั้งอาณาจักรฮัดลาตา แน่นอนว่าพวกเขาไม่สามารถใช้คริสตัลเวทมนตร์เป็นพลังงานหลักได้","ดังนั้นปิโตรเลียมจึงเป็นทางเลือกที่ดี แม้ก่อนหน้านี้เขาจะขอให้สายลับของอาณาจักรคอยสังเกตการณ์ แต่การสำรวจปิโตรเลียมนั้นก็ไม่ใช่เรื่องง่าย และจนถึงตอนนี้ก็ยังไม่มีข่าวคราวส่งกลับมาเลย","ซึ่งลินน์ไม่คิดเลยว่าจะได้พบร่องรอยของปิโตรเลียมในสงครามครั้งนี้ แถมมันยังถูกนำมาใช้เป็นน้ำมันไฟโดยตรงอีก นี่มันเป็นการผลาญของดีไปโดยเปล่าประโยชน์ชัดๆ!"]},{"n":355,"t":"ตาข่ายสายฟ้าที่ปกคลุมเหนือเมืองหลวง!","c":["ในขณะที่ลินน์กำลังอธิบายว่าปิโตรเลียมคืออะไร ม่านพลังเวทที่คล้ายคลึงกันก็ปรากฏขึ้นเหนือหอคอยสูง โรงงานที่ปิดอยู่ และเหนือน่านฟ้าของเมืองหลวง เพื่อสกัดกั้นห่าฝนไฟที่ตกลงมา","เพื่อหลีกเลี่ยงการถูกลอบโจมตีโดยพวกกบฏบางคน ในระหว่างการปะทะกันอย่างดุเดือด ซึ่งอาจจะเผายุ้งฉางและคลังแสงของพวกเขา จนก่อให้เกิดการระเบิดครั้งใหญ่ ลินน์จึงสั่งให้นักเล่นแร่แปรธาตุติดตั้งเกราะป้องกันเวทมนตร์ในจุดสำคัญต่างๆ และยังได้จัดเตรียมกำลังคนจำนวนมาก เพื่อทำหน้าที่คุ้มกันสถานที่เหล่านี้โดยเฉพาะ","นี่จึงเป็นเหตุผลว่าทำไมถึงมีพลปืนคาบศิลาเพียงหนึ่งหมื่นคน และพ่อมดเต็มตัวเพียงไม่กี่ร้อยคนบนกำแพงเมือง นั่นก็เพราะคนอื่นๆ ล้วนไปช่วยป้องกันในจุดต่างๆ","เมื่อเห็นว่าการโจมตีด้วยน้ำมันไฟไม่ได้ผล อัศวินกริฟฟอนส่วนหนึ่งจึงลดระดับความสูงลง และใช้กรงเล็บอันแหลมคมขีดข่วนเพื่อทำลายม่านพลังเวท ซึ่งกรงเล็บของกริฟฟอนนั้นมีผลในการทำลายเวทมนตร์ได้ดีมาก และในไม่ช้า มันก็ขีดข่วนม่านพลังเวทจนเกิดรอยร้าวหลายแห่ง...","ส่วนอีกกลุ่มหนึ่งก็หันไปโจมตีบ้านเรือนของชาวเมืองที่อยู่รอบๆ โดยการโยนน้ำมันไฟอันร้อนระอุพุ่งเข้าใส่หลังคาและท้องถนน ทำให้เกิดไฟลุกท่วมไปทั่วทั้งเมืองในเวลาอันรวดเร็ว...","“บ้าเอ๊ย!”","เมื่อเห็นเปลวไฟลุกลามไปทั่วทุกพื้นที่ของเมืองหลวง ฮัตตาร์ก็ร้อนใจราวกับถูกไฟสุม เขารีบเร่งเร้าให้ลินน์และคนอื่นๆ ส่งคนไปช่วยเหลือทันที","แต่ที่ร้อนใจกลับไม่ใช่ความเป็นความตายของคนยากจนเหล่านั้น แต่เป็นเพราะ พระราชวังของเขาตกเป็นเป้าหมายสำคัญเช่นกัน โดยมีอัศวินกริฟฟอนอย่างน้อยสามสิบคนบินวนเวียนอยู่เหนือพระราชวัง ม่านพลังที่ถูกติดตั้งไว้ก่อนหน้านี้ คงจะต้านทานไว้ได้ไม่นานนัก","แม้ว่าพลปืนคาบศิลาจะพยายามยิงปืนขึ้นฟ้า แต่มันก็แทบจะไม่ได้ผลเลย และจนถึงตอนนี้ พวกเขาก็ยังไม่สามารถยิงอัศวินกริฟฟอนร่วงลงมาได้เลยสักคน","ราฟาเอลเองก็รู้สึกลำบากใจเช่นกัน เพราะอัศวินกริฟฟอนพวกนั้นกระจายกำลังกันไปทั่วเมืองหลวง หากพวกเขาแบ่งกำลังคนไปช่วยเหลือมากเกินไป กองกำลังชั้นยอดของศาสนจักรที่รอคอยโอกาสอยู่นอกเมือง ก็จะเปิดฉากโจมตีอย่างเต็มรูปแบบโดยไม่ลังเล และนั่นก็คงจะเป็นโอกาสที่อีกฝ่ายรอคอยอยู่!","เสียงกลองที่สงบลงบนสมรภูมิกลับดังขึ้นอีกครั้ง โดยกองทัพทัณฑ์ศักดิ์สิทธิ์ที่ยืนหยัดอย่างมั่นคงมาตลอด ก็เริ่มเคลื่อนตัวเข้ามาใกล้ เพื่อสร้างความกดดันให้กับทุกคนบนกำแพงเมือง พร้อมกับบนท้องฟ้าที่ยังมีอัศวินกริฟฟอนหลายสิบคนบินวนเวียนอยู่เหนือหัวของพวกเขา บางครั้งก็โฉบลงมาโจมตีม่านพลังเหนือหัวพวกเขา หรือไม่ก็โยนน้ำมันไฟลงมาจากที่ไกลๆ แล้วหันหลังหนีไป","พ่อมดสายแปรสภาพบางคนถึงกับโกรธจัด และอยากจะแปลงร่างเป็นสัตว์บินได้ เพื่อไปต่อสู้ระยะประชิดกับอัศวินกริฟฟอนพวกนี้กลางอากาศ แต่ก็ถูกราฟาเอลและคนอื่นๆ ห้ามเอาไว้ทันที เพราะจำนวนของศัตรูมีมากเกินไป หากบุ่มบ่ามเข้าไปต่อสู้กลางอากาศ พวกเขาคงจะถูกรุมจนตายอย่างแน่นอน","“ตอนนี้ถึงเวลาที่จะใช้เจ้านั่นหรือยัง?”","แอนโธนี่เอ่ยถามอย่างระมัดระวัง","“ยังไม่ถึงเวลา!”","ลินน์ส่ายหัว แน่นอนว่าเขารู้ว่าแอนโธนี่กำลังพูดถึงเวทเลเซอร์ที่พวกเขาเพิ่งคิดค้นขึ้นมา แต่จนถึงตอนนี้ มีเพียงสิบเอ็ดคนเท่านั้นที่เรียนรู้มันได้ และหากใช้มันอย่างไม่คิด ก็อาจจะกำจัดอัศวินกริฟฟอนได้บางส่วน แต่หากทำเช่นนั้น ในครั้งต่อไปอีกฝ่ายก็จะต้องระวังตัวอย่างแน่นอน","แต่สถานการณ์ที่วุ่นวายเช่นนี้ ก็ควรจะจบลงได้แล้ว!","ลินน์เงยหน้าขึ้นมองท้องฟ้า ข้อมูลจำนวนมหาศาลก็ปรากฏขึ้นในหัว ตำแหน่งและการเคลื่อนไหวของอัศวินกริฟฟอนแต่ละคน ถูกสร้างขึ้นมาเป็นภาพจำลองสามมิติ ภายใต้การวิเคราะห์ของปัญญาประดิษฐ์สนับสนุน เส้นทางการเคลื่อนที่ และทิศทางที่พวกมันอาจจะหลบหนี ล้วนปรากฏให้เห็นอย่างชัดเจน","เวทมนตร์ ห่าฝนศรเวท","เพียงแค่พริบตาเดียว กระสุนเวทมนตร์ที่มีเส้นผ่านศูนย์กลางสามสิบเซนติเมตรหลายร้อยนัด ก็ปรากฏขึ้นกลางอากาศ","การลงมืออย่างกะทันหันของลินน์ ทำให้เหล่าพ่อมดที่กำลังหัวหมุนก็มองเห็นความหวังอันริบหรี่ และในอดีต ดาวรุ่งแห่งเวทมนตร์ผู้โด่งดังคนนี้ ก็ไม่เคยทำให้พวกเขาผิดหวังเลยสักครั้ง","เหล่าอัศวินกริฟฟอนที่บินอยู่บนท้องฟ้า ก็สังเกตเห็นคลื่นพลังเวทที่อยู่ด้านล่างเช่นกัน พวกเขาจึงรีบเพิ่มระดับความสูงขึ้นไปอีก","“เข้ามาเลย ข้าอยากจะเห็นนักว่าเจ้ามีน้ำยาแค่ไหน!”","ใบหน้าของอาร์โนปรากฏรอยยิ้มอันดุร้าย เขามักจะให้ความสนใจกับผู้ดูหมิ่นพระเจ้าที่เอ็ดเวลพูดถึงมาโดยตลอด ดังนั้นเมื่อเห็นลินน์ลงมือ เขาก็อดไม่ได้ที่จะรู้สึกตื่นเต้น","ในชั่วพริบตา กระสุนเวทมนตร์เหล่านั้นก็พุ่งทะยานเข้ามา ด้วยความเร็วสองร้อยเมตรต่อวินาที พุ่งเป้าไปที่กริฟฟอนบนท้องฟ้า พวกมันพุ่งทะยานผ่านอากาศ ทำให้เกิดเป็นเส้นโค้งที่แปลกประหลาด","ในฐานะสัตว์เวทมนตร์ระดับสูง กริฟฟอนจึงมีความต้านทานเวทมนตร์ และมีการรับรู้ถึงอันตรายที่รุนแรง เมื่อประสานเข้ากับอัศวินของมัน พวกมันก็เปรียบเสมือนปลาที่แหวกว่ายไปตามช่องว่างของห่ากระสุนเวทมนตร์","อาร์โนไม่ใช่อัศวินกริฟฟอน หลังจากหลบหลีกกระสุนเวทมนตร์ไปได้หลายนัด เขาก็ร่ายโล่ศักดิ์สิทธิ์ เพื่อสกัดกั้นการโจมตีที่เหลือทั้งหมด","“ก็ไม่ได้เท่าไหร่นี่นา!”","ความตึงเครียดในใจของอาร์โนผ่อนคลายลงทันที แม้จำนวนและความเร็วของเวทมนตร์เหล่านี้รับมือได้ยากจริงๆ และมีอัศวินกริฟฟอนไม่น้อยเลยที่ถูกกระสุนเวทมนตร์โจมตีเหมือนกับเขา แต่พลังทำลายของมันต่ำเกินไป จนไม่สามารถทะลวงการป้องกันของพลังศักดิ์สิทธิ์บนร่างกายของพวกเขาได้เลย!","อาร์โนหัวเราะร่า และตั้งใจจะบินลงไปยั่วยุพ่อมดเหล่านั้นอีกครั้ง แต่ในวินาทีที่เขาสัมผัสสายบังเหียน มือของเขากลับถูกไฟฟ้าช็อต","ขนสีทองของกริฟฟอนที่อยู่ใต้ร่างของเขาก็ลุกซู่ และส่งเสียงร้องออกมาด้วยความหวาดกลัว...","“ดูเหมือนว่าจะล้มเหลวนะ!”","เมื่อเห็นว่าลินน์ไม่สามารถยิงอัศวินกริฟฟอนร่วงลงมาได้เลยสักคน ซานเชซก็ถอนหายใจและส่ายหัว การใช้กระสุนเวทมนตร์ฝึกหัดแบบนี้มาโจมตี มันไม่ตลกไปหน่อยหรือ?","แต่แอนโธนี่ที่เชี่ยวชาญเวทมนตร์สายฟ้า กลับสัมผัสได้ถึงบางสิ่งที่แตกต่างออกไป","“เจ้าก็ลงมือด้วยสิ แอนโธนี่ ก่อนที่พลังเวทจะถูกกระจายออกไป!”","ลินน์กล่าวพลางยกมือขึ้นมา ก่อนจะมีสายฟ้าแลบแปลบปลาบอยู่ที่ปลายนิ้ว","แอนโธนี่ร่ายเวทมนตร์ตอบสนองอย่างไม่ลังเล พร้อมร่างกายของเขาที่เปล่งประกายไปด้วยสายฟ้า...","“คุกสายฟ้า พายุสายฟ้า!”","“ทัณฑ์สวรรค์ สายฟ้าพิพากษา!”","เวทมนตร์สายฟ้าอันทรงพลังสองบทพุ่งทะยานขึ้นสู่ท้องฟ้าในเวลาเดียวกัน","แม้ว่าสายฟ้าจะรวดเร็วมาก แต่ก็ต้องอาศัยตัวกลางในการส่งผ่าน และอากาศก็เป็นตัวนำไฟฟ้าที่ไม่ดีนัก นี่จึงเป็นเหตุผลว่าทำไมแอนโธนี่ถึงไม่กล้าใช้เวทสายฟ้าในการป้องกันทางอากาศ","แต่ตอนนี้มันต่างออกไป เพราะลินน์ใช้กระสุนเวทมนตร์หลายร้อยนัด เพื่อสร้างสนามแม่เหล็กไฟฟ้าครอบคลุมพื้นที่เป็นบริเวณกว้าง!","กริฟฟอนที่อยู่บนที่สูงรับรู้ได้ถึงอันตราย พวกมันจึงกระพือปีกด้วยความหวาดกลัว โดยหวังว่าจะบินหนีออกจากพื้นที่นี้ไปได้ แต่ความเร็วและความปราดเปรียวที่พวกมันภาคภูมิใจ กลับไร้ความหมายเมื่ออยู่ต่อหน้าการพุ่งทะยานของสายฟ้า!","พร้อมกับเสียงฟ้าร้องดังกึกก้องสองครั้ง เพียงแค่ชั่ววินาทีเดียว ตาข่ายสายฟ้าขนาดใหญ่ที่ครอบคลุมน่านฟ้าโดยรอบก็ก่อตัวขึ้น ซึ่งทำให้ม่านพลังศักดิ์สิทธิ์บนร่างกายของพวกมันถูกทำลายลงในพริบตา พร้อมกับกระแสไฟฟ้าอันบ้าคลั่งทะลวงเข้าสู่ร่างกาย แล้วถูกช็อตจนกลายเป็นถ่านในทันที...","แม้แต่กริฟฟอนที่มีความต้านทานเวทมนตร์สูง ก็ไม่อาจหลีกหนีชะตากรรมของการถูกย่างสดได้เช่นกัน!","ส่วนอัศวินกริฟฟอนที่อยู่รอบนอกและไม่ได้รับผลกระทบทั้งหมด ก็ถูกกระแสไฟฟ้าที่กระจัดกระจายโจมตีจนร่างกายแข็งทื่อ แล้วร่วงหล่นลงมาจากท้องฟ้า ท่ามกลางเสียงกรีดร้องและเสียงโหยหวนอันเจ็บปวด เกิดเป็นฝนกริฟฟอนตกลงมาจากฟากฟ้า...","มีหลายคนที่โชคร้ายตกลงไปในบ้านที่พวกเขาเพิ่งจะโยนน้ำมันไฟลงไป ซึ่งทำให้พวกเขาถูกแผดเผาจนกลายเป็นเศษเนื้อ ท่ามกลางความชาจากสายฟ้าและเปลวเพลิงอันร้อนระอุ..."]},{"n":356,"t":"กองอัศวินกริฟฟอนที่ตื่นตระหนก","c":["“ถอย ถอยเร็วเข้า!”","“หลบไป!”","เสียงฟ้าร้องดังกึกก้องไปทั่วเหนือเมืองหลวง ตาข่ายสายฟ้าที่แผ่ขยายออกไปสามารถมองเห็นได้อย่างชัดเจนจากทั้งในและนอกเมืองหลวง ในชั่วพริบตามันก็กลืนอัศวินกริฟฟอนนับร้อยคนเข้าไป พร้อมกระแสไฟฟ้าที่หนาเท่าแขนยังคงแผ่ขยายออกไปรอบๆ อย่างต่อเนื่อง","อัศวินกริฟฟอนที่บินวนเวียนอยู่ทั่วเมืองหลวง ต่างก็ตกใจกลัวจนต้องบินหนีขึ้นไปบนความสูงหลายพันเมตร และไม่กล้าหยุดพักในระดับความสูงต่ำเลยแม้แต่น้อย","เมื่อมองดูอาณาเขตสายฟ้าที่ปกคลุมอยู่เหนือหัว ก็ทำให้เหล่าพ่อมดที่อยู่ในเหตุการณ์ต่างก็ขนลุกซู่","พวกเขาไม่คาดคิดเหมือนกัน ว่าท่านลินน์จะยังมีไพ่ตายซ่อนอยู่อีก...","ซานเชซที่เพิ่งจะปากไวไปก่อนหน้านี้ ถึงกับพูดไม่ออกด้วยความกระอักกระอ่วนใจ วินาทีที่แล้วเขายังบอกอยู่เลยว่าเวทมนตร์ของอีกฝ่ายไม่น่าจะช่วยอะไรได้มาก แต่วินาทีต่อมา ตาข่ายสายฟ้าของลินน์กลับโจมตีอัศวินกริฟฟอนเหล่านี้จนร่วงหล่นลงมาทั้งหมด","สมแล้วที่เป็นดาวรุ่งแห่งเวทมนตร์...ซานเชซอดไม่ได้ที่จะถอนหายใจ ความเข้าใจในเวทมนตร์และความคิดสร้างสรรค์ในคาถาของลินน์นั้น ไม่ใช่สิ่งที่เขาจะเทียบได้เลย และความสามารถในการรับมือกับสถานการณ์เฉพาะก่อนหน้านี้ ก็ถือว่ายอดเยี่ยมมาก","มิน่าล่ะ ลินน์ถึงดูไม่ร้อนรนเลยสักนิดเมื่อต้องเผชิญกับการก่อกวนของอัศวินกริฟฟอนพวกนี้","“ไปจับมาสิ จะต้องมีคนรอดชีวิตอยู่แน่ แล้วก็อย่าลืมดับไฟด้วย พวกมันคงไม่กล้าลงมาอีกสักพักใหญ่หรอก!”","ลินน์ลดมือลง และสั่งการอย่างไม่ใส่ใจ","เกล็นและคนอื่นๆ ที่ได้รับคำสั่งก็พยักหน้ารับ โดยแบ่งพ่อมดเต็มตัวออกเป็นห้าสิบคน พร้อมนำพลปืนคาบศิลากว่าพันคนไปดับไฟและจับเชลยศึก","เมื่อภัยคุกคามจากบนท้องฟ้าหายไปชั่วคราว ทุกคนก็ถอนหายใจด้วยความโล่งอก","“ท่านศาสตราจารย์ ในเมื่อเวทมนตร์สายฟ้านี้ร้ายกาจขนาดนั้น แล้วทำไมท่านถึงไม่จัดการพวกมันตั้งแต่ตอนที่อัศวินกริฟฟอนพวกนั้นรวมตัวกันเลยล่ะขอรับ?”","เอล็อคเอ่ยถามด้วยความเสียดาย","“พลังของสายฟ้ามันกระจายตัวได้ และอัศวินกริฟฟอนพวกนี้ก็รับมือยาก แถมความต้านทานเวทมนตร์ก็สูงมากด้วย ต่อให้เป็นเวทมนตร์ระดับสามวงแหวน ก็ต้องโจมตีให้โดนจังๆ ถึงจะสร้างความเสียหายถึงตายได้...”","ลินน์อธิบายสั้นๆ","ส่วนอีกปัจจัยที่เขาไม่ได้อธิบายออกไปคือ การร่ายเวทเมื่อครู่นี้ดูเหมือนจะง่าย แต่ในความเป็นจริงแล้ว การสร้างสนามแม่เหล็กไฟฟ้าให้ใหญ่พอที่จะครอบคลุมศัตรูทั้งหมดในอากาศ จำเป็นต้องมีข้อมูลที่สอดคล้องกันเพื่อเป็นรากฐานสนับสนุน","อัศวินกริฟฟอนที่คอยยั่วยุอยู่บนท้องฟ้าเมื่อครู่นี้ นอกจากจะเป็นการทดสอบระยะร่ายเวทของพวกเขาแล้ว ยังเป็นการเปิดเผยข้อมูลการบินและการหลบหลีกของพวกมันด้วย ซึ่งข้อมูลทั้งหมดนี้ถูกบันทึกไว้ในฐานข้อมูลของปัญญาประดิษฐ์สนับสนุนทั้งหมดแล้ว","สิ่งที่ลินน์รอคอย ก็คือช่วงเวลาที่อัศวินกริฟฟอนเหล่านี้คิดว่าพวกมันอยู่ในพื้นที่ปลอดภัยแล้ว และค่อยๆ ลดความระมัดระวังลง จากนั้นเขาก็จะสร้างความเสียหายอย่างหนักให้กับพวกมันในคราวเดียว","แม้ว่าผลงานในครั้งนี้จะยอดเยี่ยมมาก แต่ลินน์ก็ไม่ได้ดูถูกกองกำลังชั้นยอดของศาสนจักรเลย ตรงกันข้าม เขากลับเพิ่มระดับความอันตรายของพวกมันขึ้นไปอีกขั้น","ตามข้อมูลที่ปัญญาประดิษฐ์สนับสนุนประมวลผลออกมา กริฟฟอนเหล่านี้สามารถบินด้วยความเร็วเกือบแปดสิบกิโลเมตรต่อชั่วโมง แม้จะบรรทุกคนและแบกปิโตรเลียมจำนวนมากเอาไว้บนหลังก็ตาม และในกรณีที่เร่งความเร็วพุ่งตัวลงมา มันอาจจะเร็วยิ่งกว่านี้ โดยสามารถทำความเร็วได้ถึงหนึ่งร้อยสามสิบกิโลเมตรต่อชั่วโมงเลยทีเดียว ในขณะที่ความเร็วมาตรฐานของเรือเหาะรุ่นที่สามคือหนึ่งร้อยห้าสิบกิโลเมตรต่อชั่วโมง ซึ่งถือว่าห่างกันไม่มากนัก","และอัศวินที่อยู่บนหลังของพวกมันนั้น เกือบทุกคนสามารถใช้พลังศักดิ์สิทธิ์ง่ายๆ ได้ เมื่อประสานเข้ากับกริฟฟอนที่ทั้งรวดเร็วและปราดเปรียว พวกเขาก็ถึงขั้นมีความสามารถในการสังหารพ่อมดเต็มตัวได้แบบตัวต่อตัว!","อัศวินกริฟฟอนแต่ละคนต่างก็แข็งแกร่งมากอยู่แล้ว นับประสาอะไรกับการรวมกลุ่มกันโจมตีจากบนอากาศ","หากไม่ได้หวาดกลัวต่อเวทมนตร์ของพ่อมดอย่างพวกเขา เพียงแค่อัศวินกริฟฟอนแปดร้อยคนนี้ ก็เพียงพอที่จะเผาเมืองหลวงทั้งเมือง และสังหารกองทหารที่นี่ได้จนหมดสิ้น","ก็คงมีเพียงศาสนจักรเท่านั้น ที่จะทุ่มทุนสร้าง และฝึกฝนสัตว์เวทมนตร์ที่แข็งแกร่งอย่างกริฟฟอน เพื่อใช้ในสงครามเป็นจำนวนมากได้","เขาได้เห็นความสามารถของกองอัศวินกริฟฟอน ซึ่งเป็นหนึ่งในสองของกองกำลังชั้นยอดแล้ว ซึ่งมันก็ยอดเยี่ยมมากจริงๆ เพียงแต่ไม่รู้ว่ากองทัพทัณฑ์ศักดิ์สิทธิ์พวกนั้นจะเป็นอย่างไรบ้าง?","เมื่อคิดได้เช่นนี้ ลินน์ก็มองไปที่กองทหารชุดเกราะเงินที่กำลังจัดขบวนทัพอยู่ไกลๆ พร้อมกับครุ่นคิดและกล่าวขึ้นมาว่า","“เตรียมปืนแม่เหล็กไฟฟ้า! ในเมื่อมาแล้วก็ต้องต้อนรับให้ดีหน่อย ให้คนพวกนี้ได้เห็นพลังของเวทมนตร์กันบ้าง!”","...","อีกด้านหนึ่งของสมรภูมิ","เอ็ดเวลที่กำลังเตรียมจะใช้ความโกลาหลที่อัศวินกริฟฟอนสร้างขึ้น เพื่อเปิดฉากโจมตีอย่างเต็มรูปแบบ ไม่คาดคิดเลยว่าสถานการณ์ในสนามรบ จะพลิกกลับในชั่วพริบตา","อัศวินกริฟฟอนที่เคยอวดดี และเป็นฝ่ายได้เปรียบอย่างสมบูรณ์แบบ กลับถูกแสงอัสนีบาตโจมตีจนร่วงหล่นลงมาในพริบตา!","ทุกอย่างเกิดขึ้นเร็วมาก เร็วเสียจนจบลงก่อนที่พวกเขาจะทันได้ห้ามปรามเสียอีก!","“มีเวทมนตร์ที่ไม่เคยถูกบันทึกไว้อีกแล้ว!”","ใบหน้าที่สวมหน้ากากเหล็กของเอ็ดเวลไม่อาจมองเห็นสีหน้าได้ แต่น้ำเสียงของเขานั้นเย็นชาเป็นอย่างยิ่ง ดูเหมือนว่าพ่อมดพวกนั้นที่ซ่อนตัวอยู่ในดินแดนของพ่อมด จะวิจัยสิ่งแปลกใหม่ขึ้นมามากมายเลยทีเดียว","“ถอยทัพ การโจมตีในวันนี้พอแค่นี้ก่อน!”","เอ็ดเวลออกคำสั่งอย่างไม่ลังเล","“แต่ว่า ท่านเอ็ดเวล...ท่านอาร์โนก็ถูกแสงสายฟ้าโจมตีจนร่วงหล่นลงไปเช่นกัน และตอนนี้ก็ยังอยู่ในเมืองหลวงแห่งนั้นเลยนะขอรับ”","รองผู้บัญชาการของกองทัพทัณฑ์ศักดิ์สิทธิ์ที่อยู่ด้านข้าง เอ่ยขึ้นอย่างร้อนรน พร้อมใบหน้าของเขาที่เต็มไปด้วยความไม่พอใจ","แม้ว่าก่อนจะเริ่มการโจมตี เขาไม่คิดว่าจะสามารถตีเมืองอันแข็งแกร่ง ที่ถูกครอบงำโดยสาวกของปีศาจได้ภายในวันเดียว และการต่อสู้ในครั้งนี้ก็เป็นเพียงการหยั่งเชิงเท่านั้น แต่ความสูญเสียนั้นสามารถเรียกได้ว่าน่าสลดใจเลยทีเดียว...","กองกำลังพันธมิตรของขุนนางห้าหมื่นคน ตายไปกว่าสองหมื่นคนแล้ว และที่สำคัญที่สุดคืออัศวินกริฟฟอนกว่าร้อยคนที่ต้องร่วงหล่นลงมา มันทำให้หัวใจของเขาแทบจะหลั่งเลือด!","แต่ผลงานที่แลกมาด้วยความสูญเสียอันหนักหน่วงนี้ เป็นเพียงแค่การจุดไฟในเมืองหลวง และเผาทำลายบ้านเรือนของชาวเมืองบางส่วนเท่านั้น...","ในความเห็นของเขา หลังจากที่ผ่านการผลาญพลังเวทไปหลายระลอก พ่อมดพวกนั้นก็คงจะสูญเสียพลังเวทไปมากแล้ว ตอนนี้จึงเป็นเวลาที่เหมาะสมที่สุดสำหรับการโจมตีอย่างเต็มรูปแบบ!","“ข้าสั่งให้ถอยทัพ เดี๋ยวนี้!”","เอ็ดเวลเพิ่มน้ำเสียงให้หนักแน่นขึ้น","“ส่วนอาร์โน แค่เวทมนตร์สายฟ้านั่น ฆ่าเขาไม่ได้หรอก...”","เอ็ดเวลกล่าวอย่างมั่นใจ แม้เวทมนตร์ที่ลินน์ร่ายนั้นทรงพลังมากจริงๆ แต่พลังของมันถูกกระจายออกไปทั่วน่านฟ้า และเข้าไปในร่างกายของอัศวินกริฟฟอนนับร้อย การจะสังหารอาร์โนที่เป็นถึงพระคาร์ดินัลนั้นเป็นไปไม่ได้เลย แม้แต่...การทำให้บาดเจ็บสาหัสก็ยังยาก","ในเมื่ออาร์โนไม่ได้ก่อเรื่องวุ่นวายใหญ่โตในเมือง นั่นก็พิสูจน์ให้เห็นแล้วว่าอีกฝ่ายมีแผนการของตัวเอง...","คำสั่งของเอ็ดเวลทำให้เหล่าพระคาร์ดินัลไม่พอใจเป็นอย่างมาก เพราะนี่เป็นครั้งแรกที่พวกเขาต้องเสียเปรียบขนาดนี้ เมื่อต้องเผชิญหน้ากับสาวกของเทพเจ้าผู้ชั่วร้าย แถมตอนนี้ยังต้องถอยทัพอย่างน่าสมเพชอีก...","จนทำให้บางคนสงสัยว่าเอ็ดเวลต้องการใช้โอกาสนี้ เพื่อกำจัดผู้ที่เห็นต่าง","ท้ายที่สุด อาร์โนก็ขึ้นชื่อเรื่องความดื้อรั้น และการที่เขาลงมือทำอะไรตามอำเภอใจโดยไม่ได้รับคำสั่ง ก็ไม่ใช่ครั้งแรกหรือครั้งที่สอง...","แต่ก่อนที่คำพูดโต้แย้งจะถูกเอ่ยออกมา คลื่นพลังเวทอันทรงพลัง ก็ถูกส่งออกมาจากกำแพงเมืองหลวง","ระยะทางไกลขนาดนี้ พวกมันต้องการจะทำอะไรกันแน่?","เหล่าบิชอปต่างก็รู้สึกสงสัย ระยะทางจากที่นี่ถึงประตูเมืองอยู่ที่ประมาณหนึ่งจุดห้ากิโลเมตร ซึ่งเมื่อพิจารณาจากการทดสอบเมื่อครู่นี้แล้ว ระยะนี้น่าจะเกินระยะยิงของปืนใหญ่พวกนั้นไปแล้วนี่นา..."]},{"n":357,"t":"ที่แห่งนี้คืออาณาเขตแห่งเทพ!","c":["ก่อนที่เหล่าบิชอปจะทันได้เข้าใจสถานการณ์ แสงอัสนีบาตอันเจิดจ้าก็สว่างวาบขึ้นบนกำแพงเมืองหลวง แม้จะอยู่ภายใต้แสงแดดแผดเผาในตอนเที่ยงวัน แต่มันก็ยังคงส่องประกายอย่างเจิดจรัส!","หลังจากชาร์จพลังอยู่ประมาณสามวินาที ปืนแม่เหล็กไฟฟ้าทั้งเจ็ดกระบอกที่ติดตั้งอยู่บนประตูเมือง ก็ส่งเสียงคำรามดังกึกก้อง พร้อมกลิ่นอายอันทรงพลังถึงขีดสุด","ราวกับเสียงฟ้าร้องที่แลบแปลบ กระสุนนัดพิเศษทั้งเจ็ดนัด ถูกขับเคลื่อนด้วยแรงแอมแปร์ กลายเป็นแสงสีสันสวยงามพุ่งทะยานเข้ามาหาพวกเขา","แม้ว่าในครั้งนี้จะไม่มีพลังเวทสายฟ้าจากพ่อมดเต็มตัวกว่าร้อยคนมาช่วยเสริมพลัง ทำให้ความเร็วของมันด้อยกว่าครั้งที่ทำลายร่างจำแลงเทพไปมากก็ตาม","แต่ในสายตาของเอ็ดเวลและคนอื่นๆ มันก็ยังรวดเร็วจนเหลือเชื่อ เพียงแค่ชั่ววินาทีเดียว มันก็สามารถข้ามระยะทางหนึ่งจุดห้ากิโลเมตรมาได้ โดยที่บิชอปบางคนยังไม่ทันได้ตอบสนอง กระสุนขนาดเท่าหัวคนที่ถูกห่อหุ้มด้วยสายฟ้า ก็พุ่งเข้ามาถึงตรงหน้าพวกเขาแล้ว","แต่ในวินาทีต่อมา ลูกเหล็กที่พกพาอานุภาพอันน่าทึ่ง ก็ระเบิดออกดังปัง เศษซากที่ปลิวว่อนไปทั่วราวกับตกลงไปในปลักโคลน พร้อมกับความเร็วที่เปลี่ยนจากเร็วสุดขีดเป็นช้าสุดขีดอย่างกะทันหัน และก่อนที่มันจะพุ่งถึงตัวของทุกคน มันก็สูญเสียพลังงานแล้วร่วงหล่นลงบนพื้นเสียก่อน","นั่นคือเวทมนตร์คุ้มครองที่เอ็ดเวลร่ายเอาไว้ล่วงหน้า เพื่อป้องกันการลอบโจมตีของเหล่าพ่อมด การคุ้มครองแห่งสรวงสวรรค์!","ที่แห่งนี้คืออาณาเขตแห่งเทพ ไม่ว่าเวทมนตร์จะแข็งแกร่งเพียงใด เมื่อเข้ามาในที่แห่งนี้ ก็จะถูกลดทอนพลังลงทีละชั้น!","แต่เป้าหมายของปืนแม่เหล็กไฟฟ้านั้น ไม่ได้มีแค่พวกเขาเพียงกลุ่มเดียว และกองทัพทัณฑ์ศักดิ์สิทธิ์ที่อยู่นอกเหนือขอบเขตการคุ้มครองของเวทมนตร์ ก็ไม่ได้โชคดีแบบนั้น","ภาพที่ปรากฏแก่สายตาคือการผสมผสานระหว่างความงดงามและความตาย แสงอันวิจิตรตระการตาหลายสายพุ่งทะลวงกองทัพอันแน่นขนัด ความเร็วและความร้อนอันน่าสะพรึงกลัว ทะลวงร่างของทหารชุดเกราะเงินกว่าสิบคนในชั่วพริบตา โดยมีทหารแนวหน้าหลายคนร่างขาดครึ่ง และหายไปอย่างไร้ร่องรอย พร้อมกับทหารแนวหลังอีกหลายคนก็ถูกยิงจนกลายเป็นเศษเนื้อ...","เสียงร้องโหยหวนดังก้องไปทั่วสมรภูมิ เลือดสาดกระเซ็น ศพปลิวว่อน เศษเนื้อปนเลือดและกลิ่นคาวเลือดคละคลุ้งแผ่กระจายไปทั่วบริเวณ","“ตั้งโล่ ถอยทัพ ถอยเดี๋ยวนี้!”","รองผู้บัญชาการตะโกนด้วยความหวาดกลัว เขาไม่มีความปรารถนาที่จะโจมตีอีกต่อไป และรีบถ่ายทอดคำสั่งของเอ็ดเวลทันที","อานุภาพของปืนแม่เหล็กไฟฟ้านั้นน่ากลัวอย่างเห็นได้ชัด!","ต้องรู้ไว้ก่อนว่าสมาชิกของกองทัพทัณฑ์ศักดิ์สิทธิ์แต่ละคน ล้วนถูกคัดเลือกมาจากนักล่าแม่มดหรืออัศวิน แต่พลังและความแข็งแกร่งทางร่างกายที่พวกเขาภาคภูมิใจ กลับไร้ประโยชน์เมื่ออยู่ต่อหน้ากระสุนที่มีความเร็วเหนือเสียงถึงสามเท่า โดยที่ชุดเกราะและร่างกายของพวกเขาถูกเจาะทะลุได้อย่างง่ายดายราวกับกระดาษ","โชคดีที่พวกเขายังคงเป็นทหารผ่านศึกชั้นยอดที่มีประสบการณ์โชกโชน และมีความศรัทธาอันแน่วแน่ ดังนั้นแม้จะต้องเผชิญกับภาพอันน่าสะพรึงกลัวเช่นนี้ พวกเขาก็ยังไม่เกิดความโกลาหลหรือแตกพ่าย","กองทัพทัณฑ์ศักดิ์สิทธิ์แนวหน้ายกโล่ขนาดใหญ่ที่แข็งแกร่ง และเปล่งประกายด้วยพลังศักดิ์สิทธิ์ขึ้นมา โดยที่บนใบหน้าของพวกเขาไม่มีร่องรอยของความหวาดกลัวเลยแม้แต่น้อย","ปืนแม่เหล็กไฟฟ้าระลอกที่สองถูกระดมยิงเข้ามาอย่างรวดเร็ว แม้ว่าโล่ขนาดใหญ่ที่ถูกเสริมด้วยพลังศักดิ์สิทธิ์ จะไม่สามารถต้านทานมันไว้ได้สำเร็จ แต่มันก็ช่วยลดทอนอานุภาพของกระสุนลงไปได้กว่าครึ่ง และหลังจากทะลวงร่างของทหารไปได้สองสามคน มันก็สูญเสียพลังงานแล้วระเบิดออก","ตามมาด้วยระลอกที่สาม ระลอกที่สี่...เสียงคำรามของปืนแม่เหล็กไฟฟ้าอันยาวนานก็ได้ดังก้องไปทั่วสมรภูมิ ความถี่ในการยิงของมันเร็วกว่าปืนใหญ่เสียอีก เพียงแค่ยี่สิบวินาที กระสุนนัดต่อไปก็ถูกบรรจุเสร็จเรียบร้อยแล้ว","“ไอ้พวกสารเลว รอให้ตียึดเมืองหลวงได้ก่อนเถอะ ข้าจะจับพวกมันแขวนคอบนกำแพงเมืองให้หมดทุกคนเลย!”","เมื่อมองดูแสงอันวิจิตรตระการตาพุ่งทะยานเข้าไปในกองทัพอันหนาแน่น และนำพามาซึ่งเลือดสีแดงฉาน พระคาร์ดินัลคนหนึ่งก็ตาแดงก่ำ พร้อมใบหน้าของเขาที่บิดเบี้ยวด้วยความโกรธ และกัดฟันกรอดด้วยความแค้น แต่ก็ไม่สามารถทำอะไรได้","ด้วยระยะห่างที่ไกลขนาดนี้ พวกเขาทำได้เพียงตั้งรับการโจมตีฝ่ายเดียวเท่านั้น และไม่มีวิธีใดเลยที่จะสามารถโจมตีศัตรูที่อยู่บนกำแพงเมืองได้...","บนท้องฟ้า เดวี่ที่โชคดีรอดพ้นจากตาข่ายสายฟ้ามาได้ ก็อยากจะนำทัพลงไปเพื่อให้การคุ้มกันแก่กองทัพที่กำลังถอยหนีในทันที แต่กริฟฟอนที่กำลังตื่นตระหนกกลับไม่คิดเช่นนั้น หลังจากที่ได้เห็นแสงสายฟ้าแลบแปลบ พวกมันก็เกิดปฏิกิริยาตอบสนองอย่างรุนแรง และพากันส่งเสียงร้องออกมา โดยไม่กล้าลดระดับความสูงลงเลย","สีหน้าภายใต้หน้ากากเหล็กของเอ็ดเวลดูย่ำแย่ลงอย่างมาก ภายในอาณาเขตแห่งสรวงสวรรค์ ก็มีแสงศักดิ์สิทธิ์พวยพุ่งขึ้นมา โดยมีเอ็ดเวลเป็นศูนย์กลาง มันกวาดผ่านสมรภูมิไปด้วยความเร็วสูง","กองทัพพันธมิตรของขุนนางที่ได้สติกลับมา และกำลังวิ่งหนีหัวซุกหัวซุน ก็ถูกห่อหุ้มเอาไว้อย่างรวดเร็ว แสงสีทองบดบังทัศนวิสัยของทุกคน และพุ่งตรงไปยังเมืองหลวง","ลินน์และคนอื่นๆ ไม่กล้าประมาทแม้แต่น้อย พวกเขาต่างก็งัดเวทมนตร์ป้องกันที่แข็งแกร่งที่สุดออกมา เพื่อต้านทานการโจมตีอันยิ่งใหญ่นี้","แต่กลับไม่มีอะไรเกิดขึ้นเลย แสงสีทองนั้นสลายหายไปทันทีเมื่อสัมผัสกับม่านพลังเวท","“ที่แท้ก็แค่ของหลอกเด็ก”","ราฟาเอลยิ้มเยาะ เมื่อครู่นี้เขายังคิดอยู่เลยว่ามันคือพลังศักดิ์สิทธิ์ระดับตำนานที่ทรงพลังอะไรสักอย่าง ที่สามารถโจมตีจากระยะไกลขนาดนี้ได้","“ถ้ามีความสามารถขนาดนั้น พวกเขาก็คงเอามาใช้โจมตีเมืองตั้งนานแล้ว จะมารอจนถึงตอนนี้ทำไม!”","ซานเชซกล่าวพร้อมรอยยิ้ม จากนั้นก็ส่ายหัว","“โดนหลอกเข้าให้แล้ว พวกมันหนีเร็วจริงๆ!”","ในระหว่างที่พลังศักดิ์สิทธิ์บดบังทัศนวิสัย กองกำลังชั้นยอดของศาสนจักรก็ถอยร่นออกไปไกลกว่าสองกิโลเมตรแล้ว","หลังจากระดมยิงไปหลายระลอก ปืนใหญ่แม่เหล็กไฟฟ้าทั้งเจ็ดกระบอกก็หยุดทำงานลง","ประการแรกคือระยะห่างที่ไกลเกินไป กระสุนจะละลายหายไปในอากาศจนหมด","ประการที่สองคือการระดมยิงอย่างหนักหน่วงเช่นนี้ อาจจะทำให้ปืนใหญ่แม่เหล็กไฟฟ้าเกิดการโอเวอร์โหลดได้ง่าย","“น่าเสียดาย ถ้ามีของเล่นชิ้นนี้เยอะกว่านี้ก็คงดี!”","เดนนิสกล่าวด้วยความเสียดาย","ไม่ว่าจะเป็นตัวปืนแม่เหล็กไฟฟ้าหรือกระสุน ล้วนเป็นของที่ถูกสร้างขึ้นมาเป็นพิเศษ และจำเป็นต้องใช้พ่อมดที่เชี่ยวชาญเวทมนตร์สายฟ้าและเล่นแร่แปรธาตุในการสร้างมันขึ้นมา ดังนั้นในตอนนี้ มันจึงยังไม่เหมาะที่จะนำมาผลิตจำนวนมาก มิฉะนั้น หากมีปืนแม่เหล็กไฟฟ้าสักสองร้อยกระบอก เมื่อครู่นี้พวกเขาก็คงจะสามารถบดขยี้กองกำลังหลักของศาสนจักรได้อย่างแน่นอน และสงครามในครั้งนี้ก็จะจบลงทันที!","ลินน์มองดูศัตรูที่ล้อมรอบกำแพงเมืองล่าถอยไปราวกับน้ำลง แต่เขาก็ไม่ได้ออกคำสั่งให้ไล่ตาม ดูเหมือนว่าพวกเขาจะได้รับชัยชนะครั้งใหญ่ แต่ในขณะที่กองทัพทัณฑ์ศักดิ์สิทธิ์ถอยร่น รูปแบบขบวนรบของพวกเขาก็ไม่ได้กระจัดกระจายเลยแม้แต่น้อย และยังคงรักษากำลังรบที่ไม่เลวเอาไว้ได้","นอกจากนี้ ก่อนหน้านี้อัศวินกริฟฟอนกลุ่มนั้น ได้ลอบวางเพลิงในเมืองอย่างบ้าคลั่ง จนทำให้มีผู้บาดเจ็บและเสียชีวิตจำนวนมาก กองทหารปืนคาบศิลาที่ต่อสู้มาเกือบสองชั่วโมง ก็ต้องการการพักผ่อนอย่างเต็มที่เช่นกัน","ในขณะเดียวกัน ภายในเมืองหลวง เกล็นและคนอื่นๆ กำลังนำกำลังคนไปจับกุมอัศวินกริฟฟอนที่ตกลงมาจากฟากฟ้า","การตกลงมาจากความสูงหลายร้อยเมตร ต่อให้เป็นร่างกายของนักบวช ก็ต้องถูกกระแทกจนกลายเป็นเศษเนื้อ แต่ความโชคดีมักจะมีอยู่ทุกที่ ด้วยความช่วยเหลือของกริฟฟอนที่ทำหน้าที่เป็นเบาะรองรับแรงกระแทก พวกเขาก็ยังคงพบผู้รอดชีวิตถึงห้าคน","อาร์โนผู้โชคร้ายก็เป็นหนึ่งในนั้น ตัวเขาเองไม่ได้รับบาดเจ็บอะไรมากนัก ในตอนที่รับรู้ถึงอันตราย เขาก็ร่ายพลังศักดิ์สิทธิ์เพื่อสกัดกั้นตาข่ายสายฟ้าที่ปรากฏขึ้นบนท้องฟ้าในทันที แต่กริฟฟอนที่อยู่ใต้ร่างของเขากลับถูกทำให้เป็นอัมพาต และพาร่างของเขาตกลงมาในเมืองหลวงอย่างเลี่ยงไม่ได้ แถมยังตกลงมาในจุดที่อยู่ไม่ไกลจากกำแพงเมืองมากนักอีกด้วย","หลังจากประเมินความเป็นไปได้ในการฝ่าวงล้อมของเหล่าจอมเวทผู้ยิ่งใหญ่ออกไปนอกเมืองหลวงแล้ว อาร์โนก็ล้มเลิกความคิดที่จะฝ่าวงล้อม โดยแกล้งทำเป็นสลบ และถูกพ่อมดกับกองทหารปืนคาบศิลาที่ตามมาสมทบจับตัวไป..."]},{"n":358,"t":"ปืนคาบศิลารุ่นใหม่ที่มากพอจะเปลี่ยนทิศทางของสงคราม!","c":["“ท่านเกล็น ทางนี้ยังมีอีกคนหนึ่ง ดูเหมือนว่าจะยังมีชีวิตอยู่ขอรับ!”","แฮมม์ที่รับหน้าที่นำทีมค้นหาและจับกุม ตะโกนขึ้นด้วยความดีใจ หลังจากที่พบอาร์โนที่แกล้ง ‘สลบ’ อยู่บนถนน","อัศวินกริฟฟอนที่ถูกตาข่ายสายฟ้ายิงตกลงมานั้นมีจำนวนมาก แต่คนที่รอดชีวิตมาได้นั้นกลับมีน้อยมาก การจับเป็นได้แต่ละคนล้วนถือเป็นผลงานที่หาได้ยากยิ่ง","ท้ายที่สุด หากสามารถรีดเค้นข้อมูลสำคัญออกมาจากปากของคนเหล่านี้ได้ ก็อาจจะสามารถเปลี่ยนสถานการณ์ของสงครามครั้งนี้ได้เลย","เกล็นที่ได้รับแจ้งก็รีบรุดมาทันที หลังจากเหลือบมองชายคาที่พังทลาย และกริฟฟอนที่ถูกกระแทกจนกลายเป็นเศษเนื้ออยู่ด้านข้าง เขาก็เดาได้ทันทีว่าอีกฝ่ายรอดชีวิตมาได้อย่างไร จากนั้นเขาก็หยิบขวดยาเวทมนตร์ออกมา บีบปากของอาร์โน แล้วกรอกมันลงไปโดยตรง","จะดื่มหรือไม่ดื่ม นี่คือทางเลือก...","อาร์โนลังเลอยู่ครู่หนึ่ง สุดท้ายก็ไม่ได้ทำอะไรเลย ปล่อยให้ยาถูกกรอกเข้าสู่ร่างกาย","หากอีกฝ่ายต้องการจะฆ่าเขา ก็คงลงมือไปแล้ว ไม่จำเป็นต้องทำเรื่องไร้สาระแบบนี้ อาร์โนเดาว่าคนพวกนี้น่าจะต้องการจับเป็นพวกเขาเพื่อไปสอบสวน","ซึ่งนี่ก็ถือเป็นโอกาสที่ดีอย่างไม่ต้องสงสัย","อาร์โนกำลังครุ่นคิดถึงแผนรับมืออยู่ในหัว แต่ทันใดนั้น ความคิดของเขาก็เริ่มพร่ามัว และไม่สามารถรวบรวมเรี่ยวแรงได้เลยแม้แต่น้อย","ยาเวทมนตร์ชนิดพิเศษนี้ จะทำให้กล้ามเนื้อทั่วร่างกายคลายตัว และทำให้สลบไสลไปเป็นเวลานานจนสูญเสียความสามารถในการต่อต้านไปอย่างสมบูรณ์","แต่เกล็นก็คาดไม่ถึงเลยว่า จะมีพระคาร์ดินัลปะปนอยู่ในกลุ่มอัศวินกริฟฟอนด้วย แถมยังถูกพวกเขากระทำราวกับหมูเช่นนี้ เขาจึงใช้ยาในปริมาณปกติเท่านั้น ซึ่งทำให้อาร์โนนั้นยังคงมีสติสัมปชัญญะอยู่ในระดับหนึ่ง และไม่ได้สลบไปอย่างสมบูรณ์","พลปืนคาบศิลาหลายคนนำเชือกชนิดพิเศษ เข้ามามัดตัวเขาเอาไว้อย่างแน่นหนา","ก่อนหน้านี้พวกเขาถูกอัศวินกริฟฟอนยั่วยุสารพัดแต่ก็ไม่สามารถตอบโต้ได้ ทุกคนจึงรู้สึกคับแค้นใจเป็นอย่างมาก ตอนนี้มีโอกาสแก้แค้นแล้ว พวกเขาจึงไม่พลาดที่จะลงมืออย่างลับๆ โดยหนึ่งในนั้นถึงกับเตะเขาอย่างแรงไปหลายครั้ง","อาร์โนอดกลั้นต่อความอัปยศอดสูเอาไว้ แม้ภายในใจจะรู้สึกโกรธเคืองเป็นอย่างมาก พวกคนชั้นต่ำเหล่านี้กล้าดีอย่างไรถึงมาปฏิบัติกับเขาเช่นนี้ เขาแอบจดจำน้ำเสียงของคนเหล่านี้เอาไว้ในใจ และสาบานว่าเมื่อยึดเมืองหลวงแห่งนี้ได้ เขาจะทำให้คนพวกนี้ได้ลิ้มรสความโหดร้ายของศาลแห่งการไต่สวนาอย่างแน่นอน","“เอาล่ะ พอได้แล้ว อย่าทำให้ถึงตายล่ะ!”","เมื่อเห็นการกระทำของทุกคน เกล็นก็รีบเอ่ยปากห้ามทันที และสั่งให้แฮมม์นำตัวอาร์โนไปที่ห้องสอบสวน","...","เมื่อกองทัพของศาสนจักรล่าถอย ข่าวชัยชนะในศึกแรกก็แพร่กระจายไปทั่วทั้งเมืองหลวงในเวลาอันรวดเร็ว!","เสียงโห่ร้องยินดีดังไปทั่วทุกตรอกซอกซอยตั้งแต่หัวกำแพงเมืองไปจนถึงท้ายเมือง","นี่คือชัยชนะอันงดงามอย่างไม่ต้องสงสัย พวกเขาเพียงแค่สิ้นเปลืองกระสุนไปจำนวนหนึ่ง ก็สามารถขับไล่กองทัพปราบปรามที่บุกมาอย่างดุดันได้แล้ว แถมศพที่กองพะเนินอยู่ใต้กำแพงเมืองก็มีมากกว่าสองหมื่นศพ!","หากไม่ใช่เพราะพวกอัศวินกริฟฟอนบ้าพวกนั้น ที่อาศัยความสามารถในการบิน ไปจุดไฟเผาบ้านเรือนจนมีผู้เสียชีวิตและบาดเจ็บกว่าร้อยคนล่ะก็ ชัยชนะในครั้งนี้ก็จะสมบูรณ์แบบมาก!","เมื่อต้องเผชิญกับชัยชนะครั้งยิ่งใหญ่เช่นนี้ ลินน์ก็ไม่ตระหนี่ที่จะมอบรางวัลให้เช่นกัน โดยพลปืนคาบศิลาทุกคนที่เข้าร่วมการต่อสู้ จะได้รับเหรียญทองเวทมนตร์หนึ่งเหรียญเป็นรางวัล และหลังจากที่บันทึกผลงานการรบของพวกเขาแล้ว ก็จะมีการมอบรางวัลพิเศษให้เมื่อสงครามสิ้นสุดลง","แน่นอนว่าเงินจำนวนนี้สภาและราชวงศ์เป็นคนจ่าย","ส่วนกริฟฟอนที่ถูกกระแทกจนตายก็ไม่ได้สูญเปล่า เพราะส่วนหนึ่งจะถูกนำไปใช้เพื่อการวิจัยเวทมนตร์ และอีกส่วนหนึ่งก็นำไปแจกจ่ายเป็นเสบียงเนื้อให้กับเฒ่ายอร์คและคนอื่นๆ ที่สร้างผลงานได้อย่างยอดเยี่ยม","สำหรับคนธรรมดาอย่างเฒ่ายอร์คแล้ว การได้ลิ้มรสเนื้อของสัตว์เวทมนตร์ระดับสูง อาจจะเป็นสิ่งที่หาไม่ได้อีกแล้วในชีวิตนี้ ยิ่งไปกว่านั้น มันยังเป็นเนื้อที่ถูกย่างจนสุกด้วยเวทมนตร์สายฟ้าอีกด้วย","พลปืนคาบศิลาที่โชคดีได้รับส่วนแบ่งเนื้อ ต่างก็รู้สึกว่าชาตินี้พวกเขาไม่เคยกินอะไรที่เหนียวนุ่มขนาดนี้มาก่อนเลย","หลังจากปลอบขวัญเหล่าผู้มีคุณูปการในสงครามครั้งนี้แล้ว ลินน์ก็เพิ่มความเข้มงวดในการลาดตระเวนและคุ้มกันอีกครั้ง เพราะใครๆ ก็รู้ว่าสงครามครั้งนี้ยังห่างไกลจากคำว่าจบสิ้น","แม้ว่าการต่อสู้ในวันนี้จะดูน่าสลดใจ แต่มันก็ยังเป็นเพียงการโจมตีเพื่อหยั่งเชิงเท่านั้น","เพราะบุคคลที่สามารถตัดสินผลแพ้ชนะของสงครามครั้งนี้ได้ อย่างเช่น นักบวชของศาสนจักร ยังไม่ได้ลงมือเลย และกองกำลังชั้นยอดที่อีกฝ่ายส่งมาก็มีไม่มากนัก","ดังนั้น หลังจากจัดการเรื่องจุกจิกเหล่านี้เรียบร้อยแล้ว ลินน์ก็รีบมุ่งหน้าไปยังสถาบันวิจัยการเล่นแร่แปรธาตุที่ตั้งอยู่ในเมืองหลวงทันที","ทันทีที่ก้าวเท้าเข้าไป ก็มีเสียงระเบิดดังสนั่นหวั่นไหวมาจากด้านใน แต่ไม่ว่าจะเป็นลินน์หรือยามรักษาการณ์ที่อยู่ที่นี่ ต่างก็ชินชากับมันแล้ว","และก็เป็นไปตามคาด เพียงไม่กี่นาทีต่อมา พ่อมดจากสถาบันวิจัยการเล่นแร่แปรธาตุหลายคน ก็เดินออกมาจากห้องทดลองที่เต็มไปด้วยแสงไฟ ด้วยสภาพที่มอมแมมไปด้วยฝุ่นและควัน","ลิเดียที่เพิ่งเข้าร่วมสถาบันวิจัย และกลายเป็นนักเล่นแร่แปรธาตุผู้ทรงเกียรติ เมื่อเห็นลินน์ เธอก็รีบเอ่ยถามทันที","“ท่านศาสตราจารย์ลินน์? สงครามครั้งนี้เป็นอย่างไรบ้างคะ? พวกเราชนะใช่ไหมคะ?”","ลิเดียให้ความสนใจกับศึกแรกที่ต้องเผชิญหน้ากับศาสนจักรมาก เพียงแต่เธอยุ่งอยู่กับการปรับปรุงปืนคาบศิลาตลอดเวลา จึงไม่ได้เข้าร่วมการต่อสู้ในแนวหน้า","“ใช้คนบาดเจ็บและเสียชีวิตไม่ถึงสองร้อยคน แลกกับการกำจัดศัตรูไปอย่างน้อยสองหมื่นคน ก็น่าจะถือว่าเป็นชัยชนะครั้งใหญ่นะ!”","ลินน์กล่าวพร้อมรอยยิ้ม การตั้งรับและอาศัยระยะยิงของปืนคาบศิลาและปืนใหญ่เท่านั้น ถึงจะสามารถสร้างอัตราการสูญเสียที่แตกต่างกันอย่างสิ้นเชิงเช่นนี้ได้","นี่เป็นการพิสูจน์ให้เห็นแล้วว่า การตัดสินใจของเขาที่เลือกจะยกเลิกการเป็นฝ่ายบุก แล้วหันมาตั้งรับในเมืองนั้น เป็นการตัดสินใจที่ถูกต้องอย่างยิ่ง!","ท้ายที่สุด ก่อนหน้านี้พวกเขาไม่รู้ข้อมูลของศัตรูเลยแม้แต่น้อย การระมัดระวังตัวไว้ก่อนจึงจะดีที่สุด!","เมื่อต้องเผชิญกับอัตราส่วนการสูญเสียที่เรียกได้ว่าเกินจริง ทุกคนที่อยู่ที่นั่นก็ไม่ได้รู้สึกแปลกใจเลยแม้แต่น้อย เพราะปืนคาบศิลา ปืนใหญ่ และอาวุธแม่เหล็กไฟฟ้าที่พวกเขาสร้างขึ้นมาตามแบบแปลนที่ลินน์มอบให้นั้น ล้วนเป็นอาวุธสังหารในสนามรบอย่างไม่ต้องสงสัย!","“ดูเหมือนว่ากองทัพปราบปรามที่ศาสนจักรส่งมา ก็ไม่ได้มีอะไรมากไปกว่านี้สินะ!”","แม่มดคนหนึ่งกล่าวด้วยรอยยิ้มเย้ยหยัน","หลังจากข่าวสงครามแพร่กระจายไปทั่วดินแดนของพ่อมด หลายคนก็ไม่คิดว่าพวกเขาจะสามารถรักษาอาณาจักรนี้เอาไว้ได้ ภายใต้การรุกรานครั้งใหญ่ของศาสนจักร จนถึงขั้นมีคนเชื่อว่าวันสิ้นโลกของพ่อมดกำลังจะมาถึง","แม้แต่สภาก็ยังเตรียมพร้อมราวกับต้องเผชิญหน้ากับศัตรูตัวฉกาจ และถึงกับเตรียมพร้อมที่จะถอยร่นกลับไปตั้งรับในดินแดนของพ่อมดแล้ว","แต่ตอนนี้ ดูเหมือนว่าการโจมตีอันยิ่งใหญ่ของศาสนจักรจะเปราะบางเหลือเกิน และไม่ได้แตกต่างไปจากพวกคนไร้ระเบียบในอาณาจักรเลย สุดท้ายก็ต้องวิ่งหนีหัวซุกหัวซุนเมื่อต้องเผชิญหน้ากับอาวุธชนิดใหม่ของพวกเขาอยู่ดี","“ไม่หรอก กองกำลังหลักของศาสนจักรในครั้งนี้ เป็นเพียงแค่การโจมตีเพื่อหยั่งเชิงเท่านั้น ความสูญเสียนั้นมีจำกัด และคนที่ตายไปส่วนใหญ่ก็เป็นเพียงแค่ทหารเลว การต่อสู้ในครั้งต่อไปจะไม่ใช่เรื่องง่ายขนาดนี้แน่!”","ลินน์ส่ายหัว ในครั้งนี้พวกเขาได้เปิดเผยอาวุธและข้อมูลมากเกินไป หากศาสนจักรโจมตีเข้ามาอีกครั้ง พวกเขาก็คงจะเตรียมมาตรการรับมือมาอย่างดีแน่นอน","เมื่อคิดได้เช่นนี้ ลินน์ก็มองไปที่วิลสัน นักเล่นแร่แปรธาตุที่รับผิดชอบการวิจัยและพัฒนาปืนคาบศิลา พร้อมกับเอ่ยถามอย่างคาดหวังว่า","“จริงสิ ดินปืนไร้ควันและกระสุนแบบตลับที่ข้าให้พวกเจ้าวิจัยล่ะ? มีความคืบหน้าบ้างไหม?”","“นั่นเสร็จตั้งนานแล้วขอรับ!”","พ่อมดชายที่ชื่อว่าวิลสันทำหน้าขึงขัง จากนั้นก็ให้คนนำปืนคาบศิลาชนิดพิเศษกระบอกหนึ่งมาให้","“นอกจากนี้ ตัวอย่างปืนนกสับที่ท่านต้องการ พวกเราก็ทำเสร็จแล้วเช่นกันขอรับ!”"]},{"n":359,"t":"แก็ตลิงเคยเป็นหมอรักษาคนไข้ จนกระทั่งเขาประดิษฐ์ปืนกล...","c":["ลินน์รับปืนกระบอกยาวมา หลังจากตรวจสอบและทดสอบดู เขาก็กล่าวด้วยความยินดีว่า","“ดี ดีมาก ความคืบหน้าของพวกเจ้าเร็วกว่าที่ข้าคิดเอาไว้เสียอีก”","การต่อสู้ครั้งแรกกับศาสนจักร ทำให้ลินน์ตระหนักถึงความไร้พลังของปืนคาบศิลา เมื่อต้องเผชิญหน้ากับกองทัพที่เหนือธรรมชาติ เพียงแค่พลังศักดิ์สิทธิ์สนับสนุนขนานใหญ่ ก็เพียงพอที่จะทำให้ความรุนแรงของปืนลดลงอย่างมากแล้ว","หากไม่สามารถอาศัยการเจาะเกราะเพื่อสังหารศัตรูที่เข้ามาใกล้ได้ในพริบตา อัตราการยิงอันน่าเวทนาของปืนคาบศิลาก็จะกลายเป็นปัญหาใหญ่","พวกเขาคงไม่สามารถหวังพึ่งการใช้ดาบปลายปืน เพื่อไปต่อสู้ระยะประชิดกับกองทัพทัณฑ์ศักดิ์สิทธิ์ที่แต่ละคนดุร้ายราวกับสัตว์ร้ายได้หรอกใช่ไหม?","แต่ปืนนกสับนั้นถือเป็นความก้าวหน้าอย่างมากเมื่อเทียบกับปืนคาบศิลา ซึ่งแตกต่างจากปืนคาบศิลาที่ใช้หินเหล็กไฟจุดระเบิดดินปืน โดยโครงสร้างของปืนนกสับนั้นมีความใกล้เคียงกับปืนในยุคปัจจุบันมาก ซึ่งใช้การทำงานของนกสับกระแทกเข็มแทงชนวน เพื่อจุดระเบิดแก๊ป จากนั้นแก๊ปก็จะจุดระเบิดดินปืนเพื่อส่งกระสุนออกไป","และสิ่งที่สำคัญที่สุดก็คือ ของสิ่งนี้เป็นปืนที่บรรจุจากท้ายลำกล้อง ซึ่งหมายความว่า กระสุนจะถูกบรรจุจากด้านหลังของลำกล้อง และไม่จำเป็นต้องทำความสะอาดเกลียวลำกล้องบ่อยๆ หรือใช้เวลาเป็นนาทีเพื่อยัดลูกตะกั่วเข้าไปในลำกล้องปืน ซึ่งช่วยเพิ่มอัตราการยิงและความแม่นยำได้อย่างมาก","หากอัตราการยิงของปืนคาบศิลาบรรจุทางปากกระบอกคือหนึ่งนัดต่อนาที ปืนนกสับรุ่นแรกที่เป็นปืนบรรจุท้ายลำกล้อง ก็สามารถยิงกระสุนได้มากกว่าสิบนัดต่อนาที และไม่ค่อยเกิดปัญหาเรื่องปืนด้านหรือดินปืนชื้นอีกด้วย","การปรากฏตัวของกระสุนแบบตลับ ยังหมายความว่าการพัฒนาอาวุธสังหารอีกชนิดหนึ่งสามารถเริ่มขึ้นได้ นั่นก็คือ ปืนกล!","นี่คือสิ่งที่จะครอบงำสมรภูมิอย่างแท้จริง!","ในศตวรรษที่สิบเก้า ปืนกลได้แสดงอานุภาพอันน่าสะพรึงกลัวออกมาหลังจากที่ถูกนำเข้าสู่สมรภูมิ","ตัวอย่างเช่น ในสงครามช่วงปลายศตวรรษที่สิบเก้า ทหารอังกฤษห้าสิบคนอาศัยปืนกลแม็กซิม 5 กระบอก บดขยี้การพุ่งชนของชาวมาตาเบเลกว่าห้าพันคนถึงหลายสิบครั้ง และสังหารไปได้ถึงสามพันกว่าคนในจุดนั้น เรียกได้ว่ามันเปลี่ยนโฉมหน้าของสงครามในเวลาต่อมาอย่างสิ้นเชิง และยุติประวัติศาสตร์การพึ่งพากลยุทธ์คลื่นมนุษย์ รวมถึงการใช้ทหารม้าเพื่อครองสมรภูมิ พร้อมกับผลักดันสงครามให้ก้าวเข้าสู่ห้วงลึกที่น่าสลดใจยิ่งกว่าเดิม","ก่อนหน้านี้ลินน์ไม่ต้องการนำอาวุธสังหารชิ้นนี้ออกมาเร็วขนาดนี้ แต่เมื่อพิจารณาจากสถานการณ์ในตอนนี้แล้ว การพึ่งพาเพียงปืนคาบศิลาและปืนนกสับนั้น ไม่เพียงพอที่จะทำให้พวกเขาได้เปรียบ ในสมรภูมิที่เต็มไปด้วยพลังศักดิ์สิทธิ์และเวทมนตร์","“ข้าขอกระดาษกับป
