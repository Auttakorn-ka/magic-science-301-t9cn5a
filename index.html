ีที่การต่อสู้เริ่มขึ้น นัยน์ตาของลินน์ก็ว่างเปล่า พร้อมกับท่าทางการเคลื่อนไหวของอาร์โนนั้นถูกทำให้ช้าลงหลายร้อยเท่า","ที่มือขวาอันว่างเปล่าของลินน์ ธาตุเหล็กพวยพุ่งขึ้นมา ก่อตัวเป็นลิ่มเหล็กแหลมคมปรากฏขึ้นกลางฝ่ามือ และพุ่งเข้ากระแทกจุดศูนย์ถ่วงของดาบอย่างแม่นยำ ด้วยพละกำลังที่ด้อยกว่าอีกฝ่ายมาก แต่กลับสามารถปัดป้องการโจมตีอันหนักหน่วงนี้ออกไปได้","ปราณดาบที่เกิดจากพลังศักดิ์สิทธิ์ได้กรีดทะลวงพื้นดินจนเกิดเป็นรอยลึก ลุกลามออกไปไกลกว่าหลายสิบเมตร และผ่ากำแพงอันแข็งแกร่งของลานสถาบันจนขาดสะบั้น...","“หืม~”","อาร์โนรู้สึกประหลาดใจเล็กน้อยที่อีกฝ่ายสามารถเบี่ยงเบนการโจมตีนี้ได้ แต่การเคลื่อนไหวของเขาก็ไม่ได้หยุดลง ลูกเตะกวาดพื้นได้พุ่งตรงเข้ามาแล้ว","‘วงแหวนไฟ’","สีหน้าของลินน์ยังคงราบเรียบ พลังเวทหมุนเวียน เปลวเพลิงลุกโชนขึ้นรอบกาย แผ่กระจายออกไปทุกทิศทางอย่างไม่มีช่องโหว่ เป็นคลื่นความร้อนที่แผดเผาและม้วนเอาทุกสิ่งรอบตัวเข้าไป..."]},{"n":371,"t":"การเปิดตัวครั้งแรกของเพลิงอมตะ!","c":["ในวินาทีที่เปลวเพลิงลุกโชน อาร์โนก็ถอยหลบออกมาแล้ว เขาอาศัยความเร็วที่เหนือกว่าการพวยพุ่งของเปลวไฟ หลบการโจมตีนี้ไปได้ด้วยท่วงท่าที่ขัดกับหลักสรีรวิทยาของมนุษย์อย่างสิ้นเชิง","แม้ว่าก่อนหน้านี้อาร์โนจะได้ลองพิสูจน์แล้วว่า วิธีการที่เอ็ดเวลบอกเขานั้นได้ผลเป็นอย่างดี ไอ้ไฟนรกที่ว่านั่นไม่ได้น่ากลัวเหมือนอย่างข่าวลือ แต่วิธีการเหล่านั้นก็ทำได้เพียงแค่สะกดมันเอาไว้เท่านั้น หากมีจุดไหนที่สัมผัสกับเปลวไฟชนิดนี้ ก็จำเป็นต้องเฉือนเนื้อมันทิ้งไป...","หากไม่จำเป็นจริงๆ เขาไม่ต้องการให้เปลวไฟพวกนี้มาสัมผัสร่างกายของเขาเด็ดขาด","“ปฏิกิริยาตอบสนองเร็วมาก...”","ลินน์ลอบตกใจอยู่ในใจ พระคาร์ดินัลตรงหน้าแม้จะไม่ใช่คู่ต่อสู้ที่แข็งแกร่งที่สุดที่เขาเคยเจอ แต่นับว่ารับมือได้ยากอย่างแน่นอน","ความเร็ว พละกำลัง ผสานกับพลังศักดิ์สิทธิ์ เรียกได้ว่าเป็นภัยคุกคามอย่างยิ่ง หากเป็นพ่อมดสายธาตุที่ไม่ถนัดการต่อสู้ระยะประชิดมาเผชิญหน้ากับเขา เพียงแค่เผลอไปชั่วพริบตาก็อาจจะตายคาที่ได้!","แม้สถานการณ์จะวิกฤต แต่ลินน์ก็ไม่ได้ผลีผลามใช้ไม้ตายก้นหีบอย่างเพลิงอมตะและเวทมนตร์เลเซอร์","เพราะเวทมนตร์ทั้งสองชนิดนี้อาจสร้างความเสียหายเป็นวงกว้างและอาจไปโดนพวกเดียวกันได้ ข้อมูลเกี่ยวกับพวกมันนั้นสำคัญมาก หากเลือกที่จะใช้ ก็ต้องมั่นใจว่าสามารถปลิดชีพอีกฝ่ายได้ใน","การโจมตีครั้งเดียว...","ระหว่างที่กำลังครุ่นคิด ศรเวทมนตร์นับร้อยลูกก็เริ่มปรากฏขึ้นรอบกาย","‘เวทมนตร์ ห่าฝนศรเวท’ เป็นเพียงเวทมนตร์ระดับศูนย์วงแหวนที่ถูกดัดแปลงมา แต่ความแข็งแกร่งของเวทมนตร์นั้นขึ้นอยู่กับผู้ร่าย เมื่อมันมาอยู่ในมือของลินน์ มันก็มักจะเปี่ยมไปด้วยพลังที่พลิกแพลงจนคาดไม่ถึงเสมอ","ในเมื่อตามความเร็วไม่ทัน งั้นก็ต้องเอาชนะด้วยจำนวน!","เพียงแค่ลินน์นึกคิด ศรเวทมนตร์ที่ล้อมรอบอยู่ก็พุ่งทะยานออกไป ก่อตัวเป็นห่าฝนกระสุนที่ต่อเนื่องเป็นสาย ปิดกั้นทุกทิศทางการหลบหลีกของอาร์โนเอาไว้","“คิดจะใช้มุกเดิมอีกแล้วงั้นหรือ?”","อาร์โนที่เคยเสียเปรียบมาแล้วครั้งหนึ่ง คราวนี้ไม่ยอมปล่อยให้สิ่งประดิษฐ์เวทมนตร์ที่ดูไร้พิษภัยเหล่านี้เข้ามาใกล้ได้อีก คลื่นพลังอันน่าสะพรึงกลัวพวยพุ่งออกมาจากร่างของเขา ห่าฝนเวทมนตร์ที่พุ่งเข้ามาด้วยความเร็วสูงถูกทำลายจนระเบิดออกตั้งแต่ยังไม่ทันได้เข้าใกล้...","โชคดีที่อาณาเขตแม่เหล็กไฟฟ้านั้นได้ก่อตัวขึ้นแล้ว ลินน์ยกมือขึ้น ประกายสายฟ้าแลบแปลบที่ปลายนิ้ว เขาอาศัยธาตุสื่อนำไฟฟ้าที่หนาแน่นในอากาศ ร่ายเวทมนตร์ระดับห้าวงแหวน!","‘คุกสายฟ้า พายุสายฟ้า’","ท่ามกลางสายฟ้าที่หนาแน่น พายุอสนีบาตได้ครอบคลุมพื้นที่ทั้งหมด โดยมีประกายไฟฟ้าอันบ้าคลั่งสาดกระเซ็นออกไป เต้นรำอยู่ในอากาศราวกับใยแมงมุมที่ถักทออย่างหนาแน่น","แม้อาร์โนจะอยู่นอกอาณาเขตแม่เหล็กไฟฟ้า แต่ความเร็วของสายฟ้านั้นรวดเร็วเกินไป เพียงชั่วพริบตามันก็ลุกลามไปทั่วบริเวณ และด้วยขอบเขตที่กว้างขนาดนี้ แม้จะมีความเร็วระดับเขาก็ไม่อาจหลบพ้น...","รอบกายของอาร์โนปรากฏม่านพลังศักดิ์สิทธิ์ขึ้นมาทันที เพื่อสกัดกั้นสายฟ้าที่จู่โจมตีเข้ามา แต่การเผาผลาญพลังงานอย่างต่อเนื่องเช่นนี้ ย่อมไม่เป็นไปตามที่เขาคาดคิดเอาไว้...","ต้องรีบจบการต่อสู้ให้เร็วที่สุด!","เมื่อตระหนักได้เช่นนั้น อาร์โนก็ไม่ลังเลอีกต่อไป เขากระทืบเท้าพุ่งทะยานออกไป จนร่างกายเคลื่อนที่ด้วยความเร็วสูงจนเกิดเป็นภาพติดตา และพุ่งเข้าไปในอาณาเขตแม่เหล็กไฟฟ้าอย่างท้าทาย","“ลมหายใจมังกร!”","เมื่อเผชิญกับการบุกทะลวงของอาร์โน ลินน์ก็ก้าวถอยหลัง พร้อมกับกระแสเพลิงอันร้อนระอุขยายตัวอย่างรวดเร็ว เขาต้องการใช้เวทมนตร์เปลวไฟในวงกว้างเพื่อบีบให้อีกฝ่ายต้องล่าถอย","แต่ครั้งนี้อาร์โนไม่มีทีท่าว่าจะหลบเลี่ยงเลยแม้แต่น้อย เขากลับพุ่งทะลวงฝ่ากระแสเพลิงอันร้อนระอุเข้ามาตรงๆ โดยมีไฟฟอสฟอรัสขาวที่ทั้งแข็งแกร่งและน่าขนลุกกำลังกลืนกินพลังของม่านพลังศักดิ์สิทธิ์อย่างต่อเนื่อง ในขณะที่ดาบยักษ์ในมือของอาร์โนก็ฟันกวาดออกมาแล้ว","ทุกอย่างเกิดขึ้นในชั่วพริบตา ลินน์ดูเหมือนจะยังไม่ทันตั้งตัว หรืออาจจะคาดไม่ถึงว่าอีกฝ่ายจะพุ่งเข้ามาตรงๆ แบบนี้ ดาบยักษ์แทงทะลุร่างของเขาอย่างรวดเร็ว โดยเสียบทะลุจากช่วงท้อง...","แต่ในวินาทีที่ดาบยักษ์แทงทะลุร่างนั้น รูม่านตาของอาร์โนก็หดตัวลงเล็กน้อย เพราะความรู้สึกที่สัมผัสได้มันผิดปกติ มันไม่มีความรู้สึกถึงการฉีกขาดของเนื้อหนังจากการถูกของมีคมแทงเลยแม้แต่น้อย และบนใบหน้าของอีกฝ่ายก็ไม่มีร่องรอยของความตื่นตระหนกหรือหวาดกลัวเลยสักนิด","ในขณะเดียวกัน มือข้างหนึ่งก็คว้าหมับเข้าที่ไหล่ของเขาอย่างแน่นหนา ตามมาด้วยเพลิงอมตะที่ลุกโชนขึ้นรอบกายลินน์ โดยร่างของเขาแปรสภาพกลายเป็นลูกไฟที่ขยายตัวอย่างรวดเร็ว แล้วพุ่งเข้าใส่อาร์โนที่อยู่ใกล้แค่เอื้อม...","เวทมนตร์ศักดิ์สิทธิ์ ‘การปกป้องแห่งปฐพี’","ในเวลาเพียงศูนย์จุดศูนย์ห้าวินาที อาร์โนก็ร่ายพลังศักดิ์สิทธิ์นี้ได้เพียงบทเดียวเท่านั้น ซึ่งทำให้ผิวหนังสีขาวของเขาเปลี่ยนเป็นสีเทาหินจากภายในสู่ภายนอก...","เวทมนตร์ศักดิ์สิทธิ์ระดับห้าวงแหวนนี้ ‘การปกป้องแห่งปฐพี’ สามารถสร้างเกราะหินที่แข็งแกร่งขึ้นบนผิวหนังได้ ภายใต้การเสริมด้วยพลังศักดิ์สิทธิ์ มันก็แข็งแกร่งพอที่จะต้านทานแรงกระแทกจากเวทมนตร์อันทรงพลังบางชนิดได้เลยทีเดียว!","อาร์โนไม่เข้าใจหรอกว่าสารไวไฟและตัวนำไฟฟ้าคืออะไร แต่เขารู้ความจริงข้อหนึ่ง นั่นคือหินนั้นไม่ไหม้ และไม่นำไฟฟ้า ซึ่งเพียงพอที่จะลดทอนความเสียหายจากเวทมนตร์ที่อันตรายที่สุดสองชนิดของศัตรูให้เหลือน้อยที่สุด!","แต่เขาหารู้ไม่ว่า สิ่งที่ลินน์ใช้ในครั้งนี้ไม่ใช่ไฟฟอสฟอรัสขาว แต่เป็นสิ่งที่อันตรายและทรงพลังกว่านั้น นั่นคือเพลิงอมตะ คลอรีนไตรฟลูออไรด์!","สิ่งที่สามารถเผาผลาญได้ทุกสรรพสิ่ง และแย่งชิงอิเล็กตรอนอย่างบ้าคลั่ง!","ก่อนหน้านี้ที่ลินน์จงใจใช้ไฟฟอสฟอรัสขาวหลอกล่อ ก็เพื่อสร้างความคลาดเคลื่อนทางข้อมูล และเฝ้ารอโอกาสนี้นี่เอง!","“อ๊ากกกกกกก!”","เสียงร้องโหยหวนดังกึกก้องไปทั่วท้องฟ้า อาร์โนแผดเสียงร้องด้วยความเจ็บปวดรวดร้าว เขาสามารถรับรู้ได้อย่างชัดเจนว่าเปลวไฟกำลังเผาไหม้ผิวหนังที่กลายเป็นหินของเขา และมันยังชอนไชลึกลงไปในเลือดเนื้อและกระดูกของเขา...","“อาร์โน!”","พูลสันที่กำลังต่อสู้อย่างดุเดือดกับราฟาเอล เมื่อได้ยินเสียงร้องโหยหวนก็อดไม่ได้ที่จะละสายตาหันไปมอง จากนั้นก็ใช้ ‘แสงศักดิ์สิทธิ์กระแทก’ ดันราฟาเอลออกไป แล้วรีบร่ายพลังศักดิ์สิทธิ์เพื่อช่วยเหลือ...","‘สายฝนแห่งความเมตตาจากพระเจ้า’","ละอองน้ำที่แฝงไปด้วยพลังศักดิ์สิทธิ์ได้ปกคลุมร่างของอาร์โนในทันที และการใช้น้ำเพื่อดับไฟถือเป็นเรื่องปกติสามัญ ตามที่พวกเขาประเมินไว้ก่อนหน้านี้ แม้ไฟนรกนี้จะดับด้วยน้ำได้ยาก แต่การสะกดมันไว้ชั่วคราวก็ไม่ใช่เรื่องเหนือบ่ากว่าแรง","แต่ความเป็นจริงกลับสวนทางกับสิ่งที่พูลสันคาดหวังไว้อย่างสิ้นเชิง เพราะเมื่อละอองน้ำสัมผัสกับร่างกายของอาร์โน เพลิงอมตะที่เกาะติดอยู่ไม่เพียงแต่จะไม่ถูกสะกดเท่านั้น แต่มันกลับปะทุเป็นเปลวไฟที่รุนแรงยิ่งกว่าเดิม และอาร์โนที่กำลังกรีดร้องก็ระเบิดออก กลายเป็นเศษเนื้อและหมอกเลือดสาดกระจายเต็มท้องฟ้า...","พูลสันยืนนิ่งงันไปทั้งตัว ไม่อยากจะเชื่อเลยว่านี่คือฝีมือของตนเอง ก็ไหนบอกว่าน้ำดับไฟได้ไงล่ะ?","แล้วทำไมมันถึงระเบิดตูมตามแบบนี้?","ร่างของลินน์ปรากฏขึ้นที่อีกฝั่งหนึ่งของสนามรบ เขามองดูอาร์โนที่ถูกระเบิดจนแหลกเหลว แล้วหันไปมองพูลสัน พร้อมกับเอ่ยด้วยน้ำเสียงหยอกล้อ","“ดูเหมือนว่าภายในศาสนจักรก็ไม่ได้เป็นน้ำหนึ่งใจเดียวกันสินะ ไม่คิดเลยว่าเจ้าจะลงมือกับพวกพ้องได้โหดเหี้ยมขนาดนี้...”","ราฟาเอลที่อยู่ด้านข้างได้แต่กลอกตา เพราะเขาเองก็รู้ดีถึงคุณสมบัติของเพลิงอมตะ หากใครคิดจะใช้น้ำสาดเพื่อดับมัน ก็จะลงเอยเหมือนอาร์โนนั่นแหละ คือถูกระเบิดจนกลายเป็นก้อนเนื้อเละๆ","ลินน์เผยรอยยิ้มที่มุมปาก เมื่อสามารถอาศัยความคลาดเคลื่อนของข้อมูล จัดการกับพระคาร์ดินัลไปได้หนึ่งคน","ไม่อย่างนั้น ด้วยความเร็วอันเหนือชั้นของอีกฝ่าย ที่เอาแต่หลบหลีก หรือคอยปล่อยคลื่นดาบอยู่ไกลๆ การจะเอาชนะได้ก็ไม่ใช่เรื่องง่ายเลย"]},{"n":372,"t":"จงสัมผัสถึงความสิ้นหวังซะ นี่แหละคือพลังระดับตำนาน!","c":["สถานการณ์ในสนามรบที่เปลี่ยนแปลงไปอย่างกะทันหัน ทำให้บรรดาพ่อมดที่มุงดูอยู่ภายในสถาบันวิจัยการเล่นแร่แปรธาตุต่างก็ชะงักงัน","ในช่วงเวลาสั้นๆ เพียงหนึ่งถึงสองวินาที พวกเขาได้เห็นอาร์โนแกว่งดาบยักษ์ผ่าลินน์ออกเป็นสองซีก จากนั้นร่างก็ถูกเปลวเพลิงที่ลุกลามจุดไฟเผา และลงท้ายด้วยการที่พูลสันใช้พลังศักดิ์สิทธิ์ระเบิดอีกฝ่ายจนตาย...","หรือว่าศัตรูของพวกเขากำลังแตกคอกันเอง?","คนอื่นๆ ต่างก็รู้สึกสับสนไปชั่วขณะ โชคดีที่มีสิ่งหนึ่งที่สามารถยืนยันได้แน่ชัด นั่นคือตอนนี้สถานการณ์กลายเป็นสองรุมหนึ่งแล้ว พวกเขาได้เปรียบอย่างมาก...","ภายใต้การตีวงล้อมอย่างหลวมๆ ของลินน์และราฟาเอล สีหน้าของพูลสันก็ยิ่งดูย่ำแย่ลงเรื่อยๆ เขาอดไม่ได้ที่จะถอยร่นไปหลายก้าว แต่แล้วก็รู้สึกราวกับว่าตัวเองชนเข้ากับกำแพงเหล็ก","พูลสันหันขวับกลับไปมอง จึงได้พบว่าเอ็ดเวลในชุดคลุมยาวสีแดงขลิบทองและสวมหน้ากากเหล็ก ได้มาปรากฏตัวอยู่ด้านหลังของเขาตั้งแต่เมื่อใดก็ไม่อาจทราบได้","“ท่านเอ็ดเวล...”","พูลสันทั้งตื่นเต้นและหวาดกลัว เขารีบอธิบายอย่างร้อนรน","“เมื่อครู่นี้อาร์โนหลงกลพวกพ่อมด จนถูกไฟนรกอันแปลกประหลาดนั่นโจมตีเข้า ข้าเพียงแค่ใช้พลังศักดิ์สิทธิ์เพื่อจะสะกดเปลวไฟพวกนั้นเอาไว้ ไม่คิดเลยว่า...”","เอ็ดเวลยกมือขึ้นปรามคำแก้ตัวของพูลสัน เมื่อครู่นี้เขาเองก็อยู่แถวนี้ ย่อมเห็นเหตุการณ์ทั้งหมดที่เกิดขึ้นตรงหน้าอย่างชัดเจน","สาเหตุที่เขาไม่ได้ลงมือในทันที ก็เพื่อระวังและป้องกันบรรดาพ่อมดระดับตำนานที่อาจจะปรากฏตัวขึ้น","ยิ่งไปกว่านั้น ไม่ว่าจะเป็นอาร์โนหรือพูลสันต่างก็ไม่ได้ตกเป็นรองในการต่อสู้อย่างเห็นได้ชัด เพียงแต่เอ็ดเวลคาดไม่ถึงว่าสถานการณ์จะพลิกผันเร็วขนาดนี้ ทันทีที่พูลสันร่ายพลังเข้าช่วยเหลือ ร่างของอาร์โนก็ระเบิดออกกะทันหัน จนเขาไม่อาจยื่นมือเข้าไปช่วยได้ทัน...","นี่ก็หมายความว่าการวิเคราะห์ก่อนหน้านี้ของเขาผิดพลาด...ไม่สิ ต้องบอกว่าพวกเขาถูกหลอกต่างหาก สิ่งที่ศัตรูกำลังใช้อยู่ในตอนนี้ ถึงจะเป็น ‘ไฟนรก’ ของจริง","“วิญญาณของอาร์โนจะคงอยู่ชั่วนิรันดร์บนสรวงสวรรค์...”","เอ็ดเวลพึมพำเสียงแผ่วเบา จากนั้นก็หันไปมองลินน์และราฟาเอล พร้อมกับกล่าวด้วยน้ำเสียงเย็นชา","“ส่วนพวกผู้ลบหลู่พระเจ้าจะต้องตกลงสู่นรก!”","“ไอ้สรวงสวรรค์และนรกที่ว่า ก็เป็นแค่คำโกหกที่พวกเจ้าเอาไว้หลอกพวกโง่เขลาเท่านั้นแหละ!”","ราฟาเอลแค่นเสียงหัวเราะเยาะ และเป็นฝ่ายลงมือก่อน เพียงแค่เขานึกคิด ธาตุต่างๆ ภายในอาณาเขตก็เริ่มเคลื่อนไหวอย่างบ้าคลั่ง พวกมันสอดประสานและปะทะกัน ก่อนจะพุ่งทะลักเข้าใส่พระคาร์ดินัลทั้งสองที่อยู่เบื้องหน้า","นี่คือเวทมนตร์ระดับห้าวงแหวน ‘กระแสธาตุหลากทะลัก’!","เอ็ดเวลไม่คิดจะหลบเลี่ยง เขามีสีหน้าเรียบเฉยและชี้มือลงไปที่พื้น","“ณ ที่แห่งนี้ คืออาณาเขตแห่งพระเจ้า ความชั่วร้ายทั้งปวงจงมลายสิ้น!”","สิ้นคำกล่าวของเขา พื้นที่ทั้งหมดก็คล้ายกับจะสั่นสะเทือน กระแสธาตุที่กำลังพุ่งทะลักเข้ามา ถูกทำลายให้สลายไปในพริบตาด้วยพลังอันลึกลับ","ตามมาด้วยเสียงบทเพลงสรรเสริญอันยิ่งใหญ่ที่ดังกึกก้องไปทั่วทั้งสถาบันวิจัยการเล่นแร่แปรธาตุ ผืนดินที่เพิ่งถูกไฟแผดเผากลับฟื้นคืนชีวิตชีวาขึ้นมาอีกครั้ง ยอดหญ้าและเถาวัลย์สีเขียวอ่อนแทงยอดออกมาจากเศษหินและซากปรักหักพัง พวกมันเติบโตอย่างบ้าคลั่ง และรัดพันร่างของทุกคนจนขยับตัวไม่ได้...","“สรวงสวรรค์...นี่คือสรวงสวรรค์จุติแล้ว!”","ทหารยามของเมืองหลวงคนหนึ่งตะโกนอย่างบ้าคลั่ง ใบหน้าของเขาปรากฏแววตาที่ศรัทธาอย่างสุดซึ้ง","พระคัมภีร์ศักดิ์สิทธิ์บทที่เก้า หน้าสามสิบห้า: ทูตสวรรค์แห่งพระเจ้าจุติลงมาบนโลก สถานที่ที่ผ่านไปล้วนกลายเป็นสรวงสวรรค์ บานสะพรั่งไปด้วยมวลบุปผา...","ปรากฏการณ์พลิกฟ้าพลิกแผ่นดินเช่นนี้ ทำให้สีหน้าของลินน์เคร่งเครียดขึ้นมาทันที เปลวเพลิงรอบกายกวาดล้างและเผาทำลายพืชสีเขียวที่ผุดขึ้นมาจากพื้นดินจนหมดสิ้น","นี่ไม่ใช่พลังที่คาร์ดินัลทั่วไปจะครอบครองได้อย่างแน่นอน!","“ระดับตำนานงั้นหรือ?”","ราฟาเอลตะโกนออกมาด้วยความหวาดผวา","“ในนามแห่งพระเจ้า พวกเจ้าล้วนเป็นคนบาป เหล่าผู้ลบหลู่พระเจ้า จงคุกเข่าลงอธิษฐาน และวิงวอนขอการอภัยจากพระเจ้าเสีย!”","เสียงของเอ็ดเวลดังก้องกังวานขึ้นอีกครั้ง","ทุกคนที่อยู่ในเหตุการณ์ต่างก็รู้สึกว่าร่างกายหนักอึ้ง พวกเขาทรุดเข่าลงกับพื้นทันที ทำได้เพียงใช้แขนขาทั้งสี่พยุงร่างกายเอาไว้อย่างยากลำบาก ส่วนพ่อมดเต็มตัวอย่างเพียร์ซก็ยิ่งสัมผัสได้ถึงแรงกดดันที่รุนแรงกว่า จนถึงขั้นที่ทั้งร่างหมอบกราบลงไปกับพื้น","คนที่ยังยืนอยู่ได้ในตอนนี้ นอกจากบรรดาผู้ศรัทธาที่ไม่ได้รับผลกระทบแล้ว ก็เหลือเพียงลินน์และราฟาเอลสองคนเท่านั้น...","แรงกดดันที่พวกเขาได้รับนั้นรุนแรงยิ่งกว่าพ่อมดเต็มตัวเสียอีก ลินน์รู้สึกราวกับว่าร่างกายของตนจมดิ่งลงไปในทะเลลึก แรงดันน้ำอันหนักอึ้งจากทุกทิศทุกทาง ราวกับจะบดขยี้ร่างกายของเขาให้แหลกสลาย!","อาณาเขตธาตุที่เคยแผ่ขยายล้อมรอบกายในรัศมีสิบห้าเมตร ตอนนี้หดเล็กลงเหลือเพียงสามเมตรเท่านั้น ธาตุต่างๆ ภายในนั้นก็สูญเสียการควบคุมไปโดยสิ้นเชิง พวกมันเชื่องช้าและกระจัดกระจาย...","นี่น่ะหรือคือระดับตำนาน?","รูม่านตาของลินน์หดตัวลง เพียงแค่เผชิญหน้ากันครั้งเดียว พวกเขาก็สูญเสียความสามารถในการต่อต้านไปแล้ว","“การพิพากษา โทษทัณฑ์แห่งดาบและขวาน!”","เอ็ดเวลกล่าวด้วยน้ำเสียงเย็นชา","พระคัมภีร์ศักดิ์สิทธิ์บทที่สิบเอ็ด หน้าสิบหก: ผู้ใดที่กล่าววาจาชั่วร้าย ลบหลู่พระเจ้า ผู้นั้นจะต้องเผชิญกับโทษทัณฑ์แห่งดาบและขวาน วิญญาณจะต้องตกลงสู่นรก!","ในความว่างเปล่าที่ไร้ซึ่งสรรพสิ่ง จู่ๆ ก็ปรากฏทหารยามแห่งโลกวิญญาณนับสิบคนที่มองไม่เห็นใบหน้า พวกเขาถือดาบและขวานอยู่ในมือ พุ่งเข้ามาฟันที่ศีรษะ หน้าอก และแขนขาของลินน์กับราฟาเอล","ทั้งสองคนที่ถูกกดทับด้วยพลังลึกลับจนไม่สามารถแม้แต่จะขยับตัวได้ ทำได้เพียงมองดูคมดาบและคมขวานที่พุ่งเข้ามาใกล้ เหงื่อเย็นผุดพรายเต็มหน้าผากของราฟาเอล เขาไม่เคยคิดเลยว่าช่องว่างระหว่างตัวเองกับระดับตำนานจะมากมายมหาศาลถึงเพียงนี้...","ลินน์ไม่ยอมก้มหัวรอความตาย ด้วยประสาทสัมผัสที่ยอดเยี่ยม เขาจึงตระหนักได้อย่างรวดเร็วว่า การควบคุมธาตุของตนเองไม่ได้หายไปโดยสมบูรณ์ เพียงแต่มันเชื่องช้าลงอย่างมากเท่านั้น...","‘เชื่อมต่อกับเครือข่ายเวทมนตร์เต็มกำลัง!’","ลินน์ตะโกนลั่นในใจ จากนั้นก็รู้สึกราวกับว่าสมองของตัวเองระเบิดออก พลังจิตวิญญาณของเขากำลังพุ่งสูงขึ้นอย่างรวดเร็ว","สี่วงแหวน...ห้าวงแหวน...หกวงแหวน...","ระดับการประเมินในฐานข้อมูลกระโดดข้ามไปมาอย่างต่อเนื่อง หลังจากทะลวงขึ้นเป็นจอมเวทผู้ยิ่งใหญ่แล้ว ลินน์ก็ได้แจกจ่าย ‘แหวนแห่งศาสตร์เร้นลับ’ ให้กับบรรดาพ่อมดแห่งสถาบันอิเยตาไปเป็นจำนวนมาก","ตอนนี้จำนวนพ่อมดทั้งหมดที่เชื่อมต่อกับเครือข่ายเวทมนตร์มีมากกว่าห้าสิบคนแล้ว ซึ่งส่วนใหญ่ก็ล้วนเป็นพ่อมดเต็มตัวทั้งสิ้น","แน่นอนว่าเพียงแค่พลังประมวลผลของคนเหล่านี้ ยังห่างไกลนักที่จะสนับสนุนให้พลังจิตวิญญาณของเขากระโดดข้ามทีเดียวสองระดับได้...สิ่งที่สำคัญที่สุดก็คือ ในบรรดาพ่อมดที่เชื่อมต่อกับเครือข่ายเวทมนตร์นั้น รวมไปถึงประธานสภาเวทมนตร์ระดับตำนานอย่าง แฮร์รอฟ ด้วย!","แม้ว่าอีกฝ่ายจะเพิ่งเข้าสู่มิติเวทมนตร์เพียงครั้งเดียว และความคืบหน้าในการวิเคราะห์ก็เป็นไปอย่างเชื่องช้ามาก แต่หลังจากความพยายามอย่างไม่ลดละตลอดสองปีเต็ม มันก็มาถึงร้อยละห้าแล้ว!","ปัญญาประดิษฐ์สนับสนุนปฏิบัติตามคำสั่งของลินน์อย่างซื่อสัตย์ มันดึงพลังประมวลผลของทุกคนมาใช้จนหมดสิ้น","พลังจิตวิญญาณที่พุ่งปรี๊ดขึ้นมาในพริบตานั้นเห็นได้ชัดว่าไม่ได้ทำให้สมองของลินน์ระเบิดออก แต่มันเป็นความรู้สึกที่แปลกประหลาดมากทีเดียว","เพราะความสามารถในการคำนวณของสมองนั้นมีพื้นฐานมาจากโครงข่ายเส้นประสาท ไอ้เจ้านี่ไม่ได้เพิ่มขึ้นหรือลดลงอย่างกะทันหัน และในทางกายภาพแล้วสมองก็ไม่มีทางระเบิดออกได้...","ครั้งนี้ลินน์รับรู้ได้อย่างชัดเจนยิ่งขึ้น ว่าร่างกายของเขาต่างหากที่ไม่อาจทนต่อการเผาผลาญที่จำเป็นสำหรับพลังประมวลผลอันมหาศาลนี้ได้ เซลล์ทุกเซลล์ในร่างกายราวกับกำลังคร่ำครวญด้วยความเจ็บปวด...","แต่ตอนนี้เห็นได้ชัดว่าไม่ใช่เวลามาคิดเรื่องพวกนี้ เมื่อพลังจิตวิญญาณเพิ่มสูงขึ้นอย่างรวดเร็ว ลินน์ก็สัมผัสได้ในทันทีว่า ธาตุต่างๆ ภายในอาณาเขตรอบตัวกลับมามีชีวิตชีวาอีกครั้ง!","“ไฟ!”","ลินน์เอ่ยออกมาเพียงคำเดียว เพลิงอมตะอันน่าสะพรึงกลัวก็ลุกโชนขึ้นมาอีกครั้ง กลืนกินทหารยามแห่งโลกวิญญาณที่พุ่งเข้ามานับสิบคนจนหมดสิ้น..."]},{"n":373,"t":"พระเจ้าในความหมายทางฟิสิกส์ ปีศาจแห่งลาปลาซ!","c":["หลังจากช่วยเหลือราฟาเอลที่อยู่ข้างๆ แล้ว ลินน์ก็พุ่งเป้าไปที่เอ็ดเวล","พลังจิตวิญญาณที่เพิ่มสูงขึ้นอย่างฉับพลันและแรงกดดันจากศัตรู ทำให้ลินน์เลิกจำกัดปริมาณและอานุภาพของคลอรีนไตรฟลูออไรด์อีกต่อไป เปลวเพลิงพวยพุ่งและขยายตัวขึ้นกลางอากาศอย่างต่อเนื่อง ก่อตัวเป็นลูกไฟขนาดเท่าหัวคนนับไม่ถ้วน และพุ่งทะยานเข้าใส่เอ็ดเวล","เมื่อต้องเผชิญกับ ‘เพลิงอมตะ’ อันน่าสะพรึงกลัวนี้ เอ็ดเวลก็ไม่กล้าประมาท เขายกมือขึ้นทันที","ทรายและหิน โลหะ ม่านน้ำ...ม่านพลังศักดิ์สิทธิ์ที่สร้างขึ้นจากสสารต่างๆ ซึ่งเคยอยู่ในความทรงจำว่าสามารถสกัดกั้นเปลวไฟได้ ต่างปรากฏขึ้นมาขวางกั้นเบื้องหน้าของเขา","แต่ทั้งหมดนั้นล้วนสูญเปล่า สสารใดๆ ก็ตามที่สัมผัสกับ ‘เพลิงอมตะ’ ล้วนถูกย่อยสลายกลายเป็นเชื้อเพลิงในพริบตา และโหมกระหน่ำเข้ามาด้วยอานุภาพที่รุนแรงกว่าเดิม","เมื่อได้ประจักษ์อีกครั้งว่าสิ่งที่ตนเห็นเมื่อครู่นี้ไม่ใช่ภาพลวงตา เอ็ดเวลก็ยกระดับความน่ากลัวของเปลวไฟชนิดนี้ขึ้นไปอีกหลายขั้น ก่อนที่ ‘เพลิงอมตะ’ ซึ่งโหมกระหน่ำจนบดบังท้องฟ้าจะพุ่งเข้ามาถึงตัว เขาก็รีบเอ่ยขึ้นด้วยความเร็วแสง","“พระเจ้าทรงสร้างกำแพงสูงตระหง่านกั้นระหว่างนรกและโลกมนุษย์ เพื่อสกัดกั้นความชั่วร้ายทั้งปวง และมันจะไม่มีวันพังทลาย!”","สิ้นเสียงคำกล่าวของเขา กำแพงสีทองสูงตระหง่านก็ปรากฏขึ้นเบื้องหน้าทันที ก่อตัวเป็นเกราะป้องกันอันแข็งแกร่ง บนกำแพงนั้นสลักลวดลายพลังศักดิ์สิทธิ์อันซับซ้อนและลึกลับ แผ่กลิ่นอายอันเก่าแก่และศักดิ์สิทธิ์ออกมา!","กำแพงที่ตั้งตระหง่านนี้สกัดกั้น ‘เพลิงอมตะ’ อันน่าสยดสยองเอาไว้ภายนอก","เอ็ดเวลสังเกตเห็นได้อย่างรวดเร็วว่า แม้แต่กำแพงศักดิ์สิทธิ์ที่ใช้สะกดข่มนรก ก็ไม่สามารถต้านทานเปลวไฟชนิดนี้ได้อย่างสมบูรณ์ เพียงแต่ความเร็วในการกัดกร่อนนั้นช้าลงอย่างมาก...","ลินน์เองก็รู้สึกประหลาดใจเล็กน้อย นี่เป็นครั้งแรกที่เขาได้เห็นสิ่งที่มีประสิทธิภาพในการสกัดกั้นคลอรีนไตรฟลูออไรด์ได้","กำแพงที่สร้างขึ้นจากพลังศักดิ์สิทธิ์อันบริสุทธิ์ล้วนๆ งั้นหรือ?","ตราบใดที่ไม่มีอิเล็กตรอน คลอรีนไตรฟลูออไรด์ก็ย่อมไม่สามารถเปลี่ยนสสารชนิดนี้ให้กลายเป็นเชื้อเพลิงได้...ลินน์ตระหนักถึงจุดนี้ได้ในทันที เอ็ดเวลบังเอิญค้นพบวิธีสกัดกั้น ‘เพลิงอมตะ’ ได้ชั่วคราวอย่างไม่ได้ตั้งใจ ซึ่งนั่นก็เป็นข้อมูลที่เขาต้องการจะปกปิดมาโดยตลอด","แต่ลินน์ไม่ได้ฝากความหวังทั้งหมดไว้กับเวทมนตร์เพียงบทเดียว","ในขณะที่กำแพงสูงปรากฏขึ้น ลูกบอลสายฟ้าที่มีเส้นผ่านศูนย์กลางหลายเมตรก็ลอยขึ้นเหนือศีรษะของเขา แสงสว่างจ้าแผ่กระจายออกไปรอบทิศทาง เปลี่ยนเที่ยงคืนให้สว่างไสวราวกับตอนกลางวัน...","“รวม!”","ลินน์ชี้มือไปยังกำแพงศักดิ์สิทธิ์ที่ถูกล้อมรอบด้วยทะเลเพลิง แผ่นสะท้อนแสงหลายแผ่นปรากฏขึ้นรอบๆ ลูกบอลสายฟ้าในทันที และกักเก็บแสงสว่างทั้งหมดเอาไว้ภายใน","ระยะทางประมาณห้าสิบเมตร ถือเป็นระยะที่เวทมนตร์เลเซอร์สามารถรีดเค้นอานุภาพออกมาได้ถึงขีดสุด...","และด้วยพลังจิตวิญญาณอันมหาศาลจากการเชื่อมต่อกับเครือข่ายเวทมนตร์ ลินน์ก็สามารถยกระดับลำแสงเลเซอร์ให้ไปถึงระดับพลังงานขั้นที่สี่ได้ในคราวเดียว!","รัศมีของมันถูกบีบอัดจนเหลือเพียง 0.1 มิลลิเมตรเท่านั้น!","“เปิดให้ข้า!”","ลินน์ตะโกนสุดเสียง ชั้นสะท้อนแสงที่ปิดสนิทปริแตกออกเป็นรอยแยกเล็กๆ ลำแสงที่สว่างเจิดจ้าพุ่งออกไปด้วยความเร็วสามแสนกิโลเมตรต่อวินาที ข้ามผ่านทะเลเพลิง และพุ่งเข้าชนกำแพงศักดิ์สิทธิ์อันแข็งแกร่งดุจหินผา!","กำแพงที่สร้างขึ้นจากพลังศักดิ์สิทธิ์ เดิมทีก็กำลังค่อยๆ พังทลายลงภายใต้การกัดกร่อนของเปลวไฟอยู่แล้ว เมื่อต้องเผชิญกับเวทมนตร์เลเซอร์ที่มีพลังทำลายล้างรุนแรงกว่า มันก็พังทลายลงเป็นชั้นๆ อย่างรวดเร็ว ราวกับแผ่นหนังที่ถูกของมีคมกรีด","เอ็ดเวลที่สัมผัสได้ถึงอันตรายมีสีหน้าเปลี่ยนไปอย่างมาก แต่ความเร็วของแสงนั้นรวดเร็วเกินไป ก่อนที่เขาจะทันได้ตอบสนอง มันก็เจาะทะลุกกำแพงศักดิ์สิทธิ์ และพุ่งทะลวงเข้าที่หน้าอกของเขา...","“ตัด!”","ลินน์ตะโกนลั่นอีกครั้ง ลำแสงที่แทงทะลุร่างของเอ็ดเวลตวัดขึ้นด้านบนในชั่วพริบตา ตัดผ่านจากหน้าอกทะลุลำคอ แล้วผ่าสมองออกเป็นสองซีก...","ไม่เพียงเท่านั้น ลำแสงเลเซอร์ที่มีความยาวแทบจะไร้ขีดจำกัด ยังตัดผ่านกำแพงสูงของลานสถาบัน และคฤหาสน์ที่กำลังถูกไฟไหม้อยู่ไกลออกไปหลายหลัง ก่อนจะพุ่งทะยานขึ้นสู่ท้องฟ้า...","“ท่านเอ็ดเวล!”","พูลสันตะโกนด้วยความตื่นตระหนก ลำแสงนั้นมาเร็วและกะทันหันเกินไป ในตอนที่เขามองเห็น เอ็ดเวลก็ถูกผ่าครึ่งไปแล้ว และร่างอันแหลกเหลวก็ร่วงหล่นลงกับพื้น","ลินน์หอบหายใจอย่างหนักหน่วง ไม่ว่าจะเป็นการควบคุม ‘เพลิงอมตะ’ เป็นวงกว้าง หรือการยกระดับเลเซอร์ให้ไปถึงระดับพลังงานขั้นที่สี่ ล้วนต้องเผาผลาญพลังเวทและพลังจิตวิญญาณไปไม่น้อยเลยทีเดียว","แต่ยังไม่ทันที่ลินน์จะได้ถอนหายใจด้วยความโล่งอก เสียงของเอ็ดเวลก็ดังก้องขึ้นอีกครั้ง","“ในนามแห่งองค์พระผู้เป็นเจ้า ทุกสิ่งที่สูญสลายไป จะหวนคืนกลับมา!”","พลังลึกลับบางอย่างกวาดผ่านพื้นที่ทั้งหมด ร่างอันแหลกเหลวบนพื้นหายวับไปในพริบตา ต้นหญ้าและต้นไม้บนพื้นดินที่ถูกไฟเผาจนมอดไหม้กลับงอกเงยขึ้นมาใหม่ รอยแตกบนกำแพงลานสถาบันที่ถูกตัดขาดอยู่ไกลออกไปก็ผสานตัวเข้าหากันอย่างรวดเร็ว","ราวกับว่าเวลาไหลย้อนกลับ ห้าวินาทีต่อมา ทุกสิ่งก็กลับคืนสู่สภาพเดิม เอ็ดเวลปรากฏตัวขึ้นเบื้องหน้าทุกคนโดยไร้ซึ่งบาดแผลใดๆ","นี่มันพลังศักดิ์สิทธิ์อะไรกันอีกเนี่ย?","ประกาศิตสวรรค์? ย้อนเวลา?","ความหวาดกลัวต่อสิ่งที่ไม่รู้จักก่อตัวขึ้นในใจของลินน์ พลังที่เอ็ดเวลแสดงออกมานั้นเหนือกว่าสถานการณ์เลวร้ายที่สุดที่เขาเคยคาดคิดเอาไว้เสียอีก แม้แต่บาดแผลฉกรรจ์อย่างการถูกผ่าสมองก็ยังฆ่าอีกฝ่ายไม่ได้","หรือจะพูดให้ถูกก็คือ ตายไปแล้วแต่กลับฟื้นคืนชีพขึ้นมาใหม่?","สิ่งที่รับมือยากยิ่งกว่านั้นก็คือ ลินน์ไม่รู้เลยว่าความสามารถที่คล้ายกับประกาศิตสวรรค์นี้มีที่มาจากไหน ถึงขนาดสามารถทำเรื่องเหลือเชื่ออย่างการย้อนเวลาได้","แม้ว่าในทางฟิสิกส์แล้ว มันจะไม่ใช่เรื่องที่เป็นไปไม่ได้ก็ตาม...","ตามสมมติฐานที่ค่อนข้างเป็นที่นิยมในชาติก่อน เวลาก็คือภาพสะท้อนของการเคลื่อนที่และการเปลี่ยนแปลงของสสาร ในทางทฤษฎีแล้ว หากสามารถล่วงรู้ตำแหน่งและโมเมนตัมของอะตอมทั้งหมด ณ จุดเวลาหนึ่งได้ ก็จะสามารถทำนายอนาคต หรือกระทั่งทำให้เวลาไหลย้อนกลับเพื่อคืนสู่จุดเริ่มต้นได้!","นี่ก็คือสิ่งที่เรียกว่า ‘ปีศาจแห่งลาปลาซ’ หรือพระเจ้าในความหมายทางฟิสิกส์ ผู้หยั่งรู้ทุกสรรพสิ่งและทำได้ทุกอย่าง!","แต่นั่นมันเป็นไปไม่ได้อย่างแน่นอน จักรวาลนั้นกว้างใหญ่ไพศาล การจะหยั่งรู้ตำแหน่งของอะตอมทั้งหมดได้ ก็เป็นแค่เรื่องเพ้อฝัน!","เดี๋ยวก่อน...บันทึกตำแหน่งและโมเมนตัมของอะตอม...การจำลองพลังเวทมนตร์...อาณาเขตแห่งแดนศักดิ์สิทธิ์...","จู่ๆ ลินน์ก็ตระหนักถึงบางสิ่งบางอย่าง ความคิดในหัวแล่นปลาบ และเกิดข้อสันนิษฐานขึ้นมาในใจทันที","“ท่านศาสตราจารย์ลินน์ สิ่งที่เขาพูดเมื่อครู่นี้ น่าจะเป็นประโยคในพระคัมภีร์ทั้งหมดเลยครับ...”","เพียร์ซที่ยังคงถูกกดทับอยู่บนพื้นจนขยับตัวไม่ได้ตะโกนบอก","หลังจากยึดครองเมืองหลวงและทำลายโบสถ์ท้องถิ่น พวกเขาก็ยึดพระคัมภีร์ฉบับคัดลอกมาได้เป็นจำนวนมาก เพียร์ซเองก็เคยเปิดอ่านด้วยความอยากรู้อยากเห็น เขาอ่านมันเหมือนเป็นหนังสือนิทานเรื่องหนึ่ง จึงพอจะมีความคุ้นเคยอยู่บ้าง","ดังนั้น เพียร์ซจึงมั่นใจมากว่า ทุกคำพูดของเอ็ดเวลเมื่อครู่นี้ ล้วนมีอยู่ในพระคัมภีร์อย่างแน่นอน ไม่มีข้อยกเว้น!","ลินน์เข้าใจในทันที ความสามารถแบบประกาศิตสวรรค์นี้ ไม่ใช่พลังของตัวอีกฝ่ายเองทั้งหมด","แหล่งกำเนิดพลังนั้นมาจากภาพฉายของแดนศักดิ์สิทธิ์ ทุกสิ่งทุกอย่างที่นี่ ไม่ว่าจะเป็นต้นหญ้าและต้นไม้ที่เติบโตอย่างบ้าคลั่ง ผืนดิน หรือสิ่งก่อสร้าง ล้วนถูกรุกรานด้วยพลังศักดิ์สิทธิ์ ตำแหน่งและสถานะของพวกมันล้วนอยู่ภายใต้การควบคุมของผู้เป็นนายแห่งแดนศักดิ์สิทธิ์ หรือก็คือ ‘เอลา’ องค์นั้น ซึ่งเพียงพอที่จะบรรลุความหยั่งรู้ทุกสรรพสิ่งและทำได้ทุกอย่างในขอบเขตที่จำกัด จนสามารถทำเรื่องเหลือเชื่ออย่างการย้อนเวลาได้!","ส่วนเอ็ดเวลนั้นเห็นได้ชัดว่าไม่มีความสามารถนี้ เขาทำได้เพียงใช้ถ้อยคำศักดิ์สิทธิ์ที่เปรียบเสมือนรหัสผ่าน เพื่อดึงพลังจากภาพฉายของแดนศักดิ์สิทธิ์มาใช้ได้ในระดับหนึ่งเท่านั้น..."]},{"n":374,"t":"สรรพสัตว์จะหมอบกราบเบื้องหน้าพระผู้สร้าง เพื่อรับการพิพากษาจากพระองค์!","c":["ความคิดอันซับซ้อนแล่นผ่านเข้ามาในหัวของลินน์อย่างรวดเร็ว แม้ว่าจะเดาแหล่งที่มาของพลังแบบประกาศิตสวรรค์ของอีกฝ่ายได้คร่าวๆ แล้ว แต่จะรับมือกับมันอย่างไรนั้นก็ยังคงเป็นปัญหาที่รับมือยากเอามากๆ...ยิ่งไปกว่านั้น ดูเหมือนว่าอีกฝ่ายยังมีความสามารถในการเป็นอมตะ หรือฟื้นคืนชีพได้อีกด้วย","ในระหว่างที่กำลังครุ่นคิด ลินน์ก็ไม่ได้หยุดมือ เวทมนตร์รวมแสงที่ลอยอยู่เหนือศีรษะถูกกระตุ้นการทำงานขึ้นอีกครั้ง ลำแสงเลเซอร์อันรุนแรงกวาดผ่าน ตัดกำแพงสูง อาคาร และต้นไม้ภายในลานสถาบันจนขาดสะบั้น","ร่างของเอ็ดเวลบิดเบี้ยวและหายวับไปจากจุดเดิม เพื่อหลบหลีกการตัดของลำแสงเลเซอร์ แม้ว่าความเร็วของเขาจะไม่เทียบเท่าความเร็วแสง แต่ก็เหนือกว่าความเร็วในการหมุนกวาดของเวทมนตร์รวมแสงอยู่มาก...","ลินน์ปลดปล่อยสัมผัสออกไป เพื่อค้นหาร่องรอยของอีกฝ่ายในทุกทิศทาง แต่รอบด้านกลับเต็มไปด้วยความผันผวนของพลังศักดิ์สิทธิ์ พลังจิตวิญญาณของเขาจึงไม่สามารถแผ่ออกไปนอกขอบเขตอาณาเขตของตัวเองได้เลย","“พระเจ้าทรงสร้างผืนแผ่นดินและท้องฟ้า คนบาปจะไม่มีสิทธิ์ยืนหยัดอยู่บนผืนดิน!”","เสียงของเอ็ดเวลดังก้องขึ้นในความว่างเปล่า","พื้นดินใต้เท้าของทุกคนพังทลายลงในทันที และแปรสภาพเป็นโคลนสีดำเหนียวหนืด ขาทั้งสองข้างของลินน์จมลึกลงไปทันที ไม่เพียงเท่านั้น มือกระดูกขาวโพลนนับไม่ถ้วนยังโผล่ขึ้นมาจากโคลนตม คว้าจับต้นขาของเขาไว้อย่างแน่นหนา ราวกับต้องการจะลากตัวเขาลงไปในโคลนตมนั้นให้ได้","เงาร่างของเอ็ดเวลมาปรากฏอยู่ด้านหลังลินน์ตั้งแต่เมื่อใดก็ไม่อาจทราบได้ เขายื่นมือขวาออกไปเบื้องหน้า ความผันผวนของพลังศักดิ์สิทธิ์อันรุนแรงปรากฏขึ้นที่กลางฝ่ามือ แต่ในวินาทีต่อมาเขาก็หยุดชะงัก ร่างกายถอยร่นไปหลายก้าว หลบเลี่ยง ‘ลำแสงสลายโครงสร้าง’ ที่พุ่งเข้ามาได้อย่างหวุดหวิด","คนที่ลงมือก็คือราฟาเอล!","ในฐานะเวทมนตร์ระดับห้าวงแหวนที่โดดเด่น ‘ลำแสงสลายโครงสร้าง’ สามารถฉีกกระชากเหล็กกล้าได้ในพริบตา แม้แต่เอ็ดเวลก็ยังไม่กล้ารับการโจมตีนี้ตรงๆ","เนื่องจากลินน์ที่อยู่ด้านหน้าเป็นคนแบกรับแรงกดดันส่วนใหญ่เอาไว้ ทำให้เอ็ดเวลไม่ได้ทุ่มความสนใจมาที่พวกเขามากนัก ดังนั้น หลังจากดิ้นรนอย่างหนัก ราฟาเอลก็สามารถแย่งชิงการควบคุมอาณาเขตบางส่วนกลับมาได้ เขาเพียงแค่อดกลั้นและรอคอย จนกระทั่งถึงช่วงเวลาสำคัญนี้จึงค่อยลงมือ!","สิ่งเดียวที่น่าเสียดายก็คือ เอ็ดเวลยังคงสามารถหลบการโจมตีของเขาไปได้อย่างง่ายดาย","โชคดีที่ความเปลี่ยนแปลงในชั่วพริบตานี้ ทำให้ลินน์ได้สติกลับมา ลำแสงเลเซอร์อันเจิดจ้าพุ่งออกไป และร่างของเอ็ดเวลก็หายวับไปจากจุดเดิมอีกครั้ง...","เพียงแค่ลินน์นึกคิด เพลิงอมตะอันน่าสะพรึงกลัวก็ปรากฏขึ้นรอบกาย มือกระดูกขาวที่โผล่ขึ้นมาจากหนองน้ำถูกแผดเผาจนกลายเป็นเชื้อเพลิงในทันที จากนั้นคลื่นความร้อนที่เพิ่มขึ้นอย่างรวดเร็วก็พุ่งทะยานออกไปทุกทิศทาง...","ในเมื่อเขาหาตำแหน่งของเอ็ดเวลไม่พบ งั้นก็เผาทำลายที่นี่ให้เหี้ยนไปเลย ทำลายรากฐานพลังของอีกฝ่ายโดยตรง!","หากผู้เป็นนายแห่งภาพฉายแดนศักดิ์สิทธิ์ตัวจริงอยู่ที่นี่ ลินน์คงไม่กล้าคิดการใหญ่เช่นนี้แน่ แต่ในเวลานี้คนที่ ‘ควบคุม’ มันอยู่ ไม่ใช่พระเจ้าผู้หยั่งรู้ทุกสรรพสิ่งและทำได้ทุกอย่าง!","ส่วนความสามารถที่คล้ายกับการย้อนเวลานั้น เขาไม่มีทางเชื่อเด็ดขาดว่ามันจะไม่มีการเผาผลาญพลังงานใดๆ ไม่อย่างนั้นเอ็ดเวลก็คงไม่จำเป็นต้องหลบการโจมตีของพวกเขาหรอก...","ภายใต้การควบคุมอย่างเต็มกำลังของลินน์ ความน่าสะพรึงกลัวของเพลิงอมตะก็เผยออกมาอย่างรวดเร็ว ทุกสิ่งทุกอย่างรอบตัวถูกม้วนเข้าไปในกองเพลิง ไม่ว่าจะเป็นบ้านเรือน กำแพงสูง ต้นไม้ใบหญ้า พื้นดิน หรือแม้แต่ฝุ่นละอองที่ลอยปะปนอยู่ในอากาศก็ยังถูกจุดไฟ","เพียงชั่วอึดใจเดียว สถาบันวิจัยการเล่นแร่แปรธาตุทั้งสถาบันก็กลายเป็นทะเลเพลิง...","แม้สถานที่ที่ราฟาเอล เอล็อค และคนอื่นๆ อยู่ จะถูกโอบล้อมเอาไว้ด้วยเปลวไฟ แต่การควบคุมในระดับนี้ถือว่ามาถึงขีดจำกัดแล้ว ลินน์ไม่สามารถแบ่งพลังสมาธิไปควบคุมก๊าซพิษที่เกิดจากการเผาไหม้ได้ เขาทำได้เพียงปล่อยให้คลอรีนไตรฟลูออไรด์แย่งชิงอิเล็กตรอนอย่างบ้าคลั่ง สร้างเปลวเพลิง แสงสว่างจ้า และความร้อนสูงออกมาอย่างต่อเนื่องจนเต็มพื้นที่...","ตอนนี้การเอาชนะเอ็ดเวลถือเป็นสิ่งสำคัญอันดับแรก ไม่อย่างนั้นวันนี้พวกเขาทุกคนคงต้องตายกันหมดที่นี่...","เปลวเพลิงอันน่าสะพรึงกลัวกัดกร่อนพื้นที่ครอบคลุมของภาพฉายแดนศักดิ์สิทธิ์อย่างรวดเร็ว ร่างของเอ็ดเวลก็ปรากฏขึ้นท่ามกลางทะเลเพลิงเช่นกัน รอบกายของเขามีเกราะป้องกันทรงกลมล้อมรอบ ซึ่งสร้างขึ้นจากพลังศักดิ์สิทธิ์อันบริสุทธิ์!","จากการต่อสู้เมื่อครู่นี้ เขาได้เห็นแล้วว่ามีเพียงพลังศักดิ์สิทธิ์อันบริสุทธิ์เท่านั้น ที่สามารถต้านทานคุณสมบัติการกลืนกินทุกสรรพสิ่งของ ‘เพลิงอมตะ’ ได้ในระดับหนึ่ง","แน่นอนว่าความร้อนสูงและพลังทำลายล้างของตัวเปลวไฟเองนั้นก็ยังคงรุนแรงอยู่...และที่สำคัญที่สุดคือ เขาหาวิธีดับไฟชนิดนี้ไม่ได้เลย","ทราย หิน โลหะ ม่านน้ำ วิธีการดับไฟแบบเดิมๆ เหล่านี้สูญเสียประสิทธิภาพไปโดยสิ้นเชิง แม้กระทั่งการแยกออกซิเจนออกจากอากาศ ก็ยังไม่สามารถหยุดยั้งการลุกลามของมันได้...","เอ็ดเวลสัมผัสได้อย่างเฉียบแหลมว่ามิติรอบด้านเริ่มสั่นคลอนและกำลังจะพังทลายลง ท้ายที่สุดแล้วนี่ก็เป็นเพียงแค่ภาพฉายส่วนหนึ่งเท่านั้น ไม่ใช่อาณาเขตแดนศักดิ์สิทธิ์ที่แท้จริง พลังที่ค้ำจุนให้มันจุติลงมา กำลังถูกเปลวเพลิงกลืนกินและลอกออกไป...","พูลสันที่ถูกม้วนเข้าไปในทะเลเพลิงเช่นกัน ทำได้เพียงหลบซ่อนตัวอยู่ด้านหลังเอ็ดเวลด้วยความสั่นกลัว เบิกตากว้างมองดู ‘เพลิงอมตะ’ ที่พุ่งสูงขึ้นด้านนอกค่อยๆ กัดกร่อนม่านพลังศักดิ์สิทธิ์รอบกาย","พูลสันรู้ดีกว่าใคร ว่าหากสัมผัสกับเปลวไฟชนิดนี้จะจบลงเช่นไร สภาพการตายของอาร์โนคือเครื่องพิสูจน์ที่ดีที่สุด","“ท่านเอ็ดเวล”","เมื่อเห็นว่าเปลวไฟได้รุกล้ำเข้ามาในม่านพลังแล้ว พูลสันก็ร้องเรียกอย่างร้อนรน","เอ็ดเวลที่กำลังลังเลใจ ในที่สุดก็ตัดสินใจได้ว่า ต้องจัดการศัตรูของศาสนจักรคนนี้ให้ได้!","อีกฝ่ายยังไม่ได้ก้าวเข้าสู่ระดับนั้นเลยด้วยซ้ำ แต่กลับครอบครองเวทมนตร์ทั้งสองบทที่สามารถคุกคามเขาได้ หากปล่อยไว้ วันข้างหน้าจะต้องกลายเป็นอุปสรรคชิ้นใหญ่ของพวกเขาอย่างแน่นอน!","“เมื่อวันพิพากษามาถึง ประตูแห่งสรวงสวรรค์จะเปิดออก องค์พระผู้เป็นเจ้าประทับบนบัลลังก์ศักดิ์สิทธิ์ สรรพสัตว์จะหมอบกราบเบื้องหน้าพระผู้สร้าง เพื่อรับการพิพากษาจากพระองค์!”","สีหน้าของเอ็ดเวลเริ่มเคร่งขรึมขึ้นเรื่อยๆ ทุกครั้งที่เอ่ยประโยคหนึ่ง สีหน้าของเขาก็จะซีดเผือดลงไปส่วนหนึ่ง พร้อมกับพลังศักดิ์สิทธิ์ในร่างกายที่หมุนเวียนอย่างบ้าคลั่ง","ในความมืดมิด พลังศักดิ์สิทธิ์อันยิ่งใหญ่บางอย่างถูกดึงดูดเข้ามา...","ลินน์เองก็สัมผัสได้ถึงความผันผวนของพลังศักดิ์สิทธิ์อันน่าสะพรึงกลัวนี้เช่นกัน ในวินาทีที่เอ็ดเวลเอ่ยปาก เขาก็ยืนยันตำแหน่งของอีกฝ่ายได้ทันที ลำแสงที่รวมเป็นจุดเดียวพุ่งตัดทะลวงออกไปอีกครั้ง","แต่บานประตูทองสัมฤทธิ์บานหนึ่งกลับปรากฏขึ้นตรงหน้าของเอ็ดเวล ลำแสงเลเซอร์ที่สามารถเจาะทะลุกำแพงศักดิ์สิทธิ์และตัดบ้านเรือนออกเป็นสองท่อนได้อย่างง่ายดาย กลับไม่สามารถทิ้งร่องรอยใดๆ ไว้บนประตูบานนี้ได้เลย!","นี่คือพลังศักดิ์สิทธิ์ระดับตำนาน ‘ประตูแห่งสรวงสวรรค์’!","บานประตูบานนี้เชื่อมต่อไปยังแดนศักดิ์สิทธิ์ที่แท้จริง อาณาเขตแห่งพระเจ้า!","ภายในศาสนจักรทั้งหมด มีเพียงองค์สมเด็จพระสันตะปาปา หัวหน้าผู้พิพากษา และผู้บริหารระดับสูงเพียงหยิบมือเท่านั้น ที่มีคุณสมบัติในการใช้พลังศักดิ์สิทธิ์นี้","นั่นเป็นเพราะผู้ร่ายจะต้องใช้พลังศักดิ์สิทธิ์ในร่างกายของตนเองเป็นจุดยึดเหนี่ยว เพื่อชักนำและค้ำจุนการจุติของประตูแห่งสรวงสวรรค์!","ในช่วงหลายร้อยปีที่ผ่านมา มีบันทึกการใช้พลังศักดิ์สิทธิ์นี้เพียงสี่ครั้งเท่านั้น ในขณะที่หยิบยืมพลังศักดิ์สิทธิ์อันสูงสุดของพระเจ้ามากวาดล้างปีศาจร้ายและเทพเจ้านอกรีตที่ทรงพลัง ตัวผู้ร่ายเองก็จะได้รับบาดเจ็บสาหัสเช่นกัน ต่อให้ใช้พลังระดับตำนาน ก็ยากที่จะทนรับการเผาผลาญอันมหาศาลเช่นนี้ได้ และอาจถึงขั้นเสี่ยงต่อการร่วงหล่นจากระดับพลัง!","“นี่คือประตูแห่งสรวงสวรรค์!”","พูลสันทั้งตื่นเต้นและดีใจ เขาไม่สนใจเพลิงอมตะที่พวยพุ่งอยู่รอบตัวเลยแม้แต่น้อย เขาทรุดเข่าลงบนพื้นและเริ่มสวดอ้อนวอนในทันที"]},{"n":375,"t":"เทพที่แท้จริงจุติ!","c":["บานประตูทองสัมฤทธิ์แปรเปลี่ยนจากความว่างเปล่ากลายเป็นของแข็ง ตั้งตระหง่านอยู่ภายในลานสถาบันที่เต็มไปด้วยเพลิงอมตะ ราวกับว่ามันดำรงอยู่มาตั้งแต่ยุคโบราณกาล กลิ่นอายอันน่าเกรงขามที่แผ่ออกมาทำให้ราฟาเอลและคนอื่นๆ ที่อยู่ห่างออกไปหลายสิบเมตรถึงกับตัวสั่นสะท้าน","‘เพลิงอมตะ’ ที่ลุกโชนอยู่โดยรอบถาโถมเข้าใส่ในพริบตา โดยพยายามจะกลืนกินประตูแห่งสรวงสวรรค์เข้าไปอย่างตะกละตะกลาม แต่เปลวไฟกลับคล้ายกับถูกพลังบางอย่างแทรกแซง เมื่อเข้าใกล้บานประตู มันก็บิดเบี้ยวไปอย่างเห็นได้ชัด","ลินน์ที่กำลังพยายามควบคุมทะเลเพลิงอันบ้าคลั่ง ก็สัมผัสได้อย่างรวดเร็วว่าสิ่งที่บิดเบี้ยวไม่ใช่เปลวไฟ แต่เป็นมิติทั้งหมดต่างหาก!","บานประตูขนาดมหึมาเปรียบเสมือนดาวดวงหนึ่ง เพียงแค่มันตั้งตระหง่านอยู่ตรงนั้น ห้วงเวลาและมิติโดยรอบก็เปลี่ยนแปลงไปเพราะมัน!","ตามมาด้วยเสียงที่ดังกังวานราวกับระฆังใบยักษ์ เพียงบานประตูทองสัมฤทธิ์นั้นแง้มออกเป็นรอยแยกเล็กๆ แรงกดดันอันน่าสะพรึงกลัวก็ควบแน่นขึ้นในความว่างเปล่า พร้อมเสียงบทเพลงสรรเสริญอันแผ่วเบาดังก้องอยู่ในหูของทุกคน","สีหน้าของลินน์เคร่งเครียดถึงขีดสุด เพียงแค่บานประตูที่เชื่อมต่อไปยังสรวงสวรรค์ ก็ยังแสดงให้เห็นถึงความสามารถในการบิดเบือนมิติเวลา และสามารถต้านทานเวทมนตร์เลเซอร์ระดับพลังงานขั้นที่สี่ได้ เขาไม่อยากจะจินตนาการเลยว่า หากเทพที่แท้จริงจุติลงมา จะทรงพลังและน่าสะพรึงกลัวถึงเพียงใด?","แต่เวทมนตร์ที่ทรงพลังที่สุดสองบทที่เขาครอบครองอย่างเลเซอร์และเพลิงอมตะ ต่างก็ไม่สามารถทำลายบานประตูนี้ได้","ตอนนี้คงต้องเดิมพันกันสักตั้งแล้ว!","ลินน์รู้ดีว่าความหวังเดียวของเขาคือการยืมพลัง!","เพลิงอมตะกลืนกินพลังจากภาพฉายของแดนศักดิ์สิทธิ์ไปเป็นจำนวนมาก มันได้ลอกเอาอิเล็กตรอนที่พลังศักดิ์สิทธิ์แปรสภาพเป็นธาตุออกมาจนหมดสิ้น และบัดนี้มันก็ได้กลายเป็นส่วนหนึ่งของเปลวไฟ ที่กระจัดกระจายอยู่ทั่วทั้งลานสถาบัน ก่อตัวเป็นสนามแม่เหล็กไฟฟ้าอันน่าสะพรึงกลัวแต่ไม่อาจควบคุมได้...","การจะนำพลังที่ไร้ระเบียบและทรงพลังเช่นนี้มาใช้ย่อมไม่ใช่เรื่องง่าย แต่ด้วยการสนับสนุนพลังประมวลผลจากพ่อมดหลายสิบคน สิ่งที่เป็นไปไม่ได้ ก็กลับกลายเป็นไปได้!","ลินน์ยกมือขึ้น ลูกเหล็กตันลูกหนึ่งก่อตัวขึ้นกลางอากาศ ตามมาด้วยกระแสไฟฟ้าที่แลบแปลบพวยพุ่งขึ้นรอบกาย","แม้ปืนใหญ่แม่เหล็กไฟฟ้าจะมีข้อเสียตรงที่ต้องใช้เวลาชาร์จพลังงานนาน แต่หากพูดถึงพลังทำลายล้างเพียงอย่างเดียว มันกลับเหนือกว่าลำแสงเลเซอร์เสียอีก!","แต่ถึงกระนั้น ก็ยังต้องมีความเร็วถึงสี่สิบเท่าของความเร็วเสียง จึงจะสามารถทำลายวังวนมิติเวลาที่อยู่รอบๆ ประตูแห่งสรวงสวรรค์ได้!","ลินน์ขอทุ่มหมดหน้าตักให้กับการโจมตีในครั้งนี้!","พลังเวทในร่างกายของเขาถูกใช้จนหมดเกลี้ยงไปนานแล้วระหว่างการต่อสู้ โดยพลังที่เขากำลังเรียกมาใช้ในตอนนี้ ล้วนเป็นพลังเวทที่ถูกกักเก็บไว้ในเครือข่ายเวทมนตร์ทั้งสิ้น!","อิเล็กตรอนที่ถูกแย่งชิงมากำลังรวมตัวกันอย่างรวดเร็ว แต่ความเร็วในการชาร์จพลังงานของปืนใหญ่แม่เหล็กไฟฟ้านั้น กลับเทียบไม่ได้เลยกับความเร็วในการเปิดออกของบานประตู","เอ็ดเวลสัมผัสได้ถึงความผันผวนของพลังเวทมนตร์อันน่าสะพรึงกลัวที่ถูกกั้นไว้ด้วยทะเลเพลิง เขาไม่ได้สนใจ และไม่สามารถหยุดยั้งมันได้ เพราะพลังทั้งหมดของเขาถูกทุ่มเทไปกับการค้ำจุนการจุติของประตูแห่งสรวงสวรรค์","ตราบใดที่สามารถเปิดประตูเชื่อมต่อทั้งสองโลก และสร้างช่องทางที่กว้างพอให้เทพที่แท้จริงจุติลงมาได้ การดิ้นรนต่อต้านของศัตรูทั้งหมดก็จะเป็นเพียงความสูญเปล่า...","แต่จู่ๆ สีหน้าของเอ็ดเวลก็เปลี่ยนไปอย่างกะทันหัน เขาหันขวับกลับไปมอง","เพราะเขาสัมผัสได้ว่า อาณาเขตที่สร้างขึ้นจากภาพฉายของแดนศักดิ์สิทธิ์ กำลังถูกคนจากภายนอกตัดเปิดออก!","ต่างจากการตัดทางกายภาพอย่างเวทมนตร์เลเซอร์ที่ลินน์ใช้ แต่นี่คือการทำลายล้างในระดับมิติ!","มิติทั้งหมดสั่นสะเทือนอย่างรุนแรง เส้นสีดำลุกลามไปทั่วภาพฉายของแดนศักดิ์สิทธิ์ที่เต็มไปด้วยเปลวไฟอย่างรวดเร็ว ทุกสิ่งทุกอย่างที่ขวางทางล้วนพังทลายลง นี่คือความมืดมิดที่ลึกล้ำที่สุด ซึ่งเกิดจากการที่แสงถูกม้วนเข้าไปในวังวนมิติและไม่สามารถสะท้อนกลับมาได้...","นี่คือเวทมนตร์ระดับตำนานสายสนามพลัง ‘ดาบมิติเวลา’!","ผู้ที่มาเยือนก็คือ แฮร์รอฟ ประธานสภาเวทมนตร์ระดับตำนาน!","ในชั่วพริบตา ดาบมิติที่มองไม่เห็นก็ฟันเข้าที่ประตูแห่งสรวงสวรรค์อย่างจัง วังวนมิติขนาดมหึมาทำให้อาณาเขตภาพฉายของแดนศักดิ์สิทธิ์พังทลายลง!","บานประตูที่เคยดูเป็นรูปธรรม แม้จะจางลงเล็กน้อย แต่บานประตูก็เปิดออกมาแล้วครึ่งหนึ่ง!","“กลับไปซะ!”","เสียงทุ้มต่ำดังก้องขึ้นภายในลานสถาบัน อักขระเวทมนตร์อันซับซ้อนปรากฏขึ้นกลางอากาศ ราวกับโซ่ตรวนที่รัดพันบานประตูทองสัมฤทธิ์เอาไว้ เพื่อหวังจะบังคับปิดรอยแยกที่เปิดออก…แต่ในวินาทีต่อมา สีหน้าเรียบเฉยของ ‘ผู้รังสรรค์เวทมนตร์’ วิกตอริโอก็เปลี่ยนเป็นตึงเครียด เขารีบตะโกนลั่น","“ข้าสะกดมันไว้ไม่อยู่แล้ว แฮร์รอฟ เร็วเข้า ทำลายมันซะ!”","พลังงานที่อัดแน่นอยู่ในประตูแห่งสรวงสวรรค์นั้นเหนือกว่าที่เขาคาดคิดไว้มาก เห็นได้ชัดว่าผู้เป็นนายแห่งแดนศักดิ์สิทธิ์นั้นรับรู้ถึงช่องทางเชื่อมต่อระหว่างสองโลกนี้แล้ว และกำลังส่งพลังข้ามมา","แฮร์รอฟไม่กล้าชักช้า เขาทุ่มพลังขับเคลื่อนเวทมนตร์สนามพลังอย่างเต็มที่ เตรียมจะฉีกกระชากไอ้ประตูแห่งสรวงสวรรค์นี้ให้แหลกเป็นชิ้นๆ","การปะทะกันของพลังทั้งสองสาย ทำให้กระแสปั่นป่วนของมิติอันรุนแรงส่งผลให้ทะเลเพลิงที่ลุกโชนอยู่รอบๆ ยิ่งบ้าคลั่งมากขึ้นไปอีก","ในขณะเดียวกัน เวทมนตร์ของลินน์ก็เสร็จสมบูรณ์แล้วเช่นกัน","ซูเปอร์ปืนใหญ่แม่เหล็กไฟฟ้า!","ลูกเหล็กที่ถูกพันธนาการด้วยพลังแม่เหล็กเร่งความเร็วขึ้นอย่างฉับพลัน ภายใต้การโอบล้อมของประกายสายฟ้า มันกลายเป็นลำแสงสีแดงฉานพุ่งทะยานออกไป เสียงระเบิดโซนิคบูมที่ดังสนั่นหวั่นไหวสั่นคลอนเปลวไฟที่กำลังลุกลามอยู่ใกล้ๆ ให้แตกกระจาย","ความเร็วสี่สิบเท่าของความเร็วเสียงพุ่งทะยานไปถึงในพริบตา ท่ามกลางสายตาที่เปี่ยมไปด้วยความคาดหวัง ตกตะลึง และตึงเครียดของทุกคน ลูกเหล็กสีแดงฉานก็พุ่งเข้าชนบานประตูทองสัมฤทธิ์อย่างจัง","ตู้มมมม!","เสียงระเบิดดังกึกก้องขึ้นที่บานประตูทองสัมฤทธิ์ พื้นดินแตกร้าวเป็นชั้นๆ คลื่นกระแทกอันรุนแรงผลักดันให้ทะเลเพลิงถอยร่นไปหลายสิบเมตร!","คลื่นความร้อนระอุพวยพุ่งขึ้นกลางอากาศ ทุกคนที่อยู่ในเหตุการณ์ต่างรู้สึกปวดแสบปวดร้อนที่ผิวหนัง ราวกับถูกไฟคลอก","ทุกคนจ้องเขม็งไปที่ประตูแห่งสรวงสวรรค์เบื้องหน้า รอยร้าวขนาดยาวปรากฏขึ้นบนพื้นผิวของบานประตู ครอบคลุมพื้นที่กว่าหนึ่งในสามของบานประตู นั่นคือจุดที่ถูกปืนใหญ่แม่เหล็กไฟฟ้าพุ่งชน!","แต่ความเสียหายที่เกิดขึ้นก็มีเพียงเท่านี้ บานประตูทองสัมฤทธิ์ยังคงตั้งตระหง่านอยู่ที่เดิม อักขระเล่นแร่แปรธาตุที่รัดพันอยู่บนพื้นผิวพังทลายลง ฝ่ามือขาวผ่องข้างหนึ่งยื่นออกมาจากด้านในของบานประตู","ความหนาวเหน็บแล่นจับขั้วหัวใจของทุกคน แม้แต่แฮร์รอฟและวิกตอริโอเองก็ไม่มีข้อยกเว้น","ตอนที่อยู่ดินแดนพ่อมด พวกเขาเคยคิดว่าขอเพียงมีระดับตำนานหลายคนอยู่ด้วย ต่อให้ต้องเผชิญหน้ากับเทพีองค์นี้ตรงๆ ก็ยังมีลุ้นที่จะต่อสู้ได้ แต่ตอนนี้พวกเขากลับไม่เหลือความมั่นใจเลยแม้แต่น้อย","“โอ้ องค์พระผู้เป็นเจ้า ผู้ศรัทธาที่ภักดีที่สุดของพระองค์ ขอวิงวอนให้พระองค์ประทานการพิพากษาลงมาด้วยเถิด!”","พูลสันตะโกนด้วยความตื่นเต้น","รอยยิ้มปรากฏขึ้นบนใบหน้าของเอ็ดเวลที่อยู่ข้างๆ แต่รอยยิ้มนั้นก็แข็งค้างไปในเวลาอันรวดเร็ว เพราะ ‘ดาบยาว’ ที่สร้างขึ้นจากเปลวไฟและลำแสงของอะตอมได้แทงทะลุร่างของพวกเขาจากด้านหลัง","เนื่องจากเขาทุ่มเทพลังส่วนใหญ่ไปกับการค้ำจุนการจุติของประตูแห่งสรวงสวรรค์ ม่านพลังศักดิ์สิทธิ์ที่กางไว้รอบกายจึงอ่อนกำลังลงอย่างมาก จนทำได้เพียงต้านทานการกัดกร่อนของเพลิงอมตะอย่างยากลำบาก","และลินน์ที่รีดเร้นพลังเฮือกสุดท้าย ควบคุมเปลวไฟที่อยู่ใกล้กับเอ็ดเวล เพื่อเปิดฉากการลอบโจมตีที่ร้ายแรงที่สุด!","ขอเพียงฆ่าผู้ร่ายได้ พลังที่ค้ำจุนก็จะหายไป","อาณาเขตที่สร้างขึ้นจากภาพฉายแดนศักดิ์สิทธิ์พังทลายลงไปตั้งแต่ตอนต่อสู้เมื่อครู่นี้แล้ว นั่นก็หมายความว่าอีกฝ่ายไม่สามารถใช้ ‘ถ้อยคำศักดิ์สิทธิ์’ เพื่อพลิกผันความตายได้อีก...","เปลวไฟลุกลามอย่างรวดเร็ว เพียงชั่ววินาทีเดียวมันก็ลามไปทั่วร่างของเอ็ดเวล กลืนกินพลังทุกหยาดหยดในร่างกายของเขาอย่างบ้าคลั่ง..."]},{"n":376,"t":"พลังของพระเจ้า เพลิงอมตะที่ถูกมอดดับ!","c":["[พระคัมภีร์ศักดิ์สิทธิ์ บทคนบาป หน้าที่ห้า บทย่อยที่เจ็ด: ผู้ใดลบหลู่พระเจ้า จะต้องร่วงหล่นลงสู่ไฟชำระ ถูกแผดเผาด้วยไฟนรกจนสิ้นทั้งเลือดเนื้อและกระดูก วิญญาณจะร่วงหล่นสู่ทะเลเพลิงชั่วกัปชั่วกัลป์ จนกว่าจะแตกดับไป!]","ภายใต้การแผดเผาของเปลวไฟ ในหัวของเอ็ดเวลก็พลันนึกถึงคำบรรยายเกี่ยวกับไฟนรกในพระคัมภีร์ขึ้นมา","ว่ากันว่าเปลวไฟชนิดนี้สามารถแผดเผาทุกสรรพสิ่งได้ แม้แต่วิญญาณของมนุษย์ก็ไม่มีข้อยกเว้น และผู้ที่แปดเปื้อนมันจะต้องตายด้วยท่าทีที่ทรมานที่สุด!","ในอดีตเอ็ดเวลไม่เคยคิดเลยว่า วันหนึ่งผู้ที่ต้องเผชิญกับบทลงโทษแห่งไฟชำระจะเป็นตัวเขาเอง เปลวไฟนี้ดูน่ากลัวกว่าที่เล่าลือกันมากนัก ในขณะที่มันกำลังละลายผิวหนังและเนื้อเยื่อ มันยังมุดเข้าไปในร่างกายผ่านทางปาก จมูก และหู กัดกร่อนทุกเซลล์และกระดูกทุกชิ้นในร่างกายอย่างต่อเนื่อง...","สถานการณ์ที่พลิกผันอย่างกะทันหันเกินความคาดหมายของทุกคน สีหน้าตื่นเต้นยังคงค้างอยู่บนใบหน้าของพูลสัน ในขณะที่เอ็ดเวลซึ่งอยู่ข้างๆ กลับกลายเป็นลูกไฟไปแล้ว","บานประตูที่ตั้งตระหง่านอยู่กลางลานสถาบันก็เริ่มสั่นสะเทือนอย่างรุนแรง...","พลังงานที่ใช้ค้ำจุนการข้ามผ่านสองมิติของเทพเจ้าองค์หนึ่งนั้นมหาศาลมาก เมื่อขาดผู้ค้ำจุนอย่างเอ็ดเวล บานประตูที่เชื่อมไปยังสรวงสวรรค์นี้ก็ไม่อาจคงอยู่ได้อีกต่อไป","แฮร์รอฟและวิกตอริโอก็ตระหนักถึงจุดนี้ได้ในทันที โดยสิ่งที่สำคัญที่สุดในตอนนี้คือ ต้องไม่ยอมให้อีกฝ่ายก้าวออกมาจากบานประตูนั้นเด็ดขาด!","“ผนึก!”","วิกตอริโอเปลี่ยนท่า อักขระเล่นแร่แปรธาตุที่ซับซ้อนและเปล่งประกายพลังเวทเรียงร้อยเข้าด้วยกัน กลายเป็นโซ่ตรวนสีเงินพุ่งเข้าไปรัดบานประตูจากทุกทิศทุกทาง","แฮร์รอฟก็ไม่ยอมปรานีเช่นกัน เขาเร่งเร้าเวทมนตร์สนามพลังอีกครั้ง ครอบคลุมพื้นที่ทั้งหมดไว้ หวังจะฉีกกระชากประตูแห่งสรวงสวรรค์ รวมถึงร่างครึ่งท่อนของเทพจอมปลอมที่ก้าวผ่านประตูมาแล้วให้แหลกเป็นชิ้นๆ...","‘เพลิงอมตะ’ ที่ลุกลามอยู่โดยรอบก็ม้วนตัวเข้าไปภายใต้การควบคุมของลินน์เช่นกัน","เมื่อมองผ่านแสงเพลิง ลินน์จ้องเขม็งไปยังเงาร่างที่กำลังจะก้าวออกมาจากบานประตู โดยร่างกายของเธอคล้ายกับถูกปกคลุมไปด้วยแสงและหมอก ดูเลือนรางจนมองไม่เห็นใบหน้า รอบกายแผ่กลิ่นอายอันยิ่งใหญ่และศักดิ์สิทธิ์ ราวกับเป็นต้นกำเนิดของสรรพสิ่ง ทำให้ผู้คนอดไม่ได้ที่จะอยากเข้าใกล้ คุกเข่า และหมอบกราบเบื้องหน้าเพื่อถวายทุกสิ่งทุกอย่างที่มีให้...","โซ่ตรวนสีเงิน การฉีกกระชากของมิติ และเพลิงอมตะอันบ้าคลั่งพุ่งเข้าใส่ร่างนั้นแทบจะพร้อมๆ กัน","ดวงตาที่เปล่งประกายราวกับดาวคู่นั้นเผยให้เห็นถึงความเย็นชาและเฉยเมย เทพที่ก้าวออกมาจากประตูแห่งสรวงสวรรค์ยื่นนิ้วเรียวงามออกมา แตะลงบนความว่างเปล่า","ในวินาทีต่อมา แสงศักดิ์สิทธิ์อันเจิดจ้าก็ปรากฏขึ้น ภายใต้การกวาดล้างของพลังที่มองไม่เห็น มันได้พันตัวเป็นวงแหวนอยู่รอบๆ อักขระเล่นแร่แปรธาตุที่เปล่งประกายให้หยุดนิ่ง แม้แต่ทะเลเพลิงที่กำลังพลุ่งพล่านก็ถูกหยุดนิ่งอยู่กับที่...","ใช่แล้ว มันหยุดนิ่ง!","ราวกับวิดีโอที่ถูกกดปุ่มหยุดชั่วคราว ทุกสิ่งทุกอย่างรอบตัวหยุดนิ่งอยู่กับที่ แม้แต่เปลวไฟที่กำลังพวยพุ่งและโบกสะบัด ก็ยังหยุดชะงักกลางอากาศในชั่วพริบตา ก่อนจะละลายและสลายหายไปอย่างรวดเร็ว...","เพลิงอมตะถูกดับลง...เป็นครั้งแรก!","เวลาหยุดนิ่งงั้นหรือ?","หัวใจของลินน์กระตุกวูบ ใบหน้าฉายแววตื่นตะลึง แต่ในไม่ช้าเขาก็ปฏิเสธความคิดนี้","ไม่ ไม่ใช่เวลาหยุดนิ่ง แต่นี่คือ...ศูนย์สัมบูรณ์!","ทุกที่ที่แสงศักดิ์สิทธิ์สาดส่องไป การเคลื่อนที่ของธาตุทั้งหมดแทบจะหยุดนิ่ง และถูกทุบให้แตกสลายกลับกลายเป็นพลังเวทบริสุทธิ์ดังเดิม!","แท้จริงแล้ว เปลวไฟก็คือสสารในสถานะก๊าซหรือพลาสมาที่มีอุณหภูมิสูง ส่วนอุณหภูมิก็คือรูปแบบหนึ่งของการแสดงออกถึงพลังงานจลน์เฉลี่ยระหว่างโมเลกุลในวัตถุ","ยิ่งโมเลกุลชนกันและสร้างความร้อนออกมามากเท่าไหร่ พลังงานจลน์ก็จะยิ่งมากขึ้น พร้อมกับการเคลื่อนที่ก็จะยิ่งรุนแรง และอุณหภูมิก็จะยิ่งสูงขึ้นตามไปด้วย!","ในทางกลับกัน หากการเคลื่อนที่ของโมเลกุลหยุดนิ่ง อุณหภูมิที่สูงและเปลวไฟก็ย่อมไม่มีอยู่อีกต่อไป!","นี่คือเวลาหยุดนิ่งจอมปลอม ศูนย์สัมบูรณ์!","แม้ว่าลินน์จะไม่เคยคิดว่าคลอรีนไตรฟลูออไรด์จะไร้เทียมทาน เพราะถึงจะร้ายกาจแค่ไหน แต่มันก็เป็นเพียงแค่ธาตุเคมีชนิดหนึ่งเท่านั้น แต่เขาไม่เคยคิดเลยว่าอีกฝ่ายจะใช้วิธีการเช่นนี้ในการรับมือกับมัน!","ช่างเรียบง่าย ตรงไปตรงมา และน่าสะพรึงกลัวยิ่งนัก!","เกณฑ์ของศูนย์สัมบูรณ์คือ -273.15 องศาเซลเซียส ภายใต้อุณหภูมิเช่นนี้ พลังงานจลน์และพลังงานศักย์ทั้งหมดของโมเลกุลจะหายไป นั่นคือตัวเลขที่ได้รับการยกย่องว่าทำได้เพียงเข้าใกล้ แต่ไม่มีทางไปถึงได้อย่างแน่นอน!","แต่เอลา กลับทำได้ อาณาเขตแห่งแดนศักดิ์สิทธิ์ขยายตัวอย่างรวดเร็ว ทุกที่ที่มันพาดผ่าน สรรพสิ่งล้วนถูกแช่แข็ง!","วิกตอริโอที่ยืนอยู่หน้าสุดได้กางม่านพลังป้องกันเอาไว้ตั้งแต่ก่อนที่แสงศักดิ์สิทธิ์จะสาดส่องเข้ามา อักขระเล่นแร่แปรธาตุที่เกือบจะเป็นรูปธรรมก่อตัวเป็นเกราะป้องกันทรงกลมและจับตัวเป็นน้ำแข็ง ส่วนราฟาเอลที่อยู่ด้านหลังนั้นไม่มีพลังแม้แต่จะขัดขืน จึงถูกแช่แข็งกลายเป็นก้อนน้ำแข็งไปในทันที...","ลินน์ถอยร่นไปทีละก้าว แต่เมื่อเทียบกับการขยายตัวของอาณาเขตแดนศักดิ์สิทธิ์แล้ว ความเร็วของเขานั้นไม่ควรค่าแก่การเอ่ยถึงเลย ม่านพลังเวทที่กางไว้รอบกายกำลังถูกแช่แข็งและแตกสลาย แขนของเขาสัมผัสได้ถึงความหนาวเหน็บอันน่าสะพรึงกลัวนี้อย่างเลือนราง!","ในขณะนั้นเอง แสงศักดิ์สิทธิ์อันเจิดจ้าก็หายวับไปอย่างไร้ร่องรอย ธาตุในมิติที่ถูกบังคับให้หยุดนิ่งกลับมามีชีวิตชีวาอีกครั้ง บานประตูทองสัมฤทธิ์ที่ตั้งตระหง่านอยู่กลางลานสถาบันก็อันตรธานหายไปเช่นกัน","หากไม่ใช่เพราะรอยหิมะกัดที่แขนและพื้นดินที่เต็มไปด้วยน้ำแข็ง คงจะทำให้คนอดสงสัยไม่ได้ว่า เรื่องราวทั้งหมดที่เกิดขึ้นเมื่อครู่นี้เป็นเพียงภาพลวงตาหรือไม่","ลินน์ยืนนิ่งอึ้งอยู่กับที่ กว่าจะตั้งสติได้ก็ผ่านไปครู่ใหญ่","ถึงได้รับรู้ว่าเอ็ดเวลตายแล้ว!","พร้อมกับการตายของเขา พลังที่ค้ำจุนการจุติของประตูแห่งสรวงสวรรค์ก็หายไปอย่างสมบูรณ์ เอลาที่ข้ามมิติมาจากดินแดนอันไม่เป็นที่รู้จัก ก็ถูกขับไล่กลับไปเช่นกัน","แกร๊ก~","เสียงน้ำแข็งแตกดังขึ้น เป็นวิกตอริโอที่ทำลายน้ำแข็งที่เกาะอยู่บนม่านพลังป้องกันแตกออก หลังจากกวาดสายตามองไปรอบๆ ในใจของเขากลับเต็มไปด้วยความยินดีที่รอดชีวิตมาได้","“ไม่คิดเลยว่าพวกเรากับนางจะห่างชั้นกันถึงเพียงนี้”","แฮร์รอฟถอนหายใจและกล่าวขึ้น สีหน้าของเขาดูไม่สู้ดีนัก ตามที่เขาเคยคาดการณ์ไว้ แม้ว่าจะเอาชนะไม่ได้ แต่ก็ควรจะมีลุ้นต่อสู้ได้บ้างสิ","แต่ความจริงก็พิสูจน์ให้เห็นแล้วว่า การโจมตีเพียงครั้งเดียวของอีกฝ่าย ต่อให้พวกเขาทุ่มกำลังทั้งหมดเพื่อรับมือ ก็ยังยากที่จะต้านทานไหว","วิกตอริโอส่ายหน้า ศาสนจักรครองความยิ่งใหญ่บนทวีปนี้มานานถึงแปดร้อยกว่าปี และสะสมประชากรนับสิบล้านคน จะเป็นศัตรูที่พวกเขาจะเอาชนะได้ง่ายๆ ได้อย่างไร","ต่างจากเหล่าพ่อมดที่กำลังรู้สึกโล่งใจ พูลสันที่เห็นเหตุการณ์ทุกอย่างและยังมีชีวิตรอด กลับยืนนิ่งอึ้งอยู่กับที่ ตกอยู่ในสถานการณ์ที่กลืนไม่เข้าคายไม่ออก","เทพที่ถูกขับไล่กลับไปไม่ได้พาเขาไปด้วย และเอ็ดเวลก็ถูกเผาจนไม่เหลือแม้แต่เถ้ากระดูก นั่นก็หมายความว่า ตอนนี้เขาต้องเผชิญหน้ากับพ่อมดระดับตำนานถึงสองคน รวมถึงศัตรูของศาสนจักรที่สามารถควบคุมไฟนรกและกล้าโจมตีเทพเจ้าเพียงลำพัง!","พูลสันกลืนน้ำลายลงคออย่างยากลำบาก เขาพยายามจะร่ายพลังศักดิ์สิทธิ์อย่างเงียบๆ เพื่อดิ้นรนเฮือกสุดท้าย แต่ในวินาทีต่อมาเขาก็รู้สึกเจ็บปวดที่ร่างกาย มือและเท้าทั้งสองข้างของเขาถูก ‘ดาบมิติเวลา’ ที่พุ่งเข้ามาตัดขาดสะบั้น!","เลือดสดๆ พุ่งกระฉูดออกมา เห็นได้ชัดว่าแฮร์รอฟได้ระบายความโกรธแค้นทั้งหมดที่มีลงบนร่างของพระคาร์ดินัลผู้นี้ แต่เพราะเห็นแก่การเค้นข้อมูล จึงยอมปล่อยให้อีกฝ่ายมีชีวิตรอดต่อไป..."]},{"n":377,"t":"เพลิงอมตะที่ลุกลามไปทั่วเมืองหลวง","c":["เมื่อสังเกตเห็นว่าแฮร์รอฟลงมือจัดการศัตรูเพียงหนึ่งเดียวภายในลานสถาบันเรียบร้อยแล้ว ลินน์ที่แขวนความตึงเครียดไว้ก็ผ่อนคลายลง และหลังจากตัดขาดเครือข่ายเวทมนตร์ พลังจิตวิญญาณที่เพิ่มขึ้นอย่างฉับพลันก็หายวับไปในพริบตา ร่างของเขาก็โอนเอนอย่างรุนแรงจนเกือบจะล้มพับลงไปกองกับพื้น","วิกตอริโอที่อยู่ข้างๆ รีบพุ่งเข้าไปประคองลินน์เอาไว้ เขาคิดว่าลินน์ถูกพลังศักดิ์สิทธิ์เฮือกสุดท้ายของเอลาโจมตีเข้าให้เสียแล้ว จนกระทั่งเขาใช้เวทมนตร์ตรวจสอบดู จึงพบว่าไม่ใช่เช่นนั้น แต่สถานการณ์ก็เลวร้ายไม่แพ้กัน","เนื่องจากได้กินดีอยู่ดีและไม่ได้ละเลยการออกกำลังกายตอนอยู่ในดินแดนพ่อมด รูปร่างของลินน์จึงถือว่าดูดีมาตลอด แต่ตอนนี้เขากลับซูบผอมลงไปถนัดตา ราวกับคนจรจัดที่อดข้าวอดน้ำมาหลายวันหลายคืน โดยพลังเวทในร่างกายก็ถูกเผาผลาญจนหมดเกลี้ยง ยิ่งไปกว่านั้นพลังจิตวิญญาณยังได้รับความบอบช้ำอย่างหนัก!","สีหน้าของวิกตอริโอเคร่งเครียดลงเล็กน้อย เมื่อนึกถึงปืนใหญ่แม่เหล็กไฟฟ้าที่ลินน์เพิ่งปลดปล่อยออกมา ซึ่งมีอานุภาพเทียบเท่ากับเวทมนตร์ระดับตำนาน เขาก็เดาได้ทันทีว่านี่น่าจะเป็นผลข้างเคียงจากเวทมนตร์บางอย่าง ที่สามารถเพิ่มพลังรบอย่างมหาศาลในระยะเวลาสั้นๆ เขาจึงรีบหยิบขวดยาเวทมนตร์สีน้ำเงินเข้มออกมา แล้วกรอกใส่ปากลินน์ที่กำลังสะลึมสะลือทันที","ของเหลวเย็นเฉียบไหลผ่านลำคอลงสู่กระเพาะอาหาร นำพาความหนาวเหน็บเสียดแทงกระดูกพุ่งสวนขึ้นมา อาการปวดหัวที่ทรมานจนแทบทนไม่ไหวในตอนแรกก็ทุเลาลงในระดับหนึ่ง แต่ในวินาทีต่อมา ยาเวทมนตร์สีแดงอีกขวดก็ถูกกรอกตามลงไป","ร่างกายที่เย็นเฉียบพลันร้อนระอุขึ้นมาในพริบตา ราวกับถูกโยนลงไปในหม้อน้ำเดือด ภายใต้การผสมผสานระหว่างน้ำแข็งและไฟ ลินน์ก็ตัวสั่นสะท้านและสูดหายใจเข้าลึกๆ อย่างอดไม่ได้ เขาสร่างจากอาการสะลึมสะลือทันที เพียงแต่ร่างกายยังคงรู้สึกอ่อนล้าอย่างหนัก คล้ายกับอาการหมดเรี่ยวหมดแรงหลังจากการออกกำลังกายอย่างหักโหม","“ในช่วงนี้ เจ้าอย่าเพิ่งใช้เวทมนตร์จะดีที่สุด และต้องดื่ม ‘ลมหายใจเหมันต์’ วันละหนึ่งขวด ไม่อย่างนั้นอาจจะเกิดความเสียหายที่ไม่อาจฟื้นฟูได้!”","วิกตอริโอกล่าวเตือน","แม้ว่าเขาจะสงสัยมากว่าเวทมนตร์แบบไหนกัน ที่ทำให้เกิดผลข้างเคียงร้ายแรงถึงเพียงนี้ แต่เขาก็มีสติพอที่จะไม่ถามอะไรให้มากความ","สำหรับพ่อมดแล้ว ความรู้ด้านเวทมนตร์นั้นล้ำค่ามาก บางครั้งก็สำคัญยิ่งกว่าชีวิตเสียอีก!","พวกจอมเวทผู้ยิ่งใหญ่มักจะมีเวทมนตร์ก้นหีบสักหนึ่งถึงสองบทติดตัวไว้เสมอ ไม่อย่างนั้นคงไม่กล้าออกมาพบปะผู้คน เพราะท้ายที่สุด พวกเขาก็มีเวลามากมาย และมีพลังมหาศาลในการศึกษาวิจัยทฤษฎีเวทมนตร์ต่างๆ ซึ่งผลการวิจัยล่าสุดเหล่านั้นมักจะถูกปิดเป็นความลับขั้นสูงสุดก่อนที่จะสมบูรณ์แบบ","ความร้ายกาจของเวทมนตร์หลายๆ บท ก็มักจะอยู่ที่ความไม่รู้ของศัตรู และหากข้อมูลถูกเปิดเผย ก็ง่ายต่อการถูกศัตรูค้นหาวิธีแก้ทาง","ด้วยเหตุนี้ ต้นแบบเวทมนตร์ระดับสูงจึงมีการแลกเปลี่ยนกันน้อยมาก และมักจะสงวนไว้ใช้แลกเปลี่ยนความรู้ด้านเวทมนตร์กันเฉพาะในหมู่จอมเวทผู้ยิ่งใหญ่ที่คุ้นเคยกันเท่านั้น","เขาเพียงแค่หวังว่าเวทมนตร์ที่ลินน์ใช้ จะไม่ใช่เวทมนตร์ศาสตร์มืดที่ต้องแลกมาด้วยอายุขัยและศักยภาพของตัวเอง...","เมื่อคิดมาถึงตรงนี้ วิกตอริโอก็ถอนหายใจ เพราะมันมีโอกาสเป็นไปได้สูงมาก เพราะการเพิ่มพลังที่ว่านั้นได้มันช่างน่าเหลือเชื่อเกินไปจริงๆ","“ข้าเข้าใจแล้วครับ ขอบคุณท่านวิกตอริโอมากครับ”","ลินน์นวดขมับที่ยังคงปวดตุบๆ และกล่าวขอบคุณ","เมื่อครู่นี้ถ้าเขาสลบไปเลย ก็ไม่แน่ว่าสมองอาจจะตายหรือกลายเป็นเจ้าชายนิทราไปเลยก็ได้...","เพราะการเพิ่มพลังประมวลผลจากการเชื่อมต่อเครือข่ายเวทมนตร์ในครั้งนี้ มันเกินขีดจำกัดที่เขาจะรับไหวไปมาก!","ตามการคำนวณของปัญญาประดิษฐ์สนับสนุนก่อนหน้านี้ การใช้เครือข่ายเวทมนตร์เพื่อเพิ่มพลังประมวลผลให้ถึงระดับพ่อมดห้าวงแหวนนั้นถือว่าค่อนข้างปลอดภัย หากเกินกว่านั้นก็จะต้องเผชิญกับความเสี่ยงที่พลังจิตวิญญาณจะได้รับความบอบช้ำอย่างหนัก และนี่ก็คือเหตุผลที่ลินน์ไม่รีบร้อนที่จะดึงพ่อมดจำนวนมากเข้ามาในระบบเครือข่ายเวทมนตร์","โชคดีที่ยังมียาเวทมนตร์ซึ่งเป็นของสะดวกสบายแบบนี้อยู่ ลินน์ย่อมดูออกว่า ยาเวทมนตร์ที่วิกตอริโอให้เขาดื่มคือยาเวทมนตร์ระดับตำนาน ‘จันทราเต็มดวงแห่งอีเซร่า’ และ ‘น้ำแห่งชีวิต’ ซึ่งล้วนเป็นของที่ไม่สามารถหาซื้อได้ตามท้องตลาด","อย่างแรกคือยาฟื้นฟูพลังจิตวิญญาณที่ดีที่สุด ซึ่งสามารถรักษารอยร้าวในระดับวิญญาณได้ ส่วน ‘น้ำแห่งชีวิต’ สามารถต่ออวัยวะที่ขาดหาย และทำให้คนที่ใกล้ตายฟื้นตัวได้ภายในสามนาที","แต่ถึงแม้จะดื่มยาสองชนิดนี้พร้อมกัน ก็ยังไม่สามารถขจัดผลข้างเคียงจากการเชื่อมต่อเครือข่ายเวทมนตร์ได้อย่างหมดจด","ทางด้านแฮร์รอฟ หลังจากจัดการกับพูลสันเสร็จแล้ว เขาก็รีบไปช่วยเหลือราฟาเอลที่ถูกแช่แข็งอยู่เป็นอันดับแรก","“ท่านราฟาเอลเป็นอย่างไรบ้างครับ?”","ลินน์ฝืนทนความเหนื่อยล้าของร่างกาย มองไปยังราฟาเอลที่นอนหมดสติอยู่บนพื้น ราวกับศพไร้วิญญาณ และเอ่ยถามด้วยความเป็นห่วง","“ยังมีลมหายใจอยู่ ใช้ ‘น้ำแห่งชีวิต’ น่าจะช่วยกลับมาได้!”","แฮร์รอฟสัมผัสได้ถึงสัญญาณชีพ และกล่าวอย่างโล่งอก โชคดีที่ถูกแช่แข็งในเวลาสั้นๆ จึงยังพอช่วยได้ หากปล่อยไว้นานกว่านี้ คงตายแน่!","สีหน้าเสียดายปรากฏขึ้นบนใบหน้าของวิกตอริโออย่างเห็นได้ชัด แต่เขาก็หยิบยาเวทมนตร์สีแดงฉานออกมาอีกขวดแล้วป้อนให้ราฟาเอลดื่ม วัตถุดิบในการปรุงยาเวทมนตร์ระดับตำนานเหล่านี้หาไม่ได้ง่ายๆ เรียกได้ว่าใช้ไปหนึ่งก็ลดน้อยลงไปหนึ่ง","การถือกำเนิดของยาเวทมนตร์ระดับตำนานทุกขวด หมายถึงการร่วงหล่นของสัตว์เวทมนตร์อันทรงพลัง!","เสียงโห่ร้องฆ่าฟันและเสียงระเบิดของปืนใหญ่จากนอกเมืองยังคงดังกึกก้อง แต่พวกเขาต้องคอยปกป้องลินน์และราฟาเอลที่เป็นคนเจ็บ อีกทั้งยังต้องคอยตามเก็บกวาดซากปรักหักพังหลังจากการต่อสู้อีก ไม่ว่าจะเป็นแฮร์รอฟหรือวิกตอริโอ ก็ไม่มีใครปลีกตัวไปช่วยได้เลย...","เพราะพวกเขายังต้องรับมือกับปัญหาใหญ่อีกปัญหาหนึ่ง นั่นก็คือ ‘เพลิงอมตะ’ ที่ลุกลามออกไปนอกลานสถาบันแล้ว!","การที่ลินน์ไม่สามารถใช้เวทมนตร์ได้ หมายความว่าสิ่งเหล่านี้หลุดจากการควบคุมไปแล้วอย่างสมบูรณ์ หากไม่หาวิธีดับมัน ไฟก็อาจจะลุกลามไปทั่วทั้งเมืองหลวง...","“บอกมาสิ ว่าจะดับไอ้เจ้านี่ได้ยังไง!”","หลังจากลองใช้อาณาเขตสุญญากาศแล้วไม่ได้ผล แฮร์รอฟก็ขี้เกียจจะลองวิธีอื่นอีก เขาหันไปถามลินน์ตรงๆ","“พูดตามตรง ข้าก็ไม่มีวิธีที่ดีเท่าไหร่นัก โดยทั่วไปแล้วก็จะใช้พลังเวทเพื่อลอกเอาสิ่งที่มันเกาะติดอยู่ออกมา แล้วก็รอให้มันเผาไหม้จนหมดไปเอง!”","ลินน์ยักไหล่","“มันสามารถทำปฏิกิริยากับธาตุทุกชนิดที่รู้จัก และที่สำคัญคือห้ามใช้น้ำสาดเพื่อดับไฟเด็ดขาด ไม่อย่างนั้นมันจะระเบิดและเกิดเป็นก๊าซพิษร้ายแรง!”","แฮร์รอฟมองลินน์ด้วยสีหน้าแปลกประหลาด ทั้งที่ไม่มีวิธีแก้ปัญหาที่ได้ผลชะงัดแท้ๆ แต่กลับกล้าใช้มันในปริมาณมหาศาลขนาดนี้ นี่มันกลยุทธ์พลีชีพชัดๆ","“หรือว่ามันมาจากนรกจริงๆ?”","วิกตอริโออดไม่ได้ที่จะถามขึ้น","เพราะนี่มันมีคุณสมบัติคล้ายกับไฟนรกในพระคัมภีร์มาก แผดเผาได้ทุกสรรพสิ่ง ทำลายล้างทุกสิ่ง!","“จะเป็นไปได้อย่างไร? นี่ก็เป็นเพียงธาตุสังเคราะห์ชนิดพิเศษเท่านั้น”","ลินน์ส่ายหน้า แต่จากนั้นก็คิดได้ว่า สิ่งที่เรียกว่าไฟนรกก็อาจจะเป็นของคล้ายๆ กัน","เอลาต้องเคยใช้มันเพื่อลงโทษผู้ที่ลบหลู่พระเจ้าอย่างแน่นอน มันจึงถูกบันทึกไว้ในพระคัมภีร์ และถูกกล่าวถึงซ้ำแล้วซ้ำเล่า...แค่ไม่รู้ว่า เมื่อเทียบกับคลอรีนไตรฟลูออไรด์แล้ว อย่างไหนจะร้ายกาจกว่ากัน","“จริงๆ แล้วก็ไม่ใช่ว่าจะไม่มีวิธีแก้ปัญหาหรอกครับ ยกตัวอย่างเช่นใครบางคนเมื่อครู่นี้ ที่สามารถดับมันได้ด้วยการหยุดการเคลื่อนที่ของธาตุ!”","ลินน์กล่าวเสริม จากนั้นก็มองไปที่ประธานทั้งสองด้วยความคาดหวัง..."]},{"n":378,"t":"ออโรร่าที่หายตัวไป และเสียงแตรแห่งการโต้กลับ!","c":["“ถ้าอย่างนั้นก็ลองดูสักตั้ง!”","ตามคำแนะนำของลินน์ แฮร์รอฟและวิกตอริโอก็กางอาณาเขตของตนออกทันที ครอบคลุมพื้นที่ที่เพลิงอมตะกำลังลุกลาม เพื่อพยายามหยุดยั้งมัน","แต่กระบวนการนี้ยากกว่าที่ทุกคนคิดไว้มาก เพราะพ่อมดระดับตำนานทั้งสองต้องร่วมมือกันและใช้เวลากว่าครึ่งชั่วโมง กว่าจะสามารถหยุดยั้งการแพร่กระจายของเพลิงอมตะได้อย่างสมบูรณ์","แม้ว่าการควบคุมธาตุจะถือเป็นความสามารถพื้นฐานของบรรดาพ่อมด แต่นั่นไม่ได้หมายความว่าพวกเขาจะมีอำนาจควบคุมธาตุเหล่านั้นได้แบบร้อยเปอร์เซ็นต์ และความแม่นยำในการควบคุมของพ่อมดแต่ละระดับก็แตกต่างกันไป","อย่างเช่น พ่อมดเต็มตัว การควบคุมธาตุของพวกเขาเรียกได้ว่าเป็นการแทรกแซงเท่านั้น พลังจิตวิญญาณของพวกเขายังไม่สามารถเข้าถึงธาตุโลหะและธาตุผสมได้","เมื่อเทียบกันแล้ว จอมเวทผู้ยิ่งใหญ่ย่อมทรงพลังกว่ามาก พวกเขาสามารถออกคำสั่งเพื่อควบคุมธาตุจำลองภายในอาณาเขตของตนเองได้ แต่มันก็จำกัดอยู่แค่นั้น พวกเขาสามารถทำให้ธาตุเคลื่อนที่เร็วขึ้น ช้าลง หรือให้ไปทางซ้าย ทางขวาได้ แต่ไม่สามารถทำได้เหมือนกับเอลา ที่ทำให้การเคลื่อนที่ของธาตุทั้งหมดหยุดนิ่ง ซึ่งก่อให้เกิดปรากฏการณ์ที่น่าเหลือเชื่อคล้ายกับการหยุดเวลาได้","ธาตุทุกชนิดล้วนมีการเคลื่อนที่อยู่ตลอดเวลา แม้ในระดับมหภาคจะเปลี่ยนสถานะจากก๊าซเป็นของเหลว หรือแม้แต่ของแข็ง การเคลื่อนที่นี้ก็จะไม่หยุดนิ่ง","ก่อนหน้านี้ลินน์เคยทดลองแล้วว่า เมื่อผ่านจุดวิกฤตไป ซึ่งก็คือประมาณลบสองร้อยองศาเซลเซียส ทุกๆ องศาที่ลดลงจะต้องสูญเสียพลังเวทและพลังจิตวิญญาณเพิ่มขึ้นแบบทวีคูณ!","ส่วนพ่อมดระดับตำนานจะมีความสามารถถึงขั้นนั้นหรือไม่ ลินน์ก็ไม่แน่ใจนัก แต่จากวิธีที่ประธานทั้งสองใช้รับมือ ดูเหมือนว่าพวกเขาจะไม่สามารถทำเรื่องที่น่าเหลือเชื่อแบบนั้นได้ ไม่อย่างนั้นคงไม่ต้องเสียเวลาตั้งนานเพื่อ ‘ดับ’ เปลวไฟที่เกิดจากคลอรีนไตรฟลูออไรด์","แต่เทพีองค์นั้นกลับสามารถแช่แข็งเพลิงอมตะได้เพียงแค่ยกมือขึ้นเท่านั้น","ในขณะที่แฮร์รอฟและวิกตอริโอกำลังยุ่งอยู่กับการดับไฟ ลินน์และคนอื่นๆ ก็ไม่ได้อยู่เฉยๆ เพราะภายในสถาบันวิจัยการเล่นแร่แปรธาตุนอกจากพวกเขาแล้ว ยังมีคนอีกหลายร้อยคน เพียงแต่พวกเขาไม่สามารถยื่นมือเข้ามาช่วยอะไรได้เลย ซ้ำยังถูกโจมตีด้วยพลังศักดิ์สิทธิ์วงกว้างของเอ็ดเวลจนแทบเอาชีวิตไม่รอด","ยิ่งไปกว่านั้น ทหารองครักษ์ส่วนหนึ่ง หลังจากถูกแสงศักดิ์สิทธิ์สาดส่อง ก็ถูกล้างสมองจนกลายเป็นผู้ศรัทธาที่เคร่งศาสนาที่สุดของเอลาไปแล้ว ลินน์จึงทำได้เพียงใช้หมัดซัดพวกเขาให้สลบและจับมัดไว้ รอหาวิธีปรับเปลี่ยนความคิดของพวกเขาในภายหลัง","“จริงสิ ท่านแฮร์รอฟ ก่อนหน้านี้พวกท่านบอกว่าจะรีบมาที่เมืองหลวงให้เร็วที่สุดไม่ใช่หรือครับ? ทำไมถึงได้ล่าช้าไปนานขนาดนี้?”","ลินน์นึกเรื่องนี้ขึ้นมาได้ จึงเอ่ยถามด้วยความสงสัย","หากครั้งนี้แฮร์รอฟไม่ได้บังเอิญมาถึงทันเวลา พวกเขาคงตายกันหมด และอาณาจักรทั้งอาณาจักรก็คงต้องตกอยู่ในเงื้อมมือของศาสนจักร...","“ข้ากำลังจะถามเจ้าอยู่พอดี ออโรร่ายังมาไม่ถึงอีกงั้นหรือ?”","แฮร์รอฟขมวดคิ้ว","เมื่อหนึ่งสัปดาห์ก่อน หลังจากสภาลงมติเห็นชอบ ก็ได้ให้การสนับสนุนอาณาจักรฮาดราตาอย่างเต็มรูปแบบ โดยให้ออโรร่านำกองทัพใหม่ล่วงหน้ามาก่อน","โดยพวกเขานั้นเดินทางมาทางทะเล เนื่องจากเรือเหาะส่วนใหญ่ถูกลินน์เรียกไปใช้งานจนหมด ทำให้ความสามารถในการขนส่งไม่เพียงพอ และเรือเล่นแร่แปรธาตุของดินแดนพ่อมดหลังจากเปลี่ยนมาใช้เครื่องยนต์สันดาปภายในแล้ว ก็มีความเร็วไม่น้อยเลย การเดินทางข้ามทะเลจากดินแดนพ่อมดมายังอาณาจักร ใช้เวลาประมาณสี่ถึงห้าวันก็น่าจะถึง","เมื่อคำนวณจากเวลาแล้ว ออโรร่าน่าจะเดินทางมาถึงเมืองหลวงตั้งนานแล้วสิ","“แต่สายลับที่ข้าส่งออกไป ยังไม่พบวี่แววของนางเลยครับ”","ลินน์ส่ายหน้า พร้อมกับเอ่ยด้วยความกังวล","“อย่าบอกนะว่าเกิดเรื่องอะไรขึ้น?”","ตอนนี้เป็นช่วงเวลาที่ไม่ปกติ การหายตัวไปอาจหมายถึงอันตราย หรือแม้กระทั่งความตาย!","“อาจจะหลงทาง หรือไม่ก็เจออุปสรรคกลางทะเล เลยทำให้ล่าช้าก็ได้กระมัง”","วิกตอริโอกล่าวปลอบใจ","หากพูดถึงพลังรบ ออโรร่าอาจจะไม่ใช่คนที่เก่งที่สุดในกลุ่ม แต่ถ้าเป็นเรื่องการเอาตัวรอด ทั้งเขาและแฮร์รอฟต่างก็ต้องยอมรับว่าเทียบไม่ติด นางสามารถประยุกต์ใช้เวทมนตร์หักเหแสงได้อย่างแพรวพราว ต่อให้ถูกศาสนจักรดักซุ่มโจมตี การหลบหนีก็ไม่น่าจะเป็นปัญหา","“เอาเป็นว่า พวกเราจัดการกองกำลังผสมของศาสนจักรกลุ่มนี้ให้สิ้นซากก่อน แล้วค่อยส่งคนไปตามหาก็ยังไม่สาย”","แฮร์รอฟตัดสินใจอย่างรวดเร็ว","ต่อให้ออโรร่าจะกำลังตกอยู่ในอันตราย ตอนนี้พวกเขาก็ตามไปช่วยไม่ทันแล้ว สิ่งสำคัญที่สุดในตอนนี้คือต้องชนะสงครามครั้งนี้ให้ได้ จากนั้นค่อยระดมเรือเหาะกว่าร้อยลำออกไปค้นหา ซึ่งน่าจะมีประสิทธิภาพมากกว่าการให้พวกเขาไปบินวนหาแบบไร้จุดหมายในท้องทะเลอันกว้างใหญ่","...","ในขณะเดียวกัน ที่บริเวณประตูเมืองหลวง เสียงปืนใหญ่และเสียงดาบปะทะกันยังคงดังกึกก้องอย่างต่อเนื่อง","หลังจากการต่อสู้อย่างดุเดือดนานหลายชั่วโมง ตั้งแต่กลางดึกจนถึงรุ่งสาง พละกำลังและเรี่ยวแรงของทุกคนก็แทบจะหมดสิ้น","ฮามเข้าไปทำหน้าที่แทนพลปืนที่เสียชีวิต เขาใช้เพียงพลังใจในการบรรจุกระสุน จุดไฟ ยิง และเตรียมการยิงในรอบต่อไปอย่างเป็นกลไก","กองกำลังปราบปรามนั้นบ้าคลั่งราวกับคนเสียสติ พวกเขาดาหน้าเข้ามาอย่างต่อเนื่องราวกับคลื่นน้ำ แม้จะต้องเผชิญหน้ากับห่าปืนใหญ่ก็ไม่ยอมถอยร่น และไม่เปิดโอกาสให้พวกเขาได้พักหายใจเลยแม้แต่น้อย","อิฐและหินบนกำแพงเมืองถูกยิงจนแตกกระจุยกระจาย แม้แต่ประตูเมืองที่ปิดสนิท ก็ยังถูกพลังศักดิ์สิทธิ์โจมตีจนพังยับเยิน เผยให้เห็นกำแพงคอนกรีตอันแข็งแกร่งที่อยู่ด้านหลัง","ซากศพด้านล่างกองพะเนินเป็นภูเขาเลากา จนถมคูเมืองและกับดักที่ขุดไว้ก่อนการต่อสู้จนเต็ม มีทั้งศพของศัตรูและพวกเดียวกันเอง","วู๊ดด~ วู๊ดดด~","ในขณะที่ฮามกำลังบรรจุกระสุนอย่างด้านชา และรู้สึกเหมือนแขนทั้งสองข้างแทบจะขาดออกจากกัน เสียงแตรที่ดังกังวานชัดเจนก็ดังมาจากในเมือง","ฮามสะดุ้งสุดตัว สีหน้าเผยให้เห็นถึงความตื่นเต้นอย่างเห็นได้ชัด เพราะนั่นคือเสียงแตรสัญญาณแห่งการโต้กลับที่ได้นัดแนะกันไว้!","นอกเมือง ห่างจากสมรภูมิประมาณหนึ่งจุดห้ากิโลเมตร ซึ่งอยู่นอกระยะยิงของปืนใหญ่ กองทหารม้าที่มีกำลังพลกว่าหมื่นนาย ซึ่งสวมใส่อุปกรณ์ครบครันกำลังเตรียมพร้อมรอคำสั่ง","แม้ว่าการต่อสู้ครั้งนี้จะเป็นศึกตัดสินขั้นเด็ดขาด แต่คาร์ดินัลเกิร์กที่เป็นผู้บัญชาการ กลับไม่ได้ทุ่มกำลังทั้งหมดที่มี เพราะกองทหารม้าไม่เหมาะกับการตีเมือง จึงถูกสั่งให้รออยู่ข้างนอก ในพื้นที่ที่ปืนใหญ่โจมตีไม่ถึง เพื่อออมกำลังไว้รอจังหวะที่เหมาะสม แล้วค่อยบุกเข้าไปบดขยี้ศัตรูที่กำลังเหนื่อยล้าและเสียขวัญให้ราบคาบในคราวเดียว!","และจังหวะนั้นก็คงอีกไม่ไกล เพราะเอ็ดเวลได้นำกองทัพทัณฑ์ศักดิ์สิทธิ์กว่าสองพันนายลอบเข้าไปในเมืองหลวงผ่านทางเส้นทางลับด้วยตัวเองแล้ว แถมยังมีองครักษ์เงาคอยให้การสนับสนุนอีก","ตราบใดที่แนวหน้ายังคงกดดันอย่างต่อเนื่อง ไม่เปิดโอกาสให้พ่อมดพวกนั้นได้กลับไปช่วย การที่เมืองหลวงจะแตกพ่ายก็เป็นเพียงแค่เรื่องของเวลาเท่านั้น!","“นี่มัน...พลังของพระเจ้า?”","ทันใดนั้น พระคาร์ดินัลคนหนึ่งก็สัมผัสได้ถึงแสงศักดิ์สิทธิ์อันเจิดจ้าจากในเมืองหลวง ซึ่งทำให้เขาตื่นเต้นขึ้นมาทันที แต่พลังนั้นกลับมาเร็วและจากไปเร็วมาก ยังไม่ทันที่เขาจะได้ตรวจสอบให้ละเอียด มันก็หายไปอย่างไร้ร่องรอยเสียแล้ว","ดูเหมือนว่า พวกสาวกของเทพนอกรีตในเมืองจะถูกกำจัดไปแล้วสินะ!","บรรดาบิชอปที่อยู่รอบๆ ต่างก็มั่นใจในเรื่องนี้เช่นกัน แม้ว่าพวกสมุนของเทพนอกรีตจะดื้อด้าน และสามารถต้านทานการโจมตีระลอกแล้วระลอกเล่าของพวกเขาได้ แต่ภายใต้อำนาจอันยิ่งใหญ่ของพระเจ้า การต่อต้านทั้งหมดก็เป็นเพียงแค่ความพยายามที่เปล่าประโยชน์เท่านั้น!","และดูเหมือนว่าความจริงจะเป็นไปตามที่พวกเขาคาดไว้ เมื่อเสียงแตรอันบาดแก้วหูดังขึ้น เสียงปืนใหญ่บนกำแพงเมืองก็หยุดลงกะทันหัน พร้อมกับประตูเมืองที่ปิดสนิทและยังคงตั้งตระหง่านอยู่ได้แม้จะถูกโจมตีด้วยพลังศักดิ์สิทธิ์ ในที่สุดมันก็ถูกเปิดออก!"]},{"n":379,"t":"สายธารแห่งเหล็กกล้า การเปิดตัวครั้งแรกของรถหุ้มเกราะ!","c":["ในวินาทีที่ประตูเมืองเปิดออก เหล่ากองทหารม้าที่เตรียมพร้อมเต็มที่ก็เปิดฉากพุ่งทะยานไปข้างหน้าตามเสียงสัญญาณสั่งการ!","ครืนนน~","กีบเท้าม้าขนาดมหึมาเหยียบย่ำลงบนพื้นดินจนฝุ่นตลบ เหล่าอัศวินที่สวมเกราะเหล็กและถือหอกยาว พุ่งทะยานเข้าไปในเมืองที่ประตูเปิดกว้าง ราวกับเมฆดำทะมึนที่กำลังม้วนตัว","“เพื่อความรุ่งโรจน์ขององค์พระผู้เป็นเจ้า!”","“ฆ่าพวกคนบาปที่ลบหลู่พระเจ้าซะ!”","เสียงตะโกนดังกึกก้อง เสียงคำรามราวกับสัตว์ร้ายดังกังวานกึกก้องไปทั่ว ฟังดูชัดเจนเป็นพิเศษท่ามกลางแสงอาทิตย์ยามเช้า ราวกับต้องการจะฉีกทึ้งทุกสิ่งทุกอย่าง!","ผู้นำทัพคือเกิร์กที่สวมชุดเกราะสีดำและถือดาบโค้งเล่มยักษ์ เขาเฝ้ามองดูการต่อสู้อันดุเดือดอยู่นอกสนามรบมานานแสนนาน จนความอดทนมาถึงขีดสุด เมื่อได้รับคำสั่ง เลือดในกายของเขาก็สูบฉีดพลุ่งพล่านขึ้นมาทันที","ดาบใหญ่ในมือของเขาหิวกระหายมานานแล้ว เขาอยากจะตัดหัวพวกคนบาปพวกนั้น และใช้เลือดของพวกพ่อมดมาบูชาเพื่อเอาใจเทพีแห่งจันทราผู้ยิ่งใหญ่ใจจะขาด!","แต่สิ่งที่ปรากฏออกมาจากประตูเมืองกลับไม่เป็นไปตามที่พวกเขาคาดคิด ไม่ใช่กองทัพทัณฑ์ศักดิ์สิทธิ์ที่จะมาประสานงานกับพวกเขาจากภายใน และไม่ใช่ชาวเมืองในชุดขาดรุ่งริ่งที่กำลังวิ่งหนีหัวซุกหัวซุน แต่กลับเป็นกล่องเหล็กรูปร่างประหลาดสูงกว่าสองเมตรหลายกล่อง ซึ่งด้านหน้ามีท่อยาวๆ ขนาดใหญ่ยื่นออกมา","หรือว่านี่จะเป็นของเล่นชิ้นใหม่ที่พวกพ่อมดคิดค้นขึ้นมา?","เกิร์กอดไม่ได้ที่จะขมวดคิ้ว ในใจเริ่มรู้สึกได้ถึงความผิดปกติบางอย่าง แต่การพุ่งทะยานของทหารม้าไม่สามารถหยุดชะงักได้แล้ว สิ่งที่พวกเขาทำได้ก็มีเพียง พุ่งชน พุ่งชน และพุ่งชนเท่านั้น!","“องค์พระผู้เป็นเจ้าสถิตอยู่กับพวกเรา!”","เกิร์กตะโกนลั่น แสงศักดิ์สิทธิ์สว่างวาบขึ้นรอบกาย ก่อนจะไปรวมกันอยู่ที่ดาบยาวในมือ เขาเชื่อมั่นว่าพลังที่พระเจ้าประทานให้ จะเพียงพอที่จะฉีกกระชากทุกสิ่งให้แหลกเป็นชิ้นๆ!","แต่พวกเขาไม่มีโอกาสได้เข้าใกล้เลยด้วยซ้ำ เพราะปากกระบอกปืนใหญ่ก็ส่งเสียงคำรามขึ้นในทันที","เมื่อต้องเผชิญหน้ากับลูกปืนใหญ่ที่พุ่งทะยานเข้ามา เกิร์กเพิ่งจะตระหนักได้ว่า กล่องเหล็กที่อยู่ตรงหน้าเหล่านี้ ก็คือปืนใหญ่ที่เคลื่อนที่ได้!","“แหลกไปซะ!”","เกิร์กคำรามลั่นและตวัดดาบยาวที่เปล่งประกายพลังศักดิ์สิทธิ์ในมือ พุ่งเข้าปะทะกับลูกปืนใหญ่ที่พุ่งเข้ามาด้วยความเร็วสูงอย่างจัง!","ในวินาทีต่อมา ดาบยาวและลูกปืนใหญ่ก็ปะทะกัน ท่ามกลางเสียงคำรามและเสียงม้าร้อง การโจมตีของเกิร์กในครั้งนี้ กลับสามารถผ่าลูกปืนใหญ่ขาดครึ่งได้จริงๆ!","แต่อัศวินที่อยู่ด้านหลังกลับไม่ได้โชคดีเช่นนั้น เพราะพวกเขาไม่สามารถต้านทานลูกปืนใหญ่ที่พุ่งเข้ามาได้ อัศวินหลายสิบคนกรีดร้องด้วยความเจ็บปวด ชุดเกราะบนร่างถูกเจาะทะลุ พลังกระแทกอันมหาศาลทำให้ร่างของพวกเขาขาดสะบั้น เศษซากกระเด็นลอยออกไปไกลหลายสิบเมตร","ดวงตาของเกิร์กแดงก่ำ ดาบยาวในมือถูกตวัดออกไปอีกครั้ง คลื่นดาบอันคมกริบฟาดฟันเข้าใส่เกราะเหล็กจนเกิดเป็นรอยบุบ ทำให้รถเล่นแร่แปรธาตุทั้งคันสั่นสะเทือนอย่างรุนแรง แต่มันก็ยังคงเคลื่อนที่ต่อไปโดยไม่หยุดชะงัก ปากกระบอกปืนใหญ่ขนาดใหญ่ก็ส่งเสียงคำรามดังกึกก้องจนหูแทบหนวกอีกครั้ง...","และเสียงที่ดังขึ้นพร้อมกับเสียงปืนใหญ่ ก็คือเสียงสาดกระสุนของปืนกล...","ในช่วงหลายวันที่ผ่านมา ลิเดียและคนอื่นๆ ได้สร้างปืนกลขึ้นมาทั้งหมดห้ากระบอก นอกเหนือจากสามกระบอกที่ถูกนำไปใช้ปราบปรามความวุ่นวายในเมืองหลวงแล้ว อีกสองกระบอกที่เหลือก็ถูกเก็บไว้ในสถาบันวิจัยการเล่นแร่แปรธาตุ","ของเล่นชิ้นนี้แทบจะไม่มีผลอะไรกับพระคาร์ดินัลเลย จึงไม่ได้ถูกนำมาใช้ แต่ตอนนี้มันกลับถูกติดตั้งไว้บนรถหุ้มเกราะเล่นแร่แปรธาตุสองคันที่อยู่ด้านหน้าสุด!","เปลวไฟร้อนระอุพ่นออกมาจากปืนกลทั้งสองกระบอก ห่ากระสุนที่สาดซัดอย่างต่อเนื่องพุ่งแหวกอากาศราวกับฝนดาวตก","แม้เกิร์กจะสามารถผ่าลูกปืนใหญ่ที่พุ่งเข้ามาได้ แต่เขาก็ไม่สามารถต้านทานห่ากระสุนที่หนาแน่นนี้ได้ เขาจึงทำได้เพียงเปลี่ยนพลังศักดิ์สิทธิ์ที่ส่งไปยังดาบยาว มาไว้ที่ม่านพลังป้องกันแทน","แต่ม่านพลังป้องกันศักดิ์สิทธิ์ จะไปต้านทานการสาดกระสุนได้อย่างไร เพียงแค่หนึ่งวินาที มันก็แตกกระจายจากการโจมตีของกระสุนหลายสิบลูก ชุดเกราะเหล็กกล้าที่สวมอยู่ก็ถูกฉีกจนขาดวิ่น ตามมาด้วยร่างกำยำที่เต็มไปด้วยบาดแผล!","เลือดสีแดงฉานพุ่งกระฉูดออกมา ร่างกายของเกิร์กถูกพายุกระสุนยิงจนพรุนไปหมดในเวลาอันรวดเร็ว ใบหน้าของเขาเต็มไปด้วยความไม่ยินยอม ร่างที่แหลกเหลวล้มลงบนพื้น และถูกล้อรถขนาดใหญ่บดขยี้...","ปืนกลและกระแสรถหุ้มเกราะเป็นเพียงแค่จุดเริ่มต้นเท่านั้น เพราะเรือเหาะขนาดใหญ่หลายลำก็ปรากฏขึ้นเหนือท้องฟ้าของกำแพงเมือง โดยมีฝนฟอสฟอรัสขาวโปรยปรายลงมาเต็มท้องฟ้า พลิกสถานการณ์ในสนามรบได้อย่างสมบูรณ์แบบ!","แม้ว่าบรรดาบิชอปจะรู้ตัวช้าแค่ไหน แต่ในเวลานี้พวกเขาก็ตระหนักได้ถึงความผิดปกติแล้ว การจัดขบวนทัพที่เป็นระเบียบเรียบร้อย รวมถึงกล่องเหล็กรูปร่างประหลาดที่ทรงพลังเหล่านั้น ทำให้พวกเขาตระหนักได้ว่า นี่ไม่ใช่กองทัพทัณฑ์ศักดิ์สิทธิ์ที่แฝงตัวเข้ามาในเมืองหลวงมาประสานงานจากภายใน แต่เป็นศัตรูของพวกเขาที่เปิดฉากโจมตีสวนกลับ!","“เป็นไปได้อย่างไร?”","อาร์ชบิชอปคนหนึ่งพึมพำด้วยความตกตะลึง ในใจรู้สึกหนาวสะท้าน สถานการณ์ในตอนนี้ บ่งบอกชัดเจนว่าเอ็ดเวลพ่ายแพ้แล้ว!","แต่เมื่อครู่นี้พวกเขาสัมผัสได้อย่างชัดเจนถึงแสงศักดิ์สิทธิ์ของพระเจ้า พวกพ่อมดบ้าพวกนั้น ไม่มีทางที่จะต้านทานพลังศักดิ์สิทธิ์ของพระเจ้าได้แน่!","ต่อให้เหล่าบิชอปที่อยู่ที่นี่จะไม่อยากเชื่อแค่ไหน ก็ไม่สามารถเปลี่ยนแปลงความจริงได้ ความพ่ายแพ้ยับเยินอยู่ตรงหน้าพวกเขาแล้ว และตอนนี้แม้แต่การหลบหนีก็ยังเป็นความหวังที่ริบหรี่!","ขาสองข้างของพวกเขาไม่มีทางวิ่งหนีสี่ล้อได้ทัน ดาบใหญ่และดาบยาวในมือฟาดฟันลงบนเกราะหนาๆ ก็ทำได้เพียงทำให้เกิดประกายไฟเล็กๆ น้อยๆ เท่านั้น ยิ่งไม่ต้องพูดถึงเรือเหาะที่ลอยอยู่บนฟ้าเลย","สงครามครั้งนี้กลายเป็นการสังหารหมู่ไปอย่างรวดเร็ว!","การไล่ล่าดำเนินต่อไปกว่าค่อนวัน ลากยาวจากหน้ากำแพงเมืองหลวงไปไกลกว่าสิบกิโลเมตร เลือดสดๆ ย้อมแผ่นดินจนเป็นสีแดง ทหารที่เหลือรอดอีกกว่าสามหมื่นคนพากันยอมจำนน โดยคาดการณ์ว่า มีผู้ถูกสังหารไปกว่าเจ็ดหมื่นคน!","หลังจากการต่อสู้สิ้นสุดลง แฮมม์และคนอื่นๆ ที่เหน็ดเหนื่อยมาทั้งคืนก็ทนไม่ไหวอีกต่อไป พวกเขาทรุดตัวลงนอนกองกับพื้นท่ามกลางแอ่งเลือด เสียงโห่ร้องแสดงความยินดีดังกึกก้องไปทั่วทั้งเมืองหลวง!","แต่เมื่อเทียบกับความสบายๆ ในครั้งก่อน แม้ว่าครั้งนี้พวกเขาจะสามารถเอาชนะกองกำลังปราบปรามของศาสนจักรได้อย่างราบคาบ แต่ความสูญเสียก็ยากที่จะประเมินได้","เนื่องจากกองทัพทัณฑ์ศักดิ์สิทธิ์บุกเข้ามาในเมืองหลวงโดยตรง ประกอบกับการถูกโจมตีด้วยพลังศักดิ์สิทธิ์อย่างต่อเนื่องในแนวหน้า เพียงแค่ยอดผู้เสียชีวิตที่นับได้ ก็ปาเข้าไปหลักหมื่นคนแล้ว!","โดยส่วนใหญ่เป็นทหารองครักษ์ประจำเมืองหลวง เพราะพวกเขาไม่มีปืนไฟในมือ ทำได้เพียงแกว่งดาบต่อสู้ในระยะประชิด จึงถูกตีจนแตกพ่ายไม่เป็นท่า","และพื้นที่กว่าหนึ่งในสามของเมืองหลวงได้รับความเสียหายในระดับที่แตกต่างกันไป มีพ่อมดเต็มตัวกว่าร้อยคน และพ่อมดฝึกหัดกว่าห้าร้อยคนต้องมาจบชีวิตลงในสนามรบ...","ไม่ว่าจะเป็นการบาดเจ็บล้มตายของบุคลากร หรือความเสียหายที่เกิดขึ้น ล้วนทำให้ลินน์ที่ได้รับรายงานถึงกับต้องถอนหายใจ ส่วนสาเหตุที่กองทัพทัณฑ์ศักดิ์สิทธิ์สามารถโผล่มาในเมืองหลวงได้อย่างไร้ร่องรอยนั้น ก็ได้รับการเค้นข้อมูลมาจากพวกที่ถูกจับกุมตัวมาแล้ว","มันคือเส้นทางลับที่เชื่อมตรงจากย่านสลัมไปยังป่าทึบนอกเมือง ซึ่งองค์ชายใหญ่ได้แอบสร้างไว้อย่างลับๆ โดยมีคนที่รู้เรื่องนี้น้อยมาก และไม่มีการบันทึกไว้ทั้งสิ้น","เมื่อทราบถึงจุดนี้ ลินน์ก็รีบส่งคนไปทำลายและกลบเส้นทางนั้นทิ้งทันที เพื่อป้องกันไม่ให้เกิดโศกนาฏกรรมซ้ำรอยอีก","ส่วนนักบินของเรือเหาะนั้นไม่มีเวลาได้พักผ่อนเลยแม้แต่วินาทีเดียว พวกเขาถูกส่งออกไปทั้งหมด โดยส่วนหนึ่งรับหน้าที่ลาดตระเวนและสอดแนมความเคลื่อนไหวของศัตรู ส่วนอีกกลุ่มหนึ่งมุ่งหน้าไปยังทะเลหมอก เพื่อค้นหาออโรร่าและคนอื่นๆ ที่สูญหายไป"]},{"n":380,"t":"ตามไม่ทัน ตีไม่โดน วิ่งหนีไม่ได้...แบบนี้หรือที่เรียกว่าการต่อสู้?","c":["ทางทิศตะวันออกของอาณาจักรฮัดลาตา เหนือทะเลหมอกอันกว้างใหญ่ไร้ขอบเขต แสงศักดิ์สิทธิ์อันเจิดจ้าพลันสาดส่อง พร้อมหมอกหนาทึบที่ปกคลุมอยู่โดยรอบก็สลายตัวไปอย่างรวดเร็ว...","ธงที่โบกสะบัดค่อยๆ ปรากฏขึ้นท่ามกลางสายหมอก ตามมาด้วยเสากระโดงเรือและตัวเรือขนาดมหึมา จากนั้นก็เป็นทั้งกองเรือ!","นี่คือกองเรือเดินสมุทรของจักรวรรดิ เรือทุกลำคือเรือรบใบชักรุ่นล่าสุด ที่มีความยาวกว่าเจ็ดสิบเมตร ราวกับสัตว์ประหลาดยักษ์ที่กำลังแหวกว่ายฝ่าคลื่นลมอยู่บนผิวน้ำ","แต่กองเรืออันเกรียงไกรที่กำลังแล่นมาด้วยความเร็วนี้ กลับดูทุลักทุเลเป็นอย่างมาก เรือรบบางลำที่อยู่ด้านหลังได้รับความเสียหายอย่างหนัก และมีไฟลุกไหม้ลามไปถึงใบเรือ","ในวินาทีต่อมา พร้อมกับเสียงปืนใหญ่ที่ดังกึกก้อง ลูกปืนใหญ่ขนาดเท่าหัวคนนับร้อยลูกก็พุ่งแหวกสายหมอกออกมา โดยมีเป้าหมายคือทั้งกองเรือ!","แม้ว่าปืนใหญ่เหล่านี้จะดูเหมือนยิงมาแบบไร้ทิศทาง โดยส่วนใหญ่ตกลงไปในทะเล หรือบางลูกก็ตกลงห่างจากเป้าหมายไปหลายร้อยเมตร ซึ่งนอกจากจะทำให้เกิดเสาน้ำพุ่งกระฉูดแล้ว ก็ไม่ได้สร้างความเสียหายอะไรเลย","แต่จำนวนของลูกปืนใหญ่นั้นมีมากเกินไป ต่อให้มีเพียงหนึ่งในสามสิบที่ยิงโดนเป้าหมาย มันก็ยังเป็นภัยคุกคามที่น่ากลัวอยู่ดี...","ท่ามกลางเสียงสวดภาวนาที่ดังก้องแว่วมาตามสายลมเหนือผิวน้ำ ม่านพลังศักดิ์สิทธิ์ที่มองไม่เห็นได้ห่อหุ้มเรือรบใบชักแต่ละลำไว้ เพื่อต้านทานการโจมตีจากลูกปืนใหญ่","การกางม่านพลังศักดิ์สิทธิ์ครอบคลุมพื้นที่กว้างขวางขนาดนี้ ถือเป็นงานที่หนักหนาสาหัสสำหรับเหล่านักบวชและบิชอปอย่างเห็นได้ชัด","ที่สำคัญยิ่งกว่านั้นคือ การโจมตีในลักษณะนี้เกิดขึ้นซ้ำแล้วซ้ำเล่าในทุกๆ สิบนาที ทำให้พวกเขาแทบจะไม่มีโอกาสได้พักหรือผ่อนปรนเลย","เรือรบที่รั้งท้ายขบวนลำหนึ่ง ถูกลูกปืนใหญ่ยิงใส่ห้าลูกซ้อน ซึ่งทำให้ม่านพลังป้องกันศักดิ์สิทธิ์ที่ห่อหุ้มตัวเรือแตกกระจายในพริบตา โดยเหล่านักบวชที่อยู่บนเรือก็ถูกพลังสะท้อนกลับจนกระอักเลือด ได้แต่ยืนมองลูกปืนใหญ่ขนาดยักษ์พุ่งเข้าชนตัวเรืออย่างจัง จนทำให้ดาดฟ้าและตัวเรือเป็นรูโบ๋","ที่เลวร้ายกว่านั้นคือ มีลูกปืนใหญ่ลูกหนึ่งที่ถูกลงรูนเวทระเบิดเอาไว้ เมื่อมันชนเข้ากับตัวเรือ มันก็ระเบิดออกทันที เปลวไฟและควันพวยพุ่งขึ้นสู่ท้องฟ้า เรือรบขนาดมหึมาสั่นสะเทือน โคลงเคลง และคว่ำลงจมสู่ก้นทะเล...เสียงกรีดร้องโหยหวนดังก้องไปทั่ว ทหารและนักบวชบนเรือทำได้เพียงกระโดดลงน้ำเพื่อเอาชีวิตรอด และพยายามว่ายน้ำไปยังเรือรบที่อยู่ใกล้ที่สุดอย่างยากลำบาก","“พวกสมุนของปีศาจร้าย พวกสาวกของเทพนอกรีต! พวกมันสมควรถูกโยนลงนรก และถูกไฟนรกแผดเผาวิญญาณจนแตกดับไปชั่วกัปชั่วกัลป์!”","บนเรือรบขนาดยักษ์ที่อยู่ใจกลางกองเรือ คาร์ดินัลซิริดตะโกนด่าทอด้วยความโกรธแค้น ในขณะที่สีหน้าของบรรดาบิชอปที่อยู่รอบข้างก็ดูย่ำแย่จนถึงขีดสุด","เมื่อครึ่งเดือนก่อน พวกเขาได้รับคำสั่งให้นำกองเรือที่หนึ่งของจักรวรรดิ ออกเดินทางข้ามทะเลเพื่อไปบุกโจมตีฐานที่มั่นของพวกพ่อมด หมายจะกวาดล้างองค์กรพ่อมดที่หลบซ่อนตัวอยู่ในทะเลหมอกราวกับหนู และมักจะโผล่มาก่อกวนสร้างความรำคาญใจให้ศาสนจักรมานานหลายปีให้สิ้นซาก!","แต่สิ่งที่เกินความคาดหมายของพวกเขาก็คือ ระหว่างทาง กองเรือของพวกเขาบังเอิญไปเผชิญหน้ากับกองเรือของพวกพ่อมดเข้าพอดี","ดูจากทิศทางแล้ว อีกฝ่ายน่าจะกำลังมุ่งหน้าไปช่วยเหลืออาณาจักรฮัดลาตา...และจำนวนเรือรบก็มีไม่ถึงหนึ่งในสามของกองเรือพวกเขาเสียด้วยซ้ำ!","นี่ถือเป็นผลพลอยได้ที่ทำให้เหล่าบิชอปดีใจกันใหญ่ พวกเขารีบนำกองเรือพุ่งเข้าใส่ หวังจะกวาดล้างกองเรือของพวกพ่อมดให้สิ้นซาก เพื่อลดแรงกดดันในสมรภูมิที่อาณาจักรฮัดลาตา","แต่เมื่อเริ่มการต่อสู้ พวกเขาถึงเพิ่งตระหนักได้ว่า ศัตรูไม่ได้อ่อนแออย่างที่คิด แต่มันคือกระดูกชิ้นโตที่เคี้ยวยากสุดๆ","เพียงแค่เริ่มปะทะ ปืนใหญ่อันทรงพลังของอีกฝ่ายก็ทำให้ซิริดและคนอื่นๆ ต้องจดจำไปอีกนาน เพราะทั้งจำนวนและอานุภาพของมัน เทียบไม่ได้เลยกับเครื่องขว้างน้ำมันไฟที่ติดตั้งอยู่บนเรือของพวกเขา","ว่ากันว่าเจ้านี่คืออาวุธชนิดใหม่ที่พวกพ่อมดประดิษฐ์ขึ้น ซึ่งข้อมูลเชิงลึกยังอยู่ในระหว่างการรวบรวม ทำให้พวกเขาถูกโจมตีจนตั้งตัวไม่ติด","สิ่งที่ทำให้ซิริดรู้สึกโมโหที่สุดก็คือ ในตอนที่กองเรือที่หนึ่งตัดสินใจที่จะบุกฝ่าดงกระสุนปืนใหญ่เข้าไปประชิดตัวเพื่อทำการรบแบบประจัญบาน กองเรือของพวกพ่อมดกลับหันหัวเรือหนีเอาดื้อๆ พวกเขาไม่มีความคิดที่จะปะทะเลยแม้แต่น้อย ซ้ำยังยิงปืนใหญ่ตอบโต้มาตลอดทาง","จากการประเมินคร่าวๆ ระยะยิงของปืนใหญ่มีมากกว่าหนึ่งกิโลเมตร ในขณะที่เครื่องขว้างน้ำมันไฟของกองเรือ ต่อให้มีพลังศักดิ์สิทธิ์คอยช่วยหนุน ก็ยังยิงได้ไกลสุดแค่ห้าร้อยเมตรเท่านั้น","และระยะห่างห้าร้อยเมตรนี้ ก็กลายเป็นกำแพงที่ไม่มีวันก้าวข้ามไปได้ กองเรือที่หนึ่งไล่ตามอยู่หลายชั่วโมง สูญเสียเรือรบไปกว่าสามสิบลำ ถึงเพิ่งจะตาสว่างว่าพวกเขาไม่มีวันก้าวข้ามระยะห่างนี้ไปได้เลย","ความเร็วที่อีกฝ่ายแสดงออกมานั้น ยังห่างไกลจากขีดจำกัดของพวกมันมากนัก พวกมันเพียงแค่ทำให้พวกเขารู้สึกว่า ‘อีกแค่นิดเดียวก็จะตามทันแล้ว’ เพื่อหลอกล่อให้พวกเขาเผาผลาญจำนวนเรือรบไปเรื่อยๆ","หลังจากตระหนักถึงข้อนี้ได้ ภายใต้คำสั่งของประธานผู้พิพากษา กองเรือก็ล้มเลิกการไล่ตาม และหันหัวเรือมุ่งหน้าไปยังดินแดนพ่อมดต่อไป","แต่เรือของพวกพ่อมดกลับทำตัวเหมือนฝูงไฮยีน่าที่เจ้าเล่ห์และไร้ยางอาย พวกมันวกกลับมา และสะกดรอยตามกองเรือของพวกเขาในระยะห่างที่ไม่ใกล้ไม่ไกล โดยอาศัยความได้เปรียบด้านความเร็วและระยะยิง คอยตามป่วนและโจมตีอย่างต่อเนื่อง จนทำให้เรือรบของพวกเขาถูกทำลายไปอีกหลายสิบลำ...","ในที่สุด ซิริดและคนอื่นๆ ก็พบว่าพวกเขาตกอยู่ในสถานการณ์ที่กลืนไม่เข้าคายไม่ออก เพราะ ‘ตามไม่ทัน ตีไม่โดน แถมยังวิ่งหนีไม่ได้’ ราวกับเป้านิ่งที่ตั้งอยู่กลางทะเล ที่ทำได้เพียงตั้งรับการโจมตีจากปืนใหญ่ระลอกแล้วระลอกเล่า...","อึดอัดจนแทบกระอักเลือด!","บิชอปบางคนที่อารมณ์ร้อนถึงกับโกรธจนเป็นลมไปเลย!","ซิริดใช่ว่าจะไม่เคยลองใช้ความสามารถในการบินของพระคาร์ดินัล เพื่อพุ่งเข้าไปโจมตีเรือเหล่านั้นโดยตรง แต่ปัญหาคือความเร็วในการบินของพวกเขา ก็ยังตามไม่ทันเรือเหล็กยักษ์พวกนั้นอยู่ดี ยิ่งไปกว่านั้น ทันทีที่เข้าใกล้ในระยะสองร้อยเมตร พวกเขาก็ต้องเผชิญหน้ากับปืนใหญ่คริสตัลเวทมนตร์หลายสิบกระบอก ซึ่งทำให้พระคาร์ดินัลคนหนึ่งเกือบจะถูกยิงตายคาที่ ทำให้สุดท้ายพวกเขาก็ต้องบินกลับมาอย่างน่าสมเพช","เสียงปืนใหญ่ยังคงดังสนั่นหวั่นไหว การโจมตีระลอกนี้ ทำให้เรือรบอีกสองลำเกิดไฟลุกไหม้และจมลงสู่ก้นทะเล และในที่สุดกองเรือของพวกพ่อมดก็แล่นออกมาจากสายหมอก","มองคร่าวๆ มีเรือรบอยู่ประมาณร้อยกว่าลำ และทุกลำไม่มีใบเรือเลยแม้แต่ลำเดียว แต่กลับสามารถพุ่งทะยานไปบนผิวน้ำได้อย่างรวดเร็ว เร็วกว่าเรือรบใบชักของพวกเขาหลายเท่าตัว!","สิ่งที่สะดุดตาที่สุดก็คือเรือรบยักษ์สี่ลำที่นำหน้าอยู่!","พวกมันมีความยาวกว่าร้อยเมตร และสูงกว่าสามสิบเมตร เปลือกนอกถูกสร้างขึ้นจากโลหะทั้งหมด ดูแล้วน่าจะมีน้ำหนักหลายร้อยหรืออาจจะถึงพันตัน ราวกับเป็นป้อมปราการเคลื่อนที่กลางทะเล...","ซิริดแทบจะนึกไม่ออกเลยว่า พวกพ่อมดใช้เวทมนตร์อันทรงพลังระดับไหน ถึงทำให้เรือเหล็กยักษ์ลำนี้พุ่งทะยานไปในทะเลได้เร็วขนาดนี้!","เมื่อเห็นว่าปากกระบอกปืนใหญ่อันน่าสะพรึงกลัวบนเรือยักษ์กำลังปรับทิศทาง และการโจมตีระลอกใหม่กำลังจะมาถึง ซิริดก็รีบหันไปมองประธานผู้พิพากษา และเอ่ยขึ้นอย่างร้อนรน","“ท่านโยชัว ตอนนี้ท่านน่าจะลงมือได้แล้วกระมัง?”","หากยังเป็นแบบนี้ต่อไป กองเรือของจักรวรรดิคงถูกปืนใหญ่ยิงถล่มจนหมดเกลี้ยง โดยที่ยังไม่ได้แตะต้องตัวศัตรูเลยแม้แต่เงา!"]},{"n":381,"t":"มหาสงครามกลางทะเลหมอก!","c":["ท่ามกลางคำถามอันร้อนรนของซิริด โยชัวผู้เป็นประธานผู้พิพากษาในชุดคลุมยาวสีม่วงทองกลับไม่ได้ตอบอะไร เป็นพระคาร์ดินัลที่อยู่ข้างๆ ที่เอ่ยขึ้นมาในจังหวะที่เหมาะสมแทน","“ข้าเดาว่า ระยะการรับรู้ของพวกมันน่าจะอยู่ที่ประมาณหนึ่งจุดห้ากิโลเมตร...ในเมื่อพวกมันยังไม่เปลี่ยนทิศทาง นั่นก็พิสูจน์ให้เห็นแล้วว่าพวกมันน่าจะยังไม่รู้ตัวถึงการวางกำลังของพวกเรา”","สาเหตุที่กองเรือของพวกพ่อมดสามารถไล่ตามป่วนกองเรือของจักรวรรดิในทะเลหมอกได้ตลอดทาง นอกเหนือจากความได้เปรียบเรื่องความเร็วและระยะการโจมตีแล้ว สิ่งสำคัญที่สุดก็คือ ดูเหมือนว่าพวกพ่อมดจะมีความสามารถบางอย่างที่ใช้ระบุตำแหน่งของพวกเขาผ่านหมอกหนาพวกนี้ได้","ช่วงที่ผ่านมานี้ แม้ว่าหมอกบนทะเลจะเบาบางลงไปมาก แต่ทัศนวิสัยก็ยังคงมองเห็นได้แค่ระยะสามถึงสี่ร้อยเมตรเท่านั้น แถมหมอกพวกนี้ยังมีความสามารถในการกีดกั้นการรับรู้ในระดับหนึ่ง หากพวกเขาไม่ใช้พลังศักดิ์สิทธิ์สลายหมอกตลอดเวลา พวกเขาก็แทบจะมองไม่เห็นแม้แต่เงาของเรือข้าศึกเลย","“ได้เวลาแล้ว ถ้าอย่างนั้นก็ลงมือกันเถอะ!”","โยชัวพยักหน้า พร้อมกับยกคทาในมือขึ้น คลื่นพลังศักดิ์สิทธิ์ที่มองไม่เห็นก็แผ่ซ่านออกไปบนผิวน้ำอย่างรวดเร็ว...","...","ในเวลาเดียวกัน บนเรือเหล็กยักษ์ที่อยู่ห่างออกไปหนึ่งกิโลเมตร ทิคก็กำลังควบคุมป้อมปืนใหญ่บนดาดฟ้าเรือ เขายิงโดนเรือรบใบชักลำหนึ่งอย่างแม่นยำ และมองดูตัวเรือที่พลิกคว่ำจมลงสู่ก้นทะเลท่ามกลางเปลวไฟ ก่อนจะเอ่ยขึ้นด้วยความสะใจ","“โดนอีกแล้ว สะใจชะมัด!”","ใบหน้าของออโรร่าก็มีรอยยิ้มบางๆ ประดับอยู่เช่นกัน ต้องยอมรับเลยว่าการต่อสู้ในครั้งนี้ ช่างเป็นอะไรที่สบายสุดๆ ไปเลย","ไม่ว่าจะเป็นจำนวนเรือรบ หรือกำลังรบระดับสูง พวกเขาเรียกได้ว่าตกเป็นรองอย่างสิ้นเชิง","กองเรือของจักรวรรดิชุดนี้มีเรือรบมากกว่าสามร้อยลำ และแค่พระคาร์ดินัลที่ปรากฏตัว ก็มีมากกว่าสิบคนแล้ว ส่วนจำนวนทหารข้าศึกก็น่าจะมากกว่าเก้าหมื่นคน!","การที่ศาสนจักรจัดทัพใหญ่มาขนาดนี้ เป้าหมายนั้นชัดเจนอยู่แล้ว นั่นก็คือการมากวาดล้างดินแดนพ่อมดให้สิ้นซาก!","เพียงแต่บังเอิญมาเจอพวกเขากลางทางซะก่อน นี่ก็ต้องบอกว่าเป็นความโชคดีอย่างหนึ่ง!","เพราะตอนนี้สภาได้ทุ่มเทกองกำลังส่วนใหญ่ไปกับสงครามในอาณาจักร หากปล่อยให้คนพวกนี้ขึ้นฝั่งที่เมืองท่าได้ จะต้องเกิดความเสียหายจนยากจะจินตนาการได้อย่างแน่นอน!","ต่อให้เหล่าพ่อมดที่อยู่เฝ้าดินแดนจะสามารถขับไล่กองกำลังปราบปรามกลุ่มนี้ออกไปได้ในท้ายที่สุด แต่พวกเขาก็ต้องแลกมาด้วยความสูญเสียอย่างหนักหนาสาหัส...","หรือที่แย่กว่านั้น ดินแดนพ่อมดทั้งดินแดนอาจจะล่มสลายเลยก็เป็นได้!","ดังนั้น ออโรร่าจึงไม่ลังเลที่จะล้มเลิกแผนการไปช่วยเหลืออาณาจักรฮัดลาตา แล้วส่งเรือสามลำเพื่อนำข่าวเรื่องนี้กลับไปแจ้งให้สภาทราบ ส่วนคนที่เหลือก็ทุ่มกำลังทั้งหมดเพื่อสกัดกั้นกองเรือของจักรวรรดิกลุ่มนี้เอาไว้","ในตอนที่ตัดสินใจเรื่องนี้ ออโรร่าถึงขั้นเตรียมใจรับความสูญเสียอย่างหนัก เพื่อซื้อเวลาให้ดินแดนพ่อมดได้เตรียมพร้อมรับมือ แต่วิธีการบัญชาการรบทางทะเลของทิคและคนอื่นๆ กลับเหนือความคาดหมายของนางไปมาก","โดยทั่วไปแล้ว ในการทำสงครามทางทะเล มักจะเริ่มต้นด้วยการใช้ปืนใหญ่คริสตัลเวทมนตร์ยิงถล่มกันสักสองสามระลอก จากนั้นก็เข้าสู่การรบแบบประจัญบาน หรือไม่ก็อาศัยความได้เปรียบเรื่องขนาดของเรือ พุ่งชนเรือศัตรูให้แหลกและจมลงไปเลย!","แต่คู่มือการรบทางทะเลที่ลินน์ให้พวกเขานั้น กลับเสนอแนวคิดใหม่ที่แปลกแหวกแนวไปกว่าเดิมมาก!","ด้วยเรือเหล็กที่ติดตั้งเครื่องยนต์สันดาปภายในนั้นมีความเร็วมากกว่าเรือรบใบชักพวกนั้นถึงสามเท่า และระยะการโจมตีก็ไกลถึงหนึ่งกิโลเมตร บวกกับมีหมอกคอยเป็นฉากบังตา พวกเขาจึงสามารถว่ายวนอยู่นอกระยะการโจมตีของอีกฝ่ายได้อย่างสบายๆ แล้วค่อยๆ บ่อนทำลายกองกำลังของศัตรูไปเรื่อยๆ โดยสามารถปั่นหัวศัตรูที่มีกำลังรบเหนือกว่าพวกเขาหลายเท่าตัวได้อย่างง่ายดาย","และหากพระคาร์ดินัลที่แข็งแกร่งพวกนั้น กล้าที่จะแตกแถวออกมาโจมตี พวกเขาก็จะต้องเผชิญหน้ากับปืนใหญ่หลายร้อยกระบอก พร้อมกับปืนใหญ่คริสตัลเวทมนตร์อีกหลายสิบกระบอก รวมถึงการรุมโจมตีเพื่อผดุงความยุติธรรมจากบรรดาพ่อมดอย่างบ้าคลั่ง!","ต่อให้อีกฝ่ายจะแข็งแกร่งแค่ไหน ก็ไม่มีทางทนการโจมตีแบบนี้ได้แน่!","“ไม่คิดเลยว่าสงครามทางทะเลจะสามารถสู้กันแบบนี้ได้ด้วย!”","ออโรร่าเอ่ยขึ้นด้วยความทึ่ง","“จำนวนเรือพวกนี้ลดลงไปครึ่งหนึ่งแล้ว ขืนปล่อยให้ไล่ตามไปแบบนี้ ไม่เกินหนึ่งวัน พวกมันจะต้องถูกทำลายจนหมดกองทัพแน่!”","ทิคกล่าวด้วยความภาคภูมิใจ","เขามองออกว่ากองเรือของจักรวรรดิกลุ่มนี้ น่าจะต้องการบุกฝ่าดงกระสุนเพื่อไปขึ้นฝั่งที่ดินแดนพ่อมดให้ได้ แต่ปัญหาคือพวกมันยังอยู่ห่างจากจุดหมายอีกไกลแสนไกล ด้วยความเร็วอันน้อยนิดของเรือรบใบชักพวกนั้น อย่างน้อยก็ต้องใช้เวลาอีกสามวัน","นี่มันก็แค่ความฝันลมๆ แล้งๆ ชัดๆ!","แต่หลังจากได้ยินคำพูดของทิค สีหน้าของออโรร่าก็เปลี่ยนไป สายตาของนางกวาดมองไปยังกองเรือใบชักที่อยู่ไกลออกไป พร้อมกับพึมพำออกมาเบาๆ","“นี่มันไม่ถูกต้อง!”","“อะไรไม่ถูกต้องงั้นหรือครับ ท่านออโรร่า?”","ทิคถามด้วยความสงสัย","“จำนวนเรือมันไม่ถูกต้อง!”","ออโรร่าเพิ่มระดับเสียงให้ดังขึ้น ก่อนจะใช้เวทขยายเสียง ตะโกนออกไปดังลั่น","“ทุกคน หันหัวเรือเดี๋ยวนี้!”","นางจำได้อย่างชัดเจนว่า กองเรือของจักรวรรดิมีเรือรบใบชักถึงสามร้อยลำ แต่ตอนนี้กลับเหลือเพียงแค่ร้อยกว่าลำเท่านั้น!","แม้ว่าพวกเขาจะไล่ตามโจมตีอีกฝ่ายมาหลายชั่วโมง และระดมยิงปืนใหญ่ไปหลายพันนัด แต่ภายใต้การคุ้มครองจากพลังศักดิ์สิทธิ์ของพวกนักบวชและบิชอป การโจมตีของพวกเขาไม่มีทางสร้างความเสียหายให้กับทั้งกองเรือได้มากขนาดนี้หรอก!","ยิ่งไปกว่านั้น ในระหว่างการไล่ตามโจมตีครั้งนี้ ช่วงแรกพวกนักบวชของศาสนจักรใช้พลังศักดิ์สิทธิ์อย่างไม่เสียดาย ทำให้สิ้นเปลืองพลังไปมาก หลังจากนั้นเพื่อเป็นการประหยัดพลัง พวกมันถึงขั้นขี้เกียจแม้กระทั่งจะใช้พลังศักดิ์สิทธิ์สลายหมอก แต่ตอนนี้กลับนำมันมาใช้อีกครั้ง นี่มันต้องมีอะไรผิดปกติแน่ๆ!","ในวินาทีถัดมา หลังจากที่ออโรร่าตระหนักได้ถึงความผิดปกติ กองเรือของจักรวรรดิที่กำลัง ‘หนีตาย’ ก็หันหัวเรือกลับกะทันหัน โดยเรือรบใบชักขนาดยักษ์แต่ละลำหมุนตัวอยู่บนผิวน้ำ ทำให้เกิดคลื่นลูกใหญ่ซัดสาด...","“ลม ลมมา!”","พร้อมกับเสียงคำรามที่ดังก้อง แสงศักดิ์สิทธิ์ก็เข้าปกคลุมเรือรบทุกลำ และความเร็วของพวกมันก็เพิ่มขึ้นอย่างรวดเร็ว ถึงขั้นเร่งความเร็วขึ้นได้มากกว่าห้าสิบเปอร์เซ็นต์ในเวลาอันสั้น!","แม้ว่าความเร็วระดับนี้จะเทียบไม่ได้กับเรือรบรุ่นใหม่ของพวกเขา แต่สีหน้าของออโรร่ากลับเคร่งเครียดเป็นอย่างมาก เพราะนางรับรู้ได้รางๆ ว่า ห่างออกไปทางซ้ายและขวาของพวกเขาในระยะหนึ่งจุดห้ากิโลเมตร ก็มีคลื่นพลังศักดิ์สิทธิ์ที่รุนแรงปรากฏขึ้นเช่นกัน","แต่ตอนนี้ไม่จำเป็นต้องใช้การรับรู้แล้ว เพราะกองเรือทั้งสองฝั่งนั้นได้ทะลวงผ่านม่านหมอกเข้ามาอยู่ในระยะสายตาของพวกเขาแล้ว และกำลังล้อมกรอบกองเรือของพวกเขาไว้ตรงกลางเป็นรูปสามเหลี่ยม","ทิคเข้าใจเรื่องราวทั้งหมดในทันที","สาเหตุที่อีกฝ่ายไม่ตอบโต้ และไม่ยอมสลายหมอก ก็เพื่อทำให้พวกเขาชะล่าใจ และแอบแยกเรือรบบางส่วนออกไปอย่างลับๆ จนกลายเป็นการโอบล้อมแบบนี้ในที่สุด!","พวกมันกล้าทำแบบนี้ได้ยังไง?","ทิคเผยสีหน้าหวาดผวา ต้องรู้ก่อนนะว่าที่นี่คือทะเลหมอก!","หากแยกตัวออกไปไกลเกินไป หรือหลุดออกจากขบวนกองเรือโดยไม่มีเรือธงคอยนำทาง เรือรบที่แยกตัวออกไปเหล่านี้ก็อาจจะหลงทิศหลงทางอยู่ในทะเลที่มีแต่หมอกหนานี้ตลอดไป!","แต่ไม่ว่าอย่างไรก็ตาม กองเรือของจักรวรรดิก็กำลังพุ่งตรงมาหาพวกเขาแล้ว ในระยะห่างหนึ่งกิโลเมตร จะว่าใกล้ก็ไม่ใกล้ จะว่าไกลก็ไม่ไกล ออโรร่าจึงจำใจต้องสั่งให้กองเรือพุ่งฝ่าวงล้อมออกไปทางทิศตะวันตกที่มีจำนวนเรือข้าศึกน้อยที่สุด","เสียงปืนใหญ่ดังสนั่นขึ้นอีกครั้ง คราวนี้พลปืนใหญ่ไม่เสียดายกระสุนอีกต่อไป พวกเขากระหน่ำยิงอย่างไม่หยุดหย่อน แต่พวกนักบวชและบิชอปที่อยู่บนเรือรบใบชักที่ก่อนหน้านี้ต้องอัดอั้นตันใจจนแทบระเบิด ตอนนี้มีโอกาสได้โต้กลับแล้ว พวกมันแต่ละคนจึงทุ่มสุดตัว ใช้พลังศักดิ์สิทธิ์ป้องกันการโจมตีจากปืนใหญ่อย่างสุดกำลัง..."]},{"n":382,"t":"เรือเหล็กยักษ์ฝ่าทะเลเพลิง!","c":["บนผืนทะเลอันกว้างใหญ่ที่หมอกเพิ่งจางหายไป เสียงปืนใหญ่ยังคงดังกึกก้องอย่างต่อเนื่อง","เสียงระเบิดที่ดังสนั่นหวั่นไหว แม้จะอยู่ห่างออกไปกว่าสิบกิโลเมตรก็ยังสามารถได้ยินอย่างชัดเจน...","ในเวลาเพียงแค่ห้านาที กองเรือก็ระดมยิงปืนใหญ่ไปแล้วกว่าพันลูก แต่ส่วนใหญ่ก็พลาดเป้า หรือไม่ก็ถูกม่านพลังศักดิ์สิทธิ์ป้องกันเอาไว้ได้","หลังจากระดมยิงอย่างหนักหน่วงไปถึงสามระลอก พวกเขาก็สามารถจมเรือรบศัตรูไปได้ทั้งหมดยี่สิบลำ แต่ในทางกลับกัน กองเรือรบใบชักขนาดยักษ์ก็ขยับเข้ามาใกล้จนถึงระยะสี่ร้อยเมตรแล้ว!","เครื่องขว้างหินอันหนักอึ้งเริ่มทำงาน โดยลูกกระสุนไม้ที่ชุ่มไปด้วยน้ำมันไฟ ถูกพลังศักดิ์สิทธิ์ช่วยหนุนให้พุ่งข้ามระยะทางหลายร้อยเมตร เข้าถล่มเรือธงที่อยู่ด้านหน้าสุด","‘ระเบิดเพลิงต่อเนื่อง’","‘ม่านพลังเวทมนตร์’","‘ม่านน้ำแข็ง’...","บรรดาพ่อมดรีบร่ายเวทเพื่อสกัดกั้นน้ำมันไฟที่พุ่งเข้ามา ลูกไฟที่ร้อนระอุเข้าปะทะกับลูกกระสุนไม้ที่ติดไฟ ทำให้เกิดแสงเพลิงสว่างวาบไปทั่วท้องฟ้า น้ำมันสีดำสนิทและเศษไม้ที่กระเด็นแตกกระจายร่วงหล่นลงบนผิวน้ำ เปลวไฟลุกลามไปตามน้ำมันสีดำอย่างรวดเร็วบนท้องทะเลอันกว้างใหญ่!","นับตั้งแต่ถูกค้นพบ น้ำมันชนิดพิเศษนี้ก็ถูกจักรวรรดินำมาใช้อย่างแพร่หลายในสงคราม มันไม่ได้เป็นเพียงแค่อาวุธทรงพลังในการตีเมืองเท่านั้น แต่ยังมีประสิทธิภาพยอดเยี่ยมในการทำสงครามทางทะเล และยังสร้างความเสียหายร้ายแรงให้กับเรือไม้ได้อีกด้วย!","ยิ่งไปกว่านั้น ทะเลเพลิงที่ลุกลามไปทั่ว ยังสามารถบั่นทอนขวัญกำลังใจของศัตรูได้อย่างมาก!","แต่คู่ต่อสู้ที่พวกเขากำลังเผชิญหน้าอยู่ในขณะนี้ เห็นได้ชัดว่าไม่ใช่คู่ต่อสู้ธรรมดา เรือเหล็กประจัญบานทั้งสี่ลำพุ่งทะยานฝ่าทะเลเพลิงไปข้างหน้าอย่างไม่เกรงกลัว เพื่อเปิดทางให้กับกองเรือเล่นแร่แปรธาตุที่อยู่ด้านหลัง...","“เร็วเข้า... เร็ว! โจมตีมัน อย่าปล่อยให้พวกมันฝ่าเข้ามาได้เด็ดขาด!”","บนเรือรบใบชักลำหนึ่งที่มีธงตราสัญลักษณ์แห่งแสงศักดิ์สิทธิ์โบกสะบัดอยู่ พระคาร์ดินัลคนหนึ่งตะโกนสั่งการเสียงดังลั่น","แม้ว่ากองเรือด้านข้างเพียงไม่กี่สิบลำ จะไม่มีทางเอาชนะกองเรือของพวกพ่อมดได้เลย แต่ภารกิจของพวกเขาก็ไม่ใช่การเอาชนะอยู่แล้ว ขอเพียงแค่ขัดขวางการเคลื่อนไหวของอีกฝ่ายได้ชั่วครู่ รอจนกว่ากองเรือหลักจะตามมาสมทบ สถานการณ์ก็จะพลิกกลับอย่างสิ้นเชิง!","เหล่านักบวชและบิชอปบนเรือใบชักต่างพากันสวดภาวนา โดยมีลูกศรที่เปล่งประกายพลังศักดิ์สิทธิ์นับไม่ถ้วนปรากฏขึ้นกลางอากาศ ก่อนจะพุ่งเข้าถล่มกองเรือของพวกพ่อมด!","ลูกศรที่สร้างขึ้นจากพลังศักดิ์สิทธิ์เหล่านี้ มีพลังทำลายล้างที่รุนแรงมาก ซึ่งสามารถเจาะทะลุเกราะป้องกันอันแข็งแกร่งได้อย่างง่ายดาย แถมยังมีคุณสมบัติในการทำลายเวทมนตร์อีกด้วย หลังจากการโจมตีด้วยพลังศักดิ์สิทธิ์ระลอกนี้ ฝั่งของพวกพ่อมดก็เริ่มมีผู้บาดเจ็บล้มตายเป็นครั้งแรก","เรือเล่นแร่แปรธาตุลำหนึ่งถูกทะลวงแนวป้องกัน น้ำมันไฟจำนวนมากเทราดลงมา และไม่นานเรือทั้งลำก็ถูกไฟลุกท่วม...","พระคาร์ดินัลที่ทำหน้าที่บัญชาการก็ไม่ได้อยู่เฉย ท่ามกลางเสียงสวดบทสรรเสริญอันกึกก้อง พลังศักดิ์สิทธิ์อันมหาศาลก็เริ่มแผ่ซ่านออกมารอบตัวเขา","‘บทสรรเสริญ การพิพากษาจากสรวงสวรรค์!’","พลังศักดิ์สิทธิ์ที่รุนแรงค่อยๆ ควบแน่นเข้าด้วยกัน แผ่กลิ่นอายแห่งความตายอันน่าสะพรึงกลัวออกมา","แต่ในตอนนั้นเอง ลำแสงเลเซอร์อันทรงพลังก็พุ่งทะยานข้ามระยะทางหลายร้อยเมตร ตัดขั้วหัวใจของเขาไปอย่างแม่นยำ ก่อนจะผ่าเรือรบใบชักทั้งลำออกเป็นสองซีกจากบนลงล่าง ราวกับมีดที่หั่นลงบนเนย!","พลังศักดิ์สิทธิ์ที่ควบแน่นไว้แตกกระจายในพริบตา ท่ามกลางเสียงระเบิดและเปลวไฟ เรือรบใบชักขนาดยักษ์ก็ถูกผ่าออกและล้มครืนไปคนละทาง ทำให้เกิดคลื่นลูกใหญ่ซัดสาด...","คนที่ลงมือก็คือ ออโรร่า!","ในเรื่องของการใช้และการควบคุมเวทมนตร์ลำแสงเลเซอร์ นางไม่ได้ด้อยไปกว่าลินน์เลย ที่ก่อนหน้านี้นางยังไม่ลงมือ ก็เป็นเพราะเรือของอีกฝ่ายยังเข้ามาไม่ถึงระยะโจมตีเท่านั้นเอง","สองร้อยสามสิบเมตร...นี่คือระยะทางไกลสุดที่ลำแสงเลเซอร์ระดับที่สี่จะสามารถตัดและทำลายตัวเรือได้!","ออโรร่ากำมือหลวมๆ ก่อนจะตวัดลำแสงเลเซอร์ออกไปอีกครั้ง คราวนี้เป้าหมายของนางคือเรือรบใบชักอีกกว่าสิบลำที่กำลังเคลื่อนตัวเข้ามาใกล้...","เมื่อได้เห็นพลังทำลายล้างของลำแสงเลเซอร์กับตา เหล่านักบวชและบิชอปก็พากันขวัญหนีดีฝ่อ แต่การโจมตีนั้นรวดเร็วและรุนแรงเกินไป ยังไม่ทันที่พวกเขาจะคิดหาวิธีรับมือ ลำแสงอันน่าสะพรึงกลัวนั้นก็กวาดผ่านร่างของพวกเขาไปแล้ว ม่านพลังศักดิ์สิทธิ์รอบตัวราวกับทำมาจากกระดาษ ถูกเจาะทะลุอย่างง่ายดาย ด้วยสีหน้าหวาดกลัวยังคงค้างอยู่บนใบหน้า แต่ศีรษะกลับหลุดออกจากบ่าไปเสียแล
